<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QuAlsar — AI Sınav Asistanı</title>
  <meta name="description" content="QuAlsar: Soruyu çek, anında AI çözüm al. 55 dil, kişisel müfredat, Pomodoro odak.">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #1E0A22 0%, #4C2018 60%, #B06040 100%);
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      max-width: 720px;
      text-align: center;
      padding: 40px 24px;
    }
    .logo {
      width: 96px;
      height: 96px;
      margin: 0 auto 24px;
      background: linear-gradient(135deg, #FF6A3C, #FF9860);
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 56px;
      font-weight: 900;
      color: white;
      box-shadow: 0 20px 60px rgba(255,106,60,0.4);
    }
    h1 {
      font-size: 42px;
      font-weight: 900;
      margin-bottom: 12px;
      letter-spacing: -1px;
    }
    .tagline {
      font-size: 18px;
      opacity: 0.85;
      margin-bottom: 36px;
      line-height: 1.5;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 360px;
      margin: 0 auto;
    }
    .link-row {
      display: flex;
      gap: 12px;
    }
    .link-card {
      flex: 1;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 14px;
      padding: 16px;
      color: white;
      text-decoration: none;
      transition: transform 0.18s, background 0.18s;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .link-card:hover {
      background: rgba(255,255,255,0.16);
      transform: translateY(-2px);
    }
    .link-emoji { font-size: 22px; }
    .link-text { text-align: left; }
    .link-title { font-size: 14px; font-weight: 700; }
    .link-sub { font-size: 11px; opacity: 0.7; }
    .footer {
      margin-top: 48px;
      font-size: 13px;
      opacity: 0.6;
    }
    .footer a { color: #FFB070; text-decoration: none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">Q</div>
    <h1>QuAlsar</h1>
    <p class="tagline">AI destekli sınav asistanı.<br>Soruyu çek, çözümü gör. 55 dil, sınırsız öğrenme.</p>

    <div class="links">
      <div class="link-row">
        <a class="link-card" href="/privacy">
          <div class="link-emoji">🔒</div>
          <div class="link-text">
            <div class="link-title">Gizlilik Politikası</div>
            <div class="link-sub">Türkçe</div>
          </div>
        </a>
        <a class="link-card" href="/privacy-en">
          <div class="link-emoji">🔒</div>
          <div class="link-text">
            <div class="link-title">Privacy Policy</div>
            <div class="link-sub">English</div>
          </div>
        </a>
      </div>
      <div class="link-row">
        <a class="link-card" href="/terms">
          <div class="link-emoji">📄</div>
          <div class="link-text">
            <div class="link-title">Kullanım Koşulları</div>
            <div class="link-sub">Türkçe</div>
          </div>
        </a>
        <a class="link-card" href="/terms-en">
          <div class="link-emoji">📄</div>
          <div class="link-text">
            <div class="link-title">Terms of Service</div>
            <div class="link-sub">English</div>
          </div>
        </a>
      </div>
    </div>

    <p class="footer">
      © 2026 QuAlsar · <a href="mailto:serhatdsme@gmail.com">İletişim</a>
    </p>
  </div>
</body>
</html>
