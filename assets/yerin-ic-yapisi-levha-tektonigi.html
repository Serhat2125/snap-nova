function makeMagmaFlow(opts = {}) {
  const startY = opts.startY || -1.5;
  const endY = opts.endY || 0.8;
  const x = opts.x || 1.5;
  const z = opts.z || 0;
  
  const grp = new THREE.Group();
  
  // Magma tüpü (kırmızı yükselen sütun)
  const tube = new THREE.Mesh(
    new THREE.CylinderGeometry(0.15, 0.25, endY - startY, 12),
    new THREE.MeshStandardMaterial({
      color: 0xFF3D00, emissive: 0xFF3D00, emissiveIntensity: 1.0,
      roughness: 0.4, metalness: 0.2, toneMapped: false
    })
  );
  tube.position.set(x, (startY + endY) / 2, z);
  grp.add(tube);
  
  // Yukarı çıkan parçacıklar
  const count = 60;
  const positions = new Float32Array(count * 3);
  const phases = new Float32Array(count);
  for (let i = 0; i < count; i++) {
    positions[i * 3] = x + (Math.random() - 0.5) * 0.3;
    positions[i * 3 + 1] = startY + Math.random() * (endY - startY);
    positions[i * 3 + 2] = z + (Math.random() - 0.5) * 0.3;
    phases[i] = Math.random();
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const parts = new THREE.Points(geo, new THREE.PointsMaterial({
    color: 0xFF6F00, size: 0.08, sizeAttenuation: true,
    transparent: true, opacity: 0.9,
    blending: THREE.AdditiveBlending, depthWrite: false
  }));
  parts.userData._isMagmaFlow = true;
  parts.userData._phases = phases;
  parts.userData._startY = startY;
  parts.userData._endY = endY;
  parts.userData._baseX = x;
  parts.userData._baseZ = z;
  grp.add(parts);
  
  return grp;
}

// ============== DEPREM HİPOSANTR + DALGALAR =================
// ============================================================

function makeEarthquakeWaves(opts = {}) {
  const center = opts.center || new THREE.Vector3(0, -0.5, 0);
  const grp = new THREE.Group();
  
  // Hiposantr (yer altında parlayan kırmızı küre)
  const hipo = new THREE.Mesh(
    new THREE.SphereGeometry(0.2, 20, 14),
    new THREE.MeshStandardMaterial({
      color: 0xFF1744, emissive: 0xFF1744, emissiveIntensity: 1.5,
      roughness: 0.2, metalness: 0.4, toneMapped: false
    })
  );
  hipo.position.copy(center);
  hipo.userData._isHipo = true;
  grp.add(hipo);
  
  // Episantr (yüzeyde aynı noktanın üzerinde, sarı)
  const epi = new THREE.Mesh(
    new THREE.CircleGeometry(0.18, 24),
    new THREE.MeshStandardMaterial({
      color: 0xFFEB3B, emissive: 0xFFEB3B, emissiveIntensity: 1.2,
      roughness: 0.3, side: THREE.DoubleSide, toneMapped: false
    })
  );
  epi.rotation.x = -Math.PI / 2;
  epi.position.set(center.x, 0.05, center.z);
  epi.userData._isEpi = true;
  grp.add(epi);
  
  // Yayılan dalga halkaları (yüzeyde, 3 adet)
  for (let i = 0; i < 3; i++) {
    const ring = new THREE.Mesh(
      new THREE.RingGeometry(0.4, 0.45, 32),
      new THREE.MeshStandardMaterial({
        color: 0xFF5722, emissive: 0xFF5722, emissiveIntensity: 0.9,
        transparent: true, opacity: 0.85,
        side: THREE.DoubleSide, toneMapped: false
      })
    );
    ring.rotation.x = -Math.PI / 2;
    ring.position.set(center.x, 0.05, center.z);
    ring.userData._isQuakeRing = true;
    ring.userData._phase = i / 3;
    grp.add(ring);
  }
  
  // Hiposantr ışığı
  const ql = new THREE.PointLight(0xFF1744, 2.0, 4);
  ql.position.copy(center);
  grp.add(ql);
  
  return grp;
}

// ============================================================
// ============== BASİT DAĞ (V2 KULLANIM) ==================== 
// ============================================================

function makeMountainV2(opts = {}) {
  const baseR = opts.baseR || 2;
  const height = opts.height || 2;
  const color = opts.color || 0x6D4C41;
  
  const segs = 32;
  const points = [];
  for (let i = 0; i <= 12; i++) {
    const t = i / 12;
    const r = baseR * (1 - t * 0.95);
    const y = height * t;
    points.push(new THREE.Vector2(r, y));
  }
  
  const geo = new THREE.LatheGeometry(points, segs);
  const pos = geo.attributes.position;
  for (let i = 0; i < pos.count; i++) {
    const x = pos.getX(i), z = pos.getZ(i);
    const noise = fbm(x * 1.5, z * 1.5, 3) * 0.15;
    pos.setX(i, x + noise);
    pos.setZ(i, z + noise);
  }
  geo.computeVertexNormals();
  
  return new THREE.Mesh(geo, new THREE.MeshStandardMaterial({
    color: color, roughness: 0.95, metalness: 0.05
  }));
}

// === 1.1: GENEL BAKIŞ — Yer'in 4 Katmanı (Pasta Dilimi) ===
SubBuilders.buildGenelBakis = function() {
  const grp = new THREE.Group();
  camera.position.set(0.0, 4.8, 20.3);
  controls.target.set(0, 0, 0);
  controls.update();

  grp.add(makeSceneAtmosphere({ tint: 0xFF6F00, particles: 80 }));
  grp.add(makeGeoLighting());

  // ORTA: Yer kesiti (pasta dilim küre)
  const earth = makeEarthSection({ radius: 3.5, angle: Math.PI / 2 });
  earth.rotation.y = 0;
  grp.add(earth);

  // Manto içine konveksiyon parçacıkları
  const conv1 = makeMagmaParticles({ count: 150, innerR: 2.0, outerR: 3.2, color: 0xFF6F00 });
  grp.add(conv1);

  // Etiketler — yan tarafta, anchor objelerin üstünde
  addLabel(new THREE.Vector3(-5, 4, 0), '⚪ İç Çekirdek (5500°C)', 'warn', new THREE.Vector3(0.3, 0, 0), 1);
  addLabel(new THREE.Vector3(-5.5, 2.8, 0), '🟡 Dış Çekirdek (sıvı)', 'phloem', new THREE.Vector3(1.3, 0.3, 0), 1);
  addLabel(new THREE.Vector3(5, 4, 0), '🔴 Manto (plastik)', 'warn', new THREE.Vector3(2.3, 0.5, 0), 1);
  addLabel(new THREE.Vector3(5.5, 2.5, 0), '🟠 Astenosfer', 'phloem', new THREE.Vector3(3.1, 0.7, 0), 4);
  addLabel(new THREE.Vector3(0, 5.5, 0), '🪨 Yer Kabuğu (5–70 km)', 'epi', new THREE.Vector3(0, 3.5, 0), 1);

  // Başlık
  addLabel(new THREE.Vector3(0, -4, 0), '🌍 YER\'İN 4 KATMANI (Pasta Dilim Kesiti)', 'warn', new THREE.Vector3(0, -4, 0));
  addLabel(new THREE.Vector3(0, -4.7, 0), 'Yarıçap: ~6371 km — Kabuk %1 kadar!', '', new THREE.Vector3(0, -4.7, 0), 3);

  scene.add(grp);
  markDynamic(grp);

  window._customAnim = (t, dt) => {
    grp.traverse(o => {
      if (o.userData._isAtmDust) {
        const pos = o.geometry.attributes.position;
        for (let i = 0; i < pos.count; i++) {
          const x = pos.getX(i), z = pos.getZ(i);
          const angle = Math.atan2(z + 2, x) + dt * 0.04;
          const r = Math.sqrt(x*x + (z+2)*(z+2));
          pos.setX(i, Math.cos(angle) * r);
          pos.setZ(i, Math.sin(angle) * r - 2);
        }
        pos.needsUpdate = true;
      }
      // Magma konveksiyon — dairesel hareket
      if (o.userData._isMagmaParts) {
        const pos = o.geometry.attributes.position;
        const phases = o.userData._phases;
        const radii = o.userData._radii;
        const speeds = o.userData._speeds;
        for (let i = 0; i < pos.count; i++) {
          phases[i] += dt * speeds[i];
          pos.setX(i, Math.cos(phases[i]) * radii[i]);
          pos.setZ(i, Math.sin(phases[i]) * radii[i]);
          // Hafif yükselip alçalma
          pos.setY(i, Math.sin(t * 1.5 + i * 0.3) * 0.15);
        }
        pos.needsUpdate = true;
      }
    });
  };
};

      0.2 + (Math.random() - 0.5) * 0.4
    ));
  }
  const plumeGeo = new THREE.BufferGeometry().setFromPoints(plumePts);
  const plume = new THREE.Points(plumeGeo, new THREE.PointsMaterial({
    color: 0xFFAB00, size: 0.1, sizeAttenuation: true,
    transparent: true, opacity: 0.9,
    blending: THREE.AdditiveBlending
  }));
  grp.add(plume);

  // İç çekirdek için PointLight (parlama)
  const innerLight = new THREE.PointLight(0xFFFF99, 2.0, 6);
  innerLight.position.set(0.3, 0, 0);
  grp.add(innerLight);

  // Etiketler
  addLabel(new THREE.Vector3(-5.5, 0, 0), '⚪ İç Çekirdek\n(Katı demir, 5500°C)', 'warn', new THREE.Vector3(0.3, 0, 0), 1);
  addLabel(new THREE.Vector3(-6, -2, 0), '🟡 Dış Çekirdek\n(Sıvı, manyetik alan!)', 'phloem', new THREE.Vector3(1.4, 0, 0), 4);
  addLabel(new THREE.Vector3(5.5, 2.5, 0), '🔄 Konveksiyon Akıntıları', 'warn', new THREE.Vector3(2.8, 1.2, 0), 4);
  addLabel(new THREE.Vector3(5.5, 1.5, 0), '(Levha tektoniğinin motoru)', 'phloem', new THREE.Vector3(2.8, 0.5, 0), 4);
  addLabel(new THREE.Vector3(5.5, -1.5, 0), '🔴 Manto (plastik kıvam)', 'epi', new THREE.Vector3(2.8, -1, 0), 4);

  // Başlık
  addLabel(new THREE.Vector3(0, -4.5, 0), '🔥 İÇ MOTOR — Çekirdek + Manto', 'warn', new THREE.Vector3(0, -4.5, 0));
  addLabel(new THREE.Vector3(0, -5.2, 0), 'Konveksiyon → Levha hareketi', '', new THREE.Vector3(0, -5.2, 0), 3);

  scene.add(grp);
  markDynamic(grp);

  window._customAnim = (t, dt) => {
    grp.traverse(o => {
      if (o.userData._isAtmDust) {
        const pos = o.geometry.attributes.position;
        for (let i = 0; i < pos.count; i++) {
          const x = pos.getX(i), z = pos.getZ(i);
          const angle = Math.atan2(z + 2, x) + dt * 0.04;
          const r = Math.sqrt(x*x + (z+2)*(z+2));
          pos.setX(i, Math.cos(angle) * r);
          pos.setZ(i, Math.sin(angle) * r - 2);
        }
        pos.needsUpdate = true;
      }
      if (o.userData._isMagmaParts) {
        const pos = o.geometry.attributes.position;
        const phases = o.userData._phases;
        const radii = o.userData._radii;
        const speeds = o.userData._speeds;
        for (let i = 0; i < pos.count; i++) {
          phases[i] += dt * speeds[i] * 0.8;
          pos.setX(i, Math.cos(phases[i]) * radii[i]);
          pos.setZ(i, Math.sin(phases[i]) * radii[i]);
          pos.setY(i, Math.sin(t * 1.5 + i * 0.3) * 0.18);
        }
        pos.needsUpdate = true;
      }
    });
    innerLight.intensity = 1.8 + Math.sin(t * 2) * 0.6;
  };
};

  );

  tortul.castShadow = true;

    dnArrow.material.emissiveIntensity = 0.8 + Math.sin(t * 3) * 0.3;
  };
};

  // Sill pozisyonu: (-1, -0.5, 0)
  addLabel(new THREE.Vector3(-5, 0.5, 0), '📏 SILL\n(yatay damar)', 'phloem', new THREE.Vector3(-1, -0.5, 0), 1);
  // Dike1 pozisyonu: (3, 0.2, 0)
  addLabel(new THREE.Vector3(5.5, 3, 0), '📏 DIKE\n(dikey damar)', 'epi', new THREE.Vector3(3, 0.5, 0), 1);
  // Dike2: (0, 0, 0)
  addLabel(new THREE.Vector3(0, 3.5, 0), '📏 Dike', 'epi', new THREE.Vector3(0, 0.5, 0), 2);

        for (let i = 0; i < pos.count; i++) {
          const x = pos.getX(i), z = pos.getZ(i);
          const angle = Math.atan2(z + 2, x) + dt * 0.04;
          const r = Math.sqrt(x*x + (z+2)*(z+2));
          pos.setX(i, Math.cos(angle) * r);
          pos.setZ(i, Math.sin(angle) * r - 2);
        }
        pos.needsUpdate = true;
      }
    });
    // Magma yapıları pulse
    pluton.traverse(o => {
      if (o.isMesh && o.material.emissive && o.material.emissive.getHex() > 0x100000) {

    });
  };
};

// === 3.2: YÜZEY VOLKANİZMASI (Krater/Kaldera/Maar) ===
SubBuilders.buildYuzeyVolkan = function() {

  camera.position.set(0.0, 4.2, 20.3);
  controls.target.set(0, 0.5, 0);
  controls.update();

  grp.add(makeSceneAtmosphere({ tint: 0xFF3D00, particles: 90 }));

  const ground = new THREE.Mesh(
    new THREE.BoxGeometry(14, 0.4, 4),
    new THREE.MeshStandardMaterial({
      color: 0x558B2F, roughness: 0.9,
      emissive: 0x558B2F, emissiveIntensity: 0.1
    })
  );
  ground.position.y = -0.2;
  ground.receiveShadow = true;
  grp.add(ground);

  // SOL: Volkan + Krater (aktif)
  const volcanoGrp = new THREE.Group();
  volcanoGrp.position.set(-4, 0, 0);

  volcanoGrp.add(volcano);

    count: 100,

  });

  addLabel(new THREE.Vector3(-4, -1.5, 0), 'Örnek: Vezüv, Etna', '', new THREE.Vector3(-4, -0.3, 0), 2);

  // ORTA: Kaldera (büyük çukur — eski volkan)
  const calderaGrp = new THREE.Group();
  calderaGrp.position.set(0, 0, 0);
  // Dış kenar (yüksek halka)
  const calderaRim = new THREE.Mesh(
    new THREE.TorusGeometry(1.5, 0.4, 12, 32),
    new THREE.MeshStandardMaterial({ color: 0x6D4C41, roughness: 0.95 })
  );
  calderaRim.rotation.x = Math.PI / 2;
  calderaRim.position.y = 0.3;
  calderaRim.castShadow = true;
  calderaGrp.add(calderaRim);
  // İç çukur (su dolu göl)
  const calderaLake = new THREE.Mesh(
    new THREE.CylinderGeometry(1.3, 1.3, 0.3, 32),
    new THREE.MeshPhysicalMaterial({
      color: 0x0288D1, transparent: true, opacity: 0.8,
      roughness: 0.1, metalness: 0.5, clearcoat: 1.0,
      emissive: 0x01579B, emissiveIntensity: 0.2
    })
  );
  calderaLake.position.y = -0.05;
  calderaGrp.add(calderaLake);
  // Kaldera kenarında küçük volkan konileri (yan koniler)
  for (let i = 0; i < 3; i++) {
    const angle = (i / 3) * Math.PI * 2 + 0.5;
    const sc = new THREE.Mesh(
      new THREE.ConeGeometry(0.25, 0.5, 12),
      new THREE.MeshStandardMaterial({ color: 0x4E342E, roughness: 0.9 })
    );
    sc.position.set(Math.cos(angle) * 1.5, 0.5, Math.sin(angle) * 1.5);
    calderaGrp.add(sc);
  }
  grp.add(calderaGrp);
  addLabel(new THREE.Vector3(0, 4.2, 0), '💥 KALDERA\n(çökmüş büyük çukur)', 'warn', new THREE.Vector3(0, 0.7, 0), 1);
  addLabel(new THREE.Vector3(0, -1.5, 0), 'Örnek: Yellowstone, Krakatoa', '', new THREE.Vector3(0, 0, 0), 2);

  // SAĞ: Maar (küçük çukur, gölle dolu)
  const maarGrp = new THREE.Group();
  maarGrp.position.set(4, 0, 0);
  // Maar çukuru (kenar)
  const maarRim = new THREE.Mesh(
    new THREE.TorusGeometry(0.7, 0.18, 10, 24),
    new THREE.MeshStandardMaterial({ color: 0x6D4C41, roughness: 0.95 })
  );
  maarRim.rotation.x = Math.PI / 2;
  maarRim.position.y = 0.15;
  maarRim.castShadow = true;
  maarGrp.add(maarRim);
  // İç göl (su)
  const maarLake = new THREE.Mesh(
    new THREE.CylinderGeometry(0.6, 0.6, 0.25, 24),
    new THREE.MeshPhysicalMaterial({
      color: 0x0288D1, transparent: true, opacity: 0.85,
      roughness: 0.1, metalness: 0.5, clearcoat: 1.0,
      emissive: 0x01579B, emissiveIntensity: 0.25
    })
  );
  maarLake.position.y = 0;
  maarGrp.add(maarLake);
  grp.add(maarGrp);
  addLabel(new THREE.Vector3(4, 4.2, 0), '🕳️ MAAR\n(küçük gaz patlaması çukuru)', 'chloro', new THREE.Vector3(4, 0.3, 0), 1);
  addLabel(new THREE.Vector3(4, -1.5, 0), 'Örnek: Eifel maarları (Almanya)', '', new THREE.Vector3(4, -0.2, 0), 2);

  // Başlık
  addLabel(new THREE.Vector3(0, 5.5, 0), '🌋 YÜZEY VOLKANİZMASI — Krater / Kaldera / Maar', 'warn', new THREE.Vector3(0, 5.5, 0));

  scene.add(grp);
  markDynamic(grp);

  window._customAnim = (t, dt) => {
    grp.traverse(o => {
      if (o.userData._isAtmDust) {
        const pos = o.geometry.attributes.position;
        for (let i = 0; i < pos.count; i++) {
          const x = pos.getX(i), z = pos.getZ(i);
          const angle = Math.atan2(z + 2, x) + dt * 0.04;
          const r = Math.sqrt(x*x + (z+2)*(z+2));
          pos.setX(i, Math.cos(angle) * r);
          pos.setZ(i, Math.sin(angle) * r - 2);
        }
        pos.needsUpdate = true;
      }
      // Volkan püskürme parçacıkları
      if (o.userData._isVolcanoParts) {
        const pos = o.geometry.attributes.position;
        const vel = o.userData._velocities;
        const life = o.userData._life;
        const center = o.userData._center;
        for (let i = 0; i < pos.count; i++) {
          life[i] += dt * 0.5;
          if (life[i] >= 1) {
            life[i] = 0;
            pos.setX(i, center.x);
            pos.setY(i, center.y);
            pos.setZ(i, center.z);
          } else {
            const px = pos.getX(i) + vel[i*3] * dt;
            const py = pos.getY(i) + (vel[i*3+1] - life[i] * 4.5) * dt;
            const pz = pos.getZ(i) + vel[i*3+2] * dt;
            pos.setX(i, px);
            pos.setY(i, py);
            pos.setZ(i, pz);
          }
        }
        pos.needsUpdate = true;
      }
      // Krater magma pulse
      if (o.userData._isMagma) {
        o.material.emissiveIntensity = 1.0 + Math.sin(t * 3) * 0.4;
      }
    });
  };
};

  const shieldPts = [];

    sP.setX(i, x + n);
    sP.setZ(i, z + n);

    color: 0x3E2723, roughness: 0.95, metalness: 0.1
  }));

  strato.position.set(0, 0, 0);

    dLT.position.x = -0.85 - Math.sin(t * 1.2) * 0.08;

    dRT.position.x = 0.85 + Math.sin(t * 1.2) * 0.08;
    rift.material.emissiveIntensity = 0.9 + Math.sin(t * 2) * 0.4;

    tL.position.z = Math.sin(t * 1.2) * 0.15;
    tLT.position.z = Math.sin(t * 1.2) * 0.15;
    tR.position.z = -Math.sin(t * 1.2) * 0.15;
    tRT.position.z = -Math.sin(t * 1.2) * 0.15;
    transFault.material.emissiveIntensity = 0.9 + Math.sin(t * 4) * 0.4;
  };
};

  grp.add(makeSceneAtmosphere({ tint: 0xFF3D00, particles: 80 }));

  // Manto altta (kırmızı bant)

    new THREE.BoxGeometry(12, 0.8, 3.2),

      color: 0xC62828, emissive: 0xC62828, emissiveIntensity: 0.35,
      roughness: 0.5, metalness: 0.1
    })
  );
  mantle.position.y = -1.8;
  grp.add(mantle);

  // Magma akışı (dalan levhadan yukarı, kıtasal levha üzerinde volkan oluşturur)
  const magmaFlow = makeMagmaFlow({
    startY: -1.2, endY: 0.8, x: 1.5, z: 0
  });
  grp.add(magmaFlow);

  // And dağı (kıtasal levha üzerinde)
  const andMtn = makeVolcano({ baseR: 0.8, height: 1.5, craterR: 0.15, color: 0x4E342E });
  andMtn.position.set(1.5, 0.8, 0);
  grp.add(andMtn);

  // İkinci volkan (And sırası)
  const andMtn2 = makeVolcano({ baseR: 0.6, height: 1.1, craterR: 0.12, color: 0x4E342E });
  andMtn2.position.set(3, 0.8, 0);
  grp.add(andMtn2);

  // Volkan püskürmesi
  const andErupt = makeVolcanoParticles({
    count: 60,
    center: new THREE.Vector3(1.5, 2.2, 0),
    color: 0xFF6F00
  });
  grp.add(andErupt);

  // Hiposantr (sürtünme noktası) — okyanusal levha kıtasala değdiği yer
  const hipoLight = new THREE.Mesh(
    new THREE.SphereGeometry(0.18, 16, 12),
    new THREE.MeshStandardMaterial({
      color: 0xFF1744, emissive: 0xFF1744, emissiveIntensity: 1.5,
      roughness: 0.2, toneMapped: false
    })
  );
  hipoLight.position.set(-0.3, -0.4, 0);
  hipoLight.userData._isQuakePoint = true;
  grp.add(hipoLight);
  const hipoLamp = new THREE.PointLight(0xFF1744, 2.0, 3);
  hipoLamp.position.set(-0.3, -0.4, 0);
  grp.add(hipoLamp);

  // Etiketler
  addLabel(new THREE.Vector3(-6, 3, 0), '🌊 Okyanusal Levha\n(ağır, dalan)', 'warn', new THREE.Vector3(-3.5, 0.3, 0), 1);
  addLabel(new THREE.Vector3(6, 3.5, 0), '🌍 Kıtasal Levha\n(hafif, dalmaz)', 'chloro', new THREE.Vector3(2.5, 0.7, 0), 1);
  addLabel(new THREE.Vector3(-6, -1, 0), '⬇️ Subdüksiyon\n(Dalma-Batma)', 'epi', new THREE.Vector3(-1.5, -0.8, 0), 1);
  addLabel(new THREE.Vector3(6, 1, 0), '🌋 Volkanik dağ sırası\n(And dağları)', 'warn', new THREE.Vector3(2.2, 2.2, 0), 2);
  addLabel(new THREE.Vector3(-3, -2.5, 0), '🔴 Hiposantr (deprem odağı)', 'phloem', new THREE.Vector3(-0.3, -0.4, 0), 2);
  addLabel(new THREE.Vector3(3, -2.5, 0), '🔥 Magma yükselişi', '', new THREE.Vector3(1.5, -0.2, 0), 2);

  // Başlık
  addLabel(new THREE.Vector3(0, 5.5, 0), '⬇️ SUBDÜKSİYON — Okyanusal Levha Dalar', 'warn', new THREE.Vector3(0, 5.5, 0));
  addLabel(new THREE.Vector3(0, -3.5, 0), 'Örnek: Nazca-G.Amerika → And Dağları', '', new THREE.Vector3(0, -3.5, 0), 2);

  scene.add(grp);
  markDynamic(grp);

  window._customAnim = (t, dt) => {
    grp.traverse(o => {
      if (o.userData._isAtmDust) {
        const pos = o.geometry.attributes.position;
        for (let i = 0; i < pos.count; i++) {
          const x = pos.getX(i), z = pos.getZ(i);
          const angle = Math.atan2(z + 2, x) + dt * 0.04;
          const r = Math.sqrt(x*x + (z+2)*(z+2));
          pos.setX(i, Math.cos(angle) * r);
          pos.setZ(i, Math.sin(angle) * r - 2);
        }
        pos.needsUpdate = true;
      }
      // Volkan püskürme
      if (o.userData._isVolcanoParts) {
        const pos = o.geometry.attributes.position;
        const vel = o.userData._velocities;
        const life = o.userData._life;
        const center = o.userData._center;
        for (let i = 0; i < pos.count; i++) {
          life[i] += dt * 0.5;
          if (life[i] >= 1) {
            life[i] = 0;
            pos.setX(i, center.x);
            pos.setY(i, center.y);
            pos.setZ(i, center.z);
          } else {
            const px = pos.getX(i) + vel[i*3] * dt;
            const py = pos.getY(i) + (vel[i*3+1] - life[i] * 4.5) * dt;
            const pz = pos.getZ(i) + vel[i*3+2] * dt;
            pos.setX(i, px);
            pos.setY(i, py);
            pos.setZ(i, pz);
          }
        }
        pos.needsUpdate = true;
      }
      // Magma akış parçacıkları (yukarı)
      if (o.userData._isMagmaFlow) {
        const pos = o.geometry.attributes.position;
        const phases = o.userData._phases;
        const sy = o.userData._startY, ey = o.userData._endY;
        const baseX = o.userData._baseX, baseZ = o.userData._baseZ;
        for (let i = 0; i < pos.count; i++) {
          phases[i] += dt * 0.4;
          if (phases[i] >= 1) phases[i] = 0;
          pos.setY(i, sy + phases[i] * (ey - sy));
          pos.setX(i, baseX + Math.sin(phases[i] * Math.PI * 4 + i) * 0.15);
          pos.setZ(i, baseZ + Math.cos(phases[i] * Math.PI * 4 + i) * 0.15);
        }
        pos.needsUpdate = true;
      }
      if (o.userData._isMagma) {
        o.material.emissiveIntensity = 1.0 + Math.sin(t * 3) * 0.4;
      }
      // Hiposantr yanıp sönme
      if (o.userData._isQuakePoint) {
        o.material.emissiveIntensity = 1.0 + Math.abs(Math.sin(t * 4)) * 1.5;
      }
    });
  };
};

SubBuilders.buildDepremler = function() {

  }

  crust.position.y = -1;
  crust.castShadow = true;
  crust.receiveShadow = true;

  // Manto (altta kırmızı)
  const mantleQ = new THREE.Mesh(
    new THREE.BoxGeometry(10, 0.8, 4),
    new THREE.MeshStandardMaterial({
      color: 0xC62828, emissive: 0xC62828, emissiveIntensity: 0.35,
      roughness: 0.5
    })
  );
  mantleQ.position.y = -2.5;
  grp.add(mantleQ);

  // Fay hattı (kırılma — kırmızı eğik çizgi)
  const fault = new THREE.Mesh(
    new THREE.BoxGeometry(0.08, 3, 2.5),
    new THREE.MeshStandardMaterial({
      color: 0xFF1744, emissive: 0xFF1744, emissiveIntensity: 1.0, toneMapped: false
    })

  fault.position.set(0, -1, 0);

    })
  );
  hipo.position.set(0, -1.5, 0);
  hipo.userData._isHipo = true;
  grp.add(hipo);
  const hipoLight = new THREE.PointLight(0xFF1744, 2.5, 4);
  hipoLight.position.set(0, -1.5, 0);
  grp.add(hipoLight);

  // Episantr (yüzeyde tam üstte — sarı disk)
  const epi = new THREE.Mesh(
    new THREE.CircleGeometry(0.25, 24),
    new THREE.MeshStandardMaterial({
      color: 0xFFEB3B, emissive: 0xFFEB3B, emissiveIntensity: 1.2,
      roughness: 0.3, side: THREE.DoubleSide, toneMapped: false
    })
  );
  epi.rotation.x = -Math.PI / 2;
  epi.position.set(0, 0.1, 0);
  epi.userData._isEpi = true;
  grp.add(epi);

  // Hiposantrdan episantra çizgi (dikey)
  const distLine = new THREE.Mesh(
    new THREE.CylinderGeometry(0.03, 0.03, 1.6, 6),
    new THREE.MeshStandardMaterial({
      color: 0xFFEB3B, emissive: 0xFFEB3B, emissiveIntensity: 0.8,
      transparent: true, opacity: 0.7, toneMapped: false
    })
  );
  distLine.position.set(0, -0.7, 0);
  grp.add(distLine);

  // Sismik dalga halkaları (yüzeyde, 3 adet, expand eder)
  for (let i = 0; i < 4; i++) {
    const ring = new THREE.Mesh(
      new THREE.RingGeometry(0.4, 0.5, 32),
      new THREE.MeshStandardMaterial({
        color: 0xFF5722, emissive: 0xFF5722, emissiveIntensity: 0.9,
        transparent: true, opacity: 0.85,
        side: THREE.DoubleSide, toneMapped: false
      })
    );
    ring.rotation.x = -Math.PI / 2;
    ring.position.set(0, 0.06, 0);
    ring.userData._isQuakeRing = true;
    ring.userData._phase = i / 4;
    grp.add(ring);
  }

  // İçeride yayılan sismik dalga halkaları (P + S dalgaları — küre)
  for (let i = 0; i < 3; i++) {
    const wave = new THREE.Mesh(
      new THREE.SphereGeometry(0.6, 16, 12),
      new THREE.MeshStandardMaterial({
        color: 0xFF6F00, emissive: 0xFF6F00, emissiveIntensity: 0.5,
        transparent: true, opacity: 0.3, wireframe: true, toneMapped: false
      })
    );
    wave.position.set(0, -1.5, 0);
    wave.userData._isWaveSphere = true;
    wave.userData._phase = i / 3;
    grp.add(wave);
  }

  // Etiketler
  addLabel(new THREE.Vector3(-5, 1.5, 0), '🔺 EPİSANTR\n(yüzeydeki nokta)', 'warn', new THREE.Vector3(0, 0.15, 0), 1);
  addLabel(new THREE.Vector3(-5, -1.5, 0), '🔻 HİPOSANTR\n(kırılmanın merkezi)', 'phloem', new THREE.Vector3(0, -1.5, 0), 1);
  addLabel(new THREE.Vector3(5, 2, 0), '🌊 Sismik Dalgalar\n(P, S, yüzey)', 'epi', new THREE.Vector3(1.5, 0.1, 0), 4);
  addLabel(new THREE.Vector3(5, -2.5, 0), '💥 Fay hattı\n(kırılma yüzeyi)', '', new THREE.Vector3(0.5, -1, 0), 2);
  addLabel(new THREE.Vector3(-5, -3.2, 0), 'Manto', '', new THREE.Vector3(-4, -2.5, 0));

  // Başlık
  addLabel(new THREE.Vector3(0, 5.5, 0), '🔴 DEPREMLER — Hiposantr/Episantr/Dalgalar', 'warn', new THREE.Vector3(0, 5.5, 0));
  addLabel(new THREE.Vector3(0, -4, 0), 'En büyük: Şili 1960 (9.5) — Sumatra 2004, Japonya 2011', '', new THREE.Vector3(0, -4, 0), 3);

  scene.add(grp);
  markDynamic(grp);

  window._customAnim = (t, dt) => {
    grp.traverse(o => {
      if (o.userData._isAtmDust) {
        const pos = o.geometry.attributes.position;
        for (let i = 0; i < pos.count; i++) {
          const x = pos.getX(i), z = pos.getZ(i);
          const angle = Math.atan2(z + 2, x) + dt * 0.04;
          const r = Math.sqrt(x*x + (z+2)*(z+2));
          pos.setX(i, Math.cos(angle) * r);
          pos.setZ(i, Math.sin(angle) * r - 2);
        }
        pos.needsUpdate = true;
      }
      // Hiposantr pulse
      if (o.userData._isHipo) {
        o.material.emissiveIntensity = 1.2 + Math.abs(Math.sin(t * 5)) * 1.5;
        o.scale.setScalar(1 + Math.sin(t * 5) * 0.2);
      }
      if (o.userData._isEpi) {
        o.material.emissiveIntensity = 1.0 + Math.abs(Math.sin(t * 4)) * 0.8;
      }
      // Dalga halkaları yüzeyde yayılır
      if (o.userData._isQuakeRing) {
        const phase = ((t * 0.5) + o.userData._phase) % 1;
        const radius = 0.4 + phase * 4;
        o.scale.setScalar(radius / 0.45);
        o.material.opacity = Math.max(0, 0.85 - phase * 0.8);
      }
      // Küresel dalgalar (içeride)
      if (o.userData._isWaveSphere) {
        const phase = ((t * 0.3) + o.userData._phase) % 1;
        const rad = 0.3 + phase * 3.5;
        o.scale.setScalar(rad / 0.6);
        o.material.opacity = Math.max(0, 0.3 - phase * 0.3);
      }
    });
    hipoLight.intensity = 2.0 + Math.abs(Math.sin(t * 5)) * 1.5;
  };
};

// =============== Modül dropdown'ı doldur ===============
function buildModuleDropdown() {
  const list = document.getElementById('moduleList');
  if (!list) return; // ölü kod koruması (UI'de modül butonu yok)
  list.innerHTML = '';
  const emojis = ['🔬','⊙','🍃','💧'];
  
  Object.keys(MODULES).forEach(modNum => {
    const mod = MODULES[modNum];
    const btn = document.createElement('button');
    btn.className = 'dropdown-item';
    if (parseInt(modNum) === currentModule) btn.classList.add('active');
    btn.dataset.module = modNum;
    
    const modName = 'Modül ' + modNum;
    const cleanTitle = mod.title.replace(/^[^\s]+\s+Modül\s+\d+:\s*/, '');
    
    btn.innerHTML = '<span class="di-emoji">' + emojis[parseInt(modNum)-1] + '</span>' +
                    '<span><b>' + modName + '</b><br><small style="opacity:0.7;font-size:10.5px;">' + cleanTitle + '</small></span>';

      buildTopicDropdown(); // konu listesi de güncellensin

}

      const name = labelMatch ? labelMatch[2] : sub.label;
      
      btn.innerHTML = '<span class="di-emoji">' + emoji + '</span>' +
                      '<span>' + name + '</span>';
      btn.onclick = () => {
        selectSub(parseInt(modNum), sub.key);
        document.getElementById('panelTopic').classList.remove('show');
      };
      list.appendChild(btn);
    });
  });
}

function selectModule(modNum) {
  currentModule = modNum;
  const mod = MODULES[modNum];
  if (!mod) return;
  
  // İlk alt konuyu yükle
  selectSub(modNum, mod.subs[0].key);
}

function selectSub(modNum, subKey) {
  currentSub = subKey;
  currentModule = modNum;
  clearScene();
  
  // Animasyon state sıfırla (yeni konu)
  autoSpin = false;
  window._autoSpinActive = false;
  window._isPlayingActive = false;
  window._customAnim = null;
  if (typeof isPlaying !== 'undefined') {
    isPlaying = false;
    if (_playTickId) { cancelAnimationFrame(_playTickId); _playTickId = null; }
  }
  const sBtn = document.getElementById('spinBtn');
  const aBtn = document.getElementById('animBtn');
  if (sBtn) sBtn.classList.remove('active');
  if (aBtn) aBtn.classList.remove('active');
  
  // Bilgi panelini yeniden göster (kapatılmış olabilir)
  document.getElementById('bottomPanel').classList.remove('hidden');
  
  // Slider sadece Modül 4'te
  if (modNum !== 4) {
    document.getElementById('bottomControl').classList.remove('show');
  }
  
  // 3D yapıyı kur
  const mod = MODULES[modNum];
  const sub = mod.subs.find(s => s.key === subKey);
  if (sub && SubBuilders[sub.builder]) {
    SubBuilders[sub.builder]();
  }
  
  // 3D modeli ekranda yukarı kaydır (kamera ve target'ı aynı miktar aşağı çek)
  // → kamera-model mesafesi/açısı korunur, sahne ekranda yukarı görünür
  const Y_OFFSET = 2.5;
  controls.target.y -= Y_OFFSET;
  camera.position.y -= Y_OFFSET;
  controls._syncFromCamera();
  
  // Bilgi paneli güncelle (maddeler halinde liste)
  const info = INFO_DATA[subKey];
  if (info) {
    const emojiMatch = info.title.match(/^([^\s]+)\s+(.+)$/);
    const emoji = emojiMatch ? emojiMatch[1] : '🌋';
    const title = emojiMatch ? emojiMatch[2] : info.title;
    
    // Modül adı: "🔬 Modül 1: Bitkisel Dokular" → "Bitkisel Dokular"
    const modRawTitle = MODULES[modNum] ? MODULES[modNum].title : '';
    const modName = modRawTitle.replace(/^[^\s]+\s+Modül\s+\d+:\s*/, '').trim() || '';
    const fullTitle = modName ? (modName + ' / ' + title) : title;
    
    document.getElementById('infoEmoji').textContent = emoji;
    document.getElementById('infoTitle').textContent = fullTitle;
    
    // HTML içeriğini parse et ve maddeler halinde göster
    const tmp = document.createElement('div');
    // Seviyeye göre içerik (fallback olarak lise)
    const htmlContent = info[currentLevel] || info.lise || info.html || '';
    tmp.innerHTML = htmlContent;
    
    const listEl = document.getElementById('infoList');
    listEl.innerHTML = '';
    
    if (currentMode === 'sade') {
      // ============ SADE MOD ============
      // Sadece özet paragraf + ilk listenin ilk 3 maddesi (başlık yok)
      
      // İlk paragraf - özet
      const firstP = tmp.querySelector('p');
      if (firstP) {
        const summary = document.createElement('li');
        summary.innerHTML = firstP.innerHTML;
        listEl.appendChild(summary);
      }
      
      // Sadece İLK ul'in İLK 3 li'si
      const firstUl = tmp.querySelector('ul');
      if (firstUl) {
        const liElements = Array.from(firstUl.children).filter(c => c.tagName === 'LI');
        liElements.slice(0, 3).forEach(liEl => {
          const li = document.createElement('li');
          // İç ul varsa (nested) onları gösterme - sadece düz metin
          const clean = liEl.cloneNode(true);
          clean.querySelectorAll('ul').forEach(n => n.remove());
          li.innerHTML = clean.innerHTML.trim();
          listEl.appendChild(li);
        });
      }
    } else {
      // ============ DETAYLI MOD (mevcut) ============
      
      // İlk paragraf - özet
      const firstP = tmp.querySelector('p');
      if (firstP) {
        const summary = document.createElement('li');
        summary.innerHTML = firstP.innerHTML;
        listEl.appendChild(summary);
      }
      
      // H3 başlıklar ve sonraki ul'ler
      tmp.querySelectorAll('h3, ul').forEach(el => {
        if (el.tagName === 'H3') {
          const sub = document.createElement('li');
          sub.className = 'subhead';
          sub.textContent = el.textContent;
          listEl.appendChild(sub);
        } else if (el.tagName === 'UL') {
          el.querySelectorAll('li').forEach(liEl => {
            const li = document.createElement('li');
            li.innerHTML = liEl.innerHTML;
            listEl.appendChild(li);
          });
        }
      });
    }
  }
  
  // SADE MODDA: 3D etiketlerin yarısını gizle (her 2.'sini gösterir)
  setTimeout(() => {
    if (window._labelRefs && window._labelRefs.length > 0) {
      const labelsActuallyOn = labelsOn !== false;
      window._labelRefs.forEach((ref, i) => {
        if (!ref.div) return;
        if (!labelsActuallyOn) {
          ref.div.style.display = 'none';
          ref.div.dataset.userHidden = '1';
          return;
        }
        // Sade: sadece her ikinci etiketi göster (yarıya indir)
        // Detaylı: hepsini göster
        if (currentMode === 'sade' && i % 2 === 1) {
          ref.div.style.display = 'none';
          ref.div.dataset.userHidden = '1';
        } else {
          ref.div.style.display = 'block';
          ref.div.dataset.userHidden = '0';
        }
      });
    }
  }, 50);
  
  // Dropdown'ları güncelle (active state)
  buildTopicDropdown();
}

// =============== ⚖️ KARŞILAŞTIRMA ===============
let _compareIdx = 0;

// Seviyeye göre versiyon anahtarını belirle (4 ayrı seviye)
function _getLevelKey(level) {
  if (level === 'ilkokul' || level === 'ortaokul') return 'basit';
  return 'standart'; // lise, tyt_ayt
}

// COMPARE_DATA veya TABLE_DATA'dan seviyeye uygun datayı çek
// 4 ayrı seviye: ilkokul (1), ortaokul (2), lise (3), tyt_ayt (4)
// Tablo sayıları seviyeye göre artar
function _resolveLevelData(dataset, subKey) {
  const all = dataset[subKey];
  if (!all) return null;
  
  const levelMap = { ilkokul: 1, ortaokul: 2, lise: 3, tyt_ayt: 4 };
  const curr = levelMap[currentLevel] || 3;
  
  // Yeni format: seviye keyleri var ({basit: [...], standart: [...]})
  if (all.basit !== undefined || all.standart !== undefined) {
    // basit ve standart array'lerini birleştir
    const basit = Array.isArray(all.basit) ? all.basit : (all.basit ? [all.basit] : []);
    const standart = Array.isArray(all.standart) ? all.standart : (all.standart ? [all.standart] : []);
    const combined = [...basit, ...standart];
    
    if (combined.length === 0) return null;
    
    // Seviyeye göre tablo sayısı:
    // ilkokul: en basit 1 tablo
    // ortaokul: 2 tablo (basit + 1 detay)
    // lise: son hariç hepsi (en gelişmiş hariç)
    // tyt_ayt: hepsi
    if (curr === 1) {
      // İlkokul: 1 tablo, en basit (basit array varsa ondan, yoksa standart[0])
      return basit.length > 0 ? [basit[0]] : combined.slice(0, 1);
    }
    if (curr === 2) {
      // Ortaokul: 2 tablo (basit + standart'ın ilki)
      return combined.slice(0, Math.min(2, combined.length));
    }
    if (curr === 3) {
      // Lise: son tablo hariç hepsi (en azından 3 tablo veya combined - 1)
      if (combined.length <= 3) return combined;
      return combined.slice(0, combined.length - 1);
    }
    // tyt_ayt: hepsini göster
    return combined;
  }
  
  // Eski format: doğrudan array veya obje
  return all;
}

function renderTableHTML(data) {
  let html = '<table class="cmp-table"><thead><tr>';
  data.headers.forEach(h => html += `<th>${h}</th>`);
  html += '</tr></thead><tbody>';
  data.rows.forEach(row => {
    html += '<tr>';
    row.forEach(cell => html += `<td>${cell}</td>`);
    html += '</tr>';
  });
  html += '</tbody></table>';
  return html;
}

function renderCompareTable() {
  const raw = _resolveLevelData(COMPARE_DATA, currentSub);
  const body = document.getElementById('compareBody');
  const titleEl = document.getElementById('compareTitle');
  const nav = document.getElementById('compareNav');
  
  if (!raw) {
    titleEl.textContent = '⚖️ Karşılaştırma';
    body.innerHTML = '<div class="cmp-no-data">Bu konu için karşılaştırma verisi yok.</div>';
    nav.classList.add('hidden');
    return;
  }
  
  const list = Array.isArray(raw) ? raw : [raw];
  if (_compareIdx >= list.length) _compareIdx = 0;
  const data = list[_compareIdx];
  
  titleEl.textContent = data.title;
  body.innerHTML = renderTableHTML(data);
  
  if (list.length > 1) {
    nav.classList.remove('hidden');
    document.getElementById('compareCounter').textContent = `${_compareIdx + 1} / ${list.length}`;
    document.getElementById('comparePrev').disabled = _compareIdx === 0;
    document.getElementById('compareNext').disabled = _compareIdx === list.length - 1;
  } else {
    nav.classList.add('hidden');
  }
}

  _compareIdx = 0;

  document.getElementById('compareOverlay').classList.add('show');

document.getElementById('compareClose').onclick = () => {

};

// =============== Önceki / Sonraki ===============
function navigate(dir) {
  // TÜM konuları tek liste yap
  const allSubs = [];
  Object.keys(MODULES).forEach(modNum => {
    MODULES[modNum].subs.forEach(s => allSubs.push({ modNum: parseInt(modNum), sub: s }));
  });
  
  const idx = allSubs.findIndex(x => x.sub.key === currentSub);
  let newIdx = idx + dir;
  if (newIdx < 0) newIdx = allSubs.length - 1;
  if (newIdx >= allSubs.length) newIdx = 0;
  
  const next = allSubs[newIdx];
  if (next.modNum !== currentModule) {
    selectModule(next.modNum);
  }
  selectSub(next.modNum, next.sub.key);
}

// Modül 4'te ayrıca slider otomatik salınımı yapar
let isPlaying = false;
let _playTickId = null;
let _playT = 0;

document.getElementById('animBtn').onclick = function() {
  isPlaying = !isPlaying;
  window._isPlayingActive = isPlaying;
  this.classList.toggle('active', isPlaying);
  
  if (isPlaying) {
    // Modül 4'te slider'ı otomatik salla (turgor 0↔100 sinüsoidal)
    if (currentModule === 4) {
      _playT = 0;
      const tick = () => {
        if (!isPlaying) return;
        _playT += 0.015;
        const val = Math.round(50 + 49 * Math.sin(_playT));
        const slider = document.getElementById('turgorSlider');
        if (slider) {
          slider.value = val;
          slider.dispatchEvent(new Event('input'));
        }
        _playTickId = requestAnimationFrame(tick);
      };
      tick();
    }
  } else {
    if (_playTickId) {
      cancelAnimationFrame(_playTickId);
      _playTickId = null;
    }
  }
};
