  );
  baseDisk.rotation.x = -Math.PI/2;
  baseDisk.position.y = -0.15;
  grp.add(baseDisk);

  scene.add(grp);

  addLabel(new THREE.Vector3(0, 0.5, 0), 'ÖZ (Pith)', 'epi', new THREE.Vector3(0, 0.1, 0));
  addLabel(new THREE.Vector3(1.7, 0.4, 0), 'Ksilem (Halka)', 'xylem', new THREE.Vector3(1.6, 0.2, 0));
  addLabel(new THREE.Vector3(0, 0.4, 1.7), 'Floem (Halka)', 'phloem', new THREE.Vector3(0, 0.2, 1.6));
  addLabel(new THREE.Vector3(2.5, 0.15, 0), 'Endodermis', 'endo', new THREE.Vector3(2.33, 0.1, 0));
  addLabel(new THREE.Vector3(-3.0, 0.1, 0), 'Korteks', '', new THREE.Vector3(-3.0, 0, 0));
  addLabel(new THREE.Vector3(0, 0.1, -4.0), 'Epidermis', 'epi', new THREE.Vector3(0, 0, -3.8));
  addLabel(new THREE.Vector3(4.5, 1.5, 4.5), 'MONOKOT KÖK (Öz VAR)', 'epi', new THREE.Vector3(0, 0, 0));

  grp.userData.spin = 0.08;
  dynamicObjects.push(grp);

  // ▶️ Çalıştır: SU dıştan içeri emilir, halkada birikir
  const _kokMono_drops = [];
  for (let i = 0; i < 8; i++) {
    const drop = new THREE.Mesh(
      new THREE.SphereGeometry(0.13, 10, 8),
      new THREE.MeshStandardMaterial({ color: 0x60c0ff, emissive: 0x60c0ff, emissiveIntensity: 1.0, transparent: true, opacity: 0.85 })
    );
    drop.userData._angle = (i / 8) * Math.PI * 2;
    drop.userData._phase = i * 0.4;
    grp.add(drop);
    _kokMono_drops.push(drop);
  }

  window._customAnim = (t, dt) => {
    _kokMono_drops.forEach((d, i) => {
      const cycle = ((t * 0.7 + d.userData._phase) % 2.5) / 2.5;
      // Dışarıdan (r=3.85) ksilem halkasına (r=1.6) doğru
      const r = 3.85 - cycle * 2.25;
      d.position.x = Math.cos(d.userData._angle) * r;
      d.position.z = Math.sin(d.userData._angle) * r;
      d.position.y = 0.5;
      d.material.opacity = 0.4 + (1 - cycle) * 0.5;
    });
  };
};

SubBuilders.buildGovdeDikot = function() {
  camera.position.set(0, 12, 8);
  controls.target.set(0, 0, 0);

  const grp = new THREE.Group();
  markDynamic(grp);

  // 1. KÜTİKULA (en dış parlak ince halka)
  const kutik = makeRing(3.85, 3.95, 0xfff080, { emissive: 0.7, metalness: 0.4 });
  kutik.position.y = 0.05;
  grp.add(kutik);

  // 2. EPİDERMİS
  const epi = makeRing(3.65, 3.85, COLORS.epidermisAlt, { emissive: 0.3 });
  grp.add(epi);

  // 3. KORTEKS
  const kor = makeRing(2.7, 3.65, COLORS.korteks, { emissive: 0.1 });
  kor.position.y = -0.02;
  grp.add(kor);

  // Korteks köşelerinde KOLLENKİMA noktalar (5 yer)
  for (let i = 0; i < 5; i++) {
    const a = (i / 5) * Math.PI * 2;
    const kol = new THREE.Mesh(
      new THREE.SphereGeometry(0.2, 12, 10),
      new THREE.MeshStandardMaterial({
        color: COLORS.kollenkima, emissive: COLORS.kollenkima, emissiveIntensity: 0.4
      })
    );
    kol.position.set(Math.cos(a) * 3.3, 0.1, Math.sin(a) * 3.3);
    grp.add(kol);
  }

  // 4. ÖZ (merkez parankima)
  const oz = new THREE.Mesh(
    new THREE.CircleGeometry(1.0, 32),
    new THREE.MeshStandardMaterial({
      color: COLORS.ozHucre, side: THREE.DoubleSide,
      emissive: COLORS.ozHucre, emissiveIntensity: 0.3
    })
  );
  oz.rotation.x = -Math.PI/2;
  oz.position.y = 0.05;
  grp.add(oz);

  // 5. İLETİM DEMETLERİ - HALKA ŞEKLİNDE 7 demet
  const nDemet = 7;
  for (let i = 0; i < nDemet; i++) {
    const a = (i / nDemet) * Math.PI * 2;
    const r = 1.75;

    // Demet konumu
    const cx = Math.cos(a) * r;
    const cz = Math.sin(a) * r;

    // FLOEM (dışta - kırmızı kümeleri (çiçeklilerde bazen mavi/yeşil))
    const fl = new THREE.Mesh(
      new THREE.SphereGeometry(0.25, 14, 10),
      new THREE.MeshStandardMaterial({
        color: COLORS.floem, emissive: COLORS.floem, emissiveIntensity: 0.5
      })
    );
    fl.position.set(cx * 1.18, 0.25, cz * 1.18);
    fl.scale.set(1.2, 0.6, 1.2);
    grp.add(fl);

    // KAMBİYUM (orta - sarı parlak halka noktası)
    const ka = new THREE.Mesh(
      new THREE.SphereGeometry(0.07, 10, 8),
      new THREE.MeshStandardMaterial({
        color: COLORS.kambiyum, emissive: COLORS.kambiyum, emissiveIntensity: 1.2
      })
    );
    ka.position.set(cx, 0.3, cz);
    grp.add(ka);

    // KSİLEM (içte)
    const xy = new THREE.Mesh(
      new THREE.SphereGeometry(0.3, 14, 10),
      new THREE.MeshStandardMaterial({
        color: COLORS.ksilem, emissive: COLORS.ksilem, emissiveIntensity: 0.5
      })
    );
    xy.position.set(cx * 0.78, 0.25, cz * 0.78);
    xy.scale.set(1.2, 0.6, 1.2);
    grp.add(xy);
  }

  // KAMBİYUM HALKASI (parlak sarı sürekli halka)
  const kambRing = new THREE.Mesh(
    new THREE.TorusGeometry(1.75, 0.04, 8, 80),
    new THREE.MeshStandardMaterial({
      color: COLORS.kambiyum, emissive: COLORS.kambiyum, emissiveIntensity: 1.0,
      transparent: true, opacity: 0.9
    })
  );
  kambRing.position.y = 0.32;
  kambRing.rotation.x = Math.PI/2;
  grp.add(kambRing);

  // Zemin
  const baseDisk = new THREE.Mesh(
    new THREE.CircleGeometry(4.5, 60),
    new THREE.MeshStandardMaterial({ color: 0x1a2a25 })
  );
  baseDisk.rotation.x = -Math.PI/2;
  baseDisk.position.y = -0.15;
  grp.add(baseDisk);

  scene.add(grp);

  addLabel(new THREE.Vector3(0, 0.5, 0), 'ÖZ (Parankima)', 'epi', new THREE.Vector3(0, 0.1, 0));
  addLabel(new THREE.Vector3(1.4, 0.6, 0), 'KSİLEM (İçte)', 'xylem', new THREE.Vector3(1.37, 0.25, 0));
  addLabel(new THREE.Vector3(2.1, 0.7, 0), 'FLOEM (Dışta)', 'phloem', new THREE.Vector3(2.07, 0.25, 0));
  addLabel(new THREE.Vector3(1.75, 0.9, 1.75), 'KAMBİYUM (Halka)', '', new THREE.Vector3(1.24, 0.32, 1.24));
  addLabel(new THREE.Vector3(3.3, 0.3, 0), 'Kollenkima', '', new THREE.Vector3(3.3, 0.1, 0));
  addLabel(new THREE.Vector3(-3.5, 0.1, 0), 'Korteks', '', new THREE.Vector3(-3.1, 0, 0));
  addLabel(new THREE.Vector3(0, 0.4, -4.2), 'Kütikula + Epidermis', 'epi', new THREE.Vector3(0, 0.05, -3.85));
  addLabel(new THREE.Vector3(4.0, 1.5, 4.0), 'DİKOT GÖVDE (Halka Demetler)', 'epi', new THREE.Vector3(0, 0, 0));

  grp.userData.spin = 0.08;
  dynamicObjects.push(grp);

  // ▶️ Çalıştır: KSILEM içte su yukarı + FLOEM dışta şeker aşağı (halka demetler)
  // Demet halkası r=1.75; demetlerde ksilem içte (1.4), floem dışta (2.1)
  const _govdeDikot_particles = [];
  for (let i = 0; i < 12; i++) {
    const isXylem = i < 6;
    const p = new THREE.Mesh(
      new THREE.SphereGeometry(0.1, 8, 6),
      new THREE.MeshStandardMaterial({
        color: isXylem ? 0x60c0ff : 0xfff04a,
        emissive: isXylem ? 0x60c0ff : 0xfff04a, emissiveIntensity: 1.0
      })
    );
    p.userData._angle = (i % 6) / 6 * Math.PI * 2;
    p.userData._isXylem = isXylem;
    p.userData._phase = i * 0.3;
    grp.add(p);
    _govdeDikot_particles.push(p);
  }

  window._customAnim = (t, dt) => {
    _govdeDikot_particles.forEach((p, i) => {
      const r = p.userData._isXylem ? 1.4 : 2.1;
      const cycle = (t * 1.5 + p.userData._phase) % 4;
      // y'yi 0-1 arasında bob et (görünür akış)
      p.position.x = Math.cos(p.userData._angle) * r;
      p.position.z = Math.sin(p.userData._angle) * r;
      p.position.y = 0.5 + Math.sin(t * 2 + p.userData._phase) * 0.3;
      p.material.emissiveIntensity = 0.7 + Math.abs(Math.sin(t * 3 + i)) * 0.4;
    });
  };
};

SubBuilders.buildGovdeMonokot = function() {
  camera.position.set(0, 12, 8);
  controls.target.set(0, 0, 0);

  const grp = new THREE.Group();
  markDynamic(grp);

  // 1. KÜTİKULA + EPİDERMİS
  const kutik = makeRing(3.85, 3.95, 0xfff080, { emissive: 0.7, metalness: 0.4 });
  kutik.position.y = 0.05;
  grp.add(kutik);
  const epi = makeRing(3.65, 3.85, COLORS.epidermisAlt, { emissive: 0.3 });
  grp.add(epi);

  // 2. PARANKİMA dolgusu (tüm iç)
  const parankFill = new THREE.Mesh(
    new THREE.CircleGeometry(3.65, 60),
    new THREE.MeshStandardMaterial({
      color: COLORS.parankima, side: THREE.DoubleSide,
      emissive: 0x4a8a4a, emissiveIntensity: 0.15
    })
  );
  parankFill.rotation.x = -Math.PI/2;
  parankFill.position.y = -0.03;
  grp.add(parankFill);

  // 3. DAĞINIK İLETİM DEMETLERİ
  // Her demet "insan yüzü" şeklinde: üstte 1 floem, altta 2 ksilem (göz gibi)
  const demetPositions = [
    {r: 0, a: 0}, // merkez
    {r: 1.0, a: 0}, {r: 1.0, a: 1.05}, {r: 1.0, a: 2.1}, {r: 1.0, a: 3.14},
    {r: 1.0, a: 4.19}, {r: 1.0, a: 5.24},
    {r: 2.0, a: 0.4}, {r: 2.0, a: 1.2}, {r: 2.0, a: 2.0}, {r: 2.0, a: 2.8},
    {r: 2.0, a: 3.6}, {r: 2.0, a: 4.4}, {r: 2.0, a: 5.2}, {r: 2.0, a: 6.0},
    {r: 2.85, a: 0.2}, {r: 2.85, a: 0.7}, {r: 2.85, a: 1.3}, {r: 2.85, a: 1.85},
    {r: 2.85, a: 2.5}, {r: 2.85, a: 3.0}, {r: 2.85, a: 3.6}, {r: 2.85, a: 4.2},
    {r: 2.85, a: 4.8}, {r: 2.85, a: 5.4}, {r: 2.85, a: 5.95}
  ];

  demetPositions.forEach(p => {
    const cx = Math.cos(p.a) * p.r;
    const cz = Math.sin(p.a) * p.r;

    // Demet sklerenkima kılıfı (yeşil-koyu)
    const kilif = new THREE.Mesh(
      new THREE.CircleGeometry(0.3, 18),
      new THREE.MeshStandardMaterial({
        color: 0x3a6a3a, side: THREE.DoubleSide,
        emissive: 0x3a6a3a, emissiveIntensity: 0.5
      })
    );
    kilif.rotation.x = -Math.PI/2;
    kilif.position.set(cx, 0.15, cz);
    grp.add(kilif);

    // FLOEM (üstte - kırmızı/mavi tek nokta)
    const fl = new THREE.Mesh(
      new THREE.SphereGeometry(0.1, 12, 8),
      new THREE.MeshStandardMaterial({
        color: COLORS.floem, emissive: COLORS.floem, emissiveIntensity: 0.7
      })
    );
    fl.position.set(cx, 0.2, cz - 0.13);
    grp.add(fl);

    // KSİLEM (altta 2 nokta - göz gibi)
    for (let j = 0; j < 2; j++) {
      const xy = new THREE.Mesh(
        new THREE.SphereGeometry(0.08, 12, 8),
        new THREE.MeshStandardMaterial({
          color: COLORS.ksilem, emissive: COLORS.ksilem, emissiveIntensity: 0.7
        })
      );
      xy.position.set(cx + (j - 0.5) * 0.18, 0.22, cz + 0.06);
      grp.add(xy);
    }

    // 3. nokta (alt orta)
    const xy3 = new THREE.Mesh(
      new THREE.SphereGeometry(0.07, 10, 8),
      new THREE.MeshStandardMaterial({
        color: COLORS.ksilem, emissive: COLORS.ksilem, emissiveIntensity: 0.7
      })
    );
    xy3.position.set(cx, 0.22, cz + 0.15);
    grp.add(xy3);
  });

  // KAMBİYUM YOK! Bunu vurgulayalım - kırmızı X işareti merkezde küçük
  const noXamb = new THREE.Group();
  for (let i = 0; i < 2; i++) {
    const line = new THREE.Mesh(
      new THREE.CylinderGeometry(0.03, 0.03, 0.4, 6),
      new THREE.MeshBasicMaterial({ color: 0xff4040 })
    );
    line.rotation.z = i === 0 ? Math.PI/4 : -Math.PI/4;
    noXamb.add(line);
  }
  noXamb.position.set(0, 0.6, 0);
  grp.add(noXamb);

  // Zemin
  const baseDisk = new THREE.Mesh(
    new THREE.CircleGeometry(4.5, 60),
    new THREE.MeshStandardMaterial({ color: 0x1a2a25 })
  );
  baseDisk.rotation.x = -Math.PI/2;
  baseDisk.position.y = -0.15;
  grp.add(baseDisk);

  scene.add(grp);

  addLabel(new THREE.Vector3(0, 1.0, 0), 'KAMBİYUM YOK!', 'warn', new THREE.Vector3(0, 0.6, 0));
  addLabel(new THREE.Vector3(2.0, 0.5, 0), 'Demet (Üstte Floem)', 'phloem', new THREE.Vector3(2.0, 0.2, -0.13));
  addLabel(new THREE.Vector3(2.0, 0.5, 0.5), 'Altta 2-3 Ksilem (Göz)', 'xylem', new THREE.Vector3(2.0, 0.22, 0.12));
  addLabel(new THREE.Vector3(-2.8, 0.1, 0), 'Parankima Dolgu', '', new THREE.Vector3(-2.8, 0, 0));
  addLabel(new THREE.Vector3(0, 0.1, -4.2), 'Kütikula + Epidermis', 'epi', new THREE.Vector3(0, 0.05, -3.85));
  addLabel(new THREE.Vector3(4.0, 1.5, 4.0), 'MONOKOT GÖVDE (Dağınık Demetler)', 'epi', new THREE.Vector3(0, 0, 0));

  grp.userData.spin = 0.06;
  dynamicObjects.push(grp);

  // ▶️ Çalıştır: Dağınık demetlerin her biri DUR-GEÇ pulse + "KAMBİYUM YOK" yanıp söner
  const _govdeMono_xCross = noXamb;  // Yukarıda tanımlandı
  window._customAnim = (t, dt) => {
    // X işareti büyür-küçülür + parlar
    if (_govdeMono_xCross) {
      const s = 1 + Math.abs(Math.sin(t * 2)) * 0.4;
      _govdeMono_xCross.scale.setScalar(s);
      _govdeMono_xCross.children.forEach(line => {
        if (line.material) {
          const intensity = Math.abs(Math.sin(t * 2));
          line.material.color.setRGB(1, 0.2 + intensity*0.3, 0.2 + intensity*0.3);
        }
      });
    }
    // Tüm grup hafif scale pulse
    grp.scale.setScalar(1 + Math.sin(t * 1.5) * 0.02);
  };
};

SubBuilders.buildIkincilBuyume = function() {
  camera.position.set(0, 12, 8);
  controls.target.set(0, 0, 0);

  const grp = new THREE.Group();
  markDynamic(grp);

  // Yıllık halkalar - merkezden dışa
  const ringCount = 8;

  // ÖZ ODUNU (merkez - en koyu, ölü ksilem)
  const ozOdun = new THREE.Mesh(
    new THREE.CircleGeometry(0.45, 32),
    new THREE.MeshStandardMaterial({
      color: 0x5a2c1c, side: THREE.DoubleSide,
      emissive: 0x3a1c0c, emissiveIntensity: 0.3,
      roughness: 0.7
    })
  );
  ozOdun.rotation.x = -Math.PI/2;
  ozOdun.position.y = 0.05;
  grp.add(ozOdun);

  // YILLIK HALKALAR - her yıl bahar + yaz odunu
  for (let i = 0; i < ringCount; i++) {
    const innerR = 0.45 + i * 0.25;
    const midR = innerR + 0.18;
    const outerR = innerR + 0.25;

    // BAHAR ODUNU (geniş çaplı, açık renk tüpler)
    const spring = new THREE.Mesh(
      new THREE.RingGeometry(innerR, midR, 60),
      new THREE.MeshStandardMaterial({
        color: 0xd4a070, side: THREE.DoubleSide,
        emissive: 0xb47050, emissiveIntensity: 0.3,
        roughness: 0.5
      })
    );
    spring.rotation.x = -Math.PI/2;
    spring.position.y = 0.06 + i * 0.005;
    grp.add(spring);

    // İlkbahar odununda geniş trake noktaları
    const traeCount = 60 + i * 8;
    for (let j = 0; j < traeCount; j++) {
      const a = (j / traeCount) * Math.PI * 2;
      const r = innerR + 0.09;
      const trake = new THREE.Mesh(
        new THREE.SphereGeometry(0.04, 6, 4),
        new THREE.MeshStandardMaterial({
          color: 0x2a1408, emissive: 0x1a0804, emissiveIntensity: 0.5
        })
      );
      trake.position.set(Math.cos(a) * r, 0.1, Math.sin(a) * r);
      grp.add(trake);
    }

    // YAZ/SONBAHAR ODUNU (dar çaplı, koyu renk tüpler)
    const fall = new THREE.Mesh(
      new THREE.RingGeometry(midR, outerR, 60),
      new THREE.MeshStandardMaterial({
        color: 0x6b3018, side: THREE.DoubleSide,
        emissive: 0x4a1c08, emissiveIntensity: 0.3,
        roughness: 0.6
      })
    );
    fall.rotation.x = -Math.PI/2;
    fall.position.y = 0.07 + i * 0.005;
    grp.add(fall);

    // Sonbahar odununda dar trake noktaları
    const fallCount = 30 + i * 4;
    for (let j = 0; j < fallCount; j++) {
      const a = (j / fallCount) * Math.PI * 2 + 0.3;
      const r = midR + 0.04;
      const trake = new THREE.Mesh(
        new THREE.SphereGeometry(0.02, 6, 4),
        new THREE.MeshStandardMaterial({
          color: 0x1a0804, emissive: 0x0a0402, emissiveIntensity: 0.3
        })
      );
      trake.position.set(Math.cos(a) * r, 0.1, Math.sin(a) * r);
      grp.add(trake);
    }
  }

  // KAMBİYUM (en dış parlak halka)
  const lastR = 0.45 + ringCount * 0.25;
  const kambiyum = new THREE.Mesh(
    new THREE.RingGeometry(lastR + 0.02, lastR + 0.12, 60),
    new THREE.MeshStandardMaterial({
      color: COLORS.kambiyum, side: THREE.DoubleSide,
      emissive: COLORS.kambiyum, emissiveIntensity: 1.0
    })
  );
  kambiyum.rotation.x = -Math.PI/2;
  kambiyum.position.y = 0.18;
  grp.add(kambiyum);

  // İKİNCİL FLOEM (kambiyumdan dışa - kırmızı/mavi)
  const sFloem = new THREE.Mesh(
    new THREE.RingGeometry(lastR + 0.14, lastR + 0.3, 60),
    new THREE.MeshStandardMaterial({
      color: COLORS.floem, side: THREE.DoubleSide,
      emissive: COLORS.floem, emissiveIntensity: 0.5
    })
  );
  sFloem.rotation.x = -Math.PI/2;
  sFloem.position.y = 0.15;
  grp.add(sFloem);

  // MANTAR KAMBİYUMU + KABUK (en dış kahverengi)
  const cork = new THREE.Mesh(
    new THREE.RingGeometry(lastR + 0.32, lastR + 0.55, 60),
    new THREE.MeshStandardMaterial({
      color: 0x4a2810, side: THREE.DoubleSide,
      emissive: 0x2a1408, emissiveIntensity: 0.3,
      roughness: 0.9
    })
  );
  cork.rotation.x = -Math.PI/2;
  cork.position.y = 0.16;
  grp.add(cork);

  // Kabuk çatlakları
  for (let i = 0; i < 16; i++) {
    const a = (i / 16) * Math.PI * 2;
    const crack = new THREE.Mesh(
      new THREE.BoxGeometry(0.04, 0.02, 0.18),
      new THREE.MeshBasicMaterial({ color: 0x000000 })
    );
    crack.position.set(Math.cos(a) * (lastR + 0.42), 0.18, Math.sin(a) * (lastR + 0.42));
    crack.rotation.y = -a;
    grp.add(crack);
  }

  scene.add(grp);

  addLabel(new THREE.Vector3(0, 0.5, 0), 'Öz Odunu (Ölü)', 'xylem', new THREE.Vector3(0, 0.1, 0));
  addLabel(new THREE.Vector3(1.5, 0.3, 0), 'İlkbahar Odunu (Geniş, Açık)', 'xylem', new THREE.Vector3(1.0, 0.1, 0));
  addLabel(new THREE.Vector3(0, 0.3, 1.5), 'Sonbahar Odunu (Dar, Koyu)', 'xylem', new THREE.Vector3(0, 0.1, 1.0));
  addLabel(new THREE.Vector3(lastR + 0.05, 0.4, lastR + 0.05), 'KAMBİYUM', '', new THREE.Vector3(lastR*0.7, 0.2, lastR*0.7));
  addLabel(new THREE.Vector3(0, 0.4, lastR + 0.3), 'İkincil Floem', 'phloem', new THREE.Vector3(0, 0.2, lastR + 0.22));
  addLabel(new THREE.Vector3(-lastR - 0.5, 0.3, 0), 'Kabuk (Mantar)', '', new THREE.Vector3(-(lastR + 0.42), 0.1, 0));
  addLabel(new THREE.Vector3(4.0, 1.5, 4.0), `YILLIK HALKALAR = Ağaç ${ringCount} yaşında`, 'epi', new THREE.Vector3(0, 0, 0));

  grp.userData.spin = 0.06;
  dynamicObjects.push(grp);

  // ▶️ Çalıştır: HALKALAR BÜYÜR (yıllık halka animasyonu) - tüm halkalar pulse
  window._customAnim = (t, dt) => {
    // Her halka çocuk meshi sırayla parlar (dıştan içe yayılır)
    grp.children.forEach((child, i) => {
      if (child.material && child.material.emissiveIntensity !== undefined) {
        const phase = t * 2 - i * 0.15;
        child.material.emissiveIntensity = 0.15 + Math.abs(Math.sin(phase)) * 0.5;
      }
    });
    // Hafif pulse scale
    grp.scale.setScalar(1 + Math.sin(t * 1.2) * 0.025);
  };
};

// ============== MODÜL 3: YAPRAK ANATOMİSİ ==============

SubBuilders.buildYaprakKesit = function() {
  camera.position.set(0, 2, 18);
  controls.target.set(0, 1, 0);

  const grp = new THREE.Group();
  markDynamic(grp);

  const width = 14;
  const layerDepth = 3;

  // === 1. ÜST KUTİKULA (şeffaf mumsu tabaka) ===
  const kutik = new THREE.Mesh(
    new THREE.BoxGeometry(width, 0.25, layerDepth),
    new THREE.MeshStandardMaterial({
      color: 0xfff4a0,
      transparent: true, opacity: 0.4,
      roughness: 0.1, metalness: 0.5,
      emissive: 0xfff080, emissiveIntensity: 0.5
    })
  );
  kutik.position.y = 5.5;
  grp.add(kutik);

  // === 2. ÜST EPİDERMİS (tek sıra, kloroplastsız, şeffaf) ===
  for (let i = 0; i < 10; i++) {
    const x = -width/2 + 0.7 + i * (width / 10);
    const cell = new THREE.Mesh(
      makeRoughCellGeometry(width / 10 - 0.05, 0.7, layerDepth - 0.1, 0.03, 6),
      new THREE.MeshStandardMaterial({
        color: 0xb0e8d8,
        transparent: true, opacity: 0.65,
        roughness: 0.2, metalness: 0.1,
        emissive: 0xa0d8c8, emissiveIntensity: 0.2
      })
    );
    cell.position.set(x, 4.8, 0);
    grp.add(cell);
  }

  // === 3. PALİZAT PARANKİMASI (silindirik, sıkı, BOL kloroplast) ===
  const palizatCount = 16;
  for (let i = 0; i < palizatCount; i++) {
    const x = -width/2 + 0.5 + i * (width / palizatCount);

    // Silindirik dikey hücre
    const cellGeo = new THREE.CylinderGeometry(0.4, 0.4, 2.0, 14, 4);
    // Hafif pürüzlü
    const pos = cellGeo.attributes.position;
    for (let k = 0; k < pos.count; k++) {
      pos.setXYZ(k,
        pos.getX(k) + (Math.random() - 0.5) * 0.025,
        pos.getY(k),
        pos.getZ(k) + (Math.random() - 0.5) * 0.025
      );
    }
    cellGeo.computeVertexNormals();

    const cell = new THREE.Mesh(cellGeo, new THREE.MeshStandardMaterial({
      color: 0x4a8a4a, transparent: true, opacity: 0.75,
      roughness: 0.5, emissive: 0x3a7a3a, emissiveIntensity: 0.2
    }));
    cell.position.set(x, 3.3, 0);
    grp.add(cell);

    // Bol kloroplast (her hücrede 8-12 tane)
    const chloroCount = 10;
    for (let c = 0; c < chloroCount; c++) {
      const angle = (c / chloroCount) * Math.PI * 2;
      const yOff = -0.8 + (c % 5) * 0.4;
      const chloro = new THREE.Mesh(
        new THREE.CapsuleGeometry(0.08, 0.12, 6, 10),
        new THREE.MeshStandardMaterial({
          color: COLORS.kloroplast, emissive: COLORS.kloroplast,
          emissiveIntensity: 0.7, roughness: 0.3
        })
      );
      chloro.position.set(
        x + Math.cos(angle) * 0.22,
        3.3 + yOff,
        Math.sin(angle) * 0.22
      );
      chloro.rotation.z = Math.random() * Math.PI;
      grp.add(chloro);
    }
  }

  // === 4. SÜNGER PARANKİMASI (düzensiz, BOŞLUKLU, az kloroplast) ===
  const sungerPositions = [];
  for (let row = 0; row < 2; row++) {
    for (let col = 0; col < 14; col++) {
      sungerPositions.push({
        x: -width/2 + 0.5 + col * (width / 14) + (row % 2) * 0.3,
        y: 1.5 - row * 0.7,
        z: (Math.random() - 0.5) * 1.5,
        size: 0.35 + Math.random() * 0.2
      });
    }
  }

  sungerPositions.forEach(p => {
    const cellGeo = new THREE.SphereGeometry(p.size, 14, 10);
    const pos = cellGeo.attributes.position;
    for (let k = 0; k < pos.count; k++) {
      const r = (Math.random() - 0.5) * 0.1;
      pos.setXYZ(k, pos.getX(k) + r, pos.getY(k) + r, pos.getZ(k) + r);
    }
    cellGeo.computeVertexNormals();

    const cell = new THREE.Mesh(cellGeo, new THREE.MeshStandardMaterial({
      color: 0x6aa86a, transparent: true, opacity: 0.7,
      roughness: 0.5, emissive: 0x4a884a, emissiveIntensity: 0.15
    }));
    cell.position.set(p.x, p.y, p.z);
    grp.add(cell);

    // Az kloroplast (2-3 tane)
    for (let c = 0; c < 3; c++) {
      const chloro = new THREE.Mesh(
        new THREE.CapsuleGeometry(0.06, 0.1, 6, 8),
        new THREE.MeshStandardMaterial({
          color: COLORS.kloroplast, emissive: COLORS.kloroplast,
          emissiveIntensity: 0.5
        })
      );
      chloro.position.set(
        p.x + (Math.random() - 0.5) * p.size,
        p.y + (Math.random() - 0.5) * p.size,
        p.z + (Math.random() - 0.5) * p.size
      );
      grp.add(chloro);
    }
  });

  // === 5. YAPRAK DAMARI (orta) ===
  // Ksilem üstte (kırmızı), Floem altta (mavi/yeşil)
  const damarGrp = new THREE.Group();

  // Ksilem (üst yarım daire)
  const ksilemDamar = new THREE.Mesh(
    new THREE.CylinderGeometry(0.45, 0.45, layerDepth * 0.9, 20, 1, false, 0, Math.PI),
    new THREE.MeshStandardMaterial({
      color: COLORS.ksilem, side: THREE.DoubleSide,
      emissive: COLORS.ksilem, emissiveIntensity: 0.5,
      roughness: 0.4
    })
  );
  ksilemDamar.rotation.x = Math.PI/2;
  ksilemDamar.position.y = 0.15;
  damarGrp.add(ksilemDamar);

  // Floem (alt yarım daire)
  const floemDamar = new THREE.Mesh(
    new THREE.CylinderGeometry(0.45, 0.45, layerDepth * 0.9, 20, 1, false, Math.PI, Math.PI),
    new THREE.MeshStandardMaterial({
      color: COLORS.floem, side: THREE.DoubleSide,
      emissive: COLORS.floem, emissiveIntensity: 0.5,
      roughness: 0.4
    })
  );
  floemDamar.rotation.x = Math.PI/2;
  floemDamar.position.y = 0.15;
  damarGrp.add(floemDamar);

  // Damar kılıfı (yeşil halka)
  const sheath = new THREE.Mesh(
    new THREE.TorusGeometry(0.5, 0.07, 8, 24),
    new THREE.MeshStandardMaterial({
      color: 0x60a060, emissive: 0x60a060, emissiveIntensity: 0.3
    })
  );
  sheath.position.y = 0.15;
  damarGrp.add(sheath);

  damarGrp.position.x = 0;
  grp.add(damarGrp);

  // === 6. ALT EPİDERMİS ===
  for (let i = 0; i < 14; i++) {
    const x = -width/2 + 0.5 + i * (width / 14);
    const cell = new THREE.Mesh(
      makeRoughCellGeometry(width / 14 - 0.05, 0.6, layerDepth - 0.1, 0.03, 6),
      new THREE.MeshStandardMaterial({
        color: 0xa8d8b8,
        transparent: true, opacity: 0.7,
        roughness: 0.2,
        emissive: 0x98c8a8, emissiveIntensity: 0.2
      })
    );
    cell.position.set(x, -0.85, 0);
    grp.add(cell);
  }

  // === STOMA YAPILARI alt epidermisin altında (3 tane) ===
  const stomaXs = [-4, 0, 4];
  stomaXs.forEach(sx => {
    // Bekçi hücreleri
    const bekciL = new THREE.Mesh(
      new THREE.TorusGeometry(0.3, 0.13, 12, 18, Math.PI),
      new THREE.MeshStandardMaterial({
        color: COLORS.bekciHucre, emissive: COLORS.bekciHucre, emissiveIntensity: 0.4,
        roughness: 0.4
      })
    );
    bekciL.position.set(sx - 0.15, -1.4, 0);
    bekciL.rotation.z = -Math.PI/2;
    grp.add(bekciL);

    const bekciR = new THREE.Mesh(
      new THREE.TorusGeometry(0.3, 0.13, 12, 18, Math.PI),
      new THREE.MeshStandardMaterial({
        color: COLORS.bekciHucre, emissive: COLORS.bekciHucre, emissiveIntensity: 0.4,
        roughness: 0.4
      })
    );
    bekciR.position.set(sx + 0.15, -1.4, 0);
    bekciR.rotation.z = Math.PI/2;
    grp.add(bekciR);

    // Stoma porları (siyah açıklık)
    const por = new THREE.Mesh(
      new THREE.SphereGeometry(0.12, 14, 10),
      new THREE.MeshBasicMaterial({ color: 0x000000 })
    );
    por.position.set(sx, -1.4, 0.05);
    por.scale.set(0.3, 1.0, 1.2);
    grp.add(por);

    // CO2 oku (içeri)
    const co2arrow = new THREE.Mesh(
      new THREE.ConeGeometry(0.08, 0.25, 8),
      new THREE.MeshStandardMaterial({
        color: 0x5fb8e8, emissive: 0x5fb8e8, emissiveIntensity: 0.8
      })
    );
    co2arrow.position.set(sx, -2.2, 0);
    grp.add(co2arrow);
  });

  // Hücre arası boşluklar (sünger içinde - hava nokları)
  for (let i = 0; i < 20; i++) {
    const air = new THREE.Mesh(
      new THREE.SphereGeometry(0.06, 8, 6),
      new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.3 })
    );
    air.position.set(
      -width/2 + Math.random() * width,
      0.5 + (Math.random() - 0.5) * 1.5,
      (Math.random() - 0.5) * 1.5
    );
    grp.add(air);
  }

  scene.add(grp);

  // Etiketler - solda dizilim (yanal). Yapı kenarına bağlanan anchorlar
  addLabel(new THREE.Vector3(-width/2 - 2, 5.5, 0), '1. Üst Kutikula', '', new THREE.Vector3(-width/2 + 0.5, 5.5, 0));
  addLabel(new THREE.Vector3(-width/2 - 2, 4.8, 0), '2. Üst Epidermis', 'epi', new THREE.Vector3(-width/2 + 0.5, 4.8, 0));
  addLabel(new THREE.Vector3(-width/2 - 2, 3.3, 0), '3. Palizat Parankiması', 'chloro', new THREE.Vector3(-width/2 + 0.5, 3.3, 0));
  addLabel(new THREE.Vector3(-width/2 - 2, 0.5, 0), '4. Sünger Parankiması', 'chloro', new THREE.Vector3(-width/2 + 0.5, 0.5, 0));
  addLabel(new THREE.Vector3(-width/2 - 2, -0.85, 0), '5. Alt Epidermis', 'epi', new THREE.Vector3(-width/2 + 0.5, -0.85, 0));
  addLabel(new THREE.Vector3(-width/2 - 2, -1.7, 0), '6. Stoma', '', new THREE.Vector3(-width/2 + 0.5, -1.4, 0));

  // Sağda detay etiketler
  addLabel(new THREE.Vector3(width/2 + 2, 3.3, 0), 'Bol Kloroplast → FOTOSENTEZ', 'chloro', new THREE.Vector3(width/2 - 0.5, 3.3, 0));
  addLabel(new THREE.Vector3(width/2 + 2, 0.5, 0), 'Hava Boşlukları → Gaz Değişimi', '', new THREE.Vector3(width/2 - 0.5, 0.5, 0));
  addLabel(new THREE.Vector3(0, 1.0, 1.5), 'Damar: Ksilem ÜSTTE, Floem ALTTA', 'xylem', new THREE.Vector3(0, 0.15, 0));
  addLabel(new THREE.Vector3(-4, -2.6, 0), 'CO₂ Alımı', '', new THREE.Vector3(-4, -1.4, 0));

  // ▶️ Çalıştır: FOTOSENTEZ — kloroplastlar parlar + CO₂↔O₂ gaz parçacıkları
  // CO₂ aşağıdan stomadan giriyor, O₂ aşağıdan stomadan çıkıyor
  const _yaprak_gases = [];
  for (let i = 0; i < 8; i++) {
    const isCO2 = i % 2 === 0;
    const gas = new THREE.Mesh(
      new THREE.SphereGeometry(0.18, 10, 8),
      new THREE.MeshStandardMaterial({
        color: isCO2 ? 0xaa6655 : 0x55aaff,
        emissive: isCO2 ? 0xaa6655 : 0x55aaff, emissiveIntensity: 1.0,
        transparent: true, opacity: 0.85
      })
    );
    gas.userData._isCO2 = isCO2;
    gas.userData._x = -2 + (i % 4) * 1.3;
    gas.userData._phase = i * 0.5;
    grp.add(gas);
    _yaprak_gases.push(gas);
  }

  window._customAnim = (t, dt) => {
    // CO2 aşağıdan yukarı, O2 yukarıdan aşağı
    _yaprak_gases.forEach((g, i) => {
      const cycle = ((t * 0.8 + g.userData._phase) % 3) / 3; // 0-1
      g.position.x = g.userData._x;
      if (g.userData._isCO2) {
        // CO2: -2'den 2'ye yukarı (stoma→palizat)
        g.position.y = -2 + cycle * 5;
      } else {
        // O2: 2'den -2'ye aşağı (palizat→stoma)
        g.position.y = 2.5 - cycle * 5;
      }
      g.position.z = Math.sin(t * 2 + i) * 0.2;
      g.material.opacity = 0.3 + Math.sin(cycle * Math.PI) * 0.55; // başta-sonda fade
    });

    // Palizat hücreleri (yeşil kloroplastlı) parlar
    grp.children.forEach(child => {
      if (child.material && child.material.color &&
          child.material.color.g > 0.5 && child.material.color.r < 0.5 &&
          child.material.emissiveIntensity !== undefined) {
        child.material.emissiveIntensity = 0.3 + Math.abs(Math.sin(t * 2.5)) * 0.5;
      }
    });
  };
};

// ============== MODÜL 4: STOMA & TERLEME ==============

SubBuilders.buildStomaMek = function() {
  camera.position.set(0, 3, 12);
  controls.target.set(0, 0, 0);

  const grp = new THREE.Group();
  markDynamic(grp);

  // Alt epidermis (zemin - gri-yeşil arka plan)
  const ground = new THREE.Mesh(
    new THREE.BoxGeometry(12, 0.3, 8),
    new THREE.MeshStandardMaterial({
      color: 0x6a8a6a, transparent: true, opacity: 0.5,
      roughness: 0.6
    })
  );
  ground.position.y = -1.5;
  grp.add(ground);

  // Yan komşu epidermis hücreleri (kloroplastsız, açık)
  for (let i = 0; i < 2; i++) {
    const cell = new THREE.Mesh(
      makeRoughCellGeometry(3, 1.5, 2, 0.04, 8),
      new THREE.MeshStandardMaterial({
        color: 0xb0d8b8, transparent: true, opacity: 0.6,
        roughness: 0.3, emissive: 0xa0c8a8, emissiveIntensity: 0.2
      })
    );
    cell.position.set((i === 0 ? -3.5 : 3.5), 0, 0);
    grp.add(cell);
  }

  // === BEKÇİ HÜCRELERİ - karşılıklı fasulye şeklinde ===
  // İç çeperi kalın (stoma yönüne bakan) - TUBE kullanarak şişman taraf

  // Sol bekçi hücresi
  function makeBekciHucresi() {
    const grp = new THREE.Group();
    // Ana gövde - yarım torus (C şekli)
    const body = new THREE.Mesh(
      new THREE.TorusGeometry(0.7, 0.3, 14, 24, Math.PI),
      new THREE.MeshStandardMaterial({
        color: COLORS.bekciHucre, emissive: COLORS.bekciHucre, emissiveIntensity: 0.35,
        roughness: 0.4, metalness: 0.05
      })
    );
    grp.add(body);

    // İÇ ÇEPER (kalın taraf - stoma yönüne bakan) - extra kalın torus
    const innerCeper = new THREE.Mesh(
      new THREE.TorusGeometry(0.7, 0.05, 8, 24, Math.PI),
      new THREE.MeshStandardMaterial({
        color: COLORS.bekciCeper, emissive: COLORS.bekciCeper, emissiveIntensity: 0.5,
        roughness: 0.3
      })
    );
    innerCeper.scale.set(1, 1, 1);
    // İçte konumlanmış (stoma yönüne yakın)
    grp.add(innerCeper);

    // Kloroplastlar (8-10 tane)
    for (let c = 0; c < 10; c++) {
      const a = (c / 10) * Math.PI;
      const chloro = new THREE.Mesh(
        new THREE.CapsuleGeometry(0.08, 0.13, 6, 10),
        new THREE.MeshStandardMaterial({
          color: COLORS.kloroplast, emissive: COLORS.kloroplast,
          emissiveIntensity: 0.7
        })
      );
      const r = 0.7;
      chloro.position.set(Math.cos(a) * r, Math.sin(a) * r, (Math.random() - 0.5) * 0.3);
      chloro.rotation.z = a + Math.PI/2;
      grp.add(chloro);
    }

    // Çekirdek
    const nuc = new THREE.Mesh(
      new THREE.SphereGeometry(0.15, 14, 10),
      new THREE.MeshStandardMaterial({
        color: 0xc0457a, emissive: 0xc0457a, emissiveIntensity: 0.5
      })
    );
    nuc.position.set(0, 0.55, 0);
    grp.add(nuc);

    return grp;
  }

  // Sol bekçi
  bekciHucreLeft = makeBekciHucresi();
  bekciHucreLeft.rotation.z = -Math.PI/2; // Dikey C - alt yarım açık
  bekciHucreLeft.position.set(-0.5, 0, 0);
  bekciHucreLeft.userData.dynamic = true;
  bekciHucreLeft.userData.currentBend = 0;
  grp.add(bekciHucreLeft);

  // Sağ bekçi (ayna)
  bekciHucreRight = makeBekciHucresi();
  bekciHucreRight.rotation.z = Math.PI/2; // Ters C
  bekciHucreRight.position.set(0.5, 0, 0);
  bekciHucreRight.userData.dynamic = true;
  bekciHucreRight.userData.currentBend = 0;
  grp.add(bekciHucreRight);

  // STOMA PORU (ortadaki açıklık)
  stomaPorMesh = new THREE.Mesh(
    new THREE.SphereGeometry(0.5, 20, 14),
    new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 1 })
  );
  stomaPorMesh.scale.set(0.5, 1.5, 0.5);
  stomaPorMesh.userData.dynamic = true;
  grp.add(stomaPorMesh);

  // Hücre içi su damlaları (turgor göstergesi)
  // Bunlar dinamik objeler - turgora göre sayıları artar
  // Şimdilik 6 tane fix
  for (let i = 0; i < 6; i++) {
    const water = new THREE.Mesh(
      new THREE.SphereGeometry(0.06, 8, 6),
      new THREE.MeshStandardMaterial({
        color: 0x80c8ff, emissive: 0x80c8ff, emissiveIntensity: 0.8,
        transparent: true, opacity: 0.9
      })
    );
    const side = i % 2 === 0 ? -1 : 1;
    const a = (i / 3) * Math.PI;
    water.position.set(
      side * (0.7 + Math.cos(a) * 0.3),
      Math.sin(a) * 0.6,
      0.4
    );
    water.userData.baseY = water.position.y;
    water.userData.bob = { speed: 2.0, amp: 0.08, phase: i };
    dynamicObjects.push(water);
    grp.add(water);
  }

  // K+ iyonları (mor küçük noktalar - sadece yüksek turgorda görünmeli ideal olarak ama sabit göster)
  for (let i = 0; i < 8; i++) {
    const k = new THREE.Mesh(
      new THREE.SphereGeometry(0.05, 8, 6),
      new THREE.MeshStandardMaterial({
        color: 0xb050e0, emissive: 0xb050e0, emissiveIntensity: 1.0
      })
    );
    const side = i % 2 === 0 ? -1 : 1;
    const a = (i / 4) * Math.PI;
    k.position.set(
      side * (0.5 + Math.cos(a) * 0.3),
      Math.sin(a) * 0.5,
      -0.3
    );
    k.userData.baseY = k.position.y;
    k.userData.bob = { speed: 1.5, amp: 0.05, phase: i + 1 };
    dynamicObjects.push(k);
    grp.add(k);
  }

  scene.add(grp);

  addLabel(new THREE.Vector3(-2.5, 1.2, 0), 'Bekçi Hücresi (Sol)', 'chloro', new THREE.Vector3(-0.5, 0, 0));
  addLabel(new THREE.Vector3(2.5, 1.2, 0), 'Bekçi Hücresi (Sağ)', 'chloro', new THREE.Vector3(0.5, 0, 0));
  addLabel(new THREE.Vector3(0, 1.6, 0), 'STOMA AÇIKLIĞI (Por)', '', new THREE.Vector3(0, 0, 0));
  addLabel(new THREE.Vector3(0, -0.8, 0.6), 'İÇ ÇEPER (Kalın) →', 'warn', new THREE.Vector3(0.3, 0, 0.1));
  addLabel(new THREE.Vector3(-2.8, -0.5, 0), '← DIŞ ÇEPER (İnce)', '', new THREE.Vector3(-1.0, 0, 0));
  addLabel(new THREE.Vector3(3.0, 2.0, 0), 'Bol Kloroplastlı!', 'chloro', new THREE.Vector3(0.5, 0.5, 0));
  addLabel(new THREE.Vector3(-3.5, 0, 0), 'Komşu Epidermis (Kloroplastsız)', 'epi', new THREE.Vector3(-3.5, 0, 0.05));
  addLabel(new THREE.Vector3(0, -2.5, 0), '👇 Slider ile Turgoru Değiştir!', 'warn', new THREE.Vector3(0, -1.5, 0));

  // Slider'ı göster
  document.getElementById('bottomControl').classList.add('show');
};

SubBuilders.buildTerleme = function() {
  camera.position.set(0, 2, 22);
  controls.target.set(0, 2, 0);

  const grp = new THREE.Group();
  markDynamic(grp);

  // === Bitki şeması: kök, gövde, yaprak ===

  // KÖK (altta)
  const kok = new THREE.Mesh(
    new THREE.ConeGeometry(0.6, 3, 14),
    new THREE.MeshStandardMaterial({
      color: 0x8b6f47, roughness: 0.7,
      emissive: 0x5d4b30, emissiveIntensity: 0.2
    })
  );
  kok.position.y = -6.5;
  kok.rotation.x = Math.PI;
  grp.add(kok);

  // Yan kökler
  for (let i = 0; i < 5; i++) {
    const a = (i / 5) * Math.PI * 2;
    const yanKok = new THREE.Mesh(
      new THREE.ConeGeometry(0.15, 1.5, 8),
      new THREE.MeshStandardMaterial({ color: 0x6e5028, roughness: 0.7 })
    );
    yanKok.position.set(Math.cos(a) * 0.5, -5.5, Math.sin(a) * 0.5);
    yanKok.rotation.z = Math.cos(a) * 0.8;
    yanKok.rotation.x = Math.sin(a) * 0.8 + Math.PI;
    grp.add(yanKok);
  }

  // GÖVDE - şeffaf silindir (içeride ksilem görmek için)
  const govde = new THREE.Mesh(
    new THREE.CylinderGeometry(0.5, 0.6, 10, 20, 1, false),
    new THREE.MeshStandardMaterial({

let autoSpin = false;
let labelsOn = true;
let currentLevel = 'lise';
let currentMode = 'detayli'; // 'detayli' veya 'sade'

// =============== Modül dropdown'ı doldur ===============
function buildModuleDropdown() {
  const list = document.getElementById('moduleList');
  list.innerHTML = '';
  const emojis = ['🔬','⊙','🍃','💧'];

  Object.keys(MODULES).forEach(modNum => {
    const mod = MODULES[modNum];
    const btn = document.createElement('button');
    btn.className = 'dropdown-item';
    if (parseInt(modNum) === currentModule) btn.classList.add('active');
    btn.dataset.module = modNum;

    const modName = 'Modül ' + modNum;
    const cleanTitle = mod.title.replace(/^[^\s]+\s+Modül\s+\d+:\s*/, '');

    btn.innerHTML = '<span class="di-emoji">' + emojis[parseInt(modNum)-1] + '</span>' +
                    '<span><b>' + modName + '</b><br><small style="opacity:0.7;font-size:10.5px;">' + cleanTitle + '</small></span>';
    btn.onclick = () => {
      selectModule(parseInt(modNum));
      document.getElementById('panelModule').classList.remove('show');
      buildModuleDropdown(); // active güncelle
      buildTopicDropdown(); // konu listesi de güncellensin
    };
    list.appendChild(btn);
  });
}

// =============== Konu Rehberi dropdown'ı doldur (TÜM modüller + alt konular) ===============
function buildTopicDropdown() {
  const list = document.getElementById('topicList');
  list.innerHTML = '';

  Object.keys(MODULES).forEach(modNum => {
    const mod = MODULES[modNum];

    // Kategori başlığı
    const head = document.createElement('div');
    head.className = 'dropdown-cat-head';
    head.textContent = mod.title;
    list.appendChild(head);

    mod.subs.forEach(sub => {
      const btn = document.createElement('button');
      btn.className = 'dropdown-item';
      if (sub.key === currentSub) btn.classList.add('active');
      btn.dataset.key = sub.key;
      btn.dataset.module = modNum;

      const labelMatch = sub.label.match(/^([^\s]+)\s+(.+)$/);
      const emoji = labelMatch ? labelMatch[1] : '🌿';
      const name = labelMatch ? labelMatch[2] : sub.label;

      btn.innerHTML = '<span class="di-emoji">' + emoji + '</span>' +
                      '<span>' + name + '</span>';
      btn.onclick = () => {
        selectSub(parseInt(modNum), sub.key);
        document.getElementById('panelTopic').classList.remove('show');
      };
      list.appendChild(btn);
    });
  });
}

function selectModule(modNum) {
  currentModule = modNum;
  const mod = MODULES[modNum];
  if (!mod) return;

  // İlk alt konuyu yükle
  selectSub(modNum, mod.subs[0].key);
}

function selectSub(modNum, subKey) {
  currentSub = subKey;
  currentModule = modNum;
  clearScene();

  // Animasyon state sıfırla (yeni konu)
  autoSpin = false;
  window._autoSpinActive = false;
  window._isPlayingActive = false;
  window._customAnim = null;
  if (typeof isPlaying !== 'undefined') {
    isPlaying = false;
    if (_playTickId) { cancelAnimationFrame(_playTickId); _playTickId = null; }
  }
  const sBtn = document.getElementById('spinBtn');
  const aBtn = document.getElementById('animBtn');
  if (sBtn) sBtn.classList.remove('active');
  if (aBtn) aBtn.classList.remove('active');

  // Bilgi panelini yeniden göster (kapatılmış olabilir)
  document.getElementById('bottomPanel').classList.remove('hidden');

  // Slider sadece Modül 4'te
  if (modNum !== 4) {
    document.getElementById('bottomControl').classList.remove('show');
  }

  // 3D yapıyı kur
  const mod = MODULES[modNum];
  const sub = mod.subs.find(s => s.key === subKey);
  if (sub && SubBuilders[sub.builder]) {
    SubBuilders[sub.builder]();
  }

  // 3D modeli ekranda yukarı kaydır (kamera ve target'ı aynı miktar aşağı çek)
  // → kamera-model mesafesi/açısı korunur, sahne ekranda yukarı görünür
  const Y_OFFSET = 1.8;
  controls.target.y -= Y_OFFSET;
  camera.position.y -= Y_OFFSET;
  controls._syncFromCamera();

  // Bilgi paneli güncelle (maddeler halinde liste)
  const info = INFO_DATA[subKey];
  if (info) {
    const emojiMatch = info.title.match(/^([^\s]+)\s+(.+)$/);
    const emoji = emojiMatch ? emojiMatch[1] : '🌱';
    const title = emojiMatch ? emojiMatch[2] : info.title;

    // Modül adı: "🔬 Modül 1: Bitkisel Dokular" → "Bitkisel Dokular"
    const modRawTitle = MODULES[modNum] ? MODULES[modNum].title : '';
    const modName = modRawTitle.replace(/^[^\s]+\s+Modül\s+\d+:\s*/, '').trim() || '';
    const fullTitle = modName ? (modName + ' / ' + title) : title;

    document.getElementById('infoEmoji').textContent = emoji;
    document.getElementById('infoTitle').textContent = fullTitle;

    // HTML içeriğini parse et ve maddeler halinde göster
    const tmp = document.createElement('div');
    // Seviyeye göre içerik (fallback olarak lise)
    const htmlContent = info[currentLevel] || info.lise || info.html || '';
    tmp.innerHTML = htmlContent;

    const listEl = document.getElementById('infoList');
    listEl.innerHTML = '';

    if (currentMode === 'sade') {
      // ============ SADE MOD ============
      // Sadece özet paragraf + ilk listenin ilk 3 maddesi (başlık yok)

      // İlk paragraf - özet
      const firstP = tmp.querySelector('p');
      if (firstP) {
        const summary = document.createElement('li');
        summary.innerHTML = firstP.innerHTML;
        listEl.appendChild(summary);
      }

      // Sadece İLK ul'in İLK 3 li'si
      const firstUl = tmp.querySelector('ul');
      if (firstUl) {
        const liElements = Array.from(firstUl.children).filter(c => c.tagName === 'LI');
        liElements.slice(0, 3).forEach(liEl => {
          const li = document.createElement('li');
          // İç ul varsa (nested) onları gösterme - sadece düz metin
          const clean = liEl.cloneNode(true);
          clean.querySelectorAll('ul').forEach(n => n.remove());
          li.innerHTML = clean.innerHTML.trim();
          listEl.appendChild(li);
        });
      }
    } else {
      // ============ DETAYLI MOD (mevcut) ============

      // İlk paragraf - özet
      const firstP = tmp.querySelector('p');
      if (firstP) {
        const summary = document.createElement('li');
        summary.innerHTML = firstP.innerHTML;
        listEl.appendChild(summary);
      }

      // H3 başlıklar ve sonraki ul'ler
      tmp.querySelectorAll('h3, ul').forEach(el => {
        if (el.tagName === 'H3') {
          const sub = document.createElement('li');
          sub.className = 'subhead';
          sub.textContent = el.textContent;
          listEl.appendChild(sub);
        } else if (el.tagName === 'UL') {
          el.querySelectorAll('li').forEach(liEl => {
            const li = document.createElement('li');
            li.innerHTML = liEl.innerHTML;
            listEl.appendChild(li);
          });
        }
      });
    }
  }

  // SADE MODDA: 3D etiketlerin yarısını gizle (her 2.'sini gösterir)
  setTimeout(() => {
    if (window._labelRefs && window._labelRefs.length > 0) {
      const labelsActuallyOn = labelsOn !== false;
      window._labelRefs.forEach((ref, i) => {
        if (!ref.div) return;
        if (!labelsActuallyOn) {
          ref.div.style.display = 'none';
          ref.div.dataset.userHidden = '1';
          return;
        }
        // Sade: sadece her ikinci etiketi göster (yarıya indir)
        // Detaylı: hepsini göster
        if (currentMode === 'sade' && i % 2 === 1) {
          ref.div.style.display = 'none';
          ref.div.dataset.userHidden = '1';
        } else {
          ref.div.style.display = 'block';
          ref.div.dataset.userHidden = '0';
        }
      });
    }
  }, 50);

  // Dropdown'ları güncelle (active state)
  buildTopicDropdown();
}

// =============== ⚖️ KARŞILAŞTIRMA ===============
let _compareIdx = 0;

// Seviyeye göre versiyon anahtarını belirle
function _getLevelKey(level) {
  if (level === 'ilkokul' || level === 'ortaokul') return 'basit';
  return 'standart'; // lise, tyt_ayt
}

// COMPARE_DATA veya TABLE_DATA'dan seviyeye uygun datayı çek
function _resolveLevelData(dataset, subKey) {
  const all = dataset[subKey];
  if (!all) return null;
  // Yeni format: seviye keyleri var
  if (all.basit || all.standart) {
    const key = _getLevelKey(currentLevel);
    return all[key] || all.standart || all.basit;
  }
  // Eski format: doğrudan array veya obje
  return all;
}

function renderTableHTML(data) {
  let html = '<table class="cmp-table"><thead><tr>';
  data.headers.forEach(h => html += `<th>${h}</th>`);
  html += '</tr></thead><tbody>';
  data.rows.forEach(row => {
    html += '<tr>';
    row.forEach(cell => html += `<td>${cell}</td>`);
    html += '</tr>';
  });
  html += '</tbody></table>';
  return html;
}

function renderCompareTable() {
  const raw = _resolveLevelData(COMPARE_DATA, currentSub);
  const body = document.getElementById('compareBody');
  const titleEl = document.getElementById('compareTitle');
  const nav = document.getElementById('compareNav');

  if (!raw) {
    titleEl.textContent = '⚖️ Karşılaştırma';
    body.innerHTML = '<div class="cmp-no-data">Bu konu için karşılaştırma verisi yok.</div>';
    nav.classList.add('hidden');
    return;
  }

  const list = Array.isArray(raw) ? raw : [raw];
  if (_compareIdx >= list.length) _compareIdx = 0;
  const data = list[_compareIdx];

  titleEl.textContent = data.title;
  body.innerHTML = renderTableHTML(data);

  if (list.length > 1) {
    nav.classList.remove('hidden');
    document.getElementById('compareCounter').textContent = `${_compareIdx + 1} / ${list.length}`;
    document.getElementById('comparePrev').disabled = _compareIdx === 0;
    document.getElementById('compareNext').disabled = _compareIdx === list.length - 1;
  } else {
    nav.classList.add('hidden');
  }
}

document.getElementById('btnCompare').onclick = () => {
  _compareIdx = 0;
  renderCompareTable();
  document.getElementById('compareOverlay').classList.add('show');
};
document.getElementById('compareClose').onclick = () => {
  document.getElementById('compareOverlay').classList.remove('show');
};
document.getElementById('compareOverlay').onclick = (e) => {
  if (e.target.id === 'compareOverlay') {
    document.getElementById('compareOverlay').classList.remove('show');
  }
};
document.getElementById('comparePrev').onclick = () => {
  if (_compareIdx > 0) { _compareIdx--; renderCompareTable(); }
};
document.getElementById('compareNext').onclick = () => {
  const raw = _resolveLevelData(COMPARE_DATA, currentSub);
  const list = Array.isArray(raw) ? raw : [raw];
  if (_compareIdx < list.length - 1) { _compareIdx++; renderCompareTable(); }
};

// =============== 📋 TABLO ===============
let _tableIdx = 0;

function renderInfoTable() {
  const raw = _resolveLevelData(TABLE_DATA, currentSub);
  const body = document.getElementById('tableBody');
  const titleEl = document.getElementById('tableTitle');
  const nav = document.getElementById('tableNav');

  if (!raw) {
    titleEl.textContent = '📋 Bilgi Tablosu';
    body.innerHTML = '<div class="cmp-no-data">Bu konu için tablo verisi yok.</div>';
    nav.classList.add('hidden');
    return;
  }

  const list = Array.isArray(raw) ? raw : [raw];
  if (_tableIdx >= list.length) _tableIdx = 0;
  const data = list[_tableIdx];

  titleEl.textContent = data.title;
  body.innerHTML = renderTableHTML(data);

  if (list.length > 1) {
    nav.classList.remove('hidden');
    document.getElementById('tableCounter').textContent = `${_tableIdx + 1} / ${list.length}`;
    document.getElementById('tablePrev').disabled = _tableIdx === 0;
    document.getElementById('tableNext').disabled = _tableIdx === list.length - 1;
  } else {
    nav.classList.add('hidden');
  }
}

document.getElementById('btnTable').onclick = () => {
  _tableIdx = 0;
  renderInfoTable();
  document.getElementById('tableOverlay').classList.add('show');
};
document.getElementById('tableClose').onclick = () => {
  document.getElementById('tableOverlay').classList.remove('show');
};
document.getElementById('tableOverlay').onclick = (e) => {
  if (e.target.id === 'tableOverlay') {
    document.getElementById('tableOverlay').classList.remove('show');
  }
};
document.getElementById('tablePrev').onclick = () => {
  if (_tableIdx > 0) { _tableIdx--; renderInfoTable(); }
};
document.getElementById('tableNext').onclick = () => {
  const raw = _resolveLevelData(TABLE_DATA, currentSub);
  const list = Array.isArray(raw) ? raw : [raw];
  if (_tableIdx < list.length - 1) { _tableIdx++; renderInfoTable(); }
};

// =============== Önceki / Sonraki ===============
function navigate(dir) {
  // TÜM konuları tek liste yap
  const allSubs = [];
  Object.keys(MODULES).forEach(modNum => {
    MODULES[modNum].subs.forEach(s => allSubs.push({ modNum: parseInt(modNum), sub: s }));
  });

  const idx = allSubs.findIndex(x => x.sub.key === currentSub);
  let newIdx = idx + dir;
  if (newIdx < 0) newIdx = allSubs.length - 1;
  if (newIdx >= allSubs.length) newIdx = 0;

  const next = allSubs[newIdx];
  if (next.modNum !== currentModule) {
    selectModule(next.modNum);
  }
  selectSub(next.modNum, next.sub.key);
}

document.getElementById('navNext').onclick = () => navigate(1);
document.getElementById('navPrev').onclick = () => navigate(-1);

// =============== Alt yatay butonlar ===============

// 🔄 Döndür - KAMERA modelin etrafında orbit yapar (görüş açısı değişir)
window._autoSpinActive = false;  // Bu artık SADECE "Çalıştır" tarafından kullanılıyor
document.getElementById('spinBtn').onclick = function() {
  autoSpin = !autoSpin;
  this.classList.toggle('active', autoSpin);
};

// 🏷️ Label (Etiketler)
document.getElementById('labelBtn').onclick = function() {
  labelsOn = !labelsOn;
  labelsVisible = labelsOn;
  this.classList.toggle('active', !labelsOn);
  scene.traverse(obj => {
    if (obj.userData.isLabel && obj.element) {
      obj.element.style.display = labelsOn ? 'block' : 'none';
      obj.element.dataset.userHidden = labelsOn ? '0' : '1';
    }
  });
  // Leader line SVG'yi de gizle
  const svg = document.getElementById('leaderLines');
  if (svg) svg.style.display = labelsOn ? 'block' : 'none';
};

// ▶️ Çalıştır - Konuya özel animasyon başlatır
// Her builder kendine özel window._customAnim fonksiyonu register eder
// Modül 4'te ayrıca slider otomatik salınımı yapar
let isPlaying = false;
let _playTickId = null;
let _playT = 0;

document.getElementById('animBtn').onclick = function() {
  isPlaying = !isPlaying;
  window._isPlayingActive = isPlaying;
  this.classList.toggle('active', isPlaying);

  if (isPlaying) {
    // Modül 4'te slider'ı otomatik salla (turgor 0↔100 sinüsoidal)
    if (currentModule === 4) {
      _playT = 0;
      const tick = () => {
        if (!isPlaying) return;
        _playT += 0.015;
        const val = Math.round(50 + 49 * Math.sin(_playT));
        const slider = document.getElementById('turgorSlider');
        if (slider) {
          slider.value = val;
          slider.dispatchEvent(new Event('input'));
        }
        _playTickId = requestAnimationFrame(tick);
      };
      tick();
    }
  } else {
    if (_playTickId) {
      cancelAnimationFrame(_playTickId);
      _playTickId = null;
    }
  }
};

// =============== Slider (Modül 4) ===============
const turgorSlider = document.getElementById('turgorSlider');
const turgorValueEl = document.getElementById('turgorValue');
const stomaDurum = document.getElementById('stomaDurum');

turgorSlider.addEventListener('input', e => {
  turgorValue = parseInt(e.target.value) / 100;
  turgorValueEl.textContent = e.target.value + '%';

  if (turgorValue > 0.5) {
    stomaDurum.textContent = '🔓 STOMA AÇIK';
    stomaDurum.style.background = 'rgba(60,180,80,0.3)';
    stomaDurum.style.color = '#6ee7a8';
  } else if (turgorValue > 0.2) {
    stomaDurum.textContent = '🟡 STOMA YARI AÇIK';
    stomaDurum.style.background = 'rgba(180,180,60,0.3)';
    stomaDurum.style.color = '#ffd166';
  } else {
    stomaDurum.textContent = '🔒 STOMA KAPALI';
    stomaDurum.style.background = 'rgba(180,60,60,0.3)';
    stomaDurum.style.color = '#ff8080';
  }
});

// Döndür (kamera orbit) - sadece autoSpin (Döndür butonu) aktifken
const _spinTick = () => {
  if (autoSpin && controls) {
    controls._sphericalTarget.theta += 0.005;
  }
  requestAnimationFrame(_spinTick);
};
_spinTick();

// ============== BAŞLATMA ==============
init();
animate();
buildTopicDropdown();
selectModule(1);

</script>
