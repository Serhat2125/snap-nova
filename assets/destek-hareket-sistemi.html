<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Destek ve Hareket Sistemi · 3D Anatomi</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Baloo+2:wght@500;600;700;800&display=swap');

  :root {
    --bg:#0a0e1a;
    --panel:#161b2e;
    --panel-soft:#1f2540;
    --panel-line:#2f3a5f;
    --ink:#eef0ff;
    --ink-soft:#a8b0d0;
    --accent:#e89752;
    --accent-glow:#ffb47a;
    --bone:#f5e8c8;
    --cartilage:#9d7fe6;
    --muscle:#c45d5d;
    --joint:#5fc8e0;
    --warning:#ffd166;
  }

  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body {
    margin:0; padding:0; overflow:hidden;
    background:var(--bg); color:var(--ink);
    font-family:'Fredoka',sans-serif; user-select:none;
    width:100vw; height:100vh;
  }
  body { touch-action:none; }
  #app { position:relative; width:100vw; height:100vh; overflow:hidden; }
  canvas { display:block; cursor:grab; }
  canvas:active { cursor:grabbing; }

  .topbar {
    position:absolute; top:0; left:0; right:0;
    display:flex; align-items:center; gap:10px;
    padding:3px 14px 9px;
    background:linear-gradient(180deg,rgba(10,14,26,0.95),transparent);
    z-index:30; pointer-events:none;
  }
  .topbar > * { pointer-events:auto; }
  .level-badge {
    font-family:'Baloo 2',cursive; font-weight:800;
    font-size:12px; color:#fff;
    background:linear-gradient(135deg,var(--accent),#cf752f);
    padding:7px 12px; border-radius:14px;
    border:none; cursor:pointer;
    box-shadow:0 4px 12px rgba(232,151,82,.35);
    display:flex; align-items:center; gap:5px;
  }
  .level-badge .lv-arrow { font-size:9px; opacity:.85; }
  .topbar h1 {
    margin:0; font-family:'Baloo 2',cursive; font-weight:800;
    font-size:15px; color:#fff;
    display:flex; align-items:center; gap:7px; flex:1;
  }
  .topbar h1 .ic {
    background:linear-gradient(135deg,var(--accent),var(--muscle));
    width:28px; height:28px; border-radius:8px;
    display:grid; place-items:center;
    font-size:15px;
    box-shadow:0 4px 10px rgba(232,151,82,.4);
  }
  .reset-btn {
    background:var(--panel-soft); color:var(--ink);
    border:1.5px solid var(--panel-line);
    border-radius:12px; padding:6px 10px;
    font-family:'Fredoka',sans-serif; font-weight:600;
    font-size:11px; cursor:pointer;
  }
  .tool-btn {
    background:var(--panel-soft); color:var(--ink);
    border:1.5px solid var(--panel-line);
    border-radius:11px; padding:6px 9px;
    font-size:13px; cursor:pointer; line-height:1;
  }
  .tool-btn:hover { background:var(--panel-line); border-color:var(--accent); }
  .tool-btn:active { transform:scale(0.92); }
  .user-btn {
    display:flex; align-items:center; gap:5px;
    background:var(--panel-soft); color:var(--ink);
    border:1.5px solid var(--accent);
    border-radius:11px; padding:5px 10px; cursor:pointer;
    font-family:'Fredoka',sans-serif; font-weight:600; font-size:11px;
    max-width:120px;
  }
  .user-btn:hover { background:var(--panel-line); }
  .user-btn:active { transform:scale(0.95); }
  .user-btn .user-ico { font-size:13px; flex-shrink:0; }
  .user-btn .user-name {
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    color:var(--accent-glow);
  }

  .progress-wrap {
    position:absolute; bottom:182px; left:50%; transform:translateX(-50%); z-index:14;
    display:flex; align-items:center; gap:7px;
    background:rgba(22,27,46,0.85); padding:4px 10px; border-radius:11px;
    border:1px solid var(--panel-line); pointer-events:none;
  }
  .progress-bar {
    width:70px; height:6px; background:var(--panel-line);
    border-radius:3px; overflow:hidden;
  }
  .progress-fill {
    height:100%; width:0%;
    background:linear-gradient(90deg,var(--accent),var(--accent-glow));
    border-radius:3px; transition:width .4s ease;
  }
  .progress-txt {
    font-family:'Baloo 2',cursive; font-weight:700;
    font-size:9.5px; color:var(--ink-soft); white-space:nowrap;
  }

  .compare-tab { background:var(--joint)!important; border-color:var(--joint)!important; color:#0a0e1a!important; }
  .fav-tab { background:var(--warning)!important; border-color:var(--warning)!important; color:#0a0e1a!important; }

  .fav-btn {
    flex-shrink:0; width:32px; height:28px;
    background:transparent; border:none; cursor:pointer;
    font-size:20px; color:var(--warning); line-height:1;
    align-self:center;
  }
  .fav-btn:active { transform:scale(1.3); }
  .fav-btn.active { color:var(--warning); text-shadow:0 0 8px var(--warning); }

  .compare-overlay, .fav-overlay {
    position:absolute; inset:0; z-index:50;
    background:rgba(10,14,26,0.82); backdrop-filter:blur(3px);
    display:none; align-items:center; justify-content:center;
    padding:20px;
  }
  .compare-overlay.show, .fav-overlay.show { display:flex; }
    .compare-card {
    background: #252b48;
    border:2px solid var(--accent);
    border-radius:18px; padding:18px;
    max-width:min(580px,95vw); max-height:90vh;
    width: 580px;
    box-shadow:0 20px 60px rgba(0,0,0,.5);
    display:flex; flex-direction:column;
    position:relative;
  }
  .fav-card {
    background:var(--panel); border:2px solid var(--accent);
    border-radius:18px; padding:14px;
    max-width:min(560px,92vw); max-height:82vh; overflow-y:auto;
    box-shadow:0 20px 60px rgba(0,0,0,.5);
  }
  .compare-head, .fav-head {
    display:flex; align-items:center; justify-content:space-between;
    font-family:'Baloo 2',cursive; font-weight:800; font-size:17px;
    color:var(--accent); margin-bottom:14px;
    flex-shrink:0;
  }
  .compare-counter {
    color: #c8b8f0; font-size:13px; font-weight:600;
    background: rgba(122,95,214,0.25);
    padding:2px 8px; border-radius:8px;
    margin-left:6px;
  }
  .compare-close, .fav-close {
    background:var(--panel-soft); border:1.5px solid var(--panel-line);
    color:var(--ink); border-radius:9px; width:32px; height:32px;
    cursor:pointer; font-size:15px;
  }
  .compare-body {
    overflow-y:auto;
    flex: 1 1 auto;
    margin-bottom: 12px;
    background: #2e3454;
    border-radius: 12px;
    padding: 4px;
  }
  .compare-table { width:100%; border-collapse:collapse; background: transparent; }
  .compare-table th, .compare-table td {
    padding:10px 11px; text-align:left; font-size:13.5px;
    border-bottom:1px solid rgba(255,255,255,0.08);
  }
  .compare-table th {
    font-family:'Baloo 2',cursive; font-weight:800; color:#fff;
    background: #3a4168;
    font-size:14px;
  }
  .compare-table td:first-child {
    font-weight:700; color: #c8b8f0;
    background: #353b5f;
  }
  .compare-table tr td { color: #f0f2ff; }
  .compare-table tr:hover td { background: rgba(255,255,255,0.04); }

  .compare-next-btn {
    display:none;
    align-items:center; justify-content:center;
    gap:8px;
    background: linear-gradient(135deg, var(--accent), var(--accent-glow));
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 12px 18px;
    font-family: 'Baloo 2', cursive;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    box-shadow: 0 6px 18px rgba(0,0,0,0.35);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    flex-shrink: 0;
  }
  .compare-next-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 22px rgba(0,0,0,0.5); }
  .compare-next-btn:active { transform: scale(0.97); }
  .compare-next-btn b { font-weight: 800; }

  .fav-list { display:flex; flex-direction:column; gap:6px; }
  .fav-item {
    display:flex; align-items:center; gap:9px;
    background:var(--panel-soft); border:1.5px solid var(--panel-line);
    border-radius:10px; padding:9px 11px; cursor:pointer;
    font-size:12.5px; color:var(--ink); font-weight:600;
  }
  .fav-item:hover { border-color:var(--accent); }
  .fav-item .fav-emoji { font-size:18px; }
  .fav-item .fav-rm { margin-left:auto; color:var(--muscle); font-size:14px; background:none; border:none; cursor:pointer; }
  .fav-empty { color:var(--ink-soft); font-size:12px; text-align:center; padding:20px; }

  .share-overlay {
    position:absolute; inset:0; z-index:55;
    background:rgba(10,14,26,0.82); backdrop-filter:blur(3px);
    display:none; align-items:center; justify-content:center; padding:20px;
  }
  .share-overlay.show { display:flex; }
  .share-card {
    background:var(--panel); border:2px solid var(--accent);
    border-radius:20px; padding:14px;
    width:min(340px,92vw); max-height:88vh; overflow-y:auto;
    box-shadow:0 20px 60px rgba(0,0,0,.55);
    animation:shareIn .25s ease;
  }
  @keyframes shareIn { from{transform:translateY(20px) scale(.96);opacity:0;} to{transform:none;opacity:1;} }
  .share-head {
    display:flex; align-items:center; justify-content:space-between;
    font-family:'Baloo 2',cursive; font-weight:800; font-size:15px;
    color:var(--accent); margin-bottom:10px;
  }
  .share-close {
    background:var(--panel-soft); border:1.5px solid var(--panel-line);
    color:var(--ink); border-radius:9px; width:28px; height:28px;
    cursor:pointer; font-size:13px;
  }
  .share-preview {
    width:100%; border-radius:12px; border:1.5px solid var(--panel-line);
    margin-bottom:12px; display:block; background:var(--bg);
  }
  .share-actions { display:flex; flex-direction:column; gap:8px; }
  .share-act {
    display:flex; align-items:center; gap:11px;
    background:var(--panel-soft); border:1.5px solid var(--panel-line);
    border-radius:13px; padding:11px 13px; cursor:pointer;
    text-align:left; color:var(--ink);
    font-family:'Fredoka',sans-serif;
    transition:all .15s ease;
  }
  .share-act:hover { border-color:var(--accent); background:var(--panel-line); }
  .share-act:active { transform:scale(.97); }
  .share-act.primary {
    background:linear-gradient(135deg,#25d366,#1da851); border-color:#25d366; color:#fff;
  }
  .share-act.primary:hover { filter:brightness(1.08); }
  .share-act .sa-ico { font-size:24px; flex-shrink:0; }
  .share-act .sa-txt { font-size:13px; line-height:1.3; }
  .share-act .sa-txt small { font-size:10.5px; opacity:.75; }

  .tabbar {
    position:absolute; top:44px; left:0;
    padding:5px 12px; z-index:25; pointer-events:none;
  }
  .tabbar > * { pointer-events:auto; }
  .tab {
    font-family:'Fredoka',sans-serif; font-weight:600;
    font-size:12.5px; color:var(--ink);
    background:var(--panel); border:1.5px solid var(--panel-line);
    padding:7px 13px; border-radius:12px;
    cursor:pointer; display:inline-flex; align-items:center; gap:5px;
  }
  .tab .ico { font-size:1.1em; }
  .tab.active {
    background:var(--accent); border-color:var(--accent); color:#0a0e1a;
  }

  .organ-panel {
    position:absolute; top:96px; left:14px;
    width:min(270px,82vw); max-height:calc(100vh - 280px);
    background:var(--panel); border:2px solid var(--accent);
    border-radius:16px; padding:10px; z-index:18;
    box-shadow:0 16px 40px rgba(40,55,90,.25);
    overflow-y:auto; display:none;
  }
  .organ-panel.show { display:block; }
  .organ-cat {
    font-family:'Baloo 2',cursive; font-weight:800; font-size:11px;
    color:var(--accent-glow); padding:8px 4px 4px;
    text-transform:uppercase; letter-spacing:0.5px;
    border-top:1px solid var(--panel-line);
    margin-top:6px;
  }
  .organ-cat:first-child { border-top:none; margin-top:0; }
  .organ-item {
    display:flex; align-items:center; gap:9px;
    width:100%; text-align:left;
    font-family:'Fredoka',sans-serif; font-weight:600; font-size:13px;
    color:var(--ink); background:var(--panel-soft);
    border:1.5px solid transparent; border-radius:10px;
    padding:9px 10px; margin-bottom:4px; cursor:pointer;
  }
  .organ-item:hover { background:var(--panel-line); }
  .organ-item.active {
    border-color:var(--accent); background:var(--panel-line); color:#fff;
  }
  .organ-item .oico { font-size:18px; width:22px; text-align:center; }

  .level-panel {
    position:absolute; top:44px; left:14px;
    width:max-content; max-width:min(200px,70vw);
    background:var(--panel); border:2px solid var(--accent);
    border-radius:16px; padding:10px; z-index:22;
    display:none;
    box-shadow:0 14px 36px rgba(40,55,90,.25);
  }
  .level-panel.show { display:block; }
  .level-title {
    font-family:'Baloo 2',cursive; font-weight:800; font-size:13px;
    color:var(--accent); margin-bottom:5px;
  }
  .level-sub { font-size:10px; color:var(--ink-soft); margin-bottom:7px; }
  .level-item {
    display:flex; align-items:center; gap:7px;
    width:100%; padding:6px 8px;
    background:var(--panel-soft);
    border:1.5px solid transparent; border-radius:10px;
    cursor:pointer; margin-bottom:4px;
    font-size:12px; color:var(--ink);
  }
  .level-item:hover { background:var(--panel-line); }
  .level-item.active {
    border-color:var(--accent); background:var(--panel-line); color:#fff;
  }
  .level-item .lemoji { font-size:16px; flex-shrink:0; }
  .level-item .lname { font-weight:700; white-space:nowrap; }
  .level-item .ldesc { font-size:10px; opacity:.65; margin-left:auto; padding-left:8px; white-space:nowrap; }

  .info-hint {
    position:absolute; top:79px; right:16px;
    z-index:15; pointer-events:none;
    font-family:'Fredoka',sans-serif; font-size:9.5px;
    color:var(--ink-soft); opacity:0.55;
    font-weight:500;
    text-align:right;
    animation:hintPulse 2.5s ease-in-out infinite;
  }
  @keyframes hintPulse { 0%,100%{opacity:0.4;} 50%{opacity:0.7;} }

  .info {
    position:absolute; top:96px; right:14px;
    width:min(221px,37vw); padding:10px 11px;
    background:var(--panel); border:2px solid var(--panel-line);
    border-radius:14px; z-index:15;
    max-height:calc(100vh - 280px); overflow-y:auto;
    box-shadow:0 10px 30px rgba(40,55,90,.18);
  }
  .info::-webkit-scrollbar { width:5px; }
  .info::-webkit-scrollbar-thumb { background:var(--panel-line); border-radius:5px; }
  .i-head {
    font-family:'Baloo 2',cursive; font-weight:800;
    font-size:13px; color:var(--accent);
    border-bottom:1.5px dashed var(--panel-line);
    padding:5px 7px; margin-bottom:6px;
    display:flex; align-items:center; justify-content:space-between; gap:8px;
    cursor:pointer; user-select:none;
    background:var(--panel-soft); border-radius:9px;
    border:1.5px solid var(--accent);
    transition:background .15s ease;
  }
  .i-head:hover { background:var(--panel-line); }
  .i-head:active { transform:scale(0.98); }
  .i-head .i-head-txt { flex:1; }
  .i-head .i-head-arrow {
    font-size:14px; color:var(--accent-glow);
    flex-shrink:0; transition:transform .2s ease;
  }
  .i-body { animation:fadeInBody .2s ease; }
  @keyframes fadeInBody { from{opacity:0;} to{opacity:1;} }
  .i-section { margin-bottom:8px; }
  .i-stitle {
    font-family:'Baloo 2',cursive; font-weight:700;
    font-size:11px; color:var(--accent-glow); margin-bottom:4px;
  }
  .i-row {
    font-size:11.5px; color:var(--ink); line-height:1.35;
    padding:6px 7px; margin-bottom:3px;
    background:var(--panel-soft);
    border-radius:7px; cursor:pointer;
    border:1.5px solid transparent;
    transition:all .15s ease;
    display:flex; align-items:center; gap:6px;
  }
  .i-row:hover { background:var(--panel-line); border-color:var(--accent); }
  .i-row.active { border-color:var(--accent); background:var(--panel-line); color:#fff; }
  .i-row b { color:#fff; }
  .i-tag {
    display:inline-flex; padding:1px 6px; border-radius:5px;
    font-family:'Baloo 2',cursive; font-weight:800;
    font-size:10px; color:#fff;
    flex-shrink:0; min-width:18px; justify-content:center;
  }
  .i-emoji {
    display:inline-flex; font-size:15px;
    flex-shrink:0; width:20px; justify-content:center;
  }

  .panel {
    position:absolute; bottom:0; left:0; right:0;
    background:linear-gradient(180deg,transparent,rgba(10,14,26,0.97) 30%);
    padding:24px 12px 10px; z-index:20;
  }
  .panel-card {
    background:var(--panel); border:1.5px solid var(--panel-line);
    border-radius:18px; padding:11px 13px;
    box-shadow:0 -8px 30px rgba(0,0,0,0.35);
    max-width:680px; margin:0 auto;
    position:relative;
  }
  .info-box {
    display:flex; align-items:center; gap:8px;
    background:var(--panel-soft); border-radius:11px;
    padding:9px 11px; margin-bottom:9px;
    min-height:62px; position:relative;
  }
  .info-emoji {
    width:24px; height:24px; border-radius:7px;
    background:linear-gradient(135deg,var(--accent),var(--muscle));
    display:grid; place-items:center;
    font-size:14px; flex-shrink:0;
    align-self:center;
  }
  .info-content { flex:1; min-width:0; }
  .info-head {
    font-family:'Baloo 2',cursive; font-weight:800;
    font-size:14px; color:#fff; margin-bottom:2px;
  }
  .info-text { font-size:11.5px; line-height:1.45; color:var(--ink); }
  .info-text b { color:var(--accent-glow); }

  .nav-col {
    display:flex; flex-direction:column; gap:5px;
    flex-shrink:0; align-self:center;
  }
  .nav-arrow {
    flex-shrink:0;
    width:32px; height:28px;
    background:var(--panel-line); border:1.5px solid var(--accent);
    border-radius:9px; cursor:pointer;
    display:grid; place-items:center;
    color:var(--accent); font-size:13px; font-weight:800;
  }
  .nav-arrow:hover { background:var(--accent); color:#0a0e1a; }
  .nav-arrow:active { transform:scale(0.92); }
  .nav-arrow:disabled { opacity:0.3; cursor:not-allowed; }
  .nav-arrow:disabled:hover { background:var(--panel-line); color:var(--accent); }

  .info-page {
    font-size:10px; color:var(--ink-soft);
    margin-top:4px; opacity:0.75;
    font-family:'Baloo 2',cursive; font-weight:600;
  }
  .info-page .pg-active { color:var(--accent-glow); font-weight:800; }

  .controls { display:flex; flex-direction:column; gap:7px; }
  .btn-row { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; }
  .big-btn {
    font-family:'Baloo 2',cursive; font-weight:700;
    font-size:11px; color:#fff;
    border:none; border-radius:10px;
    padding:3px 4px; cursor:pointer;
    display:flex; flex-direction:column; align-items:center; gap:2px;
  }
  .big-btn:active { transform:scale(.96); }
  .big-btn .row1 { display:flex; align-items:center; gap:4px; font-size:11.5px; }
  .big-btn .row1 .ico { font-size:13px; }
  .big-btn .row2 { display:none; }
  .big-btn.spin   { background:linear-gradient(135deg,var(--warning),#dba830); color:#0a0e1a; }
  .big-btn.label  { background:linear-gradient(135deg,var(--cartilage),#7a5fb8); }
  .big-btn.anim   { background:linear-gradient(135deg,var(--muscle),#a04545); }
  .big-btn.off    { filter:grayscale(.6) brightness(.85); }

  .organ-label {
    position:absolute; transform:translate(-50%,-50%);
    pointer-events:none; z-index:9;
    background:rgba(22,27,46,0.92); border:1.5px solid var(--accent);
    border-radius:8px; padding:3px 8px;
    font-family:'Baloo 2',cursive; font-weight:700;
    font-size:10.5px; color:#fff;
    white-space:nowrap;
    box-shadow:0 4px 12px rgba(0,0,0,.45);
    text-shadow:0 1px 2px rgba(0,0,0,.5);
  }
  .organ-label.bone     { border-color:var(--bone); }
  .organ-label.cartilage{ border-color:var(--cartilage); }
  .organ-label.muscle   { border-color:var(--muscle); }
  .organ-label.joint    { border-color:var(--joint); }
  .organ-label.warning  { border-color:var(--warning); }

  .dir-arrow {
    position:absolute; pointer-events:none; z-index:9;
    font-family:'Baloo 2',cursive; font-weight:800;
    font-size:10px; color:var(--warning);
    background:rgba(22,27,46,0.85);
    padding:3px 7px; border-radius:7px;
    border:1.5px dashed var(--warning);
  }

  .toast {
    position:absolute; top:160px; left:50%;
    transform:translateX(-50%) translateY(-10px);
    background:var(--panel); border:2px solid var(--accent);

(function(){

  for(let i=0;i<180;i++){
    const r=60+Math.random()*60, t=Math.random()*6.28, ph=Math.acos(2*Math.random()-1);
    p.push(r*Math.sin(ph)*Math.cos(t),r*Math.sin(ph)*Math.sin(t),r*Math.cos(ph));

})();

function makeBoneMaterial(opts={}){
  const base = opts.color || 0xede3c8;
  return new THREE.MeshPhysicalMaterial({
    color: base,
    roughness: opts.roughness ?? 0.62,
    metalness: 0.0,
    clearcoat: 0.35,
    clearcoatRoughness: 0.55,
    sheen: 0.4,
    sheenColor: new THREE.Color(0xfff6e6),
    sheenRoughness: 0.7,
    vertexColors: true,
    flatShading: false
  });
}

function applyBoneVertexColors(geo, baseHex=0xede3c8){
  geo.computeVertexNormals();
  const pos = geo.attributes.position;
  const count = pos.count;
  const colors = new Float32Array(count*3);
  const base = new THREE.Color(baseHex);
  for(let i=0;i<count;i++){
    const x=pos.getX(i), y=pos.getY(i), z=pos.getZ(i);
    const n = (Math.sin(x*4.1+y*2.3)*0.5 + Math.sin(y*5.7+z*3.1)*0.3 + Math.sin(z*6.2+x*1.7)*0.2);
    const shade = 0.90 + n*0.10;
    const warmth = 0.97 + Math.sin(x*3+z*2)*0.03;
    colors[i*3]   = Math.min(1, base.r*shade*warmth);
    colors[i*3+1] = Math.min(1, base.g*shade);
    colors[i*3+2] = Math.min(1, base.b*shade*0.97);
  }
  geo.setAttribute('color', new THREE.BufferAttribute(colors,3));
  return geo;
}

function makeLongBone(len, midR, endR, opts={}){
  const half = len/2;
  const pts = [];
  const epi = opts.epiphysisRatio ?? 0.16;
  pts.push(new THREE.Vector2(0, -half));
  pts.push(new THREE.Vector2(endR*0.95, -half));
  pts.push(new THREE.Vector2(endR, -half+len*epi*0.4));
  pts.push(new THREE.Vector2(midR*1.15, -half+len*epi));
  pts.push(new THREE.Vector2(midR, -half+len*0.30));
  pts.push(new THREE.Vector2(midR*0.92, 0));
  pts.push(new THREE.Vector2(midR, half-len*0.30));
  pts.push(new THREE.Vector2(midR*1.15, half-len*epi));
  pts.push(new THREE.Vector2(endR, half-len*epi*0.4));
  pts.push(new THREE.Vector2(endR*0.95, half));
  pts.push(new THREE.Vector2(0, half));
  const geo = new THREE.LatheGeometry(pts, opts.segments||32);
  applyBoneVertexColors(geo, opts.color||0xede3c8);
  return geo;
}

function makeFlatBone(w, h, d, opts={}){
  const geo = new THREE.BoxGeometry(w, h, d, opts.seg||4, opts.seg||4, 1);
  const pos = geo.attributes.position;
  for(let i=0;i<pos.count;i++){
    const x=pos.getX(i), y=pos.getY(i);
    pos.setZ(i, pos.getZ(i) + (x*x/(w*w) + y*y/(h*h))* (opts.curve||0.3));
  }
  geo.computeVertexNormals();
  applyBoneVertexColors(geo, opts.color||0xede3c8);
  return geo;
}

let current=null;
let autoSpin=true, labelsVisible=true, animPlaying=false, animT=0;
const pickList=[], labelAnchors=[], animatedItems=[];
let highlightedKey=null;
let darkTheme=true;
let infoPanelCollapsed=false;
let userDisplayName='';

function clearShape(){
  while(shapeGroup.children.length) shapeGroup.remove(shapeGroup.children[0]);
  pickList.length=0;
  labelAnchors.forEach(a=>a.elM.remove());
  labelAnchors.length=0;
  animatedItems.length=0;
  highlightedKey=null;
}
function addPickable(mesh,partKey,color){
  mesh.userData.partKey=partKey;
  mesh.userData.baseColor=color;
  mesh.userData.flash=0;
  shapeGroup.add(mesh);
  pickList.push(mesh);
}
function addLabel(pos,partKey,colorClass){
  if(!current) return;
  const part=ORGAN_CONTENT[current.key]&&ORGAN_CONTENT[current.key].parts[partKey];
  if(!part) return;
  const el=document.createElement('div');
  el.className='organ-label '+(colorClass||'bone');
  el.textContent=part.name;
  document.getElementById('app').appendChild(el);
  labelAnchors.push({pos:pos.clone(),partKey,elM:el});
}

function buildKemikDoku(){
  const blok = new THREE.Mesh(
    applyBoneVertexColors(new THREE.CylinderGeometry(2.0,2.0,1.4,48,1,false,0,Math.PI*1.35),0xede3c8),
    makeBoneMaterial({roughness:0.7})
  );
  blok.rotation.x = Math.PI/2;
  blok.rotation.z = -Math.PI*0.18;
  addPickable(blok,'havers',0xede3c8);

  const osteonPos = [[-0.9,0.7],[0.2,0.95],[1.1,0.4],[-1.1,-0.3],[0.0,-0.1],[1.0,-0.6],[-0.4,-1.0],[0.7,-1.2]];
  const Zface=0.72;
  osteonPos.forEach((p,idx)=>{
    const havers=new THREE.Mesh(new THREE.CylinderGeometry(0.09,0.09,0.5,16),new THREE.MeshStandardMaterial({color:0xc94a5e,emissive:0xc94a5e,emissiveIntensity:0.5,roughness:.4}));
    havers.position.set(p[0],p[1],Zface);
    havers.rotation.x=Math.PI/2;
    addPickable(havers,'havers',0xc94a5e);
    for(let r=0;r<3;r++){
      const lam=new THREE.Mesh(new THREE.TorusGeometry(0.16+r*0.11,0.028,8,28),makeBoneMaterial({roughness:0.55}));
      lam.position.set(p[0],p[1],Zface);
      if(idx===0 && r===1) addPickable(lam,'lameller',0xede3c8);
      else shapeGroup.add(lam);
    }
    for(let o=0;o<4;o++){
      const ang=(o/4)*Math.PI*2+idx;
      const rad=0.22+(o%3)*0.12;
      const ost=new THREE.Mesh(new THREE.SphereGeometry(0.045,10,10),new THREE.MeshStandardMaterial({color:0x5fd99a,emissive:0x5fd99a,emissiveIntensity:0.55}));
      ost.position.set(p[0]+Math.cos(ang)*rad,p[1]+Math.sin(ang)*rad,Zface+0.02);
      if(o===0) addPickable(ost,'osteosit',0x5fd99a);
      else shapeGroup.add(ost);
    }
  });
  const volk=new THREE.Mesh(new THREE.CylinderGeometry(0.06,0.06,2.0,12),new THREE.MeshStandardMaterial({color:0x9d7fe6,emissive:0x9d7fe6,emissiveIntensity:0.5,roughness:.4}));
  volk.position.set(0,0.3,Zface);
  volk.rotation.z=Math.PI/2;
  addPickable(volk,'volkmann',0x9d7fe6);
  const osteinPatch=new THREE.Mesh(new THREE.CircleGeometry(0.35,20),makeBoneMaterial({color:0xe0d2a8,roughness:0.7}));
  osteinPatch.position.set(-1.5,1.0,Zface+0.01);
  addPickable(osteinPatch,'ostein',0xe0d2a8);
  const ilik=new THREE.Mesh(new THREE.CylinderGeometry(0.55,0.55,1.4,24),new THREE.MeshStandardMaterial({color:0xc94a5e,roughness:.7,transparent:true,opacity:0.45,emissive:0xc94a5e,emissiveIntensity:0.2}));
  ilik.rotation.x=Math.PI/2;
  addPickable(ilik,'kemikIligi',0xc94a5e);
  addLabel(new THREE.Vector3(-0.9,1.4,Zface),'havers','muscle');
  addLabel(new THREE.Vector3(1.6,0.6,Zface),'lameller','warning');
  addLabel(new THREE.Vector3(1.3,-1.3,Zface),'osteosit','joint');
  addLabel(new THREE.Vector3(-1.9,0.4,Zface),'volkmann','cartilage');
  addLabel(new THREE.Vector3(-2.0,1.4,Zface),'ostein','bone');
}

let currentPages=[], pageIdx=0;
const infoEmoji=document.getElementById('infoEmoji');
const infoHead=document.getElementById('infoHead');
const infoText=document.getElementById('infoText');
const infoPageEl=document.getElementById('infoPage');
const navPrev=document.getElementById('navPrev');

function chunkDetailIntoPages(detail){
  if(!detail||!detail.length) return [];
  const n=detail.length;
  let targetPages = n<=2?Math.max(1,n) : n<=3?2 : n<=5?3 : n<=7?4 : n<=9?5 : 6;
  const pages=[];
  const perPage=Math.ceil(n/targetPages);
  for(let i=0;i<n;i+=perPage) pages.push(detail.slice(i,i+perPage).join(' '));
  return pages;
}

function loadOverviewTopic(){
  if(!current) return;
  const def=current.def;
  const content=ORGAN_CONTENT[current.key];
  const descText=content.desc[curLevel]||content.desc[content.desc.length-1];
  const sentences=descText.split(/(?<=\.)\s+/).filter(s=>s.trim().length>0);
  const pageCount = sentences.length<=2?1 : sentences.length<=4?2 : 3;
  const perPage=Math.ceil(sentences.length/pageCount);
  currentPages=[];
  for(let i=0;i<sentences.length;i+=perPage){
    currentPages.push({emoji:def.emoji,head:def.name,text:sentences.slice(i,i+perPage).join(' ')});
  }
  if(currentPages.length===0) currentPages=[{emoji:def.emoji,head:def.name,text:descText}];
  pageIdx=0;
  applyPage();
}

function emojiForPart(rowKey){
  const map={
    kafatasi:'💀',omurga:'🧬',kaburga:'🫁',sternum:'🛡️',humerus:'💪',femur:'🦵',tibia:'🦵',kalca:'🦴',
    osteosit:'🔬',ostein:'🧵',havers:'🩸',volkmann:'↔️',lameller:'🪐',kemikIligi:'🩸',
    uzun:'🦴',kisa:'🧊',yassi:'🛡️',duzensiz:'🧩',
    hiyalin:'🧊',elastik:'👂',fibroz:'💪',
    eklemKikirdagi:'🧊',sinovyalSivi:'💧',eklemKapsulu:'🎁',baglar:'🪢',
    cizgili:'💪',duz:'〰️',kalp:'❤️',
    zCizgisi:'📏',aktin:'🧵',miyozin:'🧶',
    asetilkolin:'⚡',kalsiyum:'🟡',atp:'🔋',kreatinFosfat:'🔶'
  };
  return map[rowKey]||null;
}

function loadRowTopic(rowKey){
  if(!current) return;
  const content=ORGAN_CONTENT[current.key];
  let row=null;
  for(const section of content.info){
    for(const r of section.rows){ if(r.key===rowKey){ row=r; break; } }
    if(row) break;
  }
  if(!row||!row.detail||!row.detail.length){ showToast('Bu madde için detay yok.'); return; }
  const def=current.def;
  const partEmoji=emojiForPart(rowKey)||def.emoji;
  const pageTexts=chunkDetailIntoPages(row.detail);
  currentPages=pageTexts.map(text=>({emoji:partEmoji,head:row.text,text:text}));
  pageIdx=0;
  applyPage();
  highlightPart(rowKey);
}

function highlightPart(rowKey){
  highlightedKey=rowKey;
  pickList.forEach(p=>{
    if(!p.material||!p.material.emissive) return;
    if(p.userData.partKey===rowKey){
      p.material.emissive.setHex(0xffd166);
      p.material.emissiveIntensity=0.85;
      p.userData.highlighted=true;
    } else {
      if(p.userData.flash<=0){
        p.material.emissive.setHex(0x000000);
        p.material.emissiveIntensity=0;
      }
      p.userData.highlighted=false;
    }
  });
}

function applyPage(){
  if(!currentPages.length) return;
  pageIdx=Math.max(0,Math.min(currentPages.length-1,pageIdx));
  const p=currentPages[pageIdx];
  infoEmoji.textContent=p.emoji;
  infoHead.textContent=p.head;
  infoText.innerHTML=p.text;
  if(currentPages.length>1) infoPageEl.innerHTML=`<span class="pg-active">${pageIdx+1}</span> / ${currentPages.length} sayfa`;
  else infoPageEl.innerHTML='<span style="opacity:0.7">Tek sayfa</span>';
  navPrev.disabled=(pageIdx===0);
  navNext.disabled=(pageIdx===currentPages.length-1);
}

navPrev.addEventListener('click',()=>{ if(pageIdx>0){pageIdx--; applyPage();} });
navNext.addEventListener('click',()=>{ if(pageIdx<currentPages.length-1){pageIdx++; applyPage();} });

function refreshInfo(){

}

const cam={theta:0.6,phi:1.15,radius:10,targetY:-0.3};
const LOOK_OFFSET_X=1.6;
let dragging=false,lastX=0,lastY=0,pinch=0;
function P(e){return e.touches?e.touches[0]:e;}
function tDist(e){
  const dx=e.touches[0].clientX-e.touches[1].clientX;
  const dy=e.touches[0].clientY-e.touches[1].clientY;
  return Math.hypot(dx,dy);
}
function down(e){
  const p=P(e); lastX=p.clientX; lastY=p.clientY; dragging=true;
  if(e.touches&&e.touches.length===2) pinch=tDist(e);
}
function move(e){
  if(!dragging) return;
  if(e.touches&&e.touches.length===2){
    const nd=tDist(e); if(pinch>0) cam.radius=Math.max(5,Math.min(22,cam.radius*pinch/nd));
    pinch=nd; return;
  }
  const p=P(e);
  const dx=(p.clientX-lastX)*0.01, dy=(p.clientY-lastY)*0.01;
  cam.theta-=dx;
  cam.phi=Math.max(0.2,Math.min(Math.PI-0.2,cam.phi-dy));
  lastX=p.clientX; lastY=p.clientY;
  autoSpin=false; document.getElementById('spinBtn').classList.add('off');
}
function up(){dragging=false; pinch=0;}
cv.addEventListener('mousedown',down);
cv.addEventListener('mousemove',move);
window.addEventListener('mouseup',up);
cv.addEventListener('touchstart',down,{passive:false});
cv.addEventListener('touchmove',e=>{e.preventDefault();move(e);},{passive:false});
cv.addEventListener('touchend',up);
cv.addEventListener('wheel',e=>{e.preventDefault();cam.radius=Math.max(5,Math.min(22,cam.radius+e.deltaY*0.01));},{passive:false});

const raycaster=new THREE.Raycaster();
const ndc=new THREE.Vector2();
let downX=0,downY=0,downT=0;
cv.addEventListener('pointerdown',e=>{downX=e.clientX; downY=e.clientY; downT=performance.now();});
cv.addEventListener('pointerup',e=>{
  if(Math.hypot(e.clientX-downX,e.clientY-downY)>8) return;
  if(performance.now()-downT>500) return;
  ndc.x=(e.clientX/innerWidth)*2-1;
  ndc.y=-(e.clientY/innerHeight)*2+1;
  raycaster.setFromCamera(ndc,camera);
  const hit=raycaster.intersectObjects(pickList,false)[0];
  if(hit&&hit.object.userData.partKey){
    const partKey=hit.object.userData.partKey;
    const part=ORGAN_CONTENT[current.key]&&ORGAN_CONTENT[current.key].parts[partKey];
    if(part){
      showToast(`<b>${part.name}</b><br>${part.job}`);
      loadRowTopic(partKey);
      if(hit.object.material&&hit.object.material.emissive){
        hit.object.material.emissive=new THREE.Color(hit.object.userData.baseColor||0xffffff);
        hit.object.material.emissiveIntensity=0.8;
        hit.object.userData.flash=1;
      }
    }
  }
});

async function captureFullScreen(){
  renderer.render(scene,camera);
  let glDataURL=null;
  try{ glDataURL=renderer.domElement.toDataURL('image/png'); }catch(e){}
  const app=document.getElementById('app');
  if(typeof html2canvas!=='function'||!glDataURL){
    const c=document.createElement('canvas');
    c.width=renderer.domElement.width; c.height=renderer.domElement.height;
    c.getContext('2d').drawImage(renderer.domElement,0,0);
    return c;
  }
  try{
    return await html2canvas(app,{
      backgroundColor:darkTheme?'#0a0e1a':'#eef1f8',
      scale:Math.min(window.devicePixelRatio||1,2),
      logging:false,
      useCORS:true,
      ignoreElements:(el)=>el.classList&&(el.classList.contains('share-overlay')||el.classList.contains('toast')),
      onclone:(doc)=>{
        const cv2=doc.querySelector('#app canvas');
        if(cv2&&glDataURL){
          const img=doc.createElement('img');
          img.src=glDataURL;
          img.style.cssText=cv2.style.cssText+';width:'+cv2.clientWidth+'px;height:'+cv2.clientHeight+'px;display:block;position:absolute;top:0;left:0;';
          cv2.parentNode.replaceChild(img,cv2);
        }
      }
    });
  }catch(e){
    const c=document.createElement('canvas');
    c.width=renderer.domElement.width; c.height=renderer.domElement.height;
    c.getContext('2d').drawImage(renderer.domElement,0,0);
    return c;
  }
}

    document.getElementById('sharePreview').src=shareCanvas.toDataURL('image/png');
    shareOverlay.classList.add('show');
  }catch(e){ showToast('⚠️ Ekran görüntüsü alınamadı.'); }
});
document.getElementById('shareClose').addEventListener('click',()=>shareOverlay.classList.remove('show'));
shareOverlay.addEventListener('click',e=>{ if(e.target.id==='shareOverlay') shareOverlay.classList.remove('show'); });

function canvasToFile(cb){
  if(!shareCanvas){ cb(null); return; }
  shareCanvas.toBlob(blob=>{
    if(!blob){ cb(null); return; }
    try{ cb(new File([blob],shareFileName(),{type:'image/png'}),blob); }
    catch(e){ cb(null,blob); }
  },'image/png');
}

// Flutter WebView'de navigator.share yoktur; varsa Flutter köprüsüyle
// native paylaşım sayfasını açarız.
function shareViaFlutter(){
  if(!shareCanvas) return false;
  if(window.FlutterShare&&typeof window.FlutterShare.postMessage==='function'){
    try{
      window.FlutterShare.postMessage(JSON.stringify({
        image:shareCanvas.toDataURL('image/png'),
        text:shareText(),
        file:shareFileName()
      }));
      shareOverlay.classList.remove('show');
      return true;
    }catch(e){}
  }
  return false;
}

document.getElementById('shareNative').addEventListener('click',()=>{
  if(shareViaFlutter()) return;
  canvasToFile(async(file)=>{
    if(file&&navigator.canShare&&navigator.canShare({files:[file]})){
      try{ await navigator.share({files:[file],title:'Qualsar 3D',text:shareText()}); shareOverlay.classList.remove('show'); return; }
      catch(e){ if(e.name==='AbortError') return; }
    }
    if(navigator.share){
      try{ await navigator.share({title:'Qualsar 3D',text:shareText()}); shareOverlay.classList.remove('show'); return; }
      catch(e){ if(e.name==='AbortError') return; }
    }
    downloadShareImage();
  });
});
document.getElementById('shareSocial').addEventListener('click',()=>{ document.getElementById('shareNative').click(); });
document.getElementById('shareDownload').addEventListener('click',()=>{ if(!shareViaFlutter()) downloadShareImage(); });

function downloadShareImage(){
  if(!shareCanvas) return;
  shareCanvas.toBlob(blob=>{
    if(!blob) return;
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download=shareFileName();
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),1500);
    showToast('💾 Kaydedildi!');
  },'image/png');
}

/* KARŞILAŞTIRMA MODU */
const COMPARE_DATA={

  kemikCesit:{ title:'🦴 Kemik Çeşitleri', cols:['Tip','Özellik','Örnek'], rows:[

};
const COMPARE_MAP={
  kemikDoku:['kemikKikirdak','kemikCesit','iskeletBolum'],
  kemikCesitleri:['kemikCesit','iskeletBolum','kemikKikirdak'],
  iskeletBolumleri:['iskeletBolum','kemikCesit','eklemTipleri'],
  kikirdak:['kemikKikirdak','eklemTipleri'],
  eklem:['eklemTipleri','iskeletBolum','kemikKikirdak'],
  kasCesitleri:['kasTipleri','kasilmaEvre'],
  sarkomer:['kasilmaEvre','kasTipleri'],
  kasilmaKimyasi:['kasilmaEvre','kasTipleri']
};
let currentCompareIndex = 0;
let currentCompareKeys = [];
function compareTablesFor(key){ return (COMPARE_MAP[key] || []).map(k => COMPARE_DATA[k]).filter(Boolean); }
function compareTableFor(key){ const arr = compareTablesFor(key); return arr[0] || null; }
function renderCompareTable(){
  const d = currentCompareKeys[currentCompareIndex];
  if(!d) return;
  const total = currentCompareKeys.length;
  const counter = total > 1 ? ` <span class="compare-counter">(${currentCompareIndex+1}/${total})</span>` : '';
  document.getElementById('compareTitle').innerHTML = d.title + counter;
  let html='<table class="compare-table"><thead><tr><th>Özellik</th>';
  d.cols.forEach(c=>html+=`<th>${c}</th>`);
  html+='</tr></thead><tbody>';
  d.rows.forEach(r=>{
    html+='<tr>';
    r.forEach((cell,i)=>html+=`<td>${cell}</td>`);
    html+='</tr>';
  });
  html+='</tbody></table>';
  document.getElementById('compareBody').innerHTML=html;
  const nextBtn = document.getElementById('compareNextBtn');
  if(nextBtn){
    if(total > 1){
      nextBtn.style.display = 'flex';
      const nextIdx = (currentCompareIndex + 1) % total;
      const nextTitle = currentCompareKeys[nextIdx].title.replace(/[⚖️🏭🧬⚡🚪🦴🫀🫁🧠🍽️🌱🐾🌿]+\s*/g, '');
      nextBtn.innerHTML = `<span>Sonraki:</span> <b>${nextTitle}</b> <span>→</span>`;
    } else { nextBtn.style.display = 'none'; }
  }
}
function openCompare(){
  if(!current) return;
  currentCompareKeys = compareTablesFor(current.key);
  if(currentCompareKeys.length === 0){ showToast('Bu konu için karşılaştırma yok.'); return; }
  currentCompareIndex = 0;
  renderCompareTable();
  document.getElementById('compareOverlay').classList.add('show');
}
document.getElementById('compareBtn').addEventListener('click',openCompare);
document.getElementById('compareClose').addEventListener('click',()=>{ document.getElementById('compareOverlay').classList.remove('show'); });
document.getElementById('compareOverlay').addEventListener('click',e=>{ if(e.target.id==='compareOverlay') e.currentTarget.classList.remove('show'); });
document.getElementById('compareNextBtn').addEventListener('click',()=>{
  if(currentCompareKeys.length <= 1) return;
  currentCompareIndex = (currentCompareIndex + 1) % currentCompareKeys.length;
  renderCompareTable();
  document.getElementById('compareBody').parentElement.scrollTop = 0;
});

    root.style.setProperty('--bg','#0a0e1a');
    root.style.setProperty('--panel','#161b2e');
    root.style.setProperty('--panel-soft','#1f2540');
    root.style.setProperty('--panel-line','#2f3a5f');

document.getElementById('fsBtn').addEventListener('click',()=>{

const tmpV=new THREE.Vector3(), tmpW=new THREE.Vector3(), tmpC=new THREE.Vector3();
function updateLabels(){
  tmpC.set(0,0,0); shapeGroup.localToWorld(tmpC);
  const dCenter=camera.position.distanceTo(tmpC);
  labelAnchors.forEach(a=>{
    if(!labelsVisible){a.elM.style.display='none'; return;}
    tmpW.copy(a.pos); shapeGroup.localToWorld(tmpW);
    const dLabel=camera.position.distanceTo(tmpW);
    if(dLabel>dCenter+0.8){a.elM.style.display='none'; return;}
    tmpV.copy(tmpW); tmpV.project(camera);
    if(tmpV.z>=1){a.elM.style.display='none'; return;}
    a.elM.style.display='block';
    a.elM.style.left=((tmpV.x*0.5+0.5)*innerWidth)+'px';
    a.elM.style.top=((-tmpV.y*0.5+0.5)*innerHeight)+'px';
  });
}

function updateAnimations(dt){
  if(!animPlaying) return;
  animT+=dt;
  if(animT>1) animT=0;
  const key=current?.key;

  if(key==='eklem'){
    const bend=Math.sin(animT*Math.PI*2)*0.35;
    animatedItems.forEach(it=>{
      if(it.type==='jointBend'){
        it.mesh.rotation.x=bend;
        it.mesh.position.y=it.baseY+Math.abs(bend)*0.15;
      }
    });
  }
  if(key==='sarkomer'){
    const contract=(Math.sin(animT*Math.PI*2-Math.PI/2)*0.5+0.5)*0.55;
    animatedItems.forEach(it=>{
      if(it.type==='sarkomerSlide'){
        const x=it.baseZ-contract;
        it.zL.position.x=-x; it.zR.position.x=x;
        it.aktinL.position.x=-x; it.aktinR.position.x=x;
      }
    });
  }
  if(key==='kasilmaKimyasi'){
    animatedItems.forEach(it=>{
      if(it.type==='calcium'){
        const spread=0.3+animT*0.8;
        it.mesh.position.x=Math.cos(it.angle)*0.75*spread;
        it.mesh.position.y=Math.sin(it.angle)*0.5*spread;
      }
    });
  }
  const seqMaps={kemikCesitleri:['uzun','kisa','yassi','duzensiz'],kikirdak:['hiyalin','elastik','fibroz'],kasCesitleri:['cizgili','duz','kalp']};
  if(seqMaps[key]){
    const order=seqMaps[key];
    const phase=1.0/order.length;
    const active=order[Math.floor(animT/phase)];
    pickList.forEach(p=>{
      if(!p.material||!p.material.emissive) return;
      if(p.userData.flash>0) return;
      if(order.includes(p.userData.partKey)){
        if(p.userData.partKey===active){
          p.material.emissive.setHex(p.userData.baseColor||0xffd166);
          p.material.emissiveIntensity=0.6;
        } else {
          p.material.emissive.setHex(0x000000);
          p.material.emissiveIntensity=0;
        }
      }
    });
  }
}

let lastTime=performance.now();
function tick(){
  requestAnimationFrame(tick);
  const now=performance.now();
  const dt=(now-lastTime)/1000;
  lastTime=now;

  if(autoSpin&&!dragging) shapeGroup.rotation.y+=0.006;

  pickList.forEach(p=>{
    if(p.userData.flash>0){
      p.userData.flash-=0.03;
      if(p.userData.flash<=0&&p.material&&p.material.emissive){
        if(p.userData.highlighted){
          p.material.emissive.setHex(0xffd166);
          p.material.emissiveIntensity=0.85;
        } else {
          p.material.emissive.setHex(0x000000);
          p.material.emissiveIntensity=0;
        }
      }
    }
  });
  if(highlightedKey){
    const pulse=0.7+Math.sin(performance.now()*0.005)*0.25;
    pickList.forEach(p=>{
      if(p.userData.highlighted&&p.userData.flash<=0&&p.material&&p.material.emissive){
        p.material.emissiveIntensity=pulse;
      }
    });
  }

  updateAnimations(dt*0.4);

  const r=cam.radius;
  camera.position.set(
    r*Math.sin(cam.phi)*Math.sin(cam.theta)+LOOK_OFFSET_X,
    r*Math.cos(cam.phi)+0.5+cam.targetY,
    r*Math.sin(cam.phi)*Math.cos(cam.theta)
  );
  camera.lookAt(LOOK_OFFSET_X,cam.targetY,0);

  updateLabels();
  renderer.render(scene,camera);
}

setLevel(2);
selectOrgan('kemikDoku');
tick();

addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
