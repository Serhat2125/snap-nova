// ---------- MODÜL 1.2: Snell Yasası (interaktif n1/n2) ----------
SubBuilders.buildSnell = function() {
  const root = new THREE.Group();
  markDynamic(root); scene.add(root); window._currentModelGroup = root;
  root.add(setupVectorLighting());
  root.add(makeGridSystem({ size: 16, divisions: 16 }));

  const S = window._sceneState;
  S.sn_angle = 45;
  S.sn_n1 = 1.0;
  S.sn_n2 = 1.5;

  const dyn = new THREE.Group(); dyn.userData.dynamic = true; root.add(dyn);
  const media = new THREE.Group(); media.userData.dynamic = true; root.add(media);

  function rebuildMedia() {
    [...media.children].forEach(c=>{media.remove(c);if(c.geometry)c.geometry.dispose();if(c.material&&c.material.dispose)c.material.dispose();});
    const op = 0.1 + (S.sn_n2-1)*0.12;
    media.add(makeTwoMedia({ w: 14, h: 9, lowColor: OCOL.water, lowOpacity: Math.min(0.4, op) }));
  }
  function rebuild() {
    [...dyn.children].forEach(c=>{dyn.remove(c);if(c.geometry)c.geometry.dispose();if(c.material&&c.material.dispose)c.material.dispose();});
    const i = _deg2rad(S.sn_angle);
    const r = refractAngle(i, S.sn_n1, S.sn_n2);
    const O = new THREE.Vector3(0, 0, 0.03);
    const L = 5;
    const inStart = new THREE.Vector3(-Math.sin(i)*L, Math.cos(i)*L, 0.03);
    dyn.add(makeRay(inStart, O, { color: OCOL.ray, r: 0.05 }));
    const t1Label = _isPrimary() ? 'Gelen ışık' : 'θ₁ = ' + S.sn_angle + '°';
    dyn.add(makeAngleArc(O, Math.PI/2, Math.PI/2 + i, { r: 1.0, color: OCOL.ray, label: t1Label, labelDirX: -1, labelDY: 0.6, labelBg: 'rgba(180,150,20,0.95)' }));
    if (r !== null) {
      const outEnd = new THREE.Vector3(Math.sin(r)*L, -Math.cos(r)*L, 0.03);
      dyn.add(makeRay(O, outEnd, { color: OCOL.refract, r: 0.05 }));
      dyn.add(makeFlowRay([inStart, O, outEnd], { color: 0xffffff, count: 6, speed: 0.5 }));
      const t2Label = _isPrimary() ? 'Kırılan ışık' : 'θ₂ = ' + (r*180/Math.PI).toFixed(0) + '°';
      dyn.add(makeAngleArc(O, -Math.PI/2 + r, -Math.PI/2, { r: 1.0, color: OCOL.refract, label: t2Label, labelDirX: -1, labelDY: -0.6, labelBg: 'rgba(200,110,40,0.95)' }));
    } else {
      const refEnd = new THREE.Vector3(Math.sin(i)*L, Math.cos(i)*L, 0.03);
      dyn.add(makeRay(O, refEnd, { color: OCOL.reflect, r: 0.05 }));
      dyn.add(makeFlowRay([inStart, O, refEnd], { color: 0xffffff, count: 6, speed: 0.5 }));
      dyn.add(makeMeasureLabel('TAM YANSIMA', [2, 2.5, 0], 'rgba(106,214,255,0.95)'));
    }
    dyn.add(makeMeasureLabel('Normal (N)', [0.1, 3.3, 0], 'rgba(159,176,216,0.9)'));
  }
  rebuildMedia(); rebuild();

  setSceneSliders([
    { type: 'section', label: 'Snell: n₁sinθ₁=n₂sinθ₂' },
    { type: 'slider', label: 'Gelme açısı θ₁', min: 0, max: 85, step: 5, unit: '°',
      getValue: () => S.sn_angle, setValue: (v)=>{ S.sn_angle=v; rebuild(); }, format:(x)=>x.toFixed(0) },
    { type: 'slider', label: 'Üst ortam n₁', min: 1.0, max: 2.0, step: 0.1, unit: '',
      getValue: () => S.sn_n1, setValue: (v)=>{ S.sn_n1=v; rebuild(); }, format:(x)=>x.toFixed(2) },
    { type: 'slider', label: 'Alt ortam n₂', min: 1.0, max: 2.5, step: 0.1, unit: '',
      getValue: () => S.sn_n2, setValue: (v)=>{ S.sn_n2=v; rebuildMedia(); rebuild(); }, format:(x)=>x.toFixed(2) },
    { type: 'section', label: 'Sonuç' },
    { type: 'display', label: 'Kırılma açısı θ₂', highlight: true, getValue: () => { const r=refractAngle(_deg2rad(S.sn_angle),S.sn_n1,S.sn_n2); return r===null?'TAM YANSIMA':(r*180/Math.PI).toFixed(1)+'°'; } },
    { type: 'formula', text: 'n₁·sinθ₁ = n₂·sinθ₂',
      getValue: () => S.sn_n1.toFixed(1) + '·sin' + S.sn_angle + '° = ' + S.sn_n2.toFixed(1) + '·sinθ₂' }
  ], { title: 'Snell Yasası' });

  addInfo3DLabels([
    { text: { ilkokul:'⬆️ 1. ortam', ortaokul:'⬆️ Üst ortam', lise:'⬆️ n₁', tyt_ayt:'⬆️ n₁ (gelen)' },
      position: [-4, 3, 0], target: [-2, 2, 0], color: '#cfe6ff' },
    { text: { ilkokul:'⬇️ 2. ortam', ortaokul:'⬇️ Alt ortam', lise:'⬇️ n₂', tyt_ayt:'⬇️ n₂ (kırılan)' },
      position: [-4, -3, 0], target: [-2, -2, 0], color: '#2a8ad4' }
  ]);
};

// ---------- MODÜL 1.3: Tam Yansıma ve Sınır Açısı ----------
SubBuilders.buildTamYansima = function() {
  const root = new THREE.Group();
  markDynamic(root); scene.add(root); window._currentModelGroup = root;
  root.add(setupVectorLighting());
  root.add(makeGridSystem({ size: 16, divisions: 16 }));

  const S = window._sceneState;
  S.ty_angle = 30;
  S.ty_n1 = 1.5;

  const dyn = new THREE.Group(); dyn.userData.dynamic = true; root.add(dyn);
  root.add(makeTwoMedia({ w: 14, h: 9, lowColor: OCOL.glass, lowOpacity: 0.28 }));

  function sinirAcisi() { return Math.asin(1.0 / S.ty_n1) * 180/Math.PI; }

  function rebuild() {
    [...dyn.children].forEach(c=>{dyn.remove(c);if(c.geometry)c.geometry.dispose();if(c.material&&c.material.dispose)c.material.dispose();});
    const n1 = S.ty_n1, n2 = 1.0;
    const i = _deg2rad(S.ty_angle);
    const r = refractAngle(i, n1, n2);
    const O = new THREE.Vector3(0, 0, 0.03);
    const L = 5;
    const inStart = new THREE.Vector3(-Math.sin(i)*L, -Math.cos(i)*L, 0.03);
    dyn.add(makeRay(inStart, O, { color: OCOL.ray, r: 0.05 }));
    dyn.add(makeAngleArc(O, -Math.PI/2 - i, -Math.PI/2, { r: 1.0, color: OCOL.ray, label: 'i = ' + S.ty_angle + '°', labelDirX: -1, labelDY: -0.4, labelBg: 'rgba(180,150,20,0.95)' }));
    const ths = Math.asin(1.0/S.ty_n1);
    dyn.add(makeAngleArc(O, -Math.PI/2 - ths, -Math.PI/2, { r: 2.5, color: 0x9fb0d8, noFill: true, label: 'θs = ' + (ths*180/Math.PI).toFixed(0) + '° (sınır)', labelDirX: -1, labelDY: -2.0, labelBg: 'rgba(120,135,170,0.95)' }));
    if (r !== null) {
      const outEnd = new THREE.Vector3(Math.sin(r)*L, Math.cos(r)*L, 0.03);
      dyn.add(makeRay(O, outEnd, { color: OCOL.refract, r: 0.05 }));
      dyn.add(makeAngleArc(O, Math.PI/2, Math.PI/2 + r, { r: 1.0, color: OCOL.refract, label: 'r = ' + (r*180/Math.PI).toFixed(0) + '°', labelDirX: 1, labelDY: 0.6, labelBg: 'rgba(200,110,40,0.95)' }));
      dyn.add(makeFlowRay([inStart, O, outEnd], { color: 0xffffff, count: 6, speed: 0.5 }));
    }
    const refEnd = new THREE.Vector3(Math.sin(i)*L, -Math.cos(i)*L, 0.03);
    dyn.add(makeRay(O, refEnd, { color: OCOL.reflect, r: r===null?0.05:0.03, arrow: r===null }));
    if (r === null) dyn.add(makeFlowRay([inStart, O, refEnd], { color: 0xffffff, count: 6, speed: 0.5 }));
    dyn.add(makeMeasureLabel('Normal (N)', [0.1, 3.3, 0], 'rgba(159,176,216,0.9)'));
    if (r === null) dyn.add(makeMeasureLabel('TAM YANSIMA ✓', [2.5, -1.5, 0], 'rgba(106,214,255,0.95)'));
  }
  rebuild();

  setSceneSliders([
    { type: 'section', label: 'Tam Yansıma' },
    { type: 'slider', label: 'Gelme açısı i', min: 0, max: 85, step: 5, unit: '°',
      getValue: () => S.ty_angle, setValue: (v)=>{ S.ty_angle=v; rebuild(); }, format:(x)=>x.toFixed(0) },
    { type: 'presets', activeIdx: 0, options: [
      { label: '💧 Su→Hava (sınır 49°)', action: ()=>{ S.ty_n1=1.33; rebuild(); } },
      { label: '🪟 Cam→Hava (sınır 42°)', action: ()=>{ S.ty_n1=1.5; rebuild(); } },
      { label: '💎 Elmas→Hava (sınır 24°)', action: ()=>{ S.ty_n1=2.42; rebuild(); } }
    ]},
    { type: 'section', label: 'Sonuç' },
    { type: 'display', label: 'Sınır açısı', highlight: true, getValue: () => sinirAcisi().toFixed(1) + '°' },
    { type: 'display', label: 'Durum', getValue: () => S.ty_angle > sinirAcisi() ? 'TAM YANSIMA' : 'Kırılır' },
    { type: 'formula', text: 'sin(sınır açısı) = n₂/n₁',
      getValue: () => 'sinθs = 1/' + S.ty_n1.toFixed(2) + ' → θs = ' + sinirAcisi().toFixed(0) + '°' }
  ], { title: 'Tam Yansıma' });

  addInfo3DLabels([
    { text: { ilkokul:'💨 Hava (üst)', ortaokul:'💨 Az yoğun (üst)', lise:'💨 n₂ (az yoğun)', tyt_ayt:'💨 n₂<n₁' },
      position: [-4, 3, 0], target: [-2, 2, 0], color: '#cfe6ff' },
    { text: { ilkokul:'🪟 Cam (alt)', ortaokul:'🪟 Çok yoğun (alt)', lise:'🪟 n₁ (yoğun)', tyt_ayt:'🪟 n₁>n₂' },
      position: [-4, -3, 0], target: [-2, -2, 0], color: '#aadfff' }
  ]);
};

// ---------- MODÜL 2.1: Görünür Derinlik ----------
SubBuilders.buildGorunurDerinlik = function() {
  const root = new THREE.Group();
  markDynamic(root); scene.add(root); window._currentModelGroup = root;
  root.add(setupVectorLighting());
  root.add(makeGridSystem({ size: 16, divisions: 16 }));

  const S = window._sceneState;
  S.gd_n = 1.33;
  S.gd_depth = 2.5;

  const dyn = new THREE.Group(); dyn.userData.dynamic = true; root.add(dyn);
  root.add(makeTwoMedia({ w: 14, h: 9, lowColor: OCOL.water, lowOpacity: 0.22 }));

  function rebuild() {
    [...dyn.children].forEach(c=>{dyn.remove(c);if(c.geometry)c.geometry.dispose();if(c.material&&c.material.dispose)c.material.dispose();});
    const h = S.gd_depth;
    const hPrime = h / S.gd_n;
    const fishX = -0.6;
    const fish = makeMarker(new THREE.Vector3(fishX, -h, 0.05), { color: OCOL.object, r: 0.22 });
    dyn.add(fish);
    const ghost = makeMarker(new THREE.Vector3(fishX, -hPrime, 0.05), { color: 0xff5252, r: 0.18 });
    ghost.material.opacity = 0.6; ghost.material.transparent = true;
    dyn.add(ghost);
    const eyePos = new THREE.Vector3(2.6, 3, 0.05);
    dyn.add(makeMarker(eyePos, { color: 0xffe14d, r: 0.16 }));
    const surfPt = new THREE.Vector3(0.9, 0, 0.05);
    dyn.add(makeRay(fish.position, surfPt, { color: OCOL.ray, r: 0.04, arrow: false }));
    dyn.add(makeRay(surfPt, eyePos, { color: OCOL.refract, r: 0.04, arrow: false }));
    dyn.add(makeFlowRay([fish.position.clone(), surfPt.clone(), eyePos.clone()], { color: 0xffffff, count: 5, speed: 0.5, r: 0.09 }));
    dyn.add(makeDashedLine(eyePos, ghost.position, { color: 0xff5252, dash: 0.2, gap: 0.15, opacity: 0.7 }));
    dyn.add(makeDimension(new THREE.Vector3(-4.2, 0, 0), new THREE.Vector3(-4.2, -h, 0), 'h = ' + h.toFixed(1), { color: 0x3ed673, offset: [-0.6,0,0] }));
    dyn.add(makeDimension(new THREE.Vector3(-2.6, 0, 0), new THREE.Vector3(-2.6, -hPrime, 0), "h' = " + hPrime.toFixed(2), { color: 0xff5252, offset: [-0.6,0,0] }));
    dyn.add(makeDashedLine(new THREE.Vector3(-4.2, -h, 0), new THREE.Vector3(fishX, -h, 0), { color: 0x3ed673, dash:0.15, gap:0.12, opacity:0.4 }));
    dyn.add(makeDashedLine(new THREE.Vector3(-2.6, -hPrime, 0), new THREE.Vector3(fishX, -hPrime, 0), { color: 0xff5252, dash:0.15, gap:0.12, opacity:0.4 }));
  }
  rebuild();

  setSceneSliders([
    { type: 'section', label: 'Görünür Derinlik' },
    { type: 'slider', label: 'Gerçek derinlik h', min: 1.5, max: 3.5, step: 0.5, unit: '',
      getValue: () => S.gd_depth, setValue: (v)=>{ S.gd_depth=v; rebuild(); }, format:(x)=>x.toFixed(1) },
    { type: 'presets', activeIdx: 0, options: [
      { label: '💧 Su (n=1.33)', action: ()=>{ S.gd_n=1.33; rebuild(); } },
      { label: '🪟 Cam (n=1.5)', action: ()=>{ S.gd_n=1.5; rebuild(); } }
    ]},
    { type: 'section', label: 'Sonuç' },
    { type: 'display', label: 'Görünür derinlik', highlight: true, getValue: () => (S.gd_depth/S.gd_n).toFixed(2) },
    { type: 'display', label: 'Cisim', getValue: () => 'Sığ görünür (yukarıda)' },
    { type: 'formula', text: "h'/h = n₂/n₁",
      getValue: () => "h' = " + S.gd_depth.toFixed(1) + "/" + S.gd_n.toFixed(2) + " = " + (S.gd_depth/S.gd_n).toFixed(2) }
  ], { title: 'Görünür Derinlik' });

  addInfo3DLabels([
    { text: { ilkokul:'🐟 Gerçek balık', ortaokul:'🐟 Gerçek yer', lise:'🐟 Gerçek konum (h)', tyt_ayt:'🐟 Gerçek derinlik h' },
      position: [-3.5, -4.2, 0], target: [-0.6, -S.gd_depth, 0], color: '#3ed673' },
    { text: { ilkokul:'👀 Burada görünür', ortaokul:'👀 Görünen yer', lise:"👀 Görünür konum (h')", tyt_ayt:"👀 Görünür derinlik h'" },
      position: [3.2, -2.2, 0], target: [-0.6, -S.gd_depth/S.gd_n, 0], color: '#ff5252' },
    { text: { ilkokul:'👁️ Göz', ortaokul:'👁️ Gözlemci', lise:'👁️ Göz (havada)', tyt_ayt:'👁️ Gözlemci (n=1)' },
      position: [4.2, 3.4, 0], target: [2.6, 3, 0], color: '#ffe14d' }
  ]);
};

// ---------- MODÜL 2.2: Prizma ve Renkler ----------
SubBuilders.buildPrizma = function() {
  const root = new THREE.Group();
  markDynamic(root); scene.add(root); window._currentModelGroup = root;
  root.add(setupVectorLighting());
  root.add(makeGridSystem({ size: 16, divisions: 16 }));

  const S = window._sceneState;
  S.pr_spread = 1.0;

  const dyn = new THREE.Group(); dyn.userData.dynamic = true; root.add(dyn);

  const tri = new THREE.Shape();
  tri.moveTo(0, 1.8); tri.lineTo(-1.6, -1.2); tri.lineTo(1.6, -1.2); tri.lineTo(0, 1.8);
  const prismGeo = new THREE.ExtrudeGeometry(tri, { depth: 1.6, bevelEnabled: false });
  prismGeo.translate(0, 0, -0.8);
  const prismMat = new THREE.MeshStandardMaterial({ color: 0xaadfff, transparent: true, opacity: 0.35, roughness: 0.1, metalness: 0.1 });
  const prism = new THREE.Mesh(prismGeo, prismMat); prism.castShadow = true; dyn.add(prism);
  dyn.add(new THREE.LineSegments(new THREE.EdgesGeometry(prismGeo), new THREE.LineBasicMaterial({ color: 0x7fc8ff, transparent: true, opacity: 0.6 })));

  function rebuild() {
    [...dyn.children].forEach(c=>{ if(c!==prism && c.type==='Group'){dyn.remove(c);} });
    const entry = new THREE.Vector3(-1.0, 0.4, 0.02);
    const inStart = new THREE.Vector3(-5, 1.6, 0.02);
    dyn.add(makeRay(inStart, entry, { color: 0xffffff, r: 0.05 }));
    dyn.add(makeFlowRay([inStart.clone(), entry.clone()], { color: 0xffffff, count: 4, speed: 0.5, r: 0.1 }));
    const colors = [
      { c: 0xff3030, off: -0.0 },
      { c: 0xff9a3d, off: 0.12 },
      { c: 0xffe14d, off: 0.22 },
      { c: 0x3ed673, off: 0.34 },
      { c: 0x4a90e2, off: 0.46 },
      { c: 0x8a4aff, off: 0.6 }
    ];
    const exit = new THREE.Vector3(0.9, -0.4, 0.02);
    colors.forEach(col => {
      const dir = new THREE.Vector3(1, -0.3 - col.off*S.pr_spread, 0).normalize();
      const end = exit.clone().add(dir.multiplyScalar(4.5));
      dyn.add(makeRay(exit, end, { color: col.c, r: 0.035, arrow: false }));
      dyn.add(makeFlowRay([exit.clone(), end.clone()], { color: col.c, count: 3, speed: 0.5, r: 0.07 }));
    });
    dyn.add(makeMeasureLabel('Beyaz ışık', [-3.5, 1.9, 0], 'rgba(255,255,255,0.9)'));
    dyn.add(makeMeasureLabel('🔴 Kırmızı (en az)', [4.2, -1, 0], 'rgba(255,48,48,0.9)'));
    dyn.add(makeMeasureLabel('🟣 Mor (en çok)', [3.8, -3, 0], 'rgba(138,74,255,0.9)'));
  }
  rebuild();

  setSceneSliders([
    { type: 'section', label: 'Prizma ve Renkler' },
    { type: 'slider', label: 'Ayrışma (dispersiyon)', min: 0.4, max: 1.6, step: 0.2, unit: '×',
      getValue: () => S.pr_spread, setValue: (v)=>{ S.pr_spread=v; rebuild(); }, format:(x)=>x.toFixed(1) },
    { type: 'section', label: 'Bilgi' },
    { type: 'display', label: 'En çok kırılan', highlight: true, getValue: () => 'Mor (λ küçük)' },
    { type: 'display', label: 'En az kırılan', getValue: () => 'Kırmızı (λ büyük)' },
    { type: 'formula', text: 'Beyaz ışık = tüm renkler · n_mor > n_kırmızı' }
  ], { title: 'Prizma ve Renkler' });

  addInfo3DLabels([
    { text: { ilkokul:'🔺 Cam prizma', ortaokul:'🔺 Üçgen prizma', lise:'🔺 Prizma (cam)', tyt_ayt:'🔺 Prizma (dispersiyon)' },
      position: [0, 2.6, 0], target: [0, 0.6, 0], color: '#aadfff' },
    { text: { ilkokul:'🌈 Renklere ayrılır', ortaokul:'🌈 Renk ayrışması', lise:'🌈 Spektrum', tyt_ayt:'🌈 Dispersiyon (renk ayrımı)' },
      position: [4.5, 0.5, 0], target: [3, -1.2, 0], color: '#3ed673' }
  ]);
};

// ---------- MODÜL 2.3: Mercek Türleri (ince/kalın kenarlı) ----------
SubBuilders.buildMercekTur = function() {
  const root = new THREE.Group();
  markDynamic(root); scene.add(root); window._currentModelGroup = root;
  root.add(setupVectorLighting());
  root.add(makeGridSystem({ size: 16, divisions: 16 }));

  const S = window._sceneState;
  S.mt_type = 'convex';
  S.mt_f = 3.0;

  const dyn = new THREE.Group(); dyn.userData.dynamic = true; root.add(dyn);
  root.add(makeSolidLine(new THREE.Vector3(-7,0,0), new THREE.Vector3(7,0,0), { color: window._lightMode ? 0x5a6a88 : 0x9fb0d8, opacity: window._lightMode ? 0.6 : 0.4 }));

  function rebuild() {
    [...dyn.children].forEach(c=>{dyn.remove(c);if(c.geometry)c.geometry.dispose();if(c.material&&c.material.dispose)c.material.dispose();});
    const lens = makeLens(S.mt_type, { h: 4.2, w: 0.9 });
    dyn.add(lens);
    const f = S.mt_f;
    if (S.mt_type === 'convex') {
      dyn.add(makeMarker(new THREE.Vector3(f, 0, 0.05), { color: OCOL.focus, r: 0.13 }));
      dyn.add(makeMarker(new THREE.Vector3(-f, 0, 0.05), { color: OCOL.focus, r: 0.13 }));
    } else {
      dyn.add(makeMarker(new THREE.Vector3(-f, 0, 0.05), { color: OCOL.focus, r: 0.11 }));
      dyn.add(makeMarker(new THREE.Vector3(f, 0, 0.05), { color: OCOL.focus, r: 0.11 }));
    }
    const ys = [1.3, 0, -1.3];
    ys.forEach(y => {
      const hit = new THREE.Vector3(0, y, 0.04);
      const inStart = new THREE.Vector3(-6, y, 0.04);
      dyn.add(makeRay(inStart, hit, { color: OCOL.ray, r: 0.04, arrow: false }));
      if (S.mt_type === 'convex') {
        const focusPt = new THREE.Vector3(f, 0, 0.04);
        dyn.add(makeRay(hit, focusPt, { color: OCOL.refract, r: 0.04, arrow: false }));
        dyn.add(makeFlowRay([inStart.clone(), hit.clone(), focusPt.clone()], { color: 0xffffff, count: 4, speed: 0.5, r: 0.08 }));
        if (y !== 0) { const dir = focusPt.clone().sub(hit).normalize(); dyn.add(makeRay(focusPt, focusPt.clone().add(dir.multiplyScalar(3)), { color: OCOL.refract, r: 0.025, arrow: false })); }
      } else {
        if (y === 0) {
          const endC = new THREE.Vector3(6, 0, 0.04);
          dyn.add(makeRay(hit, endC, { color: OCOL.refract, r: 0.04, arrow: false }));
          dyn.add(makeFlowRay([inStart.clone(), hit.clone(), endC.clone()], { color: 0xffffff, count: 4, speed: 0.5, r: 0.08 }));
        }
        else {
          const virtualF = new THREE.Vector3(-f, 0, 0.04);
          const dir = hit.clone().sub(virtualF).normalize();
          const end = hit.clone().add(dir.multiplyScalar(5));
          dyn.add(makeRay(hit, end, { color: OCOL.refract, r: 0.04, arrow: false }));
          dyn.add(makeFlowRay([inStart.clone(), hit.clone(), end.clone()], { color: 0xffffff, count: 4, speed: 0.5, r: 0.08 }));
          dyn.add(makeDashedLine(hit, virtualF, { color: OCOL.refract, dash: 0.18, gap: 0.12, opacity: 0.5 }));
        }
      }
    });
    dyn.add(makeMeasureLabel(S.mt_type==='convex'?'F (gerçek odak)':'F (sanal odak)', [f+0.3, 0.6, 0], 'rgba(255,82,82,0.92)'));
    dyn.add(makeMeasureLabel("F'", [-f-0.3, 0.6, 0], 'rgba(255,82,82,0.9)'));
    dyn.add(makeSpan(new THREE.Vector3(0, 2.7, 0), new THREE.Vector3(f, 2.7, 0), 'f = ' + f.toFixed(1), { color: OCOL.focus, offset:[0,0.4,0] }));
    dyn.add(makeSpan(new THREE.Vector3(-f, -2.7, 0), new THREE.Vector3(0, -2.7, 0), 'f = ' + f.toFixed(1), { color: OCOL.focus, offset:[0,-0.4,0] }));
    dyn.add(makeMeasureLabel('O', [0, -0.55, 0], 'rgba(159,176,216,0.9)'));
  }
  rebuild();

  setSceneSliders([
    { type: 'section', label: 'Mercek Türü' },
    { type: 'presets', activeIdx: 0, options: [
      { label: '🔎 İnce kenarlı (toplar)', action: ()=>{ S.mt_type='convex'; rebuild(); } },
      { label: '🔆 Kalın kenarlı (dağıtır)', action: ()=>{ S.mt_type='concave'; rebuild(); } }
    ]},
    { type: 'slider', label: 'Odak uzaklığı f', min: 2, max: 4.5, step: 0.5, unit: '',
      getValue: () => S.mt_f, setValue: (v)=>{ S.mt_f=v; rebuild(); }, format:(x)=>x.toFixed(1) },
    { type: 'section', label: 'Bu Mercek' },
    { type: 'display', label: 'Tür', highlight: true, getValue: () => S.mt_type==='convex' ? 'İnce kenarlı (yakınsak)' : 'Kalın kenarlı (ıraksak)' },
    { type: 'display', label: 'Işığı', getValue: () => S.mt_type==='convex' ? 'Odakta TOPLAR' : 'DAĞITIR' },
    { type: 'display', label: 'Odak', getValue: () => S.mt_type==='convex' ? 'Gerçek (f>0)' : 'Sanal (f<0)' },
    { type: 'formula', text: '1/f = (n−1)(1/R₁ − 1/R₂)' }
  ], { title: 'Mercek Türleri' });

  addInfo3DLabels([
    { text: { ilkokul:'🔎 Mercek', ortaokul:'🔎 Mercek', lise:'🔎 Mercek (cam)', tyt_ayt:'🔎 İnce/kalın kenarlı' },
      position: [0, 2.8, 0], target: [0, 1.5, 0], color: '#aadfff' },
    { text: { ilkokul:'➡️ Işınlar gelir', ortaokul:'➡️ Paralel ışınlar', lise:'➡️ Paralel ışın demeti', tyt_ayt:'➡️ Eksene paralel ışınlar' },
      position: [-5, 2.2, 0], target: [-4, 1.3, 0], color: '#ffe14d' },
    { text: { ilkokul:'🎯 Odak', ortaokul:'🎯 Odak noktası F', lise:'🎯 Odak F', tyt_ayt:'🎯 Odak (gerçek/sanal)' },
      position: [S.mt_f+0.5, -1.2, 0], target: [S.mt_f, 0, 0], color: '#ff5252' }
  ]);
};

// ---------- MODÜL 3.1: Mercekte Görüntü Oluşumu ----------
SubBuilders.buildMercekGoruntu = function() {
  const root = new THREE.Group();
  markDynamic(root); scene.add(root); window._currentModelGroup = root;
  root.add(setupVectorLighting());
  root.add(makeGridSystem({ size: 16, divisions: 16 }));

  const S = window._sceneState;
  S.mg_d = 6.0;
  S.mg_f = 2.0;

  const dyn = new THREE.Group(); dyn.userData.dynamic = true; root.add(dyn);
  root.add(makeSolidLine(new THREE.Vector3(-9,0,0), new THREE.Vector3(9,0,0), { color: window._lightMode ? 0x5a6a88 : 0x9fb0d8, opacity: window._lightMode ? 0.6 : 0.4 }));

  function rebuild() {
    [...dyn.children].forEach(c=>{dyn.remove(c);if(c.geometry)c.geometry.dispose();if(c.material&&c.material.dispose)c.material.dispose();});
    const f = S.mg_f, d = S.mg_d;
    const lens = makeLens('convex', { h: 4.5, w: 0.8 }); dyn.add(lens);
    dyn.add(makeMarker(new THREE.Vector3(f,0,0.05), { color: OCOL.focus, r: 0.12 }));
    dyn.add(makeMarker(new THREE.Vector3(-f,0,0.05), { color: OCOL.focus, r: 0.12 }));
    dyn.add(makeMarker(new THREE.Vector3(2*f,0,0.05), { color: 0x6ad6ff, r: 0.09 }));
    dyn.add(makeMarker(new THREE.Vector3(-2*f,0,0.05), { color: 0x6ad6ff, r: 0.09 }));
    const objH = 1.6;
    const objX = -d;
    const objTop = new THREE.Vector3(objX, objH, 0.05);
    const obj = makeObjectArrow(objH, { color: OCOL.object }); obj.position.set(objX, 0, 0.05); dyn.add(obj);
    let dPrime = (d === f) ? Infinity : (f*d)/(d-f);
    const m = -dPrime/d;
    const imgH = objH * m;
    const hit1 = new THREE.Vector3(0, objH, 0.04);
    dyn.add(makeRay(objTop, hit1, { color: OCOL.ray, r: 0.035, arrow:false }));
    if (isFinite(dPrime) && Math.abs(dPrime) < 12) {
      const imgX = dPrime;
      const imgTop = new THREE.Vector3(imgX, imgH, 0.05);
      const fPt = new THREE.Vector3(f, 0, 0.04);
      const dir1 = fPt.clone().sub(hit1).normalize();
      const paraEnd = hit1.clone().add(dir1.multiplyScalar(Math.abs(imgX)+2));
      dyn.add(makeRay(hit1, paraEnd, { color: OCOL.refract, r: 0.035, arrow:false }));
      const cenEnd = new THREE.Vector3(imgX*1.3, imgH*1.3, 0.04);
      dyn.add(makeRay(objTop, cenEnd, { color: 0x8a4aff, r: 0.03, arrow:false }));
      dyn.add(makeFlowRay([objTop.clone(), hit1.clone(), paraEnd.clone()], { color: 0xffffff, count: 4, speed: 0.5, r: 0.08 }));
      dyn.add(makeFlowRay([objTop.clone(), cenEnd.clone()], { color: 0xc9a8ff, count: 3, speed: 0.5, r: 0.07 }));
      const img = makeObjectArrow(imgH, { color: 0xff5252 }); img.position.set(imgX, 0, 0.05); dyn.add(img);
      makeLabeledPoint(dyn, [imgX, imgH, 0.05], [imgX + 1.8, (imgH>0?imgH+1.4:imgH-1.4), 0], 'Görüntü', { color: '#ff5252' });
      dyn.add(makeSpan(new THREE.Vector3(0, -3.1, 0), new THREE.Vector3(imgX, -3.1, 0), "d' = " + Math.abs(dPrime).toFixed(1), { color: 0xff5252, offset:[0,-0.4,0] }));
    }
    makeLabeledPoint(dyn, [objX, objH, 0.05], [objX - 1.6, objH + 1.4, 0], 'Cisim', { color: '#3ed673' });
    const tickLabel = (x, y, txt, bg) => {
      dyn.add(makeSolidLine(new THREE.Vector3(x,0,0.04), new THREE.Vector3(x,y,0.04), { color: window._lightMode ? 0x5a6a88 : 0x9fb0d8, opacity: window._lightMode ? 0.6 : 0.4 }));
      dyn.add(makeMeasureLabel(txt, [x, y + (y>0?0.2:-0.2), 0], bg));
    };
    dyn.add(makeMeasureLabel('O', [0, 0.55, 0], 'rgba(159,176,216,0.9)'));
    tickLabel(f, -0.75, 'F', 'rgba(255,82,82,0.9)');
    tickLabel(-f, -0.75, "F'", 'rgba(255,82,82,0.9)');
    tickLabel(2*f, -1.4, '2F', 'rgba(106,214,255,0.9)');
    tickLabel(-2*f, -1.4, "2F'", 'rgba(106,214,255,0.9)');
    dyn.add(makeSpan(new THREE.Vector3(objX, -2.3, 0), new THREE.Vector3(0, -2.3, 0), 'd = ' + d.toFixed(1), { color: 0x3ed673, offset:[0,-0.4,0] }));
    dyn.add(makeSpan(new THREE.Vector3(0, 2.7, 0), new THREE.Vector3(f, 2.7, 0), 'f = ' + f.toFixed(1), { color: OCOL.focus, offset:[0,0.4,0] }));
  }
  rebuild();

  function durum() {
    const f = S.mg_f, d = S.mg_d;
    if (d > 2*f) return 'Küçük, ters, gerçek';
    if (Math.abs(d-2*f)<0.3) return 'Eşit, ters, gerçek';
    if (d > f) return 'Büyük, ters, gerçek';
    return 'Büyük, düz, sanal (büyüteç)';
  }
  setSceneSliders([
    { type: 'section', label: 'Mercekte Görüntü' },
    { type: 'slider', label: 'Cisim uzaklığı d', min: 1, max: 7, step: 0.5, unit: '',
      getValue: () => S.mg_d, setValue: (v)=>{ S.mg_d=v; rebuild(); }, format:(x)=>x.toFixed(1) },
    { type: 'slider', label: 'Odak f', min: 1.5, max: 3, step: 0.5, unit: '',
      getValue: () => S.mg_f, setValue: (v)=>{ S.mg_f=v; rebuild(); }, format:(x)=>x.toFixed(1) },
    { type: 'section', label: 'Görüntü' },
    { type: 'display', label: 'Özellik', highlight: true, getValue: () => durum() },
    { type: 'display', label: 'Konum', getValue: () => S.mg_d > 2*S.mg_f ? 'F-2F arası' : (S.mg_d>S.mg_f ? '2F dışı' : 'Mercek arkası (sanal)') },
    { type: 'formula', text: "1/f = 1/d + 1/d'" }
  ], { title: 'Mercekte Görüntü' });

  addInfo3DLabels([
    { text: { ilkokul:'🔎 Mercek', ortaokul:'🔎 İnce kenarlı', lise:'🔎 Yakınsak mercek', tyt_ayt:'🔎 İnce kenarlı (f>0)' },
      position: [0, 3.6, 0], target: [0, 2.2, 0], color: '#aadfff' }
  ]);
};

// ---------- MODÜL 3.2: Mercek Denklemi (1/f=1/d+1/d') ----------
SubBuilders.buildMercekDenklem = function() {
  const root = new THREE.Group();
  markDynamic(root); scene.add(root); window._currentModelGroup = root;
  root.add(setupVectorLighting());
  root.add(makeGridSystem({ size: 16, divisions: 16 }));

  const S = window._sceneState;
  S.md_d = 5.0;
  S.md_f = 2.0;

  const dyn = new THREE.Group(); dyn.userData.dynamic = true; root.add(dyn);
  root.add(makeSolidLine(new THREE.Vector3(-9,0,0), new THREE.Vector3(9,0,0), { color: window._lightMode ? 0x5a6a88 : 0x9fb0d8, opacity: window._lightMode ? 0.6 : 0.4 }));

  function dPrime(){ const f=S.md_f,d=S.md_d; return (d===f)?Infinity:(f*d)/(d-f); }
  function buyutme(){ return -dPrime()/S.md_d; }

  function rebuild() {
    [...dyn.children].forEach(c=>{dyn.remove(c);if(c.geometry)c.geometry.dispose();if(c.material&&c.material.dispose)c.material.dispose();});
    const f = S.md_f, d = S.md_d;
    const lens = makeLens('convex', { h: 4.5, w: 0.8 }); dyn.add(lens);
    dyn.add(makeMarker(new THREE.Vector3(f,0,0.05), { color: OCOL.focus, r: 0.12 }));
    dyn.add(makeMarker(new THREE.Vector3(-f,0,0.05), { color: OCOL.focus, r: 0.12 }));
    const objH = 1.4;
    const obj = makeObjectArrow(objH, { color: OCOL.object }); obj.position.set(-d, 0, 0.05); dyn.add(obj);
    dyn.add(makeMarker(new THREE.Vector3(2*f,0,0.05), { color: 0x6ad6ff, r: 0.09 }));
    dyn.add(makeMarker(new THREE.Vector3(-2*f,0,0.05), { color: 0x6ad6ff, r: 0.09 }));
    const tickLabel = (x, y, txt, bg) => {
      dyn.add(makeSolidLine(new THREE.Vector3(x,0,0.04), new THREE.Vector3(x,y,0.04), { color: window._lightMode ? 0x5a6a88 : 0x9fb0d8, opacity: window._lightMode ? 0.6 : 0.4 }));
      dyn.add(makeMeasureLabel(txt, [x, y-0.2, 0], bg));
    };
    dyn.add(makeMeasureLabel('O', [0, 0.55, 0], 'rgba(159,176,216,0.9)'));
    tickLabel(f, -0.75, 'F', 'rgba(255,82,82,0.9)');
    tickLabel(-f, -0.75, "F'", 'rgba(255,82,82,0.9)');
    tickLabel(2*f, -1.4, '2F', 'rgba(106,214,255,0.9)');
    tickLabel(-2*f, -1.4, "2F'", 'rgba(106,214,255,0.9)');
    dyn.add(makeSpan(new THREE.Vector3(0, 2.7, 0), new THREE.Vector3(f, 2.7, 0), 'f = ' + f.toFixed(1), { color: OCOL.focus, offset:[0,0.4,0] }));
    dyn.add(makeDimension(new THREE.Vector3(-d, -2.4, 0), new THREE.Vector3(0, -2.4, 0), 'd = ' + d.toFixed(1), { color: 0x3ed673, offset:[0,-0.4,0] }));
    const dp = dPrime();
    if (isFinite(dp) && Math.abs(dp)<12) {
      const m = buyutme();
      const img = makeObjectArrow(objH*m, { color: 0xff5252 }); img.position.set(dp, 0, 0.05); dyn.add(img);
      dyn.add(makeDimension(new THREE.Vector3(0, -3.2, 0), new THREE.Vector3(dp, -3.2, 0), "d' = " + dp.toFixed(2), { color: 0xff5252, offset:[0,-0.4,0] }));
      const objTop = new THREE.Vector3(-d, objH, 0.04);
      const hit = new THREE.Vector3(0, objH, 0.04);
      dyn.add(makeRay(objTop, hit, { color: OCOL.ray, r:0.03, arrow:false }));
      const imgTop = new THREE.Vector3(dp, objH*m, 0.04);
      dyn.add(makeRay(hit, imgTop, { color: OCOL.refract, r:0.03, arrow:false }));
      dyn.add(makeRay(objTop, imgTop, { color: 0x8a4aff, r:0.025, arrow:false }));
      dyn.add(makeFlowRay([objTop.clone(), hit.clone(), imgTop.clone()], { color: 0xffffff, count: 4, speed: 0.5, r: 0.075 }));
      dyn.add(makeFlowRay([objTop.clone(), imgTop.clone()], { color: 0xc9a8ff, count: 3, speed: 0.5, r: 0.065 }));
    }
  }
  rebuild();

  setSceneSliders([
    { type: 'section', label: 'Mercek Denklemi' },
    { type: 'slider', label: 'Cisim uzaklığı d', min: 1, max: 7, step: 0.5, unit: '',
      getValue: () => S.md_d, setValue: (v)=>{ S.md_d=v; rebuild(); }, format:(x)=>x.toFixed(1) },
    { type: 'slider', label: 'Odak f', min: 1.5, max: 3, step: 0.5, unit: '',
      getValue: () => S.md_f, setValue: (v)=>{ S.md_f=v; rebuild(); }, format:(x)=>x.toFixed(1) },
    { type: 'section', label: 'Hesap' },
    { type: 'display', label: "Görüntü uzaklığı d'", highlight: true, getValue: () => { const dp=dPrime(); return isFinite(dp)?dp.toFixed(2):'∞'; } },
    { type: 'display', label: 'Büyütme m', getValue: () => { const dp=dPrime(); return isFinite(dp)?buyutme().toFixed(2):'∞'; } },
    { type: 'display', label: 'Görüntü türü', getValue: () => { const dp=dPrime(); return !isFinite(dp)?'Sonsuzda':(dp>0?'Gerçek':'Sanal'); } },
    { type: 'formula', text: "1/f = 1/d + 1/d'",
      getValue: () => "1/" + S.md_f.toFixed(1) + " = 1/" + S.md_d.toFixed(1) + " + 1/d'" }
  ], { title: 'Mercek Denklemi' });

  addInfo3DLabels([
    { text: { ilkokul:'🟢 Cisim', ortaokul:'🟢 Cisim (d)', lise:'🟢 Cisim uzaklığı d', tyt_ayt:'🟢 d (cisim)' },
      position: [-S.md_d-1, 2, 0], target: [-S.md_d, 1, 0], color: '#3ed673' },
    { text: { ilkokul:"🔴 Görüntü", ortaokul:"🔴 Görüntü (d')", lise:"🔴 Görüntü uzaklığı d'", tyt_ayt:"🔴 d' (görüntü)" },
      position: [3.5, 2, 0], target: [2.5, 0.6, 0], color: '#ff5252' }
  ]);
};

// ---------- MODÜL 3.3: Göz Kusurları (miyop/hipermetrop) ----------
SubBuilders.buildGozKusur = function() {
  const root = new THREE.Group();
  markDynamic(root); scene.add(root); window._currentModelGroup = root;
  root.add(setupVectorLighting());
  root.add(makeGridSystem({ size: 16, divisions: 16 }));

  const S = window._sceneState;
  S.gk_kusur = 0;
  S.gk_duzelt = false;

  const dyn = new THREE.Group(); dyn.userData.dynamic = true; root.add(dyn);

  function rebuild() {
    [...dyn.children].forEach(c=>{dyn.remove(c);if(c.geometry)c.geometry.dispose();if(c.material&&c.material.dispose)c.material.dispose();});
    const eye = makeEye({ r: 1.8 }); eye.position.set(3, 0, 0); dyn.add(eye);
    const eyeCenter = 3, retinaX = 3 + 1.8*0.55;
    const ys = [0.9, -0.9];
    let focusX;
    if (S.gk_kusur === 0) focusX = retinaX;
    else if (S.gk_kusur === 1) focusX = retinaX - 1.2;
    else focusX = retinaX + 1.4;
    if (S.gk_duzelt && S.gk_kusur !== 0) focusX = retinaX;

    if (S.gk_duzelt && S.gk_kusur !== 0) {
      const corrType = (S.gk_kusur === 1) ? 'concave' : 'convex';
      const corr = makeLens(corrType, { h: 3, w: 0.5 }); corr.position.set(0.6, 0, 0.05); corr.scale.set(0.7,0.7,0.7); dyn.add(corr);
      dyn.add(makeMeasureLabel(corrType==='concave'?'👓 Kalın kenarlı (−)':'👓 İnce kenarlı (+)', [0.6, 2.2, 0], 'rgba(170,223,255,0.9)'));
    }

    ys.forEach(y => {
      const corneaPt = new THREE.Vector3(eyeCenter-1.5, y*0.55, 0.04);
      const inStart = new THREE.Vector3(-6, y, 0.04);
      dyn.add(makeRay(inStart, corneaPt, { color: OCOL.ray, r:0.035, arrow:false }));
      const focusPt = new THREE.Vector3(focusX, 0, 0.04);
      dyn.add(makeRay(corneaPt, focusPt, { color: OCOL.refract, r:0.035, arrow:false }));
      dyn.add(makeFlowRay([inStart.clone(), corneaPt.clone(), focusPt.clone()], { color: 0xffffff, count: 4, speed: 0.5, r: 0.08 }));
    });
    dyn.add(makeMarker(new THREE.Vector3(focusX, 0, 0.06), { color: (Math.abs(focusX-retinaX)<0.2)?0x3ed673:0xff5252, r: 0.15 }));
    dyn.add(makeMeasureLabel('Retina', [retinaX, -1.5, 0], 'rgba(255,184,77,0.9)'));
    if (Math.abs(focusX-retinaX)<0.2) dyn.add(makeMeasureLabel('✓ Retinada odak', [focusX, 1.3, 0], 'rgba(62,214,115,0.92)'));
    else dyn.add(makeMeasureLabel(focusX<retinaX?'Önde odak ✗':'Arkada odak ✗', [focusX, 1.3, 0], 'rgba(255,82,82,0.92)'));
  }
  rebuild();

  setSceneSliders([
    { type: 'section', label: 'Göz Kusuru' },
    { type: 'presets', activeIdx: 0, options: [
      { label: '👁️ Normal göz', action: ()=>{ S.gk_kusur=0; S.gk_duzelt=false; rebuild(); } },
      { label: '🔭 Miyop (uzağı görmez)', action: ()=>{ S.gk_kusur=1; S.gk_duzelt=false; rebuild(); } },
      { label: '📖 Hipermetrop (yakını görmez)', action: ()=>{ S.gk_kusur=2; S.gk_duzelt=false; rebuild(); } }
    ]},
    { type: 'presets', activeIdx: 0, options: [
      { label: '👀 Çıplak göz', action: ()=>{ S.gk_duzelt=false; rebuild(); } },
      { label: '👓 Gözlük tak', action: ()=>{ S.gk_duzelt=true; rebuild(); } }
    ]},
    { type: 'section', label: 'Durum' },
    { type: 'display', label: 'Kusur', highlight: true, getValue: () => ['Normal','Miyop','Hipermetrop'][S.gk_kusur] },
    { type: 'display', label: 'Odak yeri', getValue: () => S.gk_kusur===0?'Retinada':(S.gk_kusur===1?'Retina önünde':'Retina arkasında') },
    { type: 'display', label: 'Çözüm', getValue: () => S.gk_kusur===0?'—':(S.gk_kusur===1?'Iraksak (kalın kenarlı)':'Yakınsak (ince kenarlı)') },
    { type: 'formula', text: 'Miyop → −D · Hipermetrop → +D' }
  ], { title: 'Göz Kusurları' });

  addInfo3DLabels([
    { text: { ilkokul:'👁️ Göz', ortaokul:'👁️ Göz küresi', lise:'👁️ Göz (mercek+retina)', tyt_ayt:'👁️ Göz merceği' },
      position: [3, 2.6, 0], target: [3, 1.2, 0], color: '#f0f4ff' },
    { text: { ilkokul:'➡️ Işık gelir', ortaokul:'➡️ Paralel ışınlar', lise:'➡️ Uzaktan paralel ışın', tyt_ayt:'➡️ Sonsuzdan ışınlar' },
      position: [-5, 1.8, 0], target: [-4, 0.9, 0], color: '#ffe14d' },
    { text: { ilkokul:'🎯 Birleşme yeri', ortaokul:'🎯 Odak noktası', lise:'🎯 Görüntü odağı', tyt_ayt:'🎯 Odak (retinaya göre)' },
      position: [4.8, -1.2, 0], target: [4, 0, 0], color: '#ff5252' }
  ]);
};

// ---------- MODÜL 4.1: Düzlem Ayna ----------
SubBuilders.buildDuzlemAyna = function() {
  const root = new THREE.Group();
  markDynamic(root); scene.add(root); window._currentModelGroup = root;
  root.add(setupVectorLighting());
  root.add(makeGridSystem({ size: 16, divisions: 16 }));

  const S = window._sceneState;
  S.da_d = 3.0;

  const dyn = new THREE.Group(); dyn.userData.dynamic = true; root.add(dyn);
  const mirror = new THREE.Mesh(new THREE.PlaneGeometry(0.15, 6),
    new THREE.MeshStandardMaterial({ color: 0x9fd0ff, metalness: 0.9, roughness: 0.1, transparent: true, opacity: 0.75, side: THREE.DoubleSide }));
  mirror.position.set(0, 0, 0); dyn.add(mirror);
  const back = new THREE.Mesh(new THREE.PlaneGeometry(0.2, 6), new THREE.MeshStandardMaterial({ color: 0x4a5a70, roughness: 0.6 }));
  back.position.set(0.12, 0, -0.01); dyn.add(back);

  const ann = new THREE.Group(); ann.userData.dynamic = true; dyn.add(ann);
  function rebuild() {
    [...ann.children].forEach(c=>{ann.remove(c);if(c.geometry)c.geometry.dispose();if(c.material&&c.material.dispose)c.material.dispose();});
    const d = S.da_d, objH = 1.8;
    const obj = makeObjectArrow(objH, { color: OCOL.object }); obj.position.set(-d, 0, 0.05); ann.add(obj);
    const img = makeObjectArrow(objH, { color: 0xff5252 });
    img.position.set(d, 0, 0.05);
    img.traverse(c=>{ if(c.material){ c.material.transparent=true; c.material.opacity=0.45; } });
    ann.add(img);
    const objTop = new THREE.Vector3(-d, objH, 0.06);
    const eye = new THREE.Vector3(-d*0.4, 2.6, 0.06);
    const hit = new THREE.Vector3(0, objH*0.55, 0.06);
    ann.add(makeRay(objTop, hit, { color: OCOL.ray, r: 0.035, arrow:false }));
    ann.add(makeRay(hit, eye, { color: OCOL.refract, r: 0.035, arrow:false }));
    ann.add(makeFlowRay([objTop.clone(), hit.clone(), eye.clone()], { color: 0xffffff, count: 4, speed: 0.5, r: 0.08 }));
    ann.add(makeDashedLine(eye, new THREE.Vector3(d, objH, 0.06), { color: 0xff5252, dash:0.2, gap:0.15, opacity:0.55 }));
    ann.add(makeMarker(eye, { color: 0xffe14d, r: 0.14 }));
    ann.add(makeDimension(new THREE.Vector3(-d, -2.4, 0), new THREE.Vector3(0, -2.4, 0), 'd = ' + d.toFixed(1), { color: 0x3ed673, offset:[0,-0.4,0] }));
    ann.add(makeDimension(new THREE.Vector3(0, -2.4, 0), new THREE.Vector3(d, -2.4, 0), "d' = " + d.toFixed(1), { color: 0xff5252, offset:[0,-0.4,0] }));
  }
  rebuild();

  setSceneSliders([
    { type: 'section', label: 'Düzlem Ayna' },
    { type: 'slider', label: 'Cisim uzaklığı d', min: 1.5, max: 4.5, step: 0.5, unit: '',
      getValue: () => S.da_d, setValue: (v)=>{ S.da_d=v; rebuild(); }, format:(x)=>x.toFixed(1) },
    { type: 'section', label: 'Görüntü Özellikleri' },
    { type: 'display', label: 'Görüntü', highlight: true, getValue: () => 'Sanal, düz' },
    { type: 'display', label: 'Boy', getValue: () => 'Cisimle eşit' },
    { type: 'display', label: 'Uzaklık', getValue: () => "d' = d (arkada)" },
    { type: 'formula', text: 'Görüntü sanal, eş boy, simetrik' }
  ], { title: 'Düzlem Ayna' });

  addInfo3DLabels([
    { text: { ilkokul:'🟢 Sen (cisim)', ortaokul:'🟢 Cisim', lise:'🟢 Cisim', tyt_ayt:'🟢 Cisim (d)' },
      position: [-S.da_d-1, 2.4, 0], target: [-S.da_d, 1.2, 0], color: '#3ed673' },
    { text: { ilkokul:'🪞 Ayna', ortaokul:'🪞 Düzlem ayna', lise:'🪞 Yansıtıcı yüzey', tyt_ayt:'🪞 Düzlem ayna' },
      position: [0, 3.4, 0], target: [0, 2.5, 0], color: '#9fd0ff' },
    { text: { ilkokul:'🔴 Görüntü', ortaokul:'🔴 Sanal görüntü', lise:'🔴 Sanal görüntü (arkada)', tyt_ayt:"🔴 Sanal görüntü (d')" },
      position: [S.da_d+1, 2.4, 0], target: [S.da_d, 1.2, 0], color: '#ff5252' }
  ]);
};

// ---------- MODÜL 4.2: Çukur Ayna ----------
SubBuilders.buildCukurAyna = function() {
  const root = new THREE.Group();
  markDynamic(root); scene.add(root); window._currentModelGroup = root;
  root.add(setupVectorLighting());
  root.add(makeGridSystem({ size: 16, divisions: 16 }));

  const S = window._sceneState;
  S.ca_d = 6.0;
  S.ca_f = 2.0;

  const dyn = new THREE.Group(); dyn.userData.dynamic = true; root.add(dyn);
  root.add(makeSolidLine(new THREE.Vector3(-9,0,0), new THREE.Vector3(3,0,0), { color: window._lightMode ? 0x5a6a88 : 0x9fb0d8, opacity: window._lightMode ? 0.6 : 0.4 }));

  function rebuild() {
    [...dyn.children].forEach(c=>{dyn.remove(c);if(c.geometry)c.geometry.dispose();if(c.material&&c.material.dispose)c.material.dispose();});
    const f = S.ca_f, d = S.ca_d, R = 2*f;
    const arc = new THREE.Mesh(new THREE.TorusGeometry(R, 0.08, 8, 40, Math.PI*0.6),
      new THREE.MeshStandardMaterial({ color: 0x9fd0ff, metalness: 0.85, roughness: 0.15, toneMapped:false }));
    arc.position.set(R, 0, 0); arc.rotation.z = Math.PI - Math.PI*0.3; dyn.add(arc);
    dyn.add(makeMarker(new THREE.Vector3(f, 0, 0.05), { color: OCOL.focus, r: 0.12 }));
    dyn.add(makeMarker(new THREE.Vector3(2*f, 0, 0.05), { color: 0x6ad6ff, r: 0.1 }));
    const tickLabel = (x, y, txt, bg) => {
      dyn.add(makeSolidLine(new THREE.Vector3(x,0,0.04), new THREE.Vector3(x,y,0.04), { color: window._lightMode ? 0x5a6a88 : 0x9fb0d8, opacity: window._lightMode ? 0.6 : 0.4 }));
      dyn.add(makeMeasureLabel(txt, [x, y-0.2, 0], bg));
    };
    tickLabel(0, -0.75, 'T (tepe)', 'rgba(159,176,216,0.9)');
    tickLabel(f, -1.5, 'F', 'rgba(255,82,82,0.9)');
    tickLabel(2*f, -0.75, 'C = 2F', 'rgba(106,214,255,0.9)');
    dyn.add(makeSpan(new THREE.Vector3(0, 2.4, 0), new THREE.Vector3(f, 2.4, 0), 'f = R/2 = ' + f.toFixed(1), { color: OCOL.focus, offset:[0,0.4,0] }));
    dyn.add(makeSpan(new THREE.Vector3(0, 3.5, 0), new THREE.Vector3(2*f, 3.5, 0), 'R = ' + (2*f).toFixed(1), { color: 0x6ad6ff, offset:[0,0.4,0] }));
    const objH = 1.5;
    const obj = makeObjectArrow(objH, { color: OCOL.object }); obj.position.set(-d, 0, 0.05); dyn.add(obj);
    makeLabeledPoint(dyn, [-d, objH, 0.05], [-d - 1.6, objH + 1.3, 0], 'Cisim', { color: '#3ed673' });
    let dp = (d===f) ? Infinity : (f*d)/(d-f);
    const m = -dp/d;
    if (isFinite(dp) && Math.abs(dp) < 11) {
      const imgX = -dp;
      const imgH = objH*m;
      const img = makeObjectArrow(imgH, { color: 0xff5252 }); img.position.set(imgX, 0, 0.05); dyn.add(img);
      const objTop = new THREE.Vector3(-d, objH, 0.04);
      const hitPara = new THREE.Vector3(0, objH, 0.04);
      dyn.add(makeRay(objTop, hitPara, { color: OCOL.ray, r:0.03, arrow:false }));
      const fPt = new THREE.Vector3(f, 0, 0.04);
      const dir = fPt.clone().sub(hitPara).normalize();
      const reflEnd = hitPara.clone().add(dir.multiplyScalar(d+2));
      dyn.add(makeRay(hitPara, reflEnd, { color: OCOL.refract, r:0.03, arrow:false }));
      dyn.add(makeFlowRay([objTop.clone(), hitPara.clone(), reflEnd.clone()], { color: 0xffffff, count: 4, speed: 0.5, r: 0.08 }));
      const gY = imgH>0 ? imgH+1.3 : imgH-1.3;
      makeLabeledPoint(dyn, [imgX, imgH, 0.05], [imgX + (imgX<-3?1.5:-1.5), gY, 0], 'Görüntü', { color: '#ff5252' });
    }
  }
  rebuild();

  function durum() {
    const f=S.ca_f,d=S.ca_d;
    if (d>2*f) return 'Küçük, ters, gerçek';
    if (Math.abs(d-2*f)<0.3) return 'Eşit, ters, gerçek';
    if (d>f) return 'Büyük, ters, gerçek';
    return 'Büyük, düz, sanal';
  }
  setSceneSliders([
    { type: 'section', label: 'Çukur Ayna (Yakınsak)' },
    { type: 'slider', label: 'Cisim uzaklığı d', min: 1, max: 7, step: 0.5, unit: '',
      getValue: () => S.ca_d, setValue: (v)=>{ S.ca_d=v; rebuild(); }, format:(x)=>x.toFixed(1) },
    { type: 'slider', label: 'Odak f', min: 1.5, max: 3, step: 0.5, unit: '',
      getValue: () => S.ca_f, setValue: (v)=>{ S.ca_f=v; rebuild(); }, format:(x)=>x.toFixed(1) },
    { type: 'section', label: 'Görüntü' },
    { type: 'display', label: 'Özellik', highlight: true, getValue: () => durum() },
    { type: 'display', label: 'Odak', getValue: () => 'Gerçek (F = R/2)' },
    { type: 'formula', text: "1/f = 1/d + 1/d' · F = R/2" }
  ], { title: 'Çukur Ayna' });

  addInfo3DLabels([
    { text: { ilkokul:'🥄 Çukur ayna', ortaokul:'🥄 İç yüzey yansıtır', lise:'🥄 Yakınsak ayna', tyt_ayt:'🥄 Çukur ayna (F=R/2)' },
      position: [2*S.ca_f+2.5, 2, 0], target: [2*S.ca_f, 0.8, 0], color: '#9fd0ff' }
  ]);
};

// ---------- MODÜL 4.3: Tümsek Ayna ----------
SubBuilders.buildTumsekAyna = function() {
  const root = new THREE.Group();
  markDynamic(root); scene.add(root); window._currentModelGroup = root;
  root.add(setupVectorLighting());
  root.add(makeGridSystem({ size: 16, divisions: 16 }));

  const S = window._sceneState;
  S.ta_d = 5.0;
  S.ta_f = 2.5;

  const dyn = new THREE.Group(); dyn.userData.dynamic = true; root.add(dyn);
  root.add(makeSolidLine(new THREE.Vector3(-9,0,0), new THREE.Vector3(3,0,0), { color: window._lightMode ? 0x5a6a88 : 0x9fb0d8, opacity: window._lightMode ? 0.6 : 0.4 }));

  function objHval(){ return 1.6; }
  function rebuild() {
    [...dyn.children].forEach(c=>{dyn.remove(c);if(c.geometry)c.geometry.dispose();if(c.material&&c.material.dispose)c.material.dispose();});
    const f = S.ta_f, d = S.ta_d, R = 2*f;
    const arc = new THREE.Mesh(new THREE.TorusGeometry(R, 0.08, 8, 40, Math.PI*0.6),
      new THREE.MeshStandardMaterial({ color: 0x9fd0ff, metalness: 0.85, roughness: 0.15, toneMapped:false }));
    arc.position.set(-R, 0, 0); arc.rotation.z = -Math.PI*0.3; dyn.add(arc);
    const fNeg = -f;
    let dp = (fNeg*d)/(d - fNeg);
    const m = -dp/d;
    const imgX = Math.abs(dp)*0.6;
    const imgH = objHval()*Math.abs(m);
    dyn.add(makeMarker(new THREE.Vector3(f, 0, 0.05), { color: OCOL.focus, r: 0.11 }));
    const tickLabel = (x, y, txt, bg) => {
      dyn.add(makeSolidLine(new THREE.Vector3(x,0,0.04), new THREE.Vector3(x,y,0.04), { color: window._lightMode ? 0x5a6a88 : 0x9fb0d8, opacity: window._lightMode ? 0.6 : 0.4 }));
      dyn.add(makeMeasureLabel(txt, [x, y-0.2, 0], bg));
    };
    tickLabel(0, -0.75, 'T (tepe)', 'rgba(159,176,216,0.9)');
    tickLabel(f, -1.5, 'F (sanal)', 'rgba(255,82,82,0.9)');
    dyn.add(makeSpan(new THREE.Vector3(0, 2.4, 0), new THREE.Vector3(f, 2.4, 0), '|f| = ' + f.toFixed(1) + ' (sanal)', { color: OCOL.focus, offset:[0,0.4,0] }));
    const objH = objHval();
    const obj = makeObjectArrow(objH, { color: OCOL.object }); obj.position.set(-d, 0, 0.05); dyn.add(obj);
    makeLabeledPoint(dyn, [-d, objH, 0.05], [-d - 1.6, objH + 1.3, 0], 'Cisim', { color: '#3ed673' });
    const img = makeObjectArrow(imgH, { color: 0xff5252 });
    img.position.set(imgX, 0, 0.05);
    img.traverse(c=>{ if(c.material){ c.material.transparent=true; c.material.opacity=0.5; } });
    dyn.add(img);
    const objTop = new THREE.Vector3(-d, objH, 0.04);
    const hit = new THREE.Vector3(-R*0.15, objH*0.6, 0.04);
    dyn.add(makeRay(objTop, hit, { color: OCOL.ray, r:0.03, arrow:false }));
    const fPt = new THREE.Vector3(f, 0, 0.04);
    const dir = hit.clone().sub(fPt).normalize();
    const reflEnd = hit.clone().add(dir.multiplyScalar(5));
    dyn.add(makeRay(hit, reflEnd, { color: OCOL.refract, r:0.03, arrow:false }));
    dyn.add(makeFlowRay([objTop.clone(), hit.clone(), reflEnd.clone()], { color: 0xffffff, count: 4, speed: 0.5, r: 0.08 }));
    dyn.add(makeDashedLine(hit, fPt, { color: OCOL.refract, dash:0.18, gap:0.12, opacity:0.5 }));
    makeLabeledPoint(dyn, [imgX, imgH, 0.05], [imgX + 1.8, imgH + 1.4, 0], 'Görüntü (küçük, düz, sanal)', { color: '#ff5252' });
  }
  rebuild();

  setSceneSliders([
    { type: 'section', label: 'Tümsek Ayna (Iraksak)' },
    { type: 'slider', label: 'Cisim uzaklığı d', min: 2, max: 7, step: 0.5, unit: '',
      getValue: () => S.ta_d, setValue: (v)=>{ S.ta_d=v; rebuild(); }, format:(x)=>x.toFixed(1) },
    { type: 'section', label: 'Görüntü' },
    { type: 'display', label: 'Özellik', highlight: true, getValue: () => 'Küçük, düz, sanal' },
    { type: 'display', label: 'Odak', getValue: () => 'Sanal (arkada, f<0)' },
    { type: 'display', label: 'Görüş alanı', getValue: () => 'Geniş' },
    { type: 'formula', text: 'Görüntü daima küçük, düz, sanal' }
  ], { title: 'Tümsek Ayna' });

  addInfo3DLabels([
    { text: { ilkokul:'🔮 Tümsek ayna', ortaokul:'🔮 Dış yüzey yansıtır', lise:'🔮 Iraksak ayna', tyt_ayt:'🔮 Tümsek (f<0)' },
      position: [-S.ta_f*2-2, 3.4, 0], target: [-S.ta_f*2+0.3, 1.2, 0], color: '#9fd0ff' }
  ]);
};

// ---------- MODÜL 5.1: Aydınlanma (E = I/d²) ----------
SubBuilders.buildAydinlanma = function() {
  const root = new THREE.Group();
  markDynamic(root); scene.add(root); window._currentModelGroup = root;
  root.add(setupVectorLighting());
  root.add(makeGridSystem({ size: 16, divisions: 16 }));

  const S = window._sceneState;
  S.ay_d = 3.0;
  S.ay_I = 100;

  const dyn = new THREE.Group(); dyn.userData.dynamic = true; root.add(dyn);

  function rebuild() {
    [...dyn.children].forEach(c=>{dyn.remove(c);if(c.geometry)c.geometry.dispose();if(c.material&&c.material.dispose)c.material.dispose();});
    const d = S.ay_d, I = S.ay_I;
    const E = I / (d*d);
    const lampX = -d, surfX = 0;
    const lamp = new THREE.Mesh(new THREE.SphereGeometry(0.4, 18, 14),
      new THREE.MeshStandardMaterial({ color: 0xfff0a0, emissive: 0xffe14d, emissiveIntensity: 0.9, toneMapped:false }));
    lamp.position.set(lampX, 0, 0); dyn.add(lamp);
    const halo = new THREE.Mesh(new THREE.SphereGeometry(0.6, 16, 12),
      new THREE.MeshBasicMaterial({ color: 0xffe14d, transparent: true, opacity: 0.18, toneMapped:false }));
    halo.position.set(lampX, 0, 0); dyn.add(halo);
    const bright = Math.min(1, E/12);
    const surfMat = new THREE.MeshStandardMaterial({ color: 0xeaeaea, emissive: 0xffe14d, emissiveIntensity: bright*0.9, roughness: 0.7, side: THREE.DoubleSide });
    const surf = new THREE.Mesh(new THREE.PlaneGeometry(3.2, 3.6), surfMat);
    surf.position.set(surfX, 0, 0);
    surf.rotation.y = Math.PI/2;
    dyn.add(surf);
    const frameGeo = new THREE.EdgesGeometry(new THREE.PlaneGeometry(3.2, 3.6));
    const frame = new THREE.LineSegments(frameGeo, new THREE.LineBasicMaterial({ color: 0xffe14d, transparent:true, opacity:0.7 }));
    frame.position.set(surfX, 0, 0); frame.rotation.y = Math.PI/2; dyn.add(frame);
    const fotonSayisi = Math.max(2, Math.round(I / 35));
    const hedefY = [1.3, 0.65, 0, -0.65, -1.3];
    hedefY.forEach((y)=>{
      const from = new THREE.Vector3(lampX, 0, 0);
      const to = new THREE.Vector3(surfX, y, 0);
      dyn.add(makeRay(from, to, { color: 0xffe14d, r: 0.022, arrow:false }));
      dyn.add(makeFlowRay([from.clone(), to.clone()], { color: 0xffffff, count: fotonSayisi, speed: 0.35 + 0.8/d, r: 0.085 }));
    });
    dyn.add(makeDimension(new THREE.Vector3(lampX, -2.4, 0), new THREE.Vector3(surfX, -2.4, 0), 'd = ' + d.toFixed(1), { color: 0x6ad6ff, offset:[0,-0.4,0] }));
    if (_isElementary()) {
      dyn.add(makeMeasureLabel(E > 8 ? 'Çok aydınlık ☀️' : (E > 3 ? 'Orta aydınlık' : 'Az aydınlık 🌙'), [surfX+0.4, 2.4, 0], 'rgba(255,225,77,0.95)'));
    } else {
      dyn.add(makeMeasureLabel('E = ' + E.toFixed(1) + ' lx', [surfX+0.4, 2.4, 0], 'rgba(255,225,77,0.95)'));
    }
  }
  rebuild();

  setSceneSliders([
    { type: 'section', label: 'Aydınlanma: E = I/d²' },
    { type: 'slider', label: 'Uzaklık d', min: 1, max: 5, step: 0.5, unit: '',
      getValue: () => S.ay_d, setValue: (v)=>{ S.ay_d=v; rebuild(); }, format:(x)=>x.toFixed(1) },
    { type: 'slider', label: 'Işık şiddeti I', min: 50, max: 200, step: 25, unit: ' cd',
      getValue: () => S.ay_I, setValue: (v)=>{ S.ay_I=v; rebuild(); }, format:(x)=>x.toFixed(0) },
    { type: 'section', label: 'Sonuç' },
    { type: 'display', label: 'Aydınlanma E', highlight: true, getValue: () => (S.ay_I/(S.ay_d*S.ay_d)).toFixed(1) + ' lüks' },
    { type: 'display', label: 'Uzaklık 2× olursa', getValue: () => 'E dörtte bire iner' },
    { type: 'formula', text: 'E = I / d²',
      getValue: () => 'E = ' + S.ay_I + '/' + S.ay_d.toFixed(1) + '² = <b>' + (S.ay_I/(S.ay_d*S.ay_d)).toFixed(1) + ' lx</b>' }
  ], { title: 'Aydınlanma' });

  addInfo3DLabels([
    { text: { ilkokul:'💡 Lamba', ortaokul:'💡 Işık kaynağı', lise:'💡 Kaynak (I)', tyt_ayt:'💡 Işık şiddeti I (cd)' },
      position: [-S.ay_d-1.8, 1.8, 0], target: [-S.ay_d, 0.4, 0], color: '#ffe14d' },
    { text: { ilkokul:'🟨 Aydınlanan yüzey', ortaokul:'🟨 Aydınlanan yüzey', lise:'🟨 Yüzey (E)', tyt_ayt:'🟨 Aydınlanma E (lüks)' },
      position: [2.6, -2.0, 0], target: [0, -0.8, 0], color: '#fff0a0' }
  ]);
};

// ---------- MODÜL 5.2: Cisimlerin Rengi ----------
SubBuilders.buildCisimRenk = function() {
  const root = new THREE.Group();
  markDynamic(root); scene.add(root); window._currentModelGroup = root;
  root.add(setupVectorLighting());
  root.add(makeGridSystem({ size: 16, divisions: 16 }));

  const S = window._sceneState;
  S.cr_isik = 0;
  S.cr_cisim = 0;
  const ISIK = [
    { ad:'Beyaz', renk:0xffffff, rgb:[1,1,1] },
    { ad:'Kırmızı', renk:0xff3030, rgb:[1,0,0] },
    { ad:'Yeşil', renk:0x3ed673, rgb:[0,1,0] },
    { ad:'Mavi', renk:0x4a90e2, rgb:[0,0,1] }
  ];
  const CISIM = [
    { ad:'Kırmızı', rgb:[1,0,0] },
    { ad:'Yeşil', rgb:[0,1,0] },
    { ad:'Mavi', rgb:[0,0,1] },
    { ad:'Beyaz', rgb:[1,1,1] }
  ];

  const dyn = new THREE.Group(); dyn.userData.dynamic = true; root.add(dyn);

  function gorunenRenk() {
    const ir = ISIK[S.cr_isik].rgb, cr = CISIM[S.cr_cisim].rgb;
    const r = ir[0]*cr[0], g = ir[1]*cr[1], b = ir[2]*cr[2];
    if (r===0 && g===0 && b===0) return { hex: 0x1a1a1a, ad:'Siyah (soğurur)' };
    const hex = (Math.round(r*255)<<16) | (Math.round(g*255)<<8) | Math.round(b*255);
    let ad = '';
    if (r&&g&&b) ad='Beyaz'; else if (r&&g) ad='Sarı'; else if (r&&b) ad='Magenta'; else if (g&&b) ad='Cyan';
    else if (r) ad='Kırmızı'; else if (g) ad='Yeşil'; else if (b) ad='Mavi';
    return { hex, ad };
  }

  function rebuild() {
    [...dyn.children].forEach(c=>{dyn.remove(c);if(c.geometry)c.geometry.dispose();if(c.material&&c.material.dispose)c.material.dispose();});
    const lampColor = ISIK[S.cr_isik].renk;
    const lamp = new THREE.Mesh(new THREE.SphereGeometry(0.4, 18, 14),
      new THREE.MeshStandardMaterial({ color: lampColor, emissive: lampColor, emissiveIntensity: 0.8, toneMapped:false }));
    lamp.position.set(-4.5, 1.5, 0); dyn.add(lamp);

SubBuilders.buildIsikFiltre = function() {
  const root = new THREE.Group();
  markDynamic(root); scene.add(root); window._currentModelGroup = root;
  root.add(setupVectorLighting());
  root.add(makeGridSystem({ size: 16, divisions: 16 }));

  const S = window._sceneState;
  S.if_isik = 0;
  S.if_filtre = 1;
  const ISIK = [
    { ad:'Beyaz', renk:0xffffff, rgb:[1,1,1] },
    { ad:'Kırmızı', renk:0xff3030, rgb:[1,0,0] },
    { ad:'Yeşil', renk:0x3ed673, rgb:[0,1,0] },
    { ad:'Mavi', renk:0x4a90e2, rgb:[0,0,1] }
  ];
  const FILTRE = [
    null,
    { ad:'Kırmızı', renk:0xff3030, rgb:[1,0,0] },
    { ad:'Yeşil', renk:0x3ed673, rgb:[0,1,0] },
    { ad:'Mavi', renk:0x4a90e2, rgb:[0,0,1] },
    { ad:'Sarı', renk:0xffe14d, rgb:[1,1,0] }
  ];

  const dyn = new THREE.Group(); dyn.userData.dynamic = true; root.add(dyn);

  function gecenRenk() {
    const ir = ISIK[S.if_isik].rgb, fr = FILTRE[S.if_filtre].rgb;
    const r=ir[0]*fr[0], g=ir[1]*fr[1], b=ir[2]*fr[2];
    if (r===0&&g===0&&b===0) return { hex:0x1a1a1a, ad:'Karanlık' };
    const hex=(Math.round(r*255)<<16)|(Math.round(g*255)<<8)|Math.round(b*255);
    let ad=''; if(r&&g&&b)ad='Beyaz'; else if(r&&g)ad='Sarı'; else if(r)ad='Kırmızı'; else if(g)ad='Yeşil'; else if(b)ad='Mavi';
    return { hex, ad };
  }

  function rebuild() {
    [...dyn.children].forEach(c=>{dyn.remove(c);if(c.geometry)c.geometry.dispose();if(c.material&&c.material.dispose)c.material.dispose();});
    const lampColor = ISIK[S.if_isik].renk;
    const lamp = new THREE.Mesh(new THREE.SphereGeometry(0.4,18,14),
      new THREE.MeshStandardMaterial({ color: lampColor, emissive: lampColor, emissiveIntensity:0.8, toneMapped:false }));
    lamp.position.set(-5,0,0); dyn.add(lamp);
    const inA = new THREE.Vector3(-5,0,0.02), inB = new THREE.Vector3(-0.3,0,0.02);
    dyn.add(makeRay(inA, inB, { color: lampColor, r:0.06, arrow:false }));
    dyn.add(makeFlowRay([inA, inB], { color: lampColor, count: 4, speed: 0.5, r: 0.11 }));
    const fColor = FILTRE[S.if_filtre].renk;
    const filt = new THREE.Mesh(new THREE.BoxGeometry(0.2, 4, 1.5),
      new THREE.MeshStandardMaterial({ color: fColor, transparent:true, opacity:0.55, emissive: fColor, emissiveIntensity:0.25, toneMapped:false }));
    filt.position.set(0,0,0); dyn.add(filt);
    const gr = gecenRenk();
    if (gr.hex !== 0x1a1a1a) {
      const outA = new THREE.Vector3(0.3,0,0.02), outB = new THREE.Vector3(5,0,0.02);
      dyn.add(makeRay(outA, outB, { color: gr.hex, r:0.06, arrow:true }));
      dyn.add(makeFlowRay([outA, outB], { color: gr.hex, count: 4, speed: 0.5, r: 0.11 }));
    } else {
      dyn.add(makeMeasureLabel('🚫 Işık geçemez', [2.5, 0.6, 0], 'rgba(40,40,40,0.95)'));
    }
    dyn.add(makeMeasureLabel('Geçen: ' + gr.ad, [2.8, -1.5, 0], 'rgba(20,28,46,0.95)'));
  }
  rebuild();

  setSceneSliders([
    { type: 'section', label: 'Gelen Işık' },
    { type: 'presets', activeIdx: 0, options: [
      { label: '⚪ Beyaz', action: ()=>{ S.if_isik=0; rebuild(); } },
      { label: '🔴 Kırmızı', action: ()=>{ S.if_isik=1; rebuild(); } },
      { label: '🟢 Yeşil', action: ()=>{ S.if_isik=2; rebuild(); } },
      { label: '🔵 Mavi', action: ()=>{ S.if_isik=3; rebuild(); } }
    ]},
    { type: 'section', label: 'Filtre Rengi' },
    { type: 'presets', activeIdx: 0, options: [
      { label: '🔴 Kırmızı filtre', action: ()=>{ S.if_filtre=1; rebuild(); } },
      { label: '🟢 Yeşil filtre', action: ()=>{ S.if_filtre=2; rebuild(); } },
      { label: '🔵 Mavi filtre', action: ()=>{ S.if_filtre=3; rebuild(); } },
      { label: '🟡 Sarı filtre', action: ()=>{ S.if_filtre=4; rebuild(); } }
    ]},
    { type: 'section', label: 'Sonuç' },
    { type: 'display', label: 'Geçen ışık', highlight: true, getValue: () => gecenRenk().ad },
    { type: 'formula', text: 'Filtre kendi rengini geçirir, kalanı soğurur' }
  ], { title: 'Işık Filtreleri' });

  addInfo3DLabels([
    { text: { ilkokul:'💡 Işık', ortaokul:'💡 Gelen ışık', lise:'💡 Gelen ışık', tyt_ayt:'💡 Gelen ışık' },
      position: [-5, 1.8, 0], target: [-5, 0.3, 0], color: '#ffe14d' },
    { text: { ilkokul:'🟥 Renkli cam', ortaokul:'🟥 Filtre', lise:'🟥 Renk filtresi', tyt_ayt:'🟥 Filtre (soğurucu)' },
      position: [0, 2.6, 0], target: [0, 1.8, 0], color: '#aadfff' },
    { text: { ilkokul:'👁️ Çıkan ışık', ortaokul:'👁️ Geçen ışık', lise:'👁️ Geçen renk', tyt_ayt:'👁️ Geçen ışık (filtreli)' },
      position: [4, 1.5, 0], target: [4, 0, 0], color: '#ffe14d' }
  ]);
};

let currentLevel = 'lise';
let currentMode = 'sade';
window._autoSpinActive = false;
window._isPlayingActive = false;

// Seviye sıralaması (en yakın mevcut veriyi bulmak için)
const LEVEL_ORDER = ['ilkokul', 'ortaokul', 'lise', 'tyt_ayt'];

function _resolveLevelData(dataObj) {
  if (!dataObj) return null;
  // tam eşleşme
  if (dataObj[currentLevel]) return dataObj[currentLevel];
  // 'ayt' eski anahtar uyumluluğu
  if (currentLevel === 'tyt_ayt' && dataObj['ayt']) return dataObj['ayt'];
  if (currentLevel === 'ayt' && dataObj['tyt_ayt']) return dataObj['tyt_ayt'];
  // en yakın alt seviyeye düş
  const idx = LEVEL_ORDER.indexOf(currentLevel);
  for (let i = idx; i >= 0; i--) {
    if (dataObj[LEVEL_ORDER[i]]) return dataObj[LEVEL_ORDER[i]];
  }
  for (let i = idx + 1; i < LEVEL_ORDER.length; i++) {
    if (dataObj[LEVEL_ORDER[i]]) return dataObj[LEVEL_ORDER[i]];
  }
  // herhangi biri
  const keys = Object.keys(dataObj);
  return keys.length ? dataObj[keys[0]] : null;
}

// ---------- SAHNE SEÇİMİ ----------
// 3D arka planı temaya göre ayarla (tutulmalar uzay → koyu kalır)
function applySceneTheme() {
  if (!scene) return;
  const isLight = window._lightMode === true;
  const isSpace = window._isSpaceScene === true;
  let bgColor, fogColor, fogNear, fogFar;
  if (isSpace) {
    // Tutulma sahneleri: aydınlık modda biraz açık gece, karanlıkta derin uzay
    bgColor = isLight ? 0x1a2138 : 0x02030a;
    fogColor = bgColor; fogNear = 40; fogFar = 110;
    scene.background = new THREE.Color(bgColor);
    scene.fog = null;
    return;
  }
  if (isLight) {
    bgColor = 0xdfe7f2; fogColor = 0xdfe7f2; fogNear = 38; fogFar = 100;
  } else {
    bgColor = 0x121726; fogColor = 0x121726; fogNear = 35; fogFar = 95;
  }
  scene.background = new THREE.Color(bgColor);
  scene.fog = new THREE.Fog(fogColor, fogNear, fogFar);
}

function selectSub(subKey) {
  currentSub = subKey;
  clearScene();
  window._isSpaceScene = false;
  applySceneTheme();

  const builderName = (function() {
    for (const mk of Object.keys(MODULES)) {
      const s = MODULES[mk].subs.find(x => x.key === subKey);
      if (s) { currentModule = parseInt(mk); return s.builder; }
    }
    return null;
  })();

  if (builderName && typeof SubBuilders[builderName] === 'function') {
    try {
      SubBuilders[builderName]();
    } catch (e) {
      console.error('Builder hatası:', builderName, e);
    }
  }

  // Bilgi panelini güncelle (kapalıysa tekrar aç — konu seçilince bilgi görünür olsun)
  const _bp = document.getElementById('bottomPanel');
  if (_bp) _bp.classList.remove('hidden');
  updateInfoPanel(subKey);
  highlightActiveTopic();

  // Sade modda bazı 3D etiketleri gizle (her ikincisi)
  applyModeToLabels();

  // Kamerayı sahneye göre hafif yukarı + model biraz sola kaysın (target sağa)
  if (controls) {
    controls.target.set(3.2, 0.6, 0);
    if (camera) camera.position.set(3.2, 5.0, 27.0);
    controls.captureInitialState && controls.captureInitialState();
  }

  if (window._showGestureToast) {
    const allSubs = [];
    Object.keys(MODULES).forEach(mk => MODULES[mk].subs.forEach(s => allSubs.push(s)));
    const cur = allSubs.find(s => s.key === subKey);
    if (cur) window._showGestureToast('📍 ' + cur.label);
  }
}

function applyModeToLabels() {
  if (!window._labelRefs) return;
  // info3d etiketleri (CSS2D, scene içinde) — sade modda her ikinciyi gizle
  const info3d = document.querySelectorAll('.info3d-label');
  info3d.forEach((el, i) => {
    if (currentMode === 'sade' && i % 2 === 1) {
      el.dataset.userHidden = '1';
      el.style.display = 'none';
    } else {
      el.dataset.userHidden = '0';
      el.style.display = labelsVisible ? 'block' : 'none';
    }
  });
}

// ---------- BİLGİ PANELİ ----------
function updateInfoPanel(subKey) {
  const data = _resolveLevelData(INFO_DATA[subKey]);
  if (!data) return;
  document.getElementById('infoEmoji').textContent = data.emoji || '🔦';
  // Başlık: "Modül ana başlığı / alt başlık" (eğitim seviyesi gösterilmez)
  let mainTitle = '', subTitle = '';
  for (const mk of Object.keys(MODULES)) {
    const s = MODULES[mk].subs.find(x => x.key === subKey);
    if (s) {
      // Modül ana başlığından emoji ve "Modül N:" kısmını temizle
      mainTitle = (MODULES[mk].title || '').replace(/^[^\wçğıöşüÇĞİÖŞÜ]*Modül\s*\d+:\s*/i, '').replace(/^[^\wçğıöşüÇĞİÖŞÜ]+/, '').trim();
      // Alt başlık: sahne etiketinden baştaki emojiyi at
      subTitle = (s.label || '').replace(/^[^\wçğıöşüÇĞİÖŞÜ]+/, '').trim();
      break;
    }
  }
  const titleHtml = mainTitle ? (mainTitle + ' / ' + subTitle) : (data.title || subTitle);
  document.getElementById('infoTitle').textContent = titleHtml;
  const list = document.getElementById('infoList');
  list.innerHTML = '';
  let points = data.points || [];
  // Sade modda ilk 3, detaylıda hepsi
  const showCount = (currentMode === 'sade') ? 3 : points.length;
  points.slice(0, showCount).forEach(p => {
    const li = document.createElement('li');
    if (p.startsWith('##')) { li.className = 'subhead'; li.innerHTML = p.replace('##','').trim(); }
    else li.innerHTML = p;
    list.appendChild(li);
  });
  // içerik değişti → kaydırma çubuğunu yeniden hesapla (layout için çoklu deneme)
  list.scrollTop = 0;
  setTimeout(updateInfoScrollbar, 30);
  setTimeout(updateInfoScrollbar, 150);
  setTimeout(updateInfoScrollbar, 400);
}

// Özel kaydırma çubuğu: içerik taşınca görünür, kaydırınca thumb hareket eder
function updateInfoScrollbar() {
  const list = document.getElementById('infoList');
  const bar = document.getElementById('infoScrollbar');
  const thumb = document.getElementById('infoScrollThumb');
  if (!list || !bar || !thumb) return;
  const sh = list.scrollHeight, ch = list.clientHeight;
  if (ch < 5) return; // panel henüz görünür değil, sonraki denemede tekrar bak
  if (sh <= ch + 3) { bar.classList.remove('visible'); return; }
  bar.classList.add('visible');
  const trackH = bar.clientHeight || ch;
  const thumbH = Math.max(26, trackH * ch / sh);
  const maxScroll = sh - ch;
  const maxThumb = trackH - thumbH;
  const top = maxScroll > 0 ? (list.scrollTop / maxScroll) * maxThumb : 0;
  thumb.style.height = thumbH + 'px';
  thumb.style.top = top + 'px';
}

// ---------- NAVİGASYON (önceki/sonraki sahne) ----------
function getAllSubs() {
  const arr = [];
  Object.keys(MODULES).forEach(mk => MODULES[mk].subs.forEach(s => arr.push(s)));
  return arr;
}
function navigate(dir) {
  const all = getAllSubs();
  let idx = all.findIndex(s => s.key === currentSub);
  if (idx < 0) idx = 0;
  idx = (idx + dir + all.length) % all.length;
  selectSub(all[idx].key);
}

// ---------- DROPDOWN AÇ/KAPA ----------
function closeAllDropdowns() {
  document.querySelectorAll('.dropdown-panel').forEach(p => p.classList.remove('show'));
  document.body.classList.remove('dropdown-open');
}
function toggleDropdown(id) {
  const panel = document.getElementById(id);
  if (!panel) return;
  const wasOpen = panel.classList.contains('show');
  closeAllDropdowns();
  if (!wasOpen) {
    panel.classList.add('show');
    document.body.classList.add('dropdown-open');
  }
}

window._cmpPages = []; window._cmpIdx = 0;
window._tblPages = []; window._tblIdx = 0;

function _normalizePages(data) {
  if (!data) return [];
  if (Array.isArray(data)) return data;
  return [data];
}

function _renderTableHTML(data, styleClass) {
  let html = '<table class="cmp-table ' + (styleClass||'') + '"><thead><tr>';
  data.cols.forEach(c => html += `<th>${c}</th>`);
  html += '</tr></thead><tbody>';
  data.rows.forEach(row => {
    html += '<tr>';
    row.forEach(cell => html += `<td>${cell}</td>`);
    html += '</tr>';
  });
  html += '</tbody></table>';
  return html;
}

function renderCompareTable() {
  window._cmpPages = _normalizePages(_resolveLevelData(COMPARE_DATA[currentSub]));
  window._cmpIdx = 0;
  _showComparePage();
}
function _showComparePage() {
  const body = document.getElementById('compareBody');
  const titleEl = document.getElementById('compareTitle');
  const nav = document.getElementById('compareNav');
  const counter = document.getElementById('compareCounter');
  const pages = window._cmpPages;
  if (!pages.length) {
    body.innerHTML = '<div class="cmp-no-data">Bu konu için karşılaştırma verisi yok.</div>';
    if (titleEl) titleEl.textContent = '⚖️ Karşılaştırma';
    if (nav) nav.classList.add('hidden');
    return;
  }
  const i = window._cmpIdx;
  const data = pages[i];
  if (titleEl) titleEl.textContent = '⚖️ ' + (data.title || 'Karşılaştırma');
  body.innerHTML = _renderTableHTML(data, 'compare-style');
  if (nav) {
    if (pages.length > 1) {
      nav.classList.remove('hidden');
      counter.textContent = (i+1) + ' / ' + pages.length;
      document.getElementById('comparePrev').disabled = (i === 0);
      document.getElementById('compareNext').disabled = (i === pages.length - 1);
    } else {
      nav.classList.add('hidden');
    }
  }
}

// ====== EVENT LISTENERS =====================================
// ============================================================
function attachEvents() {
  // Bilgi listesi içinde parmakla kaydırma: touch olaylarını panel içinde tut
  (function(){
    const infoList = document.getElementById('infoList');
    if (infoList) {
      ['touchstart','touchmove','touchend','wheel'].forEach(ev => {
        infoList.addEventListener(ev, (e) => { e.stopPropagation(); }, { passive: true });
      });
      // kaydırdıkça özel çubuğu güncelle
      infoList.addEventListener('scroll', updateInfoScrollbar, { passive: true });
    }
    // tüm popup/panel gövdeleri için de aynı koruma (kaydırılabilir alanlar)
    ['compareBody','tableBody','scenePanel'].forEach(id => {
      const el = document.getElementById(id);
      if (el) ['touchstart','touchmove','touchend','wheel'].forEach(ev => {
        el.addEventListener(ev, (e) => { e.stopPropagation(); }, { passive: true });
      });
    });
  })();

  // Seviye dropdown
  document.getElementById('btnLevel').onclick = () => toggleDropdown('panelLevel');
  document.getElementById('btnTopic').onclick = () => {
    // Konu Rehberi'ne basıldığında bilgi paneli kapalıysa geri getir
    const bp = document.getElementById('bottomPanel');
    if (bp) bp.classList.remove('hidden');
    toggleDropdown('panelTopic');
  };

  document.querySelectorAll('#panelLevel .dropdown-item').forEach(item => {
    item.onclick = () => {
      currentLevel = item.dataset.level;
      document.querySelectorAll('#panelLevel .dropdown-item').forEach(x => x.classList.remove('active'));
      item.classList.add('active');
      const labels = { ilkokul: 'İlkokul', ortaokul: 'Ortaokul', lise: 'Lise', tyt_ayt: 'TYT-AYT' };
      document.getElementById('levelLabel').textContent = labels[currentLevel] || 'Lise';
      closeAllDropdowns();
      // sahneyi yeniden kur (etiket seviyeleri değişir)
      if (currentSub) selectSub(currentSub);
      // Açık olan popup'ları da yeni seviyeye göre yenile
      if (document.getElementById('compareOverlay').classList.contains('show')) renderCompareTable();
      if (document.getElementById('tableOverlay').classList.contains('show')) renderInfoTable();
      if (window._showGestureToast) window._showGestureToast('🎓 Seviye: ' + (labels[currentLevel] || 'Lise'));
      if (window._haptic) window._haptic(15);
    };
  });

  // Mod (sade/detaylı)
  document.getElementById('btnMode').onclick = () => toggleDropdown('panelMode');
  document.querySelectorAll('#panelMode .dropdown-item').forEach(item => {
    item.onclick = () => {
      currentMode = item.dataset.mode;
      document.querySelectorAll('#panelMode .dropdown-item').forEach(x => x.classList.remove('active'));
      item.classList.add('active');
      const btnMode = document.getElementById('btnMode');
      if (currentMode === 'sade') {
        btnMode.textContent = '📄'; btnMode.classList.add('active');
        btnMode.title = 'Görünüm Modu: Sade';
      } else {
        btnMode.textContent = '📚'; btnMode.classList.remove('active');
        btnMode.title = 'Görünüm Modu: Detaylı';
      }
      closeAllDropdowns();
      if (currentSub) { updateInfoPanel(currentSub); applyModeToLabels(); }
      if (window._haptic) window._haptic(15);
    };
  });

  // Navigasyon
  document.getElementById('navPrev').onclick = () => navigate(-1);
  document.getElementById('navNext').onclick = () => navigate(1);

  // Bilgi paneli kapat
  document.getElementById('infoCloseBtn').onclick = () => {
    document.getElementById('bottomPanel').classList.add('hidden');
  };

  // Aksiyon butonları
  const spinBtn = document.getElementById('spinBtn');
  spinBtn.onclick = () => {
    window._autoSpinActive = !window._autoSpinActive;
    spinBtn.classList.toggle('active', window._autoSpinActive);
    // tüm model gruplarına spin ver
    if (window._currentModelGroup) {
      window._currentModelGroup.userData.spin = window._autoSpinActive ? 0.3 : 0;
      if (!dynamicObjects.includes(window._currentModelGroup)) dynamicObjects.push(window._currentModelGroup);
    }
    if (window._haptic) window._haptic(15);
  };

  const labelBtn = document.getElementById('labelBtn');
  labelBtn.onclick = () => {
    // Etiket yazıları VE okları birlikte aç/kapa
    labelsVisible = !labelsVisible;
    window._leaderLinesVisible = labelsVisible;
    labelBtn.classList.toggle('active', labelsVisible);
    document.querySelectorAll('.info3d-label, .label3d').forEach(el => {
      if (labelsVisible) {
        el.dataset.labelHidden = '0';
        if (el.dataset.userHidden !== '1') el.style.display = 'block';
      } else {
        el.dataset.labelHidden = '1';
        el.style.display = 'none';
      }
    });
    if (!labelsVisible) {
      const svg = document.getElementById('leaderLines');
      if (svg) svg.innerHTML = '';
    }
    if (window._haptic) window._haptic(15);
  };
  window._leaderLinesVisible = true;
  labelBtn.classList.add('active');

  const animBtn = document.getElementById('animBtn');
  animBtn.onclick = () => {
    window._isPlayingActive = !window._isPlayingActive;
    animBtn.classList.toggle('active', window._isPlayingActive);
    animBtn.querySelector('.ico').textContent = window._isPlayingActive ? '⏸️' : '▶️';
    const lbl = animBtn.querySelector('span:last-child');
    if (lbl) lbl.textContent = window._isPlayingActive ? 'Durdur' : 'Çalıştır';
    if (window._showGestureToast) {
      window._showGestureToast(window._isPlayingActive ? '▶️ Animasyon başladı' : '⏸️ Duraklatıldı');
    }
    if (window._haptic) window._haptic(15);
  };
  // Başlangıçta durakta
  animBtn.classList.remove('active');
  animBtn.querySelector('.ico').textContent = '▶️';

  // Tema
  document.getElementById('btnTheme').onclick = () => {
    document.body.classList.toggle('light-mode');
    const isLight = document.body.classList.contains('light-mode');
    document.getElementById('btnTheme').textContent = isLight ? '☀️' : '🌙';
    window._lightMode = isLight;
    applySceneTheme();
    if (window._haptic) window._haptic(15);
  };

  // Tam ekran
  document.getElementById('btnFs').onclick = () => {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen && document.documentElement.requestFullscreen();
    } else {
      document.exitFullscreen && document.exitFullscreen();
    }
    if (window._haptic) window._haptic(15);
  };

  // Paylaş
  document.getElementById('btnSend').onclick = () => {
    document.getElementById('shareOverlay').classList.add('show');
  };
  document.getElementById('shareClose').onclick = () => {
    document.getElementById('shareOverlay').classList.remove('show');
  };
  document.getElementById('shareWhatsApp').onclick = () => {
    const txt = encodeURIComponent('🔍 Işığın Kırılması ve Mercekler — 3D interaktif fizik simülasyonu!');
    window.open('https://wa.me/?text=' + txt, '_blank');
  };
  document.getElementById('shareCopy').onclick = () => {
    try { navigator.clipboard.writeText(window.location.href); } catch(e){}
    if (window._showGestureToast) window._showGestureToast('📋 Bağlantı kopyalandı');
    document.getElementById('shareOverlay').classList.remove('show');
  };
  document.getElementById('shareDownload').onclick = () => {
    try {
      const link = document.createElement('a');
      link.download = 'optik-simulasyon.png';
      link.href = renderer.domElement.toDataURL('image/png');
      link.click();
    } catch(e){}
    document.getElementById('shareOverlay').classList.remove('show');
  };

  // Karşılaştırma
  document.getElementById('btnCompare').onclick = () => {
    renderCompareTable();
    document.getElementById('compareOverlay').classList.add('show');
  };
  document.getElementById('compareClose').onclick = () => {
    document.getElementById('compareOverlay').classList.remove('show');
  };
  document.getElementById('comparePrev').onclick = () => {
    if (window._cmpIdx > 0) { window._cmpIdx--; _showComparePage(); if (window._haptic) window._haptic(10); }
  };
  document.getElementById('compareNext').onclick = () => {
    if (window._cmpIdx < window._cmpPages.length - 1) { window._cmpIdx++; _showComparePage(); if (window._haptic) window._haptic(10); }
  };

  // Tablo
  document.getElementById('btnTable').onclick = () => {
    renderInfoTable();
    document.getElementById('tableOverlay').classList.add('show');
  };
  document.getElementById('tableClose').onclick = () => {
    document.getElementById('tableOverlay').classList.remove('show');
  };
  document.getElementById('tablePrev').onclick = () => {
    if (window._tblIdx > 0) { window._tblIdx--; _showTablePage(); if (window._haptic) window._haptic(10); }
  };
  document.getElementById('tableNext').onclick = () => {
    if (window._tblIdx < window._tblPages.length - 1) { window._tblIdx++; _showTablePage(); if (window._haptic) window._haptic(10); }
  };

  // Overlay dışına tıkla → kapat
  ['shareOverlay','compareOverlay','tableOverlay'].forEach(id => {
    const ov = document.getElementById(id);
    ov.onclick = (e) => { if (e.target === ov) ov.classList.remove('show'); };
  });

  // Dışarı tıkla → dropdown kapat
  document.addEventListener('click', (e) => {
    if (!e.target.closest('.dropdown-panel') && !e.target.closest('.stack-btn') && !e.target.closest('.tool-icon-btn')) {
      closeAllDropdowns();
    }
  });
}

// ============================================================
// ====== BAŞLATMA ============================================
// ============================================================
init();
attachEvents();
buildTopicDropdown();
selectSub('kirilmaNedir');
animate();

console.log('✓ Optik simülasyonu başlatıldı');
</script>
</body>
