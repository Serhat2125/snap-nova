// === BUILDER 1.1: GENEL BAKIŞ ===
SubBuilders.buildGenelBakis = function() {
  const grp = new THREE.Group();
  camera.position.set(0, 13.0, 22.4);
  controls.target.set(0, 1.5, 0);
  controls.update();

  grp.add(makeSceneAtmosphere({ tint: 0x4FC3F7, particles: 90 }));
  grp.add(makeGeoLighting());

  const terrain = makeTerrainV2({
    size: 14, segments: 110, maxHeight: 2.8,
    heightFn: (x, z) => {
      let h = 0;
      h += Math.exp(-((x + 4.5) ** 2 + (z + 0.8) ** 2) / 5.5) * 1.05;
      h += Math.exp(-((x - 0.8) ** 2 + (z - 1) ** 2) / 3.5) * 0.7;
      const plato = Math.exp(-((x - 4.5) ** 2 + (z + 1) ** 2) / 6) * 0.65;
      h += plato * (plato > 0.35 ? 1.4 : 1);
      h -= Math.exp(-((x + 1.5) ** 2 + (z - 0.2) ** 2) / 1.8) * 0.18;
      h += fbm(x * 0.5, z * 0.5, 4) * 0.12;
      if (z > 3.5) h *= Math.max(0, 1 - (z - 3.5) * 0.5);
      return Math.max(0, h);
    }
  });
  grp.add(terrain);

  const contours = makeContoursFromTerrain(terrain, {
    levels: [0.3, 0.7, 1.1, 1.6, 2.1, 2.5],
    lift: 0.04, tubeRadius: 0.022, color: 0xFFEB3B, emissive: 1.0
  });
  grp.add(contours);

  const ocean = makeOceanV2({ size: 10 });
  ocean.position.set(0.5, -0.03, 5.5);
  ocean.scale.set(1.4, 1, 0.8);
  grp.add(ocean);

  const delta = makeDeltaV2({ radius: 1.5 });
  delta.position.set(-1, 0.04, 3.3);
  delta.rotation.y = Math.PI;
  delta.scale.set(0.85, 1, 0.75);
  grp.add(delta);

  const riverPts = [
    new THREE.Vector3(-4.5, 1.6, -1),
    new THREE.Vector3(-3, 1.0, -0.2),
    new THREE.Vector3(-2, 0.5, 0.8),
    new THREE.Vector3(-1.3, 0.2, 2),
    new THREE.Vector3(-1.1, 0.06, 3.3)
  ];
  const river = makeRiver(riverPts, { radius: 0.12 });
  grp.add(river);

  const waterParts = makeWaterParticlesAlongPath(riverPts, {
    count: 180, spread: 0.12, color: 0x82B1FF, size: 0.07, speed: 0.4
  });
  grp.add(waterParts);

  addLabel(new THREE.Vector3(-6.5, 5, -2), '⛰️ DAĞ', 'epi', new THREE.Vector3(-4.5, 2.6, -0.8));
  addLabel(new THREE.Vector3(-3, 2.5, 2.8), '🌊 VADİ', '', new THREE.Vector3(-1.5, 0.5, 0.3));
  addLabel(new THREE.Vector3(6.5, 3.8, -2.5), '🏞️ PLATO', 'phloem', new THREE.Vector3(4.5, 1.8, -1));
  addLabel(new THREE.Vector3(-3, 2, 4.5), '🔺 DELTA', 'chloro', new THREE.Vector3(-1, 0.15, 3));
  addLabel(new THREE.Vector3(5, 2, 6.5), '🌊 DENİZ (0m)', 'warn', new THREE.Vector3(2.5, 0.05, 5.5));
  addLabel(new THREE.Vector3(0, 6, -3), '🗺️ TÜRKİYE PANORAMASI', 'warn', new THREE.Vector3(0, 6, -3));

  scene.add(grp);
  markDynamic(grp);

  window._customAnim = (t, dt) => {
    grp.traverse(o => {
      if (o.userData._isAtmDust) {
        const pos = o.geometry.attributes.position;
        for (let i = 0; i < pos.count; i++) {
          const x = pos.getX(i), z = pos.getZ(i);
          const angle = Math.atan2(z + 2, x) + dt * 0.05;
          const r = Math.sqrt(x*x + (z+2)*(z+2));
          pos.setX(i, Math.cos(angle) * r);
          pos.setZ(i, Math.sin(angle) * r - 2);
        }
        pos.needsUpdate = true;
      }
    });
    if (waterParts.userData._curve) {
      const pos = waterParts.geometry.attributes.position;
      const phases = waterParts.userData._phases;
      const curve = waterParts.userData._curve;
      const spread = waterParts.userData._spread;
      const speed = waterParts.userData._flowSpeed;
      for (let i = 0; i < pos.count; i++) {
        phases[i] = (phases[i] + dt * speed) % 1;
        const p = curve.getPoint(phases[i]);
        pos.setX(i, p.x + (Math.sin(t * 3 + i) * 0.5 - 0.25) * spread);
        pos.setY(i, p.y + Math.cos(t * 2 + i * 0.3) * spread * 0.3);
        pos.setZ(i, p.z + (Math.cos(t * 2.5 + i) * 0.5 - 0.25) * spread);
      }
      pos.needsUpdate = true;
    }
    if (ocean.userData._oceanGeo) {
      const geo = ocean.userData._oceanGeo;
      const base = ocean.userData._basePositions;
      const pos = geo.attributes.position;
      for (let i = 0; i < pos.count; i++) {
        const ix = i * 3;
        pos.array[ix + 1] = base[ix + 1] + Math.sin(t * 1.8 + base[ix] * 1.4) * 0.05 + Math.cos(t * 1.3 + base[ix + 2] * 1.1) * 0.04;
      }
      pos.needsUpdate = true;
      geo.computeVertexNormals();
    }
  };
};

  addLabel(new THREE.Vector3(-6, -1.8, 2.5), 'İzohips SIK = %25–50 eğim', 'epi', new THREE.Vector3(-3.5, 1.5, 0.5));
  addLabel(new THREE.Vector3(-6, -2.6, 2.5), '🌊 Hızlı akarsu', 'phloem', new THREE.Vector3(-3.5, 0.8, 1.4));

  const azGrp = new THREE.Group();
  azGrp.position.set(4.5, 0, 0);
  const azTerrain = makeTerrainV2({
    size: 4.5, segments: 60, maxHeight: 1.4,
    heightFn: (x, z) => {
      const r = Math.sqrt(x * x + z * z);
      const base = Math.exp(-r * r / 3.5) * 1.0;
      return Math.max(0, base + fbm(x * 1.5, z * 1.5, 3) * 0.1);
    }

  azGrp.add(azContours);
  const yavasRiverPts = [
    new THREE.Vector3(-2, 0.05, -1.5),
    new THREE.Vector3(-1.2, 0.05, -0.7),
    new THREE.Vector3(-0.3, 0.05, -0.9),
    new THREE.Vector3(0.5, 0.05, -0.2),
    new THREE.Vector3(1.2, 0.05, 0.4),
    new THREE.Vector3(0.6, 0.05, 1.1),
    new THREE.Vector3(1.4, 0.05, 1.8)
  ];
  const yavasRiver = makeRiver(yavasRiverPts, { radius: 0.07 });
  azGrp.add(yavasRiver);
  const yavasParts = makeWaterParticlesAlongPath(yavasRiverPts, { count: 100, spread: 0.08, color: 0x82B1FF, size: 0.06, speed: 0.2 });
  azGrp.add(yavasParts);
  grp.add(azGrp);
  addLabel(new THREE.Vector3(6.5, 3.5, -1), '🌾 AZ EĞİM', 'chloro', new THREE.Vector3(4.5, 1.4, 0));
  addLabel(new THREE.Vector3(6.2, -1.8, 2.8), 'İzohips SEYREK = %2–6 eğim', 'epi', new THREE.Vector3(5.5, 0.4, 0.5));
  addLabel(new THREE.Vector3(6.2, -2.6, 2.8), '🌊 Yavaş, menderes', 'phloem', new THREE.Vector3(4.5, 0.1, 0.4));

  addLabel(new THREE.Vector3(0, 6.3, 0), '📊 EKÜİDİSTANS = İzohipsler arası fark', 'warn', new THREE.Vector3(0, 6.3, 0));
  addLabel(new THREE.Vector3(0, 5.5, 0), 'Eğim % = (Yükselti / Yatay) × 100', '', new THREE.Vector3(0, 5.5, 0));

  const arr1 = new THREE.Mesh(new THREE.ConeGeometry(0.18, 0.5, 8), new THREE.MeshStandardMaterial({ color: 0xFFEB3B, emissive: 0xFFEB3B, emissiveIntensity: 0.9 }));
  arr1.rotation.z = -Math.PI / 2;
  arr1.position.set(-1.7, 2, 0);
  grp.add(arr1);
  const arr2 = arr1.clone();
  arr2.rotation.z = Math.PI / 2;
  arr2.position.set(1.7, 2, 0);
  grp.add(arr2);

  scene.add(grp);
  markDynamic(grp);

  window._customAnim = (t, dt) => {
    grp.traverse(o => {
      if (o.userData._isAtmDust) {
        const pos = o.geometry.attributes.position;
        for (let i = 0; i < pos.count; i++) {
          const x = pos.getX(i), z = pos.getZ(i);
          const angle = Math.atan2(z + 2, x) + dt * 0.04;
          const r = Math.sqrt(x*x + (z+2)*(z+2));
          pos.setX(i, Math.cos(angle) * r);
          pos.setZ(i, Math.sin(angle) * r - 2);
        }
        pos.needsUpdate = true;
      }
    });
    [hizliParts, yavasParts].forEach(part => {
      if (part.userData._curve) {
        const pos = part.geometry.attributes.position;
        const phases = part.userData._phases;
        const curve = part.userData._curve;
        const spread = part.userData._spread;
        const speed = part.userData._flowSpeed;
        for (let i = 0; i < pos.count; i++) {
          phases[i] = (phases[i] + dt * speed) % 1;
          const p = curve.getPoint(phases[i]);
          pos.setX(i, p.x + (Math.sin(t * 3 + i) * 0.5 - 0.25) * spread);
          pos.setY(i, p.y + Math.cos(t * 2 + i * 0.3) * spread * 0.3);
          pos.setZ(i, p.z + (Math.cos(t * 2.5 + i) * 0.5 - 0.25) * spread);
        }
        pos.needsUpdate = true;
      }
    });
    arr1.material.emissiveIntensity = 0.8 + Math.sin(t * 2) * 0.3;
    arr2.material.emissiveIntensity = 0.8 + Math.sin(t * 2 + 1) * 0.3;
  };
};

// === BUILDER 2.3: PROFİL ÇIKARMA ===
SubBuilders.buildProfilCikarma = function() {
  const grp = new THREE.Group();
  camera.position.set(0, 7.2, 18.2);
  controls.target.set(0, 0, 0);
  controls.update();

  grp.add(makeSceneAtmosphere({ tint: 0xCE93D8, particles: 80 }));
  grp.add(makeGeoLighting());

  const mapGrp = new THREE.Group();
  mapGrp.position.set(0, 2.5, 0);
  const profileHeightFn = (x, z) => {
    let h = 0;
    h += Math.exp(-((x + 1.8) ** 2 + z * z) / 1.0) * 1.3;
    h += Math.exp(-((x - 1.5) ** 2 + z * z) / 0.8) * 1.0;
    h += fbm(x * 1.8, z * 1.8, 3) * 0.12;
    return Math.max(0, h);
  };
  const mapTerrain = makeTerrainV2({ size: 7, segments: 80, maxHeight: 1.5, heightFn: profileHeightFn });
  mapGrp.add(mapTerrain);
  const mapContours = makeContoursFromTerrain(mapTerrain, { levels: [0.2, 0.5, 0.85, 1.2], lift: 0.02, tubeRadius: 0.022, color: 0xFFEB3B, emissive: 0.95 });
  mapGrp.add(mapContours);

  const lineSegments = 30;
  const lineHeights = [];
  for (let i = 0; i <= lineSegments; i++) {
    const x = -3.3 + (6.6 * i / lineSegments);
    const y = profileHeightFn(x, 0) * 1.5 + 0.06;
    lineHeights.push(new THREE.Vector3(x, y, 0));
  }
  const lineCurve = new THREE.CatmullRomCurve3(lineHeights);
  const lineTube = new THREE.Mesh(new THREE.TubeGeometry(lineCurve, 80, 0.045, 8, false), new THREE.MeshStandardMaterial({ color: 0xFF1744, emissive: 0xFF1744, emissiveIntensity: 1.2, roughness: 0.2, metalness: 0.4, toneMapped: false }));
  mapGrp.add(lineTube);

  const pinA = makeMapPin({ color: 0xFF1744 });
  pinA.position.set(-3.4, 0.05, 0);
  pinA.scale.set(0.55, 0.55, 0.55);
  mapGrp.add(pinA);
  const pinB = makeMapPin({ color: 0xFF1744 });
  pinB.position.set(3.4, 0.05, 0);
  pinB.scale.set(0.55, 0.55, 0.55);
  mapGrp.add(pinB);

  addLabel(new THREE.Vector3(-4.5, 3.5, 0), 'A', 'warn', new THREE.Vector3(-3.4, 2.7, 0));
  addLabel(new THREE.Vector3(4.5, 3.5, 0), 'B', 'warn', new THREE.Vector3(3.4, 2.7, 0));
  grp.add(mapGrp);
  addLabel(new THREE.Vector3(0, 4.5, 0), '🗺️ ÜSTTEN — A→B KESİMİ', 'epi', new THREE.Vector3(0, 4.5, 0));

  const profilePoints = [];
  for (let i = 0; i <= 25; i++) {
    const x = -3.3 + (6.6 * i / 25);
    profilePoints.push(profileHeightFn(x, 0));
  }
  const profile = makeProfileSection({ width: 7, height: 2, points: profilePoints });
  profile.position.set(0, -2.8, 0);
  grp.add(profile);

  addLabel(new THREE.Vector3(-4.5, -2.3, 0), 'A', 'warn', new THREE.Vector3(-3.4, -2.95, 0));
  addLabel(new THREE.Vector3(4.5, -2.3, 0), 'B', 'warn', new THREE.Vector3(3.4, -2.95, 0));
  addLabel(new THREE.Vector3(0, -4.5, 0), '📈 PROFİL (Yandan görünüm)', 'phloem', new THREE.Vector3(0, -4.5, 0));

  for (let i = 0; i < 5; i++) {
    const ar = new THREE.Mesh(new THREE.ConeGeometry(0.08, 0.25, 8), new THREE.MeshStandardMaterial({ color: 0x29B6F6, emissive: 0x29B6F6, emissiveIntensity: 0.8, roughness: 0.3 }));
    ar.rotation.x = Math.PI;
    ar.position.set(-2.8 + i * 1.4, 0.5, 0);
    ar.userData._arrow = true;
    ar.userData._baseY = 0.5;
    grp.add(ar);
  }

  addLabel(new THREE.Vector3(0, 5.7, 0), '📈 PROFİL ÇIKARMA', 'warn', new THREE.Vector3(0, 5.7, 0));

  scene.add(grp);
  markDynamic(grp);

  window._customAnim = (t, dt) => {
    grp.traverse(o => {
      if (o.userData._isAtmDust) {
        const pos = o.geometry.attributes.position;
        for (let i = 0; i < pos.count; i++) {
          const x = pos.getX(i), z = pos.getZ(i);
          const angle = Math.atan2(z + 2, x) + dt * 0.04;
          const r = Math.sqrt(x*x + (z+2)*(z+2));
          pos.setX(i, Math.cos(angle) * r);
          pos.setZ(i, Math.sin(angle) * r - 2);
        }
        pos.needsUpdate = true;
      }
      if (o.userData._arrow) {
        o.position.y = o.userData._baseY + Math.sin(t * 2.2 + o.position.x) * 0.18;
        o.material.emissiveIntensity = 0.7 + Math.sin(t * 3 + o.position.x) * 0.3;
      }
    });
    lineTube.material.emissiveIntensity = 1.0 + Math.sin(t * 2.5) * 0.4;
  };
};

  const sirtTerrain = makeTerrainV2({
    size: 4, segments: 70, maxHeight: 2.5,
    heightFn: (x, z) => {
      const ridge = Math.exp(-x * x / 0.7) * 1.8;
      const slope = -z * 0.15;
      const noise = fbm(x * 1.5, z * 1.5, 4) * 0.12;
      return Math.max(0, ridge + slope + 0.5 + noise);
    }
  });
  sirtGrp.add(sirtTerrain);
  const sirtContours = makeContoursFromTerrain(sirtTerrain, { levels: [0.5, 0.9, 1.3, 1.7, 2.1], lift: 0.025, tubeRadius: 0.025, color: 0xFFEB3B, emissive: 1.0 });
  sirtGrp.add(sirtContours);
  const suBolumuPts = [
    new THREE.Vector3(0, 2.3, -1.9),
    new THREE.Vector3(0, 2.35, -1),
    new THREE.Vector3(0, 2.4, 0),
    new THREE.Vector3(0, 2.35, 1),
    new THREE.Vector3(0, 2.25, 1.9)
  ];
  const suBolumu = new THREE.Mesh(new THREE.TubeGeometry(new THREE.CatmullRomCurve3(suBolumuPts), 30, 0.04, 6, false), new THREE.MeshStandardMaterial({ color: 0xFF1744, emissive: 0xFF1744, emissiveIntensity: 1.0, roughness: 0.3, toneMapped: false }));
  sirtGrp.add(suBolumu);
  const solDere = [
    new THREE.Vector3(-0.1, 1.5, 0),
    new THREE.Vector3(-0.7, 1.0, 0.5),
    new THREE.Vector3(-1.4, 0.5, 0.8),
    new THREE.Vector3(-1.9, 0.2, 1.3)
  ];
  const sagDere = [
    new THREE.Vector3(0.1, 1.5, 0),
    new THREE.Vector3(0.7, 1.0, -0.5),
    new THREE.Vector3(1.4, 0.5, -0.8),
    new THREE.Vector3(1.9, 0.2, -1.3)
  ];
  sirtGrp.add(makeRiver(solDere, { radius: 0.06 }));
  sirtGrp.add(makeRiver(sagDere, { radius: 0.06 }));
  grp.add(sirtGrp);
  addLabel(new THREE.Vector3(6.5, 5.5, -1), '⛰️ SIRT', 'chloro', new THREE.Vector3(4.5, 2.4, 0));
  addLabel(new THREE.Vector3(6.5, 4.7, -1), 'V Sivri ucu aşağı (alçak tarafa)', '', new THREE.Vector3(6.5, 4.7, -1));
  addLabel(new THREE.Vector3(6.5, -2.2, 2.5), 'SU BÖLÜMÜ HATTI', 'phloem', new THREE.Vector3(4.5, 2.4, 0));
  addLabel(new THREE.Vector3(6.5, -3, 2.5), 'Üstte kuru (iki vadi arası)', 'epi', new THREE.Vector3(6.5, -3, 2.5));

  addLabel(new THREE.Vector3(0, 6.3, 0), '🌊 VADİ (˄) vs ⛰️ SIRT (V)', 'warn', new THREE.Vector3(0, 6.3, 0));
  addLabel(new THREE.Vector3(0, 5.5, 0), 'Kıvrımın sivri ucu YÜKSEK tarafa → VADİ', '', new THREE.Vector3(0, 5.5, 0));

  scene.add(grp);
  markDynamic(grp);

  window._customAnim = (t, dt) => {
    grp.traverse(o => {
      if (o.userData._isAtmDust) {
        const pos = o.geometry.attributes.position;
        for (let i = 0; i < pos.count; i++) {
          const x = pos.getX(i), z = pos.getZ(i);
          const angle = Math.atan2(z + 2, x) + dt * 0.04;
          const r = Math.sqrt(x*x + (z+2)*(z+2));
          pos.setX(i, Math.cos(angle) * r);
          pos.setZ(i, Math.sin(angle) * r - 2);
        }
        pos.needsUpdate = true;
      }
    });
    if (vadiParts.userData._curve) {
      const pos = vadiParts.geometry.attributes.position;
      const phases = vadiParts.userData._phases;
      const curve = vadiParts.userData._curve;
      const spread = vadiParts.userData._spread;
      const speed = vadiParts.userData._flowSpeed;
      for (let i = 0; i < pos.count; i++) {
        phases[i] = (phases[i] + dt * speed) % 1;
        const p = curve.getPoint(phases[i]);
        pos.setX(i, p.x + (Math.sin(t * 3 + i) * 0.5 - 0.25) * spread);
        pos.setY(i, p.y + Math.cos(t * 2 + i * 0.3) * spread * 0.3);
        pos.setZ(i, p.z + (Math.cos(t * 2.5 + i) * 0.5 - 0.25) * spread);
      }
      pos.needsUpdate = true;
    }
    vadiAriow.material.emissiveIntensity = 0.9 + Math.sin(t * 3) * 0.3;
    suBolumu.material.emissiveIntensity = 0.9 + Math.sin(t * 2.5) * 0.3;
  };
};

  addLabel(new THREE.Vector3(0, -2.5, 4.5), 'Örnek: Khyber 1070m, Brenner 1370m, Stelvio 2757m', 'chloro', new THREE.Vector3(0, -2.5, 4.5));

// === BUILDER 4.1: FALEZ ve ŞELALE ===
SubBuilders.buildFalezSelale = function() {
  const grp = new THREE.Group();
  camera.position.set(0, 7.8, 19.6);
  controls.target.set(0, 1, 0);
  controls.update();

  grp.add(makeSceneAtmosphere({ tint: 0x0288D1, particles: 90 }));
  grp.add(makeGeoLighting());

  const falezGrp = new THREE.Group();
  falezGrp.position.set(-4.5, 0, 0);
  const falez = makeCliffV2({ height: 2.8, width: 2.2, depth: 1.6 });
  falez.position.set(0, 1.4, 0);
  falezGrp.add(falez);
  const cim = new THREE.Mesh(new THREE.BoxGeometry(2.3, 0.1, 1.7), new THREE.MeshStandardMaterial({ color: 0x558B2F, roughness: 0.9, emissive: 0x558B2F, emissiveIntensity: 0.1 }));
  cim.position.set(0, 2.85, 0);
  cim.castShadow = true;
  falezGrp.add(cim);
  const denizFalez = makeOceanV2({ size: 5 });
  denizFalez.position.set(2.5, 0, 0);
  falezGrp.add(denizFalez);
  const wfFoamCount = 80;
  const wfFoamPos = new Float32Array(wfFoamCount * 3);
  const wfFoamPhase = new Float32Array(wfFoamCount);
  for (let i = 0; i < wfFoamCount; i++) {
    wfFoamPos[i * 3] = 0.9 + Math.random() * 0.4;
    wfFoamPos[i * 3 + 1] = Math.random() * 0.4;
    wfFoamPos[i * 3 + 2] = (Math.random() - 0.5) * 1.6;
    wfFoamPhase[i] = Math.random() * Math.PI * 2;
  }
  const wfFoamGeo = new THREE.BufferGeometry();
  wfFoamGeo.setAttribute('position', new THREE.BufferAttribute(wfFoamPos, 3));
  const wfFoam = new THREE.Points(wfFoamGeo, new THREE.PointsMaterial({ color: 0xFFFFFF, size: 0.08, sizeAttenuation: true, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending, depthWrite: false }));
  wfFoam.userData._falezFoam = true;
  wfFoam.userData._phase = wfFoamPhase;
  falezGrp.add(wfFoam);
  for (let i = 0; i < 6; i++) {
    const h = 0.4 + i * 0.5;
    if (h > 2.7) break;
    const tube = new THREE.Mesh(new THREE.TorusGeometry(1.1, 0.022, 6, 32, Math.PI), new THREE.MeshStandardMaterial({ color: 0xFFEB3B, emissive: 0xFFEB3B, emissiveIntensity: 0.95, roughness: 0.3, toneMapped: false }));
    tube.rotation.x = -Math.PI / 2;
    tube.rotation.z = Math.PI;
    tube.position.set(0.2, h, 0);
    tube.scale.set(1, 0.7, 1);
    falezGrp.add(tube);
  }
  grp.add(falezGrp);
  addLabel(new THREE.Vector3(-6.5, 4.7, -1), '🌊 FALEZ (Yalıyar)', 'warn', new THREE.Vector3(-4.5, 1.4, 0));
  addLabel(new THREE.Vector3(-6.5, -1.5, 2.8), 'Deniz kıyısı DİK kayalık', 'phloem', new THREE.Vector3(-5.3, 1.4, 0.8));
  addLabel(new THREE.Vector3(-6.5, -2.2, 2.8), 'İzohipsler bitişik (çakışık)', 'epi', new THREE.Vector3(-4.7, 1.5, 0));
  addLabel(new THREE.Vector3(-6.5, -2.9, 2.8), 'Örnek: Dover (İngiltere), Moher (İrlanda)', 'phloem', new THREE.Vector3(-6.5, -2.9, 2.8));

  const selaleGrp = new THREE.Group();
  selaleGrp.position.set(4.5, 0, 0);
  const ustYatak = new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.5, 1.7, 12, 4, 8), new THREE.MeshStandardMaterial({ color: 0x5D4037, roughness: 0.95, metalness: 0.05 }));
  const uyPos = ustYatak.geometry.attributes.position;
  for (let i = 0; i < uyPos.count; i++) {
    const x = uyPos.getX(i);
    const y = uyPos.getY(i);
    const z = uyPos.getZ(i);
    uyPos.setX(i, x + fbm(y * 3, z * 3, 3) * 0.04);
    uyPos.setY(i, y + fbm(x * 3, z * 3, 3) * 0.05);
  }
  ustYatak.geometry.computeVertexNormals();
  ustYatak.position.set(-0.7, 2.35, 0);
  ustYatak.castShadow = true; ustYatak.receiveShadow = true;
  selaleGrp.add(ustYatak);
  const ustAkarsuPts = [
    new THREE.Vector3(-2, 2.65, 0),
    new THREE.Vector3(-1, 2.65, 0.1),
    new THREE.Vector3(0, 2.65, 0),
    new THREE.Vector3(0.3, 2.65, 0)
  ];
  selaleGrp.add(makeRiver(ustAkarsuPts, { radius: 0.1 }));
  const selale = makeWaterfallV2({ height: 2, width: 0.9 });
  selale.position.set(0.3, 0.4, 0);
  selaleGrp.add(selale);
  const altYatak = new THREE.Mesh(new THREE.BoxGeometry(2.8, 0.4, 2.2, 12, 3, 8), new THREE.MeshStandardMaterial({ color: 0x6D4C41, roughness: 0.95, metalness: 0.05 }));
  const ayPos = altYatak.geometry.attributes.position;
  for (let i = 0; i < ayPos.count; i++) {
    ayPos.setY(i, ayPos.getY(i) + fbm(ayPos.getX(i) * 3, ayPos.getZ(i) * 3, 3) * 0.05);
  }
  altYatak.geometry.computeVertexNormals();
  altYatak.position.set(0.5, 0.2, 0);
  altYatak.castShadow = true; altYatak.receiveShadow = true;
  selaleGrp.add(altYatak);
  for (let i = 0; i < 5; i++) {
    const y = 0.7 + i * 0.3;
    const tube = new THREE.Mesh(new THREE.CylinderGeometry(0.022, 0.022, 1.3, 6), new THREE.MeshStandardMaterial({ color: 0xFFEB3B, emissive: 0xFFEB3B, emissiveIntensity: 0.95, roughness: 0.3, toneMapped: false }));
    tube.rotation.x = Math.PI / 2;
    tube.position.set(0.35, y, 0);
    selaleGrp.add(tube);
  }
  grp.add(selaleGrp);
  addLabel(new THREE.Vector3(6.5, 4.7, -1), '💦 ŞELALE (Çağlayan)', 'chloro', new THREE.Vector3(4.8, 1.4, 0));
  addLabel(new THREE.Vector3(6.5, -1.5, 2.8), 'Akarsu DİK düşüş', 'phloem', new THREE.Vector3(4.8, 1.4, 0));
  addLabel(new THREE.Vector3(6.5, -2.2, 2.8), 'İzohipsler sıkışık (çakışık)', 'epi', new THREE.Vector3(4.85, 1.5, 0));
  addLabel(new THREE.Vector3(6.5, -2.9, 2.8), 'Örnek: Niagara, Victoria, Angel Falls 979m', 'phloem', new THREE.Vector3(6.5, -2.9, 2.8));

  addLabel(new THREE.Vector3(0, 5.7, 0), '🌊 DİK YAMAÇ İSTİSNASI', 'warn', new THREE.Vector3(0, 5.7, 0));
  addLabel(new THREE.Vector3(0, 5, 0), 'İzohipsler birbirine çakışır (taranır)', '', new THREE.Vector3(0, 5, 0));

  scene.add(grp);
  markDynamic(grp);

  window._customAnim = (t, dt) => {
    grp.traverse(o => {
      if (o.userData._isAtmDust) {
        const pos = o.geometry.attributes.position;
        for (let i = 0; i < pos.count; i++) {
          const x = pos.getX(i), z = pos.getZ(i);
          const angle = Math.atan2(z + 2, x) + dt * 0.04;
          const r = Math.sqrt(x*x + (z+2)*(z+2));
          pos.setX(i, Math.cos(angle) * r);
          pos.setZ(i, Math.sin(angle) * r - 2);
        }
        pos.needsUpdate = true;
      }
      if (o.userData._isSpray) {
        const pos = o.geometry.attributes.position;
        const life = o.userData._life;
        const speed = o.userData._speed;
        const height = o.userData._height;
        const width = o.userData._width;
        for (let i = 0; i < pos.count; i++) {
          life[i] -= dt * speed[i] * 0.5;
          if (life[i] < 0) {
            life[i] = 1;
            pos.setX(i, 0.2 + (Math.random() - 0.5) * width * 0.9);
            pos.setY(i, height);
            pos.setZ(i, (Math.random() - 0.5) * width * 0.4);
          } else {
            pos.setY(i, life[i] * height);
            pos.setX(i, pos.getX(i) + (Math.random() - 0.5) * 0.02);
          }
        }
        pos.needsUpdate = true;
      }
      if (o.userData._isFoam) {
        const pos = o.geometry.attributes.position;
        const phase = o.userData._phase;
        for (let i = 0; i < pos.count; i++) {
          phase[i] += dt * 1.5;
          pos.setY(i, 0.13 + Math.abs(Math.sin(phase[i])) * 0.1);
        }
        pos.needsUpdate = true;
      }
      if (o.userData._falezFoam) {
        const pos = o.geometry.attributes.position;
        const phase = o.userData._phase;
        for (let i = 0; i < pos.count; i++) {
          phase[i] += dt * 1.2;
          pos.setY(i, Math.abs(Math.sin(phase[i])) * 0.5 + 0.05);
        }
        pos.needsUpdate = true;
      }
    });
    if (denizFalez.userData._oceanGeo) {
      const geo = denizFalez.userData._oceanGeo;
      const base = denizFalez.userData._basePositions;
      const pos = geo.attributes.position;
      for (let i = 0; i < pos.count; i++) {
        const ix = i * 3;
        pos.array[ix + 1] = base[ix + 1] + Math.sin(t * 1.8 + base[ix] * 1.4) * 0.05 + Math.cos(t * 1.3 + base[ix + 2] * 1.1) * 0.04;
      }
      pos.needsUpdate = true;
      geo.computeVertexNormals();
    }
  };
};

// === BUILDER 4.2: DELTA ve KIYI ===
SubBuilders.buildDeltaKiyi = function() {
  const grp = new THREE.Group();
  camera.position.set(0, 9.1, 19.6);
  controls.target.set(0, 0.4, 0.5);
  controls.update();

  grp.add(makeSceneAtmosphere({ tint: 0x4DB6AC, particles: 90 }));
  grp.add(makeGeoLighting());

  const ustArazi = makeTerrainV2({
    size: 6, segments: 70, maxHeight: 1.5,
    heightFn: (x, z) => {
      if (z > 0.5) return 0;
      const base = Math.exp(-((Math.abs(x) - 0.5) ** 2 + (z + 2) ** 2) / 4) * 0.6;
      const high = Math.exp(-((z + 3.5) ** 2) / 1.5) * 1.0;
      return Math.max(0, base + high + fbm(x * 1.5, z * 1.5, 3) * 0.1);
    }
  });
  ustArazi.position.set(0, 0, -2);
  grp.add(ustArazi);
  const ustContours = makeContoursFromTerrain(ustArazi, { levels: [0.2, 0.5, 0.85, 1.2], lift: 0.025, tubeRadius: 0.022, color: 0xFFEB3B, emissive: 0.95 });
  ustContours.position.copy(ustArazi.position);
  grp.add(ustContours);

  const akarsuPts = [
    new THREE.Vector3(0, 1.3, -4.5),
    new THREE.Vector3(-0.2, 0.9, -3.5),
    new THREE.Vector3(0.15, 0.55, -2.5),
    new THREE.Vector3(-0.05, 0.3, -1.5),
    new THREE.Vector3(0, 0.15, -0.5),
    new THREE.Vector3(0, 0.08, 0.2)
  ];
  const akarsu = makeRiver(akarsuPts, { radius: 0.12 });
  grp.add(akarsu);
  const akarsuParts = makeWaterParticlesAlongPath(akarsuPts, { count: 200, spread: 0.1, color: 0x82B1FF, size: 0.08, speed: 0.35 });
  grp.add(akarsuParts);

  const delta = makeDeltaV2({ radius: 2.8 });
  delta.position.set(0, 0.06, 0.8);
  grp.add(delta);

  const deniz = makeOceanV2({ size: 12 });
  deniz.position.set(0, -0.02, 4.5);
  deniz.scale.set(1, 1, 0.7);
  grp.add(deniz);

  const izobatGrp = new THREE.Group();
  const izobatLevels = [
    { depth: -0.15, radius: 3.5, color: 0x4FC3F7, label: '-50m' },
    { depth: -0.3, radius: 2.7, color: 0x29B6F6, label: '-100m' },
    { depth: -0.5, radius: 1.9, color: 0x0288D1, label: '-200m' },
    { depth: -0.7, radius: 1.2, color: 0x01579B, label: '-500m' }
  ];
  izobatLevels.forEach(lev => {
    const ring = new THREE.Mesh(new THREE.TorusGeometry(lev.radius, 0.04, 8, 64, Math.PI * 1.4), new THREE.MeshStandardMaterial({ color: lev.color, emissive: lev.color, emissiveIntensity: 1.0, roughness: 0.2, metalness: 0.5, toneMapped: false, transparent: true, opacity: 0.95 }));
    ring.rotation.x = Math.PI / 2;
    ring.position.set(0, lev.depth, 4.5);
    ring.scale.set(1, 1, 0.65);
    ring.rotation.z = -Math.PI * 0.3;
    izobatGrp.add(ring);
  });
  grp.add(izobatGrp);
  addLabel(new THREE.Vector3(-5.5, 0.5, 4.5), '🌊 İZOBAT', 'phloem', new THREE.Vector3(-3, -0.3, 4.5));
  addLabel(new THREE.Vector3(-5.5, -0.3, 5), '(eş derinlik eğrileri)', '', new THREE.Vector3(-5.5, -0.5, 5));

  const sasanaShape = new THREE.Shape();
  sasanaShape.moveTo(-4, 1);
  sasanaShape.lineTo(-3, 2);
  sasanaShape.bezierCurveTo(-2, 2.7, 2, 2.7, 3, 2);
  sasanaShape.lineTo(4, 1);
  sasanaShape.lineTo(4, 6);
  sasanaShape.lineTo(-4, 6);

        for (let i = 0; i < pos.count; i++) {

          const r = Math.sqrt(x*x + (z+2)*(z+2));
          pos.setX(i, Math.cos(angle) * r);
          pos.setZ(i, Math.sin(angle) * r - 2);
        }
        pos.needsUpdate = true;
      }
    });
    if (akarsuParts.userData._curve) {
      const pos = akarsuParts.geometry.attributes.position;
      const phases = akarsuParts.userData._phases;
      const curve = akarsuParts.userData._curve;
      const spread = akarsuParts.userData._spread;
      const speed = akarsuParts.userData._flowSpeed;
      for (let i = 0; i < pos.count; i++) {
        phases[i] = (phases[i] + dt * speed) % 1;
        const p = curve.getPoint(phases[i]);
        pos.setX(i, p.x + (Math.sin(t * 3 + i) * 0.5 - 0.25) * spread);
        pos.setY(i, p.y + Math.cos(t * 2 + i * 0.3) * spread * 0.3);
        pos.setZ(i, p.z + (Math.cos(t * 2.5 + i) * 0.5 - 0.25) * spread);
      }
      pos.needsUpdate = true;
    }
    if (deniz.userData._oceanGeo) {
      const geo = deniz.userData._oceanGeo;
      const base = deniz.userData._basePositions;
      const pos = geo.attributes.position;
      for (let i = 0; i < pos.count; i++) {
        const ix = i * 3;
        pos.array[ix + 1] = base[ix + 1] + Math.sin(t * 1.8 + base[ix] * 1.4) * 0.06 + Math.cos(t * 1.3 + base[ix + 2] * 1.1) * 0.05;
      }
      pos.needsUpdate = true;
      geo.computeVertexNormals();
    }
    kiyi.material.emissiveIntensity = 1.0 + Math.sin(t * 2) * 0.3;
  };
};

// ============== EVENT LISTENERS ve SYSTEM ==============

let autoSpin = false;
let labelsOn = true;
let currentLevel = 'lise';
let currentMode = 'detayli';

function buildModuleDropdown() {
  const list = document.getElementById('moduleList');
  if (!list) return;
  list.innerHTML = '';
  const emojis = ['🔬','⊙','🍃','💧'];
  Object.keys(MODULES).forEach(modNum => {
    const mod = MODULES[modNum];
    const btn = document.createElement('button');
    btn.className = 'dropdown-item';
    if (parseInt(modNum) === currentModule) btn.classList.add('active');
    btn.dataset.module = modNum;
    const modName = 'Modül ' + modNum;
    const cleanTitle = mod.title.replace(/^[^\s]+\s+Modül\s+\d+:\s*/, '');
    btn.innerHTML = '<span class="di-emoji">' + emojis[parseInt(modNum)-1] + '</span>' +
                    '<span><b>' + modName + '</b><br><small style="opacity:0.7;font-size:10.5px;">' + cleanTitle + '</small></span>';
    btn.onclick = () => {
      selectModule(parseInt(modNum));
      const pm = document.getElementById('panelModule');
      if (pm) pm.classList.remove('show');
      buildModuleDropdown();
      buildTopicDropdown();
    };
    list.appendChild(btn);
  });
}

function buildTopicDropdown() {
  const list = document.getElementById('topicList');
  list.innerHTML = '';
  Object.keys(MODULES).forEach(modNum => {
    const mod = MODULES[modNum];
    const head = document.createElement('div');
    head.className = 'dropdown-cat-head';
    head.textContent = mod.title;
    list.appendChild(head);
    mod.subs.forEach(sub => {
      const btn = document.createElement('button');
      btn.className = 'dropdown-item';
      if (sub.key === currentSub) btn.classList.add('active');
      btn.dataset.key = sub.key;
      btn.dataset.module = modNum;
      const labelMatch = sub.label.match(/^([^\s]+)\s+(.+)$/);
      const emoji = labelMatch ? labelMatch[1] : '🌿';
      const name = labelMatch ? labelMatch[2] : sub.label;
      btn.innerHTML = '<span class="di-emoji">' + emoji + '</span><span>' + name + '</span>';
      btn.onclick = () => {
        selectSub(parseInt(modNum), sub.key);
        document.getElementById('panelTopic').classList.remove('show');
      };
      list.appendChild(btn);
    });
  });
}

function selectModule(modNum) {
  currentModule = modNum;
  const mod = MODULES[modNum];
  if (!mod) return;
  selectSub(modNum, mod.subs[0].key);
}

function selectSub(modNum, subKey) {
  currentSub = subKey;
  currentModule = modNum;
  clearScene();

  autoSpin = false;
  window._autoSpinActive = false;
  window._isPlayingActive = false;
  window._customAnim = null;
  if (typeof isPlaying !== 'undefined') {
    isPlaying = false;
    if (_playTickId) { cancelAnimationFrame(_playTickId); _playTickId = null; }
  }
  const sBtn = document.getElementById('spinBtn');
  const aBtn = document.getElementById('animBtn');
  if (sBtn) sBtn.classList.remove('active');
  if (aBtn) aBtn.classList.remove('active');

  document.getElementById('bottomPanel').classList.remove('hidden');

  if (modNum !== 4) {
    document.getElementById('bottomControl').classList.remove('show');
  }

  const mod = MODULES[modNum];
  const sub = mod.subs.find(s => s.key === subKey);
  if (sub && SubBuilders[sub.builder]) {
    SubBuilders[sub.builder]();
  }

  const Y_OFFSET = 1.8;
  controls.target.y -= Y_OFFSET;
  camera.position.y -= Y_OFFSET;
  // Kamerayı hedeften biraz geri çek → sahne ekrana tam sığsın, taşmasın
  // (kullanıcı isterse pinch/çift dokun ile yakınlaştırabilir)
  const ZOOM_OUT = 1.32;
  const _zd = camera.position.clone().sub(controls.target);
  camera.position.copy(controls.target).add(_zd.multiplyScalar(ZOOM_OUT));
  controls._syncFromCamera();

  const info = INFO_DATA[subKey];
  if (info) {
    const emojiMatch = info.title.match(/^([^\s]+)\s+(.+)$/);
    const emoji = emojiMatch ? emojiMatch[1] : '🌱';
    const title = emojiMatch ? emojiMatch[2] : info.title;
    const modRawTitle = MODULES[modNum] ? MODULES[modNum].title : '';
    const modName = modRawTitle.replace(/^[^\s]+\s+Modül\s+\d+:\s*/, '').trim() || '';
    const fullTitle = modName ? (modName + ' / ' + title) : title;
    document.getElementById('infoEmoji').textContent = emoji;
    document.getElementById('infoTitle').textContent = fullTitle;
    const tmp = document.createElement('div');
    const htmlContent = info[currentLevel] || info.lise || info.html || '';
    tmp.innerHTML = htmlContent;
    const listEl = document.getElementById('infoList');
    listEl.innerHTML = '';
    if (currentMode === 'sade') {
      const firstP = tmp.querySelector('p');
      if (firstP) {
        const summary = document.createElement('li');
        summary.innerHTML = firstP.innerHTML;
        listEl.appendChild(summary);
      }
      const firstUl = tmp.querySelector('ul');
      if (firstUl) {
        const liElements = Array.from(firstUl.children).filter(c => c.tagName === 'LI');
        liElements.slice(0, 3).forEach(liEl => {
          const li = document.createElement('li');
          const clean = liEl.cloneNode(true);
          clean.querySelectorAll('ul').forEach(n => n.remove());
          li.innerHTML = clean.innerHTML.trim();
          listEl.appendChild(li);
        });
      }
    } else {
      const firstP = tmp.querySelector('p');
      if (firstP) {
        const summary = document.createElement('li');
        summary.innerHTML = firstP.innerHTML;
        listEl.appendChild(summary);
      }
      tmp.querySelectorAll('h3, ul').forEach(el => {
        if (el.tagName === 'H3') {
          const sub = document.createElement('li');
          sub.className = 'subhead';
          sub.textContent = el.textContent;
          listEl.appendChild(sub);
        } else if (el.tagName === 'UL') {
          el.querySelectorAll('li').forEach(liEl => {
            const li = document.createElement('li');
            li.innerHTML = liEl.innerHTML;
            listEl.appendChild(li);
          });
        }
      });
    }
  }

  setTimeout(() => {
    if (window._labelRefs && window._labelRefs.length > 0) {
      const labelsActuallyOn = labelsOn !== false;
      window._labelRefs.forEach((ref, i) => {
        if (!ref.div) return;
        if (!labelsActuallyOn) {
          ref.div.style.display = 'none';
          ref.div.dataset.userHidden = '1';
          return;
        }
        if (currentMode === 'sade' && i % 2 === 1) {
          ref.div.style.display = 'none';
          ref.div.dataset.userHidden = '1';
        } else {
          ref.div.style.display = 'block';
          ref.div.dataset.userHidden = '0';
        }
      });
    }
  }, 50);

  buildTopicDropdown();
}

function toggleDropdown(panelId) {
  const panels = ['panelLevel', 'panelTopic'];
  panels.forEach(p => {
    const el = document.getElementById(p);
    if (!el) return;
    if (p === panelId) { el.classList.toggle('show'); } else { el.classList.remove('show'); }
  });
}

document.getElementById('btnLevel').onclick = () => toggleDropdown('panelLevel');
document.getElementById('btnTopic').onclick = () => toggleDropdown('panelTopic');

let _compareIdx = 0;
function _getLevelKey(level) {
  if (level === 'ilkokul' || level === 'ortaokul') return 'basit';
  return 'standart';
}
function _resolveLevelData(dataset, subKey) {
  const all = dataset[subKey];
  if (!all) return null;
  if (all.basit || all.standart) {
    const key = _getLevelKey(currentLevel);
    return all[key] || all.standart || all.basit;
  }
  return all;
}
function renderTableHTML(data) {
  let html = '<table class="cmp-table"><thead><tr>';
  data.headers.forEach(h => html += `<th>${h}</th>`);
  html += '</tr></thead><tbody>';
  data.rows.forEach(row => {
    html += '<tr>';
    row.forEach(cell => html += `<td>${cell}</td>`);
    html += '</tr>';
  });
  html += '</tbody></table>';
  return html;
}
function renderCompareTable() {
  const raw = _resolveLevelData(COMPARE_DATA, currentSub);
  const body = document.getElementById('compareBody');
  const titleEl = document.getElementById('compareTitle');
  const nav = document.getElementById('compareNav');
  if (!raw) {
    titleEl.textContent = '⚖️ Karşılaştırma';
    body.innerHTML = '<div class="cmp-no-data">Bu konu için karşılaştırma verisi yok.</div>';
    nav.classList.add('hidden');
    return;
  }
  const list = Array.isArray(raw) ? raw : [raw];
  if (_compareIdx >= list.length) _compareIdx = 0;
  const data = list[_compareIdx];
  titleEl.textContent = data.title;
  body.innerHTML = renderTableHTML(data);
  if (list.length > 1) {
    nav.classList.remove('hidden');
    document.getElementById('compareCounter').textContent = `${_compareIdx + 1} / ${list.length}`;
    document.getElementById('comparePrev').disabled = _compareIdx === 0;
    document.getElementById('compareNext').disabled = _compareIdx === list.length - 1;
  } else {
    nav.classList.add('hidden');
  }
}
document.getElementById('btnCompare').onclick = () => {
  _compareIdx = 0;
  renderCompareTable();
  document.getElementById('compareOverlay').classList.add('show');
};
document.getElementById('compareClose').onclick = () => {
  document.getElementById('compareOverlay').classList.remove('show');
};
document.getElementById('compareOverlay').onclick = (e) => {
  if (e.target.id === 'compareOverlay') { document.getElementById('compareOverlay').classList.remove('show'); }
};
document.getElementById('comparePrev').onclick = () => {
  if (_compareIdx > 0) { _compareIdx--; renderCompareTable(); }
};
document.getElementById('compareNext').onclick = () => {
  const raw = _resolveLevelData(COMPARE_DATA, currentSub);
  const list = Array.isArray(raw) ? raw : [raw];
  if (_compareIdx < list.length - 1) { _compareIdx++; renderCompareTable(); }
};

function navigate(dir) {
  const allSubs = [];
  Object.keys(MODULES).forEach(modNum => {
    MODULES[modNum].subs.forEach(s => allSubs.push({ modNum: parseInt(modNum), sub: s }));
  });
  const idx = allSubs.findIndex(x => x.sub.key === currentSub);
  let newIdx = idx + dir;
  if (newIdx < 0) newIdx = allSubs.length - 1;
  if (newIdx >= allSubs.length) newIdx = 0;
  const next = allSubs[newIdx];
  if (next.modNum !== currentModule) { selectModule(next.modNum); }
  selectSub(next.modNum, next.sub.key);
}
document.getElementById('navNext').onclick = () => navigate(1);
document.getElementById('navPrev').onclick = () => navigate(-1);

let isPlaying = false;
let _playTickId = null;
let _playT = 0;
document.getElementById('animBtn').onclick = function() {
  isPlaying = !isPlaying;
  window._isPlayingActive = isPlaying;
  this.classList.toggle('active', isPlaying);
  if (isPlaying) {
    if (currentModule === 4) {
      _playT = 0;
      const tick = () => {
        if (!isPlaying) return;
        _playT += 0.015;
        const val = Math.round(50 + 49 * Math.sin(_playT));
        const slider = document.getElementById('turgorSlider');
        if (slider) {
          slider.value = val;
          slider.dispatchEvent(new Event('input'));
        }
        _playTickId = requestAnimationFrame(tick);
      };
      tick();
    }
  } else {
    if (_playTickId) { cancelAnimationFrame(_playTickId); _playTickId = null; }
  }
};

});

  if (autoSpin && controls) {
    controls._sphericalTarget.theta += 0.005;

};
