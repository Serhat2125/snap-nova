<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Üslü Sayılar · 3B</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@500&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden}
body{background:#070912;font-family:'DM Sans',sans-serif;position:fixed;inset:0;color:#e8eaf4}
#scene{position:fixed;inset:0;z-index:1;display:block;width:100%;height:100%}

/* header */
.header{position:fixed;top:0;left:0;right:0;z-index:15;height:62px;display:flex;align-items:center;gap:12px;padding:0 16px;
  background:linear-gradient(180deg,#16213f,#16213fcc);border-bottom:1px solid #25325a}
.header .bk{width:38px;height:38px;border-radius:11px;background:rgba(255,255,255,.06);border:none;color:#fff;font-size:18px;cursor:pointer}
.header .hbtn{font-family:'Bricolage Grotesque';font-weight:800}
.header h1{font-family:'Bricolage Grotesque';font-weight:700;font-size:19px;color:#fff;flex:1;text-align:center;margin:0}
.sub{position:fixed;top:70px;left:0;right:0;z-index:14;text-align:center;font-family:'Bricolage Grotesque';font-weight:800;font-size:13px;
  color:#FFC857;text-shadow:0 1px 14px rgba(255,200,87,.4);transition:.4s;pointer-events:none}
.sub .fbox{display:inline-block;max-width:min(620px,calc(100% - 28px));white-space:normal;line-height:1.25;border:1.5px solid #FFC857;border-radius:11px;padding:3px 12px;background:rgba(13,20,38,.55);text-shadow:none;letter-spacing:.3px}
.hint{position:fixed;top:100px;left:0;right:0;text-align:center;z-index:14;font-size:10.5px;color:#5a648a;pointer-events:none}

/* bottom wrapper: control tabs + info panel */
.bwrap{position:fixed;left:50%;transform:translateX(-50%);bottom:74px;z-index:20;width:min(620px,calc(100% - 14px));display:flex;flex-direction:column;gap:9px}
.ctabs{display:none;gap:8px}
.ctabs.on{display:flex}
.ctab{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;padding:11px 6px;border-radius:13px;font-weight:700;font-size:12.5px;cursor:pointer;border:2px solid;transition:.15s;background:#0e1322}
.ctab .ci{font-size:14px}
.ctab.rot{color:#FFC857;border-color:#FFC857}
.ctab.lab{color:#B98CFF;border-color:#B98CFF}
.ctab.run{color:#ff6b7d;border-color:#ff6b7d}
.ctab.active{color:#070912}
.ctab.rot.active{background:#FFC857}.ctab.lab.active{background:#B98CFF}.ctab.run.active{background:#ff6b7d}

.panel{background:#0d1426;border:1.5px solid #2a3a63;border-radius:18px;overflow:hidden;display:flex;flex-direction:column;max-height:38vh;transition:max-height .28s cubic-bezier(.3,.8,.3,1)}
.panel.tall{max-height:74vh}
.pgrip{flex:0 0 auto;display:flex;align-items:center;justify-content:center;height:20px;cursor:pointer;color:#5a6a93;font-size:13px;letter-spacing:.3em;border-bottom:1px solid rgba(255,255,255,.05)}
.pgrip:active{transform:scale(.96)}.pgrip:hover{color:#9fb4e8}
.pprog{height:3px;background:rgba(255,255,255,.06)}.pprog i{display:block;height:100%;width:0;background:linear-gradient(90deg,#34F5A0,#4D8DFF,#FFB23E,#B98CFF)}
.phead{display:flex;align-items:center;gap:8px;padding:12px 14px 8px}
.phead .pt{flex:1;font-family:'Bricolage Grotesque';font-weight:700;font-size:15px;color:#fff;display:flex;align-items:center;gap:7px}
.phead .pt .ps{font-family:'DM Mono';font-size:17px}
.phead .pbtn{width:36px;height:36px;border-radius:11px;border:2px solid;background:transparent;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:.15s}
.phead .pbtn:active{transform:scale(.92)}
.phead .clap{color:#46d6e0;border-color:#46d6e0}
.phead .nav{color:#FFC857;border-color:#FFC857}
.phead .quiz{color:#ffd23e;border-color:#ffd23e}
.qpick-back{position:fixed;inset:0;background:rgba(4,5,10,.5);z-index:30;display:none;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.qpick-back.on{display:block}
.qpick{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%) scale(.96);z-index:31;width:min(430px,calc(100% - 32px));background:#0d1426;border:1.5px solid #2a3a63;border-radius:22px;padding:18px 18px 20px;display:none;opacity:0;transition:.16s}
.qpick.on{display:block;opacity:1;transform:translate(-50%,-50%) scale(1)}
.qpick-h{font-family:'Bricolage Grotesque';font-weight:700;font-size:16px;color:#fff;text-align:center;margin-bottom:4px}
.qpick-h span{color:#ffd23e}
.qpick-sub{font-size:11.5px;color:#8a93b5;text-align:center;margin-bottom:15px}
.qpick-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.qp-diff,.qp-go{border-radius:15px;padding:15px 10px;font-family:'Bricolage Grotesque';font-weight:700;cursor:pointer;border:2px solid;background:transparent;transition:.15s;text-align:center}
.qp-diff{color:#9fb4e8;border-color:#2a3a63;font-size:15px}
.qp-diff.active[data-diff="kolay"]{color:#06070c;background:#34F5A0;border-color:#34F5A0}
.qp-diff.active[data-diff="zor"]{color:#06070c;background:#ff6b7d;border-color:#ff6b7d}
.qp-go{color:#ffd23e;border-color:#ffd23e;font-size:18px}
.qp-go .qg-s{display:block;font-size:11px;font-weight:600;color:#8a93b5;margin-top:3px}
.qp-go:active,.qp-diff:active{transform:scale(.95)}
.pbody{padding:2px 16px 16px;overflow-y:auto}
.pbody ul{margin:0 0 0 4px;list-style:none}
.pbody li{position:relative;padding-left:18px;font-size:13.5px;line-height:1.55;color:#d2d5e6;margin-bottom:9px}
.pbody li::before{content:'';position:absolute;left:2px;top:8px;width:6px;height:6px;border-radius:50%;background:#FFC857}

/* tools */
.tools{position:fixed;left:50%;transform:translateX(-50%);bottom:max(12px,env(safe-area-inset-bottom));z-index:25;width:min(620px,calc(100% - 10px));
  display:flex;align-items:center;gap:5px;padding:6px;background:#0d1426;border:1px solid #2a3a63;border-radius:16px}
.tbtn{flex:0 0 auto;width:44px;height:44px;border-radius:12px;background:#0e1322;border:1.5px solid;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;transition:.15s}
.tbtn:active{transform:scale(.92)}
.tbtn .g{font-size:16px;line-height:1}.tbtn .t{font-size:7px;letter-spacing:.02em}
.tbtn.c1{border-color:#34F5A0;color:#34F5A0}.tbtn.c2{border-color:#4D8DFF;color:#4D8DFF}.tbtn.c3{border-color:#FFB23E;color:#FFB23E}
.tbtn.c4{border-color:#25D366;color:#25D366}.tbtn.c5{border-color:#f778ba;color:#f778ba}.tbtn.c6{border-color:#B98CFF;color:#B98CFF}
.tbtn.cq{border-color:#ffd23e;color:#ffd23e}
.tbtn.cm{border-color:#c084fc;color:#c084fc}
.level{margin-left:auto;flex:0 0 auto;width:44px;height:44px;padding:0;border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;border:1.5px solid}
.level .lic{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff}

/* sheet */
.backdrop{position:fixed;inset:0;z-index:40;background:rgba(4,5,10,.45);opacity:0;pointer-events:none;transition:.25s;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.backdrop.on{opacity:1;pointer-events:auto}
.sheet{position:fixed;left:50%;transform:translateX(-50%) translateY(110%);bottom:0;z-index:41;width:min(560px,100%);max-height:80vh;overflow:hidden;
  background:#11131d;border:1px solid rgba(255,255,255,.1);border-radius:24px 24px 0 0;transition:transform .3s cubic-bezier(.3,.8,.3,1);display:flex;flex-direction:column}
.sheet.on{transform:translateX(-50%) translateY(0)}
.sheet .sh{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 12px}
.sheet .sh h3{font-family:'Bricolage Grotesque';font-weight:700;font-size:18px;color:#fff}
.sheet .x{width:32px;height:32px;border-radius:10px;background:rgba(255,255,255,.06);border:none;color:#cfd2e4;font-size:15px;cursor:pointer}
.sheet .body{padding:0 20px 26px;overflow-y:auto}
.menu-opt{display:flex;align-items:center;gap:12px;width:100%;text-align:left;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:#e8eaf4;border-radius:14px;padding:13px 14px;margin-bottom:10px;cursor:pointer;font-size:15px;font-weight:500}
.menu-opt.sel{border-color:#B98CFF;background:rgba(180,140,255,.12)}
.menu-opt .lic{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;color:#fff;flex:0 0 auto}
.menu-opt .mt{flex:1}.menu-opt .ms{font-size:11.5px;color:#8389a6;font-weight:400;margin-top:2px}.menu-opt .chk{color:#B98CFF;font-size:16px}
.help-card{border:1.5px solid;border-radius:14px;padding:12px 14px;margin-bottom:11px}
.help-card .hc{display:inline-block;font-weight:700;font-size:12.5px;padding:3px 10px;border-radius:8px;border:1.5px solid;margin-bottom:7px}
.help-card p{font-size:12.5px;line-height:1.55;color:#b6b3c8}
table.cmp{width:100%;border-collapse:collapse;font-size:12px}
table.cmp th,table.cmp td{border:1px solid rgba(255,255,255,.12);padding:8px 7px;text-align:center}
table.cmp th{background:rgba(255,255,255,.05);color:#fff;font-family:'DM Mono'}table.cmp td:first-child{text-align:left;color:#fff;font-weight:500}
.share-prev{width:100%;border-radius:14px;border:1px solid rgba(255,255,255,.1);margin-bottom:14px;display:block}
.share-row{display:flex;gap:10px}.share-row button{flex:1;border:none;border-radius:14px;padding:13px 6px;font-weight:600;font-size:12.5px;color:#fff;cursor:pointer}
.guide-item{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:13px 15px;margin-bottom:9px;cursor:pointer}
.guide-item .gk{font-family:'DM Mono';font-size:15px;font-weight:700;width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex:0 0 auto}.guide-item .gt{font-size:14.5px;font-weight:700;color:#fff}.guide-item .gd{font-size:11.5px;color:#8389a6}
.palbox{position:fixed;z-index:60;left:50%;top:120px;transform:translateX(-50%);width:min(420px,calc(100% - 24px));background:#0d1426;border:1.5px solid #2a3a63;border-radius:16px;padding:10px 12px 14px;display:none;box-shadow:0 18px 50px rgba(0,0,0,.55)}
.palbox.on{display:block}
.pal-bar{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px}
.pal-title{font-family:'Bricolage Grotesque';font-weight:800;font-size:14px;color:#FFC857}
.pal-ctrls{display:flex;gap:8px}
.pal-bar button{width:30px;height:30px;border-radius:9px;border:none;background:rgba(255,255,255,.08);color:#cfd2e4;font-size:14px;cursor:pointer}
.pal-move{cursor:grab;touch-action:none;font-size:16px}
.pal-targets{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.pal-trow{display:flex;align-items:center;gap:6px}
.pal-arr{color:#8389a6;font-size:13px;flex:0 0 auto}
.pal-t{flex:1;background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.1);color:#cfd6ea;border-radius:10px;padding:9px 4px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Bricolage Grotesque';text-align:center;white-space:nowrap}
.pal-t.active{border-color:#FFC857;background:rgba(255,200,87,.16);color:#FFC857}
.pal-rows{display:flex;flex-direction:column;gap:8px;overflow-x:auto;overflow-y:hidden;border:1.5px solid rgba(255,255,255,.12);border-radius:12px;padding:9px;background:rgba(255,255,255,.03)}
.pal-row{display:flex;gap:8px;flex-wrap:nowrap;width:max-content}
.pal-sw{width:31px;height:31px;border-radius:8px;border:2px solid rgba(255,255,255,.18);cursor:pointer;padding:0;flex:0 0 auto}
.board{position:fixed;top:62px;left:0;right:0;bottom:74px;z-index:23;background:linear-gradient(180deg,#0a0e1a,#070912);display:none;flex-direction:column}
.board.on{display:flex}
.bd-head{flex:none;display:flex;align-items:center;gap:9px;padding:12px 16px 8px}
.bd-head .bt{flex:1;font-family:'Bricolage Grotesque';font-weight:700;font-size:15px;color:#fff;line-height:1.2}
.bd-head .bt small{font-family:'DM Sans';font-size:11px;color:#8389a6;font-weight:400}
.bd-head .bprog{font-family:'DM Mono';font-size:12px;color:#ffd23e;background:rgba(255,210,62,.12);border:1px solid #ffd23e;border-radius:8px;padding:3px 9px}
.ifr{display:inline-flex;flex-direction:column;vertical-align:middle;text-align:center;line-height:1.04;margin:0 2px}
.ifr .ifn{border-bottom:1.5px solid currentColor;padding:0 4px}
.ifr .ifd{padding:1px 4px 0}
.bd-head .bx{width:34px;height:34px;border-radius:10px;background:rgba(255,255,255,.06);border:none;color:#cfd2e4;font-size:14px;cursor:pointer}
.bd-scroll{flex:1;overflow-y:auto;padding:8px 18px 50px;cursor:pointer}
.bd-scroll::-webkit-scrollbar{width:0}
.qblock{margin-bottom:24px}
.qhead{background:#16213f;border:1.5px solid #2f6bff;border-radius:14px;padding:12px 14px;color:#fff;font-weight:700;font-size:14.5px;line-height:1.4}
.qhead .qn{display:inline-block;font-family:'DM Mono';font-size:10px;letter-spacing:.1em;color:#7fb0ff;background:rgba(47,107,255,.18);border-radius:6px;padding:2px 8px;margin-bottom:7px}
.qhead .qtop{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:5px}
.qhide{flex:0 0 auto;font-family:'DM Mono';font-size:10px;letter-spacing:.03em;color:#ffd23e;background:rgba(255,210,62,.12);border:1px solid rgba(255,210,62,.45);border-radius:8px;padding:4px 10px;cursor:pointer;font-weight:700;white-space:nowrap}
.qhide:active{transform:scale(.95)}
.qblock.hide-sol .stp,.qblock.hide-sol .ansbox{display:none}
.qblock.hide-sol .qhead{border-color:#ffd23e}
.qcard{background:#16213f;border:1.5px solid #2f6bff;border-radius:14px;padding:12px 14px}
.qcard .qtop{display:flex;align-items:center;justify-content:space-between;gap:10px}
.qq{color:#cfe0ff;font-weight:700;font-size:15px;line-height:1.4;margin:8px 0 11px}
.qopts{display:flex;flex-wrap:wrap;gap:8px}
.qopt{display:inline-flex;align-items:center;gap:8px;background:#131a2e;border:none;color:#e8eaf4;border-radius:11px;padding:9px 12px;cursor:pointer;font-size:15px;font-weight:600;transition:.15s}
.qopt .ql{flex:0 0 auto;width:22px;height:22px;border-radius:6px;background:rgba(255,255,255,.07);display:inline-flex;align-items:center;justify-content:center;font-family:'DM Mono';font-size:11px;color:#9fb4e8}
.qopt:active{transform:scale(.97)}
.qopt.done{cursor:default}
.qopt.ok{background:rgba(52,245,160,.16);color:#bff7df}
.qopt.ok .ql{background:#34F5A0;color:#06281c}
.qopt.no{background:rgba(255,107,125,.16);color:#ffc6cd}
.qopt.no .ql{background:#ff6b7d;color:#3a0c12}
.qopt.done:not(.ok):not(.no){opacity:.5}
.qfb{font-family:'Bricolage Grotesque';font-weight:700;font-size:14px;margin-top:10px}
.qfoot{display:flex;justify-content:flex-end;margin-top:10px}
.qfb.ok{color:#34F5A0}.qfb.no{color:#ff6b7d}
.qsolbtn{flex:0 0 auto;background:rgba(255,210,62,.12);border:1px solid rgba(255,210,62,.45);color:#ffd23e;border-radius:9px;padding:5px 11px;font-size:11px;font-weight:700;cursor:pointer;font-family:'DM Mono';white-space:nowrap}
.qsol{margin-top:10px;display:none;background:#0d1426;border:1.5px solid #ffd23e;border-radius:14px;padding:12px 14px}
.qsol.on{display:block}
.qsol .stp:first-child{padding-top:0}
.reveal{opacity:0;transform:translateY(12px);transition:opacity .4s,transform .4s}
.reveal.show{opacity:1;transform:none}
.conn{height:24px;display:flex;justify-content:center;align-items:center}
.conn b{font-size:18px;color:#ffd23e;line-height:1}
.bubble{position:relative;background:#11192e;border:1px solid #2a3a63;border-radius:14px;padding:11px 13px 11px 42px;color:#d2d5e6;font-size:13.5px;line-height:1.5;margin:0 2px}
.bubble::before{content:'';position:absolute;top:-7px;left:26px;width:12px;height:12px;background:#11192e;border-left:1px solid #2a3a63;border-top:1px solid #2a3a63;transform:rotate(45deg)}
.bubble .bn{position:absolute;left:11px;top:11px;width:24px;height:24px;border-radius:50%;background:#ffd23e;color:#06070c;font-family:'DM Mono';font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center}
.bubble.why{border-color:#46d6e0;background:rgba(70,214,224,.09)}
.bubble.why::before{background:#0d1c22;border-color:#46d6e0}
.ansbox{background:rgba(255,210,62,.14);border:1.5px solid #ffd23e;border-radius:14px;padding:12px 14px;color:#ffd23e;font-weight:700;font-size:15px;text-align:center;margin:0 2px}
.bd-paused{position:absolute;left:50%;bottom:16px;transform:translateX(-50%);background:rgba(8,10,18,.92);border:1px solid #2a3a63;border-radius:99px;padding:8px 16px;color:#ffd23e;font-size:12.5px;display:none}
.board.paused .bd-paused{display:block}
.bd-pre{font-family:'DM Mono',monospace;font-size:12px;line-height:1.5;background:#0a1120;border:1px solid #2a3a63;border-radius:8px;padding:9px 11px;margin-top:8px;white-space:pre;overflow-x:auto;color:#cfe3ff}
.stp{padding:10px 2px}
.stp+.stp{border-top:1px dashed #223150}
.srow{display:flex;gap:10px;align-items:baseline;flex-wrap:wrap}
.srow .sn{flex:none;width:54px;font-family:'DM Mono';font-size:11px;color:#ffd23e}
.srow .sop{flex:0 1 auto;color:#e7e9f3;font-size:14px;line-height:1.6}
.srow .sa{flex:0 1 auto;margin-left:10px;font-size:11px;color:#8fa0c8;text-align:left;line-height:1.4;font-style:italic;align-self:center}
.srow .sop .katex{font-size:1.05em}
.srow .sdbtn{flex:none;margin-left:auto;align-self:center;font-size:10px;color:#7fb0ff;background:rgba(47,107,255,.12);border:1px solid rgba(47,107,255,.35);border-radius:7px;padding:3px 9px;cursor:pointer;white-space:nowrap}
.stp.open .sdbtn{color:#46d6e0;border-color:rgba(70,214,224,.45);background:rgba(70,214,224,.14)}
.stp .sdetail{display:none;margin:9px 0 2px 64px;padding:10px 12px;background:rgba(70,214,224,.07);border-left:3px solid #46d6e0;border-radius:0 8px 8px 0;color:#cfe3ff;font-size:12.5px;line-height:1.6}
.stp.open .sdetail{display:block}
.stp .bd-pre{margin-left:65px}
#err{position:fixed;inset:0;z-index:99;display:none;align-items:center;justify-content:center;padding:30px;text-align:center;color:#b6b3c8}
.pop{position:fixed;z-index:45;background:#161a28;border:1px solid #2a3a63;border-radius:14px;padding:6px;box-shadow:0 14px 34px rgba(0,0,0,.6);display:none;min-width:150px}
.pop.on{display:block}
.pop .po{display:flex;align-items:center;gap:9px;padding:10px 12px;border-radius:10px;cursor:pointer;font-size:13.5px;color:#e8eaf4;white-space:nowrap}
.pop .po.sel{background:rgba(180,140,255,.14)}
.pop .po .lic{width:24px;height:24px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;flex:0 0 auto}
.pop .po .chk{margin-left:auto;color:#B98CFF}
</style>
</head>
<body>
<canvas id="scene"></canvas>

<div class="header"><button class="bk" id="bk">‹</button><h1>Üslü Sayılar</h1><button class="bk hbtn" id="b-help">?</button></div>
<div class="sub" id="sub">Doğal Sayılar</div>

<div class="bwrap">
  <div class="ctabs" id="ctabs">

llik": "Negatif tabanın çift kuvveti (+), tek kuvveti (−)."}}, {"k": "aⁿ·aᵐ", "col": "#FFB23E", "title": "Çarpma Kuralı", "span": null, "b": 2, "e": 5, "sade": "Tabanlar aynıysa çarpımda üsler toplanır: aⁿ·aᵐ = aⁿ⁺ᵐ.", "lv": {"ilkokul": "Aynı tabanlı sayıları çarparken üsleri toplarız. 2²·2³ = 2⁵ olur, çünkü toplam 5 tane 2 çarpılır: (2·2)·(2·2·2).", "ortaokul": "Tabanları aynı olan üslü sayılar çarpılırken üsler toplanır: aⁿ·aᵐ = aⁿ⁺ᵐ. Örn. 2³·2⁴ = 2⁷. Tabanlar farklıysa bu kural uygulanmaz.", "lise": "aⁿ·aᵐ = aⁿ⁺ᵐ kuralı, tekrarlı çarpmadan gelir: n tane a ile m tane a yan yana gelince toplam n+m tane a olur. Tabanları farklı ifadeleri önce ortak tabana çevirmek gerekir (örn. 4 = 2²).", "sinav": "aⁿ·aᵐ = aⁿ⁺ᵐ. Farklı görünen tabanları ortak tabana indir: 4·2ⁿ = 2²·2ⁿ = 2ⁿ⁺². Üstel denklemlerde tabanları eşitleyip üsleri eşitle."}, "info": {"tanim": "Aynı tabanlı çarpımda üsler toplanır.", "ornek": "2³·2⁴ = 2⁷", "ozellik": "aⁿ·aᵐ = aⁿ⁺ᵐ (tabanlar aynı)."}}, {"k": "aⁿ÷aᵐ", "col": "#B98CFF", "title": "Bölme Kuralı", "span": null, "b": 2, "e": 3, "sade": "Tabanlar aynıysa bölmede üsler çıkarılır: aⁿ÷aᵐ = aⁿ⁻ᵐ.", "lv": {"ilkokul": "Aynı tabanlı sayıları bölerken üsleri çıkarırız. 2⁵÷2² = 2³ olur, çünkü paydadaki iki tane 2, payı sadeleştirir.", "ortaokul": "Tabanları aynı olan üslü sayılar bölünürken üsler çıkarılır: aⁿ÷aᵐ = aⁿ⁻ᵐ. Örn. 3⁴÷3² = 3². Bu, çarpma kuralının tersidir.", "lise": "aⁿ÷aᵐ = aⁿ⁻ᵐ. Üs negatif çıkarsa sonuç bir kesirdir (aⁿ⁻ᵐ = 1/aᵐ⁻ⁿ). Eşit üslü farklı tabanlarda ise aⁿ÷bⁿ = (a/b)ⁿ kuralı kullanılır.", "sinav": "aⁿ÷aᵐ = aⁿ⁻ᵐ. Tabanları ortak yap (8³÷2⁵ = 2⁹÷2⁵ = 2⁴). Üs n içeriyorsa çıkarmada n çoğu kez sadeleşip yok olur."}, "info": {"tanim": "Aynı tabanlı bölmede üsler çıkarılır.", "ornek": "2⁵÷2² = 2³", "ozellik": "aⁿ÷aᵐ = aⁿ⁻ᵐ (tabanlar aynı)."}}, {"k": "a⁰", "col": "#34F5A0", "title": "Sıfırıncı Kuvvet", "span": null, "b": 5, "e": 0, "sade": "Sıfırdan farklı her sayının sıfırıncı kuvveti 1 dir: a⁰ = 1.", "lv": {"ilkokul": "İlginç bir kural: sı .", "lise": "(aⁿ)ᵐ = aⁿ·ᵐ. Ayrıca çarpımın kuvveti (a·b)ⁿ = aⁿ·bⁿ ve bölümün kuvveti (a/b)ⁿ = aⁿ/bⁿ kurallarıyla birlikte kullanılır. Üsleri toplamakla (çarpma kuralı) çarpmayı (üssün üssü) karıştırma.", "sinav": "(aⁿ)ᵐ = aⁿ·ᵐ. Üstel denklemde (2³)ˣ = 2⁹ ⇒ 3x = 9 ⇒ x = 3. (aⁿ·aᵐ üs TOPLAR, (aⁿ)ᵐ üs ÇARPAR) ayrımını net tut."}, "info": {"tanim": "Üslü sayının üssünde üsler çarpılır.", "ornek": "(2³)² = 2⁶ = 64", "ozellik": "(aⁿ)ᵐ = aⁿ·ᵐ; (a·b)ⁿ = aⁿ·bⁿ."}}, {"k": "10ⁿ", "col": "#FFB23E", "title": "10'un Kuvvetleri", "span": null, "b": 10, "e": 1, "sade": "10ⁿ, 1 in yanına n tane sıfırdır. Bilimsel gösterimin temelidir.", "lv": {"ilkokul": "10 un kuvvetleri çok kolaydır: 10¹ = 10, 10² = 100, 10³ = 1000. Üs kaçsa, 1 in yanına o kadar sıfır gelir.", "ortaokul": "10ⁿ = 1 in sağına n sıfır. Büyük sayıları kısa yazmak için bilimsel gösterim kullanılır: 5000 = 5·10³. Negatif üs küçük sayıları verir: 10⁻² = 0,01.", "lise": "Bilimsel gösterim: a·10ⁿ biçiminde (a, 1 ile 10 arasında (10 dahil değil)). Örn. 45000 = 4,5·10⁴, 0,0006 = 6·10⁻⁴. Çarpmada katsayılar çarpılır, 10 ların üsleri toplanır.", "sinav": "a·10ⁿ ile işlemde: (2·10³)² = 4·10⁶; (6·10⁻²)(5·10⁵) = 30·10³ = 3·10⁴. Sonucu daima a, 1 ile 10 arasında (10 dahil değil) olacak şekilde düzelt (taşan basamağı üsse aktar)."}, "info": {"tanim": "10 tabanlı kuvvetler ve bilimsel gösterim.", "ornek": "10³ = 1000, 5·10³ = 5000", "ozellik": "a·10ⁿ, a, 1 ile 10 arasında (10 dahil değil); çarpımda üsler toplanır."}}];

function wpp(){return (2*camGoal.pz*zoomF*Math.tan((50*Math.PI/180)/2))/innerHeight;}
/* mouse: drag=döndür · shift+drag=kaydır · tekerlek=yakınlaştır */
cv.addEventListener('pointerdown',e=>{if(e.pointerType==='mouse'){drag=true;lx=e.clientX;ly=e.clientY;}});
addEventListener('pointerup',e=>{if(!e.pointerType||e.pointerType==='mouse')drag=false;});
addEventListener('pointermove',e=>{if(e.pointerType!=='mouse'||!drag)return;
  if(e.shiftKey){const k=wpp();panX=clamp(panX-(e.clientX-lx)*k,-7,7);panY=clamp(panY+(e.clientY-ly)*k,-5,5);}
  else{yaw+=(e.clientX-lx)*.008;pitch+=(e.clientY-ly)*.006;}
  lx=e.clientX;ly=e.clientY;});
cv.addEventListener('wheel',e=>{e.preventDefault();zoomF=clamp(zoomF*(1+e.deltaY*0.0012),.4,2.6);},{passive:false});
/* touch: 1 parmak döndür · 2 parmak yakınlaştır + istediğin yere kaydır */
cv.addEventListener('touchstart',e=>{if(e.touches.length===2){pinch=true;pdist=tdist(e.touches);zstart=zoomF;const m=tmid(e.touches);pmx=m.x;pmy=m.y;psx=panX;psy=panY;drag=false;}
  else if(e.touches.length===1){drag=true;lx=e.touches[0].clientX;ly=e.touches[0].clientY;}},{passive:false});
cv.addEventListener('touchmove',e=>{e.preventDefault();
  if(pinch&&e.touches.length===2){zoomF=clamp(zstart*pdist/tdist(e.touches),.4,2.6);
    const m=tmid(e.touches),k=wpp();panX=clamp(psx-(m.x-pmx)*k,-7,7);panY=clamp(psy+(m.y-pmy)*k,-5,5);}
  else if(drag&&e.touches.length===1){const t=e.touches[0];yaw+=(t.clientX-lx)*.008;pitch+=(t.clientY-ly)*.006;lx=t.clientX;ly=t.clientY;}},{passive:false});
cv.addEventListener('touchend',e=>{if(e.touches.length<2)pinch=false;
  if(e.touches.length===0)drag=false;else{drag=true;lx=e.touches[0].clientX;ly=e.touches[0].clientY;}});

function stripVar(s){return (''+s).replace(/^\$\s*[a-z]\s*=\s*/,'$');}
function bdEsc(s){return (''+s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fracify(s){if(s==null)return s;var SUP='⁰¹²³⁴⁵⁶⁷⁸⁹⁻⁺ⁿᵐˣ';var TOK='(?:\\([^()]+\\)|[0-9]+|[a-z])['+SUP+']*';
  var re=new RegExp('(^|[^A-Za-zçğıöşüÇĞİÖŞÜ0-9'+SUP+'])('+TOK+')\\s*[/÷]\\s*('+TOK+')(?![A-Za-zçğıöşüÇĞİÖŞÜ0-9'+SUP+'])','g');
  return (''+s).replace(re,'$1<span class="ifr"><span class="ifn">$2</span><span class="ifd">$3</span></span>');}
function _grp(s,i){if(s[i]!=='{')return [s[i]||'',i+1];var dep=0,start=i+1,k=i;for(;k<s.length;k++){if(s[k]==='{')dep++;else if(s[k]==='}'){dep--;if(dep===0)return [s.slice(start,k),k+1];}}return [s.slice(start),k];}
function texRender(s){s=''+s;var out='',i=0,n=s.length,g;
  while(i<n){
    if(s.substr(i,6)==='\\dfrac'||s.substr(i,6)==='\\tfrac'||s.substr(i,5)==='\\frac'){
      i+=(s.substr(i,5)==='\\frac')?5:6; while(s[i]===' ')i++;
      var a=_grp(s,i);i=a[1];while(s[i]===' ')i++;var b=_grp(s,i);i=b[1];
      out+='<span class="ifr"><span class="ifn">'+texRender(a[0])+'</span><span class="ifd">'+texRender(b[0])+'</span></span>';
    }else if(s[i]==='^'){i++;if(s[i]==='{'){g=_grp(s,i);i=g[1];out+='<sup>'+texRender(g[0])+'</sup>';}else{out+='<sup>'+bdEsc(s[i]||'')+'</sup>';i++;}}
    else if(s[i]==='_'){i++;if(s[i]==='{'){g=_grp(s,i);i=g[1];out+='<sub>'+texRender(g[0])+'</sub>';}else{out+='<sub>'+bdEsc(s[i]||'')+'</sub>';i++;}}
    else if(s.substr(i,5)==='\\cdot'){out+='·';i+=5;}
    else if(s.substr(i,6)==='\\times'){out+='×';i+=6;}
    else if(s.substr(i,4)==='\\div'){out+='÷';i+=4;}
    else if(s.substr(i,11)==='\\Rightarrow'){out+=' ⇒ ';i+=11;}
    else if(s.substr(i,7)==='\\approx'){out+=' ≈ ';i+=7;}
    else if(s.substr(i,4)==='\\neq'){out+=' ≠ ';i+=4;}
    else if(s.substr(i,3)==='\\ne'){out+=' ≠ ';i+=3;}
    else if(s.substr(i,3)==='\\le'){out+=' ≤ ';i+=3;}
    else if(s.substr(i,3)==='\\ge'){out+=' ≥ ';i+=3;}
    else if(s.substr(i,5)==='\\sqrt'){i+=5;while(s[i]===' ')i++;g=_grp(s,i);i=g[1];out+='√('+texRender(g[0])+')';}
    else if(s.substr(i,5)==='\\left'){i+=5;}
    else if(s.substr(i,6)==='\\right'){i+=6;}
    else if(s.substr(i,2)==='\\,'){out+=' ';i+=2;}
    else if(s.substr(i,2)==='\\ '){out+=' ';i+=2;}
    else if(s[i]==='\\'){var m=/^\\[A-Za-z]+/.exec(s.slice(i));i+=m?m[0].length:1;}
    else if(s[i]==='{'){g=_grp(s,i);i=g[1];out+=texRender(g[0]);}
    else if(s[i]==='}'){i++;}
    else{out+=bdEsc(s[i]);i++;}
  }
  return out;}
function texFallback(s){return texRender(s);}
function mathText(str){if(str==null)return '';const parts=(''+str).split('$');let out='';for(let k=0;k<parts.length;k++){if(k%2===0){out+=bdEsc(parts[k]);}else{if(typeof katex!=='undefined'){try{out+=katex.renderToString(parts[k],{throwOnError:false,output:'html'});}catch(e){out+=texFallback(parts[k]);}}else{out+=texFallback(parts[k]);}}}return out;}
function plainify(str){const p=(''+str).split('$');let o='';for(let k=0;k<p.length;k++){o+=(k%2===0)?bdEsc(p[k]):texFallback(p[k]);}return o;}

  else{const pools=QUESTIONS.map(b=>(b[edu]&&b[edu][diff])||[]);
  const maxLen=Math.max.apply(null,pools.map(p=>p.length));out=[];
  for(let i=0;i<maxLen;i++)for(let s=0;s<pools.length;s++){if(pools[s][i])out.push(pools[s][i]);}}

      const db=stp.querySelector('.sdbtn');db.addEventListener('click',function(ev){ev.stopPropagation();const op=stp.classList.toggle('open');db.textContent=op?'gizle ▾':'detaya bak ▸';});
      sol.appendChild(stp);});
    const dist=(q.o||[]).slice(0,nOpt-1);const pos=qi%nOpt;

      ow.appendChild(b);});

    card.appendChild(top);card.appendChild(qq);card.appendChild(ow);card.appendChild(fb);card.appendChild(foot);

  const _zf=zoomF*1.18; const dx=fx+(camGoal.px-camGoal.tx)*_zf,dy=fy+(camGoal.py-camGoal.ty)*_zf,dz=camGoal.pz*_zf;
  cam.position.x+=(dx-cam.position.x)*.06;cam.position.y+=(dy-cam.position.y)*.06;cam.position.z+=(dz-cam.position.z)*.06;
