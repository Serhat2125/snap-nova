// === DNA ÇİFT SARMAL (renkli baz çiftleri, akışkan) ===
function makeDNA(opts = {}) {
  const len = opts.length || 4;
  const radius = opts.radius || 0.35;
  const turns = opts.turns || 3;
  const baseCount = opts.baseCount || 36;
  const grp = new THREE.Group();

  // İki sarmal omurga - şeker-fosfat
  const ptsA = [], ptsB = [];
  for (let i = 0; i <= baseCount; i++) {
    const t = i / baseCount;
    const angle = t * Math.PI * 2 * turns;
    const y = (t - 0.5) * len;
    ptsA.push(new THREE.Vector3(Math.cos(angle) * radius, y, Math.sin(angle) * radius));
    ptsB.push(new THREE.Vector3(Math.cos(angle + Math.PI) * radius, y, Math.sin(angle + Math.PI) * radius));
  }
  const curveA = new THREE.CatmullRomCurve3(ptsA);
  const curveB = new THREE.CatmullRomCurve3(ptsB);

  // Daha kalın, parlak omurgalar
  const omurgaMatA = new THREE.MeshPhysicalMaterial({
    color: 0x1976D2, roughness: 0.25, metalness: 0.5,
    emissive: 0x0D47A1, emissiveIntensity: 0.45,
    clearcoat: 0.9, clearcoatRoughness: 0.1
  });
  const omurgaMatB = new THREE.MeshPhysicalMaterial({
    color: 0xD81B60, roughness: 0.25, metalness: 0.5,
    emissive: 0x880E4F, emissiveIntensity: 0.45,
    clearcoat: 0.9, clearcoatRoughness: 0.1
  });
  const sarmalA = new THREE.Mesh(new THREE.TubeGeometry(curveA, baseCount*3, 0.055, 12, false), omurgaMatA);
  const sarmalB = new THREE.Mesh(new THREE.TubeGeometry(curveB, baseCount*3, 0.055, 12, false), omurgaMatB);
  sarmalA.castShadow = true;
  sarmalB.castShadow = true;
  grp.add(sarmalA); grp.add(sarmalB);

  // Baz çiftleri (A-T mavi/yeşil, G-C kırmızı/sarı)
  // A=Sarı, T=Yeşil, G=Kırmızı, C=Mor (4 bazın IUPAC renkleri)
  const bazRenkleri = [
    [0xFFC107, 0x4CAF50], // A-T sarı-yeşil
    [0xE91E63, 0x9C27B0], // G-C kırmızı-mor
  ];

  for (let i = 0; i < baseCount; i++) {
    if (i % 2 !== 0) continue;
    const t = i / baseCount;
    const angle = t * Math.PI * 2 * turns;
    const y = (t - 0.5) * len;
    const pA = new THREE.Vector3(Math.cos(angle) * radius, y, Math.sin(angle) * radius);
    const pB = new THREE.Vector3(Math.cos(angle + Math.PI) * radius, y, Math.sin(angle + Math.PI) * radius);
    const mid = pA.clone().add(pB).multiplyScalar(0.5);
    const dir = pB.clone().sub(pA);
    const renkPair = bazRenkleri[(i / 2) % 2];

    // İki yarım çubuk (her biri kendi rengi)
    for (let j of [0, 1]) {
      const halfLen = dir.length() * 0.42;
      const halfMid = (j === 0) ? pA.clone().lerp(mid, 0.5) : pB.clone().lerp(mid, 0.5);
      const rung = new THREE.Mesh(
        new THREE.CylinderGeometry(0.045, 0.045, halfLen, 10),
        new THREE.MeshPhysicalMaterial({
          color: renkPair[j], emissive: renkPair[j], emissiveIntensity: 0.6,
          roughness: 0.3, metalness: 0.3,
          clearcoat: 0.8, toneMapped: false
        })
      );
      rung.position.copy(halfMid);
      rung.lookAt(j === 0 ? mid : mid);
      rung.rotateX(Math.PI / 2);
      rung.castShadow = true;
      grp.add(rung);
    }

    // Bağlantı noktası (hidrojen bağı küçük noktalar)
    for (let k = -1; k <= 1; k += 2) {
      const dot = new THREE.Mesh(
        new THREE.SphereGeometry(0.025, 8, 6),
        new THREE.MeshBasicMaterial({
          color: 0xffffff, transparent: true, opacity: 0.85
        })
      );
      dot.position.copy(mid.clone().add(dir.clone().normalize().multiplyScalar(k * 0.06)));
      grp.add(dot);
    }
  }

  return grp;
}

// === KROMOZOM (X şeklinde, bant deseni, sentromer belli) ===
function makeChromosome(opts = {}) {
  const color = opts.color || 0xB388FF;
  const small = opts.small || false;
  const h = small ? 1.0 : 1.7;
  const r = small ? 0.20 : 0.32;
  const grp = new THREE.Group();

  const mat = new THREE.MeshPhysicalMaterial({
    color: color, roughness: 0.75, metalness: 0.2,
    emissive: color, emissiveIntensity: 0.25,
    clearcoat: 0.4, sheen: 0.5, sheenColor: 0xffffff
  });

  // X şekli — 4 kol (2 kromatid × 2 kol her biri)
  for (let s of [-1, 1]) {  // sol/sağ kromatid
    for (let v of [-1, 1]) {  // üst/alt kol
      // Organik kıvrım: 3 nokta tube
      const start = new THREE.Vector3(s * 0.06, 0, 0);
      const mid = new THREE.Vector3(s * (r * 1.1), v * (h/3.5), 0.04);
      const end = new THREE.Vector3(s * (r * 1.7), v * (h/2), 0);
      const curve = new THREE.CatmullRomCurve3([start, mid, end]);
      const arm = new THREE.Mesh(
        new THREE.TubeGeometry(curve, 20, r * 0.85, 14, false),
        mat
      );
      arm.castShadow = true; arm.receiveShadow = true;
      grp.add(arm);

      // Yüzeyde gen bantları (3-4 koyu halka her kolda - karyotip bandı)
      for (let bi = 1; bi <= 3; bi++) {
        const tPos = bi / 4;
        const bandPos = curve.getPoint(tPos);
        const tangent = curve.getTangent(tPos);
        const band = new THREE.Mesh(
          new THREE.TorusGeometry(r * 0.88, r * 0.07, 8, 16),
          new THREE.MeshStandardMaterial({
            color: 0x3E2723, roughness: 0.9,
            emissive: 0x4E342E, emissiveIntensity: 0.15
          })
        );
        band.position.copy(bandPos);
        band.lookAt(bandPos.clone().add(tangent));
        grp.add(band);
      }

      // Kol ucu (telomer - daha açık)
      const telomer = new THREE.Mesh(
        new THREE.SphereGeometry(r * 0.65, 12, 10),
        new THREE.MeshStandardMaterial({
          color: 0xffffff, roughness: 0.4,
          emissive: color, emissiveIntensity: 0.5
        })
      );
      telomer.position.copy(end);
      grp.add(telomer);
    }
  }

  // Sentromer (orta - daha çarpıcı parlayan halka)
  const sentromer = new THREE.Mesh(
    new THREE.TorusGeometry(r * 0.55, r * 0.18, 12, 24),
    new THREE.MeshPhysicalMaterial({
      color: 0x6A1B9A, roughness: 0.4, metalness: 0.4,
      emissive: 0x6A1B9A, emissiveIntensity: 0.7,
      clearcoat: 0.9
    })
  );
  sentromer.rotation.y = Math.PI / 2;
  grp.add(sentromer);

  return grp;
}

// === Y KROMOZOMU (küçük, Y veya kanca şekli) ===
function makeYChromosome(opts = {}) {
  const color = opts.color || 0x00BCD4;
  const grp = new THREE.Group();
  const mat = new THREE.MeshPhysicalMaterial({
    color: color, roughness: 0.7, metalness: 0.25,
    emissive: color, emissiveIntensity: 0.3,
    clearcoat: 0.5, sheen: 0.4, sheenColor: 0xffffff
  });

  const h = 1.0, r = 0.22;

  // Y formu: alt sap + üst V
  // Alt sap (kalın silindir)
  const altStart = new THREE.Vector3(0, -h * 0.5, 0);
  const altEnd = new THREE.Vector3(0, 0, 0);
  const altCurve = new THREE.CatmullRomCurve3([altStart, new THREE.Vector3(0.03, -h*0.25, 0), altEnd]);
  const alt = new THREE.Mesh(
    new THREE.TubeGeometry(altCurve, 12, r, 14, false),
    mat
  );
  alt.castShadow = true;
  grp.add(alt);

  // Üst V (iki kol)
  for (let s of [-1, 1]) {
    const ust = new THREE.Mesh(
      new THREE.TubeGeometry(
        new THREE.CatmullRomCurve3([
          new THREE.Vector3(0, 0, 0),
          new THREE.Vector3(s * 0.1, h * 0.15, 0),
          new THREE.Vector3(s * 0.25, h * 0.4, 0)
        ]),
        12, r * 0.85, 14, false
      ),
      mat
    );
    ust.castShadow = true;
    grp.add(ust);

    // Telomer üstte
    const tel = new THREE.Mesh(
      new THREE.SphereGeometry(r * 0.7, 12, 10),
      new THREE.MeshStandardMaterial({
        color: 0xffffff, roughness: 0.4,
        emissive: color, emissiveIntensity: 0.5
      })
    );
    tel.position.set(s * 0.25, h * 0.4, 0);
    grp.add(tel);
  }

  // Telomer altta
  const altTel = new THREE.Mesh(
    new THREE.SphereGeometry(r * 0.85, 12, 10),
    new THREE.MeshStandardMaterial({
      color: 0xffffff, roughness: 0.4,
      emissive: color, emissiveIntensity: 0.5
    })
  );
  altTel.position.copy(altStart);
  grp.add(altTel);

  // Sentromer (Y'de daha aşağı - akrocentric)
  const sent = new THREE.Mesh(
    new THREE.TorusGeometry(r * 0.5, r * 0.18, 10, 18),
    new THREE.MeshPhysicalMaterial({
      color: 0x006064, roughness: 0.4, metalness: 0.4,
      emissive: 0x006064, emissiveIntensity: 0.7,
      clearcoat: 0.9
    })
  );
  sent.position.y = -0.05;
  sent.rotation.y = Math.PI / 2;
  grp.add(sent);

  // Bant deseni (Y kromozomda 2-3 koyu bant)
  for (let i = 0; i < 3; i++) {
    const yPos = -0.35 + i * 0.18;
    const band = new THREE.Mesh(
      new THREE.TorusGeometry(r * 0.95, r * 0.08, 8, 16),
      new THREE.MeshStandardMaterial({
        color: 0x004D40, roughness: 0.85,
        emissive: 0x004D40, emissiveIntensity: 0.2
      })
    );
    band.position.y = yPos;
    band.rotation.y = Math.PI / 2;
    grp.add(band);
  }

  return grp;
}

// === BEZELYE (pürüzsüz veya buruşuk) ===
function makeBezelye(opts = {}) {
  const color = opts.color || 0xFFC107;
  const buruk = opts.buruk || false;
  const grp = new THREE.Group();

  const geo = new THREE.SphereGeometry(0.28, 32, 24);
  if (buruk) {
    const pos = geo.attributes.position;
    for (let i = 0; i < pos.count; i++) {
      const x = pos.getX(i), y = pos.getY(i), z = pos.getZ(i);
      // Çift sinüs ile organik buruşukluk
      const n1 = Math.sin(x * 14) * Math.cos(y * 11) * 0.05;
      const n2 = Math.sin(z * 13) * Math.cos(x * 9) * 0.045;
      const n3 = Math.cos(y * 16) * 0.04;
      pos.setX(i, x + n1 * 0.8 + n3 * 0.3);
      pos.setY(i, y + n2 + n1 * 0.4);
      pos.setZ(i, z + n2 * 0.6 + n3 * 0.5);
    }
    geo.computeVertexNormals();
  }

  const mat = new THREE.MeshPhysicalMaterial({
    color: color, roughness: buruk ? 0.75 : 0.22, metalness: 0.1,
    emissive: color, emissiveIntensity: buruk ? 0.08 : 0.18,
    clearcoat: buruk ? 0.25 : 0.95, clearcoatRoughness: buruk ? 0.6 : 0.05,
    sheen: buruk ? 0.0 : 0.7, sheenColor: 0xffffff
  });

  const bezelye = new THREE.Mesh(geo, mat);
  bezelye.castShadow = true; bezelye.receiveShadow = true;
  grp.add(bezelye);

  // Bezelyenin küçük tutamacı (önceki sapça)
  const sap = new THREE.Mesh(
    new THREE.ConeGeometry(0.04, 0.08, 6),
    new THREE.MeshStandardMaterial({ color: 0x33691E, roughness: 0.8 })
  );
  sap.position.set(0, 0.27, 0);
  grp.add(sap);

  return grp;
}

// === KELEBEK (gerçekçi kanat şekli, desenli) ===
function makeButterfly(opts = {}) {
  const color = opts.color || 0x1976D2;
  const grp = new THREE.Group();

  // Vücut (incelmiş silindir + segmentler)
  const bodySegments = new THREE.Group();
  for (let i = 0; i < 6; i++) {
    const seg = new THREE.Mesh(
      new THREE.SphereGeometry(0.045 - i * 0.003, 12, 10),
      new THREE.MeshPhysicalMaterial({
        color: 0x1A1A1A, roughness: 0.6, metalness: 0.3,
        clearcoat: 0.7
      })
    );
    seg.position.z = 0.22 - i * 0.08;
    seg.scale.set(1, 0.85, 1);
    bodySegments.add(seg);
  }
  grp.add(bodySegments);

  // Kafa (büyükçe küre + iki göz)
  const kafa = new THREE.Mesh(
    new THREE.SphereGeometry(0.07, 14, 12),
    new THREE.MeshPhysicalMaterial({
      color: 0x1A1A1A, roughness: 0.5, metalness: 0.4, clearcoat: 0.8
    })
  );
  kafa.position.z = 0.28;
  grp.add(kafa);

  // Bileşik gözler
  for (let s of [-1, 1]) {
    const goz = new THREE.Mesh(
      new THREE.SphereGeometry(0.025, 10, 8),
      new THREE.MeshStandardMaterial({
        color: 0xE91E63, emissive: 0xE91E63, emissiveIntensity: 0.5
      })
    );
    goz.position.set(s * 0.05, 0.02, 0.32);
    grp.add(goz);
  }

  // Antenler (uzun, ucunda topuz)
  for (let s of [-1, 1]) {
    const antCurve = new THREE.CatmullRomCurve3([
      new THREE.Vector3(s * 0.03, 0.04, 0.32),
      new THREE.Vector3(s * 0.07, 0.16, 0.42),
      new THREE.Vector3(s * 0.10, 0.27, 0.45)
    ]);
    const ant = new THREE.Mesh(
      new THREE.TubeGeometry(antCurve, 12, 0.006, 6, false),
      new THREE.MeshStandardMaterial({ color: 0x1A1A1A })
    );
    grp.add(ant);
    const topuz = new THREE.Mesh(
      new THREE.SphereGeometry(0.015, 8, 6),
      new THREE.MeshStandardMaterial({ color: 0x1A1A1A })
    );
    topuz.position.set(s * 0.10, 0.27, 0.45);
    grp.add(topuz);
  }

  // KANATLAR — 4 kanat, gerçekçi kelebek şekli
  const wings = [];

  // Renk tonları (ana renk + koyu kenar + açık iç)
  const baseColor = new THREE.Color(color);
  const darkColor = baseColor.clone().multiplyScalar(0.4);
  const lightColor = baseColor.clone().multiplyScalar(1.5);

  // Üst kanatlar (Forewing - büyük, üçgenimsi yuvarlak)
  for (let s of [-1, 1]) {
    const wingShape = new THREE.Shape();
    wingShape.moveTo(0, 0);
    // Dış kontur (geniş yuvarlak)
    wingShape.bezierCurveTo(s * 0.05, 0.35, s * 0.4, 0.55, s * 0.7, 0.45);
    wingShape.bezierCurveTo(s * 0.85, 0.35, s * 0.85, 0.15, s * 0.75, 0.0);
    wingShape.bezierCurveTo(s * 0.65, -0.1, s * 0.4, -0.12, s * 0.2, -0.08);
    wingShape.bezierCurveTo(s * 0.1, -0.05, s * 0.02, -0.02, 0, 0);

    const geom = new THREE.ShapeGeometry(wingShape, 32);
    const mat = new THREE.MeshPhysicalMaterial({
      color: color, roughness: 0.45, metalness: 0.25,
      emissive: baseColor, emissiveIntensity: 0.35,
      clearcoat: 0.75, side: THREE.DoubleSide,
      transparent: true, opacity: 0.93,
      sheen: 0.6, sheenColor: lightColor
    });
    const wing = new THREE.Mesh(geom, mat);
    wing.position.set(0, 0, 0.05);
    wing.castShadow = true;
    wings.push(wing);
    grp.add(wing);

    // Kenar bordürü (kanat etrafında koyu çerçeve)
    const edgeCurve = new THREE.CatmullRomCurve3([
      new THREE.Vector3(0, 0, 0.06),
      new THREE.Vector3(s * 0.05, 0.35, 0.06),
      new THREE.Vector3(s * 0.4, 0.55, 0.06),
      new THREE.Vector3(s * 0.7, 0.45, 0.06),
      new THREE.Vector3(s * 0.85, 0.15, 0.06),
      new THREE.Vector3(s * 0.75, 0, 0.06),
      new THREE.Vector3(s * 0.4, -0.12, 0.06),
      new THREE.Vector3(0, 0, 0.06)
    ], false);
    const edge = new THREE.Mesh(
      new THREE.TubeGeometry(edgeCurve, 50, 0.012, 6, false),
      new THREE.MeshStandardMaterial({ color: 0x1A1A1A, roughness: 0.5 })
    );
    grp.add(edge);

    // Beyaz benekler (kanat üzerinde 3-4 nokta)
    for (let i = 0; i < 4; i++) {
      const angle = Math.random() * Math.PI - Math.PI/2;
      const dist = 0.2 + Math.random() * 0.35;
      const nokta = new THREE.Mesh(
        new THREE.SphereGeometry(0.028 + Math.random() * 0.02, 12, 10),
        new THREE.MeshStandardMaterial({
          color: 0xffffff, emissive: 0xffffff, emissiveIntensity: 0.6
        })
      );
      nokta.position.set(s * (0.15 + Math.random() * 0.4), 0.05 + Math.random() * 0.35, 0.08);
      nokta.scale.set(1, 0.7, 0.5);
      grp.add(nokta);
    }
  }

  // Alt kanatlar (Hindwing - küçük, sivri sonlu)
  for (let s of [-1, 1]) {
    const wingShape = new THREE.Shape();
    wingShape.moveTo(0, 0);
    wingShape.bezierCurveTo(s * 0.05, -0.18, s * 0.3, -0.35, s * 0.5, -0.3);
    wingShape.bezierCurveTo(s * 0.62, -0.27, s * 0.55, -0.05, s * 0.4, 0.02);
    wingShape.bezierCurveTo(s * 0.25, 0.05, s * 0.1, 0.02, 0, 0);

    const geom = new THREE.ShapeGeometry(wingShape, 28);
    const mat = new THREE.MeshPhysicalMaterial({
      color: color, roughness: 0.45, metalness: 0.25,
      emissive: baseColor, emissiveIntensity: 0.3,
      clearcoat: 0.75, side: THREE.DoubleSide,
      transparent: true, opacity: 0.92,
      sheen: 0.6, sheenColor: lightColor
    });
    const wing = new THREE.Mesh(geom, mat);
    wing.position.set(0, 0, -0.02);
    wing.castShadow = true;
    wings.push(wing);
    grp.add(wing);

    // Alt kanat kenarı
    const edgeCurve = new THREE.CatmullRomCurve3([
      new THREE.Vector3(0, 0, -0.01),
      new THREE.Vector3(s * 0.05, -0.18, -0.01),
      new THREE.Vector3(s * 0.3, -0.35, -0.01),
      new THREE.Vector3(s * 0.5, -0.3, -0.01),
      new THREE.Vector3(s * 0.55, -0.05, -0.01),
      new THREE.Vector3(s * 0.25, 0.05, -0.01),
      new THREE.Vector3(0, 0, -0.01)
    ], false);
    const edge = new THREE.Mesh(
      new THREE.TubeGeometry(edgeCurve, 36, 0.011, 6, false),
      new THREE.MeshStandardMaterial({ color: 0x1A1A1A, roughness: 0.5 })
    );
    grp.add(edge);

    // Alt kanat üzerinde renkli "göz" (kelebek karakteristik)
    const goz = new THREE.Mesh(
      new THREE.SphereGeometry(0.06, 16, 12),
      new THREE.MeshStandardMaterial({
        color: 0xFFEB3B, emissive: 0xFFEB3B, emissiveIntensity: 0.5
      })
    );
    goz.position.set(s * 0.32, -0.18, 0);
    goz.scale.set(1, 0.7, 0.4);
    grp.add(goz);

    const gozIc = new THREE.Mesh(
      new THREE.SphereGeometry(0.025, 12, 10),
      new THREE.MeshStandardMaterial({
        color: 0x1A1A1A, emissive: 0x1A1A1A
      })
    );
    gozIc.position.set(s * 0.32, -0.18, 0.02);
    grp.add(gozIc);
  }

  grp.userData._wings = wings;
  return grp;
}

// === ASLANAĞZI ÇİÇEĞİ (gerçekçi dudaklı yapı) ===
function makeSnapdragon(opts = {}) {
  const color = opts.color || 0xC62828;
  const grp = new THREE.Group();

  const flowerMat = () => new THREE.MeshPhysicalMaterial({
    color: color, roughness: 0.35, metalness: 0.1,
    emissive: color, emissiveIntensity: 0.28,
    clearcoat: 0.85, clearcoatRoughness: 0.15,
    sheen: 1.0, sheenColor: 0xffffff, sheenRoughness: 0.3,
    side: THREE.DoubleSide
  });

  // Sap (kalın, eğri, gerçek bir bitki sapı)
  const sapCurve = new THREE.CatmullRomCurve3([
    new THREE.Vector3(0, -1.3, 0),
    new THREE.Vector3(0.05, -0.9, 0.02),
    new THREE.Vector3(-0.03, -0.4, -0.02),
    new THREE.Vector3(0.02, 0.1, 0.02),
    new THREE.Vector3(0, 0.8, 0)
  ]);
  const sap = new THREE.Mesh(
    new THREE.TubeGeometry(sapCurve, 24, 0.045, 12, false),
    new THREE.MeshStandardMaterial({
      color: 0x33691E, roughness: 0.85, metalness: 0.05,
      emissive: 0x1B5E20, emissiveIntensity: 0.15
    })
  );
  sap.castShadow = true;
  grp.add(sap);

  // Yapraklar (3 adet, sap boyunca, gerçekçi yaprak şekli)
  for (let i = 0; i < 3; i++) {
    const yapShape = new THREE.Shape();
    yapShape.moveTo(0, 0);
    yapShape.bezierCurveTo(0.08, 0.05, 0.15, 0.2, 0.18, 0.4);
    yapShape.bezierCurveTo(0.20, 0.55, 0.10, 0.65, 0, 0.65);
    yapShape.bezierCurveTo(-0.10, 0.65, -0.20, 0.55, -0.18, 0.4);
    yapShape.bezierCurveTo(-0.15, 0.2, -0.08, 0.05, 0, 0);

    const yap = new THREE.Mesh(
      new THREE.ShapeGeometry(yapShape, 20),
      new THREE.MeshPhysicalMaterial({
        color: 0x2E7D32, roughness: 0.7, metalness: 0.1,
        emissive: 0x1B5E20, emissiveIntensity: 0.15,
        clearcoat: 0.4, side: THREE.DoubleSide,
        sheen: 0.4, sheenColor: 0x81C784
      })
    );
    const yPos = -0.85 + i * 0.4;
    const angle = (i % 2 === 0) ? 0.6 : -0.6;
    yap.position.set(Math.cos(angle) * 0.04, yPos, Math.sin(angle) * 0.04);
    yap.rotation.y = angle + Math.PI/2;
    yap.rotation.z = -0.5;
    grp.add(yap);
  }

  // ASLANAĞZI ÇİÇEKLERİ (6 çiçek, sap boyunca dizilmiş, aşağıdan yukarıya küçülür)
  for (let f = 0; f < 6; f++) {
    const flowerGrp = new THREE.Group();
    const flowerScale = 1.0 - f * 0.09;

    // ÜST DUDAK (büyük, 2 lobu olan, yukarı kıvrılmış)
    const ustShape = new THREE.Shape();
    ustShape.moveTo(0, 0);
    ustShape.bezierCurveTo(-0.18, 0.08, -0.22, 0.20, -0.15, 0.28);
    ustShape.bezierCurveTo(-0.10, 0.32, -0.05, 0.30, 0, 0.28);
    ustShape.bezierCurveTo(0.05, 0.30, 0.10, 0.32, 0.15, 0.28);
    ustShape.bezierCurveTo(0.22, 0.20, 0.18, 0.08, 0, 0);

    const ustDudak = new THREE.Mesh(
      new THREE.ShapeGeometry(ustShape, 24),
      flowerMat()
    );
    ustDudak.position.set(0, 0.02, 0.05);
    ustDudak.rotation.x = -0.4;
    ustDudak.castShadow = true;
    flowerGrp.add(ustDudak);

    // ALT DUDAK (geniş, sarkık, ortada çıkıntı)
    const altShape = new THREE.Shape();
    altShape.moveTo(0, 0);
    altShape.bezierCurveTo(-0.20, -0.05, -0.25, -0.18, -0.15, -0.28);
    altShape.bezierCurveTo(-0.08, -0.32, 0, -0.30, 0, -0.30);
    altShape.bezierCurveTo(0, -0.30, 0.08, -0.32, 0.15, -0.28);
    altShape.bezierCurveTo(0.25, -0.18, 0.20, -0.05, 0, 0);

    const altDudak = new THREE.Mesh(
      new THREE.ShapeGeometry(altShape, 24),
      flowerMat()
    );
    altDudak.position.set(0, -0.02, 0.05);
    altDudak.rotation.x = 0.35;
    altDudak.castShadow = true;
    flowerGrp.add(altDudak);

    // ÇİÇEK BOĞAZI (Tube - aslanağzının karakteristik tüp gövdesi)
    const bogaz = new THREE.Mesh(
      new THREE.CylinderGeometry(0.06, 0.10, 0.18, 16, 1, true),
      flowerMat()
    );
    bogaz.rotation.x = Math.PI / 2;
    bogaz.position.z = -0.05;
    bogaz.castShadow = true;
    flowerGrp.add(bogaz);

    // İç sarı boğaz (signal patch - aslanağzının tipik açık sarı orta noktası)
    const ic = new THREE.Mesh(
      new THREE.SphereGeometry(0.05, 14, 10),
      new THREE.MeshPhysicalMaterial({
        color: 0xFFEB3B, emissive: 0xFFEB3B, emissiveIntensity: 0.5,
        roughness: 0.4, clearcoat: 0.8
      })
    );
    ic.position.set(0, -0.02, 0.02);
    ic.scale.set(1.5, 0.7, 0.5);
    flowerGrp.add(ic);

    // Çiçek konumu (sap üzerinde sıralı)
    flowerGrp.position.set(0, 0.7 - f * 0.22, 0);
    flowerGrp.rotation.y = (f % 2 === 0 ? 1 : -1) * 0.7;
    flowerGrp.rotation.z = (f % 2 === 0 ? 0.1 : -0.1);
    flowerGrp.scale.setScalar(flowerScale);
    grp.add(flowerGrp);
  }

  return grp;
}

// === ALYUVAR (gerçekçi biconcave disk + antijenler) ===
function makeRBC(opts = {}) {
  const grp = new THREE.Group();

  // Disk - biconcave gerçekçi
  const diskGeo = new THREE.SphereGeometry(1, 48, 32);
  const pos = diskGeo.attributes.position;
  for (let i = 0; i < pos.count; i++) {
    const x = pos.getX(i), y = pos.getY(i), z = pos.getZ(i);
    const rXZ = Math.sqrt(x*x + z*z);
    // Y'yi yatay diske sıkıştır
    let newY = y * 0.35;
    // Ortada biconcave çukur (rXZ < 0.65 ise daha da düz)
    if (rXZ < 0.65) {
      const inner = (0.65 - rXZ) / 0.65;
      newY = y * 0.35 * (1 - inner * 0.85);
    }
    pos.setY(i, newY);
  }
  diskGeo.computeVertexNormals();

  const disk = new THREE.Mesh(diskGeo, new THREE.MeshPhysicalMaterial({
    color: 0xD32F2F, roughness: 0.35, metalness: 0.15,
    emissive: 0x880E4F, emissiveIntensity: 0.25,
    clearcoat: 0.8, clearcoatRoughness: 0.2,
    sheen: 0.5, sheenColor: 0xff5252
  }));
  disk.castShadow = true; disk.receiveShadow = true;
  grp.add(disk);

  // İç hemoglobin parıltısı (yarı saydam küre, disk içinde)
  const hem = new THREE.Mesh(
    new THREE.SphereGeometry(0.55, 24, 18),
    new THREE.MeshBasicMaterial({
      color: 0xFF1744, transparent: true, opacity: 0.18,
      blending: THREE.AdditiveBlending
    })
  );
  hem.scale.y = 0.3;
  grp.add(hem);

  const antiA = opts.antiA || 0;
  const antiB = opts.antiB || 0;

  // A antijenleri (mavi koniler - yıldız gibi dağılım, yüzeyden dışa)
  for (let i = 0; i < antiA; i++) {
    const angle = (i / antiA) * Math.PI * 2 + 0.2;
    const r = 0.78;
    const cone = new THREE.Mesh(
      new THREE.ConeGeometry(0.09, 0.28, 12),
      new THREE.MeshPhysicalMaterial({
        color: 0x2196F3, roughness: 0.25, metalness: 0.3,
        emissive: 0x2196F3, emissiveIntensity: 0.7,
        clearcoat: 0.8, toneMapped: false
      })
    );
    cone.position.set(Math.cos(angle) * r, 0.2, Math.sin(angle) * r);
    cone.lookAt(cone.position.clone().multiplyScalar(2.5));
    cone.rotateX(Math.PI / 2);
    cone.castShadow = true;
    grp.add(cone);

    // Koni altında halka (yapışma noktası)
    const taban = new THREE.Mesh(
      new THREE.TorusGeometry(0.08, 0.02, 8, 12),
      new THREE.MeshStandardMaterial({
        color: 0x0D47A1, emissive: 0x0D47A1, emissiveIntensity: 0.6
      })
    );
    taban.position.copy(cone.position).multiplyScalar(0.95);
    taban.lookAt(cone.position.clone().multiplyScalar(2));
    grp.add(taban);
  }

  // B antijenleri (kırmızı/mor küreler - eşkenar dağılım)
  for (let i = 0; i < antiB; i++) {
    const angle = (i / antiB) * Math.PI * 2 + Math.PI / antiB;
    const r = 0.82;
    const sphere = new THREE.Mesh(
      new THREE.SphereGeometry(0.13, 16, 12),
      new THREE.MeshPhysicalMaterial({
        color: 0xC51162, roughness: 0.25, metalness: 0.3,
        emissive: 0xC51162, emissiveIntensity: 0.75,
        clearcoat: 0.9, toneMapped: false
      })
    );
    sphere.position.set(Math.cos(angle) * r, 0.22, Math.sin(angle) * r);
    sphere.castShadow = true;
    grp.add(sphere);

    // Halka tabani
    const taban = new THREE.Mesh(
      new THREE.TorusGeometry(0.1, 0.02, 8, 12),
      new THREE.MeshStandardMaterial({
        color: 0x880E4F, emissive: 0x880E4F, emissiveIntensity: 0.6
      })
    );
    taban.position.copy(sphere.position).multiplyScalar(0.93);
    taban.lookAt(sphere.position.clone().multiplyScalar(2));
    grp.add(taban);
  }

  return grp;
}

// === SOYAĞACI DÜĞÜMÜ (kare/daire, durum renkli) ===
function makePedigreeNode(opts = {}) {
  const isFemale = opts.female || false;
  const status = opts.status || 'sağlam';
  const grp = new THREE.Group();

  let color, emissive, intensity;
  if (status === 'hasta') {
    color = 0xC62828; emissive = 0xff1744; intensity = 0.7;
  } else if (status === 'taşıyıcı') {
    color = 0xFFC107; emissive = 0xFF6F00; intensity = 0.5;
  } else {
    color = 0xeceff1; emissive = 0xb0bec5; intensity = 0.15;
  }

  const mat = new THREE.MeshPhysicalMaterial({
    color: color, roughness: 0.3, metalness: 0.4,
    emissive: emissive, emissiveIntensity: intensity,
    clearcoat: 0.9, clearcoatRoughness: 0.1,
    sheen: 0.6, sheenColor: 0xffffff
  });

  if (isFemale) {
    // Daire
    const node = new THREE.Mesh(
      new THREE.SphereGeometry(0.28, 24, 20),
      mat
    );
    node.castShadow = true; node.receiveShadow = true;
    grp.add(node);

    // Taşıyıcı için yarı dolu efekti (yarım daire koyu mor)
    if (status === 'taşıyıcı') {
      const yariDolu = new THREE.Mesh(
        new THREE.SphereGeometry(0.282, 24, 20, 0, Math.PI),
        new THREE.MeshPhysicalMaterial({
          color: 0x4A148C, roughness: 0.3, metalness: 0.4,
          emissive: 0x6A1B9A, emissiveIntensity: 0.7,
          clearcoat: 0.9
        })
      );
      yariDolu.rotation.y = Math.PI;
      grp.add(yariDolu);
    }

    // Çevre halkası
    const halka = new THREE.Mesh(
      new THREE.TorusGeometry(0.32, 0.025, 10, 24),
      new THREE.MeshStandardMaterial({
        color: emissive, emissive: emissive, emissiveIntensity: 0.6, toneMapped: false
      })
    );
    halka.rotation.x = Math.PI / 2;
    grp.add(halka);
  } else {
    // Kare (kutu)
    const node = new THREE.Mesh(
      new THREE.BoxGeometry(0.48, 0.48, 0.48),
      mat
    );
    node.castShadow = true; node.receiveShadow = true;
    grp.add(node);

    // Yumuşatılmış kenarlar (edges line)
    const edges = new THREE.EdgesGeometry(node.geometry);
    const frame = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({
      color: emissive, linewidth: 2
    }));
    grp.add(frame);
  }

  return grp;
}

// === IŞIK YOLU (parlayan tüp) ===
function makeLightPath(from, to, color = 0xFFEB3B) {
  const dir = to.clone().sub(from);
  const len = dir.length();
  const mid = from.clone().add(to).multiplyScalar(0.5);

  const path = new THREE.Mesh(
    new THREE.CylinderGeometry(0.04, 0.04, len, 10),
    new THREE.MeshStandardMaterial({
      color: color, emissive: color, emissiveIntensity: 0.85,
      transparent: true, opacity: 0.8, toneMapped: false
    })
  );
  path.position.copy(mid);
  path.lookAt(to);
  path.rotateX(Math.PI / 2);

  return path;
}

// === TAVŞAN (gerçekçi karikatür modeli) ===
function makeBunny(opts = {}) {
  const color = opts.color || 0xeceff1;
  const tipColor = opts.tipColor || null;  // Himalaya için uç koyusu
  const eyeColor = opts.eyeColor || 0x212121;
  const noseColor = opts.noseColor || 0xE91E63;
  const grp = new THREE.Group();

  const tuyMat = new THREE.MeshPhysicalMaterial({
    color: color, roughness: 0.9, metalness: 0.05,
    emissive: color, emissiveIntensity: 0.1,
    sheen: 0.8, sheenColor: 0xffffff, sheenRoughness: 0.4
  });
  const tipMat = tipColor ? new THREE.MeshPhysicalMaterial({
    color: tipColor, roughness: 0.85, metalness: 0.05,
    emissive: tipColor, emissiveIntensity: 0.1,
    sheen: 0.5, sheenColor: 0xffffff
  }) : tuyMat;

  // Vücut (oval, oturmuş tavşan)
  const body = new THREE.Mesh(
    new THREE.SphereGeometry(0.7, 32, 24),
    tuyMat
  );
  body.scale.set(1.1, 1.2, 1.3);
  body.position.y = 0.1;
  body.castShadow = true; body.receiveShadow = true;
  grp.add(body);

  // Kafa
  const head = new THREE.Mesh(
    new THREE.SphereGeometry(0.5, 28, 22),
    tuyMat
  );
  head.scale.set(1.0, 1.1, 1.1);
  head.position.set(0, 0.7, 0.45);
  head.castShadow = true;
  grp.add(head);

  // BURUN bölgesi (öne doğru sivri kısım - tipColor)
  const snout = new THREE.Mesh(
    new THREE.SphereGeometry(0.22, 20, 16),
    tipMat
  );
  snout.scale.set(1.2, 0.85, 1.2);
  snout.position.set(0, 0.55, 0.9);
  grp.add(snout);

  // Burun (küçük üçgen)
  const burun = new THREE.Mesh(
    new THREE.SphereGeometry(0.06, 12, 10),
    new THREE.MeshStandardMaterial({
      color: noseColor, emissive: noseColor, emissiveIntensity: 0.4,
      roughness: 0.4
    })
  );
  burun.position.set(0, 0.6, 1.08);
  grp.add(burun);

  // Gözler (büyük, parlak)
  for (let s of [-1, 1]) {
    const goz = new THREE.Mesh(
      new THREE.SphereGeometry(0.08, 14, 12),
      new THREE.MeshPhysicalMaterial({
        color: eyeColor, roughness: 0.2, metalness: 0.4,
        emissive: eyeColor === 0xE91E63 ? 0xE91E63 : 0,
        emissiveIntensity: eyeColor === 0xE91E63 ? 0.7 : 0,
        clearcoat: 1.0
      })
    );
    goz.position.set(s * 0.22, 0.78, 0.85);
    grp.add(goz);

    // Göz parlaması
    const parlatma = new THREE.Mesh(
      new THREE.SphereGeometry(0.025, 8, 6),
      new THREE.MeshBasicMaterial({ color: 0xffffff })
    );
    parlatma.position.set(s * 0.20, 0.82, 0.93);
    grp.add(parlatma);
  }

  // Kulaklar (uzun, dikilmiş)
  for (let s of [-1, 1]) {
    const kulakGrp = new THREE.Group();

    const kulakShape = new THREE.Shape();
    kulakShape.moveTo(0, 0);
    kulakShape.bezierCurveTo(0.1, 0.1, 0.12, 0.5, 0.07, 0.8);
    kulakShape.bezierCurveTo(0.05, 0.9, -0.05, 0.9, -0.07, 0.8);
    kulakShape.bezierCurveTo(-0.12, 0.5, -0.1, 0.1, 0, 0);

    const kulakDis = new THREE.Mesh(
      new THREE.ExtrudeGeometry(kulakShape, { depth: 0.02, bevelEnabled: false }),
      tipMat
    );
    kulakDis.castShadow = true;
    kulakGrp.add(kulakDis);

    // İç pembe kısım
    const icShape = new THREE.Shape();
    icShape.moveTo(0, 0.05);
    icShape.bezierCurveTo(0.06, 0.15, 0.07, 0.45, 0.04, 0.7);
    icShape.bezierCurveTo(0.02, 0.78, -0.02, 0.78, -0.04, 0.7);
    icShape.bezierCurveTo(-0.07, 0.45, -0.06, 0.15, 0, 0.05);
    const icKulak = new THREE.Mesh(
      new THREE.ShapeGeometry(icShape),
      new THREE.MeshStandardMaterial({
        color: 0xF8BBD0, roughness: 0.7,
        emissive: 0xF8BBD0, emissiveIntensity: 0.15
      })
    );
    icKulak.position.z = 0.025;
    kulakGrp.add(icKulak);

    kulakGrp.position.set(s * 0.18, 1.05, 0.35);
    kulakGrp.rotation.z = s * 0.15;
    kulakGrp.rotation.y = s * 0.2;
    grp.add(kulakGrp);
  }

  // Ön patiler
  for (let s of [-1, 1]) {
    const pati = new THREE.Mesh(
      new THREE.SphereGeometry(0.18, 16, 14),
      tipMat
    );
    pati.scale.set(0.7, 0.9, 1.4);
    pati.position.set(s * 0.25, -0.35, 0.6);
    pati.castShadow = true;
    grp.add(pati);
  }

  // Arka patiler
  for (let s of [-1, 1]) {
    const pati = new THREE.Mesh(
      new THREE.SphereGeometry(0.22, 16, 14),
      tipMat
    );
    pati.scale.set(0.8, 1.0, 1.6);
    pati.position.set(s * 0.4, -0.3, -0.15);
    pati.rotation.x = -0.25;
    pati.castShadow = true;
    grp.add(pati);
  }

  // Kuyruk (yumru pamuk topu)
  const kuyruk = new THREE.Mesh(
    new THREE.SphereGeometry(0.18, 16, 14),
    new THREE.MeshPhysicalMaterial({
      color: tipColor || 0xffffff, roughness: 0.95,
      sheen: 0.8, sheenColor: 0xffffff
    })
  );
  kuyruk.position.set(0, 0.2, -0.85);
  kuyruk.castShadow = true;
  grp.add(kuyruk);

  // Bıyık (4 adet)
  for (let s of [-1, 1]) {
    for (let i = 0; i < 2; i++) {
      const biyik = new THREE.Mesh(
        new THREE.CylinderGeometry(0.003, 0.003, 0.2, 4),
        new THREE.MeshStandardMaterial({ color: 0x424242 })
      );
      biyik.position.set(s * 0.18, 0.55 + i * 0.04, 1.05);
      biyik.rotation.z = s * (Math.PI / 2 + i * 0.1);
      grp.add(biyik);
    }
  }

  return grp;
}

// === SAHNE ATMOSFERİ (parıltılı arka plan + gradient zemin) ===
function makeSceneAtmosphere(opts = {}) {
  const grp = new THREE.Group();
  const tint = opts.tint || 0x4FC3F7;
  const particleCount = opts.particles || 80;
  const groundY = opts.groundY ?? -4.5;
  const skipGround = opts.skipGround || false;

  // 1) Yıldız tozu (parlayan parçacık bulutu, sahnenin etrafında)
  for (let i = 0; i < particleCount; i++) {
    const radius = 7 + Math.random() * 4;
    const theta = Math.random() * Math.PI * 2;
    const phi = (Math.random() - 0.5) * 0.7;

    const dust = new THREE.Mesh(
      new THREE.SphereGeometry(0.02 + Math.random() * 0.04, 6, 5),
      new THREE.MeshBasicMaterial({
        color: tint, transparent: true,
        opacity: 0.3 + Math.random() * 0.5,
        blending: THREE.AdditiveBlending
      })
    );
    dust.position.set(
      Math.cos(theta) * radius * Math.cos(phi),
      Math.sin(phi) * radius * 0.7,
      Math.sin(theta) * radius * Math.cos(phi) - 2
    );
    dust.userData._atmDust = true;
    dust.userData._base = {
      theta: theta, radius: radius, phi: phi,
      baseY: dust.position.y, speed: 0.3 + Math.random() * 0.5
    };
    grp.add(dust);
  }

  // 2) Gradient cam zemin (parlak yansıtıcı disk)
  if (!skipGround) {
    const groundGeo = new THREE.CircleGeometry(9, 64);
    const groundMat = new THREE.MeshPhysicalMaterial({
      color: tint, transparent: true, opacity: 0.12,
      roughness: 0.05, metalness: 0.95,
      clearcoat: 1.0, clearcoatRoughness: 0.05,
      side: THREE.DoubleSide
    });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.position.y = groundY;
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    grp.add(ground);

    // Zemin halkası (orta çevre çerçevesi)
    const ring = new THREE.Mesh(
      new THREE.RingGeometry(6, 6.5, 64),
      new THREE.MeshStandardMaterial({
        color: tint, emissive: tint, emissiveIntensity: 0.7,
        transparent: true, opacity: 0.55,
        side: THREE.DoubleSide
      })
    );
    ring.position.y = groundY + 0.01;
    ring.rotation.x = -Math.PI / 2;
    grp.add(ring);

    // İç halka
    const innerRing = new THREE.Mesh(
      new THREE.RingGeometry(3.5, 3.7, 48),
      new THREE.MeshStandardMaterial({
        color: tint, emissive: tint, emissiveIntensity: 0.5,
        transparent: true, opacity: 0.3,
        side: THREE.DoubleSide
      })
    );
    innerRing.position.y = groundY + 0.015;
    innerRing.rotation.x = -Math.PI / 2;
    grp.add(innerRing);
  }

  // 3) Yumuşak arka plan parıltısı (uzakta gradient küre)
  const haloGeo = new THREE.SphereGeometry(11, 32, 24);
  const haloMat = new THREE.MeshBasicMaterial({
    color: tint, transparent: true, opacity: 0.08,
    side: THREE.BackSide,
    blending: THREE.AdditiveBlending
  });
  const halo = new THREE.Mesh(haloGeo, haloMat);
  grp.add(halo);

  grp.userData._isAtmosphere = true;
  return grp;
}

// 1. GENEL BAKIŞ - DNA → Nükleozom → Kromozom hiyerarşisi
SubBuilders.buildGenelBakis = function() {
  camera.position.set(0, 1, 21.0);
  controls.target.set(0, 0, 0);
  const grp = new THREE.Group();
  markDynamic(grp);

  // Sahne atmosferi
  const atmosphere = makeSceneAtmosphere({ tint: 0x7E57C2 });
  grp.add(atmosphere);

  // ============ SOL: KROMOZOM ============
  const kromGrp = new THREE.Group();
  const krom = makeChromosome({ color: 0xAB47BC });
  krom.scale.setScalar(1.6);
  kromGrp.add(krom);
  // Çift kromozom (homolog) - arkada saydam ikincil
  const krom2 = makeChromosome({ color: 0x7E57C2 });
  krom2.scale.setScalar(1.5);
  krom2.position.set(0.8, 0.1, -0.4);
  krom2.children.forEach(c => {
    if (c.material) {
      c.material = c.material.clone();
      c.material.transparent = true;
      c.material.opacity = 0.55;
    }
  });
  kromGrp.add(krom2);
  kromGrp.position.set(-5.5, 0, 0);
  grp.add(kromGrp);

  // ============ ORTA: NÜKLEOZOM (BONCUK DİZİSİ) ============
  const nukGrp = new THREE.Group();
  // 6 histon kümesi + DNA toroid
  for (let i = 0; i < 6; i++) {
    // Histon (8 alt-birim küre kümesi)
    const histon = new THREE.Group();
    for (let j = 0; j < 8; j++) {
      const a = (j / 8) * Math.PI * 2;
      const bead = new THREE.Mesh(
        new THREE.SphereGeometry(0.10, 14, 12),
        new THREE.MeshPhysicalMaterial({
          color: 0xFF7043, roughness: 0.4, metalness: 0.25,
          emissive: 0xFF7043, emissiveIntensity: 0.55,
          clearcoat: 0.7
        })
      );
      bead.position.set(Math.cos(a) * 0.12, Math.sin(a) * 0.12, 0);
      bead.castShadow = true;
      histon.add(bead);
    }
    histon.position.y = (i - 2.5) * 0.55;
    nukGrp.add(histon);

    // DNA bu histon etrafında 1.65 sarmal yapar
    const dnaToroid = new THREE.Mesh(
      new THREE.TorusGeometry(0.22, 0.04, 10, 36),
      new THREE.MeshPhysicalMaterial({
        color: 0x1976D2, roughness: 0.25, metalness: 0.45,
        emissive: 0x1976D2, emissiveIntensity: 0.65,
        clearcoat: 0.85
      })
    );
    dnaToroid.position.y = (i - 2.5) * 0.55;
    dnaToroid.rotation.x = Math.PI / 2 - 0.5;
    dnaToroid.castShadow = true;
    nukGrp.add(dnaToroid);

    // İkinci sarmal (zıt renk)
    const dnaToroid2 = new THREE.Mesh(
      new THREE.TorusGeometry(0.24, 0.035, 8, 32),
      new THREE.MeshPhysicalMaterial({
        color: 0xD81B60, roughness: 0.25, metalness: 0.45,
        emissive: 0xD81B60, emissiveIntensity: 0.55,
        clearcoat: 0.85
      })
    );
    dnaToroid2.position.y = (i - 2.5) * 0.55;
    dnaToroid2.rotation.x = Math.PI / 2 - 0.5;
    dnaToroid2.rotation.z = Math.PI / 2;
    nukGrp.add(dnaToroid2);
  }

  // Bağlayıcı DNA (linker)
  for (let i = 0; i < 5; i++) {
    const link = new THREE.Mesh(
      new THREE.CylinderGeometry(0.03, 0.03, 0.35, 8),
      new THREE.MeshPhysicalMaterial({
        color: 0x1976D2, emissive: 0x1976D2, emissiveIntensity: 0.6,
        roughness: 0.3, clearcoat: 0.7
      })
    );
    link.position.set(0.22, (i - 2) * 0.55, 0);
    nukGrp.add(link);
  }

  nukGrp.scale.setScalar(1.05);
  grp.add(nukGrp);

  // ============ SAĞ: DNA ÇİFT SARMAL ============
  const dna = makeDNA({ length: 3.5, radius: 0.4, turns: 3.5, baseCount: 42 });
  dna.position.set(5.5, 0, 0);
  grp.add(dna);

  // ============ ZOOM OKLARI (parıltılı) ============
  const zoom1 = makeLightPath(new THREE.Vector3(-4.0, 0, 0), new THREE.Vector3(-0.8, 0, 0), 0xB388FF);
  const zoom2 = makeLightPath(new THREE.Vector3(0.8, 0, 0), new THREE.Vector3(4.0, 0, 0), 0x42A5F5);
  zoom1.material.opacity = 0.7;
  zoom2.material.opacity = 0.7;
  grp.add(zoom1); grp.add(zoom2);

  // Zoom ucu üçgenler (oklar)
  const okMat = new THREE.MeshStandardMaterial({
    color: 0xFFEB3B, emissive: 0xFFEB3B, emissiveIntensity: 1.0, toneMapped: false
  });
  const ok1 = new THREE.Mesh(new THREE.ConeGeometry(0.18, 0.4, 8), okMat);
  ok1.position.set(-0.9, 0, 0);
  ok1.rotation.z = -Math.PI / 2;
  grp.add(ok1);
  const ok2 = new THREE.Mesh(new THREE.ConeGeometry(0.18, 0.4, 8), okMat);
  ok2.position.set(3.9, 0, 0);
  ok2.rotation.z = -Math.PI / 2;
  grp.add(ok2);

  // ============ TABAN GÖLGE PLATFORMU ============
  const platform = new THREE.Mesh(
    new THREE.CylinderGeometry(8, 8, 0.05, 64),
    new THREE.MeshStandardMaterial({
      color: 0x1a1a2e, roughness: 0.95, metalness: 0.1,
      transparent: true, opacity: 0.5
    })
  );
  platform.position.y = -3.5;
  platform.receiveShadow = true;
  grp.add(platform);

  scene.add(grp);

  // ============ ETİKETLER ============
  addLabel(new THREE.Vector3(-5.5, 2.8, 0), '📚 KROMOZOM', 'phloem', new THREE.Vector3(-5.5, 0, 0));
  addLabel(new THREE.Vector3(-5.5, -2.5, 0), 'X şekli (mitoz)', 'chloro', new THREE.Vector3(-5.5, -1.5, 0));

  addLabel(new THREE.Vector3(0, 2.8, 0), '🔬 NÜKLEOZOM', 'warn', new THREE.Vector3(0, 1.7, 0));
  addLabel(new THREE.Vector3(0, -2.5, 0), 'DNA + 8 histon', 'chloro', new THREE.Vector3(0, -1.7, 0));

  addLabel(new THREE.Vector3(5.5, 2.8, 0), '🧬 DNA ÇİFT SARMAL', 'phloem', new THREE.Vector3(5.5, 0, 0));
  addLabel(new THREE.Vector3(5.5, -2.5, 0), 'A-T, G-C baz çiftleri', 'chloro', new THREE.Vector3(5.5, -1.7, 0));

  addLabel(new THREE.Vector3(0, 4, 0), '🔬 Moleküler Hiyerarşi: Kromozom → Nükleozom → DNA', 'warn', new THREE.Vector3(0, 0, 0));

  grp.userData.spin = 0;
  dynamicObjects.push(grp);

  window._customAnim = (t, dt) => {
    // Atmosfer toz parçacıkları orbit
    grp.traverse(c => {
      if (c.userData && c.userData._atmDust) {
        const b = c.userData._base;
        c.position.x = Math.cos(b.theta + t * b.speed * 0.15) * b.radius * Math.cos(b.phi);
        c.position.z = Math.sin(b.theta + t * b.speed * 0.15) * b.radius * Math.cos(b.phi) - 2;
        c.position.y = b.baseY + Math.sin(t * b.speed + b.theta) * 0.3;
        if (c.material) c.material.opacity = 0.25 + Math.abs(Math.sin(t * b.speed + b.theta * 2)) * 0.45;
      }
    });
    krom.rotation.y = Math.sin(t * 0.5) * 0.5;
    krom2.rotation.y = Math.sin(t * 0.5 + 0.3) * 0.5;
    nukGrp.rotation.y = t * 0.4;
    dna.rotation.y = t * 0.6;
    [zoom1, zoom2].forEach((p, i) => {
      p.material.emissiveIntensity = 0.6 + Math.abs(Math.sin(t * 2.5 + i * 0.7)) * 0.5;
    });
    [ok1, ok2].forEach((o, i) => {
      o.scale.setScalar(1 + Math.sin(t * 3 + i) * 0.15);
    });
  };
};

// 2. GENOTİP vs FENOTİP - 3 sütun (AA / Aa / aa) + Kelebekler
SubBuilders.buildGenotipFenotip = function() {
  camera.position.set(0, 1.5, 20.0);
  controls.target.set(0, 0, 0);
  const grp = new THREE.Group();
  markDynamic(grp);

  // Sahne atmosferi
  const atmosphere = makeSceneAtmosphere({ tint: 0x42A5F5 });
  grp.add(atmosphere);

  const setups = [
    { x: -5, colors: [0x1976D2, 0x1976D2], pheno: 0x1976D2, label: 'AA', desc: 'Mavi' },
    { x: 0,  colors: [0x1976D2, 0x90A4AE], pheno: 0x1976D2, label: 'Aa', desc: 'Mavi' },
    { x: 5,  colors: [0x90A4AE, 0x90A4AE], pheno: 0x607D8B, label: 'aa', desc: 'Gri' }
  ];

  const _butterflies = [];
  const _allArrows = [];

  setups.forEach((s, idx) => {
    // === ÜSTTE: Genotip (2 alel + bağ) ===
    const genGrp = new THREE.Group();
    for (let i = 0; i < 2; i++) {
      const alel = makeAllele({ color: s.colors[i], baskin: s.colors[i] === 0x1976D2 });
      alel.position.set((i - 0.5) * 0.8, 0, 0);
      genGrp.add(alel);
    }

    // Aleller arası DNA segmenti
    const baglanti = new THREE.Mesh(
      new THREE.CylinderGeometry(0.05, 0.05, 0.8, 12),
      new THREE.MeshPhysicalMaterial({
        color: 0xeceff1, emissive: 0xffffff, emissiveIntensity: 0.5,
        clearcoat: 0.8, transparent: true, opacity: 0.85
      })
    );
    baglanti.rotation.z = Math.PI / 2;
    genGrp.add(baglanti);

    genGrp.position.set(s.x, 3, 0);
    grp.add(genGrp);

    // === ALTTA: Fenotip (Kelebek) ===
    const butterfly = makeButterfly({ color: s.pheno });
    butterfly.position.set(s.x, -1, 0);
    butterfly.scale.setScalar(2.3);
    butterfly.userData._baseX = s.x;
    butterfly.userData._idx = idx;
    grp.add(butterfly);
    _butterflies.push(butterfly);

    // === GENOTİP → FENOTİP OKU (parlayan çizgi) ===
    const ok = makeLightPath(
      new THREE.Vector3(s.x, 2.5, 0),
      new THREE.Vector3(s.x, 0.2, 0),
      0xFFEB3B
    );
    grp.add(ok);
    _allArrows.push(ok);

    // Ok ucu (cone)
    const okUcu = new THREE.Mesh(
      new THREE.ConeGeometry(0.12, 0.3, 8),
      new THREE.MeshStandardMaterial({
        color: 0xFFEB3B, emissive: 0xFFEB3B, emissiveIntensity: 1.0, toneMapped: false
      })
    );
    okUcu.position.set(s.x, 0.4, 0);
    okUcu.rotation.x = Math.PI;
    grp.add(okUcu);

    // === TABAN HALKASI (kelebek altında) ===
    const halka = new THREE.Mesh(
      new THREE.TorusGeometry(1.0, 0.04, 12, 32),
      new THREE.MeshStandardMaterial({
        color: s.pheno, emissive: s.pheno, emissiveIntensity: 0.5,
        transparent: true, opacity: 0.6
      })
    );
    halka.position.set(s.x, -2.3, 0);
    halka.rotation.x = Math.PI / 2;
    grp.add(halka);
  });

  // Aydınlatma parçacıkları (mavi/gri çevresinde)
  setups.forEach(s => {
    for (let p = 0; p < 8; p++) {
      const dot = new THREE.Mesh(
        new THREE.SphereGeometry(0.025, 8, 6),
        new THREE.MeshBasicMaterial({
          color: s.pheno, transparent: true, opacity: 0.8
        })
      );
      const r = 1.2 + Math.random() * 0.4;
      const a = Math.random() * Math.PI * 2;
      dot.position.set(s.x + Math.cos(a) * r, -1 + Math.sin(a) * r * 0.5, Math.random() * 0.3);
      dot.userData._base = { x: s.x, a: a, r: r };
      dot.userData._dust = true;
      grp.add(dot);
    }
  });

  scene.add(grp);

  // Etiketler
  setups.forEach(s => {
    addLabel(new THREE.Vector3(s.x, 4.2, 0), s.label, 'phloem', new THREE.Vector3(s.x, 3, 0));
    addLabel(new THREE.Vector3(s.x, 4.8, 0), 'Genotip', 'chloro', new THREE.Vector3(s.x, 3, 0));
    const renkLabel = s.pheno === 0x1976D2 ? '💙 Mavi Kelebek' : '🩶 Gri Kelebek';
    const cls = s.pheno === 0x1976D2 ? 'phloem' : 'epi';
    addLabel(new THREE.Vector3(s.x, -3, 0), renkLabel, cls, new THREE.Vector3(s.x, -1, 0));
  });

  addLabel(new THREE.Vector3(0, 5.7, 0), '🦋 Genotip → Fenotip', 'warn', new THREE.Vector3(0, 0, 0));
  addLabel(new THREE.Vector3(-7, 1.3, 0), 'A baskın = Mavi', 'phloem', new THREE.Vector3(-5, 1.3, 0));
  addLabel(new THREE.Vector3(7, 1.3, 0), 'a çekinik = Gri', 'epi', new THREE.Vector3(5, 1.3, 0));

  grp.userData.spin = 0;
  dynamicObjects.push(grp);

  window._customAnim = (t, dt) => {
    // Atmosfer toz parçacıkları orbit
    grp.traverse(c => {
      if (c.userData && c.userData._atmDust) {
        const b = c.userData._base;
        c.position.x = Math.cos(b.theta + t * b.speed * 0.15) * b.radius * Math.cos(b.phi);
        c.position.z = Math.sin(b.theta + t * b.speed * 0.15) * b.radius * Math.cos(b.phi) - 2;
        c.position.y = b.baseY + Math.sin(t * b.speed + b.theta) * 0.3;
        if (c.material) c.material.opacity = 0.25 + Math.abs(Math.sin(t * b.speed + b.theta * 2)) * 0.45;
      }
    });
    _butterflies.forEach((b, i) => {
      // Yukarı-aşağı dalga
      b.position.y = -1 + Math.sin(t * 1.2 + i) * 0.25;
      // Yan salınım
      b.position.x = b.userData._baseX + Math.sin(t * 0.6 + i * 0.5) * 0.3;
      // Kanat çırpma
      if (b.userData._wings) {
        b.userData._wings.forEach((w, wi) => {
          const side = wi % 2 === 0 ? -1 : 1;
          w.rotation.y = side * (Math.PI / 12 + Math.sin(t * 9 + i) * 0.7);
        });
      }
      b.rotation.y = Math.sin(t * 0.5 + i) * 0.4;
    });
    // Toz parçacıkları orbit
    grp.children.forEach(c => {
      if (c.userData && c.userData._dust) {
        const b = c.userData._base;
        c.position.x = b.x + Math.cos(b.a + t * 0.5) * b.r;
        c.position.y = -1 + Math.sin(b.a + t * 0.5) * b.r * 0.5;
        c.material.opacity = 0.5 + Math.abs(Math.sin(t * 2 + b.a)) * 0.4;
      }
    });
    // Oklar pulse
    _allArrows.forEach((a, i) => {
      a.material.emissiveIntensity = 0.6 + Math.abs(Math.sin(t * 2.5 + i)) * 0.5;
    });
  };
};

// 3. HOMOZİGOT vs HETEROZİGOT - Mayoz Süreçi
SubBuilders.buildHomozigotHeterozigot = function() {
  camera.position.set(0, 0.5, 21.0);
  controls.target.set(0, 0, 0);
  const grp = new THREE.Group();
  markDynamic(grp);

  // Sahne atmosferi
  const atmosphere = makeSceneAtmosphere({ tint: 0xFFC107 });
  grp.add(atmosphere);

  const setups = [
    { x: -5.5, label: 'AA', desc: 'Homozigot Baskın', colors: [0xFFC107, 0xFFC107], gam: 0xFFC107 },
    { x: 0,    label: 'Aa', desc: 'Heterozigot (Melez)', colors: [0xFFC107, 0x4CAF50], gam2: 0x4CAF50 },
    { x: 5.5,  label: 'aa', desc: 'Homozigot Çekinik', colors: [0x4CAF50, 0x4CAF50], gam: 0x4CAF50 }
  ];

  const _krom_pairs = [];

  setups.forEach((s) => {
    // === DİPLOİT HÜCRE (2n) ===
    const dipPair = new THREE.Group();
    for (let i = 0; i < 2; i++) {
      const krom = makeChromosome({ color: s.colors[i], small: true });
      krom.position.set((i - 0.5) * 0.6, 0, 0);
      krom.scale.setScalar(0.7);
      dipPair.add(krom);
    }

    // Çerçeve daire (hücre membranı)
    const membran = new THREE.Mesh(
      new THREE.TorusGeometry(0.85, 0.04, 12, 36),
      new THREE.MeshStandardMaterial({
        color: 0x90CAF9, emissive: 0x90CAF9, emissiveIntensity: 0.4,
        transparent: true, opacity: 0.7
      })
    );
    membran.rotation.x = Math.PI / 2;
    dipPair.add(membran);

    dipPair.position.set(s.x, 2.2, 0);
    grp.add(dipPair);
    _krom_pairs.push(dipPair);

    // === MAYOZ OKLARI ===
    const arrowMat = new THREE.MeshStandardMaterial({
      color: 0xFFEB3B, emissive: 0xFFEB3B, emissiveIntensity: 0.9, toneMapped: false
    });

    // Sol ok
    const okSol = new THREE.Mesh(new THREE.ConeGeometry(0.1, 0.3, 8), arrowMat);
    okSol.position.set(s.x - 0.8, 0.7, 0);
    okSol.rotation.z = Math.PI / 5;
    okSol.rotation.x = Math.PI;
    grp.add(okSol);

    // Sağ ok
    const okSag = new THREE.Mesh(new THREE.ConeGeometry(0.1, 0.3, 8), arrowMat);
    okSag.position.set(s.x + 0.8, 0.7, 0);
    okSag.rotation.z = -Math.PI / 5;
    okSag.rotation.x = Math.PI;
    grp.add(okSag);

    // Mayoz çizgileri
    for (let i = 0; i < 2; i++) {
      const xOff = (i === 0) ? -0.8 : 0.8;
      const line = makeLightPath(
        new THREE.Vector3(s.x, 1.4, 0),
        new THREE.Vector3(s.x + xOff, 0.5, 0),
        0xFFEB3B
      );
      grp.add(line);
    }

    // === GAMETLER (Haploit) ===
    for (let i = 0; i < 2; i++) {
      const gamColor = s.colors[i];
      const xPos = s.x + (i === 0 ? -0.8 : 0.8);

      const gametGrp = new THREE.Group();

      // Tek kromozom (haploit)
      const gamKrom = makeChromosome({ color: gamColor, small: true });
      gamKrom.scale.setScalar(0.55);
      gametGrp.add(gamKrom);

      // Çevre (gamet membranı)
      const halka = new THREE.Mesh(
        new THREE.TorusGeometry(0.55, 0.03, 10, 24),
        new THREE.MeshStandardMaterial({
          color: gamColor, emissive: gamColor, emissiveIntensity: 0.6,
          transparent: true, opacity: 0.7
        })
      );
      halka.rotation.x = Math.PI / 2;
      gametGrp.add(halka);

      // Parıltı küresi
      const glow = new THREE.Mesh(
        new THREE.SphereGeometry(0.7, 16, 12),
        new THREE.MeshBasicMaterial({
          color: gamColor, transparent: true, opacity: 0.12,
          blending: THREE.AdditiveBlending
        })
      );
      gametGrp.add(glow);

      gametGrp.position.set(xPos, -1.5, 0);
      grp.add(gametGrp);
    }
  });

  // Üst etiket altı çizgi
  const baselineYukari = new THREE.Mesh(
    new THREE.CylinderGeometry(0.012, 0.012, 13.5, 6),
    new THREE.MeshStandardMaterial({
      color: 0x29B6F6, emissive: 0x29B6F6, emissiveIntensity: 0.5,
      transparent: true, opacity: 0.5
    })
  );
  baselineYukari.position.set(0, 3.3, 0);
  baselineYukari.rotation.z = Math.PI / 2;
  grp.add(baselineYukari);

  scene.add(grp);

  setups.forEach(s => {
    addLabel(new THREE.Vector3(s.x, 3.8, 0), s.label, 'phloem', new THREE.Vector3(s.x, 2.2, 0));
    addLabel(new THREE.Vector3(s.x, 4.3, 0), s.desc, 'warn', new THREE.Vector3(s.x, 2.2, 0));
    addLabel(new THREE.Vector3(s.x, -2.3, 0), '2 Gamet (n)', 'chloro', new THREE.Vector3(s.x, -1.5, 0));
  });

  addLabel(new THREE.Vector3(0, 5.2, 0), '🔗 Diploit → Mayoz → Haploit Gametler', 'warn', new THREE.Vector3(0, 0, 0));
  addLabel(new THREE.Vector3(-5.5, 1.3, 0), '↓ MAYOZ ↓', 'warn', new THREE.Vector3(-5.5, 1.3, 0));
  addLabel(new THREE.Vector3(0, 1.3, 0), '↓ MAYOZ ↓', 'warn', new THREE.Vector3(0, 1.3, 0));
  addLabel(new THREE.Vector3(5.5, 1.3, 0), '↓ MAYOZ ↓', 'warn', new THREE.Vector3(5.5, 1.3, 0));

  grp.userData.spin = 0;
  dynamicObjects.push(grp);

  window._customAnim = (t, dt) => {
    // Atmosfer toz parçacıkları orbit
    grp.traverse(c => {
      if (c.userData && c.userData._atmDust) {
        const b = c.userData._base;
        c.position.x = Math.cos(b.theta + t * b.speed * 0.15) * b.radius * Math.cos(b.phi);
        c.position.z = Math.sin(b.theta + t * b.speed * 0.15) * b.radius * Math.cos(b.phi) - 2;
        c.position.y = b.baseY + Math.sin(t * b.speed + b.theta) * 0.3;
        if (c.material) c.material.opacity = 0.25 + Math.abs(Math.sin(t * b.speed + b.theta * 2)) * 0.45;
      }
    });
    _krom_pairs.forEach((p, i) => {
      p.rotation.y = Math.sin(t * 0.5 + i) * 0.4;
    });
    grp.children.forEach(c => {
      if (c.position && c.position.y < -1) {
        c.rotation.y = t * 0.4 + c.position.x;
      }
    });
  };
};

  mem2.rotation.x = Math.PI / 2;
  dihibrit.add(mem2);
  dihibrit.position.set(4.5, 2, 0);
  grp.add(dihibrit);

  // 4 gamet (SD, Sd, sD, sd)
  const gametConfig = [
    { x: 1.8, c1: 0xFFC107, c2: 0xE91E63, label: 'SD' },
    { x: 3.4, c1: 0xFFC107, c2: 0xeceff1, label: 'Sd' },
    { x: 5.0, c1: 0x4CAF50, c2: 0xE91E63, label: 'sD' },
    { x: 6.6, c1: 0x4CAF50, c2: 0xeceff1, label: 'sd' }
  ];

  gametConfig.forEach(g => {
    const gametGrp = new THREE.Group();
    const k1 = new THREE.Mesh(
      new THREE.SphereGeometry(0.16, 14, 12),
      new THREE.MeshPhysicalMaterial({
        color: g.c1, emissive: g.c1, emissiveIntensity: 0.75,
        clearcoat: 0.85
      })
    );
    k1.position.x = -0.16;
    gametGrp.add(k1);
    const k2 = new THREE.Mesh(
      new THREE.SphereGeometry(0.16, 14, 12),
      new THREE.MeshPhysicalMaterial({
        color: g.c2, emissive: g.c2, emissiveIntensity: 0.7,
        clearcoat: 0.85
      })
    );
    k2.position.x = 0.16;
    gametGrp.add(k2);

    // Çevre
    const halo = new THREE.Mesh(
      new THREE.TorusGeometry(0.35, 0.025, 8, 20),
      new THREE.MeshStandardMaterial({
        color: 0xFFEB3B, emissive: 0xFFEB3B, emissiveIntensity: 0.5,
        transparent: true, opacity: 0.5
      })
    );
    halo.rotation.x = Math.PI / 2;
    gametGrp.add(halo);

    gametGrp.position.set(g.x, -1, 0);
    grp.add(gametGrp);

    // İniş oku
    const ok = makeLightPath(
      new THREE.Vector3(4.5, 1.3, 0),
      new THREE.Vector3(g.x, -0.5, 0),
      0xFFEB3B
    );
    ok.material.opacity = 0.6;
    grp.add(ok);
  });

  scene.add(grp);

  addLabel(new THREE.Vector3(-4.5, 3.8, 0), '1. AYRILMA YASASI', 'chloro', new THREE.Vector3(-4.5, 2, 0));
  addLabel(new THREE.Vector3(-4.5, 3.2, 0), 'Aa → A + a', 'phloem', new THREE.Vector3(-4.5, 2, 0));
  addLabel(new THREE.Vector3(-6, -1.8, 0), 'A %50', 'phloem', new THREE.Vector3(-6, -1, 0));
  addLabel(new THREE.Vector3(-3, -1.8, 0), 'a %50', 'epi', new THREE.Vector3(-3, -1, 0));

  addLabel(new THREE.Vector3(4.5, 3.8, 0), '2. BAĞIMSIZ DAĞILIM', 'phloem', new THREE.Vector3(4.5, 2, 0));
  addLabel(new THREE.Vector3(4.5, 3.2, 0), 'SsDd → 4 farklı gamet', '', new THREE.Vector3(4.5, 2, 0));

  gametConfig.forEach(g => {
    addLabel(new THREE.Vector3(g.x, -1.8, 0), g.label, 'warn', new THREE.Vector3(g.x, -1, 0));
  });

  addLabel(new THREE.Vector3(0, 5, 0), '⚖️ Mendel\'in 2 Yasası', 'warn', new THREE.Vector3(0, 0, 0));

  grp.userData.spin = 0;
  dynamicObjects.push(grp);

  window._customAnim = (t, dt) => {
    // Atmosfer toz parçacıkları orbit
    grp.traverse(c => {
      if (c.userData && c.userData._atmDust) {
        const b = c.userData._base;
        c.position.x = Math.cos(b.theta + t * b.speed * 0.15) * b.radius * Math.cos(b.phi);
        c.position.z = Math.sin(b.theta + t * b.speed * 0.15) * b.radius * Math.cos(b.phi) - 2;
        c.position.y = b.baseY + Math.sin(t * b.speed + b.theta) * 0.3;
        if (c.material) c.material.opacity = 0.25 + Math.abs(Math.sin(t * b.speed + b.theta * 2)) * 0.45;
      }
    });
    aa1.rotation.y = t * 0.5;
    dihibrit.rotation.y = t * 0.4;
    [sol_ok1, sol_ok2].forEach((p, i) => {
      p.material.emissiveIntensity = 0.6 + Math.abs(Math.sin(t * 2.5 + i)) * 0.5;
    });
  };
};

// === MODÜL 2: MENDEL GENETİĞİ ===
// 5. MONOHIBRIT ÇAPRAZLAMA - 2x2 Punnett 3D + Bezelyeler
SubBuilders.buildMonohibrit = function() {
  camera.position.set(0, 0.5, 20.0);
  controls.target.set(0.5, 0, 0);
  const grp = new THREE.Group();
  markDynamic(grp);

  // Sahne atmosferi
  const atmosphere = makeSceneAtmosphere({ tint: 0x66BB6A });
  grp.add(atmosphere);

  const cellSize = 1.7;
  const gap = 0.12;

  // === SOL: EBEVEYNLER (Aa × Aa) ===
  const parent1 = makeBezelye({ color: 0xFFC107 });
  parent1.position.set(-5.5, 2.5, 0);
  parent1.scale.setScalar(2.2);
  grp.add(parent1);

  const parent2 = makeBezelye({ color: 0xFFC107 });
  parent2.position.set(-5.5, -2.5, 0);
  parent2.scale.setScalar(2.2);
  grp.add(parent2);

  // Çaprazlama X (büyük parlayan X)
  const cross1 = makeLightPath(new THREE.Vector3(-5.5, 2.5, 0), new THREE.Vector3(-2.5, 0.5, 0), 0xFFEB3B);
  const cross2 = makeLightPath(new THREE.Vector3(-5.5, -2.5, 0), new THREE.Vector3(-2.5, 0.5, 0), 0xFFEB3B);
  grp.add(cross1); grp.add(cross2);

  // X işareti küre
  const xMark = new THREE.Mesh(
    new THREE.SphereGeometry(0.18, 16, 12),
    new THREE.MeshStandardMaterial({
      color: 0xFFEB3B, emissive: 0xFFEB3B, emissiveIntensity: 1.0, toneMapped: false
    })
  );
  xMark.position.set(-3.5, 0, 0);
  grp.add(xMark);

  // === SAĞ: 2×2 PUNNETT KARESI ===
  const punnett = new THREE.Group();

  // Üst aleller (A, a) - dış üst
  const ustA = makeAllele({ color: 0xFFC107 });
  ustA.position.set(-cellSize/2 - gap/2, cellSize + 0.8, 0);
  ustA.scale.setScalar(1.1);
  punnett.add(ustA);
  const usta = makeAllele({ color: 0x4CAF50, baskin: false });
  usta.position.set(cellSize/2 + gap/2, cellSize + 0.8, 0);
  usta.scale.setScalar(1.1);
  punnett.add(usta);

  // Sol aleller (A, a) - dış sol
  const solA = makeAllele({ color: 0xFFC107 });
  solA.position.set(-cellSize - 0.8, cellSize/2 + gap/2, 0);
  solA.scale.setScalar(1.1);
  punnett.add(solA);
  const sola = makeAllele({ color: 0x4CAF50, baskin: false });
  sola.position.set(-cellSize - 0.8, -cellSize/2 - gap/2, 0);
  sola.scale.setScalar(1.1);
  punnett.add(sola);

  // Kutular (2×2)
  const cells = [];
  const bezelyeler = [];
  const cellInfo = [
    { r: 0, c: 0, gen: 'AA', color: 0xFFC107, buruk: false, label: 'Sarı düz' },
    { r: 0, c: 1, gen: 'Aa', color: 0xFFC107, buruk: false, label: 'Sarı düz' },
    { r: 1, c: 0, gen: 'Aa', color: 0xFFC107, buruk: false, label: 'Sarı düz' },
    { r: 1, c: 1, gen: 'aa', color: 0x4CAF50, buruk: true,  label: 'Yeşil buruşuk' }
  ];

  cellInfo.forEach(info => {
    const x = info.c * (cellSize + gap) - cellSize/2 - gap/2;
    const y = -info.r * (cellSize + gap) + cellSize/2 + gap/2;

    const cell = makePunnettCell({ size: cellSize });
    cell.position.set(x, y, 0);
    punnett.add(cell);
    cells.push(cell);

    const bezelye = makeBezelye({ color: info.color, buruk: info.buruk });
    bezelye.position.set(x, y, 0.35);
    bezelye.scale.setScalar(1.7);
    punnett.add(bezelye);
    bezelyeler.push(bezelye);

    // Genotip etiketi - emissive kuçuk küre (köşede)
    const tag = new THREE.Mesh(
      new THREE.SphereGeometry(0.07, 12, 10),
      new THREE.MeshStandardMaterial({
        color: 0xFFEB3B, emissive: 0xFFEB3B, emissiveIntensity: 0.9, toneMapped: false
      })
    );
    tag.position.set(x - cellSize/2 + 0.15, y + cellSize/2 - 0.15, 0.5);
    punnett.add(tag);
  });

  punnett.position.set(1.5, 0, 0);
  grp.add(punnett);

  scene.add(grp);

  // === ETİKETLER ===
  addLabel(new THREE.Vector3(-5.5, 4, 0), '♀ Aa', 'phloem', new THREE.Vector3(-5.5, 2.5, 0));
  addLabel(new THREE.Vector3(-5.5, -4, 0), '♂ Aa', 'phloem', new THREE.Vector3(-5.5, -2.5, 0));

  // Punnett etiketleri
  addLabel(new THREE.Vector3(1.5 - cellSize/2 - gap/2, cellSize + 1.6, 0), 'A', 'phloem',
    new THREE.Vector3(1.5 - cellSize/2 - gap/2, cellSize + 0.8, 0));
  addLabel(new THREE.Vector3(1.5 + cellSize/2 + gap/2, cellSize + 1.6, 0), 'a', 'epi',
    new THREE.Vector3(1.5 + cellSize/2 + gap/2, cellSize + 0.8, 0));
  addLabel(new THREE.Vector3(1.5 - cellSize - 1.5, cellSize/2 + gap/2, 0), 'A', 'phloem',
    new THREE.Vector3(1.5 - cellSize - 0.8, cellSize/2 + gap/2, 0));
  addLabel(new THREE.Vector3(1.5 - cellSize - 1.5, -cellSize/2 - gap/2, 0), 'a', 'epi',
    new THREE.Vector3(1.5 - cellSize - 0.8, -cellSize/2 - gap/2, 0));

  // Genotip kutu etiketleri
  cellInfo.forEach(info => {
    const x = 1.5 + info.c * (cellSize + gap) - cellSize/2 - gap/2;
    const y = -info.r * (cellSize + gap) + cellSize/2 + gap/2;
    const cls = info.gen === 'aa' ? 'epi' : 'phloem';
    addLabel(new THREE.Vector3(x, y + 1.05, 0), info.gen, cls, new THREE.Vector3(x, y, 0));
  });

  addLabel(new THREE.Vector3(0, 5, 0), '🎲 Monohibrit Çaprazlama (Aa × Aa)', 'warn', new THREE.Vector3(1.5, 0, 0));
  addLabel(new THREE.Vector3(1.5, -3.7, 0), 'Fenotip oranı: 3 Sarı-Düz : 1 Yeşil-Buruşuk', 'warn', new THREE.Vector3(1.5, -2, 0));

  grp.userData.spin = 0;
  dynamicObjects.push(grp);

  window._customAnim = (t, dt) => {
    // Atmosfer toz parçacıkları orbit
    grp.traverse(c => {
      if (c.userData && c.userData._atmDust) {
        const b = c.userData._base;
        c.position.x = Math.cos(b.theta + t * b.speed * 0.15) * b.radius * Math.cos(b.phi);
        c.position.z = Math.sin(b.theta + t * b.speed * 0.15) * b.radius * Math.cos(b.phi) - 2;
        c.position.y = b.baseY + Math.sin(t * b.speed + b.theta) * 0.3;
        if (c.material) c.material.opacity = 0.25 + Math.abs(Math.sin(t * b.speed + b.theta * 2)) * 0.45;
      }
    });
    bezelyeler.forEach((b, i) => {
      b.rotation.y = t * 0.6 + i * 0.7;
      b.position.z = 0.35 + Math.sin(t * 1.5 + i) * 0.1;
    });
    [ustA, usta, solA, sola].forEach((a, i) => {
      a.rotation.y = t * 0.5 + i;
    });
    parent1.rotation.y = t * 0.4;
    parent2.rotation.y = -t * 0.4;
    [cross1, cross2].forEach((c, i) => {
      c.material.emissiveIntensity = 0.6 + Math.abs(Math.sin(t * 2.5 + i)) * 0.5;
    });
    xMark.scale.setScalar(1 + Math.sin(t * 3) * 0.2);
    xMark.material.emissiveIntensity = 0.8 + Math.abs(Math.sin(t * 2)) * 0.5;
  };
};

// 6. DİHİBRİT ÇAPRAZLAMA - 4×4 Punnett (16 kutu)
SubBuilders.buildDihibrit = function() {
  camera.position.set(0, 0, 24.0);
  controls.target.set(0, 0, 0);
  const grp = new THREE.Group();
  markDynamic(grp);

  // Sahne atmosferi
  const atmosphere = makeSceneAtmosphere({ tint: 0x66BB6A });
  grp.add(atmosphere);

  const cellSize = 0.95;
  const gap = 0.06;
  const totalW = 4 * cellSize + 3 * gap;

  const startX = -totalW/2 + cellSize/2;
  const startY = totalW/2 - cellSize/2;

  // Genotip kombinasyon haritası: gametler SD, Sd, sD, sd × SD, Sd, sD, sd
  // Her satır/sutun "S/s D/d" gamet birleşimi
  const fenotipMap = [
    // r0 (gamet SD) × c0..c3
    ['SD','SD','SD','SD'],
    // r1 (gamet Sd) × c0..c3
    ['SD','Sd','SD','Sd'],
    // r2 (gamet sD) × c0..c3
    ['SD','SD','sD','sD'],
    // r3 (gamet sd) × c0..c3
    ['SD','Sd','sD','sd']
  ];

  // Fenotip renkleri
  const phenoMap = {
    'SD': { color: 0xFFC107, buruk: false },
    'Sd': { color: 0xFFC107, buruk: true },
    'sD': { color: 0x4CAF50, buruk: false },
    'sd': { color: 0x4CAF50, buruk: true }
  };

  const bezelyeler = [];
  let phenoCount = { 'SD': 0, 'Sd': 0, 'sD': 0, 'sd': 0 };

  for (let r = 0; r < 4; r++) {
    for (let c = 0; c < 4; c++) {
      const x = startX + c * (cellSize + gap);
      const y = startY - r * (cellSize + gap);

      const cell = makePunnettCell({ size: cellSize });
      cell.position.set(x, y, 0);
      grp.add(cell);

      const pheno = fenotipMap[r][c];
      const props = phenoMap[pheno];
      const bezelye = makeBezelye(props);
      bezelye.position.set(x, y, 0.3);
      bezelye.scale.setScalar(1.4);
      grp.add(bezelye);
      bezelyeler.push(bezelye);
      phenoCount[pheno]++;
    }
  }

  // Üst gamet aleller (SD, Sd, sD, sd)
  const gametLabels = ['SD', 'Sd', 'sD', 'sd'];
  const gametColors = [
    [0xFFC107, 0xE91E63], [0xFFC107, 0xeceff1],
    [0x4CAF50, 0xE91E63], [0x4CAF50, 0xeceff1]
  ];

  const ustAlleles = [], solAlleles = [];

  for (let c = 0; c < 4; c++) {
    const x = startX + c * (cellSize + gap);
    const y = startY + cellSize/2 + 0.7;

    const aPair = new THREE.Group();
    const al1 = makeAllele({ color: gametColors[c][0] });
    al1.position.x = -0.22;
    al1.scale.setScalar(0.75);
    aPair.add(al1);
    const al2 = makeAllele({ color: gametColors[c][1] });
    al2.position.x = 0.22;
    al2.scale.setScalar(0.75);
    aPair.add(al2);
    aPair.position.set(x, y, 0);
    grp.add(aPair);
    ustAlleles.push(aPair);
  }

  for (let r = 0; r < 4; r++) {
    const x = startX - cellSize/2 - 0.7;
    const y = startY - r * (cellSize + gap);

    const aPair = new THREE.Group();
    const al1 = makeAllele({ color: gametColors[r][0] });
    al1.position.y = 0.22;
    al1.scale.setScalar(0.75);
    aPair.add(al1);
    const al2 = makeAllele({ color: gametColors[r][1] });
    al2.position.y = -0.22;
    al2.scale.setScalar(0.75);
    aPair.add(al2);
    aPair.position.set(x, y, 0);
    grp.add(aPair);
    solAlleles.push(aPair);
  }

  scene.add(grp);

  addLabel(new THREE.Vector3(0, totalW/2 + 2.5, 0), '🎯 Dihibrit Çaprazlama 4×4 (SsDd × SsDd)', 'warn', new THREE.Vector3(0, totalW/2, 0));

  gametLabels.forEach((g, i) => {
    addLabel(new THREE.Vector3(startX + i * (cellSize + gap), totalW/2 + 1.5, 0), g, '',
      new THREE.Vector3(startX + i * (cellSize + gap), startY + cellSize/2 + 0.7, 0));
  });
  gametLabels.forEach((g, i) => {
    addLabel(new THREE.Vector3(startX - cellSize/2 - 1.4, startY - i * (cellSize + gap), 0), g, '',
      new THREE.Vector3(startX - cellSize/2 - 0.7, startY - i * (cellSize + gap), 0));
  });

  // Fenotip sayım etiketleri (alt panel)
  addLabel(new THREE.Vector3(-5.5, -3.5, 0), '9× Sarı-Düz', 'phloem', new THREE.Vector3(-4, -2.8, 0));
  addLabel(new THREE.Vector3(-2, -3.5, 0),   '3× Sarı-Buruş.', 'warn', new THREE.Vector3(-2, -2.8, 0));
  addLabel(new THREE.Vector3(2, -3.5, 0),    '3× Yeşil-Düz', 'chloro', new THREE.Vector3(2, -2.8, 0));
  addLabel(new THREE.Vector3(5.5, -3.5, 0),  '1× Yeşil-Buruş.', 'epi', new THREE.Vector3(4, -2.8, 0));
  addLabel(new THREE.Vector3(0, -4.3, 0),    'Fenotip oranı: 9 : 3 : 3 : 1', 'warn', new THREE.Vector3(0, -3, 0));

  grp.userData.spin = 0;
  dynamicObjects.push(grp);

  window._customAnim = (t, dt) => {
    // Atmosfer toz parçacıkları orbit
    grp.traverse(c => {
      if (c.userData && c.userData._atmDust) {
        const b = c.userData._base;
        c.position.x = Math.cos(b.theta + t * b.speed * 0.15) * b.radius * Math.cos(b.phi);
        c.position.z = Math.sin(b.theta + t * b.speed * 0.15) * b.radius * Math.cos(b.phi) - 2;
        c.position.y = b.baseY + Math.sin(t * b.speed + b.theta) * 0.3;
        if (c.material) c.material.opacity = 0.25 + Math.abs(Math.sin(t * b.speed + b.theta * 2)) * 0.45;
      }
    });
    bezelyeler.forEach((b, i) => {
      b.rotation.y = t * 0.4 + i * 0.15;
      b.position.z = 0.3 + Math.sin(t * 1.2 + i * 0.4) * 0.05;
    });
    [...ustAlleles, ...solAlleles].forEach((a, i) => {
      a.rotation.z = Math.sin(t * 0.7 + i * 0.5) * 0.25;
    });
  };
};

// 7. TEST ÇAPRAZLAMASI
SubBuilders.buildTestCaprazlama = function() {
  camera.position.set(0, 0.5, 21.0);
  controls.target.set(0, 0, 0);
  const grp = new THREE.Group();
  markDynamic(grp);

  // Sahne atmosferi
  const atmosphere = makeSceneAtmosphere({ tint: 0xFF9800 });
  grp.add(atmosphere);

  // === SOL ÜST: Bilinmeyen birey (sarı bezelye + ? işareti) ===
  const bilinmeyen = makeBezelye({ color: 0xFFC107 });
  bilinmeyen.position.set(-5.5, 2.5, 0);
  bilinmeyen.scale.setScalar(2.2);
  grp.add(bilinmeyen);

  // Soru işareti küre (büyük pulsing)
  const qMark = new THREE.Mesh(
    new THREE.SphereGeometry(0.22, 18, 14),
    new THREE.MeshPhysicalMaterial({
      color: 0xFFEB3B, roughness: 0.15, metalness: 0.5,
      emissive: 0xFFEB3B, emissiveIntensity: 1.2,
      clearcoat: 1.0, toneMapped: false
    })
  );
  qMark.position.set(-5.5, 3.7, 0);
  grp.add(qMark);

  // Halka qMark çevresinde
  const qHalka = new THREE.Mesh(
    new THREE.TorusGeometry(0.35, 0.025, 10, 24),
    new THREE.MeshStandardMaterial({
      color: 0xFFEB3B, emissive: 0xFFEB3B, emissiveIntensity: 0.8, toneMapped: false
    })
  );
  qHalka.position.copy(qMark.position);
  qHalka.rotation.x = Math.PI / 2;
  grp.add(qHalka);

  // === SOL ALT: Tester (aa - yeşil buruşuk) ===
  const tester = makeBezelye({ color: 0x4CAF50, buruk: true });
  tester.position.set(-5.5, -2.5, 0);
  tester.scale.setScalar(2.2);
  grp.add(tester);

  // Çaprazlama
  const cross1 = makeLightPath(new THREE.Vector3(-5.5, 2.5, 0), new THREE.Vector3(-2.5, 0, 0), 0xFFEB3B);
  const cross2 = makeLightPath(new THREE.Vector3(-5.5, -2.5, 0), new THREE.Vector3(-2.5, 0, 0), 0xFFEB3B);
  grp.add(cross1); grp.add(cross2);

  // X küre
  const xMark = new THREE.Mesh(
    new THREE.SphereGeometry(0.2, 16, 12),
    new THREE.MeshStandardMaterial({
      color: 0xFFEB3B, emissive: 0xFFEB3B, emissiveIntensity: 1.0, toneMapped: false
    })
  );
  xMark.position.set(-3, 0, 0);
  grp.add(xMark);

  // === SAĞ ÜST: Senaryo 1 (AA → tüm sarı) ===
  // 4 sarı bezelye 2x2 grid
  for (let i = 0; i < 4; i++) {
    const x = 3 + (i % 2) * 1.4;
    const y = 1.8 + Math.floor(i / 2) * 1.4;
    const b = makeBezelye({ color: 0xFFC107 });
    b.position.set(x, y, 0);
    b.scale.setScalar(1.2);
    grp.add(b);
  }

  // === SAĞ ALT: Senaryo 2 (Aa → 2 sarı + 2 yeşil) ===
  for (let i = 0; i < 4; i++) {
    const x = 3 + (i % 2) * 1.4;
    const y = -1.8 - Math.floor(i / 2) * 1.4;
    const isYellow = i < 2;
    const b = makeBezelye({
      color: isYellow ? 0xFFC107 : 0x4CAF50,
      buruk: !isYellow
    });
    b.position.set(x, y, 0);
    b.scale.setScalar(1.2);
    grp.add(b);
  }

  // Sonuç okları (orta → sağ üst, orta → sağ alt)
  const ok1 = makeLightPath(new THREE.Vector3(-1.5, 0.5, 0), new THREE.Vector3(2.5, 2.3, 0), 0xFFC107);
  const ok2 = makeLightPath(new THREE.Vector3(-1.5, -0.5, 0), new THREE.Vector3(2.5, -2.3, 0), 0x4CAF50);
  grp.add(ok1); grp.add(ok2);

  // Ok uçları
  const okMat1 = new THREE.MeshStandardMaterial({
    color: 0xFFC107, emissive: 0xFFC107, emissiveIntensity: 1.0, toneMapped: false
  });
  const okMat2 = new THREE.MeshStandardMaterial({

// 8. EKSİK BASKINLIK - Aslanağzı Kırmızı + Beyaz → Pembe
SubBuilders.buildEksikBaskinlik = function() {
  camera.position.set(0, 0, 20.0);
  controls.target.set(0, -0.3, 0);
  const grp = new THREE.Group();
  markDynamic(grp);

  // Sahne atmosferi
  const atmosphere = makeSceneAtmosphere({ tint: 0xF06292 });
  grp.add(atmosphere);

  // === EBEVEYNLER (üst sıra) ===
  // Sol: Kırmızı (KK)
  const kirmizi = makeSnapdragon({ color: 0xD32F2F });
  kirmizi.position.set(-5, 0.5, 0);
  kirmizi.scale.setScalar(0.95);
  grp.add(kirmizi);

  // Orta üst: Pembe (KB, F1)
  const pembe = makeSnapdragon({ color: 0xF06292 });
  pembe.position.set(0, 0.5, 0);
  pembe.scale.setScalar(1.1);
  grp.add(pembe);

  // Sağ: Beyaz (BB)
  const beyaz = makeSnapdragon({ color: 0xFAFAFA });
  beyaz.position.set(5, 0.5, 0);
  beyaz.scale.setScalar(0.95);
  grp.add(beyaz);

  // === ÇAPRAZLAMA OKLARI (üstte) ===
  const ok1 = makeLightPath(new THREE.Vector3(-3.5, 1.5, 0), new THREE.Vector3(-1.0, 1.5, 0), 0xD32F2F);
  const ok2 = makeLightPath(new THREE.Vector3(3.5, 1.5, 0), new THREE.Vector3(1.0, 1.5, 0), 0xFAFAFA);
  grp.add(ok1); grp.add(ok2);

  // === YAVRULAR (1:2:1 — alt sıra) ===
  // F2 oranı: 1 Kırmızı : 2 Pembe : 1 Beyaz
  const yavruColors = [0xD32F2F, 0xF06292, 0xF06292, 0xFAFAFA];
  const yavrular = [];
  yavruColors.forEach((color, i) => {
    const yavru = makeSnapdragon({ color: color });
    yavru.position.set(-4.5 + i * 3, -4, 0);
    yavru.scale.setScalar(0.55);
    grp.add(yavru);
    yavrular.push(yavru);
  });

  // Pembe → 4 yavru bağlantısı
  const childArrows = [];
  yavruColors.forEach((color, i) => {
    const x = -4.5 + i * 3;
    const ok = makeLightPath(new THREE.Vector3(0, -1.5, 0), new THREE.Vector3(x, -3.0, 0), color);
    ok.material.opacity = 0.7;
    grp.add(ok);
    childArrows.push(ok);
  });

  // F1 → F2 ana ok
  const mainArrow = makeLightPath(new THREE.Vector3(0, -0.7, 0), new THREE.Vector3(0, -1.7, 0), 0xF06292);
  grp.add(mainArrow);

  scene.add(grp);

  // Etiketler
  addLabel(new THREE.Vector3(-5, 3, 0), 'KK Kırmızı', 'epi', new THREE.Vector3(-5, 0.5, 0));
  addLabel(new THREE.Vector3(0, 3, 0), 'KB Pembe (F1)', 'warn', new THREE.Vector3(0, 0.5, 0));
  addLabel(new THREE.Vector3(5, 3, 0), 'BB Beyaz', '', new THREE.Vector3(5, 0.5, 0));

  addLabel(new THREE.Vector3(-3.5, 2.2, 0), 'KK × BB → KB', 'phloem', new THREE.Vector3(-2.5, 1.5, 0));
  addLabel(new THREE.Vector3(0, -1, 0), 'F1 × F1: KB × KB', 'chloro', new THREE.Vector3(0, -0.8, 0));

  addLabel(new THREE.Vector3(-4.5, -5.2, 0), '1 KK', 'epi', new THREE.Vector3(-4.5, -4, 0));
  addLabel(new THREE.Vector3(-1.5, -5.2, 0), 'KB', 'warn', new THREE.Vector3(-1.5, -4, 0));
  addLabel(new THREE.Vector3(1.5, -5.2, 0), 'KB', 'warn', new THREE.Vector3(1.5, -4, 0));
  addLabel(new THREE.Vector3(4.5, -5.2, 0), '1 BB', '', new THREE.Vector3(4.5, -4, 0));
  addLabel(new THREE.Vector3(0, -5.8, 0), 'F2 fenotip: 1 Kırmızı : 2 Pembe : 1 Beyaz', 'warn', new THREE.Vector3(0, -4, 0));

  addLabel(new THREE.Vector3(0, 4.2, 0), '🌷 Eksik Baskınlık (Aslanağzı)', 'warn', new THREE.Vector3(0, 0, 0));

  grp.userData.spin = 0;
  dynamicObjects.push(grp);

  window._customAnim = (t, dt) => {
    // Atmosfer toz parçacıkları orbit
    grp.traverse(c => {
      if (c.userData && c.userData._atmDust) {
        const b = c.userData._base;
        c.position.x = Math.cos(b.theta + t * b.speed * 0.15) * b.radius * Math.cos(b.phi);
        c.position.z = Math.sin(b.theta + t * b.speed * 0.15) * b.radius * Math.cos(b.phi) - 2;
        c.position.y = b.baseY + Math.sin(t * b.speed + b.theta) * 0.3;
        if (c.material) c.material.opacity = 0.25 + Math.abs(Math.sin(t * b.speed + b.theta * 2)) * 0.45;
      }
    });
    [kirmizi, pembe, beyaz].forEach((c, i) => {
      c.rotation.y = Math.sin(t * 0.4 + i) * 0.35;
      c.position.y = 0.5 + Math.sin(t * 0.8 + i * 0.8) * 0.15;
    });
    yavrular.forEach((y, i) => {
      y.rotation.y = Math.sin(t * 0.5 + i) * 0.4;
      y.position.y = -4 + Math.sin(t * 1.2 + i) * 0.1;
    });
    [ok1, ok2, mainArrow, ...childArrows].forEach((p, i) => {
      p.material.emissiveIntensity = 0.6 + Math.abs(Math.sin(t * 2 + i * 0.4)) * 0.4;
    });
  };
};
