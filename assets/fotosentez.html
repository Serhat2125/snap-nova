  const _co2 = [], _atp = [], _nadph = [], _glikoz = [];
  for (let i = 0; i < 4; i++) {
    const c = new THREE.Mesh(new THREE.SphereGeometry(0.28, 12, 8), new THREE.MeshStandardMaterial({ color: 0xC05050, emissive: 0xC05050, emissiveIntensity: 0.7, transparent: true, roughness: 0.6, metalness: 0.1}));
    c.position.set(-6, 2 - i * 0.3, 0); c.userData._phase = i * 0.5; grp.add(c); _co2.push(c);
    const a = new THREE.Mesh(new THREE.DodecahedronGeometry(0.25, 0), new THREE.MeshStandardMaterial({ color: 0xE53935, emissive: 0xE53935, emissiveIntensity: 0.9, transparent: true, roughness: 0.6, metalness: 0.1}));
    a.position.set(0 + i * 0.5 - 0.75, 5, 0); a.userData._phase = i * 0.5; grp.add(a); _atp.push(a);
    const n = new THREE.Mesh(new THREE.OctahedronGeometry(0.25, 0), new THREE.MeshStandardMaterial({ color: 0x4DD0E1, emissive: 0x4DD0E1, emissiveIntensity: 0.8, transparent: true, roughness: 0.6, metalness: 0.1}));
    n.position.set(2 + i * 0.5, 5, 0); n.userData._phase = i * 0.5; grp.add(n); _nadph.push(n);
  }
  for (let i = 0; i < 3; i++) {
    const g = new THREE.Mesh(new THREE.IcosahedronGeometry(0.35, 0), new THREE.MeshStandardMaterial({ color: 0xFFD700, emissive: 0xFFD700, emissiveIntensity: 1.0, transparent: true, roughness: 0.6, metalness: 0.1}));
    g.position.set((i-1) * 1.2, -5, 0); g.userData._phase = i * 0.7; grp.add(g); _glikoz.push(g);
  }

  const rubisco = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1.0, 0.8), new THREE.MeshStandardMaterial({ color: 0xa040c0, emissive: 0xa040c0, emissiveIntensity: 0.6, roughness: 0.6, metalness: 0.1}));
  rubisco.position.set(Math.cos(stages[0].angle) * ringR - 0.8, 0, Math.sin(stages[0].angle) * ringR);
  grp.add(rubisco);

  scene.add(grp);
  addLabel(new THREE.Vector3(Math.cos(stages[0].angle) * (ringR + 1), 1, Math.sin(stages[0].angle) * (ringR + 1)), 'RuBP (5C)', 'warn', new THREE.Vector3(Math.cos(stages[0].angle) * ringR, 0, Math.sin(stages[0].angle) * ringR));
  addLabel(new THREE.Vector3(Math.cos(stages[1].angle) * (ringR + 1.2), 1, Math.sin(stages[1].angle) * (ringR + 1.2)), '3-PGA (3C)', 'phloem', new THREE.Vector3(Math.cos(stages[1].angle) * ringR, 0, Math.sin(stages[1].angle) * ringR));
  addLabel(new THREE.Vector3(Math.cos(stages[2].angle) * (ringR + 1), 1, Math.sin(stages[2].angle) * (ringR + 1)), 'G3P (3C)', 'chloro', new THREE.Vector3(Math.cos(stages[2].angle) * ringR, 0, Math.sin(stages[2].angle) * ringR));
  addLabel(new THREE.Vector3(-7, 3, 0), 'CO₂ (Girdi)', '', new THREE.Vector3(-5.5, 1, 0));
  addLabel(new THREE.Vector3(-3, 6, 0), 'ATP + NADPH', 'warn', new THREE.Vector3(0, 4, 0));
  addLabel(new THREE.Vector3(0, -6, 0), 'Glikoz (Ürün)', 'chloro', new THREE.Vector3(0, -4.5, 0));
  addLabel(new THREE.Vector3(Math.cos(stages[0].angle) * (ringR + 1) - 2, -1, 0), 'Rubisco', 'epi', new THREE.Vector3(rubisco.position.x, 0, rubisco.position.z));

  dynamicObjects.push(grp);

  window._customAnim = (t, dt) => {
    grp.rotation.y = t * 0.3;
    _co2.forEach((c, i) => {
      const cy = ((t * 0.8 + c.userData._phase) % 4);
      c.position.x = -6 + cy * 1.5;
      c.material.opacity = cy < 3 ? 1 : Math.max(0, 4-cy);
    });
    _atp.forEach((a, i) => {
      const c = ((t + a.userData._phase) % 3);
      a.position.y = 5 - c * 4; a.rotation.x += dt;
      a.material.opacity = c < 2.5 ? 1 : Math.max(0, 3-c);
    });
    _nadph.forEach((n, i) => {
      const c = ((t + n.userData._phase) % 3);
      n.position.y = 5 - c * 4; n.rotation.y += dt;
      n.material.opacity = c < 2.5 ? 1 : Math.max(0, 3-c);
    });
    _glikoz.forEach((g, i) => {
      const c = ((t * 0.8 + g.userData._phase) % 3);
      g.position.y = -5 - c * 1; g.rotation.x += dt * 2; g.rotation.y += dt * 1.5;
      g.material.opacity = c < 2.5 ? 1 : Math.max(0, 3-c);
    });
  };
};

    e.userData._phase = i * 0.5; grp.add(e); _el.push(e);
  }

  const foton1 = new THREE.Mesh(new THREE.ConeGeometry(0.2, 0.6, 8), new THREE.MeshStandardMaterial({ color: 0xFFEB3B, emissive: 0xFFEB3B, emissiveIntensity: 0.6, roughness: 0.45, metalness: 0.3, toneMapped: false}));
  foton1.position.set(-4, 5, 0); grp.add(foton1);
  const foton2 = new THREE.Mesh(new THREE.ConeGeometry(0.2, 0.6, 8), new THREE.MeshStandardMaterial({ color: 0xFFEB3B, emissive: 0xFFEB3B, emissiveIntensity: 0.6, roughness: 0.45, metalness: 0.3, toneMapped: false}));
  foton2.position.set(3, 5, 0); grp.add(foton2);

  scene.add(grp);
  addLabel(new THREE.Vector3(-7, -2, 0), 'H₂O', '', new THREE.Vector3(-6, -3, 0));
  addLabel(new THREE.Vector3(-5, -4, 0), 'PSII (P680)', 'chloro', new THREE.Vector3(-4, -2.5, 0));
  addLabel(new THREE.Vector3(-5, 4, 0), 'P680*', 'warn', new THREE.Vector3(-4, 2.5, 0));
  addLabel(new THREE.Vector3(2, -4, 0), 'PSI (P700)', 'chloro', new THREE.Vector3(3, -2.5, 0));
  addLabel(new THREE.Vector3(4, 4.5, 0), 'P700*', 'warn', new THREE.Vector3(3, 3, 0));
  addLabel(new THREE.Vector3(7.5, 0, 0), 'NADPH', 'phloem', new THREE.Vector3(6, 0, 0));
  addLabel(new THREE.Vector3(-4, 6, 0), 'Foton 1 ☀️', '', new THREE.Vector3(-4, 4.5, 0));
  addLabel(new THREE.Vector3(3, 6, 0), 'Foton 2 ☀️', '', new THREE.Vector3(3, 4.5, 0));

  dynamicObjects.push(grp);

  window._customAnim = (t, dt) => {
    _el.forEach(e => {
      const total = ((t * 0.6 + e.userData._phase) % (points.length - 1));
      const idx = Math.floor(total);
      const frac = total - idx;
      if (idx < points.length - 1) {
        e.position.x = points[idx].x + (points[idx+1].x - points[idx].x) * frac;
        e.position.y = points[idx].y + (points[idx+1].y - points[idx].y) * frac;
      }
    });
    foton1.position.y = 5 - Math.abs(Math.sin(t * 2)) * 2.3;
    foton2.position.y = 5 - Math.abs(Math.sin(t * 2 + 0.5)) * 2.3;
    grp.children.forEach(child => {
      if (child.material && child.material.emissiveIntensity !== undefined) {
        child.material.emissiveIntensity = 0.6 + Math.abs(Math.sin(t * 2)) * 0.3;
      }
    });
  };
};

SubBuilders.buildFaktorler = function() {
  camera.position.set(0, 2, 16);
  controls.target.set(0, 0, 0);
  const grp = new THREE.Group();
  markDynamic(grp);

  // Yaprak ortada
  const leaf = new THREE.Mesh(
    new THREE.ExtrudeGeometry(
      (() => {
        const sh = new THREE.Shape();
        sh.moveTo(0, 2); sh.bezierCurveTo(2, 1.8, 2.5, 0, 2, -1);
        sh.bezierCurveTo(1.5, -1.8, 0, -2, -1.5, -1.5);
        sh.bezierCurveTo(-2.5, -0.5, -2, 1.5, 0, 2);
        return sh;
      })(),
      { depth: 0.2, bevelEnabled: true, bevelThickness: 0.05, bevelSize: 0.08 }
    ),
    new THREE.MeshStandardMaterial({ color: 0x388E3C, emissive: 0x1B5E20, emissiveIntensity: 0.4, roughness: 0.6, metalness: 0.1})
  );
  leaf.rotation.x = -Math.PI / 2.2;
  grp.add(leaf);

  // 4 Faktör göstergesi (4 köşede bar)
  const factors = [
    { x: -5, y: 3, color: 0xFFEB3B, label: 'IŞIK', val: 0.7 },
    { x: 5, y: 3, color: 0xC05050, label: 'CO₂', val: 0.6 },
    { x: -5, y: -3, color: 0xFF6F00, label: 'SICAKLIK', val: 0.8 },
    { x: 5, y: -3, color: 0x4090D0, label: 'SU', val: 0.65 }
  ];
  const _bars = [];
  factors.forEach(f => {
    // Boş bar
    const bg = new THREE.Mesh(new THREE.BoxGeometry(0.5, 2.5, 0.3), new THREE.MeshStandardMaterial({ color: 0x303030, transparent: true, opacity: 0.5, roughness: 0.6, metalness: 0.1}));
    bg.position.set(f.x, f.y, 0); grp.add(bg);
    // Dolu bar
    const bar = new THREE.Mesh(new THREE.BoxGeometry(0.45, f.val * 2.4, 0.32), new THREE.MeshStandardMaterial({ color: f.color, emissive: f.color, emissiveIntensity: 0.8, roughness: 0.6, metalness: 0.1}));
    bar.position.set(f.x, f.y - (1.2 - f.val * 1.2), 0); bar.userData._val = f.val; bar.userData._color = f.color;
    grp.add(bar); _bars.push(bar);
    // İkon
    const icon = new THREE.Mesh(organicSphere(0.45, 2, 0.06), new THREE.MeshStandardMaterial({ color: f.color, emissive: f.color, emissiveIntensity: 1.0, roughness: 0.6, metalness: 0.1}));
    icon.position.set(f.x - 1.5, f.y, 0); grp.add(icon);
  });

  scene.add(grp);
  addLabel(new THREE.Vector3(-6, 4.5, 0), '☀️ IŞIK', 'warn', new THREE.Vector3(-5, 3, 0));
  addLabel(new THREE.Vector3(6, 4.5, 0), '💨 CO₂', '', new THREE.Vector3(5, 3, 0));
  addLabel(new THREE.Vector3(-6, -4.5, 0), '🌡️ SICAKLIK', 'warn', new THREE.Vector3(-5, -3, 0));
  addLabel(new THREE.Vector3(6, -4.5, 0), '💧 SU', 'phloem', new THREE.Vector3(5, -3, 0));
  addLabel(new THREE.Vector3(0, 4, 0), 'Fotosentez Hızı', 'chloro', new THREE.Vector3(0, 0, 0));
  addLabel(new THREE.Vector3(0, -3.5, 0), '⚠️ Sınırlayıcı faktör belirler!', 'warn', new THREE.Vector3(0, -1, 0));

  grp.userData.spin = 0.0;
  dynamicObjects.push(grp);

  // Yaprak rengini fotosentez hızına göre değiştir (ortalama bar yüksekliğine göre)
  window._customAnim = (t, dt) => {
    _bars.forEach((b, i) => {
      // Bar yüksekliği sinüsoidal değişir
      const baseVal = b.userData._val;
      const newVal = baseVal + Math.sin(t * 1.2 + i * 0.8) * 0.25;
      b.scale.y = Math.max(0.1, Math.min(1.5, newVal / baseVal));
      // Renk parlaklığı
      b.material.emissiveIntensity = 0.6 + newVal * 0.4;
    });
    // Yaprak parlama (toplam etkiye göre)
    leaf.material.emissiveIntensity = 0.3 + Math.abs(Math.sin(t * 1.5)) * 0.4;
  };
};

let autoSpin = false;
let labelsOn = true;
let currentLevel = 'lise';
let currentMode = 'detayli'; // 'detayli' veya 'sade'

// =============== Modül dropdown'ı doldur ===============
function buildModuleDropdown() {
  const list = document.getElementById('moduleList');
  list.innerHTML = '';
  const emojis = ['🔬','⊙','🍃','💧'];

  Object.keys(MODULES).forEach(modNum => {
    const mod = MODULES[modNum];
    const btn = document.createElement('button');
    btn.className = 'dropdown-item';
    if (parseInt(modNum) === currentModule) btn.classList.add('active');
    btn.dataset.module = modNum;

    const modName = 'Modül ' + modNum;
    const cleanTitle = mod.title.replace(/^[^\s]+\s+Modül\s+\d+:\s*/, '');

    btn.innerHTML = '<span class="di-emoji">' + emojis[parseInt(modNum)-1] + '</span>' +
                    '<span><b>' + modName + '</b><br><small style="opacity:0.7;font-size:10.5px;">' + cleanTitle + '</small></span>';
    btn.onclick = () => {
      selectModule(parseInt(modNum));
      document.getElementById('panelModule').classList.remove('show');
      buildModuleDropdown(); // active güncelle
      buildTopicDropdown(); // konu listesi de güncellensin
    };
    list.appendChild(btn);
  });
}

// =============== Konu Rehberi dropdown'ı doldur (TÜM modüller + alt konular) ===============
function buildTopicDropdown() {
  const list = document.getElementById('topicList');
  list.innerHTML = '';

  Object.keys(MODULES).forEach(modNum => {
    const mod = MODULES[modNum];

    // Kategori başlığı
    const head = document.createElement('div');
    head.className = 'dropdown-cat-head';
    head.textContent = mod.title;
    list.appendChild(head);

    mod.subs.forEach(sub => {
      const btn = document.createElement('button');
      btn.className = 'dropdown-item';
      if (sub.key === currentSub) btn.classList.add('active');
      btn.dataset.key = sub.key;
      btn.dataset.module = modNum;

      const labelMatch = sub.label.match(/^([^\s]+)\s+(.+)$/);
      const emoji = labelMatch ? labelMatch[1] : '🌿';
      const name = labelMatch ? labelMatch[2] : sub.label;

      btn.innerHTML = '<span class="di-emoji">' + emoji + '</span>' +
                      '<span>' + name + '</span>';
      btn.onclick = () => {
        selectSub(parseInt(modNum), sub.key);
        document.getElementById('panelTopic').classList.remove('show');
      };
      list.appendChild(btn);
    });
  });
}

function selectModule(modNum) {
  currentModule = modNum;
  const mod = MODULES[modNum];
  if (!mod) return;

  // İlk alt konuyu yükle
  selectSub(modNum, mod.subs[0].key);
}

function selectSub(modNum, subKey) {
  currentSub = subKey;
  currentModule = modNum;
  clearScene();

  // Animasyon state sıfırla (yeni konu)
  autoSpin = false;
  window._autoSpinActive = false;
  window._isPlayingActive = false;
  window._customAnim = null;
  if (typeof isPlaying !== 'undefined') {
    isPlaying = false;
    if (_playTickId) { cancelAnimationFrame(_playTickId); _playTickId = null; }
  }
  const sBtn = document.getElementById('spinBtn');
  const aBtn = document.getElementById('animBtn');
  if (sBtn) sBtn.classList.remove('active');
  if (aBtn) aBtn.classList.remove('active');

  // Bilgi panelini yeniden göster (kapatılmış olabilir)
  document.getElementById('bottomPanel').classList.remove('hidden');

  // Slider sadece Modül 4'te
  if (modNum !== 4) {
    document.getElementById('bottomControl').classList.remove('show');
  }

  // 3D yapıyı kur
  const mod = MODULES[modNum];
  const sub = mod.subs.find(s => s.key === subKey);
  if (sub && SubBuilders[sub.builder]) {
    SubBuilders[sub.builder]();
  }

  // 3D modeli ekranda yukarı kaydır (kamera ve target'ı aynı miktar aşağı çek)
  // → kamera-model mesafesi/açısı korunur, sahne ekranda yukarı görünür
  const Y_OFFSET = 1.8;
  controls.target.y -= Y_OFFSET;
  camera.position.y -= Y_OFFSET;
  controls._syncFromCamera();

  // Bilgi paneli güncelle (maddeler halinde liste)
  const info = INFO_DATA[subKey];
  if (info) {
    const emojiMatch = info.title.match(/^([^\s]+)\s+(.+)$/);
    const emoji = emojiMatch ? emojiMatch[1] : '🌱';
    const title = emojiMatch ? emojiMatch[2] : info.title;

    // Modül adı: "🔬 Modül 1: Bitkisel Dokular" → "Bitkisel Dokular"
    const modRawTitle = MODULES[modNum] ? MODULES[modNum].title : '';
    const modName = modRawTitle.replace(/^[^\s]+\s+Modül\s+\d+:\s*/, '').trim() || '';
    const fullTitle = modName ? (modName + ' / ' + title) : title;

    document.getElementById('infoEmoji').textContent = emoji;
    document.getElementById('infoTitle').textContent = fullTitle;

    // HTML içeriğini parse et ve maddeler halinde göster
    const tmp = document.createElement('div');
    // Seviyeye göre içerik (fallback olarak lise)
    const htmlContent = info[currentLevel] || info.lise || info.html || '';
    tmp.innerHTML = htmlContent;

    const listEl = document.getElementById('infoList');
    listEl.innerHTML = '';

    if (currentMode === 'sade') {
      // ============ SADE MOD ============
      // Sadece özet paragraf + ilk listenin ilk 3 maddesi (başlık yok)

      // İlk paragraf - özet
      const firstP = tmp.querySelector('p');
      if (firstP) {
        const summary = document.createElement('li');
        summary.innerHTML = firstP.innerHTML;
        listEl.appendChild(summary);
      }

      // Sadece İLK ul'in İLK 3 li'si
      const firstUl = tmp.querySelector('ul');
      if (firstUl) {
        const liElements = Array.from(firstUl.children).filter(c => c.tagName === 'LI');
        liElements.slice(0, 3).forEach(liEl => {
          const li = document.createElement('li');
          // İç ul varsa (nested) onları gösterme - sadece düz metin
          const clean = liEl.cloneNode(true);
          clean.querySelectorAll('ul').forEach(n => n.remove());
          li.innerHTML = clean.innerHTML.trim();
          listEl.appendChild(li);
        });
      }
    } else {
      // ============ DETAYLI MOD (mevcut) ============

      // İlk paragraf - özet
      const firstP = tmp.querySelector('p');
      if (firstP) {
        const summary = document.createElement('li');
        summary.innerHTML = firstP.innerHTML;
        listEl.appendChild(summary);
      }

      // H3 başlıklar ve sonraki ul'ler
      tmp.querySelectorAll('h3, ul').forEach(el => {
        if (el.tagName === 'H3') {
          const sub = document.createElement('li');
          sub.className = 'subhead';
          sub.textContent = el.textContent;
          listEl.appendChild(sub);
        } else if (el.tagName === 'UL') {
          el.querySelectorAll('li').forEach(liEl => {
            const li = document.createElement('li');
            li.innerHTML = liEl.innerHTML;
            listEl.appendChild(li);
          });
        }
      });
    }
  }

  // SADE MODDA: 3D etiketlerin yarısını gizle (her 2.'sini gösterir)
  setTimeout(() => {
    if (window._labelRefs && window._labelRefs.length > 0) {
      const labelsActuallyOn = labelsOn !== false;
      window._labelRefs.forEach((ref, i) => {
        if (!ref.div) return;
        if (!labelsActuallyOn) {
          ref.div.style.display = 'none';
          ref.div.dataset.userHidden = '1';
          return;
        }
        // Sade: sadece her ikinci etiketi göster (yarıya indir)
        // Detaylı: hepsini göster
        if (currentMode === 'sade' && i % 2 === 1) {
          ref.div.style.display = 'none';
          ref.div.dataset.userHidden = '1';
        } else {
          ref.div.style.display = 'block';
          ref.div.dataset.userHidden = '0';
        }
      });
    }
  }, 50);

  // Dropdown'ları güncelle (active state)
  buildTopicDropdown();
}

}

// =============== ⚖️ KARŞILAŞTIRMA ===============
let _compareIdx = 0;

// Seviyeye göre versiyon anahtarını belirle
function _getLevelKey(level) {
  if (level === 'ilkokul' || level === 'ortaokul') return 'basit';
  return 'standart'; // lise, tyt_ayt
}

// COMPARE_DATA veya TABLE_DATA'dan seviyeye uygun datayı çek
function _resolveLevelData(dataset, subKey) {
  const all = dataset[subKey];
  if (!all) return null;
  // Yeni format: seviye keyleri var
  if (all.basit || all.standart) {
    const key = _getLevelKey(currentLevel);
    return all[key] || all.standart || all.basit;
  }
  // Eski format: doğrudan array veya obje
  return all;
}

function renderTableHTML(data) {
  let html = '<table class="cmp-table"><thead><tr>';
  data.headers.forEach(h => html += `<th>${h}</th>`);
  html += '</tr></thead><tbody>';
  data.rows.forEach(row => {
    html += '<tr>';
    row.forEach(cell => html += `<td>${cell}</td>`);
    html += '</tr>';
  });
  html += '</tbody></table>';
  return html;
}

function renderCompareTable() {
  const raw = _resolveLevelData(COMPARE_DATA, currentSub);
  const body = document.getElementById('compareBody');
  const titleEl = document.getElementById('compareTitle');
  const nav = document.getElementById('compareNav');

  if (!raw) {
    titleEl.textContent = '⚖️ Karşılaştırma';
    body.innerHTML = '<div class="cmp-no-data">Bu konu için karşılaştırma verisi yok.</div>';
    nav.classList.add('hidden');
    return;
  }

  const list = Array.isArray(raw) ? raw : [raw];
  if (_compareIdx >= list.length) _compareIdx = 0;
  const data = list[_compareIdx];

  titleEl.textContent = data.title;
  body.innerHTML = renderTableHTML(data);

  if (list.length > 1) {
    nav.classList.remove('hidden');
    document.getElementById('compareCounter').textContent = `${_compareIdx + 1} / ${list.length}`;
    document.getElementById('comparePrev').disabled = _compareIdx === 0;
    document.getElementById('compareNext').disabled = _compareIdx === list.length - 1;
  } else {
    nav.classList.add('hidden');
  }
}

document.getElementById('btnCompare').onclick = () => {
  _compareIdx = 0;
  renderCompareTable();
  document.getElementById('compareOverlay').classList.add('show');
};
document.getElementById('compareClose').onclick = () => {

// =============== 📋 TABLO ===============
let _tableIdx = 0;

function renderInfoTable() {
  const raw = _resolveLevelData(TABLE_DATA, currentSub);
  const body = document.getElementById('tableBody');
  const titleEl = document.getElementById('tableTitle');
  const nav = document.getElementById('tableNav');

  if (!raw) {
    titleEl.textContent = '📋 Bilgi Tablosu';
    body.innerHTML = '<div class="cmp-no-data">Bu konu için tablo verisi yok.</div>';
    nav.classList.add('hidden');
    return;
  }

  const list = Array.isArray(raw) ? raw : [raw];
  if (_tableIdx >= list.length) _tableIdx = 0;
  const data = list[_tableIdx];

  titleEl.textContent = data.title;
  body.innerHTML = renderTableHTML(data);

  if (list.length > 1) {
    nav.classList.remove('hidden');
    document.getElementById('tableCounter').textContent = `${_tableIdx + 1} / ${list.length}`;
    document.getElementById('tablePrev').disabled = _tableIdx === 0;
    document.getElementById('tableNext').disabled = _tableIdx === list.length - 1;
  } else {
    nav.classList.add('hidden');
  }
}

document.getElementById('btnTable').onclick = () => {
  _tableIdx = 0;
  renderInfoTable();
  document.getElementById('tableOverlay').classList.add('show');
};
document.getElementById('tableClose').onclick = () => {
  document.getElementById('tableOverlay').classList.remove('show');
};
document.getElementById('tableOverlay').onclick = (e) => {

  }
};
document.getElementById('tablePrev').onclick = () => {

};
document.getElementById('tableNext').onclick = () => {
  const raw = _resolveLevelData(TABLE_DATA, currentSub);
  const list = Array.isArray(raw) ? raw : [raw];
  if (_tableIdx < list.length - 1) { _tableIdx++; renderInfoTable(); }
};

// =============== Önceki / Sonraki ===============
function navigate(dir) {
  // TÜM konuları tek liste yap
  const allSubs = [];
  Object.keys(MODULES).forEach(modNum => {
    MODULES[modNum].subs.forEach(s => allSubs.push({ modNum: parseInt(modNum), sub: s }));
  });

  const idx = allSubs.findIndex(x => x.sub.key === currentSub);
  let newIdx = idx + dir;
  if (newIdx < 0) newIdx = allSubs.length - 1;
  if (newIdx >= allSubs.length) newIdx = 0;

  const next = allSubs[newIdx];
  if (next.modNum !== currentModule) {
    selectModule(next.modNum);
  }
  selectSub(next.modNum, next.sub.key);
}

document.getElementById('navNext').onclick = () => navigate(1);
document.getElementById('navPrev').onclick = () => navigate(-1);

// ▶️ Çalıştır - Konuya özel animasyon başlatır
// Her builder kendine özel window._customAnim fonksiyonu register eder
// Modül 4'te ayrıca slider otomatik salınımı yapar
let isPlaying = false;
let _playTickId = null;
let _playT = 0;

document.getElementById('animBtn').onclick = function() {
  isPlaying = !isPlaying;
  window._isPlayingActive = isPlaying;
  this.classList.toggle('active', isPlaying);

  if (isPlaying) {
    // Modül 4'te slider'ı otomatik salla (turgor 0↔100 sinüsoidal)
    if (currentModule === 4) {
      _playT = 0;
      const tick = () => {
        if (!isPlaying) return;
        _playT += 0.015;
        const val = Math.round(50 + 49 * Math.sin(_playT));
        const slider = document.getElementById('turgorSlider');
        if (slider) {
          slider.value = val;
          slider.dispatchEvent(new Event('input'));
        }
        _playTickId = requestAnimationFrame(tick);
      };
      tick();
    }
  } else {
    if (_playTickId) {
      cancelAnimationFrame(_playTickId);
      _playTickId = null;
    }
  }
};

// === Hikaye Controller ===
let storyActive = false;
let storyPaused = false;
let storyCurrentScene = 0;
let storyFallbackTimer = null;
let storyProgressRAF = null;
let storyUtterance = null;
let storySpeechStartTime = 0;
let storyEstimatedDuration = 0;
let storyElapsedBeforePause = 0;
let storyPauseStartTime = 0;
let storySkipping = false;  // skip/cancel sırasında onend tetiklenmesini engeller

// Türkçe kadın sesi cache (Natural/Neural sesleri öncelikle)
let _trVoice = null;
function pickTurkishVoice() {
  if (!window.speechSynthesis) return null;
  if (_trVoice && _trVoice.lang) return _trVoice;

  const voices = window.speechSynthesis.getVoices();
  if (!voices || !voices.length) return null;

  const trVoices = voices.filter(v => v.lang && (v.lang.startsWith('tr') || v.lang === 'tr-TR' || v.lang === 'tr_TR'));
  if (!trVoices.length) return null;

  // Tercih sırası: en doğal → en az doğal

  // 1) Microsoft/Google "Neural" veya "Natural" sesleri (en doğal)
  let pick = trVoices.find(v => {
    const n = (v.name || '').toLowerCase();
    return n.includes('natural') || n.includes('neural') || n.includes('online');
  });

  // 2) Belirli kadın isimleri (yaygın Türkçe TTS kadın sesleri)
  const femaleNames = ['yelda', 'aylin', 'sema', 'fitnat', 'leyla', 'zeynep', 'ayşe', 'elif', 'merve', 'filiz', 'seda', 'pinar', 'pınar', 'tuğçe', 'tugce', 'emel', 'banu', 'gül', 'nazlı', 'derya'];
  if (!pick) {
    pick = trVoices.find(v => {
      const n = (v.name || '').toLowerCase();
      return femaleNames.some(name => n.includes(name));
    });
  }

  // 3) "Female" veya "Kadın" geçen
  if (!pick) pick = trVoices.find(v => {
    const n = (v.name || '').toLowerCase();
    return n.includes('female') || n.includes('kadın');
  });

  // 4) Google sesi (genelde Google Türkçe kadın tonludur)
  if (!pick) pick = trVoices.find(v => (v.name || '').toLowerCase().includes('google'));

  // 5) Network sesleri (cloud-based, daha kaliteli)
  if (!pick) pick = trVoices.find(v => !v.localService);

  // 6) Microsoft Tolga'yı atla (erkek), diğerlerini dene
  if (!pick) pick = trVoices.find(v => !(v.name || '').toLowerCase().includes('tolga'));

  // 7) Fallback - ilk Türkçe ses
  if (!pick) pick = trVoices[0];

  _trVoice = pick;
  return pick;
}

// Metni cümlelere böl - daha doğal okuma için
function splitIntoSentences(txt) {
  // Türkçe cümle sınırları: . ! ? : ...
  // "." içeren kısaltmalar yok (TYT-AYT seviyesi için bile sayıları yazıyla yazdık)
  const parts = txt.split(/([.!?:]+\s+)/);
  const sentences = [];
  let buf = '';
  for (let i = 0; i < parts.length; i++) {
    buf += parts[i];
    // Tam cümle veya sonu (boşlukla biten noktalama gelirse cümleyi kapat)
    if (i % 2 === 1 || i === parts.length - 1) {
      const s = buf.trim();
      if (s.length > 0) sentences.push(s);
      buf = '';
    }
  }
  // Hala buf'ta kalan varsa ekle
  if (buf.trim().length > 0) sentences.push(buf.trim());
  return sentences;
}

function speakSceneText(txt, sceneIdx) {
  if (!window.speechSynthesis) {
    setTimeout(() => {
      if (storyActive && !storyPaused && storyCurrentScene === sceneIdx && !storySkipping) {
        storySkipping = true;
        playScene(sceneIdx + 1);
      }
    }, storyEstimatedDuration);
    return;
  }

  try { window.speechSynthesis.cancel(); } catch(e) {}

  const voice = pickTurkishVoice();

  // Cümle bazlı sırayla seslendirme (daha doğal nefes ritmi)
  const sentences = splitIntoSentences(txt);
  if (sentences.length === 0) return;

  let sentenceIdx = 0;
  let activeUtterance = null;

  const speakNext = () => {
    if (!storyActive || storyPaused || storySkipping) return;
    if (storyCurrentScene !== sceneIdx) return;

    if (sentenceIdx >= sentences.length) {
      // Tüm cümleler bitti - sonraki sahneye geç
      setTimeout(() => {
        if (storyActive && !storyPaused && !storySkipping && storyCurrentScene === sceneIdx) {
          storySkipping = true;
          playScene(sceneIdx + 1);
        }
      }, 900); // sahne sonu nefes
      return;
    }

    const sentence = sentences[sentenceIdx++];
    const u = new SpeechSynthesisUtterance(sentence);
    u.lang = 'tr-TR';

    // === DOĞAL, SAMİMİ SES AYARLARI ===
    u.rate = 0.92;   // hafif yavaş - arkadaşa anlatır gibi, telaşsız
    u.pitch = 1.05;  // hafif yüksek - sıcak, samimi ton (abartılı değil)
    u.volume = 1.0;

    if (voice) u.voice = voice;

    // Cümle sonu varyasyonu: ünlem/soru cümlelerinde hafif tonlama farkı
    if (sentence.endsWith('!')) {
      u.pitch = 1.10;  // ünlem - biraz daha enerjik
    } else if (sentence.endsWith('?')) {
      u.pitch = 1.12;  // soru - sonu yukarı
      u.rate = 0.88;
    } else if (sentence.endsWith('...')) {
      u.rate = 0.85;   // üç nokta - düşünceli, yavaş
    }

    u.onend = () => {
      if (!storyActive || storyPaused || storySkipping) return;
      if (storyCurrentScene !== sceneIdx) return;
      // Cümleler arası kısa nefes (virgüllerden daha uzun)
      const pause = sentence.endsWith('?') || sentence.endsWith('!') ? 450 : 
                    sentence.endsWith('...') ? 600 : 350;
      setTimeout(speakNext, pause);
    };

    u.onerror = () => {
      // Hata - sonraki cümleye atla
      setTimeout(speakNext, 200);
    };

    activeUtterance = u;
    storyUtterance = u;

    try {
      window.speechSynthesis.speak(u);
    } catch (e) {
      console.warn('TTS speak hatası:', e);
      setTimeout(speakNext, 200);
    }
  };

  // Chrome keep-alive
  startSpeechKeepAlive();

  // İlk cümleyi başlat
  speakNext();
}

// Chrome 14-saniye bug fix: konuşma > 14sn ise durur, pause+resume ile diri tut
let _keepAliveTimer = null;
function startSpeechKeepAlive() {
  if (_keepAliveTimer) clearInterval(_keepAliveTimer);
  _keepAliveTimer = setInterval(() => {
    if (!window.speechSynthesis) return;
    if (!storyActive || storyPaused) return;
    if (window.speechSynthesis.speaking) {
      try {
        window.speechSynthesis.pause();
        window.speechSynthesis.resume();
      } catch(e) {}
    } else {
      clearInterval(_keepAliveTimer);
      _keepAliveTimer = null;
    }
  }, 10000);
}

function startStory() {
  if (storyActive) return;
  storyActive = true;
  storyPaused = false;
  storySkipping = false;
  storyCurrentScene = 0;

  // İlk etkileşim sırasında sesleri trigger et (bazı tarayıcılar için gerekli)
  if (window.speechSynthesis) {
    try { window.speechSynthesis.cancel(); } catch(e) {}
    // Sesleri yenile
    pickTurkishVoice();
  }

  document.getElementById('storyPanel').classList.add('show');
  document.getElementById('btnStory').classList.add('active');
  document.getElementById('bottomPanel').classList.add('hidden');

  playScene(0);
}

function playScene(idx) {
  if (idx >= STORY_SCENES.length) {
    finishStory();
    return;
  }
  storyCurrentScene = idx;
  storySkipping = false;
  storyElapsedBeforePause = 0;
  const scene = STORY_SCENES[idx];

  // Konuyu yükle
  for (const [modNum, mod] of Object.entries(MODULES)) {
    if (mod.subs.some(s => s.key === scene.sub)) {
      selectSub(parseInt(modNum), scene.sub);
      break;
    }
  }

  // ▶️ Çalıştır animasyonu (her sahnede)
  setTimeout(() => {
    if (storyActive && !storyPaused) {
      window._isPlayingActive = true;
      if (typeof isPlaying !== 'undefined') isPlaying = true;
      const ab = document.getElementById('animBtn');
      if (ab) ab.classList.add('active');
    }
  }, 250);

  document.getElementById('bottomPanel').classList.add('hidden');

  // === Metin seçimi: MOD × SEVİYE ===
  // Mod: currentMode ('sade' veya 'detayli')
  // Seviye: ilkokul/ortaokul → basit ; lise/tyt_ayt → standart
  const modKey = (typeof currentMode !== 'undefined' && currentMode === 'detayli') ? 'detayli' : 'sade';
  const levelKey = (currentLevel === 'ilkokul' || currentLevel === 'ortaokul') ? 'basit' : 'standart';

  let txt = '';
  if (scene[modKey] && scene[modKey][levelKey]) {
    txt = scene[modKey][levelKey];
  } else if (scene.sade && scene.sade[levelKey]) {
    txt = scene.sade[levelKey];
  } else if (scene.sade && scene.sade.basit) {
    txt = scene.sade.basit;
  } else {
    txt = scene.basit || '';
  }

  document.getElementById('storyText').textContent = txt;
  document.getElementById('storySceneTitle').textContent = scene.title;
  document.getElementById('storyCounter').textContent = `${idx + 1} / ${STORY_SCENES.length}`;
  const _pb0 = document.getElementById('storyProgressBar'); if (_pb0) _pb0.style.width = '0%';

  // Süre tahmini (kelime bazlı + nefes)
  const wordCount = txt.split(/\s+/).length;
  storyEstimatedDuration = Math.max(8000, wordCount * 400 + 2000);
  storySpeechStartTime = performance.now();

  // TTS - cümle bazlı doğal okuma
  speakSceneText(txt, idx);

  // Fallback timer (TTS donarsa)
  if (storyFallbackTimer) clearTimeout(storyFallbackTimer);
  storyFallbackTimer = setTimeout(() => {
    if (storyActive && !storyPaused && storyCurrentScene === idx && !storySkipping) {
      storySkipping = true;
      playScene(idx + 1);
    }
  }, storyEstimatedDuration + 8000);
}

function pauseStory() {
  if (!storyActive) return;
  storyPaused = !storyPaused;
  const btn = document.getElementById('storyPauseBtn');
  if (storyPaused) {
    storyPauseStartTime = performance.now();
    storyElapsedBeforePause = storyPauseStartTime - storySpeechStartTime;
    if (storyFallbackTimer) { clearTimeout(storyFallbackTimer); storyFallbackTimer = null; }
    if (window.speechSynthesis) {
      try { window.speechSynthesis.pause(); } catch(e) {}
    }
    btn.textContent = '▶️ Devam';
  } else {
    storySpeechStartTime = performance.now();  // yeniden başlangıç
    if (window.speechSynthesis) {
      try { window.speechSynthesis.resume(); } catch(e) {}
    }
    btn.textContent = '⏸️ Duraklat';
    // Fallback timer'ı yeniden kur
    const remaining = Math.max(3000, storyEstimatedDuration - storyElapsedBeforePause + 6000);
    storyFallbackTimer = setTimeout(() => {
      if (storyActive && !storyPaused && !storySkipping) {
        storySkipping = true;
        playScene(storyCurrentScene + 1);
      }
    }, remaining);
  }
}

function skipScene() {
  if (!storyActive) return;
  storySkipping = true;  // onend'i engelle
  if (storyFallbackTimer) { clearTimeout(storyFallbackTimer); storyFallbackTimer = null; }
  if (window.speechSynthesis) {
    try { window.speechSynthesis.cancel(); } catch(e) {}
  }
  if (_keepAliveTimer) { clearInterval(_keepAliveTimer); _keepAliveTimer = null; }
  playScene(storyCurrentScene + 1);
}

function finishStory() {
  exitStory(true);
  setTimeout(() => {
    if (window.speechSynthesis) {
      try {
        const u = new SpeechSynthesisUtterance('Fotosentez yolculuğu tamamlandı! Tebrikler.');
        u.lang = 'tr-TR'; u.rate = 0.95; u.pitch = 1.08; u.volume = 1.0;
        const v = pickTurkishVoice();
        if (v) u.voice = v;
        window.speechSynthesis.speak(u);
      } catch(e) {}
    }
  }, 200);
}

function exitStory(silent) {
  storyActive = false;
  storyPaused = false;
  storySkipping = true;
  if (storyFallbackTimer) { clearTimeout(storyFallbackTimer); storyFallbackTimer = null; }
  if (storyProgressRAF) { cancelAnimationFrame(storyProgressRAF); storyProgressRAF = null; }
  if (_keepAliveTimer) { clearInterval(_keepAliveTimer); _keepAliveTimer = null; }
  if (!silent && window.speechSynthesis) {
    try { window.speechSynthesis.cancel(); } catch(e) {}
  }

  document.getElementById('storyPanel').classList.remove('show');
  document.getElementById('btnStory').classList.remove('active');
  document.getElementById('bottomPanel').classList.remove('hidden');

  window._isPlayingActive = false;
  if (typeof isPlaying !== 'undefined') isPlaying = false;
  const ab = document.getElementById('animBtn');
  if (ab) ab.classList.remove('active');

  const pb = document.getElementById('storyPauseBtn');
  if (pb) pb.textContent = '⏸️ Duraklat';

  const _pb0 = document.getElementById('storyProgressBar'); if (_pb0) _pb0.style.width = '0%';
}

// Event listeners
document.getElementById('btnStory').onclick = startStory;
document.getElementById('storyPauseBtn').onclick = pauseStory;
document.getElementById('storySkipBtn').onclick = skipScene;
document.getElementById('storyExitBtn').onclick = () => exitStory(false);

// ESC ile çıkış
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && storyActive) exitStory(false);
});

// Sesleri önceden yükle (bazı tarayıcılar async)
if (window.speechSynthesis) {
  window.speechSynthesis.onvoiceschanged = () => {
    _trVoice = null;  // cache temizle, bir sonraki çağrıda yeniden seçilsin
    pickTurkishVoice();
  };
  // İlk yüklemede de dene
  setTimeout(() => pickTurkishVoice(), 500);
}

// ============== BAŞLATMA ==============
init();
animate();
buildTopicDropdown();
selectModule(1);
