<script>
function boot(){
if(!window.THREE){document.getElementById('err').style.display='flex';return;}

const LEVELS={
  ilkokul:{name:'İlkokul',col:'#34F5A0',ic:'✦'},
  ortaokul:{name:'Ortaokul',col:'#4D8DFF',ic:'✎'},

  sinav:{name:'Sınav',col:'#ff6b7d',ic:'★'},
  universite:{name:'Üniversite',col:'#B98CFF',ic:'🎓'}
};
let level='ortaokul', detail='detayli';

const ACTS=[{"k": "ℕ⊂ℤ", "col": "#34F5A0", "title": "Sayı Kümeleri", "span": null, "b": 3, "e": 1, "sade": "Sayı kümeleri iç içedir: doğal sayılar (0,1,2,3...), bunlara eksi sayılar eklenince tam sayılar (...,−2,−1,0,1,2,...), kesirler eklenince rasyoneller, kareköklü sayılar eklenince reel sayılar oluşur. Her küme bir öncekini kapsar: ℕ ⊂ ℤ ⊂ ℚ ⊂ ℝ.", "lv": {"ilkokul": "Saydığımız sayılara doğal sayılar denir: 0, 1, 2, 3, 4, ... En küçük doğal sayı sıfırdır ve doğal sayıların en büyüğü yoktur, hep bir sonraki gelir. Bu sayıları parmakla sayar gibi düşünebilirsin.", "ortaokul": "Doğal sayılar 0, 1, 2, 3, ... şeklindedir. Bunların bir de eksili (negatif) hâlleri vardır: −1, −2, −3, ... Doğal sayılarla negatiflerini ve sıfırı birlikte aldığımızda tam sayılar kümesini elde ederiz: ..., −2, −1, 0, 1, 2, ...", "lise": "Sayma sayıları 1, 2, 3, ... ; doğal sayılar ℕ bunlara sıfırı ekler. Tam sayılar ℤ, doğal sayılar ve negatiflerinden oluşur. Her doğal sayı aynı zamanda bir tam sayıdır; yani ℕ kümesi ℤ kümesinin alt kümesidir (ℕ⊂ℤ). Bu kümeler dışında kesirli (rasyonel) ve irrasyonel sayılar da vardır.", "sinav": "ℕ⊂ℤ⊂ℚ⊂ℝ zinciri temeldir: her doğal sayı tam, her tam sayı rasyonel, her rasyonel reel sayıdır. Rasyonel sayı iki tam sayının oranıdır (payda sıfırdan farklı). Karekökü tam çıkmayan ifadeler (√2 gibi) irrasyoneldir. Aralıktaki tam sayıları sayarken uç noktaların dâhil olup olmadığına dikkat et."}, "info": {"tanim": "Doğal, tam, rasyonel ve reel sayı kümeleri ve aralarındaki kapsama.", "ornek": "ℕ: 0,1,2,...   ℤ: ...,−1,0,1,...", "ozellik": "ℕ⊂ℤ⊂ℚ⊂ℝ; her doğal sayı bir tam sayıdır."}}, {"k": "2k", "col": "#4D8DFF", "title": "Tek–Çift Sayılar", "span": null, "b": 4, "e": 1, "sade": "İkiye tam bölünen sayı çifttir: 2, 4, 6, ... Bölünemeyen tektir: 1, 3, 5, ... Sıfır (0) da çifttir çünkü 2×0 = 0.", "lv": {"ilkokul": "İkişer ikişer ayırabildiğimiz sayılara çift sayı denir: 2, 4, 6, 8, 10 ... Tek bir tane artıyorsa o sayı tektir: 1, 3, 5, 7, 9 ... Son rakama bakarız: 0,2,4,6,8 ile bitiyorsa çift; 1,3,5,7,9 ile bitiyorsa tek. ÖNEMLİ: 0 da çifttir!", "ortaokul": "Bir sayı 2 ile kalansız bölünüyorsa çifttir, kalan 1 ise tektir. İki çift sayının toplamı çift, iki tek sayının toplamı yine çifttir; bir tek bir çift sayının toplamı ise tektir. Çift sayıları 2k, tek sayıları 2k+1 biçiminde gösterebiliriz.", "lise": "Her tam sayı 2k (çift) veya 2k+1 (tek) biçimindedir; buna paritesi denir. Çiftin karesi çift, tekin karesi tektir. Toplama paritesi: çift+çift=çift, tek+tek=çift, tek+çift=tek. Çarpımda ise bir çarpan bile çiftse sonuç çifttir.", "sinav": "Parite ifadelerinde 2k ve 2k+1 yerleştirmesi hızlı sonuç verir. Ardışık iki sayının çarpımı daima çifttir; ardışık iki sayının toplamı daima tektir. İlk n tek sayının toplamı n², ilk n çift sayının toplamı n(n+1) dir. Üslerde parite tabanın paritesini korur."}, "info": {"tanim": "İkiye bölünebilen (çift) ve bölünemeyen (tek) tam sayılar.", "ornek": "Çift: 2,4,6   Tek: 1,3,5", "ozellik": "Çift = 2k, Tek = 2k+1; tek+tek = çift."}}, {"k": "n,n+1", "col": "#FFB23E", "title": "Ardışık Sayılar", "span": null, "b": 4, "e": 1, "sade": "Birer birer artan sayılara ardışık sayılar denir. Örnek: 5, 6, 7 ya da 11, 12, 13. Üç ardışık sayının toplamı, ortanca sayının 3 katına eşittir: 5+6+7 = 18 = 3×6. Toplamı biliyorsan 3 e bölerek ortancayı bulursun.", "lv": {"ilkokul": "Birer birer artarak giden sayılara ardışık sayılar denir: 4, 5, 6 ya da 10, 11, 12 gibi. Bir sayının hemen arkasından geleni bulmak için 1 ekleriz; önceki için 1 çıkarırız.", "ortaokul": "Ardışık sayılar n, n+1, n+2 biçiminde yazılır. Üç ardışık sayının toplamı ortadakinin 3 katıdır: n+(n+1)+(n+2) = 3n+3 = 3(n+1). Yani toplamı 3 e bölersek ortancayı buluruz.", "lise": "Ardışık tam sayılar n, n+1, n+2, ... ; ardışık çift/tek sayılar ise 2 şer artar: n, n+2, n+4. k tane ardışık sayının toplamı, terim sayısı tekse ortancanın k katıdır. Bu yapı toplam–ortalama ilişkisini ve denklem kurmayı kolaylaştırır.", "sinav": "Ardışık dizilerde bilinmeyeni ortancaya koymak işlemi kısaltır. Tek sayıda ardışık terimde toplam = ortanca × terim sayısı. Ardışık çift veya tek sayılarda terimler 2 şer arttığından toplam ve fark bağıntıları buna göre kurulur; soru çoğu kez 'ortancayı bul' a indirgenir."}, "info": {"tanim": "Birer (veya ikişer) artarak ilerleyen sayı dizileri.", "ornek": "4,5,6  ·  ardışık çift: 6,8,10", "ozellik": "n+(n+1)+(n+2) = 3(n+1); ortanca = toplam ÷ 3."}}, {"k": "↔", "col": "#ff6b7d", "title": "Sayı Doğrusu", "span": null, "b": 2, "e": 1, "sade": "Sayı doğrusu bir cetvel gibidir. Ortada 0, sağda 1, 2, 3... solda −1, −2, −3... bulunur. Sağa gidince sayı büyür, sola gidince küçülür. İki nokta arasındaki uzaklık büyükten küçüğü çıkararak bulunur. Bir sayının 0 a uzaklığına mutlak değer denir ve her zaman 0 ya da pozitiftir.", "lv": {"ilkokul": "Sayı doğrusu, sayıları soldan sağa sıralayan bir çizgidir. Ortada 0 vardır; sağına 1, 2, 3 ... soluna ise −1, −2, −3 ... gelir. Sağa gittikçe sayı büyür, sola gittikçe küçülür. İki nokta arasındaki adım sayısı, aralarındaki uzaklığı verir.", "ortaokul": "Sayı doğrusunda iki sayının arasındaki uzaklık, büyükten küçüğü çıkararak bulunur. Bir sayının sıfıra olan uzaklığına mutlak değer denir ve daima negatif değildir: −5 sayısının sıfıra uzaklığı 5 tir. Sağa gitmek toplama, sola gitmek çıkarma gibidir.", "lise": "İki nokta arasındaki uzaklık mutlak değerle yazılır: a ile b arası |a−b| dir. Bir sayının sıfıra uzaklığı |x| tir. İki noktanın orta noktası, koordinatlarının ortalamasıdır. Mutlak değerli denklemler (|x−a| = r) sayı doğrusunda a noktasına r uzaklıktaki noktaları arar.", "sinav": "|x−a| ifadesi x in a ya uzaklığıdır; |x−a| = r denkleminin iki çözümü a−r ve a+r dir. İki nokta arası uzaklık |a−b|, orta nokta (a+b)/2 dir. Eşitsizliklerde |x−a| küçükse a çevresinde bir aralık, büyükse dışında iki ışın elde edilir."}, "info": {"tanim": "Sayıların doğru üzerinde sıralanışı, uzaklık ve mutlak değer.", "ornek": "|−5| = 5  ·  −3 ile 2 arası 5", "ozellik": "a il function label(txt,col,h){h=h||0.8;const fs=46,pad=18;

function setMeshColor(mesh,c){if(!mesh||!mesh.material)return;

  else if(mesh.material.color)mesh.material.color.copy(c);}
function mkFaceTex(txt,bgHex){
  const c=document.createElement('canvas');c.width=c.height=128;const g=c.getContext('2d');
  const bg=new THREE.Color(bgHex);
  g.fillStyle='#'+bg.getHexString();g.fillRect(0,0,128,128);
  g.strokeStyle='rgba(0,0,0,0.25)';g.lineWidth=4;g.strokeRect(2,2,124,124);
  g.font='bold 64px "DM Mono",monospace';g.textAlign='center';g.textBaseline='middle';
  g.fillStyle='#111111';g.fillText(txt,64,68);
  return new THREE.CanvasTexture(c);}
function mkCube(s,hex,eop,txt){const gg=new THREE.BoxGeometry(s,s,s);
  let mat;
  if(txt!=null){
    const plain=new THREE.MeshLambertMaterial({color:hex,emissive:new THREE.Color(hex).multiplyScalar(0.32),transparent:true,opacity:.98});
    const face=new THREE.MeshLambertMaterial({map:mkFaceTex(txt,hex),emissive:new THREE.Color(hex).multiplyScalar(0.22),transparent:true,opacity:.98});
    // BoxGeometry face order: +X,-X,+Y,-Y,+Z,-Z  → front=+Z(4), back=-Z(5)
    mat=[plain,plain,plain,plain,face,face];
  } else {
    mat=new THREE.MeshLambertMaterial({color:hex,emissive:new THREE.Color(hex).multiplyScalar(0.32),transparent:true,opacity:.98});
  }
  const m=new THREE.Mesh(gg,mat);
  m.add(new THREE.LineSegments(new THREE.EdgesGeometry(gg),new THREE.LineBasicMaterial({color:0x06070c,transparent:true,opacity:eop==null?.5:eop})));return m;}

function buildSets(){
 const root=new THREE.Group();root.visible=false;world.add(root);const labels=[];
 const defs=[['ℝ  Reel Sayılar',6.6,'#B98CFF',1],['ℚ  Rasyonel Sayılar',5.0,'#FFB23E',-1],['ℤ  Tam Sayılar',3.4,'#4D8DFF',1],['ℕ  Doğal Sayılar',1.9,'#34F5A0',-1]];
 const boxes=[];
 defs.forEach(([nm,sz,hex,side],idx)=>{const col=new THREE.Color(hex);const bg=new THREE.Group();root.add(bg);
   const fgo=new THREE.BoxGeometry(sz,sz,sz);
   const face=new THREE.Mesh(fgo,new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:.14,side:THREE.DoubleSide,depthWrite:false}));
   const edge=new THREE.LineSegments(new THREE.EdgesGeometry(fgo),new THREE.LineBasicMaterial({color:col,transparent:true,opacity:.9}));
   bg.add(face);bg.add(edge);
   /* L şekilli ok: yatay kol dışarıdan küp kenarına, dikey sap aşağı küp üstüne iner */
   const topY=sz/2;          // küpün üst yüzü
   const armLen=1.6;          // yatay kol uzunluğu
   const stemH=2.2;           // dikey sap yüksekliği
   const ox=side*(sz/2+armLen); // yazı tarafındaki x
   const pts=[
     new THREE.Vector3(ox, topY+stemH, sz/2+0.05),  // yazı yanı üst
     new THREE.Vector3(ox, topY+0.04,  sz/2+0.05),  // köşe (dikey biter)
     new THREE.Vector3(0,  topY+0.04,  sz/2+0.05),  // küp üst ortası (yatay biter → ok ucu)
   ];
   const lg=new THREE.BufferGeometry().setFromPoints(pts);
   const lm=new THREE.LineBasicMaterial({color:col,transparent:true,opacity:0,linewidth:2});
   const ln=new THREE.Line(lg,lm);bg.add(ln);
   /* ok ucu: küçük ▼ üçgeni küp üst yüzü hizasında */
   const tipPts=[new THREE.Vector3(-0.12,topY+0.28,sz/2+0.05),new THREE.Vector3(0,topY+0.04,sz/2+0.05),new THREE.Vector3(0.12,topY+0.28,sz/2+0.05)];
   const tg=new THREE.BufferGeometry().setFromPoints(tipPts);
   const tip=new THREE.Line(tg,new THREE.LineBasicMaterial({color:col,transparent:true,opacity:0}));bg.add(tip);
   /* etiket yatay kolun dış ucunda */
   const nameLab=label(nm,hex,.52);nameLab.position.set(ox,topY+stemH+0.52,sz/2+0.05);nameLab.material.opacity=0;bg.add(nameLab);labels.push(nameLab);
   boxes.push({bg,sz,face,edge,ln,lm,tip:tip.material,nameLab});});
 const T=[['3','#34F5A0',[0.5,0.45,0.4]],['0','#34F5A0',[-0.5,-0.4,-0.2]],
   ['−2','#4D8DFF',[1.35,0.7,0.6]],['½','#FFB23E',[-1.9,1.0,0.7]],
   ['√2','#B98CFF',[2.55,-0.6,0.8]],['π','#B98CFF',[-2.2,-1.5,0.6]]];
 const tokens=[];
 T.forEach(([txt,hex,pos])=>{const g=new THREE.Group();g.add(halo(new THREE.Color(hex),0.95));
   g.add(new THREE.Mesh(new THREE.SphereGeometry(0.14,16,16),new THREE.MeshBasicMaterial({color:hex})));
   const lab=label(txt,hex,.55);lab.position.set(0,0.5,0);g.add(lab);labels.push(lab);root.add(g);
   const to=new THREE.Vector3(pos[0],pos[1],pos[2]);const from=to.clone().multiplyScalar(2.6);from.y+=4;
   tokens.push({g,from,to});});
 const note=label('ℕ ⊂ ℤ ⊂ ℚ ⊂ ℝ','#9fb4e8',.62);note.position.set(0,6.2,0);note.material.opacity=0;root.add(note);labels.push(note);
 const note2=label('√2, π  →  yalnız ℝ','#B98CFF',.5);note2.position.set(5.0,-2.9,0);note2.material.opacity=0;root.add(note2);labels.push(note2);
 function frame(p){
   boxes.forEach((bx,i)=>{const order=boxes.length-1-i;const t=ez(cl((p-order*0.10)/0.34,0,1));
     bx.bg.scale.setScalar(0.0001+t);bx.face.material.opacity=.14*t;bx.edge.material.opacity=.9*t;
     const lt=ez(cl((p-order*0.10-0.15)/0.25,0,1));bx.lm.opacity=lt;bx.tip.opacity=lt;bx.nameLab.material.opacity=lt;});
   tokens.forEach((tk,i)=>{const t=ez(cl((p-0.5-i*0.05)/0.32,0,1));
     tk.g.position.lerpVectors(tk.from,tk.to,t);tk.g.scale.setScalar(0.0001+t);});
   note.material.opacity=ez(cl((p-0.2)/0.3,0,1));note2.material.opacity=ez(cl((p-0.85)/0.15,0,1));}
 function recolor(hex){const c=new THREE.Color(hex);setMeshColor(boxes[0].edge,c);setMeshColor(boxes[0].face,c);}
 const s={root,labels,frame,recolor,cam:{px:6.5,py:5.2,pz:20.0,tx:0,ty:-4.2}};sceneGroups.push(s);return s;}

/* 2) TEK–ÇİFT — eşleştirme: iki eşit yığın (çift) / bir küp artar (tek) */
function buildParity(){
 const root=new THREE.Group();root.visible=false;world.add(root);const labels=[];const items=[];
 const NUMS=[3,4,5,6],CUBE=0.52,STEP=0.6,COLX=[-0.34,0.34],EVEN='#FF8C2A',ODD='#FF8C2A';
 NUMS.forEach((n,ti)=>{const tg=new THREE.Group();tg.position.x=(ti-1.5)*2.7;root.add(tg);
   const pairs=Math.floor(n/2),leftover=n%2,cubes=[];
   for(let r=0;r<pairs;r++)for(let ci=0;ci<2;ci++){const lbl=(r===0&&ci===0)?''+n:null;const m=mkCube(CUBE,EVEN,null,lbl);m.position.set(COLX[ci],r*STEP+CUBE/2,0);m.scale.setScalar(0.0001);tg.add(m);cubes.push({m,appear:r*2+ci});}
   let lo=null;if(leftover){const m=mkCube(CUBE,ODD,null,null);m.position.set(COLX[0],pairs*STEP+CUBE/2,0);m.scale.setScalar(0.0001);tg.add(m);lo={m};}
   const numLab=label(''+n,'#111',.62);numLab.position.set(0,-0.55,0);tg.add(numLab);labels.push(numLab);
   const tag=label(leftover?'tek':'çift',leftover?ODD:EVEN,.46);tag.position.set(0,-1.12,0);tg.add(tag);labels.push(tag);
   const form=label(leftover?('2·'+pairs+'+1'):('2·'+pairs),'#9fb4e8',.4);form.position.set(0,-1.6,0);tg.add(form);labels.push(form);
   items.push({cubes,lo});});
 const note=label('Çift: iki eşit yığın  ·  Tek: bir küp artar','#9fb4e8',.5);note.position.set(0,3.7,0);note.material.opacity=0;root.add(note);labels.push(note);
 const note0=label('Not: 0 da çifttir  (2×0 = 0)','#FFD23E',.46);note0.position.set(0,4.4,0);note0.material.opacity=0;root.add(note0);labels.push(note0);
 function frame(p){items.forEach((it,ti)=>{const base=ti*0.08;
   it.cubes.forEach(c=>{const t=ez(cl((p-base-c.appear*0.03)/0.22,0,1));c.m.scale.setScalar(0.0001+t);});
   if(it.lo){const t=ez(cl((p-base-it.cubes.length*0.03-0.06)/0.2,0,1));it.lo.m.scale.setScalar(0.0001+t);}});
   note.material.opacity=ez(cl((p-0.1)/0.3,0,1));if(typeof note0!=='undefined')note0.material.opacity=ez(cl((p-0.88)/0.12,0,1));}
 function recolor(hex){const c=new THREE.Color(hex);items.forEach(it=>it.cubes.forEach(o=>setMeshColor(o.m,c)));}
 const s={root,labels,frame,recolor,cam:{px:0,py:3.6,pz:17.5,tx:0,ty:-1.8}};sceneGroups.push(s);return s;}

/* 3) ARDIŞIK — basamak (n,n+1,n+2); tepeden alıp dibe koy → hepsi ortanca */
function buildConsec(){
 const root=new THREE.Group();root.visible=false;world.add(root);const labels=[];
 const n=4,Hs=[n,n+1,n+1],COLX=[-2.4,0,2.4],CUBE=0.56,STEP=0.64,COL='#FF8C2A';
 const cols=[];
 Hs.forEach((h,ci)=>{const cg=new THREE.Group();cg.position.x=COLX[ci];root.add(cg);const cubes=[];
   for(let r=0;r<h;r++){const m=mkCube(CUBE,COL);m.position.set(0,r*STEP+CUBE/2,0);m.scale.setScalar(0.0001);cg.add(m);cubes.push(m);}
   cols.push({cubes});});
 const mv=mkCube(CUBE,'#FF8C2A');mv.scale.setScalar(0.0001);root.add(mv);
 const topC2=new THREE.Vector3(COLX[2],(n+1)*STEP+CUBE/2,0);
 const topC0=new THREE.Vector3(COLX[0],n*STEP+CUBE/2,0);
 [n,n+1,n+2].forEach((v,ci)=>{const l=label(''+v,'#111',.6);l.position.set(COLX[ci],-0.6,0);root.add(l);labels.push(l);});
 const avgY=(n+1)*STEP;
 const avg=new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(-3.3,avgY,0),new THREE.Vector3(3.3,avgY,0)]),new THREE.LineDashedMaterial({color:0x34F5A0,dashSize:.22,gapSize:.14,transparent:true,opacity:0}));avg.computeLineDistances();root.add(avg);
 const avgLab=label('ortanca = '+(n+1),'#34F5A0',.5);avgLab.position.set(0,avgY+0.55,0);avgLab.material.opacity=0;root.add(avgLab);labels.push(avgLab);
 const note=label('Tepeden al, dibe koy → toplam = 3 × ortanca','#9fb4e8',.5);note.position.set(0,4.2,0);note.material.opacity=0;root.add(note);labels.push(note);
 function frame(p){
   cols.forEach(c=>c.cubes.forEach((m,r)=>{const t=ez(cl((p-r*0.05)/0.3,0,1));m.scale.setScalar(0.0001+t);}));
   const ap=ez(cl((p-0.25)/0.2,0,1));
   if(p<0.55){mv.position.copy(topC2);mv.scale.setScalar(0.0001+ap);}
   else{const t=ez(cl((p-0.55)/0.4,0,1));mv.position.lerpVectors(topC2,topC0,t);mv.position.y+=Math.sin(Math.PI*t)*0.9;mv.scale.setScalar(1);}
   const op=ez(cl((p-0.78)/0.22,0,1));avg.material.opacity=.9*op;avgLab.material.opacity=op;note.material.opacity=ez(cl((p-0.1)/0.3,0,1));if(typeof note0!=='undefined')note0.material.opacity=ez(cl((p-0.88)/0.12,0,1));}
 function recolor(hex){const c=new THREE.Color(hex);cols.forEach(col=>col.cubes.forEach(m=>setMeshColor(m,c)));}
 const s={root,labels,frame,recolor,cam:{px:0.5,py:3.3,pz:17.5,tx:0,ty:-1.3}};sceneGroups.push(s);return s;}

/* 3b) ARDIŞIK (+2 sıçrama) — sayı doğrusunda eşit adımlar: ardışık çift 2,4,6,8,10 */
function buildConsecJumps(){
 const root=new THREE.Group();root.visible=false;world.add(root);const labels=[];
 const vals=[2,4,6,8,10],COL='#FF8C2A',SP=1.85,cs=0.78,baseX=-(vals.length-1)*SP/2,topY=cs;
 const line=new THREE.Mesh(new THREE.CylinderGeometry(.04,.04,(vals.length+0.8)*SP,12),new THREE.MeshBasicMaterial({color:0x5a648a}));
 line.rotation.z=Math.PI/2;line.position.set(0,-0.02,0);line.scale.x=0;root.add(line);
 const cubes=[];
 vals.forEach((v,i)=>{const m=mkCube(cs,COL,null,''+v);m.position.set(baseX+i*SP,cs/2,0);m.scale.setScalar(0.0001);root.add(m);cubes.push(m);});
 const arcs=[];
 for(let i=0;i<vals.length-1;i++){const x0=baseX+i*SP,x1=baseX+(i+1)*SP,cx=(x0+x1)/2,rx=SP/2,h=SP*0.6,seg=36,arr=[];
   for(let k=0;k<=seg;k++){const a=Math.PI*(k/seg);arr.push(new THREE.Vector3(cx-rx*Math.cos(a),topY+Math.sin(a)*h,0));}
   const g=new THREE.BufferGeometry().setFromPoints(arr);
   const ar=new THREE.Line(g,new THREE.LineBasicMaterial({color:0xFFB23E,transparent:true,opacity:.95}));ar.computeLineDistances();g.setDrawRange(0,0);root.add(ar);
   const pl=label('+2','#FFD23E',.46);pl.position.set(cx,topY+h+0.28,0);pl.material.opacity=0;root.add(pl);labels.push(pl);
   arcs.push({ar,pl,n:arr.length});}
 const start=label('başlangıç','#9fb4e8',.42);start.position.set(baseX-0.2,-0.7,0);start.material.opacity=0;root.add(start);labels.push(start);
 const inf=label('sonsuza →','#9fb4e8',.46);inf.position.set(baseX+(vals.length-0.2)*SP,topY*0.7,0);inf.material.opacity=0;root.add(inf);labels.push(inf);
 const note=label('Her adım +2: ardışık çift/tek sayılar','#9fb4e8',.5);note.position.set(0,topY+SP*0.6+1.0,0);note.material.opacity=0;root.add(note);labels.push(note);
 function frame(p){
   line.scale.x=ez(cl(p/0.28,0,1));
   cubes.forEach((m,i)=>{const t=ez(cl((p-0.12-i*0.06)/0.22,0,1));m.scale.setScalar(0.0001+t);});
   arcs.forEach((a,i)=>{const t=ez(cl((p-0.4-i*0.1)/0.22,0,1));a.ar.geometry.setDrawRange(0,Math.floor(a.n*t));a.ar.material.opacity=.95*ez(cl((p-0.4-i*0.1)/0.12,0,1));a.pl.material.opacity=ez(cl((p-0.46-i*0.1)/0.16,0,1));});
   start.material.opacity=ez(cl((p-0.15)/0.2,0,1));inf.material.opacity=ez(cl((p-0.85)/0.15,0,1));note.material.opacity=ez(cl((p-0.1)/0.3,0,1));if(typeof note0!=='undefined')note0.material.opacity=ez(cl((p-0.88)/0.12,0,1));}
 function recolor(hex){const c=new THREE.Color(hex);cubes.forEach(m=>setMeshColor(m,c));arcs.forEach(a=>setMeshColor(a.ar,c));}
 const s={root,labels,frame,recolor,cam:{px:0,py:2.9,pz:18.5,tx:0,ty:-1.8}};sceneGroups.push(s);return s;}

/* 4) SAYI DOĞRUSU / MUTLAK DEĞER — uzaklık çubuğu + yansıma (|x| = |−x|) */
function buildLine(){
 const root=new THREE.Group();root.visible=false;world.add(root);const labels=[];
 const U2=0.92,X=-4,xx=v=>v*U2;
 const axis=new THREE.Mesh(new THREE.CylinderGeometry(.03,.03,xx(13),12),new THREE.MeshBasicMaterial({color:0x4a5578}));axis.rotation.z=Math.PI/2;axis.scale.x=0;root.add(axis);
 const ticks=[];
 for(let v=-6;v<=6;v++){const post=new THREE.Mesh(new THREE.BoxGeometry(.035,v===0?.42:.26,.035),new THREE.MeshBasicMaterial({color:v===0?0xffffff:0x5a648a,transparent:true,opacity:0}));post.position.set(xx(v),0,0);root.add(post);
   let lab=null;if(v%2===0){lab=label(v===0?'0':(v>0?''+v:'−'+(-v)),v===0?'#ffffff':'#7f8bb0',.42);lab.position.set(xx(v),-0.55,0);lab.material.opacity=0;root.add(lab);labels.push(lab);}
   ticks.push({post,lab});}
 root.add((function(){const o=new THREE.Group();o.add(halo(new THREE.Color('#46d6e0'),1.0));return o;})());
 const P=new THREE.Group();P.add(halo(new THREE.Color('#ff6b7d'),1.3));P.add(new THREE.Mesh(new THREE.SphereGeometry(.17,18,18),new THREE.MeshBasicMaterial({color:0xff6b7d})));P.scale.setScalar(0);root.add(P);
 const bar=new THREE.Mesh(new THREE.BoxGeometry(1,.1,.1),new THREE.MeshBasicMaterial({color:0xff6b7d,transparent:true,opacity:.9}));bar.position.y=.42;bar.visible=false;root.add(bar);
 const dlab=dynLabel('|0| = 0','#ff6b7d',.6);dlab.position.set(0,1.05,0);dlab.material.opacity=0;root.add(dlab);
 const M=new THREE.Group();M.add(halo(new THREE.Color('#ff6b7d'),.9));M.add(new THREE.Mesh(new THREE.SphereGeometry(.13,16,16),new THREE.MeshBasicMaterial({color:0xff6b7d,transparent:true,opacity:.4})));M.position.set(xx(-X),0,0);M.scale.setScalar(0);root.add(M);
 const arc=new THREE.Line(new THREE.BufferGeometry(),new THREE.LineDashedMaterial({color:0xffb23e,dashSize:.18,gapSize:.12,transparent:true,opacity:0}));root.add(arc);
 const eqLab=label('|−4| = |4| = 4','#FFB23E',.52);eqLab.position.set(0,3.0,0);eqLab.material.opacity=0;root.add(eqLab);labels.push(eqLab);
 const note=label('Mutlak değer = 0 a uzaklık (hep ≥ 0)','#9fb4e8',.5);note.position.set(0,3.9,0);note.material.opacity=0;root.add(note);labels.push(note);
 function setArc(R){const seg=40,arr=[];for(let i=0;i<=seg;i++){const a=Math.PI*(i/seg);arr.push(new THREE.Vector3(Math.cos(Math.PI-a)*R,Math.sin(a)*R*0.55,0));}arc.geometry.setFromPoints(arr);arc.computeLineDistances();}
 function frame(p){
   axis.scale.x=ez(cl(p/0.3,0,1));
   const tickT=ez(cl((p-0.1)/0.25,0,1));ticks.forEach(tk=>{tk.post.material.opacity=tickT;if(tk.lab)tk.lab.material.opacity=tickT;});
   const mt=ez(cl((p-0.35)/0.35,0,1)),px=xx(X)*mt;
   P.position.set(px,0,0);P.scale.setScalar(0.0001+ez(cl((p-0.33)/0.1,0,1)));
   bar.visible=mt>0.01;bar.scale.x=Math.max(.001,Math.abs(px));bar.position.x=px/2;
   const cur=Math.round(X*mt);updateDyn(dlab,'|'+(cur<0?'−'+(-cur):cur)+'| = '+Math.abs(cur));dlab.position.x=px;dlab.material.opacity=ez(cl((p-0.35)/0.15,0,1));
   const rt=ez(cl((p-0.72)/0.28,0,1)),R=xx(Math.abs(X));setArc(R);arc.material.opacity=.9*rt;
   const total=arc.geometry.attributes.position.count;arc.geometry.setDrawRange(0,Math.floor(total*rt));
   M.scale.setScalar(0.0001+rt);eqLab.material.opacity=rt;note.material.opacity=ez(cl((p-0.15)/0.3,0,1));}
 function recolor(hex){const c=new THREE.Color(hex);P.children.forEach(ch=>{if(ch.material&&ch.material.color)setMeshColor(ch,c);});bar.material.color.copy(c);}
 const s={root,labels,frame,recolor,cam:{px:0,py:2.7,pz:17.5,tx:0,ty:-2.3}};sceneGroups.push(s);return s;}

/* 1b) SAYI KÜMELERİ (doğrunun dolması) — ℕ → ℤ → ℚ → ℝ aşama aşama */
function buildSetsLine(){
 const root=new THREE.Group();root.visible=false;world.add(root);const labels=[];
 const U=0.88,xx=v=>v*U;
 const axis=new THREE.Mesh(new THREE.CylinderGeometry(.032,.032,xx(14),12),new THREE.MeshBasicMaterial({color:0x4a5578}));
 axis.rotation.z=Math.PI/2;axis.scale.x=0;root.add(axis);
 for(let v=-6;v<=6;v++){
  const post=new THREE.Mesh(new THREE.BoxGeometry(.032,v===0?.42:.22,.032),new THREE.MeshBasicMaterial({color:v===0?0xffffff:0x5a648a,transparent:true,opacity:0}));
  post.position.set(xx(v),0,0);root.add(post);
  if(v%2===0||Math.abs(v)<=1){const lab=label(v===0?'0':(v>0?''+v:'\u2212'+(-v)),'\u5a6a93',.38);lab.position.set(xx(v),-0.5,0);lab.material.opacity=0;root.add(lab);labels.push(lab);}}
 const callouts=[];
 function mkCallout(xv,yDir,stemH,txt,numTxt,col,delay){
  const stemPts=[new THREE.Vector3(xx(xv),0,0),new THREE.Vector3(xx(xv),yDir*stemH,0)];
  const sg=new THREE.BufferGeometry().setFromPoints(stemPts);
  const sl=new THREE.Line(sg,new THREE.LineBasicMaterial({color:col,transparent:true,opacity:0}));sl.computeLineDistances();root.add(sl);
  const tipY=yDir>0?0.26:-0.26;
  const tg=new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(xx(xv)-0.13,tipY,0),new THREE.Vector3(xx(xv),0,0),new THREE.Vector3(xx(xv)+0.13,tipY,0)]);
  const tip=new THREE.Line(tg,new THREE.LineBasicMaterial({color:col,transparent:true,opacity:0}));root.add(tip);
  const dot=new THREE.Mesh(new THREE.SphereGeometry(.13,14,14),new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0}));
  dot.position.set(xx(xv),0,0);root.add(dot);
  const nLab=label(numTxt,col,.46);nLab.position.set(xx(xv)+0.26,yDir>0?0.44:-0.52,0);nLab.material.opacity=0;root.add(nLab);labels.push(nLab);
  const cLab=label(txt,col,.5);cLab.position.set(xx(xv),yDir*(stemH+0.54),0);cLab.material.opacity=0;root.add(cLab);labels.push(cLab);
  callouts.push({slm:sl.material,tipm:tip.material,dot,nLab,cLab,delay});}
 mkCallout(0, 1,1.1,'\u2115 Doğal','0','#34F5A0',0.08);

 mkCallout(-1,1,2.3,'\u2124 Tam','\u22121','#4D8DFF',0.40);
 mkCallout(-3,1,2.9,'\u2124 Tam','\u22123','#4D8DFF',0.46);
 mkCallout(-5,1,2.3,'\u2124 Tam','\u22125','#4D8DFF',0.52);
 mkCallout(0.5, -1,1.5,'\u211a Rasyonel','1/2','#FFB23E',0.62);
 mkCallout(2.5, -1,2.0,'\u211a Rasyonel','5/2','#FFB23E',0.68);
 mkCallout(-2.5,-1,1.5,'\u211a Rasyonel','\u22125/2','#FFB23E',0.74);
 mkCallout(Math.SQRT2,-1,2.7,'\u211d \u0130rrasyonel','\u221a2','#B98CFF',0.82);
 mkCallout(Math.PI,   -1,3.3,'\u211d \u0130rrasyonel','\u03c0','#B98CFF',0.88);
 const stages=[

/* 2b) TEK–ÇİFT (toplama makinesi) — tek + tek = çift: iki artık birleşir */
function buildParityAdd(){
 const root=new THREE.Group();root.visible=false;world.add(root);const labels=[];
 const CUBE=0.52,STEP=0.6,CX=[-0.32,0.32],EVEN=new THREE.Color('#4D8DFF'),ODD=new THREE.Color('#ff6b7d');
 function mkTower(n,x0){const g=new THREE.Group();g.position.x=x0;root.add(g);
   const pairs=Math.floor(n/2),cubes=[];let lo=null;
   for(let r=0;r<pairs;r++)for(let ci=0;ci<2;ci++){const m=mkCube(CUBE,'#FF8C2A');m.position.set(CX[ci],r*STEP+CUBE/2,0);m.scale.setScalar(0.0001);g.add(m);cubes.push(m);}
   if(n%2){lo=mkCube(CUBE,'#FF8C2A');lo.position.set(CX[0],pairs*STEP+CUBE/2,0);lo.scale.setScalar(0.0001);g.add(lo);}
   return {g,cubes,lo,pairs,x0};}
 const A=mkTower(3,-2.9),B=mkTower(5,2.9);
 const lA=label('3 (tek)','#ff6b7d',.5);lA.position.set(-2.9,-0.62,0);root.add(lA);labels.push(lA);
 const lB=label('5 (tek)','#ff6b7d',.5);lB.position.set(2.9,-0.62,0);root.add(lB);labels.push(lB);
 const plus=label('+','#fff',.7);plus.position.set(0,0.9,0);root.add(plus);labels.push(plus);

 const note=label('İki artık küp birleşir → yeni bir çift!','#9fb4e8',.5);note.position.set(0,4.3,0);note.material.opacity=0;root.add(note);labels.push(note);
 const AX=-2.9,BX=2.9,AXm=-0.78,BXm=0.78;
 const loA_from=new THREE.Vector3(CX[0],1*STEP+CUBE/2,0),loA_to=new THREE.Vector3(CX[0]+1.56,2*STEP+CUBE/2,0);
 const loB_from=new THREE.Vector3(CX[0],2*STEP+CUBE/2,0),loB_to=new THREE.Vector3(CX[1],2*STEP+CUBE/2,0);
 function frame(p,t){
   A.cubes.concat(B.cubes).forEach((m,i)=>{m.scale.setScalar(0.0001+ez(cl((p-0.04-i*0.03)/0.16,0,1)));});
   if(A.lo)A.lo.scale.setScalar(0.0001+ez(cl((p-0.22)/0.14,0,1)));
   if(B.lo)B.lo.scale.setScalar(0.0001+ez(cl((p-0.26)/0.14,0,1)));
   const sl=ez(cl((p-0.4)/0.2,0,1));
   A.g.position.x=AX+(AXm-AX)*sl;B.g.position.x=BX+(BXm-BX)*sl;
   lA.position.x=A.g.position.x;lB.position.x=B.g.position.x;plus.material.opacity=1-sl;
   const fl=ez(cl((p-0.62)/0.22,0,1));
   if(A.lo){A.lo.position.lerpVectors(loA_from,loA_to,fl);A.lo.position.y+=Math.sin(Math.PI*fl)*0.8;}
   if(B.lo){B.lo.position.lerpVectors(loB_from,loB_to,fl);}
   const turned=p>0.86;
   if(A.lo)A.lo.material.color.copy(turned?EVEN:ODD);
   if(B.lo)B.lo.material.color.copy(turned?EVEN:ODD);
   const fo=ez(cl((p-0.86)/0.14,0,1));res.material.opacity=fo;note.material.opacity=fo;
   if(turned&&A.lo){A.lo.scale.setScalar(1+0.06*Math.sin(t*4));B.lo.scale.setScalar(1+0.06*Math.sin(t*4));}}
 function recolor(hex){const c=new THREE.Color(hex);A.cubes.concat(B.cubes).forEach(m=>setMeshColor(m,c));}
 const s={root,labels,frame,recolor,cam:{px:0,py:3.2,pz:16.5,tx:0,ty:-1.1}};sceneGroups.push(s);return s;}

/* İlkokul · Sayı Kümeleri — 4 renkli kutu/raf, somut nesnelerle */
function buildSetsKids(){
 const root=new THREE.Group();root.visible=false;world.add(root);const labels=[];
 const shelves=[
  {nm:'Doğal Sayılar',col:'#34F5A0',nums:['0','1','2','3','4'],x:-5.2},
  {nm:'Tam Sayılar',col:'#4D8DFF',nums:['−3','−2','−1'],x:-1.6},
  {nm:'Rasyonel',col:'#FFB23E',nums:['½','¼','¾'],x:1.8},
  {nm:'İrrasyonel',col:'#B98CFF',nums:['√2','π'],x:5.0}];
 shelves.forEach(sh=>{
  const base=new THREE.Mesh(new THREE.BoxGeometry(2.8,.18,1.1),new THREE.MeshLambertMaterial({color:new THREE.Color(sh.col).multiplyScalar(0.45)}));
  base.position.set(sh.x,-1.35,0);base.scale.x=0;root.add(base);sh.base=base;
  const lbk=label(sh.nm,sh.col,.48);lbk.position.set(sh.x,-2.1,0);lbk.material.opacity=0;root.add(lbk);labels.push(lbk);sh.lbk=lbk;
  const cubes=[];
  sh.nums.forEach((n,i)=>{const m=mkCube(.52,sh.col,null,n);m.position.set(sh.x+(i-(sh.nums.length-1)/2)*0.72,-0.8,0);m.scale.setScalar(0.0001);root.add(m);
   cubes.push({m,i});});sh.cubes=cubes;});
 const title=label('Her sayı bir kümeye aittir!','#9fb4e8',.52);title.position.set(0,2.2,0);title.material.opacity=0;root.add(title);labels.push(title);
 function frame(p){
  shelves.forEach((sh,si)=>{const bt=ez(cl((p-si*0.12)/0.22,0,1));sh.base.scale.x=bt;sh.lbk.material.opacity=bt;
   sh.cubes.forEach(c=>{const ct=ez(cl((p-si*0.12-0.1-c.i*0.04)/0.18,0,1));c.m.scale.setScalar(0.0001+ct);});});
  title.material.opacity=ez(cl((p-0.7)/0.2,0,1));}
 function recolor(hex){const c=new THREE.Color(hex);shelves[0].cubes.forEach(o=>setMeshColor(o.m,c));}
 const s={root,labels,frame,recolor,cam:{px:0,py:2.2,pz:21.0,tx:0,ty:-1.6}};sceneGroups.push(s);return s;}

/* İlkokul · Tek–Çift — 1'den 10'a küpler, ikişer grupla */
function buildParityKids(){
 const root=new THREE.Group();root.visible=false;world.add(root);const labels=[];
 const EVEN='#FF8C2A',ODD='#FF8C2A',S=0.58,SP=1.05;
 const items=[];
 for(let n=1;n<=10;n++){
  const isEven=n%2===0;const x=(n-5.5)*SP;
  const m=mkCube(S,isEven?EVEN:ODD,null,''+n);m.position.set(x,0,0);m.scale.setScalar(0.0001);root.add(m);
  items.push({m,n,isEven,x});}
 /* ikişer gruplandırma çizgileri */
 const arcs=[];
 for(let n=2;n<=10;n+=2){const x0=items[n-2].x,x1=items[n-1].x,cx=(x0+x1)/2,h=0.55,seg=20,arr=[];
  for(let k=0;k<=seg;k++){const a=Math.PI*(k/seg);arr.push(new THREE.Vector3(cx-0.5*Math.cos(a),S/2+Math.sin(a)*h,0));}
  const ag=new THREE.BufferGeometry().setFromPoints(arr);
  const al=new THREE.Line(ag,new THREE.LineBasicMaterial({color:0x4D8DFF,transparent:true,opacity:0}));al.computeLineDistances();ag.setDrawRange(0,0);root.add(al);arcs.push({al,n:arr.length});}
 const tagE=label('ÇİFT — ikişer grupla!','#4D8DFF',.52);tagE.position.set(-1.8,2.2,0);tagE.material.opacity=0;root.add(tagE);labels.push(tagE);
 const tagO=label('TEK — bir fazla kalır!','#ff6b7d',.52);tagO.position.set(2.2,2.2,0);tagO.material.opacity=0;root.add(tagO);labels.push(tagO);
 function frame(p){
  items.forEach((it,i)=>{const t=ez(cl((p-i*0.04)/0.18,0,1));it.m.scale.setScalar(0.0001+t);});
  arcs.forEach((a,i)=>{const t=ez(cl((p-0.5-i*0.05)/0.2,0,1));a.al.geometry.setDrawRange(0,Math.floor(a.n*t));a.al.material.opacity=.9*ez(cl((p-0.5-i*0.05)/0.1,0,1));});
  tagE.material.opacity=ez(cl((p-0.85)/0.15,0,1));tagO.material.opacity=ez(cl((p-0.9)/0.1,0,1));}
 function recolor(hex){const c=new THREE.Color(hex);items.filter(it=>it.isEven).forEach(it=>setMeshColor(it.m,c));}
 const s={root,labels,frame,recolor,cam:{px:0,py:2.4,pz:19.0,tx:0,ty:-1.4}};sceneGroups.push(s);return s;}

/* İlkokul · Ardışık — merdiven, her basamak +1 yüksek, sayı yazılı */
function buildConsecKids(){
 const root=new THREE.Group();root.visible=false;world.add(root);const labels=[];
 const nums=[3,4,5,6,7],COL='#FF8C2A',S=0.54,ST=0.6,xs=nums.map((_,i)=>(i-2)*1.3);
 const cols=[];
 nums.forEach((h,ci)=>{const cg=new THREE.Group();cg.position.x=xs[ci];root.add(cg);const cubes=[];
  for(let r=0;r<h-2;r++){const m=mkCube(S,COL);m.position.set(0,r*ST+S/2,0);m.scale.setScalar(0.0001);cg.add(m);cubes.push(m);}
  const nl=label(''+h,'#111',.58);nl.position.set(xs[ci],(h-2)*ST+0.65,0);nl.material.opacity=0;root.add(nl);labels.push(nl);
  cols.push({cubes,h});});
 /* +1 okları */
 for(let i=0;i<nums.length-1;i++){const x0=xs[i],x1=xs[i+1],y=(Math.max(nums[i],nums[i+1])-2)*ST+0.3;
  const al=new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(x0+0.7,y,0),new THREE.Vector3(x1-0.7,y,0)]),new THREE.LineBasicMaterial({color:0xffd23e,transparent:true,opacity:0}));al.computeLineDistances();root.add(al);
  const pl=label('+1','#FFD23E',.42);pl.position.set((x0+x1)/2,y+0.42,0);pl.material.opacity=0;root.add(pl);labels.push(pl);}
 const note=label('Her basamak bir fazla!','#9fb4e8',.52);note.position.set(0,3.8,0);note.material.opacity=0;root.add(note);labels.push(note);
 function frame(p){
  let k=0;cols.forEach(c=>c.cubes.forEach(m=>{const t=ez(cl((p-k++*0.03)/0.18,0,1));m.scale.setScalar(0.0001+t);}));
  cols.forEach((c,i)=>{const t=ez(cl((p-0.1-i*0.05)/0.2,0,1));c.cubes.forEach&&c.cubes[0]&&(c.cubes[c.cubes.length-1].scale.setScalar(0.0001+t));
   labels[i].material.opacity=ez(cl((p-i*0.04)/0.2,0,1));});
  note.material.opacity=ez(cl((p-0.6)/0.2,0,1));}
 function recolor(hex){const c=new THREE.Color(hex);cols.forEach(co=>co.cubes.forEach(m=>setMeshColor(m,c)));}
 const s={root,labels,frame,recolor,cam:{px:0,py:2.8,pz:17.0,tx:0,ty:-0.9}};sceneGroups.push(s);return s;}

/* İlkokul · Sayı Doğrusu — sıçrayan top, +1 adımları */
function buildLineKids(){
 const root=new THREE.Group();root.visible=false;world.add(root);const labels=[];
 const U=1.0,xx=v=>v*U;
 const axis=new THREE.Mesh(new THREE.CylinderGeometry(.035,.035,xx(11),12),new THREE.MeshBasicMaterial({color:0x4a5578}));
 axis.rotation.z=Math.PI/2;axis.scale.x=0;root.add(axis);
 const ticks=[];
 for(let v=0;v<=10;v++){const post=new THREE.Mesh(new THREE.BoxGeometry(.04,v===0?.45:.28,.04),new THREE.MeshBasicMaterial({color:v===0?0xffffff:0x5a648a,transparent:true,opacity:0}));
  post.position.set(xx(v)-xx(5),0,0);root.add(post);
  const lab=label(''+v,'#9fb4e8',.44);lab.position.set(xx(v)-xx(5),-0.58,0);lab.material.opacity=0;root.add(lab);labels.push(lab);
  ticks.push({post,lab});}
 const ball=new THREE.Group();ball.add(halo(new THREE.Color('#FFD23E'),1.2));ball.add(new THREE.Mesh(new THREE.SphereGeometry(.22,18,18),new THREE.MeshBasicMaterial({color:0xFFD23E})));
 ball.position.set(xx(0)-xx(5),0,0);ball.scale.setScalar(0);root.add(ball);
 /* sıçrama yayları */
 const bounces=[];
 for(let i=0;i<5;i++){const x0=xx(i)-xx(5),x1=xx(i+1)-xx(5),cx=(x0+x1)/2,h=0.75,seg=22,arr=[];
  for(let k=0;k<=seg;k++){const a=Math.PI*(k/seg);arr.push(new THREE.Vector3(cx-0.5*Math.cos(a),Math.sin(a)*h,0));}
  const ag=new THREE.BufferGeometry().setFromPoints(arr);
  const al=new THREE.Line(ag,new THREE.LineBasicMaterial({color:0xFFD23E,transparent:true,opacity:0}));al.computeLineDistances();ag.setDrawRange(0,0);root.add(al);
  const pl=label('+1','#FFD23E',.42);pl.position.set(cx,h+0.35,0);pl.material.opacity=0;root.add(pl);labels.push(pl);
  bounces.push({al,pl,n:arr.length,x0,x1});}
 const note=label('Sağa gidince sayı büyür!','#9fb4e8',.52);note.position.set(xx(2.5)-xx(5),2.4,0);note.material.opacity=0;root.add(note);labels.push(note);
 function frame(p){
  axis.scale.x=ez(cl(p/0.15,0,1));
  ticks.forEach((tk,i)=>{const t=ez(cl((p-0.08-i*0.025)/0.15,0,1));tk.post.material.opacity=t;tk.lab.material.opacity=t;});
  ball.scale.setScalar(0.0001+ez(cl((p-0.2)/0.1,0,1)));
  bounces.forEach((b,i)=>{const t=ez(cl((p-0.32-i*0.1)/0.18,0,1));b.al.geometry.setDrawRange(0,Math.floor(b.n*t));b.al.material.opacity=.9*ez(cl((p-0.32-i*0.1)/0.1,0,1));b.pl.material.opacity=ez(cl((p-0.38-i*0.1)/0.14,0,1));
   if(t>=0.5){const tx=ez(cl((p-0.32-i*0.1-0.08)/0.1,0,1));ball.position.x=b.x0+(b.x1-b.x0)*tx;ball.position.y=Math.sin(Math.PI*Math.min(t*2,1))*0.7;}});
  note.material.opacity=ez(cl((p-0.88)/0.12,0,1));}
 function recolor(){}
 const s={root,labels,frame,recolor,cam:{px:xx(2.5)-xx(5),py:2.2,pz:17.0,tx:xx(2.5)-xx(5),ty:-1.7}};sceneGroups.push(s);return s;}

/* Lise · Sayı Kümeleri — Venn + sayı doğrusu kesişim */

 const rings=[['ℝ',3.8,'#B98CFF'],['ℚ',2.9,'#FFB23E'],['ℤ',2.0,'#4D8DFF'],['ℕ',1.2,'#34F5A0']];
 const circles=[];
 rings.forEach(([nm,r,hex])=>{const segs=72,arr=[];for(let i=0;i<=segs;i++){const a=2*Math.PI*i/segs;arr.push(new THREE.Vector3(Math.cos(a)*r,Math.sin(a)*r,0));}

  circles.push({l,lab,r,n:arr.length});});
 const samples=[['2','#34F5A0',[0.4,0.3]],['-3','#4D8DFF',[-0.6,-0.5]],['3/4','#FFB23E',[-1.6,1.1]],['√2','#B98CFF',[2.4,-0.8]],['π','#B98CFF',[-2.2,1.4]]];

 const formula=label('ℕ ⊂ ℤ ⊂ ℚ ⊂ ℝ  ⊂  ℂ','#9fb4e8',.56);formula.position.set(0,-4.7,0);formula.material.opacity=0;root.add(formula);labels.push(formula);
 function frame(p){

  circles.filter(c=>c.isSample).forEach((c,i)=>{const t=ez(cl((p-0.52-i*0.06)/0.2,0,1));c.g.scale.setScalar(0.0001+t);});

/* Lise · Tek–Çift — parite tablosu: +/× kuralları */
function buildParityHS(){
 const root=new THREE.Group();root.visible=false;world.add(root);const labels=[];

 /* --- genel form kartları --- */
 function mkCard(txt,col,x,y){
  const bg=new THREE.Mesh(new THREE.BoxGeometry(2.6,.72,.06),
   new THREE.MeshBasicMaterial({color:new THREE.Color(col).multiplyScalar(0.18),transparent:true,opacity:0}));
  bg.position.set(x,y,0);root.add(bg);
  const edge=new THREE.LineSegments(new THREE.EdgesGeometry(new THREE.BoxGeometry(2.6,.72,.06)),
   new THREE.LineBasicMaterial({color:col,transparent:true,opacity:0}));
  bg.add(edge);
  const lb=label(txt,col,.56);lb.position.set(x,y,0.06);lb.material.opacity=0;root.add(lb);labels.push(lb);
  return {bg,edge,lb};}

 const cEven=mkCard('Çift  =  2k','#4D8DFF',-2.2,1.8);
 const cOdd =mkCard('Tek  =  2k + 1','#ff6b7d', 2.2,1.8);

 /* --- kural satırları --- */
 const rules=[
  ['çift + çift = çift','#4D8DFF',0, 0.6],
  ['tek  +  tek  = çift','#4D8DFF',0,-0.2],
  ['çift +  tek  =  tek','#ff6b7d',0,-1.0],
  ['çift  ×  her  = çift','#4D8DFF',0,-1.8],
  ['tek   ×  tek  =  tek','#ff6b7d',0,-2.6]];
 const rItems=rules.map(([txt,col,x,y])=>{
  const l=label(txt,col,.5);l.position.set(x,y,0);l.material.opacity=0;root.add(l);labels.push(l);
  return l;});

 /* --- ayraç çizgisi --- */
 const sep=new THREE.Line(
  new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(-4,0.2,0),new THREE.Vector3(4,0.2,0)]),
  new THREE.LineBasicMaterial({color:0x33415e,transparent:true,opacity:0}));
 sep.computeLineDistances();root.add(sep);

 /* --- ispat satırı --- */
 const proof=label('(2k+1)+(2m+1) = 2(k+m+1)  →  çift','#9fb4e8',.46);
 proof.position.set(0,-3.4,0);proof.material.opacity=0;root.add(proof);labels.push(proof);

 function frame(p){
  const ct=ez(cl(p/0.2,0,1));
  [cEven,cOdd].forEach(c=>{c.bg.material.opacity=.55*ct;c.edge.material.opacity=ct;c.lb.material.opacity=ct;});
  sep.material.opacity=ez(cl((p-0.22)/0.15,0,1));
  rItems.forEach((l,i)=>{l.material.opacity=ez(cl((p-0.30-i*0.1)/0.18,0,1));});
  proof.material.opacity=ez(cl((p-0.86)/0.14,0,1));}
 function recolor(){}
 const s={root,labels,frame,recolor,cam:{px:0,py:0.5,pz:17.0,tx:0,ty:-1.4}};sceneGroups.push(s);return s;}
/* Lise · Ardışık — formül animasyonu n(n+1)/2 canlı */
function buildConsecHS(){
 const root=new THREE.Group();root.visible=false;world.add(root);const labels=[];
 const n=5,S=0.46,ST=0.54,COL='#FF8C2A';
 /* iki üçgen: 1..n sütunlar + ters kopyası = n×(n+1) dikdörtgen */
 const grpA=new THREE.Group(),grpB=new THREE.Group();root.add(grpA);root.add(grpB);
 const cubesA=[],cubesB=[];
 for(let c=0;c<n;c++){for(let r=0;r<c+1;r++){const m=mkCube(S,COL);m.position.set((c-(n-1)/2)*0.62,r*ST-n*ST/4,0);m.scale.setScalar(0.0001);grpA.add(m);cubesA.push(m);}
  for(let r=0;r<n-c;r++){const m=mkCube(S,'#FF8C2A');m.position.set((c-(n-1)/2)*0.62,r*ST-n*ST/4+(c+1)*ST,0);m.scale.setScalar(0.0001);grpB.add(m);cubesB.push(m);}}

function buildParityKids2(){

 nums.forEach((n,i)=>{

  items.push({m,n,even:n%2===0,x:(i-3.5)*1.1});});
 /* eşleşme yayları */
 const arcs=[];
 for(let i=1;i<8;i+=2){const x0=items[i-1].x,x1=items[i].x,cx=(x0+x1)/2,h=.7,seg=22,arr=[];
  for(let k=0;k<=seg;k++){const a=Math.PI*(k/seg);arr.push(new THREE.Vector3(cx-.55*Math.cos(a),.5+Math.sin(a)*h,0));}

 function frame(p){

  arcs.forEach((a,i)=>{const t=ez(cl((p-.4-i*.08)/.2,0,1));a.al.geometry.setDrawRange(0,Math.floor(a.n*t));a.al.material.opacity=.9*t;});

/* interaction: 1 finger rotate, 2 finger pinch-zoom (mouse drag + wheel too) */
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
let drag=false,lx=0,ly=0,yaw=0,pitch=0,zoomF=1,panX=0,panY=0,pinch=false,pdist=0,zstart=1,pmx=0,pmy=0,psx=0,psy=0;
function tdist(t){return Math.hypot(t[0].clientX-t[1].clientX,t[0].clientY-t[1].clientY);}
function tmid(t){return {x:(t[0].clientX+t[1].clientX)/2,y:(t[0].clientY+t[1].clientY)/2};}
function wpp(){return (2*camGoal.pz*zoomF*Math.tan((50*Math.PI/180)/2))/innerHeight;}
/* mouse: drag=döndür · shift+drag=kaydır · tekerlek=yakınlaştır */
cv.addEventListener('pointerdown',e=>{if(e.pointerType==='mouse'){drag=true;lx=e.clientX;ly=e.clientY;}});
addEventListener('pointerup',e=>{if(!e.pointerType||e.pointerType==='mouse')drag=false;});
addEventListener('pointermove',e=>{if(e.pointerType!=='mouse'||!drag)return;
  if(e.shiftKey){const k=wpp();panX=clamp(panX-(e.clientX-lx)*k,-7,7);panY=clamp(panY+(e.clientY-ly)*k,-5,5);}
  else{yaw+=(e.clientX-lx)*.008;pitch+=(e.clientY-ly)*.006;}
  lx=e.clientX;ly=e.clientY;});
cv.addEventListener('wheel',e=>{e.preventDefault();zoomF=clamp(zoomF*(1+e.deltaY*0.0012),.4,2.6);},{passive:false});
/* touch: 1 parmak döndür · 2 parmak yakınlaştır + istediğin yere kaydır */
cv.addEventListener('touchstart',e=>{if(e.touches.length===2){pinch=true;pdist=tdist(e.touches);zstart=zoomF;const m=tmid(e.touches);pmx=m.x;pmy=m.y;psx=panX;psy=panY;drag=false;}
  else if(e.touches.length===1){drag=true;lx=e.touches[0].clientX;ly=e.touches[0].clientY;}},{passive:false});
cv.addEventListener('touchmove',e=>{e.preventDefault();
  if(pinch&&e.touches.length===2){zoomF=clamp(zstart*pdist/tdist(e.touches),.4,2.6);

/* ── Sayfalama yardımcısı: HTML bloklarını ölçeye göre say ── */
function _splitToPages(html,maxH){
  /* Her üst-düzey çocuğu teker teker yükle, sığmayınca yeni sayfa aç */
  const probe=document.createElement('div');
  probe.style.cssText='position:absolute;visibility:hidden;width:'+
    (document.getElementById('sheet-body').clientWidth||500)+'px;padding:0;';
  document.body.appendChild(probe);
  const pages=[];let cur='';
  /* html'i üst-düzey öğelere böl — basit regex ile */
  const tmp=document.createElement('div');tmp.innerHTML=html;
  const kids=Array.from(tmp.children);
  if(!kids.length){document.body.removeChild(probe);return [html];}
  kids.forEach(kid=>{
    probe.innerHTML=cur+kid.outerHTML;
    if(probe.scrollHeight>maxH&&cur){pages.push(cur);cur=kid.outerHTML;}
    else cur+=kid.outerHTML;});
  if(cur)pages.push(cur);
  document.body.removeChild(probe);
  return pages.length?pages:[html];}

function _renderTab(i){
  const t=_sheetTabs[i];if(!t)return;
  const body=document.getElementById('sheet-body');
  body.scrollTop=0;
  /* ── Sayfalama: henüz bölünmemiş sekmeleri böl ── */
  if(!t._split){
    t._split=true;
    requestAnimationFrame(()=>{
      /* Ölçmek için önce koy */
      body.innerHTML=t.html;
      const avail=body.clientHeight-4;
      if(body.scrollHeight>avail+12){
        const pages=_splitToPages(t.html,avail);
        if(pages.length>1){
          /* Mevcut sekmeyi birincisiyle değiştir, gerisini ekle */
          const newTabs=pages.map((pg,pi)=>({
            label:t.label+(pi>0?' '+(pi+1):''+(pages.length>1?' 1':'')),
            html:pg,_split:true}));
          newTabs[0].label=t.label+(pages.length>1?' 1':'');
          _sheetTabs.splice(i,1,...newTabs);
          _sheetTabI=i;
          /* Sekmeleri yeniden çiz */
          _redrawStabs(i);
          body.innerHTML=_sheetTabs[i].html;
          /* nav güncelle */
          _updateNav(i);
          return;}}
      _updateNav(i);});}
  else{body.innerHTML=t.html;_updateNav(i);}
}

function stripVar(s){return (''+s).replace(/^\$\s*[a-z]\s*=\s*/,'$');}
function bdEsc(s){return (''+s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fracify(s){if(s==null)return s;var SUP='⁰¹²³⁴⁵⁶⁷⁸⁹⁻⁺ⁿᵐˣ';var TOK='(?:\\([^()]+\\)|[0-9]+|[a-z])['+SUP+']*';
  var re=new RegExp('(^|[^A-Za-zçğıöşüÇĞİÖŞÜ0-9'+SUP+'])('+TOK+')\\s*[/÷]\\s*('+TOK+')(?![A-Za-zçğıöşüÇĞİÖŞÜ0-9'+SUP+'])','g');
  return (''+s).replace(re,'$1<span class="ifr"><span class="ifn">$2</span><span class="ifd">$3</span></span>');}
function _grp(s,i){if(s[i]!=='{')return [s[i]||'',i+1];var dep=0,start=i+1,k=i;for(;k<s.length;k++){if(s[k]==='{')dep++;else if(s[k]==='}'){dep--;if(dep===0)return [s.slice(start,k),k+1];}}return [s.slice(start),k];}
function texRender(s){s=''+s;var out='',i=0,n=s.length,g;
  while(i<n){
    if(s.substr(i,6)==='\\dfrac'||s.substr(i,6)==='\\tfrac'||s.substr(i,5)==='\\frac'){
      i+=(s.substr(i,5)==='\\frac')?5:6; while(s[i]===' ')i++;
      var a=_grp(s,i);i=a[1];while(s[i]===' ')i++;var b=_grp(s,i);i=b[1];
      out+='<span class="ifr"><span class="ifn">'+texRender(a[0])+'</span><span class="ifd">'+texRender(b[0])+'</span></span>';
    }else if(s[i]==='^'){i++;if(s[i]==='{'){g=_grp(s,i);i=g[1];out+='<sup>'+texRender(g[0])+'</sup>';}else{out+='<sup>'+bdEsc(s[i]||'')+'</sup>';i++;}}
    else if(s[i]==='_'){i++;if(s[i]==='{'){g=_grp(s,i);i=g[1];out+='<sub>'+texRender(g[0])+'</sub>';}else{out+='<sub>'+bdEsc(s[i]||'')+'</sub>';i++;}}
    else if(s.substr(i,5)==='\\cdot'){out+='·';i+=5;}
    else if(s.substr(i,6)==='\\times'){out+='×';i+=6;}
    else if(s.substr(i,4)==='\\div'){out+='÷';i+=4;}
    else if(s.substr(i,11)==='\\Rightarrow'){out+=' ⇒ ';i+=11;}
    else if(s.substr(i,7)==='\\approx'){out+=' ≈ ';i+=7;}
    else if(s.substr(i,4)==='\\neq'){out+=' ≠ ';i+=4;}
    else if(s.substr(i,3)==='\\ne'){out+=' ≠ ';i+=3;}
    else if(s.substr(i,3)==='\\le'){out+=' ≤ ';i+=3;}
    else if(s.substr(i,3)==='\\ge'){out+=' ≥ ';i+=3;}
    else if(s.substr(i,5)==='\\sqrt'){i+=5;while(s[i]===' ')i++;g=_grp(s,i);i=g[1];out+='√('+texRender(g[0])+')';}
    else if(s.substr(i,5)==='\\left'){i+=5;}
    else if(s.substr(i,6)==='\\right'){i+=6;}
    else if(s.substr(i,2)==='\\,'){out+=' ';i+=2;}
    else if(s.substr(i,2)==='\\ '){out+=' ';i+=2;}
    else if(s[i]==='\\'){var m=/^\\[A-Za-z]+/.exec(s.slice(i));i+=m?m[0].length:1;}
    else if(s[i]==='{'){g=_grp(s,i);i=g[1];out+=texRender(g[0]);}
    else if(s[i]==='}'){i++;}
    else{out+=bdEsc(s[i]);i++;}
  }
  return out;}
function texFallback(s){return texRender(s);}
function mathText(str){if(str==null)return '';const parts=(''+str).split('$');let out='';for(let k=0;k<parts.length;k++){if(k%2===0){out+=bdEsc(parts[k]);}else{if(typeof katex!=='undefined'){try{out+=katex.renderToString(parts[k],{throwOnError:false,output:'html'});}catch(e){out+=texFallback(parts[k]);}}else{out+=texFallback(parts[k]);}}}return out;}
function plainify(str){const p=(''+str).split('$');let o='';for(let k=0;k<p.length;k++){o+=(k%2===0)?bdEsc(p[k]):texFallback(p[k]);}return o;}

function MIX(edu,diff){edu=qLv(edu);const key=edu+'|'+diff;if(_mixCache[key])return _mixCache[key];

  if(diff==='zor'&&(edu==='lise'||edu==='sinav'||edu==='universite')){out=HARD.slice();}
  else{const pools=QUESTIONS.map(b=>(b[edu]&&b[edu][diff])||[]);
  const maxLen=Math.max.apply(null,pools.map(p=>p.length));out=[];
  for(let i=0;i<maxLen;i++)for(let s=0;s<pools.length;s++){if(pools[s][i])out.push(pools[s][i]);}}
  // Fisher-Yates shuffle
  for(let fi=out.length-1;fi>0;fi--){const fj=Math.floor(Math.random()*(fi+1));[out[fi],out[fj]]=[out[fj],out[fi]];}
  _mixCache[key]=out;return out;}

/* ── Kontrast yardımcısı: arka plan rengine göre siyah/beyaz metin ── */
function _contrastCol(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  // WCAG luminans formülü
  const lum=(c)=>{const s=c/255;return s<=.03928?s/12.92:Math.pow((s+.055)/1.055,2.4);};
  const L=.2126*lum(r)+.7152*lum(g)+.0722*lum(b);
  return L>.35?'#0d1426':'#e8eaf6';}

/* ── Arka plan yazı rengi güncelle ── */
function _applyBodyTextCol(col){
  document.body.style.color=col;
  // Panel metinleri (kendi bg'leri olmayan)
  document.querySelectorAll('.header h1,.sub,.tbtn .t,.level,.panel .ptext,.panel .ptxt').forEach(el=>{
    if(!el.style.color||el.style.color===window._lastBodyTextCol)el.style.color=col;});
  window._lastBodyTextCol=col;}

/* ── Panel yazı rengi güncelle ── */
function _applyPanelTextCol(bgHex){
  const col=_contrastCol(bgHex);
  document.querySelectorAll('.panel').forEach(el=>{
    el.style.color=col;
    // Alt elemanlar
    el.querySelectorAll('p,span,.ptext,.ptxt,.bul,.act-desc').forEach(c=>{c.style.color=col;});});
  // ptitle özel rengi koru (zaten ayrı kontrol ediliyor)
}

function applyPal(hex){
  if(palTarget==='bg'){
    document.body.style.background=hex;
    const col=_contrastCol(hex);
    _applyBodyTextCol(col);}
  else if(palTarget==='title'){const h=document.querySelector('.header h1');if(h)h.style.color=hex;const fb=document.querySelector('.sub .fbox');if(fb){fb.style.color=hex;fb.style.borderColor=hex;}}
  else if(palTarget==='scene'){recolorModels(hex);}
  else if(palTarget==='panelbg'){
    document.querySelectorAll('.panel').forEach(el=>{el.style.background=hex;});
    _applyPanelTextCol(hex);}
  else if(palTarget==='ptitle'){const p=document.getElementById('ptitle');if(p)p.style.color=hex;}
  else if(palTarget==='bullets'){bulletsCol=hex;applyBulletsCol();}
}

const clock=new THREE.Clock();
function tick(){requestAnimationFrame(tick);const dt=Math.min(.05,clock.getDelta());
  if((playing||p<1)&&!solving)animateAct(dt);
  if(solving){sBall.position.x+=(sBallTX-sBall.position.x)*.14;sLab.position.x=sBall.position.x;
    sGhost.visible=sGhostOn;sBar.visible=sBarOn;
    if(sBarOn){const a=gx(sBarFrom),b=gx(sBarTo);sBar.scale.x=Math.max(.001,Math.abs(b-a));sBar.position.x=(a+b)/2;}}
  const tt=clock.getElapsedTime();
  if(!drag&&!pinch&&autoRot){yaw+=dt*0.4;}
  // Etiket boyutlarını kamera uzaklığına göre normalize et
  const camDist=cam.position.z;const scaleFactor=camDist/17;
  sceneGroups.forEach(sg=>{if(sg.root.visible)sg.labels.forEach(lb=>{if(lb.isSprite&&lb.visible){const base=lb.userData.baseScale||lb.scale.x;if(!lb.userData.baseScale)lb.userData.baseScale=lb.scale.x;const bsy=lb.userData.baseScaleY||lb.scale.y;if(!lb.userData.baseScaleY)lb.userData.baseScaleY=lb.scale.y;lb.scale.x=base*scaleFactor;lb.scale.y=bsy*scaleFactor;}});});
  world.rotation.y=yaw;world.rotation.x=pitch;
  const fx=camGoal.tx+panX,fy=camGoal.ty+panY;
  const _zf=zoomF*1.18; const dx=fx+(camGoal.px-camGoal.tx)*_zf,dy=fy+(camGoal.py-camGoal.ty)*_zf,dz=camGoal.pz*_zf;
  cam.position.x+=(dx-cam.position.x)*.06;cam.position.y+=(dy-cam.position.y)*.06;cam.position.z+=(dz-cam.position.z)*.06;
  cam.lookAt(fx,fy,0);renderer.render(scene,cam);}
resize();cam.position.set(gx(2),3.2,13);enter(0);applyLabels();updateDetailIcon();runState();tick();
addEventListener('resize',resize);
}
