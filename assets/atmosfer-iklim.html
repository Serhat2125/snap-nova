// --- İzobar halkaları (basınç eş eğri çizgileri) ---
function makeIsobars(opts = {}) {
  const grp = new THREE.Group();
  const center = opts.center || new THREE.Vector3(0, 0.01, 0);
  const color = opts.color || 0x60c0ff;
  const ringCount = opts.ringCount || 5;
  const maxR = opts.maxR || 3;
  
  for (let i = 1; i <= ringCount; i++) {
    const r = (i / ringCount) * maxR;
    const ring = new THREE.Mesh(
      new THREE.RingGeometry(r - 0.025, r + 0.025, 64),
      new THREE.MeshStandardMaterial({
        color: color,
        emissive: color,
        emissiveIntensity: 0.6,
        transparent: true,
        opacity: 0.6,
        side: THREE.DoubleSide,
        toneMapped: false
      })
    );
    ring.rotation.x = -Math.PI / 2;
    ring.position.copy(center);
    grp.add(ring);
  }
  return grp;
}

// --- Basınç merkezi parçacıkları (siklon/antisiklon) ---
function makePressureParticles(opts = {}) {
  const center = opts.center || new THREE.Vector3(0, 0, 0);
  const maxR = opts.maxR || 3.0;
  const count = opts.count || 280;
  const isHigh = opts.isHigh !== undefined ? opts.isHigh : false;  // YB mı AB mi
  const isNorth = opts.isNorth !== undefined ? opts.isNorth : true;  // KYK mi GYK mi
  const color = opts.color || (isHigh ? 0xffb74d : 0x42a5f5);
  
  const positions = new Float32Array(count * 3);
  const data = []; // her parçacık için: {radius, angle, height, speed}
  
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const r = 0.3 + Math.random() * (maxR - 0.3);
    const h = isHigh ? Math.random() * 2.0 : Math.random() * 0.3;
    
    positions[i*3] = center.x + Math.cos(angle) * r;
    positions[i*3+1] = center.y + h;
    positions[i*3+2] = center.z + Math.sin(angle) * r;
    
    data.push({
      r: r, angle: angle, h: h,
      // Coriolis sapma yönü
      angularSpeed: (isNorth ? 1 : -1) * (isHigh ? 1 : -1) * (0.3 + Math.random() * 0.2),
      // İçeri/dışarı hareket
      radialSpeed: (isHigh ? 1 : -1) * (0.15 + Math.random() * 0.1),
      // Yukarı/aşağı
      verticalSpeed: isHigh ? -0.4 : 0.4,
      maxH: 2.0
    });
  }
  
  // Yumuşak sprite
  const canvas = document.createElement('canvas');
  canvas.width = 64; canvas.height = 64;
  const ctx = canvas.getContext('2d');
  const grad = ctx.createRadialGradient(32, 32, 0, 32, 32, 30);
  grad.addColorStop(0, 'rgba(255,255,255,1)');
  grad.addColorStop(0.5, 'rgba(255,255,255,0.5)');
  grad.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 64, 64);
  const tex = new THREE.CanvasTexture(canvas);
  
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const mat = new THREE.PointsMaterial({
    color: color,
    map: tex,
    size: 0.13,
    sizeAttenuation: true,
    transparent: true,
    opacity: 0.85,
    blending: THREE.AdditiveBlending,
    depthWrite: false
  });
  const pts = new THREE.Points(geo, mat);
  pts.userData._isPressureParts = true;
  pts.userData._partData = data;
  pts.userData._isHigh = isHigh;
  pts.userData._isNorth = isNorth;
  pts.userData._centerY = center.y;
  pts.userData._maxR = maxR;
  return pts;
}

// --- Küresel rüzgar bandı (enleme göre) ---
function makeWindBand(opts = {}) {
  const earthR = opts.earthR || 1.5;
  const bandR = opts.bandR || (earthR * 1.08);
  const latStart = opts.latStart || 0;      // başlangıç enlemi (derece)
  const latEnd = opts.latEnd || 30;          // bitiş enlemi
  const count = opts.count || 100;
  const color = opts.color || 0xffaa30;
  // Yön kontrolü
  const direction = opts.direction || 'east';  // 'east' (batıdan doğuya) veya 'west' (doğudan batıya)
  // Coriolis sapma derecesi
  const tiltDeg = opts.tilt !== undefined ? opts.tilt : 0;  // derece (negatif: ekvatora doğru sapma)
  
  const positions = new Float32Array(count * 3);
  const data = [];
  
  for (let i = 0; i < count; i++) {
    const theta = Math.random() * Math.PI * 2;
    // Enlem: latStart - latEnd arasında rastgele
    const latDeg = latStart + Math.random() * (latEnd - latStart);
    const latRad = latDeg * Math.PI / 180;
    
    // Küresel koordinat
    const r = bandR;
    positions[i*3] = r * Math.cos(latRad) * Math.cos(theta);
    positions[i*3+1] = r * Math.sin(latRad);
    positions[i*3+2] = r * Math.cos(latRad) * Math.sin(theta);
    
    data.push({
      r: r,
      lat: latRad,
      theta: theta,
      angularSpeed: (direction === 'east' ? 1 : -1) * (0.4 + Math.random() * 0.2),
      tilt: tiltDeg * Math.PI / 180  // küçük enlem değişimi için
    });
  }
  
  // Sprite
  const canvas = document.createElement('canvas');
  canvas.width = 64; canvas.height = 64;
  const ctx = canvas.getContext('2d');
  const grad = ctx.createRadialGradient(32, 32, 0, 32, 32, 30);
  grad.addColorStop(0, 'rgba(255,255,255,1)');
  grad.addColorStop(0.5, 'rgba(255,255,255,0.6)');
  grad.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 64, 64);
  const tex = new THREE.CanvasTexture(canvas);
  
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const mat = new THREE.PointsMaterial({
    color: color,
    map: tex,
    size: 0.08,
    sizeAttenuation: true,
    transparent: true,
    opacity: 0.85,
    blending: THREE.AdditiveBlending,
    depthWrite: false
  });
  const pts = new THREE.Points(geo, mat);
  pts.userData._isWindBand = true;
  pts.userData._partData = data;
  pts.userData._bandR = bandR;
  return pts;
}

// --- Enlem çemberi (Ekvator, 30°, 60°, kutuplar) ---
function makeLatLine(earthR, latDeg, color, thick = 0.012) {
  const latRad = latDeg * Math.PI / 180;
  const r = earthR * 1.005;  // hafif yüzeyin üstünde
  const rAtLat = r * Math.cos(latRad);
  const yAtLat = r * Math.sin(latRad);
  
  const ring = new THREE.Mesh(
    new THREE.TorusGeometry(rAtLat, thick, 8, 64),
    new THREE.MeshStandardMaterial({
      color: color,
      emissive: color,
      emissiveIntensity: 0.8,
      transparent: true,
      opacity: 0.8,
      toneMapped: false
    })
  );
  ring.rotation.x = Math.PI / 2;
  ring.position.y = yAtLat;
  return ring;
}

// --- Ozon halkası (stratosfer) ---
function makeOzoneLayer(innerR = 1.85, outerR = 1.95) {
  const geo = new THREE.SphereGeometry(outerR, 48, 36);
  const mat = new THREE.MeshPhysicalMaterial({
    color: 0x00d4ff,
    transparent: true,
    opacity: 0.35,
    roughness: 0.2,
    metalness: 0.1,
    transmission: 0.4,
    ior: 1.25,
    clearcoat: 1.0,
    emissive: 0x00aaff,
    emissiveIntensity: 0.4,
    side: THREE.DoubleSide,
    depthWrite: false
  });
  const ozone = new THREE.Mesh(geo, mat);
  ozone.userData._isOzone = true;
  return ozone;
}

// --- UV ışın çizgileri (ozon tabakası için) ---
function makeUVRays(opts = {}) {
  const count = opts.count || 20;
  const sourceY = opts.sourceY || 5;
  const targetR = opts.targetR || 1.9;
  const grp = new THREE.Group();
  
  for (let i = 0; i < count; i++) {
    const theta = (i / count) * Math.PI * 2 + Math.random() * 0.2;
    const tx = targetR * 1.1 * Math.cos(theta);
    const tz = targetR * 1.1 * Math.sin(theta);
    
    // Çizgi geometrisi
    const pts = [
      new THREE.Vector3(tx, sourceY, tz),
      new THREE.Vector3(tx, targetR + 0.1, tz)
    ];
    const lineGeo = new THREE.BufferGeometry().setFromPoints(pts);
    const lineMat = new THREE.LineBasicMaterial({
      color: 0xc77dff,
      transparent: true,
      opacity: 0.7
    });
    const line = new THREE.Line(lineGeo, lineMat);
    line.userData._isUVRay = true;
    grp.add(line);
  }
  return grp;
}

  // Etiketler — katmanları sağ tarafta dış yana göster
  addLabel(new THREE.Vector3(3.854, 0.0, 0.0), '🌧️ Troposfer\n(0–13 km)', 'phloem', new THREE.Vector3(1.6, 0.3, 0.5), 1);
  addLabel(new THREE.Vector3(3.747, 0.9, 0.0), '🛡️ Stratosfer\n(13–50 km) + Ozon', 'phloem', new THREE.Vector3(1.78, 0.8, 0.5), 1);
  addLabel(new THREE.Vector3(3.509, 1.595, 0.0), '☄️ Mezosfer\n(50–85 km)', 'warn', new THREE.Vector3(1.95, 1.1, 0.5), 1);
  addLabel(new THREE.Vector3(3.329, 1.942, 0.0), '🌌 Termosfer\n(85–600 km)', 'chloro', new THREE.Vector3(2.2, 1.3, 0.5), 1);
  addLabel(new THREE.Vector3(-3.158, 2.21, 0.0), '🚀 Ekzosfer\n(600+ km, uzaya geçiş)', '', new THREE.Vector3(-2.4, 1.0, 0.5), 2);
  addLabel(new THREE.Vector3(-3.779, -0.756, 0.0), '🌍 Yer Yüzeyi', '', new THREE.Vector3(-1.5, 0, 0), 1);
  addLabel(new THREE.Vector3(0.0, -3.854, 0.0), 'Atmosfer 5 katmandan oluşur — gazları yer çekimi tutar', '', new THREE.Vector3(0, -3.8, 0), 4);
  
  // Başlık
  addLabel(new THREE.Vector3(0.0, 3.854, 0.0), '🌍 ATMOSFERİN 5 KATMANI', 'warn', new THREE.Vector3(0, 4.5, 0));
  
  scene.add(grp);
  markDynamic(grp);
  
  window._customAnim = (t, dt) => {
    grp.traverse(o => {
      if (o.userData._isEarth || o.userData._isClouds) {
        o.rotation.y += dt * 0.08;
      }
      // Bulutlar dünya ile birlikte hafif dönüyor
      if (o.userData._isCloudParts) {
        o.rotation.y += dt * 0.05;
        const pos = o.geometry.attributes.position;
        const phases = o.userData._phases;
        for (let i = 0; i < pos.count; i++) {
          phases[i] += dt * 0.06;
        }
      }
      // Aurora kıpırdıyor
      if (o.userData._isAuroraParts) {
        const pos = o.geometry.attributes.position;
        const phases = o.userData._phases;
        for (let i = 0; i < pos.count; i++) {
          phases[i] += dt * 0.15;
          const wobble = Math.sin(t * 2 + i * 0.3) * 0.03;
          const px = pos.getX(i), py = pos.getY(i), pz = pos.getZ(i);
          const len = Math.sqrt(px*px + py*py + pz*pz);
          const scale = 1 + wobble / len;
          pos.setX(i, px * scale);
          pos.setY(i, py * scale);
          pos.setZ(i, pz * scale);
        }
        pos.needsUpdate = true;
        // Renk titreşim
        o.material.opacity = 0.65 + Math.sin(t * 3) * 0.15;
      }
      // Meteor parçacıkları içeri düşer ve yanar
      if (o.userData._isMeteorParts) {
        const pos = o.geometry.attributes.position;
        const vel = o.userData._velocities;
        const life = o.userData._life;
        const inR = o.userData._innerR;
        const outR = o.userData._outerR;
        for (let i = 0; i < pos.count; i++) {
          life[i] += dt * 0.4;
          if (life[i] >= 1) {
            // Yeniden doğ — üst sınırdan
            life[i] = 0;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            pos.setX(i, outR * Math.sin(phi) * Math.cos(theta));
            pos.setY(i, outR * Math.sin(phi) * Math.sin(theta));
            pos.setZ(i, outR * Math.cos(phi));
            const px = pos.getX(i), py = pos.getY(i), pz = pos.getZ(i);
            const len = Math.sqrt(px*px + py*py + pz*pz);
            vel[i*3] = -px / len * 0.3;
            vel[i*3+1] = -py / len * 0.3;
            vel[i*3+2] = -pz / len * 0.3;
          } else {
            pos.setX(i, pos.getX(i) + vel[i*3] * dt);
            pos.setY(i, pos.getY(i) + vel[i*3+1] * dt);
            pos.setZ(i, pos.getZ(i) + vel[i*3+2] * dt);
          }
        }
        pos.needsUpdate = true;
      }
    });
  };
};

          // Açısal dönüş (Coriolis sapması)
          d.angle += d.angularSpeed * dt;
          // Dışarı doğru genişle
          d.r += d.radialSpeed * dt;
          // Yukarıdan aşağı doğru in
          d.h += d.verticalSpeed * dt;
          
          if (d.h <= 0.05 || d.r >= maxR) {
            // Yukarıdan yeniden başla
            d.r = 0.3 + Math.random() * 0.5;
            d.h = 1.5 + Math.random() * 0.5;
            d.angle = Math.random() * Math.PI * 2;
          }
          
          pos.setX(i, Math.cos(d.angle) * d.r);
          pos.setY(i, cy + d.h);
          pos.setZ(i, Math.sin(d.angle) * d.r);
        }
        pos.needsUpdate = true;
      }
    });
    ybMarker.material.emissiveIntensity = 0.7 + Math.sin(t * 2) * 0.3;
  };
};

  addLabel(new THREE.Vector3(3.739, 0.935, 0.0), '↙️↖️ Çevreden merkeze\n(saatin tersi - KYK)', 'phloem', new THREE.Vector3(2.5, 0.2, 0), 1);
  addLabel(new THREE.Vector3(-3.609, -1.354, 0.0), '< 1013 mb', '', new THREE.Vector3(-2.5, 0.1, 0), 2);
  addLabel(new THREE.Vector3(3.609, -1.354, 0.0), '☁️ Kapalı gökyüzü\n🌧️ Yağmurlu', 'epi', new THREE.Vector3(2.5, 0.05, -1), 1);
  addLabel(new THREE.Vector3(-3.207, -2.138, 0.0), 'Örnek: İzlanda AB,\nEkvator (ITCZ)', '', new THREE.Vector3(-2, 0.05, -1), 3);
  addLabel(new THREE.Vector3(3.207, -2.138, 0.0), 'Sapma şekli "S"\n(KYK saat tersi)', 'warn', new THREE.Vector3(0, 0.05, 2.5), 4);

  addLabel(new THREE.Vector3(0.0, 3.854, 0.0), '🌧️ ALÇAK BASINÇ — Siklon (KYK)', 'warn', new THREE.Vector3(0, 4.5, 0));
  
  scene.add(grp);

        const pos = o.geometry.attributes.position;
        const data = o.userData._partData;
        const cy = o.userData._centerY;
        const maxR = o.userData._maxR;
        for (let i = 0; i < pos.count; i++) {
          const d = data[i];
          // Saatin tersine dönüş
          d.angle += d.angularSpeed * dt;
          // İçeri (merkeze) doğru
          d.r += d.radialSpeed * dt;
          // Aşağıdan yukarı çık
          d.h += d.verticalSpeed * dt;
          
          if (d.h >= 2.0 || d.r <= 0.2) {
            // Çevreden yeniden başla (alt seviye)
            d.r = maxR - 0.2 + Math.random() * 0.2;
            d.h = Math.random() * 0.2;
            d.angle = Math.random() * Math.PI * 2;
          }
          
          pos.setX(i, Math.cos(d.angle) * d.r);
          pos.setY(i, cy + d.h);
          pos.setZ(i, Math.sin(d.angle) * d.r);
        }
        pos.needsUpdate = true;
      }
      if (o.userData._isStormCloud) {
        o.rotation.y += dt * 0.5;
      }
    });
    abMarker.material.emissiveIntensity = 0.7 + Math.sin(t * 2) * 0.3;
  };
};

// === 3.1: ALİZELER (Tropikal kuşak) ===
SubBuilders.buildAlizeler = function() {
  const grp = new THREE.Group();
  camera.position.set(0, 3, 11);
  controls.target.set(0, 0, 0);
  controls.update();
  
  grp.add(makeStarsBackground());
  grp.add(makeAtmLighting());
  
  // Dünya
  const earth = makeEarth(1.5);
  grp.add(earth);
  
  // Enlem çizgileri
  const equator = makeLatLine(1.5, 0, 0xffeb3b, 0.018);
  grp.add(equator);
  const lat30N = makeLatLine(1.5, 30, 0xff9800, 0.012);
  grp.add(lat30N);
  const lat30S = makeLatLine(1.5, -30, 0xff9800, 0.012);
  grp.add(lat30S);
  
  // Atmosfer halo
  const atmHalo = makeAtmosphereLayer({
    innerR: 1.5, outerR: 1.7,
    color: 0xff9800, opacity: 0.12, emissive: 0xff6f00, ei: 0.08
  });
  grp.add(atmHalo);
  
  // KYK Alize (30° → 0°, kuzeydoğudan) — gerçek küresel akış
  const aliseN = makeWindBand({
    earthR: 1.5,
    bandR: 1.6,
    latStart: 5, latEnd: 28,
    count: 200,
    color: 0xffd54f,
    direction: 'west'  // doğudan batıya (alize KYK kuzeydoğudan)
  });
  // Coriolis ile aşağı (ekvatora) doğru sapma için latitude düşmesi
  aliseN.userData._isAlizeN = true;
  grp.add(aliseN);
  
  // GYK Alize
  const aliseS = makeWindBand({
    earthR: 1.5,
    bandR: 1.6,
    latStart: -28, latEnd: -5,
    count: 200,
    color: 0xffd54f,
    direction: 'west'
  });
  aliseS.userData._isAlizeS = true;
  grp.add(aliseS);
  
  // ITCZ — ekvatorda yükselen hava parçacıkları (yatay bant)
  const itcz = makeWindBand({
    earthR: 1.5,
    bandR: 1.75,
    latStart: -3, latEnd: 3,
    count: 80,
    color: 0xffffff,
    direction: 'east'
  });
  itcz.userData._isITCZ = true;
  itcz.material.size = 0.13;
  grp.add(itcz);
  
  // Etiketler
  addLabel(new THREE.Vector3(2.388, 3.025, 0.0), '30° K — Dinamik YB\n(Çöl kuşağı)', 'warn', new THREE.Vector3(1.3, 0.75, 0.5), 2);
  addLabel(new THREE.Vector3(-2.388, 3.025, 0.0), '↘️ KYK Alize\n(Kuzeydoğudan)', 'phloem', new THREE.Vector3(-1.3, 0.5, 0.5), 1);
  addLabel(new THREE.Vector3(3.854, 0.0, 0.0), '☁️ ITCZ\n(Ekvator AB)', 'chloro', new THREE.Vector3(1.5, 0, 0.5), 1);
  addLabel(new THREE.Vector3(-2.508, -2.926, 0.0), '↗️ GYK Alize\n(Güneydoğudan)', 'phloem', new THREE.Vector3(-1.3, -0.5, 0.5), 1);
  addLabel(new THREE.Vector3(2.388, -3.025, 0.0), '30° G — Dinamik YB', 'warn', new THREE.Vector3(1.3, -0.75, 0.5), 2);
  addLabel(new THREE.Vector3(-3.609, 1.354, 0.0), '🌵 Sahra, Atacama\nçölleri burada', '', new THREE.Vector3(-1.5, 0.7, 0.5), 3);
  addLabel(new THREE.Vector3(0.0, -3.854, 0.0), 'Alize = Ticaret Rüzgarı (Kolomb Amerika\'ya bununla geldi)', '', new THREE.Vector3(0, -4.5, 0), 4);
  
  // Başlık
  addLabel(new THREE.Vector3(0.0, 3.854, 0.0), '🌴 ALİZELER — Tropikal Kuşağın Sürekli Rüzgarları', 'warn', new THREE.Vector3(0, 4.5, 0));
  
  scene.add(grp);
  markDynamic(grp);
  
  window._customAnim = (t, dt) => {
    grp.traverse(o => {
      if (o.userData._isEarth || o.userData._isClouds) {
        o.rotation.y += dt * 0.08;
      }
      if (o.userData._isWindBand) {
        const pos = o.geometry.attributes.position;
        const data = o.userData._partData;
        // Alize KYK: hafif aşağı (ekvatora) sapma
        const tiltDir = o.userData._isAlizeN ? -1 : (o.userData._isAlizeS ? 1 : 0);
        for (let i = 0; i < pos.count; i++) {
          const d = data[i];
          d.theta += d.angularSpeed * dt;
          // Hafif latitude değişimi (Coriolis sapması simülasyonu)
          if (tiltDir !== 0) {
            d.lat += tiltDir * 0.05 * dt;
            // Sınır
            if (o.userData._isAlizeN && d.lat < 0.02) d.lat = 28 * Math.PI / 180;
            if (o.userData._isAlizeS && d.lat > -0.02) d.lat = -28 * Math.PI / 180;
          }
          pos.setX(i, d.r * Math.cos(d.lat) * Math.cos(d.theta));
          pos.setY(i, d.r * Math.sin(d.lat));
          pos.setZ(i, d.r * Math.cos(d.lat) * Math.sin(d.theta));
        }
        pos.needsUpdate = true;
      }
    });
  };
};

  });

  addLabel(new THREE.Vector3(-2.725, 2.725, 0.0), '↗️ KYK Batı Rüzgarı\n(Güneybatıdan)', 'chloro', new THREE.Vector3(-1.3, 0.85, 0.5), 1);
  addLabel(new THREE.Vector3(3.824, 0.478, 0.0), '✈️ Jet Stream\n(200+ km/s)', 'warn', new THREE.Vector3(1.7, 1.0, 0.5), 4);
  addLabel(new THREE.Vector3(-2.725, -2.725, 0.0), '↘️ GYK Batı Rüzgarı\n(Kuzeybatıdan)', 'chloro', new THREE.Vector3(-1.3, -0.85, 0.5), 1);

      }
      if (o.userData._isWindBand) {
        const pos = o.geometry.attributes.position;
        const data = o.userData._partData;
        // Batı rüzgarı KYK: hafif yukarı (kutba) sapma
        const tiltDir = o.userData._isBatiN ? 1 : (o.userData._isBatiS ? -1 : 0);
        const speedMult = o.userData._isJet ? 2.5 : 1.0;
        for (let i = 0; i < pos.count; i++) {
          const d = data[i];
          d.theta += d.angularSpeed * dt * speedMult;
          if (tiltDir !== 0) {
            d.lat += tiltDir * 0.04 * dt;
            if (o.userData._isBatiN && d.lat > 58 * Math.PI / 180) d.lat = 32 * Math.PI / 180;

          pos.setY(i, d.r * Math.sin(d.lat));
          pos.setZ(i, d.r * Math.cos(d.lat) * Math.sin(d.theta));
        }
        pos.needsUpdate = true;
      }
    });
  };
};

  // 3 sürekli rüzgar bandı — küresel akış (KYK ve GYK toplam 6 bant)

  aliS.userData._tilt = 1;
  grp.add(aliS);
  
  // Batı rüzgarları (yeşil)
  const batiN = makeWindBand({ earthR: 1.5, bandR: 1.65, latStart: 32, latEnd: 58, count: 120, color: 0x66bb6a, direction: 'east' });
  batiN.userData._tilt = 0.5;

  batiS.userData._tilt = -0.5;

  // Kutup rüzgarları (açık mavi)
  const kutupN = makeWindBand({ earthR: 1.5, bandR: 1.6, latStart: 62, latEnd: 85, count: 80, color: 0x80deea, direction: 'west' });
  kutupN.userData._tilt = -1;  // 60°'ye doğru
  grp.add(kutupN);
  const kutupS = makeWindBand({ earthR: 1.5, bandR: 1.6, latStart: -85, latEnd: -62, count: 80, color: 0x80deea, direction: 'west' });
  kutupS.userData._tilt = 1;
  grp.add(kutupS);
  
  // Etiketler — sağda 3 sürekli rüzgar
  addLabel(new THREE.Vector3(3.207, 2.138, 0.0), '❄️ Kutup Rüzgarları\n(90° → 60°)', 'epi', new THREE.Vector3(0.8, 1.45, 0.5), 1);
  addLabel(new THREE.Vector3(3.724, 0.994, 0.0), '🌳 Batı Rüzgarları\n(30° → 60°)', 'chloro', new THREE.Vector3(1.2, 1.05, 0.5), 1);
  addLabel(new THREE.Vector3(3.83, -0.426, 0.0), '🌴 Alizeler\n(30° → 0°)', 'warn', new THREE.Vector3(1.5, 0.4, 0.5), 1);
  
  // Solda enlem etiketleri
  addLabel(new THREE.Vector3(-3.042, 2.367, 0.0), 'Kuzey Kutbu\n(90° K)', 'phloem', new THREE.Vector3(0, 1.55, 0), 2);

  addLabel(new THREE.Vector3(-3.808, 0.593, 0.0), '30° K — DYB', '', new THREE.Vector3(-1.3, 0.75, 0.5), 3);
  addLabel(new THREE.Vector3(-3.83, -0.426, 0.0), 'Ekvator — TAB (0°)', 'warn', new THREE.Vector3(-1.5, 0, 0.5), 3);
  
  // Başlık
  addLabel(new THREE.Vector3(0.0, 3.854, 0.0), '🌐 KÜRESEL SİRKÜLASYON — 3 Hücre Modeli', 'warn', new THREE.Vector3(0, 4.5, 0));
  addLabel(new THREE.Vector3(0.0, -3.854, 0.0), 'Hadley + Ferrel + Polar hücreler Dünya\'nın iklimini oluşturur', '', new THREE.Vector3(0, -4, 0), 4);
  
  scene.add(grp);
  markDynamic(grp);
  
  window._customAnim = (t, dt) => {
    grp.traverse(o => {
      if (o.userData._isEarth || o.userData._isClouds) {
        o.rotation.y += dt * 0.06;
      }
      if (o.userData._isWindBand) {
        const pos = o.geometry.attributes.position;
        const data = o.userData._partData;
        const tilt = o.userData._tilt || 0;
        for (let i = 0; i < pos.count; i++) {
          const d = data[i];
          d.theta += d.angularSpeed * dt;
          if (tilt !== 0) {
            d.lat += tilt * 0.03 * dt;
          }
          pos.setX(i, d.r * Math.cos(d.lat) * Math.cos(d.theta));
          pos.setY(i, d.r * Math.sin(d.lat));
          pos.setZ(i, d.r * Math.cos(d.lat) * Math.sin(d.theta));
        }
        pos.needsUpdate = true;
      }
    });
    // Kutup işaretleri parlar
    npMarker.material.emissiveIntensity = 0.6 + Math.sin(t * 2) * 0.3;
    spMarker.material.emissiveIntensity = 0.6 + Math.sin(t * 2) * 0.3;
  };
};

  camera.position.y -= Y_OFFSET;

  const info = INFO_DATA[subKey];

    const emojiMatch = info.title.match(/^([^\s]+)\s+(.+)$/);
    const emoji = emojiMatch ? emojiMatch[1] : '🌋';
    const title = emojiMatch ? emojiMatch[2] : info.title;
    
    // Modül adı: "🔬 Modül 1: Bitkisel Dokular" → "Bitkisel Dokular"
    const modRawTitle = MODULES[modNum] ? MODULES[modNum].title : '';
    const modName = modRawTitle.replace(/^[^\s]+\s+Modül\s+\d+:\s*/, '').trim() || '';
    const fullTitle = modName ? (modName + ' / ' + title) : title;
    
    document.getElementById('infoEmoji').textContent = emoji;
    document.getElementById('infoTitle').textContent = fullTitle;
    
    // HTML içeriğini parse et ve maddeler halinde göster
    const tmp = document.createElement('div');
    // Seviyeye göre içerik (fallback olarak lise)
    const htmlContent = info[currentLevel] || info.lise || info.html || '';
    tmp.innerHTML = htmlContent;
    
    const listEl = document.getElementById('infoList');
    listEl.innerHTML = '';
    
    if (currentMode === 'sade') {
      // ============ SADE MOD ============
      // Sadece özet paragraf + ilk listenin ilk 3 maddesi (başlık yok)
      
      // İlk paragraf - özet
      const firstP = tmp.querySelector('p');
      if (firstP) {
        const summary = document.createElement('li');
        summary.innerHTML = firstP.innerHTML;
        listEl.appendChild(summary);
      }
      
      // Sadece İLK ul'in İLK 3 li'si
      const firstUl = tmp.querySelector('ul');
      if (firstUl) {
        const liElements = Array.from(firstUl.children).filter(c => c.tagName === 'LI');
        liElements.slice(0, 3).forEach(liEl => {
          const li = document.createElement('li');
          // İç ul varsa (nested) onları gösterme - sadece düz metin
          const clean = liEl.cloneNode(true);
          clean.querySelectorAll('ul').forEach(n => n.remove());
          li.innerHTML = clean.innerHTML.trim();
          listEl.appendChild(li);
        });
      }
    } else {
      // ============ DETAYLI MOD (mevcut) ============
      
      // İlk paragraf - özet
      const firstP = tmp.querySelector('p');
      if (firstP) {
        const summary = document.createElement('li');
        summary.innerHTML = firstP.innerHTML;
        listEl.appendChild(summary);
      }
      
      // H3 başlıklar ve sonraki ul'ler
      tmp.querySelectorAll('h3, ul').forEach(el => {
        if (el.tagName === 'H3') {
          const sub = document.createElement('li');
          sub.className = 'subhead';
          sub.textContent = el.textContent;
          listEl.appendChild(sub);
        } else if (el.tagName === 'UL') {
          el.querySelectorAll('li').forEach(liEl => {
            const li = document.createElement('li');
            li.innerHTML = liEl.innerHTML;
            listEl.appendChild(li);
          });
        }
      });
    }
  }
  
  // SADE MODDA: 3D etiketlerin yarısını gizle (her 2.'sini gösterir)
  setTimeout(() => {
    if (window._labelRefs && window._labelRefs.length > 0) {
      const labelsActuallyOn = labelsOn !== false;
      window._labelRefs.forEach((ref, i) => {
        if (!ref.div) return;
        if (!labelsActuallyOn) {
          ref.div.style.display = 'none';
          ref.div.dataset.userHidden = '1';
          return;
        }
        // Sade: sadece her ikinci etiketi göster (yarıya indir)
        // Detaylı: hepsini göster
        if (currentMode === 'sade' && i % 2 === 1) {
          ref.div.style.display = 'none';
          ref.div.dataset.userHidden = '1';
        } else {
          ref.div.style.display = 'block';
          ref.div.dataset.userHidden = '0';
        }
      });
    }
  }, 50);
  
  // Dropdown'ları güncelle (active state)
  buildTopicDropdown();
}

// =============== ⚖️ KARŞILAŞTIRMA ===============
let _compareIdx = 0;

// Seviyeye göre versiyon anahtarını belirle (4 ayrı seviye)
function _getLevelKey(level) {
  if (level === 'ilkokul' || level === 'ortaokul') return 'basit';
  return 'standart'; // lise, tyt_ayt
}

// COMPARE_DATA veya TABLE_DATA'dan seviyeye uygun datayı çek
// 4 ayrı seviye: ilkokul (1), ortaokul (2), lise (3), tyt_ayt (4)
// Tablo sayıları seviyeye göre artar
function _resolveLevelData(dataset, subKey) {
  const all = dataset[subKey];
  if (!all) return null;
  
  const levelMap = { ilkokul: 1, ortaokul: 2, lise: 3, tyt_ayt: 4 };
  const curr = levelMap[currentLevel] || 3;
  
  // Yeni format: seviye keyleri var ({basit: [...], standart: [...]})
  if (all.basit !== undefined || all.standart !== undefined) {
    // basit ve standart array'lerini birleştir
    const basit = Array.isArray(all.basit) ? all.basit : (all.basit ? [all.basit] : []);
    const standart = Array.isArray(all.standart) ? all.standart : (all.standart ? [all.standart] : []);
    const combined = [...basit, ...standart];
    
    if (combined.length === 0) return null;
    
    // Seviyeye göre tablo sayısı:
    // ilkokul: en basit 1 tablo
    // ortaokul: 2 tablo (basit + 1 detay)
    // lise: son hariç hepsi (en gelişmiş hariç)
    // tyt_ayt: hepsi
    if (curr === 1) {
      // İlkokul: 1 tablo, en basit (basit array varsa ondan, yoksa standart[0])
      return basit.length > 0 ? [basit[0]] : combined.slice(0, 1);
    }
    if (curr === 2) {
      // Ortaokul: 2 tablo (basit + standart'ın ilki)
      return combined.slice(0, Math.min(2, combined.length));
    }
    if (curr === 3) {
      // Lise: son tablo hariç hepsi (en azından 3 tablo veya combined - 1)
      if (combined.length <= 3) return combined;
      return combined.slice(0, combined.length - 1);
    }
    // tyt_ayt: hepsini göster
    return combined;
  }
  
  // Eski format: doğrudan array veya obje
  return all;
}

function renderTableHTML(data, isCompare) {
  const cls = isCompare ? 'cmp-table compare-style' : 'cmp-table';
  let html = '<table class="' + cls + '"><thead><tr>';
  data.headers.forEach(h => html += `<th>${h}</th>`);
  html += '</tr></thead><tbody>';
  data.rows.forEach(row => {
    html += '<tr>';
    row.forEach(cell => html += `<td>${cell}</td>`);
    html += '</tr>';
  });
  html += '</tbody></table>';
  return html;
}

function renderCompareTable() {
  const raw = _resolveLevelData(COMPARE_DATA, currentSub);
  const body = document.getElementById('compareBody');
  const titleEl = document.getElementById('compareTitle');
  const nav = document.getElementById('compareNav');
  
  if (!raw) {
    titleEl.textContent = '⚖️ Karşılaştırma';
    body.innerHTML = '<div class="cmp-no-data">Bu konu için karşılaştırma verisi yok.</div>';
    nav.classList.add('hidden');
    return;
  }
  
  const list = Array.isArray(raw) ? raw : [raw];
  if (_compareIdx >= list.length) _compareIdx = 0;
  const data = list[_compareIdx];
  
  titleEl.textContent = data.title;
  body.innerHTML = renderTableHTML(data, true);
  
  if (list.length > 1) {
    nav.classList.remove('hidden');
    document.getElementById('compareCounter').textContent = `${_compareIdx + 1} / ${list.length}`;
    document.getElementById('comparePrev').disabled = _compareIdx === 0;
    document.getElementById('compareNext').disabled = _compareIdx === list.length - 1;
  } else {
    nav.classList.add('hidden');
  }
}

document.getElementById('btnCompare').onclick = () => {
  _compareIdx = 0;
  renderCompareTable();
  document.getElementById('compareOverlay').classList.add('show');
};
document.getElementById('compareClose').onclick = () => {
  document.getElementById('compareOverlay').classList.remove('show');

  if (e.target.id === 'compareOverlay') {
    document.getElementById('compareOverlay').classList.remove('show');
  }
};
document.getElementById('comparePrev').onclick = () => {
  if (_compareIdx > 0) { _compareIdx--; renderCompareTable(); }
};
document.getElementById('compareNext').onclick = () => {
  const raw = _resolveLevelData(COMPARE_DATA, currentSub);
  const list = Array.isArray(raw) ? raw : [raw];
  if (_compareIdx < list.length - 1) { _compareIdx++; renderCompareTable(); }
};

// =============== 📋 TABLO ===============
let _tableIdx = 0;

function renderInfoTable() {
  const raw = _resolveLevelData(TABLE_DATA, currentSub);
  const body = document.getElementById('tableBody');
  const titleEl = document.getElementById('tableTitle');
  const nav = document.getElementById('tableNav');
  
  if (!raw) {
    titleEl.textContent = '📋 Bilgi Tablosu';
    body.innerHTML = '<div class="cmp-no-data">Bu konu için tablo verisi yok.</div>';
    nav.classList.add('hidden');
    return;
  }
  
  const list = Array.isArray(raw) ? raw : [raw];
  if (_tableIdx >= list.length) _tableIdx = 0;
  const data = list[_tableIdx];
  
  titleEl.textContent = data.title;
  body.innerHTML = renderTableHTML(data, false);
  
  if (list.length > 1) {
    nav.classList.remove('hidden');
    document.getElementById('tableCounter').textContent = `${_tableIdx + 1} / ${list.length}`;
    document.getElementById('tablePrev').disabled = _tableIdx === 0;
    document.getElementById('tableNext').disabled = _tableIdx === list.length - 1;
  } else {
    nav.classList.add('hidden');
  }
}

document.getElementById('btnTable').onclick = () => {
  _tableIdx = 0;
  renderInfoTable();
  document.getElementById('tableOverlay').classList.add('show');
};
document.getElementById('tableClose').onclick = () => {
  document.getElementById('tableOverlay').classList.remove('show');
};
document.getElementById('tableOverlay').onclick = (e) => {
  if (e.target.id === 'tableOverlay') {
    document.getElementById('tableOverlay').classList.remove('show');
  }
};
document.getElementById('tablePrev').onclick = () => {
  if (_tableIdx > 0) { _tableIdx--; renderInfoTable(); }
};
document.getElementById('tableNext').onclick = () => {
  const raw = _resolveLevelData(TABLE_DATA, currentSub);
  const list = Array.isArray(raw) ? raw : [raw];
  if (_tableIdx < list.length - 1) { _tableIdx++; renderInfoTable(); }
};

// =============== Önceki / Sonraki ===============
function navigate(dir) {
  // TÜM konuları tek liste yap
  const allSubs = [];
  Object.keys(MODULES).forEach(modNum => {
    MODULES[modNum].subs.forEach(s => allSubs.push({ modNum: parseInt(modNum), sub: s }));
  });
  
  const idx = allSubs.findIndex(x => x.sub.key === currentSub);
  let newIdx = idx + dir;
  if (newIdx < 0) newIdx = allSubs.length - 1;
  if (newIdx >= allSubs.length) newIdx = 0;
  
  const next = allSubs[newIdx];
  if (next.modNum !== currentModule) {
    selectModule(next.modNum);
  }
  selectSub(next.modNum, next.sub.key);
}

document.getElementById('navNext').onclick = () => navigate(1);
document.getElementById('navPrev').onclick = () => navigate(-1);

// =============== Alt yatay butonlar ===============

// 🔄 Döndür - KAMERA modelin etrafında orbit yapar (görüş açısı değişir)
window._autoSpinActive = false;  // Bu artık SADECE "Çalıştır" tarafından kullanılıyor
document.getElementById('spinBtn').onclick = function() {
  autoSpin = !autoSpin;
  this.classList.toggle('active', autoSpin);
};

// 🏷️ Label (Etiketler)
document.getElementById('labelBtn').onclick = function() {
  labelsOn = !labelsOn;
  labelsVisible = labelsOn;
  this.classList.toggle('active', !labelsOn);
  scene.traverse(obj => {
    if (obj.userData.isLabel && obj.element) {
      obj.element.style.display = labelsOn ? 'block' : 'none';
      obj.element.dataset.userHidden = labelsOn ? '0' : '1';
    }
  });
  // Leader line SVG'yi de gizle
  const svg = document.getElementById('leaderLines');
  if (svg) svg.style.display = labelsOn ? 'block' : 'none';
};

// ▶️ Çalıştır - Konuya özel animasyon başlatır
// Her builder kendine özel window._customAnim fonksiyonu register eder
// Modül 4'te ayrıca slider otomatik salınımı yapar
let isPlaying = false;
let _playTickId = null;
let _playT = 0;

document.getElementById('animBtn').onclick = function() {
  isPlaying = !isPlaying;
  window._isPlayingActive = isPlaying;
  this.classList.toggle('active', isPlaying);
  
  if (isPlaying) {
    // Modül 4'te slider'ı otomatik salla (turgor 0↔100 sinüsoidal)
    if (currentModule === 4) {
      _playT = 0;
      const tick = () => {
        if (!isPlaying) return;
        _playT += 0.015;
        const val = Math.round(50 + 49 * Math.sin(_playT));
        const slider = document.getElementById('turgorSlider');
        if (slider) {
          slider.value = val;
          slider.dispatchEvent(new Event('input'));
        }
        _playTickId = requestAnimationFrame(tick);
      };
      tick();
    }
  } else {
    if (_playTickId) {
      cancelAnimationFrame(_playTickId);
      _playTickId = null;
    }
  }
};

// =============== Slider (Modül 4) ===============
const turgorSlider = document.getElementById('turgorSlider');
const turgorValueEl = document.getElementById('turgorValue');
const stomaDurum = document.getElementById('stomaDurum');

turgorSlider.addEventListener('input', e => {
  turgorValue = parseInt(e.target.value) / 100;
  turgorValueEl.textContent = e.target.value + '%';
  
  if (turgorValue > 0.5) {
    stomaDurum.textContent = '🔓 STOMA AÇIK';
    stomaDurum.style.background = 'rgba(60,180,80,0.3)';
    stomaDurum.style.color = '#6ee7a8';
  } else if (turgorValue > 0.2) {
    stomaDurum.textContent = '🟡 STOMA YARI AÇIK';
    stomaDurum.style.background = 'rgba(180,180,60,0.3)';
    stomaDurum.style.color = '#ffd166';
  } else {
    stomaDurum.textContent = '🔒 STOMA KAPALI';
    stomaDurum.style.background = 'rgba(180,60,60,0.3)';
    stomaDurum.style.color = '#ff8080';
  }
});

// Döndür (kamera orbit) - sadece autoSpin (Döndür butonu) aktifken
const _spinTick = () => {
  if (autoSpin && controls) {
    controls._sphericalTarget.theta += 0.005;
  }
  requestAnimationFrame(_spinTick);
};
_spinTick();

// ============== BAŞLATMA ==============
init();
animate();
buildTopicDropdown();
selectModule(1);

</script>
