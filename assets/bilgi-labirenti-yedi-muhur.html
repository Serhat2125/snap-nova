<script>

// window.storage koprusu: oyun kalici kaydi icin bunu kullaniyor (localStorage)
window.storage = {
  async get(key){ try{ const v=localStorage.getItem('adastore:'+key);
    return v===null?null:{key,value:v,shared:false}; }catch(e){ return null; } },
  async set(key,value){ try{ localStorage.setItem('adastore:'+key,value);
    return {key,value,shared:false}; }catch(e){ return null; } },
  async delete(key){ try{ localStorage.removeItem('adastore:'+key);
    return {key,deleted:true,shared:false}; }catch(e){ return null; } },
  async list(prefix){ try{ const keys=[];
    for(let i=0;i<localStorage.length;i++){ const k=localStorage.key(i);
      if(k&&k.startsWith('adastore:')){ const b=k.slice(9);
        if(!prefix||b.startsWith(prefix)) keys.push(b); } }
    return {keys,prefix,shared:false}; }catch(e){ return null; } },
};
</script>

<script id="labShareNativeV1">
/* ── BAŞARI PAYLAŞIMI ─────────────────────────────────────────────────────
   WebView'da navigator.share yok (file:// güvenli bağlam değil). Oyun bu
   yüzden panoya kopyalayıp ham alert() gösteriyordu — ekranda
   '"file://" adresindeki sayfada şunlar belirtiliyor…' kutusu çıkıyordu.
   Artık Flutter'ın ekran görüntüsü kanalı kullanılır: sertifika/başarı
   tablosu ne haldeyse o görselle sistem paylaş menüsü açılır.
   Ayrıca Başarı Tablosu ekranına da bir "Paylaş" düğmesi eklenir. */
(function(){
  if(window.__labShareInit) return; window.__labShareInit=1;

  function nativeShare(){
    try{
      if(window.FlutterNativeShot && window.FlutterNativeShot.postMessage){
        window.FlutterNativeShot.postMessage('1');
        return true;
      }
    }catch(e){}
    return false;
  }
  window.__labShare=function(){ return nativeShare(); };

  /* alert() yerine sade, oyun içi bildirim */
  window.__labToast=function(msg){
    try{
      var t=document.createElement('div');
      t.textContent=msg;
      t.style.cssText='position:fixed;left:50%;bottom:84px;transform:translateX(-50%);'
        +'z-index:99999;background:rgba(20,26,40,.95);color:#F3E9D2;padding:10px 16px;'
        +'border-radius:12px;font-size:13px;font-weight:700;box-shadow:0 6px 20px rgba(0,0,0,.5);'
        +'border:1.5px solid #C9A24B;max-width:80vw;text-align:center;';
      document.body.appendChild(t);
      setTimeout(function(){ try{ t.remove(); }catch(e){} }, 2200);
    }catch(e){}
  };

  /* ── BAŞARI TABLOSU: paylaş düğmesi ────────────────────────────────────
     Bu ekran React ile çiziliyor; işaretlemeye dokunmadan, ekran
     görünürken beliren yüzen bir düğme eklenir. */
  var btn=null;
  function ensureBtn(){
    if(btn) return btn;
    btn=document.createElement('button');
    btn.id='labShareFab';
    btn.innerHTML='📤 Paylaş';
    btn.style.cssText='display:none;position:fixed;right:14px;bottom:88px;z-index:99998;'
      +'background:linear-gradient(135deg,#C9A24B,#E8C268);color:#1a1408;border:none;'
      +'border-radius:22px;padding:10px 16px;font-family:inherit;font-size:13px;'
      +'font-weight:800;cursor:pointer;box-shadow:0 6px 20px rgba(0,0,0,.45);';
    btn.onclick=function(e){
      e.stopPropagation();
      if(!nativeShare()) window.__labToast('Paylaşım bu ortamda desteklenmiyor.');
    };
    document.body.appendChild(btn);
    return btn;
  }
  function onAchievementScreen(){
    /* Başlıktan tanı: "Başarı Tablosu" görünür durumdaysa */
    var els=document.querySelectorAll('h1,h2,h3,div,span');
    for(var i=0;i<els.length;i++){
      var el=els[i];
      if(el.children.length) continue;              /* yalnız yaprak düğüm */
      var tx=(el.textContent||'').trim();
      if(tx==='Başarı Tablosu' || tx==='Achievements' || tx==='Başarılarım'){
        var r=el.getBoundingClientRect();
        if(r.width>0 && r.height>0) return true;    /* gerçekten görünür */
      }
    }
    return false;
  }
  function tick(){
    try{
      var b=ensureBtn();
      b.style.display = onAchievementScreen() ? 'block' : 'none';
    }catch(e){}
  }
  setInterval(tick, 600);
  document.addEventListener('click', function(){ setTimeout(tick, 250); }, true);
  tick();
})();
</script>
