<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Geçiş Stüdyosu — Ayarlanabilir</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap');
  :root{ --txt:#eaf0ff; --muted:#9fb0d6; --panel:rgba(20,26,46,0.86); --line:rgba(140,160,210,0.22); --acc:#5ad1ff; --acc2:#ffcf5a; }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;overflow:hidden;font-family:'Fredoka',system-ui,sans-serif;color:var(--txt);background:#0b0f1e;}
  #app{position:fixed;inset:0;} canvas{display:block;}
  .vignette{position:fixed;inset:0;pointer-events:none;z-index:5;background:radial-gradient(ellipse at 50% 45%, transparent 52%, rgba(4,7,15,.6) 100%);}
  .top{position:fixed;top:0;left:0;right:0;display:flex;align-items:center;gap:10px;padding:12px 14px;z-index:10;pointer-events:none;flex-wrap:wrap;}
  .brand{font-weight:700;font-size:18px;display:flex;align-items:center;gap:9px;background:var(--panel);backdrop-filter:blur(10px);padding:9px 14px;border-radius:14px;border:1px solid var(--line);box-shadow:0 8px 28px rgba(0,0,0,.35);pointer-events:auto;}
  .brand .dot{width:11px;height:11px;border-radius:50%;background:var(--acc);box-shadow:0 0 14px var(--acc);}
  .spacer{flex:1;}
  .nowtag{pointer-events:auto;background:linear-gradient(135deg,#2a3a66,#1d2748);border:1px solid var(--line);padding:9px 14px;border-radius:14px;font-weight:600;font-size:14px;color:var(--acc2);box-shadow:0 8px 28px rgba(0,0,0,.35);min-width:150px;text-align:center;}
  .midctl{position:fixed;top:60px;left:0;right:0;display:flex;justify-content:center;gap:9px;z-index:10;flex-wrap:wrap;padding:0 10px;}
  .chip{pointer-events:auto;cursor:pointer;background:var(--panel);backdrop-filter:blur(8px);border:1px solid var(--line);color:var(--txt);font-family:inherit;font-weight:600;font-size:14px;padding:9px 15px;border-radius:13px;display:flex;align-items:center;gap:7px;transition:.16s;box-shadow:0 6px 20px rgba(0,0,0,.3);}
  .chip:hover{transform:translateY(-2px);border-color:var(--acc);} .chip:active{transform:scale(.95);}
  .chip.primary{background:linear-gradient(135deg,#3a5cff,#7a5cff);border-color:transparent;box-shadow:0 0 22px rgba(90,120,255,.5);}
  .chip.on{background:linear-gradient(135deg,#3a5cff,#7a5cff);border-color:transparent;}
  .bar{position:fixed;left:0;right:0;bottom:0;z-index:10;padding:10px 10px 14px;background:linear-gradient(0deg, rgba(8,11,22,.93) 30%, rgba(8,11,22,0));}
  .bar-title{text-align:center;color:var(--muted);font-size:12.5px;margin:0 0 8px;font-weight:500;}
  .btns{display:flex;gap:8px;overflow-x:auto;padding:4px;justify-content:center;flex-wrap:wrap;}
  .tbtn{flex:0 0 auto;cursor:pointer;font-family:inherit;font-weight:600;font-size:13px;color:var(--txt);background:linear-gradient(135deg,#27325a,#1c2542);border:1px solid var(--line);padding:9px 11px;border-radius:13px;display:flex;flex-direction:column;align-items:center;gap:3px;min-width:78px;transition:.14s;box-shadow:0 5px 14px rgba(0,0,0,.3);}
  .tbtn .em{font-size:19px;line-height:1;}
  .tbtn:hover{transform:translateY(-3px);border-color:var(--acc);} .tbtn:active{transform:scale(.92);}
  .emoji{position:fixed;z-index:20;pointer-events:none;font-size:clamp(46px,10vw,72px);filter:drop-shadow(0 6px 12px rgba(0,0,0,.45));will-change:transform,opacity;}
  .emoji.happy{animation:emHappy 1.6s cubic-bezier(.2,.9,.3,1.1) forwards;} .emoji.sad{animation:emSad 1.5s ease forwards;}
  @keyframes emHappy{0%{opacity:0;transform:translate(-50%,-20%) scale(.2) rotate(-14deg);}22%{opacity:1;transform:translate(-50%,-78%) scale(1.3) rotate(8deg);}40%{transform:translate(-50%,-70%) scale(1);}60%{transform:translate(-50%,-76%) scale(1.08);}100%{opacity:0;transform:translate(-50%,-110%) scale(.85);}}
  @keyframes emSad{0%{opacity:0;transform:translate(-50%,-65%) scale(.6);}18%{opacity:1;transform:translate(-50%,-62%) scale(1.05);}45%{transform:translate(-50%,-52%) scale(1) rotate(-8deg);}65%{transform:translate(-50%,-44%) rotate(8deg);}100%{opacity:0;transform:translate(-50%,-12%) scale(.7);}}
  .flytitle{position:fixed;top:30%;left:50%;z-index:18;pointer-events:none;font-weight:700;font-size:clamp(22px,5vw,40px);color:#fff;text-shadow:0 3px 18px rgba(90,209,255,.55),0 1px 3px rgba(0,0,0,.6);letter-spacing:.5px;animation:flyTitle 2.1s ease forwards;}
  @keyframes flyTitle{0%{opacity:0;transform:translate(-30%,0) scale(.9);}18%{opacity:1;transform:translate(-50%,0) scale(1);}80%{opacity:1;transform:translate(-50%,0) scale(1);}100%{opacity:0;transform:translate(-62%,0) scale(.96);}}
  .confetti{position:fixed;top:34%;z-index:19;pointer-events:none;width:9px;height:14px;border-radius:2px;will-change:transform,opacity;}
  @keyframes conf{0%{opacity:1;transform:translateY(0) rotate(0);}100%{opacity:0;transform:translateY(300px) rotate(560deg);}}
  /* AYARLAR PANELİ */
  .backdrop{position:fixed;inset:0;z-index:29;background:rgba(4,7,15,.5);opacity:0;pointer-events:none;transition:.2s;}
  .backdrop.open{opacity:1;pointer-events:auto;}
  .drawer{position:fixed;top:0;right:0;height:100%;width:min(380px,90vw);z-index:30;background:linear-gradient(180deg,#141a2e,#101426);border-left:1px solid var(--line);
    box-shadow:-12px 0 40px rgba(0,0,0,.5);transform:translateX(102%);transition:transform .26s cubic-bezier(.3,.8,.3,1);display:flex;flex-direction:column;}
  .drawer.open{transform:translateX(0);}
  .dhead{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--line);}
  .dhead h2{margin:0;font-size:19px;font-weight:700;} .dclose{cursor:pointer;background:none;border:none;color:var(--muted);font-size:24px;line-height:1;}
  .dbody{overflow-y:auto;padding:8px 16px 24px;}
  .sect{margin-top:16px;} .sect h3{margin:0 0 8px;font-size:13px;font-weight:600;color:var(--acc);text-transform:uppercase;letter-spacing:.6px;}
  .row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 0;border-bottom:1px solid rgba(140,160,210,0.10);}
  .row label{font-size:14.5px;font-weight:500;} .row .desc{font-size:11.5px;color:var(--muted);margin-top:2px;}
  .sw{position:relative;width:46px;height:26px;border-radius:14px;background:#2a3350;cursor:pointer;transition:.18s;flex:0 0 auto;border:1px solid var(--line);}
  .sw::after{content:"";position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#cfd8ef;transition:.18s;}
  .sw.on{background:linear-gradient(135deg,#3a5cff,#7a5cff);} .sw.on::after{left:22px;background:#fff;}
  .seg2{display:flex;gap:6px;flex-wrap:wrap;}
  .seg2 button{cursor:pointer;font-family:inherit;font-weight:600;font-size:13px;color:var(--muted);background:#212a45;border:1px solid var(--line);padding:7px 12px;border-radius:10px;transition:.14s;}
  .seg2 button.on{background:linear-gradient(135deg,#3a5cff,#7a5cff);color:#fff;border-color:transparent;}
  select{width:100%;font-family:inherit;font-size:14px;font-weight:600;color:var(--txt);background:#212a45;border:1px solid var(--line);border-radius:10px;padding:9px 10px;}
  .resetbtn{margin-top:18px;width:100%;cursor:pointer;font-family:inherit;font-weight:600;font-size:14px;color:#ffd0d0;background:rgba(255,90,90,.12);border:1px solid rgba(255,120,120,.4);padding:11px;border-radius:12px;}
  @media(max-width:560px){ .brand{font-size:14px;} .tbtn{min-width:70px;font-size:11.5px;padding:8px 8px;} }
</style>
</head>
<body>
<div id="app"></div>
<div class="vignette"></div>
<div class="top">
  <div class="brand"><span class="dot"></span> Geçiş Stüdyosu</div>
  <div class="spacer"></div>
  <div class="nowtag" id="nowtag">Hazır</div>
</div>
<div class="midctl">
  <button class="chip primary" id="goBtn">🎬 Geçiş Yap</button>
  <button class="chip" id="diceBtn">🎲 Rastgele</button>
  <button class="chip" id="autoBtn">▶ Sırayla</button>
  <button class="chip" id="settingsBtn">⚙️ Ayarlar</button>
</div>
<div class="bar">
  <p class="bar-title">⚙️ Ayarlar'dan her şeyi kendine göre seç · 🎬 Geçiş Yap senin ayarlarınla çalışır · alttan tek tek efekt de deneyebilirsin</p>
  <div class="btns" id="btns"></div>
</div>

<div class="backdrop" id="backdrop"></div>
<aside class="drawer" id="drawer">
  <div class="dhead"><h2>⚙️ Ayarlar</h2><button class="dclose" id="dclose">×</button></div>
  <div class="dbody" id="dbody"></div>
</aside>

<!-- Çevrimdışı: three çekirdeği yerel klasik scriptten gelir (CDN yok, importmap/ES-module gerektirmez — eski WebView'lerde de çalışır) -->
<script type="importmap">
{ "imports": { "three": "./three.module.min.js" } }
</script>
<script src="./three.global.js"></script>

<script type="module">
const THREE = window.THREE;

// ---------- INLINE OrbitControls (çevrimdışı; CDN addon yok) ----------
// three OrbitControls ile uyumlu temel API: enableDamping, dampingFactor,
// target, minDistance, maxDistance, update(); fare sürükle + tekerlek + dokunma.
class OrbitControls {
  constructor(object, domElement){
    this.object=object; this.domElement=domElement;
    this.target=new THREE.Vector3();
    this.enableDamping=false; this.dampingFactor=0.08;
    this.minDistance=0.1; this.maxDistance=Infinity;
    this.enabled=true; this.rotateSpeed=1.0;
    this._sph={theta:0,phi:0,radius:1};
    this._tsph={theta:0,phi:0,radius:1};
    this._state='none'; this._lx=0; this._ly=0;
    this._sync();
    const el=domElement;
    const onDown=(e)=>{ if(!this.enabled)return; this._state='rotate'; this._lx=e.clientX; this._ly=e.clientY; };
    const onMove=(e)=>{ if(this._state!=='rotate'||!this.enabled)return; const dx=e.clientX-this._lx, dy=e.clientY-this._ly; this._lx=e.clientX; this._ly=e.clientY; this._tsph.theta-=dx*0.005*this.rotateSpeed; this._tsph.phi-=dy*0.005*this.rotateSpeed; this._clampPhi(); };
    const onUp=()=>{ this._state='none'; };
    el.addEventListener('mousedown',onDown);
    window.addEventListener('mousemove',onMove);
    window.addEventListener('mouseup',onUp);
    el.addEventListener('wheel',(e)=>{ if(!this.enabled)return; e.preventDefault(); const f=e.deltaY>0?1.1:0.9; this._tsph.radius=this._clampR(this._tsph.radius*f); }, {passive:false});
    let pinchStart=0, pinchR=0, lx=0, ly=0;
    el.addEventListener('touchstart',(e)=>{ if(!this.enabled)return; if(e.touches.length===1){ this._state='rotate'; lx=e.touches[0].clientX; ly=e.touches[0].clientY; } else if(e.touches.length===2){ this._state='pinch'; const dx=e.touches[0].clientX-e.touches[1].clientX, dy=e.touches[0].clientY-e.touches[1].clientY; pinchStart=Math.hypot(dx,dy)||1; pinchR=this._tsph.radius; } },{passive:true});
    el.addEventListener('touchmove',(e)=>{ if(!this.enabled||this._state==='none')return; e.preventDefault(); if(this._state==='rotate'&&e.touches.length===1){ const dx=e.touches[0].clientX-lx, dy=e.touches[0].clientY-ly; lx=e.touches[0].clientX; ly=e.touches[0].clientY; this._tsph.theta-=dx*0.005; this._tsph.phi-=dy*0.005; this._clampPhi(); } else if(this._state==='pinch'&&e.touches.length===2){ const dx=e.touches[0].clientX-e.touches[1].clientX, dy=e.touches[0].clientY-e.touches[1].clientY; const d=Math.hypot(dx,dy)||1; this._tsph.radius=this._clampR(pinchR*(pinchStart/d)); } },{passive:false});
    el.addEventListener('touchend',(e)=>{ if(e.touches&&e.touches.length===1){ this._state='rotate'; lx=e.touches[0].clientX; ly=e.touches[0].clientY; } else { this._state='none'; } });
    el.addEventListener('contextmenu',(e)=>e.preventDefault());
  }
  _clampPhi(){ const EPS=0.001; this._tsph.phi=Math.max(EPS,Math.min(Math.PI-EPS,this._tsph.phi)); }
  _clampR(r){ return Math.max(this.minDistance,Math.min(this.maxDistance,r)); }
  _sync(){ const o=this.object.position, t=this.target; const dx=o.x-t.x,dy=o.y-t.y,dz=o.z-t.z; const r=Math.hypot(dx,dy,dz)||1; this._sph.radius=this._tsph.radius=r; this._sph.theta=this._tsph.theta=Math.atan2(dx,dz); this._sph.phi=this._tsph.phi=Math.acos(Math.max(-1,Math.min(1,dy/r))); }
  update(){ const s=this._sph,t=this._tsph; if(this.enableDamping){ const f=this.dampingFactor; s.theta+=(t.theta-s.theta)*f; s.phi+=(t.phi-s.phi)*f; s.radius+=(t.radius-s.radius)*f; } else { s.theta=t.theta; s.phi=t.phi; s.radius=t.radius; } const sinPhi=Math.sin(s.phi); this.object.position.set( this.target.x+s.radius*sinPhi*Math.sin(s.theta), this.target.y+s.radius*Math.cos(s.phi), this.target.z+s.radius*sinPhi*Math.cos(s.theta)); this.object.lookAt(this.target); return true; }
}

// ---------- AYARLAR ----------
const DEF={ level:'karisik', enterMode:'rastgele', exitMode:'rastgele', speed:1.0, overlap:true, sound:true, stereo:true, emoji:false, shadow:true, bloom:true, trails:true, atmos:true, title:false, confetti:false, calm:false };
let S=Object.assign({},DEF);
try{ const sv=localStorage.getItem('gecisAyar3'); if(sv) S=Object.assign({},DEF,JSON.parse(sv)); }catch(e){}
function saveS(){ try{ localStorage.setItem('gecisAyar3', JSON.stringify(S)); }catch(e){} }
const effSpeed =()=> S.calm? S.speed*1.5 : S.speed;
const effOverlap=()=> S.calm? false : S.overlap;
const effBloom  =()=> S.bloom && !S.calm;
const effTrails =()=> S.trails && !S.calm;
const effConfetti=()=> S.confetti && !S.calm;

const FLOOR=-2.6;
const app=document.getElementById('app');
const scene=new THREE.Scene();
function bgTexture(){ const c=document.createElement('canvas'); c.width=4;c.height=256; const g=c.getContext('2d'); const grd=g.createLinearGradient(0,0,0,256);
  grd.addColorStop(0,'#243970'); grd.addColorStop(0.45,'#16213c'); grd.addColorStop(1,'#090d1a'); g.fillStyle=grd; g.fillRect(0,0,4,256); const t=new THREE.CanvasTexture(c); t.colorSpace=THREE.SRGBColorSpace; return t; }
scene.background=bgTexture();
const camera=new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.1, 100); camera.position.set(0,1.4,12);
const renderer=new THREE.WebGLRenderer({antialias:true}); renderer.setSize(innerWidth,innerHeight); renderer.setPixelRatio(Math.min(2,devicePixelRatio)); renderer.outputColorSpace=THREE.SRGBColorSpace; app.appendChild(renderer.domElement);
const controls=new OrbitControls(camera, renderer.domElement); controls.enableDamping=true; controls.dampingFactor=0.08; controls.target.set(0,0.2,0); controls.minDistance=6; controls.maxDistance=24;
scene.add(new THREE.AmbientLight(0xffffff,0.55));
const klight=new THREE.DirectionalLight(0xffffff,1.15); klight.position.set(5,8,7); scene.add(klight);
const rim=new THREE.DirectionalLight(0x8ab4ff,0.6); rim.position.set(-6,3,-4); scene.add(rim);
const grid=new THREE.GridHelper(24,24,0x3a4a78,0x29335c); grid.position.y=FLOOR; grid.material.transparent=true; grid.material.opacity=0.33; scene.add(grid);
const bokeh=[]; for(let i=0;i<30;i++){ const s=new THREE.Mesh(new THREE.SphereGeometry(0.05+Math.random()*0.12,8,8),new THREE.MeshBasicMaterial({color:[0x5ad1ff,0x7a8cff,0xffd56b,0xff8ab0][i%4],transparent:true,opacity:0.12+Math.random()*0.12,blending:THREE.AdditiveBlending,depthWrite:false})); s.position.set((Math.random()-0.5)*22,(Math.random()-0.3)*12,-6-Math.random()*12); s.userData.spd=0.2+Math.random()*0.5; scene.add(s); bokeh.push(s); }
function radialTex(){ const c=document.createElement('canvas'); c.width=c.height=128; const g=c.getContext('2d'); const grd=g.createRadialGradient(64,64,2,64,64,62); grd.addColorStop(0,'rgba(255,255,255,1)'); grd.addColorStop(1,'rgba(255,255,255,0)'); g.fillStyle=grd; g.fillRect(0,0,128,128); return new THREE.CanvasTexture(c); }
const SHADOW_TEX=radialTex();
// Bloom (postprocessing) yalnızca internet + CDN addon varsa yüklenir; çevrimdışı
// yüklenemezse sessizce sade render'a düşer.
let composer=null;
(async()=>{ try{ const {EffectComposer}=await import('three/addons/postprocessing/EffectComposer.js'); const {RenderPass}=await import('three/addons/postprocessing/RenderPass.js'); const {UnrealBloomPass}=await import('three/addons/postprocessing/UnrealBloomPass.js'); const {OutputPass}=await import('three/addons/postprocessing/OutputPass.js');
  composer=new EffectComposer(renderer); composer.addPass(new RenderPass(scene,camera)); composer.addPass(new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight),0.5,0.55,0.82)); composer.addPass(new OutputPass()); }catch(e){ composer=null; } })();

function mat(c,r=0.5,m=0.15){ return new THREE.MeshStandardMaterial({color:c,roughness:r,metalness:m}); }
function box(w,h,d,c){ return new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat(c)); }
function sph(r,c){ return new THREE.Mesh(new THREE.SphereGeometry(r,28,20),mat(c,0.35,0.2)); }
function cyl(rt,rb,h,c){ return new THREE.Mesh(new THREE.CylinderGeometry(rt,rb,h,18),mat(c)); }
function put(m,x,y,z){ m.position.set(x,y,z); return m; }
function bond(a,b,c){ const dir=new THREE.Vector3().subVectors(b,a); const len=dir.length(); const m=cyl(0.12,0.12,len,c); m.position.copy(a.clone().lerp(b,0.5)); m.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),dir.normalize()); return m; }
// ---- prosedürel doku üretimi (canvas; tek seferlik, önbellekli) ----
const TEX={};
function mkRand(seed){ let s=(seed>>>0)||1; return ()=>{ s^=s<<13;s>>>=0; s^=s>>>17; s^=s<<5;s>>>=0; return s/4294967296; }; }
function mkPerlin(seed){ const rnd=mkRand(seed); const pp=[]; for(let i=0;i<256;i++)pp[i]=i; for(let i=255;i>0;i--){ const j=Math.floor(rnd()*(i+1)); const t=pp[i];pp[i]=pp[j];pp[j]=t; } const perm=new Uint8Array(512); for(let i=0;i<512;i++)perm[i]=pp[i&255];
  const fade=t=>t*t*t*(t*(t*6-15)+10); const lp=(a,b,t)=>a+(b-a)*t;
  const grad=(h,x,y)=>{ const g=h&7; const u=g<4?x:y, v=g<4?y:x; return ((g&1)?-u:u)+((g&2)?-2*v:2*v); };
  return function(x,y){ const X=Math.floor(x)&255,Y=Math.floor(y)&255; x-=Math.floor(x); y-=Math.floor(y); const u=fade(x),v=fade(y); const A=perm[X]+Y,B=perm[X+1]+Y;
    return lp(lp(grad(perm[A],x,y),grad(perm[B],x-1,y),u), lp(grad(perm[A+1],x,y-1),grad(perm[B+1],x-1,y-1),u), v); }; }
function fbm(n,x,y,oct,lac,gain){ let a=0,amp=0.5,f=1; for(let i=0;i<oct;i++){ a+=amp*n(x*f,y*f); f*=lac; amp*=gain; } return a; }
function cnv(W,H){ const c=document.createElement('canvas'); c.width=W;c.height=H; return c; }
const cl01=v=>v<0?0:v>1?1:v;

function earthTextures(){ if(TEX.earth) return; const W=1024,H=512; const col=cnv(W,H),cx=col.getContext('2d'),cd=cx.createImageData(W,H);
  const rough=cnv(W,H),rxg=rough.getContext('2d'),rd=rxg.createImageData(W,H); const n=mkPerlin(7),n2=mkPerlin(99);
  for(let j=0;j<H;j++){ const latC=Math.abs(j/H-0.5)*2; for(let i=0;i<W;i++){ const u=i/W*6,v=j/H*3;
    let e=fbm(n,u,v,6,2,0.5); const cont=fbm(n2,u*0.5,v*0.5,3,2,0.5); e=e*0.55+cont*0.85;
    const idx=(j*W+i)*4; let r,g,b,ro;
    if(e<0.02){ const d=cl01((0.02-e)*6); r=10+(1-d)*22; g=42+(1-d)*64; b=92+(1-d)*92; ro=45; }
    else { const h=cl01(e); if(h<0.07){ r=205;g=192;b=140; } else if(h<0.34){ r=46+h*40;g=120-h*45;b=48; } else { r=120-h*34;g=96-h*24;b=66-h*12; } ro=215; }
    if(latC>0.8){ const t=cl01((latC-0.8)/0.2); r+= (246-r)*t; g+=(249-g)*t; b+=(255-b)*t; ro+=(120-ro)*t; }
    cd.data[idx]=r; cd.data[idx+1]=g; cd.data[idx+2]=b; cd.data[idx+3]=255; rd.data[idx]=rd.data[idx+1]=rd.data[idx+2]=ro; rd.data[idx+3]=255; } }
  cx.putImageData(cd,0,0); rxg.putImageData(rd,0,0);
  const cl=cnv(W,H),clx=cl.getContext('2d'),ld=clx.createImageData(W,H),nc=mkPerlin(2024);

  patla:{ label:'Patlayıp Toplanma', em:'💥', dur:1400, init(G){ G.children.forEach(c=>{ const d=new THREE.Vector3(Math.random()-0.5,Math.random()-0.5,Math.random()-0.5).normalize().multiplyScalar(6+Math.random()*2); c.userData.pstart=c.userData.home.clone().add(d); c.userData.spin=(Math.random()-0.5)*10; c.position.copy(c.userData.pstart); c.scale.set(0.01,0.01,0.01); c.material.transparent=true; c.material.opacity=0; }); }, update(G,p){ const e=ease(p); G.children.forEach(c=>{ c.position.lerpVectors(c.userData.pstart,c.userData.home,e); const s=c.userData.homeScale; c.scale.set(s.x*e,s.y*e,s.z*e); c.rotation.set(c.userData.spin*(1-e),c.userData.spin*(1-e),0); c.material.opacity=clamp(e*1.4); c.material.transparent=e<1; }); } },
  don:{ label:'Dönerek', em:'🌀', dur:1200, init(G){ G.scale.set(0.01,0.01,0.01); G.rotation.y=-Math.PI*4; setOpacityOf(G,0); }, update(G,p){ const e=Math.max(0.01,easeOutBack(clamp(p))); G.scale.set(e,e,e); G.rotation.y=-Math.PI*4*(1-ease(p)); setOpacityOf(G,ease(p)); }, done(G){ G.scale.set(1,1,1); G.rotation.y=0; } },
  toz:{ label:'Sihirli Toz', em:'🪄', dur:1500, init(G){ G.scale.set(0.01,0.01,0.01); setOpacityOf(G,0); G.userData.tmp.sp=[]; for(let i=0;i<46;i++){ const s=new THREE.Mesh(new THREE.SphereGeometry(0.07+Math.random()*0.06,8,8),new THREE.MeshBasicMaterial({color:[0xfff1a8,0x9be7ff,0xffd56b,0xb59bff][i%4],transparent:true,opacity:1,blending:THREE.AdditiveBlending,depthWrite:false})); s.position.set(0,0.2,0); s.userData.v=new THREE.Vector3(Math.random()-0.5,Math.random()-0.3,Math.random()-0.5).normalize().multiplyScalar(3.5+Math.random()*2.5); scene.add(s); G.userData.fx.push(s); G.userData.tmp.sp.push(s); } }, update(G,p){ G.userData.tmp.sp.forEach(s=>{ s.position.copy(s.userData.v).multiplyScalar(ease(p)); s.position.y+=0.2; s.material.opacity=clamp(1-p*1.1); const sc=clamp(1-p); s.scale.set(sc,sc,sc); }); const a=ease(clamp((p-0.18)/0.7)); G.scale.set(a,a,a); setOpacityOf(G,a); }, done(G){ G.scale.set(1,1,1); } },
  dalga:{ label:'Dalga Sırası', em:'🌊', dur:1400, init(G){ const ch=G.children.slice().sort((a,b)=>a.userData.home.x-b.userData.home.x); ch.forEach((c,i)=>{ c.userData.o=i/Math.max(1,ch.length-1); c.scale.set(0.01,0.01,0.01); c.material.transparent=true; c.material.opacity=0; c.visible=false; }); }, update(G,p){ G.children.forEach(c=>{ const a=clamp((p-c.userData.o*0.6)/0.4); const e=easeOutBack(clamp(a)); const s=c.userData.homeScale; c.scale.set(Math.max(0.01,s.x*e),Math.max(0.01,s.y*e),Math.max(0.01,s.z*e)); c.position.copy(c.userData.home); c.position.y+=(1-clamp(a))*-0.5; c.visible=a>0.01; c.material.opacity=clamp(a*1.3); c.material.transparent=a<1; }); } },
  yerden:{ label:'Yerden Yükselme', em:'🛗', dur:1400, init(G){ G.position.y=-5; setOpacityOf(G,0); const ring=new THREE.Mesh(new THREE.TorusGeometry(1.2,0.12,12,40),new THREE.MeshBasicMaterial({color:0x7be0ff,transparent:true,opacity:0.9})); ring.rotation.x=-Math.PI/2; ring.position.y=FLOOR+0.05; ring.scale.set(0.1,0.1,0.1); scene.add(ring); G.userData.fx.push(ring); G.userData.tmp.ring=ring; }, update(G,p){ const e=ease(p); G.position.y=-5*(1-e); setOpacityOf(G,clamp(e*1.5)); const rs=0.3+ease(clamp(p*1.3))*2.6; G.userData.tmp.ring.scale.set(rs,rs,rs); G.userData.tmp.ring.material.opacity=Math.sin(clamp(p)*Math.PI)*0.9; }, done(G){ G.position.y=0; } },
  uzaydan:{ label:'Uzaydan İniş', em:'⭐', dur:1300, init(G){ G.position.z=-26; setOpacityOf(G,0); G.rotation.y=-1.2; }, update(G,p){ const e=easeOutBack(clamp(p)); G.position.z=-26*(1-e); G.rotation.y=-1.2*(1-ease(p)); setOpacityOf(G,clamp(p*2)); }, done(G){ G.position.z=0; G.rotation.y=0; } },
  balon:{ label:'Balon Şişme', em:'🫧', dur:1300, init(G){ G.scale.set(0.01,0.01,0.01); setOpacityOf(G,0); }, update(G,p){ const b=Math.max(0.01,easeOutBack(clamp(p))); G.scale.set(Math.max(0.01,b*(1+0.12*Math.sin(p*Math.PI*6))),Math.max(0.01,b*(1+0.12*Math.sin(p*Math.PI*6+2))),Math.max(0.01,b*(1+0.12*Math.sin(p*Math.PI*6+4)))); setOpacityOf(G,ease(clamp(p*1.5))); }, done(G){ G.scale.set(1,1,1); } },
  sagdan:{ label:'Sağdan Uzaktan', em:'➡️', dur:2400, init(G){ G.position.set(13,0,-10); G.rotation.y=0.9; G.scale.set(0.6,0.6,0.6); setOpacityOf(G,0); makeStreaks(G,0x9be7ff); }, update(G,p){ const e=ease(p); G.position.x=13*(1-e); G.position.z=-10*(1-e); G.rotation.y=0.9*(1-e); const s=0.6+0.4*e; G.scale.set(s,s,s); setOpacityOf(G,clamp(p*1.5)); updateStreaks(G,p,1); }, done(G){ G.position.set(0,0,0); G.rotation.y=0; G.scale.set(1,1,1); } }
};
const EXITS={
  kucul:{ label:'Küçülüp gitme', dur:2200, init(G){ setOpacityOf(G,1); }, update(G,p){ const e=easeInBack(clamp(p)); const s=Math.max(0.001,1-e); G.scale.set(s,s,s); G.position.y=-clamp(e)*1.2; setOpacityOf(G,clamp(1-p*1.1)); } },
  ucup:{ label:'Uçup gitme', dur:2200, init(G){ setOpacityOf(G,1); }, update(G,p){ const e=ease(p); G.position.y=e*9; G.rotation.z=e*0.6; const s=Math.max(0.001,1-e*0.6); G.scale.set(s,s,s); setOpacityOf(G,clamp(1-p*1.2)); } },
  donout:{ label:'Dönüp gitme', dur:2200, init(G){ setOpacityOf(G,1); }, update(G,p){ const e=ease(p); G.rotation.y=e*Math.PI*4; const s=Math.max(0.001,1-e); G.scale.set(s,s,s); setOpacityOf(G,clamp(1-p*1.1)); } },
  dagil:{ label:'Dağılıp gitme', dur:2300, init(G){ G.children.forEach(c=>{ c.userData.ddir=new THREE.Vector3(Math.random()-0.5,Math.random()-0.2,Math.random()-0.5).normalize(); c.material.transparent=true; }); }, update(G,p){ const e=ease(p); G.children.forEach(c=>{ c.position.copy(c.userData.home).addScaledVector(c.userData.ddir, e*5.5); const s=c.userData.homeScale; const k=Math.max(0.001,1-e); c.scale.set(s.x*k,s.y*k,s.z*k); c.material.opacity=clamp(1-p*1.2); }); } },
  sondur:{ label:'Sönüp gitme', dur:2000, init(G){ setOpacityOf(G,1); }, update(G,p){ const e=ease(p); setOpacityOf(G,1-e); G.scale.setScalar(Math.max(0.001,1-e*0.25)); } },
  soldan:{ label:'Soldan uzaklaşma', dur:2300, init(G){ setOpacityOf(G,1); makeStreaks(G,0xffb066); }, update(G,p){ const e=ease(p); G.position.x=-e*12; G.position.z=-e*11; G.rotation.y=e*0.7; const s=Math.max(0.001,1-e*0.85); G.scale.set(s,s,s); setOpacityOf(G,clamp(1-p*1.02)); updateStreaks(G,p,1); }, done(G){} }
};
const ALL=['insa','hologram','zipla','patla','don','toz','dalga','yerden','uzaydan','balon'];
const EXIT_LIST=['kucul','ucup','donout','dagil','sondur'];
const POOLS={ ilkokul:['zipla','toz','balon','dalga','don','yerden'], ortaokul:['insa','dalga','patla','uzaydan','don','yerden','balon'], lise:['insa','hologram','uzaydan','patla','dalga'], karisik:ALL.slice() };

let active=[]; let currentG=null; let lastName='', lastExit='';
function startEnterOn(G,name,delay){ resetGroup(G); const tr=TRANS[name]; G.userData.tmp={}; tr.init&&tr.init(G); active.push({G,kind:'enter',name,t0:performance.now(),dur:tr.dur*effSpeed(),tr,delay:delay||0,fired:false}); lastName=name; }
function startExitOn(G,name){ const tr=EXITS[name]; tr.init&&tr.init(G); active.push({G,kind:'exit',name,t0:performance.now(),dur:tr.dur*effSpeed(),tr,delay:0,fired:true}); lastExit=name; }
function pickEnter(){ const pool=POOLS[S.level]; let n; do{ n=pool[Math.floor(Math.random()*pool.length)]; }while(n===lastName&&pool.length>1); return n; }
function pickExit(){ let n; do{ n=EXIT_LIST[Math.floor(Math.random()*EXIT_LIST.length)]; }while(n===lastExit&&EXIT_LIST.length>1); return n; }
function chooseEnter(){ return S.enterMode==='rastgele'? pickEnter() : (TRANS[S.enterMode]?S.enterMode:pickEnter()); }
function chooseExit(){ return S.exitMode==='rastgele'? pickExit() : (EXITS[S.exitMode]?S.exitMode:pickExit()); }
function doTransition(enterName, exitName){
  const oldG=currentG; let happyDelay=0;
  if(oldG){ active=active.filter(a=>a.G!==oldG); resetGroup(oldG); const ex=exitName||chooseExit(); startExitOn(oldG,ex); showEmoji('sad','left'); playSound('veda'); happyDelay = effOverlap()?550:Math.max(EXITS[ex].dur*effSpeed()-150, 900); }
  const newIdx = oldG? (oldG.userData.idx+1)%3 : 0; const G=buildModelGroup(newIdx); currentG=G;
  startEnterOn(G, enterName, happyDelay);
  setTimeout(()=>{ showEmoji('happy','right'); showTitle(MODELS[newIdx]); if(effConfetti() && S.level==='ilkokul') confetti(); }, happyDelay);
  const exLabel = oldG? EXITS[lastExit].label : '—';
  document.getElementById('nowtag').textContent=(oldG?('🥲 '+exLabel+'  ·  '):'')+'😄 '+TRANS[enterName].label;
}

// ---------- UI ----------
const btns=document.getElementById('btns');
ALL.forEach(name=>{ const t=TRANS[name]; const b=document.createElement('button'); b.className='tbtn'; b.innerHTML='<span class="em">'+t.em+'</span><span>'+t.label+'</span>'; b.onclick=()=>{ ensureAudio(); stopAuto(); doTransition(name); }; btns.appendChild(b); });
document.getElementById('goBtn').onclick=()=>{ ensureAudio(); stopAuto(); doTransition(chooseEnter(), chooseExit()); };
document.getElementById('diceBtn').onclick=()=>{ ensureAudio(); stopAuto(); doTransition(pickEnter()); };
let auto=false, autoIdx=0, autoTimer=null; const autoBtn=document.getElementById('autoBtn');
function stopAuto(){ auto=false; autoBtn.classList.remove('on'); autoBtn.textContent='▶ Sırayla'; if(autoTimer)clearTimeout(autoTimer); }
function autoStep(){ if(!auto)return; const pool=POOLS[S.level]; doTransition(pool[autoIdx%pool.length]); autoIdx++; autoTimer=setTimeout(autoStep,3600); }
autoBtn.onclick=()=>{ ensureAudio(); if(auto){ stopAuto(); } else { auto=true; autoIdx=0; autoBtn.classList.add('on'); autoBtn.textContent='⏸ Durdur'; autoStep(); } };
addEventListener('resize',()=>{ camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight); if(composer)composer.setSize(innerWidth,innerHeight); });

// ---------- AYARLAR PANELİ ----------
const drawer=document.getElementById('drawer'), backdrop=document.getElementById('backdrop'), dbody=document.getElementById('dbody');
function openSettings(){ drawer.classList.add('open'); backdrop.classList.add('open'); }
function closeSettings(){ drawer.classList.remove('open'); backdrop.classList.remove('open'); }
document.getElementById('settingsBtn').onclick=()=>{ ensureAudio(); openSettings(); };
document.getElementById('dclose').onclick=closeSettings; backdrop.onclick=closeSettings;
function applyLive(){ bokeh.forEach(b=>b.visible=S.atmos); saveS(); }
function toggleRow(label, key, desc){ const row=document.createElement('div'); row.className='row';
  const left=document.createElement('div'); left.innerHTML='<label>'+label+'</label>'+(desc?'<div class="desc">'+desc+'</div>':'');
  const sw=document.createElement('div'); sw.className='sw'+(S[key]?' on':''); sw.onclick=()=>{ S[key]=!S[key]; sw.classList.toggle('on',S[key]); applyLive(); }; row.append(left,sw); return row; }
function segRow(label, key, opts){ const wrap=document.createElement('div'); wrap.className='sect'; wrap.innerHTML='<h3>'+label+'</h3>'; const seg=document.createElement('div'); seg.className='seg2';
  opts.forEach(o=>{ const b=document.createElement('button'); b.textContent=o.t; if(S[key]===o.v)b.classList.add('on'); b.onclick=()=>{ S[key]=o.v; seg.querySelectorAll('button').forEach(x=>x.classList.remove('on')); b.classList.add('on'); applyLive(); }; seg.appendChild(b); }); wrap.appendChild(seg); return wrap; }
function selectRow(label, key, opts){ const wrap=document.createElement('div'); wrap.className='sect'; wrap.innerHTML='<h3>'+label+'</h3>'; const sel=document.createElement('select');
  opts.forEach(o=>{ const op=document.createElement('option'); op.value=o.v; op.textContent=o.t; if(S[key]===o.v)op.selected=true; sel.appendChild(op); }); sel.onchange=()=>{ S[key]=sel.value; applyLive(); }; wrap.appendChild(sel); return wrap; }
function sectTitle(t){ const h=document.createElement('div'); h.className='sect'; h.innerHTML='<h3>'+t+'</h3>'; return h; }
function buildSettings(){ dbody.innerHTML='';
  dbody.appendChild(segRow('Eğitim Seviyesi','level',[{t:'🧒 İlkokul',v:'ilkokul'},{t:'🧑 Ortaokul',v:'ortaokul'},{t:'🎓 Lise',v:'lise'},{t:'🎲 Karışık',v:'karisik'}]));
  const enterOpts=[{t:'Yaşa göre rastgele',v:'rastgele'},{t:'Sağdan Uzaktan',v:'sagdan'}].concat(ALL.map(k=>({t:TRANS[k].em+' '+TRANS[k].label,v:k})));
  dbody.appendChild(selectRow('Geçiş (giriş) efekti','enterMode',enterOpts));
  const exitOpts=[{t:'Rastgele',v:'rastgele'},{t:'Soldan uzaklaşma',v:'soldan'}].concat(EXIT_LIST.map(k=>({t:EXITS[k].label,v:k})));
  dbody.appendChild(selectRow('Çıkış (veda) efekti','exitMode',exitOpts));
  dbody.appendChild(segRow('Hız','speed',[{t:'🐢 Yavaş',v:1.5},{t:'Normal',v:1.0},{t:'⚡ Hızlı',v:0.65}]));
  const s1=sectTitle('Akış'); dbody.appendChild(s1); s1.appendChild(toggleRow('Üst üste geçiş','overlap','Eski çıkarken yeni aynı anda gelir'));
  const s2=sectTitle('Ses'); dbody.appendChild(s2); s2.appendChild(toggleRow('Ses','sound')); s2.appendChild(toggleRow('Stereo (sol/sağ)','stereo','Giden sola, gelen sağa duyulur'));
  const s3=sectTitle('Görsel Efektler'); dbody.appendChild(s3); s3.appendChild(toggleRow('Yer gölgesi + ışık','shadow')); s3.appendChild(toggleRow('Bloom parıltı','bloom')); s3.appendChild(toggleRow('Hareket izleri','trails')); s3.appendChild(toggleRow('Atmosfer parçacıkları','atmos'));
  const s4=sectTitle('Eğitsel / Eğlence'); dbody.appendChild(s4); s4.appendChild(toggleRow('Uçan konu başlığı','title')); s4.appendChild(toggleRow('Emoji','emoji')); s4.appendChild(toggleRow('Konfeti (İlkokul)','confetti')); s4.appendChild(toggleRow('Sakin mod','calm','Azaltılmış hareket; ağır efektler kapanır'));
  const rb=document.createElement('button'); rb.className='resetbtn'; rb.textContent='↺ Varsayılana Sıfırla'; rb.onclick=()=>{ S=Object.assign({},DEF); applyLive(); buildSettings(); }; dbody.appendChild(rb);
}
buildSettings(); applyLive();

function animate(){ requestAnimationFrame(animate);
  for(let i=active.length-1;i>=0;i--){ const a=active[i]; const el=performance.now()-a.t0-a.delay; if(el<0) continue; if(!a.fired){ a.fired=true; if(a.kind==='enter') playSound(a.name); } const p=clamp(el/a.dur); a.tr.update(a.G,p);
    if(p>=1){ a.tr.done&&a.tr.done(a.G); if(a.kind==='exit'){ disposeGroup(a.G); } else { resetGroup(a.G); playSound('settle'); } active.splice(i,1); if(active.length===0) document.getElementById('nowtag').textContent='Hazır'; } }
  liveGroups.forEach(updateShadow);
  if(active.length===0 && currentG) currentG.rotation.y+=0.0016;
  if(S.atmos) bokeh.forEach(s=>{ s.position.y+=s.userData.spd*0.01; if(s.position.y>8){ s.position.y=-7; s.position.x=(Math.random()-0.5)*22; } });
  controls.update(); if(composer && effBloom()) composer.render(); else renderer.render(scene,camera); }
doTransition(chooseEnter(), chooseExit()); animate();
</script>
</body>
