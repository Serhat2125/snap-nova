const tmpV=new THREE.Vector3();
const tmpW=new THREE.Vector3();
const tmpC=new THREE.Vector3();
function updateLabels(){
  tmpC.set(0,0,0); shapeGroup.localToWorld(tmpC);
  const dCenter=camera.position.distanceTo(tmpC);
  labelAnchors.forEach(a=>{
    if(!labelsVisible){a.elM.style.display='none'; return;}
    tmpW.copy(a.pos); shapeGroup.localToWorld(tmpW);
    const dLabel=camera.position.distanceTo(tmpW);
    if(dLabel>dCenter+0.5){a.elM.style.display='none'; return;}
    tmpV.copy(tmpW); tmpV.project(camera);
    if(tmpV.z>=1){a.elM.style.display='none'; return;}
    a.elM.style.display='block';
    a.elM.style.left=((tmpV.x*0.5+0.5)*innerWidth)+'px';
    a.elM.style.top=((-tmpV.y*0.5+0.5)*innerHeight)+'px';
  });
}

/* ============================================================
   ANİMASYONLAR
   ============================================================ */
function updateAnimations(dt){
  if(!animPlaying) return;
  animT+=dt;
  if(animT>1) animT=0;
  const key=current?.key;

  if(key==='noron'){
    animatedItems.forEach(it=>{
      if(it.type==='impulse'){
        it.mesh.material.opacity=(animT>0.05 && animT<0.95)?1:0;
        it.mesh.position.x=it.startX+(it.endX-it.startX)*animT;
      }
    });
  }

  if(key==='sinaps'){
    animatedItems.forEach(it=>{
      if(it.type==='vesicle'){
        it.mesh.position.x=it.baseX+(it.targetX-it.baseX)*animT;
        it.mesh.material.transparent=true;
        if(animT>0.7) it.mesh.material.opacity=1-(animT-0.7)/0.3;
        else it.mesh.material.opacity=1;
      }
    });
  }

  if(key==='omurilik'){
    animatedItems.forEach(it=>{
      let glow=0;
      if(it.type==='sensoryAxon' && animT<0.34) glow=1;
      else if(it.type==='motorAxon' && animT>0.66) glow=1;
      if(it.mesh.material) it.mesh.material.emissiveIntensity=0.3+glow*0.7;
    });
  }

  // BEYİN — lobları sıra ile aydınlat (frontal → parietal → temporal → oksipital → beyincik → beyin sapı)
  if(key==='beyin'){
    const lobOrder = ['frontal','parietal','temporal','oksipital','beyincik','beyinSapi'];
    const phaseLen = 1.0 / lobOrder.length;
    const activeLob = lobOrder[Math.floor(animT / phaseLen)];
    pickList.forEach(p=>{
      if(!p.material || !p.material.emissive) return;
      const baseEm = (p.userData.partKey === activeLob) ? 0.8 : 0.15;
      // smooth ease
      const target = p.userData.flash > 0 ? p.material.emissiveIntensity : baseEm;
      p.material.emissiveIntensity = target;
    });
  }

  // ENDOKRİN — bezleri sıra ile vurgula
  if(key==='endokrin'){
    const bezOrder = ['hipofiz','tiroid','paratiroid','bobrekUstu','pankreas','eseysel'];
    const phaseLen = 1.0 / bezOrder.length;
    const activeBez = bezOrder[Math.floor(animT / phaseLen)];
    pickList.forEach(p=>{
      if(!p.material || !p.material.emissive) return;
      if(p.userData.flash > 0) return; // tıklama parlamasıyla çakışmasın
      const intensity = (p.userData.partKey === activeBez) ? 1.0 : 0.4;
      p.material.emissiveIntensity = intensity;
    });
  }

  // GÖZ — ışığın yolu: kornea → lens → retina → optik sinir
  if(key==='goz'){
    const eyeOrder = ['kornea','lens','retina','sariBenek'];
    const phaseLen = 1.0 / eyeOrder.length;
    const activePart = eyeOrder[Math.floor(animT / phaseLen)];
    pickList.forEach(p=>{
      if(!p.material || !p.material.emissive) return;
      if(p.userData.flash > 0) return;
      if(p.userData.partKey === activePart){
        p.material.emissiveIntensity = 0.7;
      } else if(p.material.emissiveIntensity > 0.1){
        p.material.emissiveIntensity *= 0.95; // sönümle
      }
    });
  }

  // KULAK — sesin yolu: kepçe → zar → çekiç → örs → üzengi → kohlea
  if(key==='kulak'){
    const earOrder = ['kepce','zar','cekic','ors','uzengi','kohlea'];
    const phaseLen = 1.0 / earOrder.length;
    const activePart = earOrder[Math.floor(animT / phaseLen)];
    pickList.forEach(p=>{
      if(!p.material || !p.material.emissive) return;
      if(p.userData.flash > 0) return;
      if(p.userData.partKey === activePart){
        p.material.emissiveIntensity = 0.8;
      } else if(p.material.emissiveIntensity > 0.1){
        p.material.emissiveIntensity *= 0.95;
      }
    });
  }

  // BURUN — koku molekülleri burun deliğinden sarı bölgeye doğru hareket eder
  if(key==='burun'){
    animatedItems.forEach(it=>{
      if(it.type==='odorMolecule'){
        // Lineer hareket + hafif salınım
        it.mesh.position.x = it.baseX + (it.targetX - it.baseX) * animT;
        it.mesh.position.y = it.baseY + (it.targetY - it.baseY) * animT + Math.sin(animT*Math.PI*4 + it.baseZ*10)*0.05;
        it.mesh.position.z = it.baseZ;
        // Sarı bölgeye yaklaşınca daha parlak, sonra söner
        if(animT > 0.85){
          it.mesh.material.opacity = 1 - (animT - 0.85) / 0.15;
        } else {
          it.mesh.material.opacity = 0.85;
        }
      }
    });
    // Sarı bölgeyi de pulse ettir
    pickList.forEach(p=>{
      if(p.userData.partKey==='kokuAlani' && p.material && p.material.emissive){
        if(p.userData.flash > 0) return;
        p.material.emissiveIntensity = 0.55 + Math.sin(animT*Math.PI*2)*0.3;
      }
    });
  }

  // DİL — tat bölgelerini sıra ile aydınlat
  if(key==='dil'){
    const tatOrder = ['tatliAlan','tuzluAlan','eksiAlan','aciAlan'];
    const phaseLen = 1.0 / tatOrder.length;
    const activeTaste = tatOrder[Math.floor(animT / phaseLen)];
    pickList.forEach(p=>{
      if(!p.material || !p.material.emissive) return;
      if(p.userData.flash > 0) return;
      if(tatOrder.includes(p.userData.partKey)){
        p.material.emissiveIntensity = (p.userData.partKey === activeTaste) ? 0.9 : 0.25;
      }
    });
  }

  // ÇEVRESEL SİNİR SİSTEMİ — somatik vs otonom yolları sırayla aydınlat
  if(key==='cevresel'){
    const order = ['somatik','sempatik','parasempatik','kraniyal','spinal'];
    const phaseLen = 1.0 / order.length;
    const activePart = order[Math.floor(animT / phaseLen)];
    pickList.forEach(p=>{
      if(!p.material || !p.material.emissive) return;
      if(p.userData.flash > 0) return;
      if(order.includes(p.userData.partKey)){
        p.material.emissiveIntensity = (p.userData.partKey === activePart) ? 0.85 : 0.3;
      }
    });
  }
}

/* ============================================================
   ANİMASYON DÖNGÜSÜ
   ============================================================ */
let lastTime=performance.now();
function tick(){
  requestAnimationFrame(tick);
  const now=performance.now();
  const dt=(now-lastTime)/1000;
  lastTime=now;

  if(autoSpin && !dragging){
    shapeGroup.rotation.y+=0.006;
  }

  pickList.forEach(p=>{
    if(p.userData.flash>0){
      p.userData.flash-=0.03;
      if(p.material && p.material.emissiveIntensity!==undefined){
        if(p.userData.flash<=0 && p.material.emissive){
          p.material.emissive.setHex(0x000000);
          p.material.emissiveIntensity=0;
        }
      }
    }
  });

  if(highlightedKey){
    const pulse=0.7+Math.sin(performance.now()*0.005)*0.25;
    pickList.forEach(p=>{
      if(p.userData.highlighted&&p.userData.flash<=0&&p.material&&p.material.emissive){ p.material.emissiveIntensity=pulse; }
    });
  }

  updateAnimations(dt*0.4);
  updateBodyHighlights(dt);
  if(bodyMapMode && autoSpin && !dragging){
    bodyMapGroup.rotation.y += labelsVisible ? 0.002 : 0.005;
  }

  const r=cam.radius;
  camera.position.set(
    r*Math.sin(cam.phi)*Math.sin(cam.theta),
    r*Math.cos(cam.phi)+0.5,
    r*Math.sin(cam.phi)*Math.cos(cam.theta)
  );
  camera.lookAt(0,-0.3,0);

  updateLabels();
  renderer.render(scene,camera);
}

const favBtn=document.getElementById('favBtn');
let favSet=new Set();
try{ favSet=new Set(JSON.parse(localStorage.getItem('ddSysFav')||'[]')); }catch(e){}
function saveFav(){ try{ localStorage.setItem('ddSysFav',JSON.stringify([...favSet])); }catch(e){} }

const themeBtn=document.getElementById('themeBtn');

/* KARŞILAŞTIRMA MODU */
const COMPARE_DATA={
  sinirHormon:{ title:'⚖️ Sinir vs Hormonal Sistem', cols:['Sinir Sistemi','Endokrin (Hormonal)'], rows:[
    ['İleti','Elektrik + kimyasal (nöron)','Kimyasal (hormon)'],
    ['Taşıyıcı','Nöronlar','Kan'],
    ['Hız','Çok hızlı','Yavaş'],
    ['Etki süresi','Kısa','Uzun'],
    ['Hedef','Belirli (sinaps)','Yaygın (kan yoluyla)']
  ]},
  noronTipleri:{ title:'🧠 Nöron Çeşitleri', cols:['Duyu (Getirici)','Ara Nöron','Motor (Götürücü)'], rows:[
    ['Görev','Uyarıyı merkeze taşır','Nöronları bağlar','Emri organa taşır'],
    ['Yön','Merkeze doğru','Merkez içinde','Merkezden dışa'],
    ['Bağlandığı','Reseptör → MSS','MSS içinde','MSS → kas/bez']
  ]},
  mssCevresel:{ title:'⚖️ MSS vs Çevresel SS', cols:['Merkezi SS','Çevresel SS'], rows:[
    ['Yapı','Beyin + omurilik','Sinirler + gangliyonlar'],
    ['Görev','İşleme + kontrol','İletim (taşıma)'],
    ['Koruma','Kemik (kafatası/omurga)','Yok']
  ]},
  sempatikParasempatik:{ title:'⚖️ Sempatik vs Parasempatik', cols:['Sempatik','Parasempatik'], rows:[
    ['Durum','Stres / acil','Dinlenme / sindirim'],
    ['Kalp atışı','Hızlandırır','Yavaşlatır'],
    ['Göz bebeği','Genişletir','Daraltır'],
    ['Sindirim','Yavaşlatır','Hızlandırır'],
    ['Solunum','Hızlandırır','Yavaşlatır']
  ]},
  duyuOrganlari:{ title:'🧠 Duyu Organları', cols:['Organ','Duyu','Reseptör'], rows:[
    ['Göz','Görme','Işık (fotoreseptör)'],
    ['Kulak','İşitme + denge','Mekanoreseptör'],
    ['Burun','Koku','Kemoreseptör'],
    ['Dil','Tat','Kemoreseptör'],
    ['Deri','Dokunma/sıcak/ağrı','Mekano/termo/ağrı']
  ]},
  endokrinBezler:{ title:'🧬 Endokrin Bezler', cols:['Bez','Hormon','Etki'], rows:[
    ['Hipofiz','Büyüme + uyarıcı h.','Diğer bezleri yönetir'],
    ['Tiroid','Tiroksin','Metabolizma hızı'],
    ['Pankreas','İnsülin / Glukagon','Kan şekeri dengesi'],
    ['Böbreküstü','Adrenalin','Stres tepkisi'],
    ['Eşey bezleri','Östrojen / Testosteron','Üreme + cinsiyet']
  ]}
};
const COMPARE_MAP={
  beyin:['mssCevresel','sinirHormon','sempatikParasempatik'],
  omurilik:['mssCevresel','noronTipleri','sinirHormon'],
  cevresel:['mssCevresel','sempatikParasempatik','noronTipleri'],
  noron:['noronTipleri','sinirHormon'],
  sinaps:['noronTipleri','sinirHormon'],
  endokrin:['sinirHormon','endokrinBezler'],
  goz:['duyuOrganlari','sinirHormon'],
  kulak:['duyuOrganlari','sinirHormon'],
  burun:['duyuOrganlari','sinirHormon'],
  dil:['duyuOrganlari','sinirHormon'],
  deri:['duyuOrganlari','sinirHormon']
};
let currentCompareIndex = 0;
let currentCompareKeys = [];
function compareTablesFor(key){ return (COMPARE_MAP[key] || []).map(k => COMPARE_DATA[k]).filter(Boolean); }
function compareTableFor(key){ const arr = compareTablesFor(key); return arr[0] || null; }
function renderCompareTable(){
  const d = currentCompareKeys[currentCompareIndex];
  if(!d) return;
  const total = currentCompareKeys.length;
  const counter = total > 1 ? ` <span class="compare-counter">(${currentCompareIndex+1}/${total})</span>` : '';
  document.getElementById('compareTitle').innerHTML = d.title + counter;
  let html='<table class="compare-table"><thead><tr><th>Özellik</th>';
  d.cols.forEach(c=>html+=`<th>${c}</th>`);
  html+='</tr></thead><tbody>';
  d.rows.forEach(r=>{
    html+='<tr>';
    r.forEach((cell,i)=>html+=`<td>${cell}</td>`);
    html+='</tr>';
  });
  html+='</tbody></table>';
  document.getElementById('compareBody').innerHTML=html;
  const nextBtn = document.getElementById('compareNextBtn');
  if(nextBtn){
    if(total > 1){
      nextBtn.style.display = 'flex';
      const nextIdx = (currentCompareIndex + 1) % total;
      const nextTitle = currentCompareKeys[nextIdx].title.replace(/[⚖️🏭🧬⚡🚪🦴🫀🫁🧠🍽️🌱🐾🌿]+\s*/g, '');
      nextBtn.innerHTML = `<span>Sonraki:</span> <b>${nextTitle}</b> <span>→</span>`;
    } else { nextBtn.style.display = 'none'; }
  }
}
function openCompare(){
  if(!current) return;
  currentCompareKeys = compareTablesFor(current.key);
  if(currentCompareKeys.length === 0){ showToast('Bu konu için karşılaştırma yok.'); return; }
  currentCompareIndex = 0;
  renderCompareTable();
  document.getElementById('compareOverlay').classList.add('show');
}
document.getElementById('compareBtn').addEventListener('click',openCompare);
document.getElementById('compareClose').addEventListener('click',()=>{ document.getElementById('compareOverlay').classList.remove('show'); });
document.getElementById('compareOverlay').addEventListener('click',e=>{ if(e.target.id==='compareOverlay') e.currentTarget.classList.remove('show'); });
document.getElementById('compareNextBtn').addEventListener('click',()=>{
  if(currentCompareKeys.length <= 1) return;
  currentCompareIndex = (currentCompareIndex + 1) % currentCompareKeys.length;
  renderCompareTable();
  document.getElementById('compareBody').parentElement.scrollTop = 0;
});

function applyTheme(){
  const root=document.documentElement;
  if(darkTheme){
    root.style.setProperty('--bg','#0a0e1a');
    root.style.setProperty('--panel','#161b2e');
    root.style.setProperty('--panel-soft','#1f2540');
    root.style.setProperty('--panel-line','#2f3a5f');
    root.style.setProperty('--ink','#eef0ff');
    root.style.setProperty('--ink-soft','#a8b0d0');
    scene.background=new THREE.Color(0x0a0e1a);
    themeBtn.textContent='🌙';
  } else {
    root.style.setProperty('--bg','#eef1f8');
    root.style.setProperty('--panel','#ffffff');
    root.style.setProperty('--panel-soft','#f0f3fa');
    root.style.setProperty('--panel-line','#d2d9ec');
    root.style.setProperty('--ink','#1a2038');
    root.style.setProperty('--ink-soft','#6a7290');
    scene.background=new THREE.Color(0xeef1f8);
    themeBtn.textContent='☀️';
  }
}
themeBtn.addEventListener('click',()=>{ darkTheme=!darkTheme; applyTheme(); updateSkeletonColorsForTheme(); });

// Tema değiştiğinde iskelet (vücut haritası) renklerini güncelle
function updateSkeletonColorsForTheme(){
  if(!bodyMapGroup || !bodyMapBuilt) return;
  const newSkel = darkTheme ? 0xfff5e0 : 0xc8b088;
  const newDim = darkTheme ? 0xd0c8b8 : 0xb8a078;
  bodyMapGroup.traverse(obj => {
    if(obj.isMesh && obj.material && obj.material.color){
      const c = obj.material.color.getHex();
      if(c === 0xfff5e0 || c === 0xc8b088){ obj.material.color.setHex(newSkel); }
      else if(c === 0xd0c8b8 || c === 0xb8a078){ obj.material.color.setHex(newDim); }
    }
  });
}

// --- Tam ekran ---
document.getElementById('fsBtn').addEventListener('click',()=>{
  const el=document.documentElement;
  try{
    if(!document.fullscreenElement&&!document.webkitFullscreenElement){
      const req=el.requestFullscreen||el.webkitRequestFullscreen;
      if(req) req.call(el);
    } else {
      const ex=document.exitFullscreen||document.webkitExitFullscreen;
      if(ex) ex.call(document);

// --- Paylaş ---
let shareCanvas=null;
const shareOverlay=document.getElementById('shareOverlay');
function shareFileName(){
  return (userDisplayName?userDisplayName.replace(/\s+/g,'_')+'-':'')+(current?current.def.name.replace(/\s+/g,'_'):'denetleyici')+'-3d.png';
}
function shareText(){
  return `${current?current.def.name:'Denetleyici-Düzenleyici'} · Qualsar 3D Anatomi`+(userDisplayName?` — ${userDisplayName}`:'');
}
async function captureFullScreen(){
  renderer.render(scene,camera);
  let glDataURL=null;
  try{ glDataURL=renderer.domElement.toDataURL('image/png'); }catch(e){}
  const app=document.getElementById('app');
  if(typeof html2canvas!=='function'||!glDataURL){
    const c=document.createElement('canvas');
    c.width=renderer.domElement.width; c.height=renderer.domElement.height;
    c.getContext('2d').drawImage(renderer.domElement,0,0);
    return c;
  }
  try{
    return await html2canvas(app,{
      backgroundColor:darkTheme?'#0a0e1a':'#eef1f8',
      scale:Math.min(window.devicePixelRatio||1,2),
      logging:false,
      useCORS:true,
      ignoreElements:(el)=>el.classList&&(el.classList.contains('share-overlay')||el.classList.contains('toast')),
      onclone:(doc)=>{
        const cv2=doc.querySelector('#app canvas');
        if(cv2&&glDataURL){
          const img=doc.createElement('img');
          img.src=glDataURL;
          img.style.cssText=cv2.style.cssText+';width:'+cv2.clientWidth+'px;height:'+cv2.clientHeight+'px;display:block;position:absolute;top:0;left:0;';
          cv2.parentNode.replaceChild(img,cv2);
        }
      }
    });
  }catch(e){
    const c=document.createElement('canvas');
    c.width=renderer.domElement.width; c.height=renderer.domElement.height;
    c.getContext('2d').drawImage(renderer.domElement,0,0);
    return c;
  }
}
document.getElementById('shotBtn').addEventListener('click',async()=>{
  showToast('📸 Ekran hazırlanıyor...');
  try{
    shareCanvas=await captureFullScreen();
    document.getElementById('sharePreview').src=shareCanvas.toDataURL('image/png');
    shareOverlay.classList.add('show');
  }catch(e){ showToast('⚠️ Ekran görüntüsü alınamadı.'); }
});
document.getElementById('shareClose').addEventListener('click',()=>shareOverlay.classList.remove('show'));
shareOverlay.addEventListener('click',e=>{ if(e.target.id==='shareOverlay') shareOverlay.classList.remove('show'); });

function canvasToFile(cb){
  if(!shareCanvas){ cb(null); return; }
  shareCanvas.toBlob(blob=>{
    if(!blob){ cb(null); return; }
    try{ cb(new File([blob],shareFileName(),{type:'image/png'}),blob); }
    catch(e){ cb(null,blob); }
  },'image/png');
}

// Flutter WebView'de navigator.share yoktur; varsa Flutter köprüsüyle paylaş.
function shareViaFlutter(){
  if(!shareCanvas) return false;
  if(window.FlutterShare&&typeof window.FlutterShare.postMessage==='function'){
    try{
      window.FlutterShare.postMessage(JSON.stringify({
        image:shareCanvas.toDataURL('image/png'),
        text:shareText(),
        file:shareFileName()
      }));
      shareOverlay.classList.remove('show');
      return true;
    }catch(e){}
  }
  return false;
}

document.getElementById('shareNative').addEventListener('click',()=>{
  if(shareViaFlutter()) return;
  canvasToFile(async(file)=>{
    if(file&&navigator.canShare&&navigator.canShare({files:[file]})){
      try{ await navigator.share({files:[file],title:'Qualsar 3D',text:shareText()}); shareOverlay.classList.remove('show'); return; }
      catch(e){ if(e.name==='AbortError') return; }
    }
    if(navigator.share){
      try{ await navigator.share({title:'Qualsar 3D',text:shareText()}); shareOverlay.classList.remove('show'); return; }
      catch(e){ if(e.name==='AbortError') return; }
    }
    downloadShareImage();
  });
});
document.getElementById('shareSocial').addEventListener('click',()=>{ document.getElementById('shareNative').click(); });
document.getElementById('shareDownload').addEventListener('click',()=>{ if(!shareViaFlutter()) downloadShareImage(); });

function downloadShareImage(){
  if(!shareCanvas) return;
  shareCanvas.toBlob(blob=>{
    if(!blob) return;
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download=shareFileName();
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),1500);
    showToast('💾 Kaydedildi!');
  },'image/png');
}

applyTheme();

setLevel(2);
selectOrgan('beyin');
refreshFav();
tick();

addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
