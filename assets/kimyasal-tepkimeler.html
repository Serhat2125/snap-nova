  rebuild();
  window._customAnim=function(t,dt){ if(!window._isPlayingActive)return; acc+=dt; flow.forEach(p=>{ let u=(p.userData.ph+acc*0.12)%1; let pos; if(u<0.3){const lt=u/0.3;pos=[-3.5+3.5*lt,0.4];} else if(u<0.78){const lt=(u-0.3)/0.48;pos=[0,0.4-0.8*lt];} else {const lt=(u-0.78)/0.22;pos=[3.5*lt,-0.12];} p.position.set(pos[0],pos[1],0); p.scale.setScalar(u>=0.3&&u<0.78?0.78:1); }); };
  setSceneSliders([ {type:'section',label:'Mekanizmalı Tepkime'},
    {type:'display',label:'Hız belirleyen',highlight:true,getValue:()=>'En yavaş basamak (dar boru)'},
    {type:'display',label:'Hız bağıntısı',getValue:()=>'Sadece yavaş basamağın reaktiflerine bağlı'},
    {type:'display',label:'Benzetme',getValue:()=>'Darboğaz: en dar nokta hızı belirler'} ],{title:'Mekanizmalı Tepkimeler ve Hız Belirleyen Basamak'});
};

// ====== SİSTEM: SEVİYE, MOD, NAVİGASYON, UI ================
// ============================================================
let currentLevel = 'lise';
let currentExamMode = false;
function _subLevel(sub) {
  if (sub.grades && sub.grades.length) {
    const g = sub.grades[0];
    if (g <= 4) return 'ilkokul';
    if (g <= 8) return 'ortaokul';
    return 'lise';
  }
  const lvNum = sub.minLv || 1;
  return lvNum === 1 ? 'ilkokul' : lvNum === 2 ? 'ortaokul' : 'lise';
}
let currentMode = 'sade';
window._autoSpinActive = false;
window._isPlayingActive = false;

const LEVEL_ORDER = ['ilkokul', 'ortaokul', 'lise', 'tyt_ayt'];

function _resolveLevelData(dataObj) {
  if (!dataObj) return null;
  if (dataObj[currentLevel]) return dataObj[currentLevel];
  if (currentLevel === 'tyt_ayt' && dataObj['ayt']) return dataObj['ayt'];
  if (currentLevel === 'ayt' && dataObj['tyt_ayt']) return dataObj['tyt_ayt'];
  const idx = LEVEL_ORDER.indexOf(currentLevel);
  for (let i = idx; i >= 0; i--) {
    if (dataObj[LEVEL_ORDER[i]]) return dataObj[LEVEL_ORDER[i]];
  }
  for (let i = idx + 1; i < LEVEL_ORDER.length; i++) {
    if (dataObj[LEVEL_ORDER[i]]) return dataObj[LEVEL_ORDER[i]];
  }
  const keys = Object.keys(dataObj);
  return keys.length ? dataObj[keys[0]] : null;
}

function _subVisibleByGrade(sub) {
  if (currentExamMode) return _subLevel(sub) === 'lise';
  return _subLevel(sub) === currentLevel;
}

// ---------- DROPDOWN: KONU REHBERİ ----------
function buildTopicDropdown() {
  const list = document.getElementById('topicList');
  if (!list) return;
  list.innerHTML = '';
  const seenBuilders = new Set();
  Object.keys(MODULES).forEach(modKey => {
    const mod = MODULES[modKey];
    let visibleSubs = mod.subs.filter(s => _subVisibleByGrade(s));
    if (currentExamMode) {
      visibleSubs = visibleSubs.filter(s => {
        if (seenBuilders.has(s.builder)) return false;
        seenBuilders.add(s.builder); return true;
      });
    }
    if (visibleSubs.length === 0) return;
    const head = document.createElement('div');
    head.className = 'dropdown-cat-head';
    head.textContent = mod.title;
    list.appendChild(head);
    visibleSubs.forEach(sub => {
      const btn = document.createElement('button');
      btn.className = 'dropdown-item';
      btn.dataset.module = modKey;
      btn.dataset.sub = sub.key;
      btn.innerHTML = `<span class="di-emoji">${sub.label.split(' ')[0]}</span><span>${sub.label.substring(sub.label.indexOf(' ')+1)}</span>`;
      btn.onclick = () => {
        currentModule = parseInt(modKey);
        selectSub(sub.key);
        closeAllDropdowns();
      };
      list.appendChild(btn);
    });
  });
}

function _subVisibleAtLevel(subKey) {
  for (const mk of Object.keys(MODULES)) {
    const s = MODULES[mk].subs.find(x => x.key === subKey);
    if (s) return _subVisibleByGrade(s);
  }
  return true;
}
function _firstSubAtLevel() {
  for (const mk of Object.keys(MODULES)) {
    const s = MODULES[mk].subs.find(x => _subVisibleByGrade(x));
    if (s) return s.key;
  }
  return 'bagEnerjisi';
}

function highlightActiveTopic() {
  document.querySelectorAll('#topicList .dropdown-item').forEach(b => {
    b.classList.toggle('active', b.dataset.sub === currentSub);
  });
}

// ---------- SAHNE SEÇİMİ ----------
function applySceneTheme() {
  if (!scene) return;
  const isLight = window._lightMode === true;
  let bgColor, fogColor, fogNear, fogFar;
  if (isLight) {
    bgColor = 0xe4ecf6; fogColor = 0xe4ecf6; fogNear = 45; fogFar = 110;
  } else {
    bgColor = 0x1e2740; fogColor = 0x1e2740; fogNear = 45; fogFar = 110;
  }
  scene.background = new THREE.Color(bgColor);
  scene.fog = new THREE.Fog(fogColor, fogNear, fogFar);
}

function selectSub(subKey) {
  currentSub = subKey;
  clearScene();
  applySceneTheme();

  const builderName = (function() {
    for (const mk of Object.keys(MODULES)) {
      const s = MODULES[mk].subs.find(x => x.key === subKey);
      if (s) { currentModule = parseInt(mk); return s.builder; }
    }
    return null;
  })();

  if (builderName && typeof SubBuilders[builderName] === 'function') {
    try {
      SubBuilders[builderName]();
    } catch (e) {
      console.error('Builder hatası:', builderName, e);
    }
  }

  const _bp = document.getElementById('bottomPanel');
  if (_bp) _bp.classList.remove('hidden');
  updateInfoPanel(subKey);
  highlightActiveTopic();

  applyModeToLabels();

  if (controls) {
    controls.target.set(3.2, 0.6, 0);
    if (camera) camera.position.set(3.2, 5.0, 27.0);
    controls.captureInitialState && controls.captureInitialState();
  }

  if (window._showGestureToast) {
    const allSubs = [];
    Object.keys(MODULES).forEach(mk => MODULES[mk].subs.forEach(s => allSubs.push(s)));
    const cur = allSubs.find(s => s.key === subKey);
    if (cur) window._showGestureToast('📍 ' + cur.label);
  }
}

function applyModeToLabels() {
  if (!window._labelRefs) return;
  const info3d = document.querySelectorAll('.info3d-label');
  info3d.forEach((el, i) => {
    if (currentMode === 'sade' && i % 2 === 1) {
      el.dataset.userHidden = '1';
      el.style.display = 'none';
    } else {
      el.dataset.userHidden = '0';
      el.style.display = labelsVisible ? 'block' : 'none';
    }
  });
}

// ---------- BİLGİ PANELİ ----------
const _SUB_ALIAS = {};
function _dataKey(subKey) { return _SUB_ALIAS[subKey] || subKey; }

function updateInfoPanel(subKey) {
  const data = _resolveLevelData(INFO_DATA[_dataKey(subKey)]);
  if (!data) return;
  document.getElementById('infoEmoji').textContent = data.emoji || '🔗';
  let mainTitle = '', subTitle = '';
  for (const mk of Object.keys(MODULES)) {
    const s = MODULES[mk].subs.find(x => x.key === subKey);
    if (s) {
      mainTitle = (MODULES[mk].title || '').replace(/^[^\wçğıöşüÇĞİÖŞÜ]*Modül\s*\d+:\s*/i, '').replace(/^[^\wçğıöşüÇĞİÖŞÜ]+/, '').trim();
      subTitle = (s.label || '').replace(/^[^\wçğıöşüÇĞİÖŞÜ]+/, '').trim();
      break;
    }
  }
  const titleHtml = mainTitle ? (mainTitle + ' / ' + subTitle) : (data.title || subTitle);
  document.getElementById('infoTitle').textContent = titleHtml;
  const list = document.getElementById('infoList');
  list.innerHTML = '';
  let points = data.points || [];
  const showCount = (currentMode === 'sade') ? 3 : points.length;
  points.slice(0, showCount).forEach(p => {
    const li = document.createElement('li');
    if (p.startsWith('##')) { li.className = 'subhead'; li.innerHTML = p.replace('##','').trim(); }
    else li.innerHTML = p;
    list.appendChild(li);
  });
  list.scrollTop = 0;
  setTimeout(updateInfoScrollbar, 30);
  setTimeout(updateInfoScrollbar, 150);
  setTimeout(updateInfoScrollbar, 400);
}

function updateInfoScrollbar() {
  const list = document.getElementById('infoList');
  const bar = document.getElementById('infoScrollbar');
  const thumb = document.getElementById('infoScrollThumb');
  if (!list || !bar || !thumb) return;
  const sh = list.scrollHeight, ch = list.clientHeight;
  if (ch < 5) return;
  if (sh <= ch + 3) { bar.classList.remove('visible'); return; }
  bar.classList.add('visible');
  const trackH = bar.clientHeight || ch;
  const thumbH = Math.max(26, trackH * ch / sh);
  const maxScroll = sh - ch;
  const maxThumb = trackH - thumbH;
  const top = maxScroll > 0 ? (list.scrollTop / maxScroll) * maxThumb : 0;
  thumb.style.height = thumbH + 'px';
  thumb.style.top = top + 'px';
}
// ---------- NAVİGASYON (önceki/sonraki sahne) ----------
function getAllSubs() {
  const arr = [];
  Object.keys(MODULES).forEach(mk => MODULES[mk].subs.forEach(s => arr.push(s)));
  return arr;
}
function navigate(dir) {
  let all = getAllSubs().filter(s => _subVisibleByGrade(s));
  if (currentExamMode) {
    const seen = new Set();
    all = all.filter(s => { if (seen.has(s.builder)) return false; seen.add(s.builder); return true; });
  }
  if (all.length === 0) return;
  let idx = all.findIndex(s => s.key === currentSub);
  if (idx < 0) idx = 0;
  idx = (idx + dir + all.length) % all.length;
  selectSub(all[idx].key);
}

// ---------- DROPDOWN AÇ/KAPA ----------
function closeAllDropdowns() {
  document.querySelectorAll('.dropdown-panel').forEach(p => p.classList.remove('show'));
  document.body.classList.remove('dropdown-open');
}
function toggleDropdown(id) {
  const panel = document.getElementById(id);
  if (!panel) return;
  const wasOpen = panel.classList.contains('show');
  closeAllDropdowns();
  if (!wasOpen) {
    panel.classList.add('show');
    document.body.classList.add('dropdown-open');
  }
}

// ---------- KARŞILAŞTIRMA POPUP ----------
window._cmpPages = []; window._cmpIdx = 0;
window._tblPages = []; window._tblIdx = 0;

function _normalizePages(data) {
  if (!data) return [];
  if (Array.isArray(data)) return data;
  return [data];
}

function _renderTableHTML(data, styleClass) {
  let html = '<table class="cmp-table ' + (styleClass||'') + '"><thead><tr>';
  data.cols.forEach(c => html += `<th>${c}</th>`);
  html += '</tr></thead><tbody>';
  data.rows.forEach(row => {
    html += '<tr>';
    row.forEach(cell => html += `<td>${cell}</td>`);
    html += '</tr>';
  });
  html += '</tbody></table>';
  return html;
}

function renderCompareTable() {
  window._cmpPages = _normalizePages(_resolveLevelData(COMPARE_DATA[_dataKey(currentSub)]));
  window._cmpIdx = 0;
  _showComparePage();
}
function _showComparePage() {
  const body = document.getElementById('compareBody');
  const titleEl = document.getElementById('compareTitle');
  const nav = document.getElementById('compareNav');
  const counter = document.getElementById('compareCounter');
  const pages = window._cmpPages;
  if (!pages.length) {
    body.innerHTML = '<div class="cmp-no-data">Bu konu için karşılaştırma verisi yok.</div>';
    if (titleEl) titleEl.textContent = '⚖️ Karşılaştırma';
    if (nav) nav.classList.add('hidden');
    return;
  }
  const i = window._cmpIdx;
  const data = pages[i];
  if (titleEl) titleEl.textContent = '⚖️ ' + (data.title || 'Karşılaştırma');
  body.innerHTML = _renderTableHTML(data, 'compare-style');
  if (nav) {
    if (pages.length > 1) {
      nav.classList.remove('hidden');
      counter.textContent = (i+1) + ' / ' + pages.length;
      document.getElementById('comparePrev').disabled = (i === 0);
      document.getElementById('compareNext').disabled = (i === pages.length - 1);
    } else {
      nav.classList.add('hidden');
    }
  }
}

// ---------- BİLGİ TABLOSU POPUP ----------
function renderInfoTable() {
  window._tblPages = _normalizePages(_resolveLevelData(TABLE_DATA[_dataKey(currentSub)]));
  window._tblIdx = 0;
  _showTablePage();
}
function _showTablePage() {
  const body = document.getElementById('tableBody');
  const titleEl = document.getElementById('tableTitle');
  const nav = document.getElementById('tableNav');
  const counter = document.getElementById('tableCounter');
  const pages = window._tblPages;
  if (!pages.length) {
    body.innerHTML = '<div class="cmp-no-data">Bu konu için tablo verisi yok.</div>';
    if (titleEl) titleEl.textContent = '📋 Bilgi Tablosu';
    if (nav) nav.classList.add('hidden');
    return;
  }
  const i = window._tblIdx;
  const data = pages[i];
  if (titleEl) titleEl.textContent = '📋 ' + (data.title || 'Bilgi Tablosu');
  body.innerHTML = _renderTableHTML(data, '');
  if (nav) {
    if (pages.length > 1) {
      nav.classList.remove('hidden');
      counter.textContent = (i+1) + ' / ' + pages.length;
      document.getElementById('tablePrev').disabled = (i === 0);
      document.getElementById('tableNext').disabled = (i === pages.length - 1);
    } else {
      nav.classList.add('hidden');
    }
  }
}
// ============================================================
// ====== EVENT LISTENERS =====================================
// ============================================================
function attachEvents() {
  (function(){
    const infoList = document.getElementById('infoList');
    if (infoList) {
      ['touchstart','touchmove','touchend','wheel'].forEach(ev => {
        infoList.addEventListener(ev, (e) => { e.stopPropagation(); }, { passive: true });
      });
      infoList.addEventListener('scroll', updateInfoScrollbar, { passive: true });
    }
    ['compareBody','tableBody','scenePanel'].forEach(id => {
      const el = document.getElementById(id);
      if (el) ['touchstart','touchmove','touchend','wheel'].forEach(ev => {
        el.addEventListener(ev, (e) => { e.stopPropagation(); }, { passive: true });
      });
    });
  })();

  document.getElementById('btnLevel').onclick = () => toggleDropdown('panelLevel');
  document.getElementById('btnTopic').onclick = () => {
    const bp = document.getElementById('bottomPanel');
    if (bp) bp.classList.remove('hidden');
    toggleDropdown('panelTopic');
  };

  document.querySelectorAll('#panelLevel .dropdown-item').forEach(item => {
    item.onclick = () => {
      const lv = item.dataset.level;
      if (lv === 'sinav') { currentExamMode = true; currentLevel = 'lise'; }
      else { currentExamMode = false; currentLevel = lv; }
      document.querySelectorAll('#panelLevel .dropdown-item').forEach(x => x.classList.remove('active'));
      item.classList.add('active');
      const _labels = { ilkokul:'🟢 İlkokul', ortaokul:'🟡 Ortaokul', lise:'🔵 Lise' };
      document.getElementById('levelLabel').textContent = currentExamMode ? '🎯 Sınavlara Hazırlık' : (lv === 'ilkokul' ? 'İlkokul' : lv === 'ortaokul' ? 'Ortaokul' : 'Lise');
      closeAllDropdowns();
      buildTopicDropdown();
      if (currentSub && !_subVisibleAtLevel(currentSub)) {
        selectSub(_firstSubAtLevel());
      } else if (currentSub) {
        selectSub(currentSub);
      }
      if (document.getElementById('compareOverlay').classList.contains('show')) renderCompareTable();
      if (document.getElementById('tableOverlay').classList.contains('show')) renderInfoTable();
      if (window._showGestureToast) window._showGestureToast(currentExamMode ? '🎯 Sınavlara Hazırlık' : (_labels[lv] || lv));
      if (window._haptic) window._haptic(15);
    };
  });

  document.getElementById('btnMode').onclick = () => toggleDropdown('panelMode');
  document.querySelectorAll('#panelMode .dropdown-item').forEach(item => {
    item.onclick = () => {
      currentMode = item.dataset.mode;
      document.querySelectorAll('#panelMode .dropdown-item').forEach(x => x.classList.remove('active'));
      item.classList.add('active');
      const btnMode = document.getElementById('btnMode');
      if (currentMode === 'sade') {
        btnMode.textContent = '📄'; btnMode.classList.add('active');
        btnMode.title = 'Görünüm Modu: Sade';
      } else {
        btnMode.textContent = '📚'; btnMode.classList.remove('active');
        btnMode.title = 'Görünüm Modu: Detaylı';
      }
      closeAllDropdowns();
      if (currentSub) { updateInfoPanel(currentSub); applyModeToLabels(); }
      if (window._haptic) window._haptic(15);
    };
  });

  document.getElementById('navPrev').onclick = () => navigate(-1);
  document.getElementById('navNext').onclick = () => navigate(1);

  document.getElementById('infoCloseBtn').onclick = () => {
    document.getElementById('bottomPanel').classList.add('hidden');
  };

  const spinBtn = document.getElementById('spinBtn');
  spinBtn.onclick = () => {
    window._autoSpinActive = !window._autoSpinActive;
    spinBtn.classList.toggle('active', window._autoSpinActive);
    if (window._currentModelGroup) {
      window._currentModelGroup.userData.spin = window._autoSpinActive ? 0.3 : 0;
      if (!dynamicObjects.includes(window._currentModelGroup)) dynamicObjects.push(window._currentModelGroup);
    }
    if (window._haptic) window._haptic(15);
  };

  const labelBtn = document.getElementById('labelBtn');
  labelBtn.onclick = () => {
    labelsVisible = !labelsVisible;
    window._leaderLinesVisible = labelsVisible;
    labelBtn.classList.toggle('active', labelsVisible);
    document.querySelectorAll('.info3d-label, .label3d').forEach(el => {
      if (labelsVisible) {
        el.dataset.labelHidden = '0';
        if (el.dataset.userHidden !== '1') el.style.display = 'block';
      } else {
        el.dataset.labelHidden = '1';
        el.style.display = 'none';
      }
    });
    if (!labelsVisible) {
      const svg = document.getElementById('leaderLines');
      if (svg) svg.innerHTML = '';
    }
    if (window._haptic) window._haptic(15);
  };
  window._leaderLinesVisible = true;
  labelBtn.classList.add('active');

  const animBtn = document.getElementById('animBtn');
  animBtn.onclick = () => {
    window._isPlayingActive = !window._isPlayingActive;
    animBtn.classList.toggle('active', window._isPlayingActive);
    animBtn.querySelector('.ico').textContent = window._isPlayingActive ? '⏸️' : '▶️';
    const lbl = animBtn.querySelector('span:last-child');
    if (lbl) lbl.textContent = window._isPlayingActive ? 'Durdur' : 'Çalıştır';
    if (window._showGestureToast) {
      window._showGestureToast(window._isPlayingActive ? '▶️ Animasyon başladı' : '⏸️ Duraklatıldı');
    }
    if (window._haptic) window._haptic(15);
  };
  animBtn.classList.remove('active');
  animBtn.querySelector('.ico').textContent = '▶️';

  document.getElementById('btnTheme').onclick = () => {
    document.body.classList.toggle('light-mode');
    const isLight = document.body.classList.contains('light-mode');
    document.getElementById('btnTheme').textContent = isLight ? '☀️' : '🌙';
    window._lightMode = isLight;
    applySceneTheme();
    if (currentSub) selectSub(currentSub);
    if (window._haptic) window._haptic(15);
  };

  document.getElementById('btnFs').onclick = () => {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen && document.documentElement.requestFullscreen();
    } else {
      document.exitFullscreen && document.exitFullscreen();
    }
    if (window._haptic) window._haptic(15);
  };

  document.getElementById('btnSend').onclick = () => {
    document.getElementById('shareOverlay').classList.add('show');
  };
  document.getElementById('shareClose').onclick = () => {
    document.getElementById('shareOverlay').classList.remove('show');
  };
  document.getElementById('shareWhatsApp').onclick = () => {
    const txt = encodeURIComponent('🔗 Kimyasal Türler Arası Etkileşimler (Bağlar) — 3D interaktif kimya simülasyonu (ilkokuldan liseye)!');
    window.open('https://wa.me/?text=' + txt, '_blank');
  };
  document.getElementById('shareCopy').onclick = () => {
    try { navigator.clipboard.writeText(window.location.href); } catch(e){}
    if (window._showGestureToast) window._showGestureToast('📋 Bağlantı kopyalandı');
    document.getElementById('shareOverlay').classList.remove('show');
  };
  document.getElementById('shareDownload').onclick = () => {
    try {
      const link = document.createElement('a');
      link.download = 'kimyasal-tepkimeler.png';
      link.href = renderer.domElement.toDataURL('image/png');
      link.click();
    } catch(e){}
    document.getElementById('shareOverlay').classList.remove('show');
  };

  document.getElementById('btnCompare').onclick = () => {
    renderCompareTable();
    document.getElementById('compareOverlay').classList.add('show');
  };
  document.getElementById('compareClose').onclick = () => {
    document.getElementById('compareOverlay').classList.remove('show');
  };
  document.getElementById('comparePrev').onclick = () => {
    if (window._cmpIdx > 0) { window._cmpIdx--; _showComparePage(); if (window._haptic) window._haptic(10); }
  };
  document.getElementById('compareNext').onclick = () => {
    if (window._cmpIdx < window._cmpPages.length - 1) { window._cmpIdx++; _showComparePage(); if (window._haptic) window._haptic(10); }
  };

  document.getElementById('btnTable').onclick = () => {
    renderInfoTable();
    document.getElementById('tableOverlay').classList.add('show');
  };
  document.getElementById('tableClose').onclick = () => {
    document.getElementById('tableOverlay').classList.remove('show');
  };
  document.getElementById('tablePrev').onclick = () => {
    if (window._tblIdx > 0) { window._tblIdx--; _showTablePage(); if (window._haptic) window._haptic(10); }
  };
  document.getElementById('tableNext').onclick = () => {
    if (window._tblIdx < window._tblPages.length - 1) { window._tblIdx++; _showTablePage(); if (window._haptic) window._haptic(10); }
  };

  ['shareOverlay','compareOverlay','tableOverlay'].forEach(id => {
    const ov = document.getElementById(id);
    ov.onclick = (e) => { if (e.target === ov) ov.classList.remove('show'); };
  });

  document.addEventListener('click', (e) => {
    if (!e.target.closest('.dropdown-panel') && !e.target.closest('.stack-btn') && !e.target.closest('.tool-icon-btn')) {
      closeAllDropdowns();
    }
  });
}

animate();
