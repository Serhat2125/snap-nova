<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Hücre ve Organelleri · 3D Anatomi</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Baloo+2:wght@500;600;700;800&display=swap');

  :root {
    --bg:#0a0e1a;
    --panel:#161b2e;
    --panel-soft:#1f2540;
    --panel-line:#2f3a5f;
    --ink:#eef0ff;
    --ink-soft:#a8b0d0;
    --accent:#7a5fd6;          /* mor-mavi — hücre */
    --accent-glow:#9d7fe6;
    --bone:#f5e8c8;            /* kemik krem */
    --cartilage:#9d7fe6;       /* mor — kıkırdak */
    --muscle:#c45d5d;          /* kas kırmızısı */
    --joint:#5fc8e0;           /* eklem turkuaz */
    --warning:#ffd166;
  }

  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body {
    margin:0; padding:0; overflow:hidden;
    background:var(--bg); color:var(--ink);
    font-family:'Fredoka',sans-serif; user-select:none;
    width:100vw; height:100vh;
  }
  body { touch-action:none; }
  #app { position:relative; width:100vw; height:100vh; overflow:hidden; }
  canvas { display:block; cursor:grab; }
  canvas:active { cursor:grabbing; }

  /* ÜST BAR */
  .topbar {
    position:absolute; top:0; left:0; right:0;
    display:flex; align-items:center; gap:10px;
    padding:11px 14px 9px;
    background:linear-gradient(180deg,rgba(10,14,26,0.95),transparent);
    z-index:30; pointer-events:none;
  }
  .topbar > * { pointer-events:auto; }
  .level-badge {
    font-family:'Baloo 2',cursive; font-weight:800;
    font-size:12px; color:#fff;
    background:linear-gradient(135deg,var(--accent),#cf752f);
    padding:7px 12px; border-radius:14px;
    border:none; cursor:pointer;
    box-shadow:0 4px 12px rgba(232,151,82,.35);
    display:flex; align-items:center; gap:5px;
  }
  .level-badge .lv-arrow { font-size:9px; opacity:.85; }
  .topbar h1 {
    margin:0; font-family:'Baloo 2',cursive; font-weight:800;
    font-size:15px; color:#fff;
    display:flex; align-items:center; gap:7px; flex:1;
  }
  .topbar h1 .ic {
    background:linear-gradient(135deg,var(--accent),var(--muscle));
    width:28px; height:28px; border-radius:8px;
    display:grid; place-items:center;
    font-size:15px;
    box-shadow:0 4px 10px rgba(232,151,82,.4);
  }
  .reset-btn {
    background:var(--panel-soft); color:var(--ink);
    border:1.5px solid var(--panel-line);
    border-radius:12px; padding:6px 10px;
    font-family:'Fredoka',sans-serif; font-weight:600;
    font-size:11px; cursor:pointer;
  }
  .tool-btn {
    background:var(--panel-soft); color:var(--ink);
    border:1.5px solid var(--panel-line);
    border-radius:11px; padding:6px 9px;
    font-size:13px; cursor:pointer; line-height:1;
  }
  .tool-btn:hover { background:var(--panel-line); border-color:var(--accent); }
  .tool-btn:active { transform:scale(0.92); }
  /* Karşılaştır ve Favori — ayırt edici renkler */
  .cmp-top { border-color:var(--joint); }
  .cmp-top:hover { background:var(--joint); color:#0a0e1a; }
  .fav-top { border-color:var(--warning); display:flex; align-items:center; }
  .fav-top:hover { background:var(--warning); color:#0a0e1a; }

  /* VÜCUT HARİTASI (Konum modu) butonu — Konu Rehberi sekmesinin hemen altında, sol tarafta */
  .body-map-btn {
    position:absolute;
    top:92px;
    left:12px;
    z-index:24;
    display:flex; align-items:center; gap:6px;
    background:linear-gradient(135deg, var(--accent) 0%, var(--accent-glow) 100%);
    color:#fff;
    border:2px solid rgba(255,255,255,0.4);
    border-radius:14px;
    padding:7px 13px;
    font-family:'Fredoka',sans-serif; font-weight:600;
    font-size:12.5px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(212,160,64,0.4), inset 0 1px 0 rgba(255,255,255,0.3);
    transition:transform 0.15s, box-shadow 0.15s, filter 0.15s, opacity 0.2s;
  }
  .body-map-btn:hover {
    transform:translateY(-1px);
    box-shadow:0 6px 18px rgba(212,160,64,0.6), inset 0 1px 0 rgba(255,255,255,0.4);
    filter:brightness(1.08);
  }
  .body-map-btn:active { transform:scale(0.96); }
  .body-map-btn.active {
    background:linear-gradient(135deg, #5fc8e0 0%, #7ab0e8 100%);
    box-shadow:0 4px 14px rgba(95,200,224,0.5), inset 0 1px 0 rgba(255,255,255,0.3);
  }
  /* Konu Rehberi paneli açıkken konum butonu altında kalmasın */
  .body-map-btn.hidden-by-panel { opacity:0; pointer-events:none; transform:translateY(-6px); }
  .body-map-btn .bm-icon { font-size:15px; line-height:1; }
  .body-map-btn .bm-text { font-size:11.5px; letter-spacing:0.3px; }

  /* AÇIKLAMA BALONU (konum modunda görünür) */
  .body-map-balloon {
    position:absolute;
    bottom:90px;
    left:50%;
    transform:translateX(-50%) translateY(20px);
    z-index:48;
    max-width:420px;
    width:calc(100% - 40px);
    background:rgba(255,251,242,0.97);
    backdrop-filter:blur(8px);
    border:2px solid var(--accent);
    border-radius:18px;
    padding:14px 16px 12px;
    box-shadow:0 8px 24px rgba(0,0,0,0.18);
    font-family:'Fredoka',sans-serif;
    opacity:0;
    pointer-events:none;
    transition:opacity 0.25s, transform 0.25s;
  }
  .body-map-balloon.show {
    opacity:1;
    pointer-events:auto;
    transform:translateX(-50%) translateY(0);
  }
  .body-map-balloon .bm-title {
    font-size:15px; font-weight:700;
    color:var(--accent);
    margin-bottom:6px;
    display:flex; align-items:center; gap:6px;
  }
  .body-map-balloon .bm-desc {
    font-size:12.5px; line-height:1.5;
    color:var(--ink);
  }
  .body-map-balloon .bm-micro {
    margin-top:8px;
    padding:6px 10px;
    background:rgba(157,127,230,0.12);
    border-left:3px solid #9d7fe6;
    border-radius:6px;
    font-size:11.5px;
    color:#5a4990;
    font-style:italic;
  }
  .body-map-balloon::after {
    content:'';
    position:absolute;
    bottom:-10px; left:50%;
    transform:translateX(-50%);
    width:0; height:0;
    border-left:10px solid transparent;
    border-right:10px solid transparent;
    border-top:10px solid var(--accent);
  }
  .body-map-balloon::before {
    content:'';
    position:absolute;
    bottom:-7px; left:50%;
    transform:translateX(-50%);
    width:0; height:0;
    border-left:8px solid transparent;
    border-right:8px solid transparent;
    border-top:8px solid rgba(255,251,242,0.97);
    z-index:1;
  }

  /* Mobil için daha kompakt buton */
  @media (max-width: 480px) {
    .body-map-btn { top:88px; left:10px; padding:6px 10px; font-size:11.5px; border-radius:12px; }
    .body-map-btn .bm-text { font-size:11px; }
    .body-map-balloon { bottom:80px; padding:11px 13px 10px; }
    .body-map-balloon .bm-title { font-size:13px; }
    .body-map-balloon .bm-desc { font-size:11.5px; }
  }
  .user-btn {
    display:flex; align-items:center; gap:5px;
    background:var(--panel-soft); color:var(--ink);
    border:1.5px solid var(--accent);
    border-radius:11px; padding:5px 10px; cursor:pointer;
    font-family:'Fredoka',sans-serif; font-weight:600; font-size:11px;
    max-width:120px;
  }
  .user-btn:hover { background:var(--panel-line); }
  .user-btn:active { transform:scale(0.95); }
  .user-btn .user-ico { font-size:13px; flex-shrink:0; }
  .user-btn .user-name {
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    color:var(--accent-glow);
  }

  /* İLERLEME ÇUBUĞU */
  .progress-wrap {
    position:absolute; bottom:182px; left:50%; transform:translateX(-50%); z-index:14;
    display:flex; align-items:center; gap:7px;
    background:rgba(22,27,46,0.85); padding:4px 10px; border-radius:11px;
    border:1px solid var(--panel-line); pointer-events:none;
  }
  .progress-bar {
    width:70px; height:6px; background:var(--panel-line);
    border-radius:3px; overflow:hidden;
  }
  .progress-fill {
    height:100%; width:0%;
    background:linear-gradient(90deg,var(--accent),var(--accent-glow));
    border-radius:3px; transition:width .4s ease;
  }
  .progress-txt {
    font-family:'Baloo 2',cursive; font-weight:700;
    font-size:9.5px; color:var(--ink-soft); white-space:nowrap;
  }

  /* FAVORİ YILDIZI */
  .fav-btn {
    flex-shrink:0; width:28px; height:24px;
    background:var(--panel-line); border:1.5px solid var(--warning);
    border-radius:8px; cursor:pointer;
    display:grid; place-items:center;
    font-size:14px; color:var(--warning); line-height:1;
  }
  .fav-btn:hover { background:var(--warning); color:#0a0e1a; }
  .fav-btn:active { transform:scale(0.92); }
  .fav-btn.active { background:var(--warning); color:#0a0e1a; text-shadow:0 0 6px var(--warning); }

  /* KARŞILAŞTIRMA + FAVORİ OVERLAY */
  .compare-overlay, .fav-overlay {
    position:absolute; inset:0; z-index:50;
    background:rgba(10,14,26,0.82); backdrop-filter:blur(3px);
    display:none; align-items:center; justify-content:center;
    padding:20px;
  }
  .compare-overlay.show, .fav-overlay.show { display:flex; }
  .compare-card {
    background: #252b48;
    border:2px solid var(--accent);
    border-radius:18px; padding:18px;
    max-width:min(580px,95vw); max-height:90vh;
    width: 580px;
    box-shadow:0 20px 60px rgba(0,0,0,.5);
    display:flex; flex-direction:column;
    position:relative;
  }
  .fav-card {
    background:var(--panel); border:2px solid var(--accent);
    border-radius:18px; padding:14px;
    max-width:min(560px,92vw); max-height:82vh; overflow-y:auto;
    box-shadow:0 20px 60px rgba(0,0,0,.5);
  }
  .compare-head, .fav-head {
    display:flex; align-items:center; justify-content:space-between;
    font-family:'Baloo 2',cursive; font-weight:800; font-size:17px;
    color:var(--accent); margin-bottom:14px;
    flex-shrink:0;
  }
  .compare-counter {
    color: #c8b8f0; font-size:13px; font-weight:600;
    background: rgba(122,95,214,0.25);
    padding:2px 8px; border-radius:8px;
    margin-left:6px;
  }
  .compare-close, .fav-close {
    background:var(--panel-soft); border:1.5px solid var(--panel-line);
    color:var(--ink); border-radius:9px; width:32px; height:32px;
    cursor:pointer; font-size:15px;
  }
  .compare-body {
    overflow-y:auto;
    flex: 1 1 auto;
    margin-bottom: 12px;
    background: #2e3454;
    border-radius: 12px;
    padding: 4px;
  }
  .compare-table { width:100%; border-collapse:collapse; background: transparent; }
  .compare-table th, .compare-table td {
    padding:10px 11px; text-align:left; font-size:13.5px;
    border-bottom:1px solid rgba(255,255,255,0.08);
  }
  .compare-table th {
    font-family:'Baloo 2',cursive; font-weight:800; color:#fff;
    background: #3a4168;
    font-size:14px;
  }
  .compare-table td:first-child {
    font-weight:700; color: #c8b8f0;
    background: #353b5f;
  }
  .compare-table tr td { color: #f0f2ff; }
  .compare-table tr:hover td { background: rgba(255,255,255,0.04); }
  
  /* Sonraki tablo butonu - alt */
  .compare-next-btn {
    display:none;
    align-items:center; justify-content:center;
    gap:8px;
    background: linear-gradient(135deg, var(--accent), var(--accent-glow));
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 12px 18px;
    font-family: 'Baloo 2', cursive;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    box-shadow: 0 6px 18px rgba(122, 95, 214, 0.4);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    flex-shrink: 0;
  }
  .compare-next-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 22px rgba(122, 95, 214, 0.6);
  }
  .compare-next-btn:active { transform: scale(0.97); }
  .compare-next-btn b { font-weight: 800; }

  .fav-list { display:flex; flex-direction:column; gap:6px; }
  .fav-item {
    display:flex; align-items:center; gap:9px;
    background:var(--panel-soft); border:1.5px solid var(--panel-line);
    border-radius:10px; padding:9px 11px; cursor:pointer;
    font-size:12.5px; color:var(--ink); font-weight:600;
  }
  .fav-item:hover { border-color:var(--accent); }
  .fav-item .fav-emoji { font-size:18px; }
  .fav-item .fav-rm { margin-left:auto; color:var(--muscle); font-size:14px; background:none; border:none; cursor:pointer; }
  .fav-empty { color:var(--ink-soft); font-size:12px; text-align:center; padding:20px; }

  /* PAYLAŞIM PENCERESİ */
  .share-overlay {
    position:absolute; inset:0; z-index:55;
    background:rgba(10,14,26,0.82); backdrop-filter:blur(3px);
    display:none; align-items:center; justify-content:center; padding:20px;
  }
  .share-overlay.show { display:flex; }
  .share-card {
    background:var(--panel); border:2px solid var(--accent);
    border-radius:20px; padding:14px;
    width:min(340px,92vw); max-height:88vh; overflow-y:auto;
    box-shadow:0 20px 60px rgba(0,0,0,.55);
    animation:shareIn .25s ease;
  }
  @keyframes shareIn { from{transform:translateY(20px) scale(.96);opacity:0;} to{transform:none;opacity:1;} }
  .share-head {
    display:flex; align-items:center; justify-content:space-between;
    font-family:'Baloo 2',cursive; font-weight:800; font-size:15px;
    color:var(--accent); margin-bottom:10px;
  }
  .share-close {
    background:var(--panel-soft); border:1.5px solid var(--panel-line);
    color:var(--ink); border-radius:9px; width:28px; height:28px;
    cursor:pointer; font-size:13px;
  }
  .share-preview {
    width:100%; border-radius:12px; border:1.5px solid var(--panel-line);
    margin-bottom:12px; display:block; background:var(--bg);
  }
  .share-actions { display:flex; flex-direction:column; gap:8px; }
  .share-act {
    display:flex; align-items:center; gap:11px;
    background:var(--panel-soft); border:1.5px solid var(--panel-line);
    border-radius:13px; padding:11px 13px; cursor:pointer;
    text-align:left; color:var(--ink);
    font-family:'Fredoka',sans-serif;
    transition:all .15s ease;
  }
  .share-act:hover { border-color:var(--accent); background:var(--panel-line); }
  .share-act:active { transform:scale(.97); }
  .share-act.primary {
    background:linear-gradient(135deg,#25d366,#1da851); border-color:#25d366; color:#fff;
  }
  .share-act.primary:hover { filter:brightness(1.08); }
  .share-act .sa-ico { font-size:24px; flex-shrink:0; }
  .share-act .sa-txt { font-size:13px; line-height:1.3; }
  .share-act .sa-txt small { font-size:10.5px; opacity:.75; }

  .tabbar {
    position:absolute; top:52px; left:0;
    padding:5px 12px; z-index:25; pointer-events:none;
  }
  .tabbar > * { pointer-events:auto; }
  .tab {
    font-family:'Fredoka',sans-serif; font-weight:600;
    font-size:12.5px; color:var(--ink);
    background:var(--panel); border:1.5px solid var(--panel-line);
    padding:7px 13px; border-radius:12px;
    cursor:pointer; display:inline-flex; align-items:center; gap:5px;
  }
  .tab .ico { font-size:1.1em; }
  .tab.active {
    background:var(--accent); border-color:var(--accent); color:#0a0e1a;
  }

  .organ-panel {
    position:absolute; top:96px; left:14px;
    width:min(270px,82vw); max-height:calc(100vh - 280px);
    background:var(--panel); border:2px solid var(--accent);
    border-radius:16px; padding:10px; z-index:18;
    box-shadow:0 16px 40px rgba(40,55,90,.25);
    overflow-y:auto; display:none;
  }
  .organ-panel.show { display:block; }
  .organ-cat {
    font-family:'Baloo 2',cursive; font-weight:800; font-size:11px;
    color:var(--accent-glow); padding:8px 4px 4px;
    text-transform:uppercase; letter-spacing:0.5px;
    border-top:1px solid var(--panel-line);
    margin-top:6px;
  }
  .organ-cat:first-child { border-top:none; margin-top:0; }
  .organ-item {
    display:flex; align-items:center; gap:9px;
    width:100%; text-align:left;
    font-family:'Fredoka',sans-serif; font-weight:600; font-size:13px;
    color:var(--ink); background:var(--panel-soft);
    border:1.5px solid transparent; border-radius:10px;
    padding:9px 10px; margin-bottom:4px; cursor:pointer;
  }
  .organ-item:hover { background:var(--panel-line); }
  .organ-item.active {
    border-color:var(--accent); background:var(--panel-line); color:#fff;
  }
  .organ-item .oico { font-size:18px; width:22px; text-align:center; }

  .level-panel {
    position:absolute; top:52px; left:14px;
    width:max-content; max-width:min(200px,70vw);
    background:var(--panel); border:2px solid var(--accent);
    border-radius:16px; padding:10px; z-index:22;
    display:none;
    box-shadow:0 14px 36px rgba(40,55,90,.25);
  }
  .level-panel.show { display:block; }
  .level-title {
    font-family:'Baloo 2',cursive; font-weight:800; font-size:13px;
    color:var(--accent); margin-bottom:5px;
  }
  .level-sub { font-size:10px; color:var(--ink-soft); margin-bottom:7px; }
  .level-item {
    display:flex; align-items:center; gap:7px;
    width:100%; padding:6px 8px;
    background:var(--panel-soft);
    border:1.5px solid transparent; border-radius:10px;
    cursor:pointer; margin-bottom:4px;
    font-size:12px; color:var(--ink);
  }
  .level-item:hover { background:var(--panel-line); }
  .level-item.active {
    border-color:var(--accent); background:var(--panel-line); color:#fff;
  }
  .level-item .lemoji { font-size:16px; flex-shrink:0; }
  .level-item .lname { font-weight:700; white-space:nowrap; }
  .level-item .ldesc { font-size:10px; opacity:.65; margin-left:auto; padding-left:8px; white-space:nowrap; }

  /* SAĞ PANEL ÜSTÜ İPUCU */
  .info-hint {
    position:absolute; top:57px; right:16px;
    z-index:15; pointer-events:none;
    font-family:'Fredoka',sans-serif; font-size:9.5px;
    color:var(--ink-soft); opacity:0.55;
    font-weight:500;
    text-align:right;
    animation:hintPulse 2.5s ease-in-out infinite;
  }
  @keyframes hintPulse { 0%,100%{opacity:0.4;} 50%{opacity:0.7;} }

  /* SAĞ PANEL — biraz daha geniş ki kalabalık görünmesin */
  .info {
    position:absolute; top:74px; right:14px;
    width:min(221px,37vw); padding:10px 11px;
    background:var(--panel); border:2px solid var(--panel-line);
    border-radius:14px; z-index:15;
    max-height:calc(100vh - 258px); overflow-y:auto;
    box-shadow:0 10px 30px rgba(40,55,90,.18);
  }
  .info::-webkit-scrollbar { width:5px; }
  .info::-webkit-scrollbar-thumb { background:var(--panel-line); border-radius:5px; }
  .i-head {
    font-family:'Baloo 2',cursive; font-weight:800;
    font-size:13px; color:var(--accent);
    border-bottom:1.5px dashed var(--panel-line);
    padding:5px 7px; margin-bottom:6px;
    display:flex; align-items:center; justify-content:space-between; gap:8px;
    cursor:pointer; user-select:none;
    background:var(--panel-soft); border-radius:9px;
    border:1.5px solid var(--accent);
    transition:background .15s ease;
  }
  .i-head:hover { background:var(--panel-line); }
  .i-head:active { transform:scale(0.98); }
  .i-head .i-head-txt { flex:1; }
  .i-head .i-head-arrow {
    font-size:14px; color:var(--accent-glow);
    flex-shrink:0; transition:transform .2s ease;
  }
  .i-body { animation:fadeInBody .2s ease; }
  @keyframes fadeInBody { from{opacity:0;} to{opacity:1;} }
  .i-section { margin-bottom:8px; }
  .i-stitle {
    font-family:'Baloo 2',cursive; font-weight:700;
    font-size:11px; color:var(--accent-glow); margin-bottom:4px;
    padding:4px 6px; border-radius:6px;
    transition:background .15s ease;
    user-select:none;
  }
  .i-stitle:hover { background:var(--panel-soft); }
  .i-stitle-arrow { transition:transform .15s ease; }
  .i-row {
    font-size:11.5px; color:var(--ink); line-height:1.35;
    padding:6px 7px; margin-bottom:3px;
    background:var(--panel-soft);
    border-radius:7px; cursor:pointer;
    border:1.5px solid transparent;
    transition:all .15s ease;
    display:flex; align-items:center; gap:6px;
  }

  lizozomPerox:{

    parts:{

    info:[
      {minLevel:0,title:'🛡️ Lizozom',rows:[
        {key:'lizozom',tag:'1',tagcolor:'#c45d5d',text:'Lizozom Yapısı',detail:[
          'Tek zarlı <b>küçük küresel kese</b>.',

          '• Glikozidaz (şeker parçalar)',

          'Bu asit ortam enzimleri aktive eder.',
          'Eğer lizozom patlarsa hücre kendi kendini sindirir!',
          'Latince adı: <b>Lysosoma</b> (lyso=parçala, soma=cisim).'

        {key:'fagositoz',tag:'3',tagcolor:'#9d7fe6',text:'Fagositoz',detail:[

          'Adımlar:',
          '1) Hücre zarı parçacığı yutar (fagosom oluşur)',
          '2) Fagosom + Lizozom = <b>fagolizozom</b>',
          '3) Enzimler parçacığı sindirir',

        {key:'katalaz',tag:'7',tagcolor:'#5fc8e0',text:'Katalaz Enzimi',detail:[

          'Tepkimesi:',

          'Hızı: saniyede <b>milyonlarca</b> H₂O₂ molekülü!',

function makeOrganMaterial(opts={}){
  const m=new THREE.MeshPhysicalMaterial({
    color: opts.color||0xc66a5a,
    roughness: opts.roughness ?? 0.34,
    metalness: 0.0,
    clearcoat: opts.clearcoat ?? 0.85,
    clearcoatRoughness: opts.clearcoatRoughness ?? 0.25,
    sheen: 0.7, sheenColor:new THREE.Color(0xff9a8a),
    sheenRoughness:0.5,
    transmission: opts.transmission ?? 0,
    thickness: opts.thickness ?? 0,
    ior: 1.38,
    transparent: !!opts.transparent,
    opacity: opts.opacity ?? 1,
    vertexColors: !!opts.vertexColors,
    side: opts.side || THREE.FrontSide
  });
  return m;
}
function organify(geo, baseHex, bumpAmt=0.04){
  geo.computeVertexNormals();
  const pos=geo.attributes.position, n=pos.count;
  const colors=new Float32Array(n*3);
  const base=new THREE.Color(baseHex||0xc66a5a);
  for(let i=0;i<n;i++){
    const x=pos.getX(i),y=pos.getY(i),z=pos.getZ(i);
    const noise=Math.sin(x*8+y*5)*Math.cos(z*7+y*3)*0.5+Math.sin(y*11+z*4)*0.5;
    const len=Math.hypot(x,y,z)||1;
    pos.setXYZ(i, x+(x/len)*noise*bumpAmt, y+(y/len)*noise*bumpAmt, z+(z/len)*noise*bumpAmt);
    const shade=0.88+noise*0.12;
    const warm=1+Math.sin(x*4+z*3)*0.04;
    colors[i*3]=Math.min(1,base.r*shade*warm);
    colors[i*3+1]=Math.min(1,base.g*shade);
    colors[i*3+2]=Math.min(1,base.b*shade);
  }
  geo.computeVertexNormals();
  geo.setAttribute('color',new THREE.BufferAttribute(colors,3));
  return geo;
}
function addVessels(parent, count, spread, col=0xb83a3a){
  for(let i=0;i<count;i++){
    const pts=[];
    let p=new THREE.Vector3((Math.random()-0.5)*spread,(Math.random()-0.5)*spread,(Math.random()-0.5)*spread*0.3);
    for(let s=0;s<5;s++){
      pts.push(p.clone());
      p=p.clone().add(new THREE.Vector3((Math.random()-0.5)*0.4,(Math.random()-0.5)*0.4,0));
    }
    const g=new THREE.TubeGeometry(new THREE.CatmullRomCurve3(pts),12,0.012+Math.random()*0.01,6,false);
    const v=new THREE.Mesh(g,new THREE.MeshStandardMaterial({color:col,roughness:.5,transparent:true,opacity:0.55}));
    parent.add(v);
  }
}
function tube(path, r, col, seg=80){
  const geo=new THREE.TubeGeometry(path, seg, r, 20, false);
  organify(geo, col, 0.02);
  return new THREE.Mesh(geo, makeOrganMaterial({color:col, vertexColors:true}));
}
function bumpySphere(r, seg, bumpAmt, freq){
  const g=new THREE.SphereGeometry(r,seg,Math.floor(seg*0.75));
  const p=g.attributes.position;
  for(let i=0;i<p.count;i++){
    let x=p.getX(i), y=p.getY(i), z=p.getZ(i);
    const n=Math.sin(x*freq+y*(freq*0.8))*Math.cos(y*freq+z*(freq*1.1))*bumpAmt
          + Math.sin(z*(freq*1.3)+x*(freq*0.7))*bumpAmt*0.5;
    const k=1+n/r;
    p.setXYZ(i,x*k,y*k,z*k);
  }
  g.computeVertexNormals();
  return g;
}
function bobrekGeo(boy=1.0, en=0.65, derinlik=0.55){
  const g=new THREE.SphereGeometry(1.0, 36, 28);
  const p=g.attributes.position;
  for(let i=0;i<p.count;i++){
    let x=p.getX(i), y=p.getY(i), z=p.getZ(i);
    x*=en; y*=boy; z*=derinlik;
    if(x<-0.1 && Math.abs(y)<0.3 && Math.abs(z)<0.25){
      const c = (1 - Math.hypot(y/0.3, z/0.25)*0.9);
      x += c*0.18;
    }
    p.setXYZ(i,x,y,z);
  }
  g.computeVertexNormals();
  return g;
}

  }
  for(let i = 0; i < 24; i++){
    const phi = Math.random() * Math.PI * 2;

    const r = 2.42;
    const px = Math.sin(theta) * Math.cos(phi) * r;
    const py = Math.cos(theta) * r;
    const pz = Math.sin(theta) * Math.sin(phi) * r;

    shapeGroup.add(poreCore);

  for(let chrom = 0; chrom < 6; chrom++){

      const angle = t * Math.PI * 4 + offset;

    pickPart(chromat, 'kromatin');

      const histon = new THREE.Mesh(new THREE.SphereGeometry(0.1, 12, 10),
        new THREE.MeshPhysicalMaterial({ color: 0xffd040, roughness: 0.3, clearcoat: 0.7, emissive: 0xffe080, emissiveIntensity: 0.7 }));

        Math.cos(angle) * (1.3 + Math.sin(t * Math.PI * 3) * 0.3),

        Math.sin(angle) * (1.3 + Math.cos(t * Math.PI * 3) * 0.3) );
      pickPart(histon, 'kromatin');
      shapeGroup.add(histon);
    }

  const nucleolus = new THREE.Mesh(bumpySphere(0.6, 28, 0.04, 5),

  pickPart(nucleolus, 'nukleolus');
  shapeGroup.add(nucleolus);
  for(let i = 0; i < 15; i++){
    const phi = Math.random() * Math.PI * 2;
    const theta = Math.acos(2 * Math.random() - 1);
    const r = 0.55;
    const rnaSpot = new THREE.Mesh(new THREE.SphereGeometry(0.04, 6, 4),

    shapeGroup.add(rnaSpot);
  }
  const dnaPos = new THREE.Vector3(3.8, 0, 0);
  for(let i = 0; i <= 36; i++){
    const t = i / 36;
    const y = -2.0 + t * 4.0;
    const angle = t * Math.PI * 6;
    const s1 = new THREE.Mesh(new THREE.SphereGeometry(0.12, 10, 8),
      new THREE.MeshPhysicalMaterial({ color: 0x4080ff, roughness: 0.2, clearcoat: 1.0, sheen: 1.0, emissive: 0x60a0ff, emissiveIntensity: 0.7 }));
    s1.position.set(dnaPos.x + Math.cos(angle) * 0.35, y, Math.sin(angle) * 0.35);

    const s2 = new THREE.Mesh(new THREE.SphereGeometry(0.12, 10, 8),
      new THREE.MeshPhysicalMaterial({ color: 0xff4060, roughness: 0.2, clearcoat: 1.0, sheen: 1.0, emissive: 0xff6080, emissiveIntensity: 0.7 }));
    s2.position.set(dnaPos.x + Math.cos(angle + Math.PI) * 0.35, y, Math.sin(angle + Math.PI) * 0.35);
    pickPart(s2, 'dna');
    shapeGroup.add(s2);
    if(i % 2 === 0){
      const bar = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.7, 6),
        new THREE.MeshPhysicalMaterial({ color: 0xffd040, emissive: 0xffe080, emissiveIntensity: 0.6 }));
      bar.position.set(dnaPos.x, y, 0);
      bar.rotation.z = Math.PI / 2;
      bar.rotation.y = angle;
      shapeGroup.add(bar);
    }
  }
  const mrnaPts = [
    new THREE.Vector3(2.2, 1.8, 0),
    new THREE.Vector3(2.8, 2.2, 0.2),

  const mrna = new THREE.Mesh(new THREE.TubeGeometry(new THREE.CatmullRomCurve3(mrnaPts), 30, 0.1, 10, false),

  pickPart(mrna, 'mrna');
  shapeGroup.add(mrna);

  addLabel(new THREE.Vector3(0, 0, 0), 'cekirdekZari', 'accent', 0);
  addLabel(new THREE.Vector3(1.7, 1.0, 0.8), 'nukleerPor', 'cartilage', 0);

  addLabel(new THREE.Vector3(0.5, 0, 0.5), 'kromatin', 'joint', 1);
  addLabel(new THREE.Vector3(3.8, 0, 0), 'dna', 'muscle', 1);

  addLabel(new THREE.Vector3(0, -0.5, 0), 'nukleoplazma', 'cartilage', 2);

  small.scale.set(1.3, 0.75, 1.0);

  const mrnaPts = [];

    new THREE.MeshPhysicalMaterial({ color: 0xffd040, roughness: 0.3, clearcoat: 1.0, sheen: 1.0, sheenColor: 0xffe080, emissive: 0xffd040, emissiveIntensity: 0.7 }));
  pickPart(mrna, 'mrnaPro');
  shapeGroup.add(mrna);
  for(let i = 0; i < 8; i++){
    for(let j = 0; j < 3; j++){
      const c = new THREE.Mesh(new THREE.SphereGeometry(0.085, 10, 8),
        new THREE.MeshPhysicalMaterial({ color: [0xff5060, 0x4080ff, 0x40c060][j], roughness: 0.3, emissive: [0xff5060, 0x4080ff, 0x40c060][j], emissiveIntensity: 0.8 }));
      c.position.set(-3.0 + i * 0.9 + j * 0.2, 0.08, 0.16);
      shapeGroup.add(c);
    }
  }

  function makeYoncaRNA(x, color, hasAA = true){
    const grp = new THREE.Group();
    const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 0.55, 10),
      new THREE.MeshPhysicalMaterial({ color: color, roughness: 0.3, clearcoat: 0.7, emissive: color, emissiveIntensity: 0.6 }));
    stem.position.set(0, 0, 0);
    grp.add(stem);
    const leafL = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 0.3, 8),
      new THREE.MeshPhysicalMaterial({ color: color, emissive: color, emissiveIntensity: 0.6 }));
    leafL.position.set(-0.18, 0.25, 0);
    leafL.rotation.z = Math.PI / 3;
    grp.add(leafL);
    const leafR = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 0.3, 8),
      new THREE.MeshPhysicalMaterial({ color: color, emissive: color, emissiveIntensity: 0.6 }));
    leafR.position.set(0.18, 0.25, 0);
    leafR.rotation.z = -Math.PI / 3;
    grp.add(leafR);
    const top = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 0.4, 8),
      new THREE.MeshPhysicalMaterial({ color: color, emissive: color, emissiveIntensity: 0.6 }));
    top.position.set(0, 0.42, 0);
    grp.add(top);
    for(let i = 0; i < 3; i++){
      const ak = new THREE.Mesh(new THREE.SphereGeometry(0.05, 8, 6), new THREE.MeshBasicMaterial({color: 0xffffff}));
      ak.position.set((i - 1) * 0.06, -0.32, 0);
      grp.add(ak);
    }
    if(hasAA){
      const aa = new THREE.Mesh(new THREE.SphereGeometry(0.15, 14, 10),
        new THREE.MeshPhysicalMaterial({ color: 0xff4060, roughness: 0.3, clearcoat: 0.9, sheen: 1.0, sheenColor: 0xff80a0, emissive: 0xff4060, emissiveIntensity: 0.7 }));
      aa.position.set(0, 0.72, 0);
      pickPart(aa, 'aminoAsit');
      grp.add(aa);
    }
    grp.position.set(x, 0.55, 0.15);
    grp.traverse(c => { if(c.isMesh) pickPart(c, 'trna'); });

function buildEr(){

  nuc.position.copy(nucPos);
  pickPart(nuc, 'cekirdekZariEr');
  shapeGroup.add(nuc);
  const nucIn = new THREE.Mesh(new THREE.SphereGeometry(0.85, 28, 22),
    new THREE.MeshPhysicalMaterial({ color: 0x501080, roughness: 0.6, emissive: 0x7020a0, emissiveIntensity: 0.5, transparent: true, opacity: 0.7 }));
  nucIn.position.copy(nucPos);
  shapeGroup.add(nucIn);

  for(let i = 0; i < 5; i++){
    const sheetW = 2.5, sheetD = 1.8;
    const sheetGeo = new THREE.PlaneGeometry(sheetW, sheetD, 30, 22);
    const positions = sheetGeo.attributes.position;
    for(let v = 0; v < positions.count; v++){
      const x = positions.getX(v);
      const z = positions.getY(v);
      const wave = Math.sin(x * 3.5 + i) * 0.15 + Math.cos(z * 2.5 + i*0.5) * 0.1;
      positions.setZ(v, wave);
    }
    positions.needsUpdate = true;
    sheetGeo.computeVertexNormals();
    const sheet = new THREE.Mesh(sheetGeo,
      new THREE.MeshPhysicalMaterial({ color: 0x6040c0, roughness: 0.4, clearcoat: 0.7, sheen: 0.8, sheenColor: 0x9060e0, emissive: 0x5030b0, emissiveIntensity: 0.45, side: THREE.DoubleSide, transparent: true, opacity: 0.85 }));
    sheet.rotation.x = -Math.PI / 2;
    sheet.position.set(-1.5 + i * 0.25, 1.0 - i * 0.4, 0);
    sheet.rotation.z = -0.1 + i * 0.03;
    pickPart(sheet, 'ger');
    shapeGroup.add(sheet);
    for(let r = 0; r < 40; r++){
      const rx = (Math.random() - 0.5) * sheetW * 0.95;
      const rz = (Math.random() - 0.5) * sheetD * 0.95;
      const wave = Math.sin(rx * 3.5 + i) * 0.15 + Math.cos(rz * 2.5 + i*0.5) * 0.1;
      const rib = new THREE.Mesh(new THREE.SphereGeometry(0.045, 8, 6),
        new THREE.MeshPhysicalMaterial({ color: 0xff4060, roughness: 0.3, clearcoat: 0.7, emissive: 0xff4060, emissiveIntensity: 1.0 }));
      rib.position.set(-1.5 + i * 0.25 + rx, 1.0 - i * 0.4 + wave + 0.05, rz);
      pickPart(rib, 'ger');
      shapeGroup.add(rib);
    }
  }

  for(let path = 0; path < 4; path++){
    const pathPts = [];
    const seed = path * 1.7;
    for(let i = 0; i <= 30; i++){
      const t = i / 30;
      const angle = t * Math.PI * 4 + seed;
      const radius = 1.0 + Math.sin(t * Math.PI * 3 + seed) * 0.5;
      pathPts.push(new THREE.Vector3(0.5 + Math.cos(angle) * radius, -1.5 + Math.sin(t * Math.PI * 2 + seed) * 0.6, Math.sin(angle) * radius * 0.7));
    }
    const tube = new THREE.Mesh(new THREE.TubeGeometry(new THREE.CatmullRomCurve3(pathPts), 100, 0.12, 12, false),
      new THREE.MeshPhysicalMaterial({ color: 0x40b8e0, roughness: 0.3, clearcoat: 0.9, sheen: 0.8, sheenColor: 0x80d8f0, emissive: 0x40a0d0, emissiveIntensity: 0.45, transparent: true, opacity: 0.9 }));
    pickPart(tube, 'der');
    shapeGroup.add(tube);
  }

  for(let i = 0; i < 25; i++){
    const lumen = new THREE.Mesh(new THREE.SphereGeometry(0.04, 6, 4),
      new THREE.MeshBasicMaterial({ color: 0xffe080, transparent: true, opacity: 0.7, blending: THREE.AdditiveBlending }));
    lumen.position.set(-1.0 + Math.random() * 3.0, 0.5 - Math.random() * 1.5, (Math.random() - 0.5) * 1.5);
    pickPart(lumen, 'erLumen');
    shapeGroup.add(lumen);
  }

  for(let i = 0; i < 5; i++){
    const vez = new THREE.Mesh(new THREE.SphereGeometry(0.15 + Math.random() * 0.05, 14, 10),
      new THREE.MeshPhysicalMaterial({ color: 0x80c8e0, roughness: 0.2, clearcoat: 1.0, sheen: 1.0, sheenColor: 0xc0e0f0, emissive: 0x80c8e0, emissiveIntensity: 0.5, transmission: 0.4, thickness: 0.3 }));
    vez.position.set(2.8 + i * 0.3, 0.5 - i * 0.25, 0.3);
    pickPart(vez, 'taSimaVez');
    shapeGroup.add(vez);
  }

  addLabel(new THREE.Vector3(-3.5, 0, 0), 'cekirdekZariEr', 'accent', 0);
  addLabel(new THREE.Vector3(-0.5, 0.5, 0), 'ger', 'cartilage', 0);
  addLabel(new THREE.Vector3(1.0, -1.0, 0), 'der', 'warning', 0);
  addLabel(new THREE.Vector3(0.5, 0.3, 0), 'erLumen', 'joint', 1);
  addLabel(new THREE.Vector3(3.3, 0.2, 0.3), 'taSimaVez', 'muscle', 1);
}

function makeBone(x1,y1,z1, x2,y2,z2, radius=0.05, color=0xf0e8d0){
  const v1 = new THREE.Vector3(x1,y1,z1);
  const v2 = new THREE.Vector3(x2,y2,z2);
  const dir = v2.clone().sub(v1);
  const len = dir.length();
  const geo = new THREE.CylinderGeometry(radius, radius, len, 12);
  const mat = new THREE.MeshPhysicalMaterial({ color, roughness:0.5, clearcoat:0.4, sheen:0.3, transparent:true, opacity:0.92 });
  const m = new THREE.Mesh(geo, mat);
  m.position.copy(v1).add(v2).multiplyScalar(0.5);
  m.lookAt(v2); m.rotateX(Math.PI/2);
  return m;
}
function makeJoint(x,y,z, r=0.08, color=0xe0d8c0){
  const m = new THREE.Mesh(new THREE.SphereGeometry(r, 14, 12),
    new THREE.MeshPhysicalMaterial({color, roughness:0.5, clearcoat:0.3, transparent:true, opacity:0.92}));
  m.position.set(x,y,z);
  return m;
}

function clearBodyHighlights(){
  Object.values(bodyOrgansMap).forEach(m => {
    if(m.userData.origOpacity===undefined){
      m.userData.origOpacity = m.material.opacity;
      m.userData.origEmissiveIntensity = m.material.emissive ? m.material.emissive.getHex() : 0;
    }
    m.material.opacity = (m.userData.origOpacity || 0.4) * 0.55;
    if(m.material.emissive){ m.material.emissiveIntensity = 0.05; }
  });
  bodyHighlightItems.forEach(item => {
    if(item.halo) bodyMapGroup.remove(item.halo);
    if(item.arrow) bodyMapGroup.remove(item.arrow);
    if(item.balloon) item.balloon.remove();
  });
  bodyHighlightItems.length = 0;
  const mainBalloon = document.getElementById('bodyMapBalloon');
  if(mainBalloon) mainBalloon.classList.remove('show');
}

function highlightBodyOrgans(organIds, isMicroscopic){
  organIds.forEach(id => {
    const m = bodyOrgansMap[id];
    if(!m) return;
    m.material.opacity = Math.min((m.userData.origOpacity || 0.7) * 1.4, 0.95);
    if(m.material.emissive){ m.material.emissiveIntensity = 0.6; }
    m.material.needsUpdate = true;
    const bbox = new THREE.Box3().setFromObject(m);
    const size = new THREE.Vector3(); bbox.getSize(size);
    const center = new THREE.Vector3(); bbox.getCenter(center);
    const haloR = Math.max(size.x, size.y, size.z) * 0.7;
    const halo = new THREE.Mesh(new THREE.TorusGeometry(haloR, 0.025, 10, 32),
      new THREE.MeshStandardMaterial({color:0xffd166, emissive:0xffd166, emissiveIntensity:0.9, transparent:true, opacity:0.85}));
    halo.position.copy(center);
    halo.rotation.x = Math.PI/2;
    bodyMapGroup.add(halo);
    const arrowDir = new THREE.Vector3(center.x > 0 ? 1.6 : -1.6, center.y, center.z);
    const arrowGrp = new THREE.Group();
    const stick = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 0.6, 8),
      new THREE.MeshStandardMaterial({color:0xffd166, emissive:0xffd166, emissiveIntensity:0.8}));
    stick.position.set(center.x > 0 ? 0.35 : -0.35, 0, 0);
    stick.rotation.z = Math.PI/2;
    arrowGrp.add(stick);
    const head = new THREE.Mesh(new THREE.ConeGeometry(0.1, 0.22, 12),
      new THREE.MeshStandardMaterial({color:0xffd166, emissive:0xffd166, emissiveIntensity:1.0}));
    head.position.set(center.x > 0 ? 0.08 : -0.08, 0, 0);
    head.rotation.z = center.x > 0 ? -Math.PI/2 : Math.PI/2;
    arrowGrp.add(head);
    arrowGrp.position.copy(arrowDir);
    bodyMapGroup.add(arrowGrp);
    bodyHighlightItems.push({organMesh:m, halo, arrow:arrowGrp});
  });
}

function updateBodyHighlights(dt){
  if(!bodyMapMode) return;
  bodyAnimT += dt;
  const pulse = 1 + Math.sin(bodyAnimT*Math.PI*2)*0.15;
  bodyHighlightItems.forEach(item => {
    if(item.halo){
      item.halo.scale.set(pulse, 1, pulse);
      item.halo.material.opacity = 0.55 + Math.sin(bodyAnimT*Math.PI*2)*0.35;
    }
    if(item.organMesh && item.organMesh.material.emissive){
      item.organMesh.material.emissiveIntensity = 0.5 + Math.sin(bodyAnimT*Math.PI*2)*0.4;
    }
  });
}

function showBodyMap(key){
  if(!ORGAN_ANATOMY_MAP[key]) return;
  const data = ORGAN_ANATOMY_MAP[key];
  clearBodyHighlights();
  highlightBodyOrgans(data.organs, data.isMicroscopic);
  const balloon = document.getElementById('bodyMapBalloon');
  if(balloon){
    balloon.querySelector('.bm-title').textContent = data.title;
    balloon.querySelector('.bm-desc').textContent = data.desc;
    if(data.isMicroscopic){ balloon.querySelector('.bm-micro').style.display = 'block'; }
    else { balloon.querySelector('.bm-micro').style.display = 'none'; }
    balloon.classList.add('show');
  }
  cam.targetY = data.focusY;
  cam.radius = 9;
  bodyAnimT = 0;
}

let bodyMapBuilt = false;
function ensureBodyMapBuilt(){
  if(bodyMapBuilt) return true;
  try {
    buildBodyMapSkeleton();
    buildBodyMapOrgans();
    bodyMapBuilt = true;
    return true;
  } catch(e) {
    console.error('Vücut haritası oluşturulamadı:', e);
    return false;
  }
}

function toggleBodyMap(){
  if(!bodyMapMode && !bodyMapBuilt){
    if(!ensureBodyMapBuilt()){ showToast('⚠️ Vücut haritası şu an oluşturulamadı'); return; }
  }
  bodyMapMode = !bodyMapMode;
  const btn = document.getElementById('bodyMapBtn');
  if(bodyMapMode){
    shapeGroup.visible = false;
    bodyMapGroup.visible = true;
    if(btn){ btn.innerHTML = '<span class="bm-icon">🫘</span><span class="bm-text">Detay</span>'; btn.classList.add('active'); }
    if(current){ showBodyMap(current.key); }
    document.querySelectorAll('.organ-label').forEach(el => el.style.display = 'none');

function chunkDetailIntoPages(detail){
  if(!detail||!detail.length) return [];
  const n=detail.length;
  let targetPages;
  if(n<=2)       targetPages=Math.max(1,n);
  else if(n<=3)  targetPages=2;
  else if(n<=5)  targetPages=3;
  else if(n<=7)  targetPages=4;
  else if(n<=9)  targetPages=5;
  else if(n<=11) targetPages=6;
  else if(n<=13) targetPages=7;
  else           targetPages=8;
  const pages=[];
  const perPage=Math.ceil(n/targetPages);
  for(let i=0;i<n;i+=perPage){ pages.push(detail.slice(i,i+perPage).join(' ')); }
  return pages;
}

function loadOverviewTopic(){
  if(!current) return;
  currentTopic='overview';
  const def=current.def;
  const content=ORGAN_CONTENT[current.key];
  const cumleSayisi = Math.min(curLevel + 1, content.desc.length);
  const cumleler = content.desc.slice(0, cumleSayisi);
  const descText = cumleler.join(' ');
  const sentences = cumleler;
  let pageCount;
  if(sentences.length<=2) pageCount=1;
  else if(sentences.length<=3) pageCount=2;
  else pageCount=Math.ceil(sentences.length/2);
  const perPage=Math.ceil(sentences.length/pageCount);
  currentPages=[];
  for(let i=0;i<sentences.length;i+=perPage){
    currentPages.push({emoji:def.emoji,head:def.name,text:sentences.slice(i,i+perPage).join(' ')});
  }
  if(currentPages.length===0) currentPages=[{emoji:def.emoji,head:def.name,text:descText}];
  pageIdx=0;
  applyPage();
}

function highlightPart(rowKey){
  highlightedKey=rowKey;

    if(p.userData.partKey===rowKey){
      p.material.emissive.setHex(0xffd166);

      p.userData.highlighted=true;
    } else {
      if(p.userData.flash<=0){ p.material.emissive.setHex(0x000000); p.material.emissiveIntensity=0; }
      p.userData.highlighted=false;
    }
  });
}
function clearHighlight(){
  highlightedKey=null;
  pickList.forEach(p=>{
    if(p.material && p.material.emissive && p.userData.flash<=0){ p.material.emissive.setHex(0x000000); p.material.emissiveIntensity=0; }
    p.userData.highlighted=false;
  });
}

function loadRowTopic(rowKey){
  if(!current) return;
  const content=ORGAN_CONTENT[current.key];
  let row=null;
  for(const section of content.info){
    for(const r of section.rows){ if(r.key===rowKey){ row=r; break; } }
    if(row) break;
  }
  if(!row||!row.detail||!row.detail.length){ showToast('Bu madde için detay yok.'); return; }
  currentTopic=rowKey;
  const def=current.def;
  const partEmoji = emojiForPart(rowKey) || def.emoji;
  const pageTexts=chunkDetailIntoPages(row.detail);
  const tagPrefix=row.tag?`[${row.tag}] `:'';
  currentPages=pageTexts.map(text=>({emoji:partEmoji,head:tagPrefix+row.text,text:text}));
  pageIdx=0;
  applyPage();
  highlightPart(rowKey);
}

function applyPage(){
  if(!currentPages.length) return;
  pageIdx=Math.max(0,Math.min(currentPages.length-1,pageIdx));
  const p=currentPages[pageIdx];
  infoEmoji.textContent=p.emoji;
  infoHead.textContent=p.head;
  infoText.innerHTML=p.text;
  if(currentPages.length>1){
    infoPageEl.innerHTML=`<span class="pg-active">${pageIdx+1}</span> / ${currentPages.length} sayfa`;
  } else if(currentTopic==='overview'){
    infoPageEl.innerHTML=`<span style="opacity:0.7">Genel · sağdaki konulara tıkla</span>`;
  } else {
    infoPageEl.innerHTML=`<span style="opacity:0.7">Bu konunun tek sayfası</span>`;
  }
  navPrev.disabled=(pageIdx===0);
  navNext.disabled=(pageIdx===currentPages.length-1);
  activeInfoRowKey=(currentTopic==='overview')?null:currentTopic;
  refreshInfo();
}

navPrev.addEventListener('click',()=>{ if(pageIdx>0){ pageIdx--; applyPage(); } });

/* KAMERA + KONTROL */
const cam={theta:0.6,phi:1.15,radius:10,targetY:-0.3,panX:0,panY:0};
const LOOK_OFFSET_X=1.6;
let dragging=false,lastX=0,lastY=0,pinch=0;
let panning=false;
let twoFingerLastCx=0, twoFingerLastCy=0;
function P(e){return e.touches?e.touches[0]:e;}
function tDist(e){
  const dx=e.touches[0].clientX-e.touches[1].clientX;
  const dy=e.touches[0].clientY-e.touches[1].clientY;
  return Math.hypot(dx,dy);
}
function tCenter(e){
  return { x: (e.touches[0].clientX+e.touches[1].clientX)/2, y: (e.touches[0].clientY+e.touches[1].clientY)/2 };
}
function down(e){
  const p=P(e); lastX=p.clientX; lastY=p.clientY; dragging=true;
  if(e.button===2 || e.button===1){ panning=true; e.preventDefault(); }
  if(e.touches&&e.touches.length===2){
    pinch=tDist(e);
    const c=tCenter(e);
    twoFingerLastCx=c.x; twoFingerLastCy=c.y;
  }
}
function move(e){
  if(!dragging) return;
  if(e.touches&&e.touches.length===2){
    const nd=tDist(e);
    const c=tCenter(e);
    if(pinch>0){ const zoomRatio = pinch/nd; cam.radius = Math.max(5, Math.min(22, cam.radius*zoomRatio)); }
    const panDx = (c.x - twoFingerLastCx) * 0.01;
    const panDy = (c.y - twoFingerLastCy) * 0.01;
    cam.panX -= panDx;
    cam.panY += panDy;
    pinch=nd;
    twoFingerLastCx=c.x; twoFingerLastCy=c.y;
    autoSpin=false;
    const sb=document.getElementById('spinBtn'); if(sb) sb.classList.add('off');
    return;
  }
  const p=P(e);
  const dx=(p.clientX-lastX)*0.01, dy=(p.clientY-lastY)*0.01;
  if(panning){ cam.panX -= dx; cam.panY += dy; }
  else { cam.theta-=dx; cam.phi=Math.max(0.2,Math.min(Math.PI-0.2,cam.phi-dy)); }
  lastX=p.clientX; lastY=p.clientY;
  autoSpin=false;
  const sb=document.getElementById('spinBtn'); if(sb) sb.classList.add('off');
}
function up(){dragging=false; panning=false; pinch=0;}
cv.addEventListener('mousedown',down);
cv.addEventListener('mousemove',move);
window.addEventListener('mouseup',up);
cv.addEventListener('contextmenu',e=>e.preventDefault());
cv.addEventListener('touchstart',down,{passive:false});
cv.addEventListener('touchmove',e=>{e.preventDefault();move(e);},{passive:false});
cv.addEventListener('touchend',up);
cv.addEventListener('wheel',e=>{e.preventDefault();cam.radius=Math.max(5,Math.min(22,cam.radius+e.deltaY*0.01));},{passive:false});
cv.addEventListener('dblclick',e=>{ e.preventDefault(); cam.panX=0; cam.panY=0; showToast('🎯 Model merkeze alındı'); });
let lastTap=0;
cv.addEventListener('touchend',e=>{
  const now=performance.now();
  if(now-lastTap<300 && e.changedTouches.length===1){ cam.panX=0; cam.panY=0; showToast('🎯 Model merkeze alındı'); }
  lastTap=now;
});

/* RAYCAST */
const raycaster=new THREE.Raycaster();
const ndc=new THREE.Vector2();
let downX=0,downY=0,downT=0;
cv.addEventListener('pointerdown',e=>{downX=e.clientX; downY=e.clientY; downT=performance.now();});
cv.addEventListener('pointerup',e=>{
  if(Math.hypot(e.clientX-downX,e.clientY-downY)>8) return;
  if(performance.now()-downT>500) return;
  ndc.x=(e.clientX/innerWidth)*2-1;
  ndc.y=-(e.clientY/innerHeight)*2+1;
  raycaster.setFromCamera(ndc,camera);
  const hit=raycaster.intersectObjects(pickList,false)[0];
  if(hit&&hit.object.userData.partKey){
    const partKey=hit.object.userData.partKey;
    const part=ORGAN_CONTENT[current.key].parts[partKey];
    if(part){
      showToast(`<b>${part.name}</b><br>${part.job}`);
      loadRowTopic(partKey);
      if(hit.object.material&&hit.object.material.emissive){
        hit.object.material.emissive=new THREE.Color(hit.object.userData.baseColor||0xffffff);
        hit.object.material.emissiveIntensity=0.8;
        hit.object.userData.flash=1;
      }
    }
  }
});

function toggleFav(){
  if(!current) return;
  const key=current.key;
  if(favorites.has(key)){ favorites.delete(key); showToast('☆ Favorilerden çıkarıldı.'); }
  else { favorites.set(key,{organKey:key,name:current.def.name,emoji:current.def.emoji}); showToast(`⭐ <b>${current.def.name}</b> favorilere eklendi!`); }
  updateFavUI();
}
function updateFavUI(){
  const favBtn=document.getElementById('favBtn');
  const favCount=document.getElementById('favCount');
  if(favBtn){ const on=current&&favorites.has(current.key); favBtn.textContent=on?'★':'☆'; favBtn.classList.toggle('active',!!on); }
  if(favCount) favCount.textContent=favorites.size;
}
function renderFavList(){
  const list=document.getElementById('favList');
  if(!list) return;
  if(favorites.size===0){ list.innerHTML='<div class="fav-empty">Henüz favori yok.<br>Alt karttaki ☆ ile konu ekle.</div>'; return; }
  let html='';
  favorites.forEach((v,k)=>{
    html+=`<div class="fav-item" data-key="${k}">
      <span class="fav-emoji">${v.emoji}</span>
      <span>${v.name}</span>
      <button class="fav-rm" data-rm="${k}" title="Çıkar">🗑️</button>
    </div>`;
  });
  list.innerHTML=html;
  list.querySelectorAll('.fav-item').forEach(it=>{
    it.addEventListener('click',e=>{
      if(e.target.classList.contains('fav-rm')) return;
      selectOrgan(it.dataset.key);
      document.getElementById('favOverlay').classList.remove('show');
    });
  });
  list.querySelectorAll('.fav-rm').forEach(b=>{
    b.addEventListener('click',()=>{ favorites.delete(b.dataset.rm); updateFavUI(); renderFavList(); });
  });
}

function compareTablesFor(key){ return (COMPARE_MAP[key] || []).map(k => COMPARE_DATA[k]).filter(Boolean); }

function renderCompareTable(){
  const d = currentCompareKeys[currentCompareIndex];
  if(!d) return;
  const total = currentCompareKeys.length;
  const counter = total > 1 ? ` <span class="compare-counter">(${currentCompareIndex+1}/${total})</span>` : '';
  document.getElementById('compareTitle').innerHTML = d.title + counter;
  let html='<table class="compare-table"><thead><tr><th>Özellik</th>';
  d.cols.forEach(c=>html+=`<th>${c}</th>`);
  html+='</tr></thead><tbody>';
  d.rows.forEach(r=>{
    html+='<tr>';
    r.forEach((cell,i)=>html+=`<td>${cell}</td>`);
    html+='</tr>';
  });
  html+='</tbody></table>';
  document.getElementById('compareBody').innerHTML=html;
  const nextBtn = document.getElementById('compareNextBtn');
  if(nextBtn){
    if(total > 1){
      nextBtn.style.display = 'flex';
      const nextIdx = (currentCompareIndex + 1) % total;
      const nextTitle = currentCompareKeys[nextIdx].title.replace(/[⚖️🏭🧬⚡🚪]+\s*/g, '');
      nextBtn.innerHTML = `<span>Sonraki:</span> <b>${nextTitle}</b> <span>→</span>`;
    } else { nextBtn.style.display = 'none'; }
  }
}

function captureScreenCanvas(){
  renderer.render(scene,camera);
  const src=renderer.domElement;
  const c=document.createElement('canvas');
  c.width=src.width; c.height=src.height;
  const ctx=c.getContext('2d');
  ctx.drawImage(src,0,0);
  const scale=src.width/innerWidth || 1;
  const W=c.width, H=c.height;
  const pad=20*scale;
  const dark = darkTheme;
  const stripBg = dark ? 'rgba(16,21,38,0.92)' : 'rgba(255,255,255,0.94)';
  const inkColor = dark ? '#eef0ff' : '#1a2038';
  const accent = '#7a5fd6';
  const accentGlow = '#9d7fe6';
  const topH = 64*scale;
  ctx.fillStyle = stripBg; ctx.fillRect(0,0,W,topH);
  ctx.fillStyle = accent; ctx.fillRect(0,topH-3*scale,W,3*scale);
  ctx.fillStyle = accent;
  ctx.font=`bold ${22*scale}px Arial, sans-serif`;
  ctx.textBaseline='middle'; ctx.textAlign='left';
  ctx.fillText('🔬 '+(current?current.def.name:'Hücre'), pad, topH/2);
  const lv = LEVELS[curLevel];
  if(lv){
    ctx.fillStyle = inkColor;
    ctx.font=`bold ${15*scale}px Arial, sans-serif`;
    ctx.textAlign='right';
    ctx.fillText('🎓 '+lv.name, W-pad, topH/2);
  }
  const botH = 74*scale;
  ctx.fillStyle = stripBg; ctx.fillRect(0,H-botH,W,botH);
  ctx.fillStyle = accent; ctx.fillRect(0,H-botH,W,3*scale);
  let infoLine = '';
  try{ const ih=document.getElementById('infoHead'); if(ih && ih.textContent) infoLine = ih.textContent.trim(); }catch(e){}
  ctx.textAlign='left'; ctx.textBaseline='middle';
  if(infoLine){
    ctx.fillStyle = accentGlow;
    ctx.font=`bold ${16*scale}px Arial, sans-serif`;
    let t=infoLine; const maxW=W-2*pad-160*scale;
    while(ctx.measureText(t).width>maxW && t.length>4){ t=t.slice(0,-2); }
    if(t!==infoLine) t+='…';
    ctx.fillText(t, pad, H-botH/2-12*scale);
  }
  ctx.fillStyle = dark ? 'rgba(168,176,208,0.8)' : 'rgba(106,114,144,0.9)';
  ctx.font=`${12*scale}px Arial, sans-serif`;
  ctx.fillText('Qualsar · 3D Anatomi', pad, H-botH/2+14*scale);
  if(userDisplayName){
    ctx.textAlign='right';
    const name='👤 '+userDisplayName;
    ctx.font=`bold ${17*scale}px Arial, sans-serif`;
    const tw=ctx.measureText(name).width;
    const bx=W-pad-tw-16*scale, by=H-botH/2-14*scale, bw=tw+24*scale, bh=28*scale;
    ctx.fillStyle = accent;
    if(ctx.roundRect){ ctx.beginPath(); ctx.roundRect(bx,by,bw,bh,9*scale); ctx.fill(); }
    else ctx.fillRect(bx,by,bw,bh);
    ctx.fillStyle='#0a0e1a';
    ctx.fillText(name, W-pad-4*scale, H-botH/2);
  }
  ctx.textAlign='left';
  return c;
}

async function captureFullScreen(){
  renderer.render(scene,camera);
  let glDataURL=null;
  try{ glDataURL=renderer.domElement.toDataURL('image/png'); }catch(e){}
  const app=document.getElementById('app');
  if(typeof html2canvas!=='function' || !glDataURL){ return captureScreenCanvas(); }
  try{
    const result=await html2canvas(app,{
      backgroundColor: darkTheme?'#0a0e1a':'#eef1f8',
      scale: Math.min(window.devicePixelRatio||1,2),
      logging:false, useCORS:true,
      ignoreElements:(el)=> el.classList && (el.classList.contains('share-overlay')||el.classList.contains('toast')),
      onclone:(doc)=>{
        const cv2=doc.querySelector('#app canvas');
        if(cv2 && glDataURL){
          const img=doc.createElement('img');
          img.src=glDataURL;
          img.style.cssText=cv2.style.cssText+';width:'+cv2.clientWidth+'px;height:'+cv2.clientHeight+'px;display:block;position:absolute;top:0;left:0;';
          cv2.parentNode.replaceChild(img,cv2);
        }
      }
    });
    return result;
  }catch(e){ return captureScreenCanvas(); }
}

  if(!shareCanvas){ cb(null); return; }
  shareCanvas.toBlob(blob=>{
    if(!blob){ cb(null); return; }
    try{ cb(new File([blob],shareFileName(),{type:'image/png'}), blob); } catch(e){ cb(null, blob); }
  },'image/png');
}

function downloadShareImage(){
  if(!shareCanvas) return;
  try{
    shareCanvas.toBlob((blob)=>{
      if(!blob){ return; }
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');
      a.href=url; a.download=shareFileName();
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(()=>URL.revokeObjectURL(url),1500);
    },'image/png');
  }catch(e){}
}

function updateSkeletonColorsForTheme(){
  if(!bodyMapGroup) return;
  const lightSkel = 0xc8b088;
  const darkSkel = 0xfff5e0;
  const lightDim = 0xb8a078;
  const darkDim = 0xd0c8b8;
  const newSkel = darkTheme ? darkSkel : lightSkel;
  const newDim = darkTheme ? darkDim : lightDim;
  bodyMapGroup.traverse(obj => {
    if(obj.isMesh && obj.material && obj.material.color){
      const c = obj.material.color.getHex();
      if(c === 0xfff5e0 || c === 0xc8b088){ obj.material.color.setHex(newSkel); }
      else if(c === 0xd0c8b8 || c === 0xb8a078){ obj.material.color.setHex(newDim); }
    }
  });
}

let hoveredMesh=null;
const hoverNdc=new THREE.Vector2();
cv.addEventListener('mousemove',e=>{
  if(dragging) return;
  hoverNdc.x=(e.clientX/innerWidth)*2-1;
  hoverNdc.y=-(e.clientY/innerHeight)*2+1;
  raycaster.setFromCamera(hoverNdc,camera);
  const hit=raycaster.intersectObjects(pickList,false)[0];
  if(hoveredMesh && (!hit || hit.object!==hoveredMesh)){
    if(hoveredMesh.userData.flash<=0 && !hoveredMesh.userData.highlighted && hoveredMesh.material && hoveredMesh.material.emissive){
      hoveredMesh.material.emissive.setHex(0x000000);
      hoveredMesh.material.emissiveIntensity=0;
    }
    hoveredMesh=null;
    cv.style.cursor='grab';
  }
  if(hit && hit.object.userData.partKey && hit.object!==hoveredMesh){
    hoveredMesh=hit.object;
    cv.style.cursor='pointer';
    if(hoveredMesh.material && hoveredMesh.material.emissive && hoveredMesh.userData.flash<=0 && !hoveredMesh.userData.highlighted){
      hoveredMesh.material.emissive=new THREE.Color(hoveredMesh.userData.baseColor||0xffffff);
      hoveredMesh.material.emissiveIntensity=0.35;
    }
  }
});

    if(!labelsVisible || bodyMapMode){a.elM.style.display='none'; return;}
    tmpW.copy(a.pos); shapeGroup.localToWorld(tmpW);
    const dLabel=camera.position.distanceTo(tmpW);
    if(dLabel>dCenter+0.5){a.elM.style.display='none'; return;}
    tmpV.copy(tmpW); tmpV.project(camera);
    if(tmpV.z>=1){a.elM.style.display='none'; return;}
    const noktaX=(tmpV.x*0.5+0.5)*innerWidth;
    const noktaY=(-tmpV.y*0.5+0.5)*innerHeight;
    yerlesim.push({a, noktaX, noktaY, sortKey:noktaY});
  });
  yerlesim.forEach(item=>{
    const dx = item.noktaX - cX;
    const dy = item.noktaY - cY;
    const uz = Math.hypot(dx,dy)||1;
    const itme = Math.max(110, uz*1.3);
    item.etiketX = cX + (dx/uz) * itme;
    item.etiketY = cY + (dy/uz) * itme;
    item.etiketX = Math.max(70, Math.min(innerWidth-70, item.etiketX));
    item.etiketY = Math.max(45, Math.min(innerHeight-160, item.etiketY));
  });
  yerlesim.sort((p,q)=>p.etiketY-q.etiketY);
  const minDist = 28;
  for(let i=1;i<yerlesim.length;i++){
    const onceki=yerlesim[i-1], simdi=yerlesim[i];
    const ayniTaraf = (onceki.etiketX-cX)*(simdi.etiketX-cX) > 0;
    if(ayniTaraf && simdi.etiketY - onceki.etiketY < minDist){
      simdi.etiketY = onceki.etiketY + minDist;
      if(simdi.etiketY > innerHeight-160){ simdi.etiketY = innerHeight-160; }
    }
  }
  yerlesim.forEach(item=>{
    const a=item.a;
    a.elM.style.display='block';
    a.elM.style.left = item.etiketX + 'px';
    a.elM.style.top  = item.etiketY + 'px';
    const okDx = item.noktaX - item.etiketX;
    const okDy = item.noktaY - item.etiketY;
    const okUz = Math.hypot(okDx, okDy);
    a.elM.style.setProperty('--arr-len', Math.min(okUz, 200) + 'px');
    const aci = Math.atan2(okDy, okDx) * 180 / Math.PI - 90;
    a.elM.style.setProperty('--arr-rot', aci + 'deg');
  });
}

/* ANİMASYONLAR */
function updateAnimations(dt){
  if(!animPlaying) return;
  animT+=dt;
  if(animT>1) animT=0;
  const key=current?.key;
  const sequentialMaps={
    hayvanHucresi:['cekirdek','mitokondri','ribozom','er','golgi','lizozom'],
    bitkiHucresi:['hucreDuvari','merkeziKoful','kloroplast','cekirdek','mitokondri'],
    prokaryotOkaryot:['prokaryotHucre','okaryotHucre'],
    cekirdek:['cekirdekZari','nukleolus','kromatin','dna','mrna'],
    ribozom:['kucukAltBirim','buyukAltBirim','mrnaPro','trna','aminoAsit','protein'],
    mitokondri:['disZar','icZar','krista','matriks','atpSentaz'],
    kloroplast:['disZarKloro','tilakoid','granum','klorofil','stroma'],
    er:['ger','der','erLumen','taSimaVez'],
    golgi:['cisGolgi','ortaGolgi','transGolgi','salgisalVez'],
    lizozomPerox:['lizozom','fagositoz','peroksizom','katalaz'],
    sitoiskelet:['mikrotubul','mikrofilament','araFilament','sentrozom'],
    hucreZari:['fosfolipit','difuzyon','aktifTas','endositoz','ekzositoz2']
  };
  if(sequentialMaps[key]){
    const order=sequentialMaps[key];
    const phaseLen=1.0/order.length;
    const active=order[Math.floor(animT/phaseLen)];
    pickList.forEach(p=>{
      if(!p.material||!p.material.emissive) return;
      if(p.userData.flash>0) return;
      if(p.userData.highlighted) return;
      if(order.includes(p.userData.partKey)){
        if(p.userData.partKey===active){
          p.material.emissive.setHex(p.userData.baseColor||0xffd166);
          p.material.emissiveIntensity=0.6;
        } else {
          p.material.emissive.setHex(0x000000);
          p.material.emissiveIntensity=0;
        }
      }
    });
  }
}

/* DÖNGÜ */
let lastTime=performance.now();
function tick(){
  requestAnimationFrame(tick);
  const now=performance.now();
  const dt=(now-lastTime)/1000;
  lastTime=now;
  if(autoSpin&&!dragging) shapeGroup.rotation.y += labelsVisible ? 0.002 : 0.006;
  pickList.forEach(p=>{
    if(p.userData.flash>0){
      p.userData.flash-=0.03;
      if(p.userData.flash<=0&&p.material&&p.material.emissive){
        if(p.userData.highlighted){ p.material.emissive.setHex(0xffd166); p.material.emissiveIntensity=0.85; }
        else { p.material.emissive.setHex(0x000000); p.material.emissiveIntensity=0; }
      }
    }
  });
  if(highlightedKey){
    const pulse=0.7+Math.sin(performance.now()*0.005)*0.25;
    pickList.forEach(p=>{
      if(p.userData.highlighted && p.userData.flash<=0 && p.material && p.material.emissive){ p.material.emissiveIntensity=pulse; }
    });
  }
  updateAnimations(dt*0.4);
  updateBodyHighlights(dt);
  if(bodyMapMode && autoSpin && !dragging){ bodyMapGroup.rotation.y += labelsVisible ? 0.002 : 0.005; }
  const r=cam.radius;
  const lookX = LOOK_OFFSET_X + cam.panX;
  const lookY = cam.targetY + cam.panY;
  camera.position.set(
    r*Math.sin(cam.phi)*Math.sin(cam.theta) + lookX,
    r*Math.cos(cam.phi) + 0.5 + lookY,
    r*Math.sin(cam.phi)*Math.cos(cam.theta)
  );
  camera.lookAt(lookX, lookY, 0);
  updateLabels();
  renderer.render(scene,camera);
}

setLevel(2);
selectOrgan('hayvanHucresi');
tick();

addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
document.addEventListener('fullscreenchange',()=>{
  setTimeout(()=>{
    camera.aspect=innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth,innerHeight);
  },100);
});
</script>
