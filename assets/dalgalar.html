// ---------- MODÜL 1.2: Temel Büyüklükler (A, λ, tepe, çukur) ----------
SubBuilders.buildDalgaBuyukluk = function() {
  const root = new THREE.Group();
  markDynamic(root); scene.add(root); window._currentModelGroup = root;
  root.add(setupVectorLighting());
  root.add(makeGridSystem({ size: 16, divisions: 16, floorY: -2.5 }));

  const S = window._sceneState;
  S.db_A = 1.0;     // genlik
  S.db_lambda = 3.0; // dalga boyu
  S.db_freeze = true; // lise giriş: dondurulmuş gösterim
  S._dbT = 0;

  const dyn = new THREE.Group(); dyn.userData.dynamic = true; root.add(dyn);
  const W = 11;
  // ana dalga eğrisi (kalın), yan profilden tepe/çukur görünür
  const curve = makeWaveCurve({ w: W, segs: 160, color: WCOL.wave });
  dyn.add(curve);
  // denge ekseni
  dyn.add(makeSolidLine(new THREE.Vector3(-W/2, 0, 0), new THREE.Vector3(W/2, 0, 0), { color: 0x9fb0d8, opacity: 0.5 }));

  const annot = new THREE.Group(); annot.userData.dynamic = true; dyn.add(annot);

  function k() { return 2*Math.PI / S.db_lambda; }

  function rebuildAnnot() {
    [...annot.children].forEach(c=>{annot.remove(c);if(c.geometry)c.geometry.dispose();if(c.material&&c.material.dispose)c.material.dispose();});
    const kk = k(), A = S.db_A;
    // ilk tepe konumu: sin maks → k*x = π/2 → x = (π/2)/k
    const xCrest1 = (Math.PI/2)/kk;
    const xCrest2 = xCrest1 + S.db_lambda; // bir λ sonraki tepe
    const xTrough = xCrest1 + S.db_lambda/2; // çukur
    // tepe işaretçileri
    annot.add(makeMarker(new THREE.Vector3(xCrest1, A, 0), { color: WCOL.crest, r: 0.13 }));
    annot.add(makeMarker(new THREE.Vector3(xCrest2, A, 0), { color: WCOL.crest, r: 0.13 }));
    annot.add(makeMarker(new THREE.Vector3(xTrough, -A, 0), { color: WCOL.trough, r: 0.13 }));
    // GENLİK ölçü çizgisi (denge → tepe), dikey
    annot.add(makeDimension(new THREE.Vector3(xCrest1, 0, 0), new THREE.Vector3(xCrest1, A, 0), 'A = ' + A.toFixed(1), { color: 0xffe14d, offset: [-0.55, 0, 0] }));
    // DALGA BOYU ölçü çizgisi (tepe → tepe), yatay (tepelerin üstünde)
    annot.add(makeDimension(new THREE.Vector3(xCrest1, A+0.5, 0), new THREE.Vector3(xCrest2, A+0.5, 0), 'λ = ' + S.db_lambda.toFixed(1), { color: 0x6ad6ff, offset: [0, 0.4, 0] }));
  }

  function frame(t) {
    updateWaveCurve(curve, { A: S.db_A, k: k(), omega: S.db_freeze ? 0 : 2.5, t });
    if (!S.db_freeze) rebuildAnnot(); // hareketliyken etiketleri de güncelle (basit: dondurulmuşta sabit)
  }
  rebuildAnnot();
  frame(0);
  window._customAnim = function(t, dt){ if(!S.db_freeze){ S._dbT += dt; frame(S._dbT);} };

  setSceneSliders([
    { type: 'section', label: 'Temel Büyüklükler' },
    { type: 'slider', label: 'Genlik A', min: 0.4, max: 1.6, step: 0.2, unit: '',
      getValue: () => S.db_A, setValue: (v)=>{ S.db_A=v; rebuildAnnot(); frame(S._dbT); }, format:(v)=>v.toFixed(1) },
    { type: 'slider', label: 'Dalga boyu λ', min: 1.5, max: 5, step: 0.5, unit: '',
      getValue: () => S.db_lambda, setValue: (v)=>{ S.db_lambda=v; rebuildAnnot(); frame(S._dbT); }, format:(v)=>v.toFixed(1) },
    { type: 'section', label: 'Görünüm' },
    { type: 'presets', activeIdx: 0, options: [
      { label: '🧊 Dondur (incele)', action: ()=>{ S.db_freeze=true; frame(0); rebuildAnnot(); } },
      { label: '▶️ Hareket et', action: ()=>{ S.db_freeze=false; } }
    ]},
    { type: 'display', label: 'Tepe', getValue: () => 'En yüksek nokta' },
    { type: 'display', label: 'Çukur', getValue: () => 'En alçak nokta' },
    { type: 'formula', text: 'Genlik = denge ↔ tepe;  λ = tepe ↔ tepe' }
  ], { title: 'Temel Büyüklükler' });

  addInfo3DLabels([
    { text: { ilkokul:'⛰️ Tepe', ortaokul:'⛰️ Tepe (en yüksek)', lise:'⛰️ Tepe', tyt_ayt:'⛰️ Tepe (maks +)' },
      position: [-3.5, 2.2, 0], target: [(Math.PI/2)/(2*Math.PI/S.db_lambda), S.db_A, 0], color: '#ff6b4a', minLevel:'ilkokul' },
    { text: { ilkokul:'🕳️ Çukur', ortaokul:'🕳️ Çukur (en alçak)', lise:'🕳️ Çukur', tyt_ayt:'🕳️ Çukur (maks −)' },
      position: [-3.5, -2, 0], target: [(Math.PI/2)/(2*Math.PI/S.db_lambda)+S.db_lambda/2, -S.db_A, 0], color: '#3ed673' }
  ]);
};

// ---------- MODÜL 1.3: Enine ve Boyuna Dalga ----------
SubBuilders.buildEnineBoyuna = function() {
  const root = new THREE.Group();
  markDynamic(root); scene.add(root); window._currentModelGroup = root;
  root.add(setupVectorLighting());
  root.add(makeGridSystem({ size: 16, divisions: 16, floorY: -3 }));

  const S = window._sceneState;
  S.eb_type = 0; // 0: enine, 1: boyuna
  S._ebT = 0;

  const dyn = new THREE.Group(); dyn.userData.dynamic = true; root.add(dyn);
  const N = 36, W = 10;
  let parts = [];

  function build() {
    [...dyn.children].forEach(c=>{dyn.remove(c);if(c.geometry)c.geometry.dispose();if(c.material&&c.material.dispose)c.material.dispose();});
    parts = [];
    // yayılma yönü çizgisi
    dyn.add(makeVectorArrow(new THREE.Vector3(-W/2-0.5, S.eb_type===0?2.2:0, 0), new THREE.Vector3(W+1, 0, 0), { color: 0x9fb0d8, shaftR: 0.03, headR: 0.12 }));
    // parçacık dizisi
    for (let i = 0; i < N; i++) {
      const x0 = -W/2 + (i/(N-1))*W;
      const p = makeMarker(new THREE.Vector3(x0, S.eb_type===0 ? 2.2 : 0, 0), { color: 0x6ad6ff, r: 0.14 });
      p.userData._x0 = x0; dyn.add(p); parts.push(p);
    }
  }
  build();

  function frame(t) {
    const k = 2*Math.PI/2.5, omega = 3.0, A = 0.7;
    parts.forEach(p => {
      const x0 = p.userData._x0;
      if (S.eb_type === 0) {
        // enine: y'de titreşir (yayılmaya dik)
        p.position.x = x0;
        p.position.y = 2.2 + A*Math.sin(k*x0 - omega*t);
      } else {
        // boyuna: x'te titreşir (yayılmaya paralel) → sıkışma/seyrelme
        p.position.y = 0;
        p.position.x = x0 + A*0.6*Math.sin(k*x0 - omega*t);
      }
    });
  }
  frame(0);
  window._customAnim = function(t, dt){ S._ebT += dt; frame(S._ebT); };

  setSceneSliders([
    { type: 'section', label: 'Dalga Türü' },
    { type: 'presets', activeIdx: 0, options: [
      { label: '↕️ Enine (su, ışık)', action: ()=>{ S.eb_type=0; build(); frame(S._ebT); } },
      { label: '↔️ Boyuna (ses, yay)', action: ()=>{ S.eb_type=1; build(); frame(S._ebT); } }
    ]},
    { type: 'section', label: 'Bu Tür' },
    { type: 'display', label: 'Titreşim', highlight: true, getValue: () => S.eb_type===0 ? 'Yayılmaya DİK' : 'Yayılmaya PARALEL' },
    { type: 'display', label: 'Oluşan', getValue: () => S.eb_type===0 ? 'Tepe / Çukur' : 'Sıkışma / Seyrelme' },
    { type: 'display', label: 'Örnek', getValue: () => S.eb_type===0 ? 'Su, ışık, ip' : 'Ses, yay' },
    { type: 'formula', text: 'Her ikisinde de v = λ·f' }
  ], { title: 'Enine ve Boyuna Dalga' });

  addInfo3DLabels([
    { text: { ilkokul:'➡️ Dalga bu yöne gider', ortaokul:'➡️ Yayılma yönü', lise:'➡️ Yayılma doğrultusu', tyt_ayt:'➡️ Yayılma yönü' },
      position: [3, 3.4, 0], target: [4, S.eb_type===0?2.2:0, 0], color: '#9fb0d8' },
    { text: { ilkokul:'🔵 Noktalar titreşir', ortaokul:'🔵 Parçacık titreşimi', lise:'🔵 Parçacık hareketi', tyt_ayt:'🔵 Parçacık titreşimi' },
      position: [-4.5, 0.5, 0], target: [-3, S.eb_type===0?2.2:0, 0], color: '#6ad6ff' }
  ]);
};

// ---------- MODÜL 2.1: Dalga Hızı (v = λ·f) ----------
SubBuilders.buildDalgaHizi = function() {
  const root = new THREE.Group();
  markDynamic(root); scene.add(root); window._currentModelGroup = root;
  root.add(setupVectorLighting());
  root.add(makeGridSystem({ size: 16, divisions: 16, floorY: -3 }));

  const S = window._sceneState;
  S.dh_lambda = 2.5; // dalga boyu
  S.dh_f = 1.0;      // frekans (Hz)
  S._dhT = 0;

  const dyn = new THREE.Group(); dyn.userData.dynamic = true; root.add(dyn);
  const W = 11;
  const mesh = makeWaveMesh({ w: W, d: 7, segX: 80, segZ: 40, color: WCOL.water });
  dyn.add(mesh);
  const annot = new THREE.Group(); annot.userData.dynamic = true; dyn.add(annot);

  function k(){ return 2*Math.PI / S.dh_lambda; }
  function omega(){ return 2*Math.PI * S.dh_f; }
  function v(){ return S.dh_lambda * S.dh_f; }

  function rebuildAnnot() {
    [...annot.children].forEach(c=>{annot.remove(c);if(c.geometry)c.geometry.dispose();if(c.material&&c.material.dispose)c.material.dispose();});
    // λ ölçü çizgisi (ön kenarda, z = +3.5)
    const x0 = -W/2 + 1;
    annot.add(makeDimension(new THREE.Vector3(x0, 1.2, 3.6), new THREE.Vector3(x0+S.dh_lambda, 1.2, 3.6), 'λ = ' + S.dh_lambda.toFixed(1) + ' m', { color: 0x6ad6ff, offset: [0, 0.4, 0] }));
    // hız oku (yayılma yönü, uzunluk v'ye orantılı)
    annot.add(makeVectorArrow(new THREE.Vector3(-W/2, 1.8, 0), new THREE.Vector3(Math.min(W, 1 + v()*1.2), 0, 0), { color: WCOL.amp, shaftR: 0.05, headR: 0.16 }));
    annot.add(makeMeasureLabel('v = λ·f = ' + v().toFixed(1) + ' m/s', [-W/2 + 0.5, 2.4, 0], 'rgba(255,225,77,0.95)'));
  }

  function frame(t) {
    updateWaveMesh(mesh, { t, A: 0.5, k: k(), omega: omega(), type: 'plane', dir2D: [1, 0] });
  }
  rebuildAnnot(); frame(0);
  window._customAnim = function(t, dt){ S._dhT += dt; frame(S._dhT); };

  setSceneSliders([
    { type: 'section', label: 'Dalga Hızı (v=λ·f)' },
    { type: 'slider', label: 'Dalga boyu λ', min: 1.5, max: 4, step: 0.5, unit: ' m',
      getValue: () => S.dh_lambda, setValue: (v)=>{ S.dh_lambda=v; rebuildAnnot(); }, format:(x)=>x.toFixed(1) },
    { type: 'slider', label: 'Frekans f', min: 0.5, max: 3, step: 0.5, unit: ' Hz',
      getValue: () => S.dh_f, setValue: (v)=>{ S.dh_f=v; rebuildAnnot(); }, format:(x)=>x.toFixed(1) },
    { type: 'section', label: 'Sonuç' },
    { type: 'display', label: 'Hız v', highlight: true, getValue: () => v().toFixed(2) + ' m/s' },
    { type: 'display', label: 'Periyot T', getValue: () => (1/S.dh_f).toFixed(2) + ' s' },
    { type: 'formula', text: 'v = λ·f',
      getValue: () => 'v = ' + S.dh_lambda.toFixed(1) + '·' + S.dh_f.toFixed(1) + ' = <b>' + v().toFixed(2) + ' m/s</b>' }
  ], { title: 'Dalga Hızı' });

  addInfo3DLabels([
    { text: { ilkokul:'➡️ Dalga hızı', ortaokul:'⚡ Hız v', lise:'⚡ v = λ·f', tyt_ayt:'⚡ v=λf (ortam belirler)' },
      position: [3, 3.2, 0], target: [3, 1.8, 0], color: '#ffe14d' },

// ---------- MODÜL 2.2: Periyot ve Frekans (T=1/f) ----------
SubBuilders.buildPeriyotFrekans = function() {
  const root = new THREE.Group();
  markDynamic(root); scene.add(root); window._currentModelGroup = root;
  root.add(setupVectorLighting());
  root.add(makeGridSystem({ size: 16, divisions: 16, floorY: -3 }));

  const S = window._sceneState;
  S.pf_f = 1.0; // frekans
  S._pfT = 0;

  const dyn = new THREE.Group(); dyn.userData.dynamic = true; root.add(dyn);
  const W = 11;
  // yan profil dalga (frekansla sıklığı değişir)
  const curve = makeWaveCurve({ w: W, segs: 200, color: WCOL.wave });
  dyn.add(curve);
  dyn.add(makeSolidLine(new THREE.Vector3(-W/2,0,0), new THREE.Vector3(W/2,0,0), { color: 0x9fb0d8, opacity: 0.4 }));
  // titreşen kaynak topu (solda)
  const src = makeSource({ type:'point', r: 0.3 }); src.position.set(-W/2 - 0.6, 0, 0); dyn.add(src);
  const annot = new THREE.Group(); annot.userData.dynamic = true; dyn.add(annot);

  function lambda(){ return 5.0 / S.pf_f; } // sabit hız varsayımı (v=5): f artarsa λ azalır
  function k(){ return 2*Math.PI/lambda(); }

  function rebuildAnnot() {
    [...annot.children].forEach(c=>{annot.remove(c);if(c.geometry)c.geometry.dispose();if(c.material&&c.material.dispose)c.material.dispose();});
    const L = lambda();
    const x0 = -W/2 + 0.5 + (Math.PI/2)/k();
    annot.add(makeDimension(new THREE.Vector3(x0, 1.4, 0), new THREE.Vector3(x0+L, 1.4, 0), 'λ', { color: 0x6ad6ff, offset:[0,0.4,0] }));
  }

  function frame(t) {
    updateWaveCurve(curve, { A: 1.0, k: k(), omega: 2*Math.PI*S.pf_f, t });
    src.position.y = 1.0*Math.sin(2*Math.PI*S.pf_f*t);
  }
  rebuildAnnot(); frame(0);
  window._customAnim = function(t, dt){ S._pfT += dt; frame(S._pfT); };

  setSceneSliders([
    { type: 'section', label: 'Periyot ve Frekans' },
    { type: 'slider', label: 'Frekans f', min: 0.5, max: 4, step: 0.5, unit: ' Hz',
      getValue: () => S.pf_f, setValue: (v)=>{ S.pf_f=v; rebuildAnnot(); }, format:(x)=>x.toFixed(1) },
    { type: 'section', label: 'Sonuç' },
    { type: 'display', label: 'Periyot T', highlight: true, getValue: () => (1/S.pf_f).toFixed(2) + ' s' },
    { type: 'display', label: 'Saniyedeki dalga', getValue: () => S.pf_f.toFixed(1) + ' adet' },
    { type: 'formula', text: 'T = 1/f',
      getValue: () => 'T = 1/' + S.pf_f.toFixed(1) + ' = <b>' + (1/S.pf_f).toFixed(2) + ' s</b>' }
  ], { title: 'Periyot ve Frekans' });

  addInfo3DLabels([
    { text: { ilkokul:'🔵 Kaynak zıplar', ortaokul:'🔄 Titreşen kaynak', lise:'🔄 Kaynak (f)', tyt_ayt:'🔄 Kaynak frekansı f' },
      position: [-W/2-2.5, 1.5, 0], target: [-W/2-0.6, 0, 0], color: '#ffb84d' },
    { text: { ilkokul:'🌊 Çok zıplama = sık dalga', ortaokul:'🌊 f artarsa λ azalır', lise:'🌊 f↑ → T↓, λ↓', tyt_ayt:'🌊 T=1/f, λ=v/f' },
      position: [3, 2.4, 0], target: [2, 1.0, 0], color: '#6ad6ff' }
  ]);
};

// ---------- MODÜL 3.1: Yansıma ----------
SubBuilders.buildYansima = function() {
  const root = new THREE.Group();
  markDynamic(root); scene.add(root); window._currentModelGroup = root;
  root.add(setupVectorLighting());
  root.add(makeGridSystem({ size: 16, divisions: 16, floorY: -2.5 }));

  const S = window._sceneState;
  S.ya_uc = 0; // 0: sabit uç (faz terslenir), 1: serbest uç
  S._yaT = 0;

  const dyn = new THREE.Group(); dyn.userData.dynamic = true; root.add(dyn);
  const W = 11;
  // yay/ip (yan profil), sağ uçta duvar
  const curve = makeWaveCurve({ w: W, segs: 200, color: WCOL.wave });
  dyn.add(curve);
  // duvar (sağda)
  const wall = new THREE.Mesh(new THREE.BoxGeometry(0.3, 3, 1.2), new THREE.MeshStandardMaterial({ color: 0x5a6b8a, roughness:0.6 }));
  wall.position.set(W/2 + 0.2, 0, 0); dyn.add(wall);

  function frame(t) {
    // gelen atma (sağa giden) + yansıyan atma (sola giden, sabit uçta ters)
    const segs = curve.userData._segs;
    const pos = curve.geometry.attributes.position;
    const A = 0.9, width = 1.2, speed = 2.5;
    const tcyc = (t * speed) % (W*2);
    for (let i = 0; i <= segs; i++) {
      const x = -W/2 + (i/segs)*W;
      // gelen: tepe konumu soldan sağa
      const cIn = -W/2 + tcyc;
      const yIn = A*Math.exp(-Math.pow((x-cIn)/width,2));
      // yansıyan: duvardan sonra geri (x ekseni W/2'de yansır)
      const cRef = W/2 + (W/2 - (-W/2 + (tcyc - W)));
      let yRef = 0;
      if (tcyc > W) {
        const cR = W/2 - (tcyc - W);
        yRef = (S.ya_uc===0 ? -1 : 1) * A*Math.exp(-Math.pow((x-cR)/width,2));
      }
      pos.setY(i, yIn*(tcyc<=W?1:0) + yRef);
    }
    pos.needsUpdate = true;
  }
  frame(0);
  window._customAnim = function(t, dt){ S._yaT += dt; frame(S._yaT); };

  setSceneSliders([
    { type: 'section', label: 'Yansıma — Uç Türü' },
    { type: 'presets', activeIdx: 0, options: [
      { label: '📍 Sabit uç (ters döner)', action: ()=>{ S.ya_uc=0; S._yaT=0; } },
      { label: '🔄 Serbest uç (aynı)', action: ()=>{ S.ya_uc=1; S._yaT=0; } }
    ]},
    { type: 'section', label: 'Bilgi' },
    { type: 'display', label: 'Yansımada', highlight: true, getValue: () => 'v, λ, f değişmez' },
    { type: 'display', label: 'Faz', getValue: () => S.ya_uc===0 ? 'Terslenir (π)' : 'Korunur' },
    { type: 'formula', text: 'Geliş açısı = Yansıma açısı' }
  ], { title: 'Yansıma' });

  addInfo3DLabels([
    { text: { ilkokul:'🧱 Duvar (engel)', ortaokul:'🧱 Sabit engel', lise:'🧱 Yansıtıcı yüzey', tyt_ayt:'🧱 Engel (uç)' },
      position: [W/2+1.5, 2, 0], target: [W/2+0.2, 0.5, 0], color: '#9fb0d8' },
    { text: { ilkokul:'↩️ Geri döner', ortaokul:'↩️ Dalga geri yansır', lise:'↩️ Yansıyan dalga', tyt_ayt:'↩️ Sabit uç: faz π döner' },
      position: [-3, 2.2, 0], target: [0, 0.5, 0], color: '#6ad6ff' }
  ]);
};

// ---------- MODÜL 3.2: Kırılma (Derin ↔ Sığ, v ve λ senkron) ----------
SubBuilders.buildKirilma = function() {
  const root = new THREE.Group();
  markDynamic(root); scene.add(root); window._currentModelGroup = root;
  root.add(setupVectorLighting());
  root.add(makeGridSystem({ size: 16, divisions: 16, floorY: -2.5 }));

  const S = window._sceneState;
  S.ki_f = 1.0;       // frekans (SABİT kalır mesajı — ama slider'la kaynak frekansı ayarlanır)
  S.ki_shallow = 1.8; // sığ ortam "yoğunluğu" (λ küçülme faktörü)
  S._kiT = 0;

  const dyn = new THREE.Group(); dyn.userData.dynamic = true; root.add(dyn);
  const W = 12, splitX = 0;
  const mesh = makeWaveMesh({ w: W, d: 9, segX: 96, segZ: 58, color: WCOL.water });
  dyn.add(mesh);

  // derin/sığ ortam zemin renklendirmesi (yarı saydam paneller)
  const deepPanel = new THREE.Mesh(new THREE.PlaneGeometry(W/2, 9), new THREE.MeshBasicMaterial({ color: WCOL.deep, transparent:true, opacity:0.18, side:THREE.DoubleSide }));
  deepPanel.rotation.x = -Math.PI/2; deepPanel.position.set(-W/4, -0.4, 0); dyn.add(deepPanel);
  const shallowPanel = new THREE.Mesh(new THREE.PlaneGeometry(W/2, 9), new THREE.MeshBasicMaterial({ color: WCOL.shallow, transparent:true, opacity:0.28, side:THREE.DoubleSide }));
  shallowPanel.rotation.x = -Math.PI/2; shallowPanel.position.set(W/4, -0.4, 0); dyn.add(shallowPanel);
  // sınır çizgisi
  dyn.add(makeSolidLine(new THREE.Vector3(splitX, 0.05, -4.5), new THREE.Vector3(splitX, 0.05, 4.5), { color: 0xffe14d, opacity: 0.8 }));

  const annot = new THREE.Group(); annot.userData.dynamic = true; dyn.add(annot);

  function lambdaDeep(){ return 3.0; }
  function lambdaShallow(){ return lambdaDeep() / S.ki_shallow; }

  function rebuildAnnot() {
    [...annot.children].forEach(c=>{annot.remove(c);if(c.geometry)c.geometry.dispose();if(c.material&&c.material.dispose)c.material.dispose();});
    // derin λ ölçü (sol)
    annot.add(makeDimension(new THREE.Vector3(-W/2+0.5, 1.3, 4), new THREE.Vector3(-W/2+0.5+lambdaDeep(), 1.3, 4), 'λ_derin = ' + lambdaDeep().toFixed(1), { color: 0x6ad6ff, offset:[0,0.4,0] }));
    // sığ λ ölçü (sağ, daha kısa)
    annot.add(makeDimension(new THREE.Vector3(splitX+0.3, 1.3, 4), new THREE.Vector3(splitX+0.3+lambdaShallow(), 1.3, 4), 'λ_sığ = ' + lambdaShallow().toFixed(1), { color: 0x4aa8d8, offset:[0,0.4,0] }));
  }

  function frame(t) {
    const kDeep = 2*Math.PI/lambdaDeep();
    const omega = 2*Math.PI*S.ki_f; // f SABİT → her iki ortamda aynı omega
    updateWaveMesh(mesh, { t, A: 0.45, k: kDeep, omega, type:'twoMedia', splitX, kFactor: S.ki_shallow, ampFactor: 0.9 });
  }
  rebuildAnnot(); frame(0);
  window._customAnim = function(t, dt){ S._kiT += dt; frame(S._kiT); };

  setSceneSliders([
    { type: 'section', label: 'Kırılma (Derin↔Sığ)' },
    { type: 'slider', label: 'Kaynak frekansı f', min: 0.5, max: 2.5, step: 0.5, unit: ' Hz',
      getValue: () => S.ki_f, setValue: (v)=>{ S.ki_f=v; }, format:(x)=>x.toFixed(1) },
    { type: 'slider', label: 'Sığlık (λ küçülme)', min: 1.2, max: 2.6, step: 0.2, unit: '×',
      getValue: () => S.ki_shallow, setValue: (v)=>{ S.ki_shallow=v; rebuildAnnot(); }, format:(x)=>x.toFixed(1) },
    { type: 'section', label: 'Sonuç' },
    { type: 'display', label: 'Frekans f', highlight: true, getValue: () => S.ki_f.toFixed(1) + ' Hz (SABİT)' },
    { type: 'display', label: 'λ derin → sığ', getValue: () => lambdaDeep().toFixed(1) + ' → ' + lambdaShallow().toFixed(1) },
    { type: 'display', label: 'Hız', getValue: () => 'Sığda azalır (v=λf)' },
    { type: 'formula', text: 'f SABİT, v ve λ değişir',
      getValue: () => 'λ_sığ/λ_derin = v_sığ/v_derin = <b>1/' + S.ki_shallow.toFixed(1) + '</b>' }
  ], { title: 'Kırılma' });

  addInfo3DLabels([
    { text: { ilkokul:'🌊 Derin su (hızlı)', ortaokul:'🌊 Derin: hızlı, λ büyük', lise:'🌊 Derin ortam (v büyük)', tyt_ayt:'🌊 Derin: v↑ λ↑' },
      position: [-4, 2, -2], target: [-3, 0.2, 0], color: '#1a6aa8' },
    { text: { ilkokul:'🏖️ Sığ su (yavaş)', ortaokul:'🏖️ Sığ: yavaş, λ küçük', lise:'🏖️ Sığ ortam (v küçük)', tyt_ayt:'🏖️ Sığ: v↓ λ↓, f sabit' },
      position: [4, 2, -2], target: [3, 0.2, 0], color: '#4aa8d8' },
    { text: { ilkokul:'➖ Sınır', ortaokul:'➖ Ortam sınırı', lise:'➖ Ortam sınırı', tyt_ayt:'➖ Sınır (f sabit geçer)' },
      position: [0, 2.4, 2.5], target: [0, 0.1, 2], color: '#ffe14d' }
  ]);
};

// ---------- MODÜL 3.3: Kırınım (Difraksiyon) ----------
SubBuilders.buildKirinim = function() {
  const root = new THREE.Group();
  markDynamic(root); scene.add(root); window._currentModelGroup = root;
  root.add(setupVectorLighting());
  root.add(makeGridSystem({ size: 16, divisions: 16, floorY: -2.5 }));

  const S = window._sceneState;
  S.kr_slit = 1.2; // yarık genişliği
  S._krT = 0;

  const dyn = new THREE.Group(); dyn.userData.dynamic = true; root.add(dyn);
  const W = 12, D = 10;
  const mesh = makeWaveMesh({ w: W, d: D, segX: 96, segZ: 72, color: WCOL.water });
  dyn.add(mesh);
  // engel duvarı (ortada, yarıklı) — iki blok arası boşluk
  let wallL, wallR;
  function buildWall() {
    if (wallL) dyn.remove(wallL); if (wallR) dyn.remove(wallR);
    const half = (D - S.kr_slit) / 2;
    const mat = new THREE.MeshStandardMaterial({ color: 0x5a6b8a, roughness: 0.6 });
    wallL = new THREE.Mesh(new THREE.BoxGeometry(0.3, 1.2, half), mat);
    wallL.position.set(0, 0.4, -(S.kr_slit/2 + half/2)); dyn.add(wallL);
    wallR = new THREE.Mesh(new THREE.BoxGeometry(0.3, 1.2, half), mat.clone());
    wallR.position.set(0, 0.4, (S.kr_slit/2 + half/2)); dyn.add(wallR);
  }
  buildWall();

  function frame(t) {
    const geo = mesh.userData._geo, base = mesh.userData._base, pos = geo.attributes.position;
    const A = 0.5, k = 2.4, omega = 3.0, slitHalf = S.kr_slit/2;
    for (let i = 0; i < pos.count; i++) {
      const x = base[i*2], z = base[i*2+1];
      let y = 0;
      if (x < 0) {
        // sol: düzlem dalga (soldan gelir)
        y = A * Math.sin(k*x - omega*t);
      } else {
        // sağ: yarıktan dairesel yayılım (kırınım). Yarık ≈ λ ise geniş yayılır
        // yarık merkezinden (0,0) dairesel; dar yarık → güçlü yayılma
        const r = Math.sqrt(x*x + z*z);
        const spread = Math.min(1, (2*Math.PI/k) / Math.max(0.3, S.kr_slit)); // λ/d
        const angle = Math.atan2(Math.abs(z), x);
        const angAtten = 1 - (1-spread)*Math.min(1, angle/(Math.PI/2));
        y = A * 0.9 * angAtten / (1+r*0.12) * Math.sin(k*r - omega*t);
      }
      pos.setY(i, y);
    }
    pos.needsUpdate = true; geo.computeVertexNormals();
  }
  frame(0);
  window._customAnim = function(t, dt){ S._krT += dt; frame(S._krT); };

  setSceneSliders([
    { type: 'section', label: 'Kırınım (Yarık)' },
    { type: 'slider', label: 'Yarık genişliği', min: 0.6, max: 3, step: 0.3, unit: ' m',
      getValue: () => S.kr_slit, setValue: (v)=>{ S.kr_slit=v; buildWall(); }, format:(x)=>x.toFixed(1) },
    { type: 'section', label: 'Sonuç' },
    { type: 'display', label: 'Yarık ≈ λ ise', highlight: true, getValue: () => 'Kırınım belirgin' },
    { type: 'display', label: 'Yarık geniş ise', getValue: () => 'Düz devam eder' },
    { type: 'display', label: 'Frekans/λ/hız', getValue: () => 'Değişmez' },
    { type: 'formula', text: 'Yarık küçüldükçe dalga daha çok bükülür' }
  ], { title: 'Kırınım' });

  addInfo3DLabels([
    { text: { ilkokul:'➡️ Gelen dalga', ortaokul:'➡️ Düzlem dalga', lise:'➡️ Gelen düzlem dalga', tyt_ayt:'➡️ Gelen cephe' },
      position: [-4.5, 1.8, 0], target: [-3.5, 0.2, 0], color: '#6ad6ff' },
    { text: { ilkokul:'🚪 Aralık', ortaokul:'🚪 Yarık', lise:'🚪 Yarık (≈λ)', tyt_ayt:'🚪 Yarık d' },
      position: [0, 2, 2.5], target: [0, 0.4, 0], color: '#9fb0d8' },
    { text: { ilkokul:'🌀 Yayılır', ortaokul:'🌀 Dairesel yayılır', lise:'🌀 Kırınım (bükülme)', tyt_ayt:'🌀 Huygens: yeni kaynak' },
      position: [4, 1.8, 2.5], target: [3, 0.1, 1.5], color: '#ffe14d' }
  ]);
};

// ---------- MODÜL 3.4: Girişim (yapıcı/yıkıcı) ----------
SubBuilders.buildGirisim = function() {
  const root = new THREE.Group();
  markDynamic(root); scene.add(root); window._currentModelGroup = root;
  root.add(setupVectorLighting());
  root.add(makeGridSystem({ size: 16, divisions: 16, floorY: -2.5 }));

  const S = window._sceneState;
  S.gi_ayrik = 2.5;   // iki kaynak arası yarı mesafe
  S.gi_lambda = 2.6;  // dalga boyu (karın/düğüm sayısını belirler)
  S.gi_cizgi = true;  // karın/düğüm çizgilerini göster
  S._giT = 0;

  const dyn = new THREE.Group(); dyn.userData.dynamic = true; root.add(dyn);
  const W = 12, D = 10;
  const mesh = makeWaveMesh({ w: W, d: D, segX: 100, segZ: 76, color: WCOL.water });
  dyn.add(mesh);
  let src1, src2;
  const lines = new THREE.Group(); lines.userData.dynamic = true; dyn.add(lines);

  function k(){ return 2*Math.PI / S.gi_lambda; }

  // Bir karın/düğüm çizgisini analitik çiz: |r1 - r2| = Δ (sabit) → hiperbol
  // z'yi tara, her z için x'i çöz (Newton benzeri basit tarama yerine x tarayıp Δ eşitliğini ara)
  function hyperbolaPoints(delta) {
    // |dist(P,S1) - dist(P,S2)| = delta ; S1=(-a,0), S2=(a,0)
    const a = S.gi_ayrik;
    const pts = [];
    // z ekseni boyunca tara (-D/2..D/2), her z için x'i analitik bul
    // hiperbol: x = ±(delta/2)*sqrt(1 + z²/(a² - (delta/2)²)) — delta<2a olmalı
    const c = delta/2;
    if (Math.abs(c) >= a) return pts; // geçerli hiperbol yok
    const bb = a*a - c*c;
    for (let zi = -D/2; zi <= D/2; zi += 0.2) {
      const x = c * Math.sqrt(1 + (zi*zi)/bb);
      // iki kol: +x ve -x (delta işaretine göre); delta>0 → S2'ye yakın taraf
      pts.push(new THREE.Vector3(x, 0.06, zi));
    }
    return pts;
  }

  function buildLines() {
    [...lines.children].forEach(c=>{lines.remove(c);if(c.geometry)c.geometry.dispose();if(c.material&&c.material.dispose)c.material.dispose();});
    if (!S.gi_cizgi) return;
    const lam = S.gi_lambda, a = S.gi_ayrik;
    // KARIN (yapıcı): yol farkı = n·λ  (n=0 merkezi çizgi)
    // DÜĞÜM (yıkıcı): yol farkı = (n+½)·λ
    const maxDelta = 2*a - 0.05;
    // merkezi karın çizgisi (n=0, delta=0 → x=0 düz çizgi)
    const mid = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0.06,-D/2), new THREE.Vector3(0,0.06,D/2)]);
    lines.add(new THREE.Line(mid, new THREE.LineBasicMaterial({ color: 0x3ed673, transparent:true, opacity:0.9 })));
    for (let n = 1; n*lam <= maxDelta; n++) {
      [1,-1].forEach(sgn => {
        const pts = hyperbolaPoints(n*lam).map(p=>new THREE.Vector3(sgn*p.x, p.y, p.z));
        if (pts.length>1) { const g=new THREE.BufferGeometry().setFromPoints(pts); lines.add(new THREE.Line(g, new THREE.LineBasicMaterial({ color: 0x3ed673, transparent:true, opacity:0.85 }))); }
      });
    }
    // düğüm çizgileri (kesikli kırmızı)
    for (let n = 0; (n+0.5)*lam <= maxDelta; n++) {
      [1,-1].forEach(sgn => {
        const pts = hyperbolaPoints((n+0.5)*lam).map(p=>new THREE.Vector3(sgn*p.x, p.y, p.z));
        if (pts.length>1) { const g=new THREE.BufferGeometry().setFromPoints(pts); const ln=new THREE.Line(g, new THREE.LineDashedMaterial({ color: 0xff5252, dashSize:0.25, gapSize:0.15, transparent:true, opacity:0.9 })); ln.computeLineDistances(); lines.add(ln); }
      });
    }
  }

  function countLines() {
    const lam = S.gi_lambda, a = S.gi_ayrik, maxDelta = 2*a;
    let karin = 1; for (let n=1; n*lam < maxDelta; n++) karin += 2;
    let dugum = 0; for (let n=0; (n+0.5)*lam < maxDelta; n++) dugum += 2;
    return { karin, dugum };
  }

  function build() {
    if (src1) dyn.remove(src1); if (src2) dyn.remove(src2);
    src1 = makeSource({ type:'point', r:0.28 }); src1.position.set(-S.gi_ayrik, 0.4, 0); dyn.add(src1);
    src2 = makeSource({ type:'point', r:0.28 }); src2.position.set(S.gi_ayrik, 0.4, 0); dyn.add(src2);
    buildLines();
  }
  build();

  function frame(t) {
    updateWaveInterference(mesh, { t, A: 0.45, k: k(), omega: 3.0, src1:[-S.gi_ayrik,0], src2:[S.gi_ayrik,0] });
    const yb = 0.4 + 0.12*Math.sin(3*t);
    src1.position.y = yb; src2.position.y = yb;
  }
  frame(0);
  window._customAnim = function(t, dt){ S._giT += dt; frame(S._giT); };

  setSceneSliders([
    { type: 'section', label: 'Girişim (İki Kaynak)' },
    { type: 'slider', label: 'Kaynaklar arası', min: 1.5, max: 4, step: 0.5, unit: ' m',
      getValue: () => S.gi_ayrik*2, setValue: (v)=>{ S.gi_ayrik=v/2; build(); frame(S._giT); }, format:(x)=>x.toFixed(1) },
    { type: 'slider', label: 'Dalga boyu λ', min: 1.5, max: 3.5, step: 0.5, unit: ' m',
      getValue: () => S.gi_lambda, setValue: (v)=>{ S.gi_lambda=v; buildLines(); frame(S._giT); }, format:(x)=>x.toFixed(1) },
    { type: 'presets', activeIdx: 0, options: [
      { label: '📈 Çizgileri göster', action: ()=>{ S.gi_cizgi=true; buildLines(); } },
      { label: '🌊 Sadece dalga', action: ()=>{ S.gi_cizgi=false; buildLines(); } }
    ]},
    { type: 'section', label: 'Sonuç' },
    { type: 'display', label: 'Karın (katar) çizgisi', highlight: true, getValue: () => countLines().karin + ' adet' },
    { type: 'display', label: 'Düğüm çizgisi', getValue: () => countLines().dugum + ' adet' },
    { type: 'display', label: 'Yapıcı (karın)', getValue: () => 'yol farkı = n·λ' },
    { type: 'display', label: 'Yıkıcı (düğüm)', getValue: () => 'yol farkı = (n+½)·λ' },
    { type: 'formula', text: 'y = y₁ + y₂ · Kaynak üstünde desen oluşmaz' }
  ], { title: 'Girişim' });

  addInfo3DLabels([
    { text: { ilkokul:'⚡ 1. kaynak', ortaokul:'⚡ Kaynak 1', lise:'⚡ Kaynak S₁', tyt_ayt:'⚡ S₁ (aynı faz)' },
      position: [-S.gi_ayrik-1.5, 1.6, 0], target: [-S.gi_ayrik, 0.4, 0], color: '#ffb84d' },
    { text: { ilkokul:'⚡ 2. kaynak', ortaokul:'⚡ Kaynak 2', lise:'⚡ Kaynak S₂', tyt_ayt:'⚡ S₂ (aynı faz)' },
      position: [S.gi_ayrik+1.5, 1.6, 0], target: [S.gi_ayrik, 0.4, 0], color: '#ffb84d' },
    { text: { ilkokul:'⬆️ Büyük dalga', ortaokul:'⬆️ Karın (çift tepe)', lise:'⬆️ Karın çizgisi (yapıcı)', tyt_ayt:'⬆️ Karın: yol farkı=n·λ' },
      position: [0, 2.2, 3.8], target: [0, 0.1, 3.5], color: '#3ed673' },
    { text: { ilkokul:'⬇️ Durgun çizgi', ortaokul:'⬇️ Düğüm (sönme)', lise:'⬇️ Düğüm çizgisi (yıkıcı)', tyt_ayt:'⬇️ Düğüm: (n+½)·λ' },
      position: [3.5, 2, 3.5], target: [S.gi_lambda*0.5+0.3, 0.1, 3], color: '#ff5252' }
  ]);
};

let currentLevel = 'lise';
let currentMode = 'sade';
window._autoSpinActive = false;
window._isPlayingActive = false;

// Seviye sıralaması (en yakın mevcut veriyi bulmak için)
const LEVEL_ORDER = ['ilkokul', 'ortaokul', 'lise', 'tyt_ayt'];

function _resolveLevelData(dataObj) {
  if (!dataObj) return null;
  // tam eşleşme
  if (dataObj[currentLevel]) return dataObj[currentLevel];
  // 'ayt' eski anahtar uyumluluğu
  if (currentLevel === 'tyt_ayt' && dataObj['ayt']) return dataObj['ayt'];
  if (currentLevel === 'ayt' && dataObj['tyt_ayt']) return dataObj['tyt_ayt'];
  // en yakın alt seviyeye düş
  const idx = LEVEL_ORDER.indexOf(currentLevel);
  for (let i = idx; i >= 0; i--) {
    if (dataObj[LEVEL_ORDER[i]]) return dataObj[LEVEL_ORDER[i]];
  }
  for (let i = idx + 1; i < LEVEL_ORDER.length; i++) {
    if (dataObj[LEVEL_ORDER[i]]) return dataObj[LEVEL_ORDER[i]];
  }
  // herhangi biri
  const keys = Object.keys(dataObj);
  return keys.length ? dataObj[keys[0]] : null;
}

// ---------- DROPDOWN: KONU REHBERİ ----------
function buildTopicDropdown() {
  const list = document.getElementById('topicList');
  if (!list) return;
  list.innerHTML = '';
  Object.keys(MODULES).forEach(modKey => {
    const mod = MODULES[modKey];
    const head = document.createElement('div');
    head.className = 'dropdown-cat-head';

    list.appendChild(head);
    mod.subs.forEach(sub => {

      btn.innerHTML = `<span class="di-emoji">${sub.label.split(' ')[0]}</span><span>${sub.label.substring(sub.label.indexOf(' ')+1)}</span>`;
      btn.onclick = () => {
        currentModule = parseInt(modKey);
        selectSub(sub.key);

      };
      list.appendChild(btn);
    });
  });
}

function highlightActiveTopic() {
  document.querySelectorAll('#topicList .dropdown-item').forEach(b => {
    b.classList.toggle('active', b.dataset.sub === currentSub);
  });
}

// ---------- SAHNE SEÇİMİ ----------
// 3D arka planı temaya göre ayarla (tutulmalar uzay → koyu kalır)
function applySceneTheme() {
  if (!scene) return;
  const isLight = window._lightMode === true;
  const isSpace = window._isSpaceScene === true;
  let bgColor, fogColor, fogNear, fogFar;
  if (isSpace) {
    // Tutulma sahneleri: aydınlık modda biraz açık gece, karanlıkta derin uzay
    bgColor = isLight ? 0x1a2138 : 0x02030a;
    fogColor = bgColor; fogNear = 40; fogFar = 110;
    scene.background = new THREE.Color(bgColor);
    scene.fog = null;
    return;
  }
  if (isLight) {
    bgColor = 0xdfe7f2; fogColor = 0xdfe7f2; fogNear = 38; fogFar = 100;
  } else {
    bgColor = 0x121726; fogColor = 0x121726; fogNear = 35; fogFar = 95;
  }
  scene.background = new THREE.Color(bgColor);
  scene.fog = new THREE.Fog(fogColor, fogNear, fogFar);
}

function selectSub(subKey) {
  currentSub = subKey;
  clearScene();
  window._isSpaceScene = false;
  applySceneTheme();

  const builderName = (function() {
    for (const mk of Object.keys(MODULES)) {
      const s = MODULES[mk].subs.find(x => x.key === subKey);
      if (s) { currentModule = parseInt(mk); return s.builder; }
    }
    return null;
  })();

  if (builderName && typeof SubBuilders[builderName] === 'function') {
    try {
      SubBuilders[builderName]();
    } catch (e) {
      console.error('Builder hatası:', builderName, e);
    }
  }

  // Bilgi panelini güncelle (kapalıysa tekrar aç — konu seçilince bilgi görünür olsun)
  const _bp = document.getElementById('bottomPanel');
  if (_bp) _bp.classList.remove('hidden');
  updateInfoPanel(subKey);
  highlightActiveTopic();

  // Sade modda bazı 3D etiketleri gizle (her ikincisi)
  applyModeToLabels();

  // Kamerayı sahneye göre hafif yukarı + model biraz sola kaysın (target sağa)
  if (controls) {
    controls.target.set(1.5, 0.8, 0);
    controls.captureInitialState && controls.captureInitialState();
  }

  if (window._showGestureToast) {
    const allSubs = [];
    Object.keys(MODULES).forEach(mk => MODULES[mk].subs.forEach(s => allSubs.push(s)));
    const cur = allSubs.find(s => s.key === subKey);
    if (cur) window._showGestureToast('📍 ' + cur.label);
  }
}

function applyModeToLabels() {
  if (!window._labelRefs) return;
  // info3d etiketleri (CSS2D, scene içinde) — sade modda her ikinciyi gizle
  const info3d = document.querySelectorAll('.info3d-label');
  info3d.forEach((el, i) => {
    if (currentMode === 'sade' && i % 2 === 1) {
      el.dataset.userHidden = '1';
      el.style.display = 'none';
    } else {
      el.dataset.userHidden = '0';
      el.style.display = labelsVisible ? 'block' : 'none';
    }
  });
}

// ---------- BİLGİ PANELİ ----------
function updateInfoPanel(subKey) {
  const data = _resolveLevelData(INFO_DATA[subKey]);
  if (!data) return;
  document.getElementById('infoEmoji').textContent = data.emoji || '🔦';
  // Başlık: "Modül ana başlığı / alt başlık" (eğitim seviyesi gösterilmez)
  let mainTitle = '', subTitle = '';
  for (const mk of Object.keys(MODULES)) {
    const s = MODULES[mk].subs.find(x => x.key === subKey);
    if (s) {
      // Modül ana başlığından emoji ve "Modül N:" kısmını temizle
      mainTitle = (MODULES[mk].title || '').replace(/^[^\wçğıöşüÇĞİÖŞÜ]*Modül\s*\d+:\s*/i, '').replace(/^[^\wçğıöşüÇĞİÖŞÜ]+/, '').trim();
      // Alt başlık: sahne etiketinden baştaki emojiyi at
      subTitle = (s.label || '').replace(/^[^\wçğıöşüÇĞİÖŞÜ]+/, '').trim();
      break;
    }
  }
  const titleHtml = mainTitle ? (mainTitle + ' / ' + subTitle) : (data.title || subTitle);
  document.getElementById('infoTitle').textContent = titleHtml;
  const list = document.getElementById('infoList');
  list.innerHTML = '';
  let points = data.points || [];
  // Sade modda ilk 3, detaylıda hepsi
  const showCount = (currentMode === 'sade') ? 3 : points.length;
  points.slice(0, showCount).forEach(p => {
    const li = document.createElement('li');
    if (p.startsWith('##')) { li.className = 'subhead'; li.innerHTML = p.replace('##','').trim(); }
    else li.innerHTML = p;
    list.appendChild(li);
  });
  // içerik değişti → kaydırma çubuğunu yeniden hesapla (layout için çoklu deneme)
  list.scrollTop = 0;
  setTimeout(updateInfoScrollbar, 30);
  setTimeout(updateInfoScrollbar, 150);
  setTimeout(updateInfoScrollbar, 400);
}

// Özel kaydırma çubuğu: içerik taşınca görünür, kaydırınca thumb hareket eder
function updateInfoScrollbar() {
  const list = document.getElementById('infoList');
  const bar = document.getElementById('infoScrollbar');
  const thumb = document.getElementById('infoScrollThumb');
  if (!list || !bar || !thumb) return;
  const sh = list.scrollHeight, ch = list.clientHeight;
  if (ch < 5) return; // panel henüz görünür değil, sonraki denemede tekrar bak
  if (sh <= ch + 3) { bar.classList.remove('visible'); return; }
  bar.classList.add('visible');
  const trackH = bar.clientHeight || ch;
  const thumbH = Math.max(26, trackH * ch / sh);
  const maxScroll = sh - ch;
  const maxThumb = trackH - thumbH;
  const top = maxScroll > 0 ? (list.scrollTop / maxScroll) * maxThumb : 0;
  thumb.style.height = thumbH + 'px';
  thumb.style.top = top + 'px';
}

// ---------- NAVİGASYON (önceki/sonraki sahne) ----------
function getAllSubs() {
  const arr = [];
  Object.keys(MODULES).forEach(mk => MODULES[mk].subs.forEach(s => arr.push(s)));
  return arr;
}
function navigate(dir) {
  const all = getAllSubs();
  let idx = all.findIndex(s => s.key === currentSub);
  if (idx < 0) idx = 0;
  idx = (idx + dir + all.length) % all.length;
  selectSub(all[idx].key);
}

// ---------- DROPDOWN AÇ/KAPA ----------
function closeAllDropdowns() {
  document.querySelectorAll('.dropdown-panel').forEach(p => p.classList.remove('show'));
  document.body.classList.remove('dropdown-open');
}
function toggleDropdown(id) {
  const panel = document.getElementById(id);
  if (!panel) return;
  const wasOpen = panel.classList.contains('show');
  closeAllDropdowns();
  if (!wasOpen) {
    panel.classList.add('show');
    document.body.classList.add('dropdown-open');
  }
}

// ---------- KARŞILAŞTIRMA POPUP ----------
window._cmpPages = []; window._cmpIdx = 0;
window._tblPages = []; window._tblIdx = 0;

function _normalizePages(data) {
  if (!data) return [];
  if (Array.isArray(data)) return data;
  return [data];
}

function _renderTableHTML(data, styleClass) {
  let html = '<table class="cmp-table ' + (styleClass||'') + '"><thead><tr>';
  data.cols.forEach(c => html += `<th>${c}</th>`);
  html += '</tr></thead><tbody>';
  data.rows.forEach(row => {
    html += '<tr>';
    row.forEach(cell => html += `<td>${cell}</td>`);
    html += '</tr>';
  });
  html += '</tbody></table>';
  return html;
}

function renderCompareTable() {
  window._cmpPages = _normalizePages(_resolveLevelData(COMPARE_DATA[currentSub]));
  window._cmpIdx = 0;
  _showComparePage();
}
function _showComparePage() {
  const body = document.getElementById('compareBody');
  const titleEl = document.getElementById('compareTitle');
  const nav = document.getElementById('compareNav');
  const counter = document.getElementById('compareCounter');
  const pages = window._cmpPages;
  if (!pages.length) {
    body.innerHTML = '<div class="cmp-no-data">Bu konu için karşılaştırma verisi yok.</div>';
    if (titleEl) titleEl.textContent = '⚖️ Karşılaştırma';
    if (nav) nav.classList.add('hidden');
    return;
  }
  const i = window._cmpIdx;
  const data = pages[i];
  if (titleEl) titleEl.textContent = '⚖️ ' + (data.title || 'Karşılaştırma');
  body.innerHTML = _renderTableHTML(data, 'compare-style');
  if (nav) {
    if (pages.length > 1) {
      nav.classList.remove('hidden');
      counter.textContent = (i+1) + ' / ' + pages.length;
      document.getElementById('comparePrev').disabled = (i === 0);
      document.getElementById('compareNext').disabled = (i === pages.length - 1);
    } else {
      nav.classList.add('hidden');
    }
  }
}

// ---------- BİLGİ TABLOSU POPUP ----------
function renderInfoTable() {
  window._tblPages = _normalizePages(_resolveLevelData(TABLE_DATA[currentSub]));
  window._tblIdx = 0;
  _showTablePage();
}
function _showTablePage() {
  const body = document.getElementById('tableBody');
  const titleEl = document.getElementById('tableTitle');
  const nav = document.getElementById('tableNav');
  const counter = document.getElementById('tableCounter');
  const pages = window._tblPages;

    body.innerHTML = '<div class="cmp-no-data">Bu konu için tablo verisi yok.</div>';
    if (titleEl) titleEl.textContent = '📋 Bilgi Tablosu';
    if (nav) nav.classList.add('hidden');
    return;
  }
  const i = window._tblIdx;
  const data = pages[i];
  if (titleEl) titleEl.textContent = '📋 ' + (data.title || 'Bilgi Tablosu');
  body.innerHTML = _renderTableHTML(data, '');

    if (pages.length > 1) {
      nav.classList.remove('hidden');
      counter.textContent = (i+1) + ' / ' + pages.length;
      document.getElementById('tablePrev').disabled = (i === 0);
      document.getElementById('tableNext').disabled = (i === pages.length - 1);
    } else {
      nav.classList.add('hidden');
    }
  }
}

// ====== EVENT LISTENERS =====================================
// ============================================================
function attachEvents() {
  // Bilgi listesi içinde parmakla kaydırma: touch olaylarını panel içinde tut
  (function(){
    const infoList = document.getElementById('infoList');
    if (infoList) {
      ['touchstart','touchmove','touchend','wheel'].forEach(ev => {
        infoList.addEventListener(ev, (e) => { e.stopPropagation(); }, { passive: true });
      });
      // kaydırdıkça özel çubuğu güncelle
      infoList.addEventListener('scroll', updateInfoScrollbar, { passive: true });
    }
    // tüm popup/panel gövdeleri için de aynı koruma (kaydırılabilir alanlar)
    ['compareBody','tableBody','scenePanel'].forEach(id => {
      const el = document.getElementById(id);
      if (el) ['touchstart','touchmove','touchend','wheel'].forEach(ev => {
        el.addEventListener(ev, (e) => { e.stopPropagation(); }, { passive: true });
      });
    });
  })();

  // Seviye dropdown
  document.getElementById('btnLevel').onclick = () => toggleDropdown('panelLevel');
  document.getElementById('btnTopic').onclick = () => {
    // Konu Rehberi'ne basıldığında bilgi paneli kapalıysa geri getir
    const bp = document.getElementById('bottomPanel');
    if (bp) bp.classList.remove('hidden');
    toggleDropdown('panelTopic');
  };

  document.querySelectorAll('#panelLevel .dropdown-item').forEach(item => {
    item.onclick = () => {
      currentLevel = item.dataset.level;
      document.querySelectorAll('#panelLevel .dropdown-item').forEach(x => x.classList.remove('active'));
      item.classList.add('active');
      const labels = { ilkokul: 'İlkokul', ortaokul: 'Ortaokul', lise: 'Lise', tyt_ayt: 'TYT-AYT' };
      document.getElementById('levelLabel').textContent = labels[currentLevel] || 'Lise';
      closeAllDropdowns();
      // sahneyi yeniden kur (etiket seviyeleri değişir)
      if (currentSub) selectSub(currentSub);
      // Açık olan popup'ları da yeni seviyeye göre yenile
      if (document.getElementById('compareOverlay').classList.contains('show')) renderCompareTable();
      if (document.getElementById('tableOverlay').classList.contains('show')) renderInfoTable();
      if (window._showGestureToast) window._showGestureToast('🎓 Seviye: ' + (labels[currentLevel] || 'Lise'));
      if (window._haptic) window._haptic(15);
    };
  });

  // Mod (sade/detaylı)
  document.getElementById('btnMode').onclick = () => toggleDropdown('panelMode');
  document.querySelectorAll('#panelMode .dropdown-item').forEach(item => {
    item.onclick = () => {
      currentMode = item.dataset.mode;
      document.querySelectorAll('#panelMode .dropdown-item').forEach(x => x.classList.remove('active'));
      item.classList.add('active');
      const btnMode = document.getElementById('btnMode');
      if (currentMode === 'sade') {
        btnMode.textContent = '📄'; btnMode.classList.add('active');
        btnMode.title = 'Görünüm Modu: Sade';
      } else {
        btnMode.textContent = '📚'; btnMode.classList.remove('active');
        btnMode.title = 'Görünüm Modu: Detaylı';
      }
      closeAllDropdowns();
      if (currentSub) { updateInfoPanel(currentSub); applyModeToLabels(); }
      if (window._haptic) window._haptic(15);
    };
  });

  // Navigasyon
  document.getElementById('navPrev').onclick = () => navigate(-1);
  document.getElementById('navNext').onclick = () => navigate(1);

  // Bilgi paneli kapat
  document.getElementById('infoCloseBtn').onclick = () => {
    document.getElementById('bottomPanel').classList.add('hidden');
  };

  // Aksiyon butonları
  const spinBtn = document.getElementById('spinBtn');
  spinBtn.onclick = () => {
    window._autoSpinActive = !window._autoSpinActive;
    spinBtn.classList.toggle('active', window._autoSpinActive);
    // tüm model gruplarına spin ver
    if (window._currentModelGroup) {
      window._currentModelGroup.userData.spin = window._autoSpinActive ? 0.3 : 0;
      if (!dynamicObjects.includes(window._currentModelGroup)) dynamicObjects.push(window._currentModelGroup);
    }
    if (window._haptic) window._haptic(15);
  };

  const labelBtn = document.getElementById('labelBtn');
  labelBtn.onclick = () => {
    // Etiket yazıları VE okları birlikte aç/kapa
    labelsVisible = !labelsVisible;
    window._leaderLinesVisible = labelsVisible;
    labelBtn.classList.toggle('active', labelsVisible);
    document.querySelectorAll('.info3d-label, .label3d').forEach(el => {
      if (labelsVisible) {
        el.dataset.labelHidden = '0';
        if (el.dataset.userHidden !== '1') el.style.display = 'block';
      } else {
        el.dataset.labelHidden = '1';
        el.style.display = 'none';
      }
    });
    if (!labelsVisible) {
      const svg = document.getElementById('leaderLines');
      if (svg) svg.innerHTML = '';
    }
    if (window._haptic) window._haptic(15);
  };
  window._leaderLinesVisible = true;
  labelBtn.classList.add('active');

  const animBtn = document.getElementById('animBtn');
  animBtn.onclick = () => {
    window._isPlayingActive = !window._isPlayingActive;
    animBtn.classList.toggle('active', window._isPlayingActive);
    animBtn.querySelector('.ico').textContent = window._isPlayingActive ? '⏸️' : '▶️';
    const lbl = animBtn.querySelector('span:last-child');
    if (lbl) lbl.textContent = window._isPlayingActive ? 'Durdur' : 'Çalıştır';
    if (window._showGestureToast) {
      window._showGestureToast(window._isPlayingActive ? '▶️ Animasyon başladı' : '⏸️ Duraklatıldı');
    }
    if (window._haptic) window._haptic(15);
  };
  // Başlangıçta durakta
  animBtn.classList.remove('active');
  animBtn.querySelector('.ico').textContent = '▶️';

  // Tema
  document.getElementById('btnTheme').onclick = () => {
    document.body.classList.toggle('light-mode');
    const isLight = document.body.classList.contains('light-mode');
    document.getElementById('btnTheme').textContent = isLight ? '☀️' : '🌙';
    window._lightMode = isLight;
    applySceneTheme();
    if (window._haptic) window._haptic(15);
  };

  // Tam ekran
  document.getElementById('btnFs').onclick = () => {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen && document.documentElement.requestFullscreen();
    } else {
      document.exitFullscreen && document.exitFullscreen();
    }
    if (window._haptic) window._haptic(15);
  };

  // Paylaş
  document.getElementById('btnSend').onclick = () => {
    document.getElementById('shareOverlay').classList.add('show');
  };
  document.getElementById('shareClose').onclick = () => {
    document.getElementById('shareOverlay').classList.remove('show');
  };
  document.getElementById('shareWhatsApp').onclick = () => {
    const txt = encodeURIComponent('🌊 Dalgalar — 3D interaktif fizik simülasyonu!');
    window.open('https://wa.me/?text=' + txt, '_blank');
  };
  document.getElementById('shareCopy').onclick = () => {
    try { navigator.clipboard.writeText(window.location.href); } catch(e){}
    if (window._showGestureToast) window._showGestureToast('📋 Bağlantı kopyalandı');
    document.getElementById('shareOverlay').classList.remove('show');
  };
  document.getElementById('shareDownload').onclick = () => {
    try {
      const link = document.createElement('a');
      link.download = 'dalgalar-simulasyon.png';
      link.href = renderer.domElement.toDataURL('image/png');
      link.click();
    } catch(e){}
    document.getElementById('shareOverlay').classList.remove('show');
  };

  // Karşılaştırma
  document.getElementById('btnCompare').onclick = () => {
    renderCompareTable();
    document.getElementById('compareOverlay').classList.add('show');
  };
  document.getElementById('compareClose').onclick = () => {
    document.getElementById('compareOverlay').classList.remove('show');
  };
  document.getElementById('comparePrev').onclick = () => {
    if (window._cmpIdx > 0) { window._cmpIdx--; _showComparePage(); if (window._haptic) window._haptic(10); }
  };
  document.getElementById('compareNext').onclick = () => {
    if (window._cmpIdx < window._cmpPages.length - 1) { window._cmpIdx++; _showComparePage(); if (window._haptic) window._haptic(10); }
  };

  // Tablo
  document.getElementById('btnTable').onclick = () => {
    renderInfoTable();
    document.getElementById('tableOverlay').classList.add('show');
  };
  document.getElementById('tableClose').onclick = () => {
    document.getElementById('tableOverlay').classList.remove('show');
  };
  document.getElementById('tablePrev').onclick = () => {
    if (window._tblIdx > 0) { window._tblIdx--; _showTablePage(); if (window._haptic) window._haptic(10); }
  };
  document.getElementById('tableNext').onclick = () => {
    if (window._tblIdx < window._tblPages.length - 1) { window._tblIdx++; _showTablePage(); if (window._haptic) window._haptic(10); }
  };

  // Overlay dışına tıkla → kapat
  ['shareOverlay','compareOverlay','tableOverlay'].forEach(id => {
    const ov = document.getElementById(id);
    ov.onclick = (e) => { if (e.target === ov) ov.classList.remove('show'); };
  });

  // Dışarı tıkla → dropdown kapat
  document.addEventListener('click', (e) => {
    if (!e.target.closest('.dropdown-panel') && !e.target.closest('.stack-btn') && !e.target.closest('.tool-icon-btn')) {
      closeAllDropdowns();
    }
  });
}

// ============================================================
// ====== BAŞLATMA ============================================
// ============================================================
init();
attachEvents();
buildTopicDropdown();
selectSub('dalgaNedir');
animate();

console.log('✓ Dalgalar simülasyonu başlatıldı');
</script>
