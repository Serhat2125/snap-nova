name: snap_nova
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.5+35

environment:
  sdk: '>=3.2.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI & Charts
  fl_chart: ^1.2.0
  cupertino_icons: ^1.0.8

  # Camera & Image
  camera: ^0.12.0+1
  image_picker: ^1.0.7
  image: ^4.1.7

  # Math & AI
  math_expressions: ^3.1.0
  google_generative_ai: ^0.4.7

  # Permissions
  permission_handler: ^11.3.1

  # Biometric (Uygulama Kilidi — parmak izi/Face ID)
  local_auth: ^2.3.0

  # Fonts
  google_fonts: ^6.2.1
  font_awesome_flutter: ^10.7.0
  flutter_markdown: ^0.7.4+1

  # Helpers
  path_provider: ^2.1.2
  share_plus: ^10.1.4
  flutter_math_fork: ^0.7.4
  http: ^1.1.0

  # Speech-to-text — Sesli Komut özelliği
  speech_to_text: ^7.0.0
  # TTS — AI cevaplarını sesli okuma
  flutter_tts: ^4.2.0
  # Sesli not kaydı — flutter_sound (record paketinden daha stabil).
  audioplayers: ^6.1.0
  flutter_sound: ^9.28.0
  # Animations — düşünüyor / shimmer placeholder
  shimmer: ^3.0.0

  # Firebase + Auth
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0
  firebase_analytics: ^11.3.0
  firebase_crashlytics: ^4.1.0
  firebase_app_check: ^0.3.2
  cloud_firestore: ^5.4.0
  cloud_functions: ^5.1.4
  firebase_storage: ^12.3.2
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.4

  # Media & Links
  url_launcher: ^6.2.0
  file_picker: ^8.1.4
  # App versiyonu (Bilgi/About ekranı için)
  package_info_plus: ^8.0.0

  # PDF
  pdf: ^3.10.8
  printing: ^5.12.0

  # Localization
  shared_preferences: ^2.2.2

  # Screen wake (pomodoro)
  wakelock_plus: ^1.2.8

  # QR code (paylaşım kartında qualsar.app linki)
  qr_flutter: ^4.1.0
  # AI model marka logoları (SVG render — solution_screen)
  jovial_svg: ^1.1.29
  country_flags: ^4.1.2

  # State management — yeni feature katmanları için (eski setState'lere
  # dokunulmuyor; sadece yeni özellikler Riverpod kullanıyor).
  flutter_riverpod: ^2.5.1

  # 3D model görüntüleyici — Mars ekranı (Earth/Astronaut) ve Çalışma
  # Arkadaşım (robot avatarlar) için. WebView tabanlı, .glb/.gltf destekler.
  model_viewer_plus: ^1.9.0

  # Google Play Billing + App Store StoreKit — premium abone akışı.
  # Production'da MockPaymentScreen yerine SubscriptionService kullanılıyor.
  in_app_purchase: ^3.2.0

  # Sosyal altyapı — FCM push, deep link davet, QR scan, rehber sync.
  firebase_messaging: ^15.1.0
  flutter_local_notifications: ^17.2.3
  # Zamanlanmış yerel bildirimler (sınav geri sayımı) için — zonedSchedule
  # mutlak-an (tz.UTC) ile çalışır, cihaz IANA zonu gerektirmez.
  timezone: ^0.9.4
  app_links: ^6.3.2
  mobile_scanner: ^5.2.3

  # WebView — 3D Eğitim Modelleri (HTML + Three.js) çevrimdışı oynatma.
  webview_flutter: ^4.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # Launcher icon: tool/generate_app_icon.dart ile üretilen PNG'leri
  # Android mipmap + iOS AppIcon.appiconset'e otomatik kurar.
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  # NOT: adaptive_icon_* parametreleri kaldırıldı — adaptive icon
  # foreground'u sadece merkez %66 safe area'yı kullanıyor; kanatlar
  # (dünya/kitap/sütun + π/atom/Σ) ve alt "QuAlsar" metni kırpılıyor.
  # Bu nedenle tek bir PNG (full design) kullanılıyor.

flutter:
  uses-material-design: true
  # Fragment shader'lar — dönen 3D dünya küresi (Düello Arenası hero kartı).
  shaders:
    - shaders/globe.frag
  assets:
    - lib/assets/9ejrn (1).jpg
    - lib/assets/invite_hero.jpeg
    - assets/app_icon.png
    # Onboarding hesap tipi kartı profil fotoğrafları
    - assets/images/profile_teacher.jpg
    - assets/images/profile_student.jpg
    - assets/images/profile_parent.jpg
    # Uygulama SFX'leri — SystemSound Android'de güvenilir değil (alert hiç
    # desteklenmiyor, click cihazın "Dokunma sesleri" ayarına bağlı); kendi
    # ses dosyalarımız audioplayers ile çalınır.
    - assets/sounds/
    # Kütüphanem kart ikonları (3D görsel set + gerçek Dünya fotoğrafı)
    - assets/library_icons/
    # 3D Eğitim Modelleri — Coğrafya: Dünyanın Şekli ve Hareketi
    - assets/dunyanin-hareketleri.html
    # 3D Eğitim Modelleri — Coğrafya: Yer Şekilleri ve İzohipsler
    - assets/yer-sekilleri-izohipsler.html
