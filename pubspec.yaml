name: snap_nova
description: "A new Flutter project."

publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: '>=3.2.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI & Charts
  fl_chart: ^1.2.0
  cupertino_icons: ^1.0.8

  # Camera & Image
  camera: ^0.12.0+1
  image_picker: ^1.0.7
  image: ^4.1.7

  # Math & AI
  math_expressions: ^3.1.0
  google_generative_ai: ^0.4.7

  # Permissions
  permission_handler: ^11.3.1

  # Fonts
  google_fonts: ^6.2.1

  # Helpers
  path_provider: ^2.1.2
  share_plus: ^10.1.4
  flutter_math_fork: ^0.7.4
  http: ^1.1.0

  # Speech-to-text — Sesli Komut özelliği
  speech_to_text: ^7.0.0
  # TTS — AI cevaplarını sesli okuma
  flutter_tts: ^4.2.0
  # Sesli not kaydı — flutter_sound (record paketinden daha stabil).
  audioplayers: ^6.1.0
  flutter_sound: ^9.28.0
  # Animations — düşünüyor / shimmer placeholder
  shimmer: ^3.0.0

  # Firebase + Auth
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0
  firebase_analytics: ^11.3.0
  firebase_crashlytics: ^4.1.0
  cloud_firestore: ^5.4.0
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.4

  # Media & Links
  url_launcher: ^6.2.0

  # PDF
  pdf: ^3.10.8
  printing: ^5.12.0

  # Localization
  shared_preferences: ^2.2.2

  # Screen wake (pomodoro)
  wakelock_plus: ^1.2.8

  # QR code (paylaşım kartında qualsar.app linki)
  qr_flutter: ^4.1.0
  country_flags: ^4.1.2

  # State management — yeni feature katmanları için (eski setState'lere
  # dokunulmuyor; sadece yeni özellikler Riverpod kullanıyor).
  flutter_riverpod: ^2.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - lib/assets/9ejrn (1).jpg
    - lib/assets/invite_hero.jpeg