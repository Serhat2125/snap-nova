# QuAlsar CI — her push/PR'da statik analiz + birim testleri.
# Amaç: "düzelttim ama başka yeri bozdum" döngüsünü main'e ulaşmadan kesmek.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze-test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v5

      # Sürüm SABİT — "channel: stable" her yeni Flutter çıkışında CI'ı
      # geliştirme ortamından ayrıştırıyordu (yerelde geçen testler CI'da
      # düşüyordu). Yerel geliştirme sürümüyle birebir aynı tutulur;
      # Flutter yükseltmesi bilinçli bir commit ile yapılır.
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.6
          channel: stable
          cache: true

      # secrets.dart gitignored — taze klonda derleme için şablondan stub üret
      - name: Secrets stub oluştur
        run: cp lib/services/secrets_example.dart lib/services/secrets.dart

      - name: Bağımlılıkları indir
        run: flutter pub get

      - name: Statik analiz
        run: flutter analyze --no-fatal-infos

      # expanded reporter: bir test düşerse HANGİSİ olduğu log/annotation'da
      # açıkça görünsün (compact varsayılanı yalnız sayı veriyor).
      - name: Birim testleri
        run: flutter test --reporter expanded

  functions-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Functions derle (tsc)
        working-directory: functions
        run: |
          npm ci
          npx tsc --noEmit
