org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=1G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true

# ── Build hızlandırma ──────────────────────────────────────────────────────
# Modülleri paralel derle (çok çekirdek kullanılır).
org.gradle.parallel=true
# Build cache — değişmeyen task çıktıları yeniden derlenmez (en büyük kazanç).
org.gradle.caching=true
# Yalnızca gerekli modüller konfigüre edilir.
org.gradle.configureondemand=true
# Gradle daemon JVM'i bellekte kalır — sonraki build'ler hızlı başlar.
org.gradle.daemon=true
# R sınıfları modül-bazlı üretilir — resource işleme hızlanır.
android.nonTransitiveRClass=true
# Kotlin artımlı derleme (varsayılan açık ama sabitle).
kotlin.incremental=true
